<!--
  scene-context-tiers.html — Three-tier context table.
  Three rows: Global / On-demand / Layer-2 plan.
  Each reveals on its own beat with mono badges.
-->
<template id="scene-context-tiers-template">
  <div data-composition-id="scene-context-tiers"
       data-start="0"
       data-width="1920"
       data-height="1080"
       style="position:absolute; inset:0; overflow:hidden;
              font-family: 'Montserrat', system-ui, sans-serif; color:var(--ink);">

    <style>
      #ct-content {
        width:100%; height:100%;
        padding: 80px var(--pad-x) 70px;
        display:flex; flex-direction:column;
        align-items:flex-start; justify-content:flex-start;
        gap: 24px;
        box-sizing:border-box;
      }
      #ct-content .eyebrow {
        font-family: 'JetBrains Mono', ui-monospace, monospace;
        font-size: 22px;
        font-weight: 500;
        letter-spacing: 0.32em;
        text-transform: uppercase;
        color: var(--accent-2);
        display: inline-flex; align-items: center; gap: 18px;
      }
      #ct-content .eyebrow::before {
        content: ""; display: inline-block;
        width: 56px; height: 2px;
        background: var(--accent-2);
      }
      #ct-content .headline {
        font-family: 'Montserrat', system-ui, sans-serif;
        font-weight: 700;
        font-size: 70px;
        line-height: 1.0;
        letter-spacing: -0.022em;
        color: var(--ink);
      }
      .ct-tier {
        display: grid;
        grid-template-columns: 360px 1fr 1fr;
        gap: 26px;
        width: 100%;
        padding: 28px 32px;
        background: rgba(255,255,255,0.03);
        border: 1px solid rgba(255,255,255,0.10);
        border-radius: 16px;
        align-items: center;
      }
      .ct-tier .badge {
        display: inline-flex; align-items: center; gap: 14px;
      }
      .ct-tier .badge .num {
        font-family: 'JetBrains Mono', ui-monospace, monospace;
        font-weight: 600;
        font-size: 38px;
        color: var(--accent);
        letter-spacing: 0.06em;
      }
      .ct-tier .badge .name {
        font-family: 'Montserrat', system-ui, sans-serif;
        font-weight: 700;
        font-size: 42px;
        letter-spacing: -0.015em;
        color: var(--ink);
      }
      .ct-tier .col {
        font-family: 'Montserrat', system-ui, sans-serif;
        font-weight: 400;
        font-size: 26px;
        line-height: 1.35;
        color: var(--ink-2);
      }
      .ct-tier .col .h {
        display: block;
        font-family: 'JetBrains Mono', ui-monospace, monospace;
        font-weight: 500;
        font-size: 16px;
        letter-spacing: 0.16em;
        text-transform: uppercase;
        color: var(--muted);
        margin-bottom: 6px;
      }
      .ct-tier.global { border-color: rgba(59, 130, 246, 0.40); box-shadow: 0 0 32px rgba(59, 130, 246, 0.15); }
      .ct-tier.ondemand { border-color: rgba(14, 165, 233, 0.32); }
      .ct-tier.layer2 { border-color: rgba(96, 165, 250, 0.30); }
    </style>

    <div id="ct-content">
      <div class="eyebrow" id="ct-eyebrow" style="opacity:0;visibility:hidden;">STRATEGY 03 &middot; CONTEXT MANAGEMENT</div>
      <h2 class="headline" id="ct-headline" style="opacity:0;visibility:hidden;">Three tiers. Right thing, right tier.</h2>

      <div class="ct-tier global" id="ct-t1" style="opacity:0;visibility:hidden;">
        <div class="badge"><span class="num">01</span><span class="name">Global</span></div>
        <div class="col"><span class="h">When loaded</span>Auto. Every session.</div>
        <div class="col"><span class="h">Holds</span>Tech stack. Style. Must-knows. &le; 300 lines.</div>
      </div>

      <div class="ct-tier ondemand" id="ct-t2" style="opacity:0;visibility:hidden;">
        <div class="badge"><span class="num">02</span><span class="name">On-demand</span></div>
        <div class="col"><span class="h">When loaded</span>Only when relevant.</div>
        <div class="col"><span class="h">Holds</span>Pattern guides. Per-feature READMEs.</div>
      </div>

      <div class="ct-tier layer2" id="ct-t3" style="opacity:0;visibility:hidden;">
        <div class="badge"><span class="num">03</span><span class="name">Layer-2 plan</span></div>
        <div class="col"><span class="h">When loaded</span>One ticket. One session.</div>
        <div class="col"><span class="h">Holds</span>The plan file. Discarded after.</div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({ paused: true });

      tl.set("#ct-eyebrow",  { y: 20 }, 0);
      tl.set("#ct-headline", { y: 30 }, 0);
      ["#ct-t1","#ct-t2","#ct-t3"].forEach(sel => tl.set(sel, { y: 40 }, 0));

      tl.to("#ct-eyebrow",  { y: 0, autoAlpha: 1, duration: 0.5, ease: "power2.out" }, 0.2);
      tl.to("#ct-headline", { y: 0, autoAlpha: 1, duration: 0.65, ease: "power3.out" }, 0.5);

      // Tiers reveal EARLY so the 3-row stack is visible while narration introduces the concept.
      // Narrator names each tier later — those moments get an emphasis pulse, not a fresh reveal.
      tl.to("#ct-t1", { y: 0, autoAlpha: 1, duration: 0.6, ease: "back.out(1.3)" }, 2.0);
      tl.to("#ct-t2", { y: 0, autoAlpha: 1, duration: 0.6, ease: "back.out(1.3)" }, 4.5);
      tl.to("#ct-t3", { y: 0, autoAlpha: 1, duration: 0.6, ease: "back.out(1.3)" }, 7.0);

      // Narrator names each tier — strong scale + glow pulse at the word anchor
      tl.to("#ct-t1", { scale: 1.04, boxShadow: "0 0 80px rgba(59, 130, 246, 0.55)",
        duration: 0.6, ease: "sine.inOut", yoyo: true, repeat: 1 }, 10.159);  // "Global is auto"
      tl.to("#ct-t2", { scale: 1.04, boxShadow: "0 0 80px rgba(14, 165, 233, 0.55)",
        duration: 0.6, ease: "sine.inOut", yoyo: true, repeat: 1 }, 18.901);  // "On-demand is loaded"
      tl.to("#ct-t3", { scale: 1.04, boxShadow: "0 0 80px rgba(96, 165, 250, 0.55)",
        duration: 0.6, ease: "sine.inOut", yoyo: true, repeat: 1 }, 25.379);  // "Layer Two is the plan"

      // Bridge beats every ≤3s — narrator continues explaining within each tier window
      tl.to("#ct-t1", { boxShadow: "0 0 60px rgba(59, 130, 246, 0.35)", duration: 1.0, ease: "sine.inOut", yoyo: true, repeat: 1 }, 13.5);
      tl.to("#ct-t2", { boxShadow: "0 0 60px rgba(14, 165, 233, 0.35)", duration: 1.0, ease: "sine.inOut", yoyo: true, repeat: 1 }, 16.0);
      tl.to("#ct-t2", { boxShadow: "0 0 60px rgba(14, 165, 233, 0.40)", duration: 1.0, ease: "sine.inOut", yoyo: true, repeat: 1 }, 22.0);
      tl.to("#ct-t3", { boxShadow: "0 0 60px rgba(96, 165, 250, 0.35)", duration: 1.0, ease: "sine.inOut", yoyo: true, repeat: 1 }, 28.5);
      tl.to(["#ct-t1","#ct-t2","#ct-t3"], { scale: 1.012, duration: 0.8, ease: "sine.inOut",
        yoyo: true, repeat: 1, stagger: 0.1 }, 31.5);
      tl.to("#ct-t1", { boxShadow: "0 0 60px rgba(59, 130, 246, 0.45)", duration: 1.0, ease: "sine.inOut", yoyo: true, repeat: 1 }, 34.5);
      tl.to("#ct-t2", { boxShadow: "0 0 60px rgba(14, 165, 233, 0.45)", duration: 1.0, ease: "sine.inOut", yoyo: true, repeat: 1 }, 37.5);
      tl.to("#ct-t3", { boxShadow: "0 0 60px rgba(96, 165, 250, 0.45)", duration: 1.0, ease: "sine.inOut", yoyo: true, repeat: 1 }, 40.5);
      tl.to(["#ct-t1","#ct-t2","#ct-t3"], { scale: 1.015, duration: 0.7, ease: "sine.inOut",
        yoyo: true, repeat: 1, stagger: 0.08 }, 43.5);
      tl.to("#ct-t3", { scale: 1.03, duration: 0.6, ease: "sine.inOut", yoyo: true, repeat: 1 }, 46.0);

      // Extend timeline to full slot duration
      tl.set({}, {}, 47.1);
      window.__timelines["scene-context-tiers"] = tl;
    </script>
  </div>
</template>
