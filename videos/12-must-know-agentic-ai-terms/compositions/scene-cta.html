<!--
  scene-cta.html — Closing CTA archetype.

  3-phase content (sequential reveals on a single timeline):
    1. FitHeadline debate question (40-72px Inter 900) at t=0 — expo.out rise
    2. Comment-prompt pill + subscribe pill at t=2.5 — back.out(1.4)
    3. Optional next-video thumbnail card at t=5 — pulsing border (FINITE repeat)

  HARD RULE: subscribe pulse uses a FINITE repeat (yoyo:true, repeat:N) — never
  repeat:-1. The framework requires deterministic timelines. Compute repeat as
  Math.ceil(scene_duration / pulse_cycle).
-->
<template id="scene-cta-template">
  <div data-composition-id="scene-cta"
       data-start="0"
       data-width="1920"
       data-height="1080"
       style="position:absolute; inset:0; overflow:hidden;
              font-family:var(--sans); color:var(--text);">

    <style>
      #scene-cta-content {
        width:100%; height:100%;
        padding: var(--pad-top) var(--pad-x) var(--pad-bottom);
        display:flex; flex-direction:column;
        align-items:center; justify-content:center;
        gap: 40px;
        box-sizing:border-box;
      }
      #scene-cta-content .debate {
        font-family: var(--sans);
        font-weight: 900;
        font-size: 64px;
        line-height: 1.05;
        letter-spacing: -1px;
        color: var(--text);
        text-align: center;
        max-width: 1500px;
      }
      #scene-cta-content .pills {
        display:flex; flex-direction:row;
        align-items:center; justify-content:center;
        gap: 24px;
      }
      .cta-pill {
        padding: 18px 32px;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.06);
        border: 1.5px solid var(--border-bright);
        font-family: var(--mono);
        font-weight: 700;
        font-size: 22px;
        letter-spacing: 2px;
        color: var(--text);
        display:inline-flex; align-items:center;
        gap: 12px;
      }
      .cta-pill.comment .icon { color: var(--accent-2); }
      .cta-pill.subscribe {
        background: linear-gradient(135deg,
                      rgba(249, 115, 22, 0.18) 0%,
                      rgba(249, 115, 22, 0.05) 100%);
        border-color: rgba(249, 115, 22, 0.55);
      }
      .cta-pill.subscribe .arrow {
        color: var(--accent-warn);
        font-weight: 900;
      }
      #cta-tree {
        margin-top: 4px;
        width: 1200px;
        display: flex;
        flex-direction: column;
        gap: 12px;
      }
      .tree-row {
        padding: 14px 24px;
        border-radius: 14px;
        border: 1px solid var(--border-bright);
        background: rgba(255, 255, 255, 0.04);
        display: flex;
        align-items: center;
        gap: 18px;
        font-family: var(--sans);
      }
      .tree-row .qn {
        font-family: var(--mono);
        font-weight: 700;
        font-size: 18px;
        letter-spacing: 0.12em;
        color: var(--accent-2);
        min-width: 56px;
      }
      .tree-row .qbody {
        font-weight: 600;
        font-size: 22px;
        color: var(--text);
        flex: 1;
      }
      .tree-row .qmap {
        font-family: var(--mono);
        font-weight: 700;
        font-size: 18px;
        color: var(--accent-warn);
        letter-spacing: 0.04em;
      }
    </style>

    <div id="scene-cta-content">
      <div class="debate" id="cta-debate">5 questions. 12 concepts. Every production bug maps somewhere.</div>

      <div id="cta-tree">
        <div class="tree-row" id="cta-q1">
          <span class="qn">Q1</span>
          <span class="qbody">Agent hallucinated or forgot?</span>
          <span class="qmap">Grounding &middot; Memory &middot; Context Window</span>
        </div>
        <div class="tree-row" id="cta-q2">
          <span class="qn">Q2</span>
          <span class="qbody">Couldn't reach the data it needed?</span>
          <span class="qmap">Tool Use &middot; MCP</span>
        </div>
        <div class="tree-row" id="cta-q3">
          <span class="qn">Q3</span>
          <span class="qbody">Did something destructive?</span>
          <span class="qmap">Guardrails &middot; Sandbox &middot; HITL</span>
        </div>
        <div class="tree-row" id="cta-q4">
          <span class="qn">Q4</span>
          <span class="qbody">One agent overloaded with too big a goal?</span>
          <span class="qmap">Orchestrator &middot; Subagent &middot; Multi-Agent</span>
        </div>
        <div class="tree-row" id="cta-q5">
          <span class="qn">Q5</span>
          <span class="qbody">Answered one-shot when it needed iteration?</span>
          <span class="qmap">Agent Loop</span>
        </div>
      </div>

      <div class="pills">
        <div class="cta-pill comment" id="cta-comment">
          <span class="icon">&#x270F;</span>
          <span>Which one trips your team?</span>
        </div>
        <div class="cta-pill subscribe" id="cta-subscribe">
          <span>dynamous.ai community</span>
          <span class="arrow">&rarr;</span>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({
        paused: true,
        defaults: { ease: "power3.out", duration: 0.6 }
      });

      // Debate question — expo.out rise at t=0
      tl.from("#cta-debate", { y: 40, opacity: 0, duration: 0.7, ease: "expo.out", immediateRender: false }, 0);

      // Decision-tree rows — stagger 5s apart aligned to narration Q1..Q5
      tl.from("#cta-q1", { x: -40, opacity: 0, duration: 0.5, ease: "back.out(1.3)", immediateRender: false }, 2.5);
      tl.from("#cta-q2", { x: -40, opacity: 0, duration: 0.5, ease: "back.out(1.3)", immediateRender: false }, 7.0);
      tl.from("#cta-q3", { x: -40, opacity: 0, duration: 0.5, ease: "back.out(1.3)", immediateRender: false }, 13.0);
      tl.from("#cta-q4", { x: -40, opacity: 0, duration: 0.5, ease: "back.out(1.3)", immediateRender: false }, 18.0);
      tl.from("#cta-q5", { x: -40, opacity: 0, duration: 0.5, ease: "back.out(1.3)", immediateRender: false }, 23.0);

      // Comment + subscribe pills — appear with the Dynamous outro near scene end
      tl.from("#cta-comment",   { y: 24, opacity: 0, duration: 0.5, ease: "back.out(1.4)", immediateRender: false }, 45.0);
      tl.from("#cta-subscribe", { y: 24, opacity: 0, duration: 0.5, ease: "back.out(1.4)", immediateRender: false }, 45.3);

      // Subscribe pulse — finite repeat covering ~12s tail
      tl.to("#cta-subscribe", {
        boxShadow: "0 0 0 6px rgba(249, 115, 22, 0.35)",
        duration: 0.5,
        ease: "sine.inOut",
        yoyo: true,
        repeat: 12,
        immediateRender: false
      }, 46.0);

      window.__timelines["scene-cta"] = tl;
    </script>
  </div>
</template>
