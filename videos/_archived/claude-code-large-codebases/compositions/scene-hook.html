<!--
  scene-hook.html — Scene 1 / Hook (25.785s) — REWORK Iteration C
  "Five extension points. Two capabilities. Three patterns. Anthropic just published
   their own playbook for running Claude Code in a large codebase. And the part most
   teams miss is this. The harness matters more than the model."

  Rework: article-header.png reveal at t=0, punchy 3-big-number slam, hero thesis slam,
  source receipt badge, series lockup. Visual pacing: beat every ≤5s throughout.
-->
<template id="scene-hook-template">
  <div data-composition-id="scene-hook"
       data-start="0"
       data-width="1920"
       data-height="1080"
       style="position:absolute; inset:0; overflow:hidden;
              font-family:var(--sans); color:var(--text);">

    <style>
      #scene-hook-content {
        width: 100%; height: 100%;
        padding: var(--pad-top) var(--pad-x) var(--pad-bottom);
        display: flex; flex-direction: column;
        align-items: flex-start; justify-content: center;
        gap: 24px;
        box-sizing: border-box;
        position: relative;
      }
      /* Topic slam — top-left dominant word */
      #hook-topic-slam {
        font-family: var(--sans);
        font-weight: 900;
        font-size: 140px;
        line-height: 0.88;
        letter-spacing: -4px;
        color: var(--accent-1);
        text-shadow: 0 0 60px rgba(233, 116, 88, 0.45), 0 6px 20px rgba(0,0,0,0.5);
        max-width: 900px;
        z-index: 2;
        position: relative;
      }
      /* Article-header image — grounded receipt */
      #hook-article-img {
        position: absolute;
        right: 80px;
        top: 50%;
        transform: translateY(-50%);
        width: 720px;
        height: auto;
        border-radius: 16px;
        border: 2px solid rgba(233, 116, 88, 0.70);
        box-shadow: 0 0 60px rgba(233, 116, 88, 0.35), 0 24px 48px rgba(0,0,0,0.5);
        object-fit: cover;
      }
      /* 3 big numbers row */
      #hook-stat-row {
        display: flex; flex-direction: row;
        align-items: baseline; justify-content: flex-start;
        gap: 40px;
        font-variant-numeric: tabular-nums lining-nums;
        position: relative; z-index: 2;
      }
      .hook-stat-block {
        display: flex; flex-direction: column;
        align-items: center; gap: 6px;
      }
      .hook-stat-num {
        font-family: var(--sans);
        font-weight: 900;
        font-size: 200px;
        line-height: 0.85;
        letter-spacing: -6px;
      }
      .hook-stat-num.c1 {
        color: var(--accent-1);
        text-shadow: 0 0 80px rgba(233, 116, 88, 0.55), 0 8px 24px rgba(0,0,0,0.6);
      }
      .hook-stat-num.c2 {
        color: var(--accent-2);
        text-shadow: 0 0 80px rgba(167, 139, 250, 0.55), 0 8px 24px rgba(0,0,0,0.6);
      }
      .hook-stat-num.c3 {
        color: var(--accent-3);
        text-shadow: 0 0 80px rgba(107, 154, 239, 0.55), 0 8px 24px rgba(0,0,0,0.6);
      }
      .hook-stat-label {
        font-family: var(--mono);
        font-weight: 700;
        font-size: 28px;
        letter-spacing: 4px;
        text-transform: uppercase;
        color: var(--text-secondary);
      }
      /* "FROM THE ARTICLE →" pill beside image */
      #hook-article-pill {
        position: absolute;
        right: 80px;
        top: calc(50% + 310px);
        display: inline-flex; align-items: center; gap: 12px;
        padding: 12px 24px;
        border-radius: 999px;
        background: rgba(233, 116, 88, 0.10);
        border: 1.5px solid rgba(233, 116, 88, 0.50);
        font-family: var(--mono);
        font-weight: 700;
        font-size: 32px;
        letter-spacing: 2px;
        color: var(--accent-1);
        z-index: 3;
      }
      /* "Just published" badge */
      #hook-pub-badge {
        display: inline-flex; align-items: center; gap: 10px;
        padding: 10px 22px;
        border-radius: 10px;
        background: rgba(255,255,255,0.06);
        border: 1.5px solid rgba(255,255,255,0.16);
        font-family: var(--mono);
        font-weight: 700;
        font-size: 28px;
        letter-spacing: 2px;
        color: var(--text-secondary);
        position: relative; z-index: 2;
      }
      #hook-pub-badge .dot {
        width: 10px; height: 10px;
        border-radius: 50%;
        background: var(--accent-1);
        box-shadow: 0 0 10px rgba(233,116,88,0.8);
      }
      /* Hero thesis — dominant after t=8 */
      #hook-thesis-wrap {
        position: relative; z-index: 2;
      }
      #hook-thesis-line {
        font-family: var(--sans);
        font-weight: 900;
        font-size: 96px;
        line-height: 0.95;
        letter-spacing: -2px;
        color: var(--text);
        max-width: 1100px;
      }
      #hook-thesis-line .accent { color: var(--accent-1); }
      /* marker-sweep under harness…model */
      #p1-mark-1 {
        display: block;
        height: 6px;
        width: 0;
        background: var(--accent-1);
        border-radius: 3px;
        margin: 10px 0 0;
        box-shadow: 0 0 20px rgba(233, 116, 88, 0.6);
      }
      /* Series lockup */
      #hook-series-lockup {
        display: inline-flex; align-items: center;
        gap: 16px;
        padding: 14px 28px;
        border-radius: 999px;
        background: var(--bg-surface);
        border: 1.5px solid rgba(233, 116, 88, 0.45);
        font-family: var(--mono);
        font-weight: 700;
        font-size: 28px;
        letter-spacing: 3px;
        color: var(--text);
        position: relative; z-index: 2;
      }
      #hook-series-lockup .lock-num { color: var(--accent-1); }
      /* marker-circle around the lockup */
      #p1-mark-circle {
        position: absolute;
        inset: -16px;
        pointer-events: none;
        overflow: visible;
      }
      #p1-mark-circle ellipse {
        fill: none;
        stroke: var(--accent-1);
        stroke-width: 3;
        stroke-dasharray: 1400;
        stroke-dashoffset: 1400;
        filter: drop-shadow(0 0 16px rgba(233, 116, 88, 0.55));
      }
      /* Anthropic sub-line */
      #hook-anthropic-line {
        font-family: var(--mono);
        font-weight: 600;
        font-size: 30px;
        letter-spacing: 2px;
        color: var(--text-secondary);
        max-width: 900px;
        position: relative; z-index: 2;
      }
    </style>

    <!-- Article header image — grounded source receipt -->
    <img id="hook-article-img"
         src="../assets/blog/article-header.png"
         alt="How Claude Code Works in Large Codebases — Anthropic blog article header" />

    <!-- "FROM THE ARTICLE →" pill -->
    <div id="hook-article-pill">FROM THE ARTICLE &rarr;</div>

    <div id="scene-hook-content">
      <!-- Topic slam top-left -->
      <div id="hook-topic-slam">ANTHROPIC'S<br>PLAYBOOK</div>

      <!-- 3 big numbers -->
      <div id="hook-stat-row">
        <div class="hook-stat-block" id="hook-stat-5">
          <div class="hook-stat-num c1">5</div>
          <div class="hook-stat-label">Extension Points</div>
        </div>
        <div class="hook-stat-block" id="hook-stat-2">
          <div class="hook-stat-num c2">2</div>
          <div class="hook-stat-label">Capabilities</div>
        </div>
        <div class="hook-stat-block" id="hook-stat-3">
          <div class="hook-stat-num c3">3</div>
          <div class="hook-stat-label">Patterns</div>
        </div>
      </div>

      <!-- "Just published" badge -->
      <div id="hook-pub-badge">
        <span class="dot"></span>
        JUST PUBLISHED &middot; MAY 14, 2026
      </div>

      <!-- Anthropic sub-line -->
      <div id="hook-anthropic-line">Anthropic just published their own playbook for running Claude Code in a large codebase.</div>

      <!-- Hero thesis slam -->
      <div id="hook-thesis-wrap">
        <div id="hook-thesis-line">
          The <span class="accent">harness</span> matters<br>more than the <span class="accent">model</span>.
          <span id="p1-mark-1"></span>
        </div>
      </div>

      <!-- Series lockup -->
      <div id="hook-series-lockup">
        <span class="lock-num">Series:</span><span>Claude Code at Scale</span>
        <svg id="p1-mark-circle" viewBox="0 0 520 100" preserveAspectRatio="none">
          <ellipse cx="260" cy="50" rx="252" ry="44"></ellipse>
        </svg>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      window.__timelines = window.__timelines || {};
      const SCENE_DURATION = 25.785;
      const tl = gsap.timeline({
        paused: true,
        defaults: { ease: "power3.out", duration: 0.6 }
      });

      // === INITIAL STATE — all hidden except article image (already at full opacity) ===
      // Article image slams in at t=0
      tl.set("#hook-article-img",    { scale: 0.85, opacity: 0 }, 0);
      // Topic slam hidden
      tl.set("#hook-topic-slam",     { x: -30, opacity: 0 }, 0);
      // Stats hidden
      tl.set("#hook-stat-5",         { scale: 0.85, opacity: 0 }, 0);
      tl.set("#hook-stat-2",         { scale: 0.85, opacity: 0 }, 0);
      tl.set("#hook-stat-3",         { scale: 0.85, opacity: 0 }, 0);
      // Pill, badge, sub-line hidden
      tl.set("#hook-article-pill",   { y: 12, opacity: 0 }, 0);
      tl.set("#hook-pub-badge",      { y: 10, opacity: 0 }, 0);
      tl.set("#hook-anthropic-line", { y: 20, opacity: 0 }, 0);
      // Thesis + series hidden
      tl.set("#hook-thesis-wrap",    { y: 30, opacity: 0 }, 0);
      tl.set("#hook-series-lockup",  { scale: 0.85, opacity: 0 }, 0);

      // === BEAT 1: t=0–0.6s — Article header image slams in (back.out) ===
      tl.to("#hook-article-img",  { scale: 1, opacity: 1, duration: 0.55, ease: "back.out(1.6)" }, 0.0);
      // Simultaneously: topic slam slides in from left
      tl.to("#hook-topic-slam",   { x: 0, opacity: 1, duration: 0.55, ease: "back.out(1.4)" }, 0.0);

      // === BEAT 2: t=0.6–1.2s — 3 stat numbers slam in with 200ms stagger ===
      // narration anchors: "Five"=0.058, "Two"=1.091, "Three"=2.996 — adjusted to tighter visual beats
      tl.to("#hook-stat-5", { scale: 1, opacity: 1, duration: 0.55, ease: "back.out(1.7)" }, 0.058);
      // inline shake on "Five" slam
      tl.to("#hook-stat-5", { x: 6,  duration: 0.04, ease: "none" }, 0.42);
      tl.to("#hook-stat-5", { x: -6, duration: 0.04, ease: "none" }, 0.47);
      tl.to("#hook-stat-5", { x: 4,  duration: 0.04, ease: "none" }, 0.52);
      tl.to("#hook-stat-5", { x: 0,  duration: 0.04, ease: "none" }, 0.57);

      tl.to("#hook-stat-2", { scale: 1, opacity: 1, duration: 0.55, ease: "back.out(1.7)" }, 1.091);
      tl.to("#hook-stat-3", { scale: 1, opacity: 1, duration: 0.55, ease: "back.out(1.7)" }, 2.996);

      // === BEAT 3: t=2.0–2.6s — Article pill reveals beside image ===
      tl.to("#hook-article-pill", { y: 0, opacity: 1, duration: 0.5, ease: "power2.out" }, 2.0);

      // === BEAT 4: t=4.5–5.0s — "Just published" badge + date ===
      // narration anchor: "Anthropic" at 4.736
      tl.to("#hook-pub-badge", { y: 0, opacity: 1, duration: 0.5, ease: "power2.out" }, 4.5);

      // Anthropic sub-line at 4.7 (just before "Anthropic" at 4.736)
      tl.to("#hook-anthropic-line", { y: 0, opacity: 1, duration: 0.6, ease: "power2.out" }, 4.7);

      // === BEAT 5: t=8.0s — HERO THESIS SLAM — numbers dim + article dims ===
      // narration anchor: "harness" at 12.736 — but visual must precede narration by ~4s
      // "The harness matters more than the model." sentence starts ~11.5s
      // Thesis enters at 8.0 to establish before narration hits it
      tl.to("#hook-thesis-wrap", { y: 0, opacity: 1, duration: 0.7, ease: "power3.out" }, 8.0);
      // Dim stats and article image to background
      tl.to("#hook-stat-row",    { opacity: 0.25, scale: 0.92, duration: 0.8, ease: "power2.inOut" }, 8.2);
      tl.to("#hook-article-img", { opacity: 0.30, duration: 0.8, ease: "power2.inOut" }, 8.2);

      // Visual-pacing beat at ~9.5s (gap filler between 8.0 and 12.7)
      tl.to("#hook-thesis-wrap", { scale: 1.02, duration: 0.3, ease: "sine.inOut", yoyo: true, repeat: 1 }, 9.5);

      // === BEAT 6: t=12.736 — marker-sweep under "harness ... model" ===
      tl.to("#p1-mark-1", { width: "72%", duration: 1.75, ease: "power2.out" }, 12.736);

      // === BEAT 7: t=15.0s — PART 1 / CLAUDE CODE AT SCALE series lockup ===
      // narration anchor: "Part" at 15.720
      tl.to("#hook-series-lockup", { scale: 1, opacity: 1, duration: 0.6, ease: "back.out(1.5)" }, 15.0);

      // === BEAT 8: t=18.564 — marker-circle draws around lockup ("scale.") ===
      tl.to("#p1-mark-circle ellipse", { strokeDashoffset: 0, duration: 0.9, ease: "power2.out" }, 18.564);

      // Hold-and-breathe: scale-pulse on thesis at 22.0
      tl.to("#hook-thesis-wrap", { scale: 1.025, duration: 0.35, ease: "sine.inOut", yoyo: true, repeat: 1 }, 22.0);

      tl.set({}, {}, SCENE_DURATION);
      window.__timelines["scene-hook"] = tl;
    </script>
  </div>
</template>
