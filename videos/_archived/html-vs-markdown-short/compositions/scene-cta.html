<!--
  scene-cta.html — "Watch the full video" CTA + thumbnail-grade final frame
  (47.7–57.5s, scene-rel 0–9.8s).
  Beats:
    0.04 — "There are five places where switching to H T M L"
    3.05 — "changes everything." (5-pill burst)
    4.78 — "Watch the full video" — CTA pill enters
    6.42 — "to see why your codebase is about to look very different."
    8.10 — final frame held static (≥1.5s) — thumbnail-grade. Per
           .claude/rules/shorts-thumbnail-frames.md: dominant
           topic statement (≥120px) + visual anchor + brand chrome +
           outcome receipt + subordinate CTA, all on screen, frozen.
-->
<template id="scene-cta-template">
  <div data-composition-id="scene-cta"
       data-start="0"
       data-width="1080"
       data-height="1920"
       style="position:absolute; inset:0; overflow:hidden;
              font-family:var(--serif); color:var(--text);">

    <style>
      #cta-content {
        width: 100%; height: 100%;
        padding: var(--pad-top) var(--pad-x) var(--pad-bottom);
        position: relative;
        box-sizing: border-box;
        display: flex;
        flex-direction: column;
        gap: 28px;
      }
      .cta-overline {
        font-family: var(--mono);
        font-weight: 700;
        font-size: 28px;
        letter-spacing: 6px;
        text-transform: uppercase;
        color: var(--accent-2);
      }
      .cta-line {
        font-family: var(--serif);
        font-weight: 800;
        font-size: 64px;
        line-height: 1.0;
        letter-spacing: -1px;
        color: var(--text);
      }
      .cta-line .cta-em {
        font-style: italic;
        color: var(--accent-1);
      }
      .cta-pills {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
        margin-top: 4px;
      }
      .cta-pill {
        font-family: var(--mono);
        font-weight: 700;
        font-size: 26px;
        letter-spacing: 2px;
        padding: 12px 18px;
        border-radius: 999px;
        background: var(--bg-surface);
        border: 1px solid var(--border);
        color: var(--accent-1);
        text-transform: uppercase;
      }
      .cta-watch {
        background: var(--accent-1);
        color: var(--bg-card);
        border: 3px solid var(--accent-1);
        border-radius: 24px;
        padding: 36px 44px;
        font-family: var(--serif);
        font-weight: 900;
        font-style: italic;
        font-size: 88px;
        line-height: 1.0;
        letter-spacing: -1px;
        align-self: stretch;
        text-align: center;
        margin-top: 16px;
        box-shadow: 0 14px 40px rgba(199, 90, 63, 0.30);
      }
      .cta-arrow {
        display: inline-block;
        margin-left: 14px;
      }
      .cta-receipt {
        font-family: var(--serif);
        font-style: italic;
        font-size: 38px;
        line-height: 1.3;
        color: var(--text-secondary);
        margin-top: 4px;
      }
      .cta-brand {
        font-family: var(--mono);
        font-weight: 800;
        font-size: 24px;
        letter-spacing: 4px;
        text-transform: uppercase;
        color: var(--accent-2);
        margin-top: auto;
      }
    </style>

    <div id="cta-content">
      <div class="cta-overline" id="cta-overline">5 PLACES THIS CHANGES EVERYTHING</div>

      <div class="cta-line" id="cta-l1">
        Switching to <em class="cta-em">HTML</em> changes&hellip;
      </div>

      <div class="cta-pills" id="cta-pills">
        <div class="cta-pill" id="cta-p1">Specs</div>
        <div class="cta-pill" id="cta-p2">Code review</div>
        <div class="cta-pill" id="cta-p3">Design</div>
        <div class="cta-pill" id="cta-p4">Reports</div>
        <div class="cta-pill" id="cta-p5">Custom editors</div>
      </div>

      <div class="cta-watch" id="cta-watch">
        Watch the<br/>full video<span class="cta-arrow">&rarr;</span>
      </div>

      <div class="cta-receipt" id="cta-receipt">
        See why your codebase is about to look <em class="cta-em">very different</em>.
      </div>

      <div class="cta-brand" id="cta-brand">DIY SMART CODE &middot; youtu.be/-iSLQe_imrE</div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({ paused: true, defaults: { ease: "power3.out" } });

      const pills = ["#cta-p1","#cta-p2","#cta-p3","#cta-p4","#cta-p5"];

      tl.set("#cta-overline", { y: -8, opacity: 0 }, 0);
      tl.set("#cta-l1",       { y: 16, opacity: 0 }, 0);
      pills.forEach(s => tl.set(s, { y: 12, opacity: 0, scale: 0.85 }, 0));
      tl.set("#cta-watch",    { y: 24, opacity: 0, scale: 0.92 }, 0);
      tl.set("#cta-receipt",  { y: 16, opacity: 0 }, 0);
      tl.set("#cta-brand",    { opacity: 0 }, 0);

      tl.to("#cta-overline", { y: 0, opacity: 1, duration: 0.4 }, 0.04);
      tl.to("#cta-l1",       { y: 0, opacity: 1, duration: 0.5 }, 0.30);

      // 5-pill burst paced to "five places"
      pills.forEach((s, i) => {
        tl.to(s, { y: 0, opacity: 1, scale: 1, duration: 0.35, ease: "back.out(1.6)" }, 1.40 + i * 0.32);
      });

      tl.to("#cta-watch",   { y: 0, opacity: 1, scale: 1, duration: 0.6, ease: "back.out(1.4)" }, 4.78);
      tl.to("#cta-watch",   { scale: 1.04, duration: 0.3, yoyo: true, repeat: 1, ease: "power2.out" }, 5.40);

      tl.to("#cta-receipt", { y: 0, opacity: 1, duration: 0.55 }, 6.42);
      tl.to("#cta-brand",   { opacity: 1, duration: 0.5 }, 7.20);

      // Final frame hold — every element settles by 8.10, then 1.7s static.
      // No further animation; the frame becomes the loop-pause thumbnail.

      window.__timelines["scene-cta"] = tl;
    </script>
  </div>
</template>
