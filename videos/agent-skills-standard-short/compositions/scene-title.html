<!--
  scene-title.html — Editorial hook (0-11.3s). Thumbnail-grade first frame.

  Visual plan, anchored to TTS transcript:
    0.00  hero "Agent Skills." pre-visible (thumbnail-grade first frame)
    0.30  kicker "A new standard for what AI agents know" fades in
    3.45  hero pulse on word "Agent Skills" in narration  (impact-slam SFX)
    4.90  receipt chip 1 "BUILT BY ANTHROPIC" pops in
    6.50  receipt chip 2 "ADOPTED BY 37 TOOLS" pops in
    9.75  bottom line "in under 3 minutes" emphasis
    ~11   crossfade to next scene
-->
<template id="scene-title-template">
  <div data-composition-id="scene-title"
       data-start="0"
       data-width="1080"
       data-height="1920"
       style="position:absolute; inset:0; overflow:hidden;">

    <style>
      #scene-title-content {
        width: 100%; height: 100%;
        padding: var(--pad-top) var(--pad-x) var(--pad-bottom);
        display: flex; flex-direction: column;
        align-items: center; justify-content: center;
        text-align: center; gap: 28px;
        box-sizing: border-box;
      }
      #scene-title-content .kicker {
        font-family: var(--mono);
        font-weight: 700;
        font-size: 42px;
        letter-spacing: 6px;
        text-transform: uppercase;
        color: var(--accent-2);
        max-width: 960px;
        line-height: 1.3;
      }
      #scene-title-content .hero {
        font-family: var(--serif);
        font-weight: 900;
        font-size: 260px;
        line-height: 0.95;
        letter-spacing: -6px;
        color: var(--accent-ink);
        max-width: 1000px;
      }
      #scene-title-content .hero .em {
        color: var(--accent-warm);
        font-style: italic;
      }
      #scene-title-content .rule {
        width: 160px; height: 3px;
        background: var(--accent-deep);
        opacity: 0.5;
      }
      #scene-title-content .chip-row {
        display: flex; gap: 22px; flex-wrap: wrap; justify-content: center;
        margin-top: 4px;
      }
      #scene-title-content .chip {
        font-family: var(--mono);
        font-weight: 700;
        font-size: 32px;
        letter-spacing: 3px;
        text-transform: uppercase;
        color: var(--accent-2);
        background: var(--bg-card);
        border: 2px solid var(--accent-warm);
        padding: 14px 24px;
        border-radius: 999px;
      }
      #scene-title-content .chip.solid {
        background: var(--accent-warm);
        color: var(--text-on-warm);
        border-color: var(--accent-warm);
      }
      #scene-title-content .underline {
        font-family: var(--serif);
        font-style: italic;
        font-weight: 600;
        font-size: 40px;
        color: var(--text-secondary);
        max-width: 920px;
        line-height: 1.25;
        margin-top: 4px;
      }
      #scene-title-content .underline .em {
        color: var(--accent-warm);
        font-style: italic;
        font-weight: 700;
      }
    </style>

    <div id="scene-title-content">
      <div class="kicker" id="title-kicker">The open standard for AI agent capabilities</div>
      <div class="hero"   id="title-hero">Agent <span class="em">Skills.</span></div>
      <div class="rule"   id="title-rule"></div>
      <div class="chip-row">
        <div class="chip solid" id="title-chip-1">Built by Anthropic</div>
        <div class="chip"       id="title-chip-2">Adopted by 37 tools</div>
      </div>
      <div class="underline" id="title-underline">How it works &mdash; in <span class="em">under 3 minutes.</span></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({ paused: true });

      // Thumbnail-grade first-frame requirement: hero "Agent Skills" visible at t=0.
      // Per .claude/rules/shorts-thumbnail-frames.md — open-topic-then-pivot pattern.
      // So we use tl.from() on hero with immediateRender:false → the hero starts visible.
      // Kicker fades in 0.3s; chips + underline reveal AFTER narration anchors.

      // Hero already visible. Soft entrance flair (kicker + rule + hero pulse on landing word)
      tl.from("#title-kicker", { y: -16, opacity: 0, duration: 0.6, ease: "power2.out" }, 0.1);
      tl.from("#title-hero",   { scale: 0.95, opacity: 0.85, duration: 0.35, ease: "power3.out" }, 0);
      tl.from("#title-rule",   { scaleX: 0, opacity: 0, duration: 0.5, ease: "power2.out", transformOrigin: "center" }, 0.8);

      // Hide chips + underline until their narration anchor
      tl.set("#title-chip-1",   { y: 20, scale: 0.9, opacity: 0 }, 0);
      tl.set("#title-chip-2",   { y: 20, scale: 0.9, opacity: 0 }, 0);
      tl.set("#title-underline",{ y: 14, opacity: 0 }, 0);

      // "Agent Skills" is the FIRST spoken word (narration t=0.05-0.33).
      // Hero is already on screen (thumbnail-grade first frame). Pulse on "Skills" landing.
      tl.to("#title-hero",     { scale: 1.04, duration: 0.45, ease: "back.out(2)", yoyo: true, repeat: 1 }, 0.4);
      tl.to("#title-hero .em", { scale: 1.06, duration: 0.45, ease: "back.out(2)", yoyo: true, repeat: 1 }, 0.5);

      // "Built by Anthropic" lands at narration 4.46-4.84 → chip 1 reveal
      tl.to("#title-chip-1", { y: 0, scale: 1, opacity: 1, duration: 0.5, ease: "back.out(1.6)" }, 4.5);

      // "Adopted by thirty-seven tools" lands at narration 5.75-6.91 → chip 2 reveal
      tl.to("#title-chip-2", { y: 0, scale: 1, opacity: 1, duration: 0.5, ease: "back.out(1.6)" }, 5.8);

      // "Here is how it works in under three minutes" lands 8.32-10.0 → underline reveal
      tl.to("#title-underline", { y: 0, opacity: 1, duration: 0.6, ease: "power2.out" }, 8.3);

      // "under three minutes" emphasis pulse
      tl.to("#title-underline .em", { scale: 1.06, color: "var(--accent-2)", duration: 0.5, ease: "power2.out", yoyo: true, repeat: 1 }, 9.5);

      window.__timelines["scene-title"] = tl;
    </script>
  </div>
</template>
