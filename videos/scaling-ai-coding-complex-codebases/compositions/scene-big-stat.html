<!--
  scene-big-stat.html — Hero stat with counter ramp + token-stream visual.
  Big 50,000 counter on the left, a vertical "token-burn" bar on the right
  with 10 stacked file-chunks that fill in over the scene, visualizing
  context bloat.
-->
<template id="scene-big-stat-template">
  <div data-composition-id="scene-big-stat"
       data-start="0"
       data-width="1920"
       data-height="1080"
       style="position:absolute; inset:0; overflow:hidden;
              font-family: 'Montserrat', system-ui, sans-serif; color:var(--ink);">

    <style>
      #big-stat-content {
        width:100%; height:100%;
        padding: 90px var(--pad-x) 70px;
        display:grid;
        grid-template-columns: 1.4fr 1fr;
        gap: 60px;
        align-items: center;
        box-sizing:border-box;
      }
      #bs-left { display:flex; flex-direction:column; gap: 24px; }
      #bs-left .eyebrow {
        font-family: 'JetBrains Mono', ui-monospace, monospace;
        font-size: 22px;
        font-weight: 500;
        letter-spacing: 0.32em;
        text-transform: uppercase;
        color: var(--accent-warn);
        display: inline-flex; align-items: center; gap: 18px;
      }
      #bs-left .eyebrow::before {
        content: ""; display: inline-block;
        width: 56px; height: 2px;
        background: var(--accent-warn);
      }
      #bs-left .stat-row {
        display: flex; align-items: baseline; gap: 6px;
      }
      #bs-left .stat-number {
        font-family: 'Montserrat', system-ui, sans-serif;
        font-weight: 800;
        font-size: 280px;
        line-height: 0.88;
        letter-spacing: -0.045em;
        background: linear-gradient(180deg, var(--accent-2) 0%, var(--accent) 100%);
        -webkit-background-clip: text;
                background-clip: text;
        -webkit-text-fill-color: transparent;
        font-variant-numeric: tabular-nums lining-nums;
        text-shadow: 0 0 80px rgba(59, 130, 246, 0.35);
      }
      #bs-left .stat-suffix {
        font-family: 'Montserrat', system-ui, sans-serif;
        font-weight: 800;
        font-size: 180px;
        color: var(--accent-2);
        line-height: 0.88;
        letter-spacing: -0.04em;
      }
      #bs-left .label {
        font-family: 'Montserrat', system-ui, sans-serif;
        font-weight: 300;
        font-size: 36px;
        line-height: 1.3;
        color: var(--ink-2);
        max-width: 900px;
      }
      #bs-left .label strong {
        font-weight: 700;
        color: var(--ink);
      }

      /* Right side: context-budget visual */
      #bs-right {
        display: flex; flex-direction: column;
        gap: 12px;
        height: 760px;
        position: relative;
      }
      #bs-right .budget-label {
        font-family: 'JetBrains Mono', ui-monospace, monospace;
        font-size: 18px;
        font-weight: 500;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        color: var(--muted);
        margin-bottom: 8px;
      }
      #bs-budget {
        flex: 1;
        background: rgba(255,255,255,0.04);
        border: 1.5px solid rgba(255,255,255,0.10);
        border-radius: 16px;
        padding: 16px 18px;
        display: flex; flex-direction: column-reverse;
        gap: 6px;
        position: relative;
        overflow: hidden;
      }
      .tok-chunk {
        height: 56px;
        background: linear-gradient(90deg,
                      rgba(249, 115, 22, 0.22) 0%,
                      rgba(249, 115, 22, 0.08) 100%);
        border: 1px solid rgba(249, 115, 22, 0.55);
        border-radius: 8px;
        display: grid;
        grid-template-columns: 1fr auto;
        align-items: center;
        padding: 0 16px;
        gap: 12px;
      }
      .tok-chunk .name {
        font-family: 'JetBrains Mono', ui-monospace, monospace;
        font-size: 18px;
        font-weight: 600;
        color: var(--ink);
        letter-spacing: 0.02em;
      }
      .tok-chunk .cost {
        font-family: 'JetBrains Mono', ui-monospace, monospace;
        font-size: 16px;
        font-weight: 700;
        color: #FB923C;
        letter-spacing: 0.04em;
      }
      #bs-budget-cap {
        position: absolute;
        right: -2px; top: 50%;
        transform: translateY(-50%) rotate(90deg);
        font-family: 'JetBrains Mono', ui-monospace, monospace;
        font-size: 14px;
        font-weight: 600;
        letter-spacing: 0.22em;
        color: var(--muted-2);
        white-space: nowrap;
        text-transform: uppercase;
      }
      #bs-running-total {
        font-family: 'JetBrains Mono', ui-monospace, monospace;
        font-size: 28px;
        font-weight: 700;
        color: var(--accent-warn);
        text-align: right;
        font-variant-numeric: tabular-nums;
      }
    </style>

    <div id="big-stat-content">
      <div id="bs-left">
        <div class="eyebrow" id="bs-eyebrow" style="opacity:0;visibility:hidden;">ONE BAD PRIME COMMAND</div>
        <div class="stat-row">
          <span class="stat-number" id="bs-number" style="opacity:0;visibility:hidden;">0</span><span class="stat-suffix" id="bs-suffix" style="opacity:0;visibility:hidden;">+</span>
        </div>
        <p class="label" id="bs-label" style="opacity:0;visibility:hidden;">
          <strong>tokens</strong> loaded into the session before a single line of code is written. Pre-bloated. Already losing.
        </p>
      </div>

      <div id="bs-right" style="opacity:0;visibility:hidden;">
        <div class="budget-label">Context window &middot; what your prime loads</div>
        <div id="bs-budget">
          <div class="tok-chunk" id="tc-1" style="opacity:0;"><span class="name">README.md</span><span class="cost">3,200</span></div>
          <div class="tok-chunk" id="tc-2" style="opacity:0;"><span class="name">/server/routes.ts</span><span class="cost">5,400</span></div>
          <div class="tok-chunk" id="tc-3" style="opacity:0;"><span class="name">/client/App.tsx</span><span class="cost">4,800</span></div>
          <div class="tok-chunk" id="tc-4" style="opacity:0;"><span class="name">/db/schema.sql</span><span class="cost">6,100</span></div>
          <div class="tok-chunk" id="tc-5" style="opacity:0;"><span class="name">/workflows/engine.ts</span><span class="cost">7,200</span></div>
          <div class="tok-chunk" id="tc-6" style="opacity:0;"><span class="name">/adapters/slack.ts</span><span class="cost">4,500</span></div>
          <div class="tok-chunk" id="tc-7" style="opacity:0;"><span class="name">/auth/middleware.ts</span><span class="cost">3,900</span></div>
          <div class="tok-chunk" id="tc-8" style="opacity:0;"><span class="name">/tests/integration/</span><span class="cost">5,800</span></div>
          <div class="tok-chunk" id="tc-9" style="opacity:0;"><span class="name">docker-compose.yml</span><span class="cost">2,400</span></div>
          <div class="tok-chunk" id="tc-10" style="opacity:0;"><span class="name">CONTRIBUTING.md</span><span class="cost">6,700</span></div>
        </div>
        <div id="bs-running-total" style="opacity:0;">0 / 200,000</div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({ paused: true });

      const STAT_TARGET = 50000;
      const counterObj = { v: 0 };
      const runningObj = { v: 0 };

      tl.set("#bs-eyebrow", { y: 24 }, 0);
      tl.set("#bs-number",  { scale: 0.78 }, 0);
      tl.set("#bs-suffix",  { x: -20 }, 0);
      tl.set("#bs-label",   { y: 24 }, 0);
      tl.set("#bs-right",   { x: 30 }, 0);

      tl.to("#bs-eyebrow", { y: 0, autoAlpha: 1, duration: 0.55, ease: "power2.out" }, 0.2);
      tl.to("#bs-number",  { scale: 1, autoAlpha: 1, duration: 0.55, ease: "expo.out" }, 0.55);
      tl.to(counterObj, {
        v: STAT_TARGET, duration: 1.6, ease: "expo.out",
        onUpdate: function () {
          const el = document.getElementById("bs-number");
          if (el) el.textContent = Math.floor(counterObj.v).toLocaleString();
        }
      }, 0.6);
      tl.to("#bs-suffix", { autoAlpha: 1, x: 0, duration: 0.45, ease: "power2.out" }, 2.05);
      tl.to("#bs-label",  { y: 0, autoAlpha: 1, duration: 0.5, ease: "power2.out" }, 2.2);

      // Right column container appears
      tl.to("#bs-right", { x: 0, autoAlpha: 1, duration: 0.6, ease: "power2.out" }, 2.5);
      tl.to("#bs-running-total", { autoAlpha: 1, duration: 0.4, ease: "power2.out" }, 3.0);

      // Token chunks stack in one by one (10 chunks × ~1.6s apart = 16s of motion)
      const chunkCosts = [3200, 5400, 4800, 6100, 7200, 4500, 3900, 5800, 2400, 6700];
      let cumulative = 0;
      for (let i = 0; i < 10; i++) {
        const t = 3.4 + i * 1.6;
        const sel = "#tc-" + (i + 1);
        tl.fromTo(sel,
          { y: 40, scale: 0.92 },
          { y: 0, scale: 1, autoAlpha: 1, duration: 0.5, ease: "back.out(1.4)", immediateRender: false },
          t);
        // animate running total
        const newTotal = cumulative + chunkCosts[i];
        tl.to(runningObj, {
          v: newTotal, duration: 0.7, ease: "power2.out",
          onUpdate: function () {
            const el = document.getElementById("bs-running-total");
            if (el) el.textContent = Math.floor(runningObj.v).toLocaleString() + " / 200,000";
          }
        }, t + 0.1);
        cumulative = newTotal;
      }

      // Mid-hold + final pulse on the stat number
      tl.to("#bs-number", { textShadow: "0 0 120px rgba(59, 130, 246, 0.7)", duration: 1.4, ease: "sine.inOut", yoyo: true, repeat: 1 }, 19.0);

      // Extend to full slot
      // tail-pacing bridge beats — ensure no gap > 3s through scene end
      tl.to("#bs-number", { scale: 1.04, duration: 0.55, ease: "sine.inOut", yoyo: true, repeat: 1 }, 15.50);
      tl.to("#bs-label", { scale: 1.02, duration: 0.55, ease: "sine.inOut", yoyo: true, repeat: 1 }, 18.00);

      tl.set({}, {}, 19.9);
      window.__timelines["scene-big-stat"] = tl;
    </script>
  </div>
</template>
