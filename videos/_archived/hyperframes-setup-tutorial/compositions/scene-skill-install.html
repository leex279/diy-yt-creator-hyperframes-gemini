<!--
  scene-skill-install.html — architecture-stack variant. Five HF skills.
  Pattern: tl.set() at t=0 + tl.to() animations.
-->
<template id="scene-skill-install-template">
  <div data-composition-id="scene-skill-install"
       data-start="0"
       data-width="1920"
       data-height="1080"
       style="position:absolute; inset:0; overflow:hidden;
              font-family:var(--sans); color:var(--text);">

    <style>
      #skill-install-content {
        width:100%; height:100%;
        padding: var(--pad-top) var(--pad-x) var(--pad-bottom);
        display:flex; flex-direction:column;
        align-items:center; justify-content:center;
        gap: 28px; box-sizing:border-box;
      }
      #skill-install-content .overline {
        font-family: var(--mono); font-weight: 700;
        font-size: 26px; letter-spacing: 6px;
        text-transform: uppercase; color: var(--accent-3);
      }
      #skill-install-content .stack {
        display:flex; flex-direction:column;
        gap: 14px;
      }
      .skill-layer {
        width: 1280px;
        height: 78px;
        border-radius: 14px;
        background: rgba(255, 255, 255, 0.04);
        border: 1px solid var(--border-bright);
        position: relative;
        overflow: hidden;
        display:flex; align-items:center;
        padding: 0 32px 0 56px;
        gap: 24px;
      }
      .skill-layer .checkbox {
        flex: 0 0 30px;
        width: 30px; height: 30px;
        border-radius: 7px;
        border: 2px solid var(--accent-4);
        background: rgba(34, 197, 94, 0.15);
        display: flex; align-items: center; justify-content: center;
        font-family: var(--mono); font-weight: 900;
        font-size: 22px; color: var(--accent-4);
        line-height: 1;
      }
      #skill-install-content .picker-hint {
        margin-top: 8px;
        display: inline-flex; align-items: center; gap: 14px;
        font-family: var(--sans); font-weight: 600;
        font-size: 22px; color: var(--text-secondary);
        padding: 12px 26px; border-radius: 999px;
        background: rgba(255, 255, 255, 0.03);
        border: 1px solid var(--border-bright);
      }
      #skill-install-content .picker-hint .kbd {
        font-family: var(--mono); font-weight: 800;
        font-size: 19px; color: var(--text);
        padding: 4px 10px; border-radius: 5px;
        background: rgba(255, 255, 255, 0.10);
        border: 1px solid var(--border-bright);
      }
      #skill-install-content .picker-hint b {
        color: var(--accent-4); font-weight: 800;
      }
      .skill-layer::before {
        content: "";
        position: absolute;
        left: 0; top: 0; bottom: 0;
        width: 8px;
        background: var(--accent-1);
      }
      .skill-layer.s1::before { background: var(--accent-1); }
      .skill-layer.s2::before { background: var(--accent-2); }
      .skill-layer.s3::before { background: var(--accent-3); }
      .skill-layer.s4::before { background: var(--accent-4); }
      .skill-layer.s5::before { background: var(--accent-warn); }
      .skill-layer .label {
        font-family: var(--mono); font-weight: 700;
        font-size: 20px; letter-spacing: 2px;
        color: var(--text);
        flex: 0 0 320px;
      }
      .skill-layer .meta {
        font-family: var(--sans); font-weight: 500;
        font-size: 22px; line-height: 1.3;
        color: var(--text-secondary);
        flex: 1;
      }
      .install-cmd {
        margin-top: 12px;
        display: inline-flex; align-items: center; gap: 12px;
        padding: 18px 32px; border-radius: 14px;
        background: rgba(0, 0, 0, 0.55);
        border: 1.5px solid var(--accent-stat);
        font-family: var(--mono); font-weight: 700;
        font-size: 28px;
        color: var(--accent-stat);
        box-shadow: 0 0 40px rgba(251, 188, 4, 0.2);
      }
      .install-cmd .prompt { color: var(--text-secondary); }
    </style>

    <div id="skill-install-content">
      <div class="overline" id="sk-overline">TEACH YOUR AGENT &middot; STEP 5</div>

      <div class="install-cmd" id="sk-cmd">
        <span class="prompt">$</span>
        <span>npx skills add heygen-com/hyperframes</span>
      </div>

      <div class="stack" id="sk-stack">
        <div class="skill-layer s1" id="sk-l1">
          <span class="checkbox">&check;</span>
          <span class="label">/hyperframes</span>
          <span class="meta">Compositions, captions, TTS, audio-reactive animation, marker highlights</span>
        </div>
        <div class="skill-layer s2" id="sk-l2">
          <span class="checkbox">&check;</span>
          <span class="label">/hyperframes-cli</span>
          <span class="meta">init &middot; lint &middot; preview &middot; render &middot; transcribe &middot; tts</span>
        </div>
        <div class="skill-layer s3" id="sk-l3">
          <span class="checkbox">&check;</span>
          <span class="label">/hyperframes-registry</span>
          <span class="meta">Install reusable blocks &amp; components into your project</span>
        </div>
        <div class="skill-layer s4" id="sk-l4">
          <span class="checkbox">&check;</span>
          <span class="label">/gsap</span>
          <span class="meta">GSAP tweens, timelines, easing &mdash; the animation engine</span>
        </div>
        <div class="skill-layer s5" id="sk-l5">
          <span class="checkbox">&check;</span>
          <span class="label">/website-to-hyperframes</span>
          <span class="meta">Capture a URL and turn it into a video automatically</span>
        </div>
      </div>

      <div class="picker-hint" id="sk-hint">
        <span>Pick what you need in the picker, then press</span>
        <span class="kbd">Install</span>
        <span>&middot; or just <b>install all</b></span>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({ paused: true, defaults: { ease: "power3.out" } });

      tl.set("#sk-overline", { y: 24, opacity: 0 }, 0);
      tl.set("#sk-cmd",      { y: 24, scale: 0.95, opacity: 0 }, 0);
      tl.set("#sk-l1",       { y: 30, opacity: 0 }, 0);
      tl.set("#sk-l2",       { y: 30, opacity: 0 }, 0);
      tl.set("#sk-l3",       { y: 30, opacity: 0 }, 0);
      tl.set("#sk-l4",       { y: 30, opacity: 0 }, 0);
      tl.set("#sk-l5",       { y: 30, opacity: 0 }, 0);
      tl.set("#sk-hint",     { y: 18, opacity: 0 }, 0);

      tl.to("#sk-overline", { y: 0, opacity: 1, duration: 0.5, ease: "power2.out" }, 0);
      tl.to("#sk-cmd",      { y: 0, scale: 1, opacity: 1, duration: 0.6, ease: "back.out(1.4)" }, 0.4);
      tl.to("#sk-l1",       { y: 0, opacity: 1, duration: 0.5 }, 1.0);
      tl.to("#sk-l2",       { y: 0, opacity: 1, duration: 0.5 }, 1.2);
      tl.to("#sk-l3",       { y: 0, opacity: 1, duration: 0.5 }, 1.4);
      tl.to("#sk-l4",       { y: 0, opacity: 1, duration: 0.5 }, 1.6);
      tl.to("#sk-l5",       { y: 0, opacity: 1, duration: 0.5 }, 1.8);
      tl.to("#sk-hint",     { y: 0, opacity: 1, duration: 0.5, ease: "power2.out" }, 2.2);

      window.__timelines["scene-skill-install"] = tl;
    </script>
  </div>
</template>
