<!--
  captions.html — Cinematic Keyword Overlays (NOT always-on subtitles)

  Strategy: Instead of 447 continuous subtitle clips, we use ~30 sparse,
  high-impact "cinematic callout" moments that punctuate key revelations.
  Each callout is a bold keyword or short phrase that slams in, holds
  briefly, then fades — positioned cinematically at various screen zones
  (top-left badge, center-screen slam, bottom-right accent, etc.)

  Framework-required attributes:
    data-timeline-role="captions"
    data-caption-root="true"
-->
<template id="captions-template">
  <div data-composition-id="captions"
       data-start="0"
       data-timeline-role="captions"
       data-caption-root="true"
       data-width="1920"
       data-height="1080"
       style="position:absolute; inset:0; pointer-events:none;
              font-family:'Inter', sans-serif; color:var(--text);">

    <style>
      #caption-area {
        position: absolute;
        inset: 0;
        pointer-events: none;
      }
      /* Hide all clips from framework — we handle rendering ourselves */
      #caption-area .clip {
        display: none !important;
      }

      /* ── Cinematic Callout Base ───────────────────────────── */
      .co {
        position: absolute;
        visibility: hidden;         /* framework controls show/hide */
        pointer-events: none;
        opacity: 0;
        will-change: opacity, transform;
      }

      /* STYLE 1: Giant slam word — dead center */
      .co-slam {
        left: 50%;
        top: 50%;
        transform: translate(-50%, -50%) scale(0.7);
        font-family: 'Inter', sans-serif;
        font-weight: 900;
        font-size: 160px;
        letter-spacing: -4px;
        text-transform: uppercase;
        color: #ffffff;
        text-shadow:
          0 0 80px rgba(66,133,244,0.6),
          0 8px 32px rgba(0,0,0,0.9);
        white-space: nowrap;
        text-align: center;
        transition: none;
      }

      /* STYLE 2: Top-left overline badge */
      .co-badge-tl {
        top: 60px;
        left: 80px;
        font-family: 'JetBrains Mono', monospace;
        font-weight: 700;
        font-size: 18px;
        letter-spacing: 5px;
        text-transform: uppercase;
        color: #4285F4;
        background: rgba(10,10,20,0.85);
        border: 1.5px solid rgba(66,133,244,0.5);
        border-radius: 8px;
        padding: 10px 22px;
        backdrop-filter: blur(8px);
        transform: translateY(-10px);
        white-space: nowrap;
      }

      /* STYLE 3: Bottom-center stat bar */
      .co-stat-bar {
        bottom: 80px;
        left: 50%;
        transform: translateX(-50%) translateY(20px);
        font-family: 'Inter', sans-serif;
        font-weight: 900;
        font-size: 52px;
        letter-spacing: -1px;
        text-transform: uppercase;
        color: #ffffff;
        text-shadow: 0 4px 24px rgba(0,0,0,0.9);
        white-space: nowrap;
        text-align: center;
        background: rgba(8,8,15,0.8);
        border-top: 2px solid rgba(66,133,244,0.5);
        padding: 18px 60px;
        backdrop-filter: blur(12px);
      }

      /* STYLE 4: Right-side vertical accent */
      .co-right-accent {
        right: 80px;
        top: 50%;
        transform: translateY(-50%) translateX(30px);
        font-family: 'JetBrains Mono', monospace;
        font-weight: 700;
        font-size: 22px;
        letter-spacing: 4px;
        text-transform: uppercase;
        color: rgba(255,255,255,0.9);
        text-align: right;
        white-space: nowrap;
        writing-mode: horizontal-tb;
      }

      /* STYLE 5: Bottom-left emphasis phrase */
      .co-bl-phrase {
        bottom: 100px;
        left: 80px;
        font-family: 'Inter', sans-serif;
        font-weight: 800;
        font-size: 38px;
        letter-spacing: -0.5px;
        color: #ffffff;
        text-shadow: 0 4px 20px rgba(0,0,0,0.95);
        transform: translateX(-20px);
        max-width: 800px;
        line-height: 1.2;
      }

      /* STYLE 6: Mid-right number/stat callout */
      .co-stat-right {
        right: 100px;
        top: 50%;
        transform: translateY(-50%) scale(0.8);
        font-family: 'Inter', sans-serif;
        font-weight: 900;
        font-size: 88px;
        letter-spacing: -3px;
        color: #FBBC05;
        text-shadow: 0 0 60px rgba(251,188,5,0.4), 0 6px 24px rgba(0,0,0,0.9);
        text-align: right;
        white-space: nowrap;

      .co-chip-tr {
        top: 60px;
        right: 80px;
        font-family: 'JetBrains Mono', monospace;
        font-weight: 700;
        font-size: 16px;
        letter-spacing: 4px;

        background: rgba(10,10,20,0.9);
        border: 1.5px solid;
        transform: translateY(-12px);
        white-space: nowrap;
        backdrop-filter: blur(8px);
      }
      .co-chip-tr.green  { color: #81C995; border-color: rgba(52,168,83,0.5); }
      .co-chip-tr.yellow { color: #FDD663; border-color: rgba(251,188,5,0.5); }

    </style>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
    (function() {
      // Cinematic callout animation configs per element
      // The framework sets visibility:visible when a .clip is "active".
      // We drive opacity + transform with GSAP by listening to a MutationObserver.

      const CONFIGS = {
        // SLAM style: scale punch in from tiny, hold, scale out
        slam: {
          in:  { opacity: 1, scale: 1.0, duration: 0.22, ease: "back.out(1.8)" },
          out: { opacity: 0, scale: 1.08, duration: 0.25, ease: "power2.in" }
        },
        // BADGE style: slide in from left
        badge: {
          in:  { opacity: 1, y: 0, duration: 0.35, ease: "back.out(1.4)" },
          out: { opacity: 0, y: -8, duration: 0.25, ease: "power2.in" }
        },
        // STAT BAR: slide up from bottom
        statbar: {
          in:  { opacity: 1, y: 0, duration: 0.4, ease: "back.out(1.3)" },
          out: { opacity: 0, y: 12, duration: 0.28, ease: "power2.in" }
        },
        // CHIP: drop in from top
        chip: {
          in:  { opacity: 1, y: 0, duration: 0.32, ease: "back.out(1.5)" },
          out: { opacity: 0, y: -10, duration: 0.22, ease: "power2.in" }
        },
        // PHRASE/STAT-RIGHT: slide in from side
        side: {
          in:  { opacity: 1, x: 0, scale: 1.0, duration: 0.38, ease: "back.out(1.4)" },
          out: { opacity: 0, scale: 0.95, duration: 0.25, ease: "power2.in" }
        }
      };

      function getConfig(el) {
        if (el.classList.contains('co-slam')) return CONFIGS.slam;
        if (el.classList.contains('co-badge-tl')) return CONFIGS.badge;
        if (el.classList.contains('co-stat-bar')) return CONFIGS.statbar;
        if (el.classList.contains('co-chip-tr')) return CONFIGS.chip;
        return CONFIGS.side;
      }

      // Watch for visibility changes driven by the HyperFrames framework
      const area = document.getElementById('caption-area');
      if (!area) return;

      const observer = new MutationObserver((mutations) => {
        for (const mut of mutations) {
          if (mut.type !== 'attributes' || mut.attributeName !== 'style') continue;
          const el = mut.target;
          if (!el.classList.contains('co')) continue;
          const cfg = getConfig(el);
          const visible = el.style.visibility !== 'hidden';
          if (visible) {
            gsap.killTweensOf(el);
            gsap.to(el, cfg.in);
          } else {
            gsap.killTweensOf(el);
            gsap.to(el, cfg.out);
          }
        }
      });

      observer.observe(area, { attributes: true, subtree: true,
                               attributeFilter: ['style'] });

      // Register paused timeline as required by HyperFrames
      window.__timelines = window.__timelines || {};
      window.__timelines["captions"] = gsap.timeline({ paused: true });
    })();
    </script>
