<!--
  shared/lib/blocks/dynamous-module-interstitial/block.html
  Optional 3.0s mid-video card naming the matching Dynamous AI Mastery
  module. Slides in from the right at a natural narration pause,
  holds, slides out. Used ONLY when the Short's topic directly maps
  to one of the 12 curriculum modules.

  SOURCE:
    diy-yt-creator/src/shared/components/ShortsModuleInterstitial.tsx:1-153
      (slide-in 0–0.6s, hold, slide-out 2.4–3.0s)
    DynamousMidroll.tsx:78-95   (modern-gradient palette)
    shared/lib/blocks/url-cta/block.html (template wrapper, scoped CSS,
    self-registered timeline pattern)

  REQUIRED TOKENS:
    None. Inlines its own colors. Module accent color comes from the
    inline `style` on `#dmi-dot` (set via the recipe slot).

  ASSET COPY: none. The interstitial uses no logo asset — pure CSS.

  See ./recipe.md for full wiring instructions.
-->
<template id="dynamous-module-interstitial-template">
  <div data-composition-id="dynamous-module-interstitial" data-start="0" data-duration="3" data-width="1080" data-height="1920">

    <div class="dmi-card">
      <div class="dmi-row">
        <div class="dmi-dot" id="dmi-dot"></div>
        <div class="dmi-meta">
          <div class="dmi-eyebrow">MODULE <span id="dmi-module-num">5</span></div>
          <div class="dmi-title" id="dmi-module-title">MCP &amp; Tool Use</div>
        </div>
      </div>
      <div class="dmi-tagline">Part of Dynamous AI Mastery</div>
    </div>

    <style>
      [data-composition-id="dynamous-module-interstitial"] {
        position: relative;
        width: 1080px;
        height: 1920px;
        background: transparent;
        font-family: 'Inter', system-ui, sans-serif;
        pointer-events: none;
      }
      [data-composition-id="dynamous-module-interstitial"] .dmi-card {
        position: absolute;
        top: 420px;
        left: 80px;
        width: 920px;
        box-sizing: border-box;
        padding: 24px 28px;
        display: flex;
        flex-direction: column;
        gap: 10px;
        background: rgba(15, 23, 42, 0.85);
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 18px;
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        box-shadow: 0 12px 36px rgba(0, 0, 0, 0.45);
        will-change: transform, opacity;
      }
      [data-composition-id="dynamous-module-interstitial"] .dmi-row {
        display: flex;
        align-items: center;
        gap: 18px;
      }
      [data-composition-id="dynamous-module-interstitial"] .dmi-dot {
        width: 18px;
        height: 18px;
        border-radius: 999px;
        background: #ec4899;  /* default — override per module via inline style on #dmi-dot */
        box-shadow: 0 0 16px currentColor;
      }
      [data-composition-id="dynamous-module-interstitial"] .dmi-meta {
        display: flex;
        flex-direction: column;
        gap: 4px;
      }
      [data-composition-id="dynamous-module-interstitial"] .dmi-eyebrow {
        font-family: 'JetBrains Mono', ui-monospace, monospace;
        font-weight: 700;
        font-size: 22px;
        letter-spacing: 4px;
        color: #94a3b8;
      }
      [data-composition-id="dynamous-module-interstitial"] .dmi-title {
        font-size: 38px;
        font-weight: 800;
        color: #ffffff;
        letter-spacing: 0.2px;
      }
      [data-composition-id="dynamous-module-interstitial"] .dmi-tagline {
        font-size: 22px;
        font-weight: 600;
        color: #94a3b8;
        letter-spacing: 0.2px;
      }
    </style>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      window.__timelines = window.__timelines || {};
      (function () {
        var tl = gsap.timeline({ paused: true });

        // Slide-in from the right + fade-in 0–0.6s
        tl.from('[data-composition-id="dynamous-module-interstitial"] .dmi-card',
          { x: 540, opacity: 0, duration: 0.6, ease: "power3.out" }, 0);

        // Hold 0.6–2.4s — no work needed; timeline naturally sits.

        // Slide-out to the right + fade-out 2.4–3.0s
        tl.to('[data-composition-id="dynamous-module-interstitial"] .dmi-card',
          { x: 540, opacity: 0, duration: 0.6, ease: "power3.in" }, 2.4);

        window.__timelines["dynamous-module-interstitial"] = tl;
      })();
    </script>

  </div>
</template>
