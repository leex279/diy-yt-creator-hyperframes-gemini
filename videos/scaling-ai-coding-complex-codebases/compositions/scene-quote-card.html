<!--
  scene-quote-card.html â€” Single-quote display with author chip.

  Multi-beat segmented reveal: opening punctuation, the quote body line-by-line
  (max 3 lines), then the author chip. A marker sweep highlights the
  hero phrase mid-hold.
-->
<template id="scene-quote-card-template">
  <div data-composition-id="scene-quote-card"
       data-start="0"
       data-width="1920"
       data-height="1080"
       style="position:absolute; inset:0; overflow:hidden;
              font-family: 'Montserrat', system-ui, sans-serif; color:var(--ink);">

    <style>
      #quote-content {
        width:100%; height:100%;
        padding: var(--pad-top) var(--pad-x) var(--pad-bottom);
        display:flex; flex-direction:column;
        align-items:flex-start; justify-content:center;
        gap: 28px;
        box-sizing:border-box;
        position: relative;
      }
      #quote-content .eyebrow {
        font-family: 'JetBrains Mono', ui-monospace, monospace;
        font-size: 22px;
        font-weight: 500;
        letter-spacing: 0.32em;
        text-transform: uppercase;
        color: var(--accent-2);
        display: inline-flex; align-items: center; gap: 18px;
      }
      #quote-content .eyebrow::before {
        content: ""; display: inline-block;
        width: 56px; height: 2px;
        background: var(--accent-2);
      }
      #quote-content .open-quote {
        font-family: 'Montserrat', system-ui, sans-serif;
        font-weight: 900;
        font-size: 220px;
        line-height: 0.7;
        letter-spacing: -0.04em;
        color: var(--accent-2);
        opacity: 0.42;
      }
      #quote-content .quote-body {
        font-family: 'Montserrat', system-ui, sans-serif;
        font-weight: 500;
        font-size: 72px;
        line-height: 1.15;
        letter-spacing: -0.018em;
        color: var(--ink);
        max-width: 1500px;
        position: relative;
      }
      #quote-content .quote-line {
        display: block;
        position: relative;
      }
      #quote-content .quote-line .mark {
        background-image: linear-gradient(var(--accent), var(--accent));
        background-repeat: no-repeat;
        background-position: 0 92%;
        background-size: 0% 22%;
        padding: 0 6px 0 0;
      }
      #quote-content .author {
        display: flex; align-items: center; gap: 22px;
        font-family: 'JetBrains Mono', ui-monospace, monospace;
        font-size: 26px;
        font-weight: 500;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        color: var(--muted);
      }
      #quote-content .author .dot {
        width: 14px; height: 14px;
        border-radius: 50%;
        background: var(--accent);
        box-shadow: 0 0 16px rgba(59, 130, 246, 0.7);
      }
    </style>

    <div id="quote-content">
      <div class="eyebrow" id="qc-eyebrow" style="opacity:0;visibility:hidden;">FROM ANTHROPIC</div>
      <div class="open-quote" id="qc-open" style="opacity:0;visibility:hidden;">&ldquo;</div>
      <div class="quote-body">
        <span class="quote-line" id="qc-l1" style="opacity:0;visibility:hidden;">Sub-agents are used to <span class="mark" id="qc-mark1">split exploration from editing.</span></span>
        <span class="quote-line" id="qc-l2" style="opacity:0;visibility:hidden;">Your primary session edits files.</span>
        <span class="quote-line" id="qc-l3" style="opacity:0;visibility:hidden;">Sub-agents take the <span class="mark" id="qc-mark2">context hit.</span></span>
      </div>
      <div class="author" id="qc-author" style="opacity:0;visibility:hidden;"><span class="dot"></span><span>COLE MEDIN &middot; DYNAMOUS WORKSHOP</span></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({ paused: true });

      // Initial hidden state in CSS inline; bake position/scale offsets only.
      tl.set("#qc-eyebrow",  { y: 20 }, 0);
      tl.set("#qc-open",     { y: 30, scale: 0.8 }, 0);
      tl.set("#qc-l1",       { y: 24 }, 0);
      tl.set("#qc-l2",       { y: 24 }, 0);
      tl.set("#qc-l3",       { y: 24 }, 0);
      tl.set("#qc-author",   { y: 20 }, 0);
      tl.set("#qc-mark1",    { backgroundSize: "0% 22%" }, 0);
      tl.set("#qc-mark2",    { backgroundSize: "0% 22%" }, 0);

      tl.to("#qc-eyebrow", { y: 0, autoAlpha: 1, duration: 0.5, ease: "power2.out" }, 0.2);
      tl.to("#qc-open",    { y: 0, autoAlpha: 1, scale: 1, duration: 0.7, ease: "back.out(1.4)" }, 0.4);

      // Lines reveal sequentially â€” paced for spoken cadence
      tl.to("#qc-l1", { y: 0, autoAlpha: 1, duration: 0.65, ease: "power3.out" }, 1.0);
      tl.to("#qc-l2", { y: 0, autoAlpha: 1, duration: 0.65, ease: "power3.out" }, 2.6);
      tl.to("#qc-l3", { y: 0, autoAlpha: 1, duration: 0.65, ease: "power3.out" }, 4.2);

      // Author chip
      tl.to("#qc-author", { y: 0, autoAlpha: 1, duration: 0.55, ease: "power2.out" }, 5.6);

      // Marker sweep on the first hero phrase
      tl.to("#qc-mark1", { backgroundSize: "100% 22%", duration: 0.7, ease: "power2.out" }, 6.2);

      // Second marker sweep on the closing phrase â€” fills the >5s pacing gap
      tl.to("#qc-mark2", { backgroundSize: "100% 22%", duration: 0.7, ease: "power2.out" }, 10.5);

      // Mid-hold supplemental beats
      tl.to("#qc-open", { rotate: -4, duration: 2.0, ease: "sine.inOut", yoyo: true, repeat: 1 }, 7.8);
      tl.to("#qc-author .dot", {
        boxShadow: "0 0 28px rgba(59,130,246,1.0)",
        duration: 1.0, ease: "sine.inOut", yoyo: true, repeat: 2
      }, 12.2);

      // Extend timeline to full slot duration
      tl.set({}, {}, 20);
      window.__timelines["scene-quote-card"] = tl;
    </script>
  </div>
</template>
