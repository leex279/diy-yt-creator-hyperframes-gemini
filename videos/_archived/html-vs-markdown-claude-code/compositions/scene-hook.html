      tl.set("#h-p3",           { opacity: 0, y: 60, rotationX: -60, transformOrigin: "center bottom" }, 0);
      tl.set("#h-cover-mini",   { rotationY: -8, scale: 0.95, opacity: 0 }, 0);

      // Stage 4 prep

      tl.set("#h-s4-question",  { y: 30, opacity: 0 }, 0);

      tl.set("#h-s5-chip-1",    { y: 30, opacity: 0, rotationX: -50, transformOrigin: "center bottom" }, 0);

      // Persistent overline enters at 0.3s

      // ──────────────────────────────────────────────────────────────────
