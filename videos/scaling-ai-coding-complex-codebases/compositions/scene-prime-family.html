<!--
  scene-prime-family.html — Focused prime command family list.
  Terminal-style command rows. Each reveals on its own beat.
-->
<template id="scene-prime-family-template">
  <div data-composition-id="scene-prime-family"
       data-start="0"
       data-width="1920"
       data-height="1080"
       style="position:absolute; inset:0; overflow:hidden;
              font-family: 'Montserrat', system-ui, sans-serif; color:var(--ink);">

    <style>
      #pf-content {
        width:100%; height:100%;
        padding: 80px var(--pad-x) 70px;
        display:flex; flex-direction:column;
        align-items:flex-start; justify-content:center;
        gap: 24px;
        box-sizing:border-box;
      }
      #pf-content .eyebrow {
        font-family: 'JetBrains Mono', ui-monospace, monospace;
        font-size: 22px;
        font-weight: 500;
        letter-spacing: 0.32em;
        text-transform: uppercase;
        color: var(--accent-2);
        display: inline-flex; align-items: center; gap: 18px;
      }
      #pf-content .eyebrow::before {
        content: ""; display: inline-block;
        width: 56px; height: 2px;
        background: var(--accent-2);
      }
      #pf-content .headline {
        font-family: 'Montserrat', system-ui, sans-serif;
        font-weight: 700;
        font-size: 70px;
        line-height: 1.0;
        letter-spacing: -0.022em;
        color: var(--ink);
      }
      #pf-content .blurb {
        font-family: 'Montserrat', system-ui, sans-serif;
        font-weight: 300;
        font-size: 28px;
        line-height: 1.32;
        color: var(--ink-2);
        max-width: 1400px;
      }
      #pf-list {
        display: flex; flex-direction: column;
        gap: 16px;
        width: 100%;
        margin-top: 12px;
      }
      .pf-row {
        display: grid;
        grid-template-columns: 460px 1fr;
        gap: 36px;
        align-items: center;
        padding: 22px 28px;
        background: rgba(255,255,255,0.04);
        border: 1px solid rgba(255,255,255,0.10);
        border-radius: 14px;
        position: relative;
      }
      .pf-row .cmd {
        font-family: 'JetBrains Mono', ui-monospace, monospace;
        font-weight: 600;
        font-size: 36px;
        color: var(--accent);
        letter-spacing: 0.01em;
      }
      .pf-row .desc {
        font-family: 'Montserrat', system-ui, sans-serif;
        font-weight: 400;
        font-size: 26px;
        line-height: 1.3;
        color: var(--ink-2);
      }
      .pf-row .marker {
        position: absolute;
        left: 0; bottom: -1px;
        width: 0%; height: 3px;
        background: var(--accent-2);
        box-shadow: 0 0 10px rgba(96, 165, 250, 0.6);
      }
    
      .key-chip {
        position: absolute;
        bottom: 32px;
        left: 50%;
        transform: translateX(-50%);
        max-width: 1700px;
        background: rgba(15, 23, 42, 0.92);
        border: 1.5px solid rgba(96, 165, 250, 0.55);
        border-radius: 999px;
        padding: 16px 38px;
        font-family: 'Montserrat', system-ui, sans-serif;
        font-weight: 700;
        font-size: 30px;
        color: #f1f5f9;
        white-space: nowrap;
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.55), 0 0 40px rgba(59, 130, 246, 0.30);
      }
    </style>

    <div id="pf-content">
      <div class="eyebrow" id="pf-eyebrow" style="opacity:0;visibility:hidden;">STRATEGY 04 &middot; FOCUSED PRIMING</div>
      <h2 class="headline" id="pf-headline" style="opacity:0;visibility:hidden;">Throw the right slice. Not the whole repo.</h2>

      <div id="pf-list">
        <div class="pf-row" id="pf-r1" style="opacity:0;visibility:hidden;"><div class="cmd">/prime</div><div class="desc">General project orientation. README, workspaces, entry points.</div><div class="marker"></div></div>
        <div class="pf-row" id="pf-r2" style="opacity:0;visibility:hidden;"><div class="cmd">/prime-server</div><div class="desc">Backend slice. Routes, services, the orchestrator.</div><div class="marker"></div></div>
        <div class="pf-row" id="pf-r3" style="opacity:0;visibility:hidden;"><div class="cmd">/prime-client</div><div class="desc">Frontend slice. UI, stores, the SSE consumer.</div><div class="marker"></div></div>
        <div class="pf-row" id="pf-r4" style="opacity:0;visibility:hidden;"><div class="cmd">/prime-components</div><div class="desc">Shared UI components. Loaded only when working in design system.</div><div class="marker"></div></div>
        <div class="pf-row" id="pf-r5" style="opacity:0;visibility:hidden;"><div class="cmd">/prime-endpoint</div><div class="desc">End-to-end API slice. Schema, route, handler, db, types.</div><div class="marker"></div></div>
      </div>
    </div>

      <!-- Floating key-phrase chips -->
      <div class="key-chip" id="pf-chip-1" style="opacity:0;visibility:hidden;">Vanilla prime reads the whole project</div>
      <div class="key-chip" id="pf-chip-2" style="opacity:0;visibility:hidden;">50K-line project &mdash; manageable</div>
      <div class="key-chip" id="pf-chip-3" style="opacity:0;visibility:hidden;">500K-line monorepo &mdash; budget blown</div>
      <div class="key-chip" id="pf-chip-4" style="opacity:0;visibility:hidden;">A family of prime commands</div>
      <div class="key-chip" id="pf-chip-5" style="opacity:0;visibility:hidden;">Each loads one slice &middot; 5&ndash;10 files</div>
      <div class="key-chip" id="pf-chip-6" style="opacity:0;visibility:hidden;">Right context &middot; right task</div>
      <div class="key-chip" id="pf-chip-7" style="opacity:0;visibility:hidden;">Generated by brownfield-day-one skill</div>
      <div class="key-chip" id="pf-chip-8" style="opacity:0;visibility:hidden;">From your codebase. Day one.</div>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({ paused: true });

      tl.set("#pf-eyebrow",  { y: 20 }, 0);
      tl.set("#pf-headline", { y: 30 }, 0);
      ["#pf-r1","#pf-r2","#pf-r3","#pf-r4","#pf-r5"].forEach(sel => {
        tl.set(sel, { x: -32 }, 0);
        tl.set(sel + " .marker", { width: "0%" }, 0);
      });

      tl.to("#pf-eyebrow",  { y: 0, autoAlpha: 1, duration: 0.5, ease: "power2.out" }, 0.2);
      tl.to("#pf-headline", { y: 0, autoAlpha: 1, duration: 0.65, ease: "power3.out" }, 0.5);

      // Rows reveal EARLY (1-10s) so the 5-row stack is visible while narration introduces
      // the concept. Narrator names each Prime-X later — those moments trigger an emphasis pulse.
      const rowTimes = [1.5, 3.5, 5.5, 7.5, 9.5];
      ["#pf-r1","#pf-r2","#pf-r3","#pf-r4","#pf-r5"].forEach((sel, i) => {
        tl.to(sel, { x: 0, autoAlpha: 1, duration: 0.55, ease: "back.out(1.4)" }, rowTimes[i]);
        tl.to(sel + " .marker", { width: "100%", duration: 0.55, ease: "power2.out" }, rowTimes[i] + 0.3);
      });

      // Bridge beats — keep eye locked between row reveals and the narration name-call (~16s)
      tl.to("#pf-list", { scale: 1.01, duration: 0.7, ease: "sine.inOut", yoyo: true, repeat: 1 }, 12.5);

      // Narrator names each prime command — emphasis scale + cmd glow at the word anchor
      const cmdBeats = [
        { sel: "#pf-r1", t: 16.103 },  // "family of prime"
        { sel: "#pf-r2", t: 19.655 },  // "Prime-server"
        { sel: "#pf-r3", t: 21.188 },  // "Prime-client"
        { sel: "#pf-r4", t: 23.695 },  // "Prime-components"
        { sel: "#pf-r5", t: 25.785 },  // "Prime-endpoint"
      ];
      cmdBeats.forEach(b => {
        tl.to(b.sel, { scale: 1.05, duration: 0.3, ease: "back.out(1.6)",
          yoyo: true, repeat: 1, transformOrigin: "left center" }, b.t);
        tl.to(b.sel + " .cmd", { textShadow: "0 0 30px rgba(59, 130, 246, 0.9)",
          duration: 0.4, ease: "sine.inOut", yoyo: true, repeat: 1 }, b.t);
      });

      // Tail beats every ≤3s through scene end (44.8s)
      tl.to("#pf-list", { scale: 1.015, duration: 0.7, ease: "sine.inOut", yoyo: true, repeat: 1 }, 29.0);
      tl.to(["#pf-r1","#pf-r2","#pf-r3","#pf-r4","#pf-r5"],
        { scale: 1.02, duration: 0.4, ease: "sine.inOut", yoyo: true, repeat: 1,
          stagger: { each: 0.18 }, transformOrigin: "left center" }, 32.0);
      tl.to("#pf-list", { boxShadow: "0 0 100px rgba(59, 130, 246, 0.30)",
        duration: 1.0, ease: "sine.inOut", yoyo: true, repeat: 1 }, 35.5);
      tl.to(["#pf-r3","#pf-r4","#pf-r5"], { scale: 1.02, duration: 0.4, ease: "sine.inOut",
        yoyo: true, repeat: 1, stagger: 0.12, transformOrigin: "left center" }, 38.5);
      tl.to("#pf-list", { scale: 1.012, duration: 0.7, ease: "sine.inOut", yoyo: true, repeat: 1 }, 41.5);

      // Extend timeline to full slot duration
      // Floating key-phrase chips — new content events through the scene
      const _chips_pf_chip = [
        { sel: "#pf-chip-1", in_: 1.50, out: 6.50 },
        { sel: "#pf-chip-2", in_: 7.50, out: 12.00 },
        { sel: "#pf-chip-3", in_: 12.50, out: 16.00 },
        { sel: "#pf-chip-4", in_: 16.50, out: 22.00 },
        { sel: "#pf-chip-5", in_: 22.50, out: 28.50 },
        { sel: "#pf-chip-6", in_: 29.00, out: 33.00 },
        { sel: "#pf-chip-7", in_: 34.00, out: 39.00 },
        { sel: "#pf-chip-8", in_: 40.00, out: 44.50 },
      ];
      _chips_pf_chip.forEach(c => {
        tl.fromTo(c.sel, { y: 12, autoAlpha: 0 },
          { y: 0, autoAlpha: 1, duration: 0.45, ease: "back.out(1.4)" }, c.in_);
        tl.to(c.sel, { y: -10, autoAlpha: 0, duration: 0.35, ease: "power2.in" }, c.out);
      });

      tl.set({}, {}, 44.8);
      window.__timelines["scene-prime-family"] = tl;
    </script>
  </div>
</template>
