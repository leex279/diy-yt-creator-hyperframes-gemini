<!--
  scene-big-stat.html — Hero stat with counter ramp + gradient text.

  Counter animates from 0 to the target via GSAP. Gradient text fills the
  number with Dynamous-Light → Dynamous-Blue. Suffix slides in after the
  count completes.
-->
<template id="scene-big-stat-template">
  <div data-composition-id="scene-big-stat"
       data-start="0"
       data-width="1920"
       data-height="1080"
       style="position:absolute; inset:0; overflow:hidden;
              font-family:var(--font-display); color:var(--ink);">

    <style>
      #big-stat-content {
        width:100%; height:100%;
        padding: var(--pad-top) var(--pad-x) var(--pad-bottom);
        display:flex; flex-direction:column;
        align-items:flex-start; justify-content:center;
        gap: 32px;
        box-sizing:border-box;
      }
      #big-stat-content .eyebrow {
        font-family: var(--font-data);
        font-size: 22px;
        font-weight: 500;
        letter-spacing: 0.32em;
        text-transform: uppercase;
        color: var(--accent-2);
        display: inline-flex; align-items: center; gap: 18px;
      }
      #big-stat-content .eyebrow::before {
        content: ""; display: inline-block;
        width: 56px; height: 2px;
        background: var(--accent-2);
      }
      #big-stat-content .stat-row {
        display: flex; align-items: baseline; gap: 6px;
      }
      #big-stat-content .stat-number {
        font-family: var(--font-display);
        font-weight: 800;
        font-size: 360px;
        line-height: 0.88;
        letter-spacing: -0.045em;
        background: linear-gradient(180deg, var(--accent-2) 0%, var(--accent) 100%);
        -webkit-background-clip: text;
                background-clip: text;
        -webkit-text-fill-color: transparent;
        font-variant-numeric: tabular-nums lining-nums;
        text-shadow: 0 0 80px rgba(59, 130, 246, 0.35);
      }
      #big-stat-content .stat-suffix {
        font-family: var(--font-display);
        font-weight: 800;
        font-size: 220px;
        color: var(--accent-2);
        line-height: 0.88;
        letter-spacing: -0.04em;
      }
      #big-stat-content .label {
        font-family: var(--font-display);
        font-weight: 300;
        font-size: 44px;
        line-height: 1.3;
        color: var(--ink-2);
        max-width: 1500px;
      }
      #big-stat-content .label strong {
        font-weight: 700;
        color: var(--ink);
      }
    </style>

    <div id="big-stat-content">
      <div class="eyebrow" id="bs-eyebrow">REPLACE: STAT KICKER</div>
      <div class="stat-row">
        <span class="stat-number" id="bs-number">0</span><span class="stat-suffix" id="bs-suffix">+</span>
      </div>
      <p class="label" id="bs-label">
        REPLACE: <strong>strongly worded receipt</strong> that gives the number meaning.
      </p>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({ paused: true });

      // Operator overrides this per video. Default target = 40000.
      const STAT_TARGET = 40000;
      const counterObj = { v: 0 };

      tl.set("#bs-eyebrow", { y: 24, autoAlpha: 0 }, 0);
      tl.set("#bs-number",  { scale: 0.78, autoAlpha: 0 }, 0);
      tl.set("#bs-suffix",  { autoAlpha: 0, x: -20 }, 0);
      tl.set("#bs-label",   { y: 24, autoAlpha: 0 }, 0);

      tl.to("#bs-eyebrow", { y: 0, autoAlpha: 1, duration: 0.55, ease: "power2.out" }, 0.2);
      tl.to("#bs-number",  { scale: 1, autoAlpha: 1, duration: 0.55, ease: "expo.out" }, 0.55);

      // Counter ramp — runs in parallel with the scale-in
      tl.to(counterObj, {
        v: STAT_TARGET, duration: 1.6, ease: "expo.out",
        onUpdate: function () {
          const el = document.getElementById("bs-number");
          if (el) el.textContent = Math.floor(counterObj.v).toLocaleString();
        }
      }, 0.6);

      tl.to("#bs-suffix", { autoAlpha: 1, x: 0, duration: 0.45, ease: "power2.out" }, 2.05);
      tl.to("#bs-label",  { y: 0, autoAlpha: 1, duration: 0.5, ease: "power2.out" }, 2.2);

      // Mid-hold beats — scale pulse on the number every ~4s
      tl.to("#bs-number", { scale: 1.04, duration: 1.0, ease: "sine.inOut", yoyo: true, repeat: 1 }, 4.0);
      tl.to("#bs-number", { textShadow: "0 0 120px rgba(59, 130, 246, 0.7)", duration: 1.4, ease: "sine.inOut", yoyo: true, repeat: 1 }, 6.5);

      window.__timelines["scene-big-stat"] = tl;
    </script>
  </div>
</template>
