<!--
  scene-worktrees.html â€” Parallel worktrees visualization.
  Central main branch dot, three worktree spurs, three PR cards on the right.
-->
<template id="scene-worktrees-template">
  <div data-composition-id="scene-worktrees"
       data-start="0"
       data-width="1920"
       data-height="1080"
       style="position:absolute; inset:0; overflow:hidden;
              font-family: 'Montserrat', system-ui, sans-serif; color:var(--ink);">

    <style>
      #wt-content {
        width:100%; height:100%;
        padding: 80px var(--pad-x) 70px;
        display:flex; flex-direction:column;
        align-items:flex-start; justify-content:flex-start;
        gap: 22px;
        box-sizing:border-box;
      }
      #wt-content .eyebrow {
        font-family: 'JetBrains Mono', ui-monospace, monospace;
        font-size: 22px;
        font-weight: 500;
        letter-spacing: 0.32em;
        text-transform: uppercase;
        color: var(--accent-2);
        display: inline-flex; align-items: center; gap: 18px;
      }
      #wt-content .eyebrow::before {
        content: ""; display: inline-block;
        width: 56px; height: 2px;
        background: var(--accent-2);
      }
      #wt-content .headline {
        font-family: 'Montserrat', system-ui, sans-serif;
        font-weight: 700;
        font-size: 66px;
        line-height: 1.0;
        letter-spacing: -0.022em;
        color: var(--ink);
      }
      #wt-content .tagline {
        font-family: 'Montserrat', system-ui, sans-serif;
        font-weight: 800;
        font-size: 44px;
        letter-spacing: -0.02em;
        color: var(--accent-2);
      }
      #wt-graph {
        flex: 1;
        width: 100%;
        position: relative;
        margin-top: 12px;
      }
      .wt-node {
        position: absolute;
        display: flex; align-items: center; gap: 16px;
        background: rgba(255,255,255,0.04);
        border: 1.5px solid rgba(96, 165, 250, 0.45);
        border-radius: 12px;
        padding: 16px 22px;
        font-family: 'JetBrains Mono', ui-monospace, monospace;
        font-size: 24px;
        font-weight: 500;
        color: var(--ink);
      }
      .wt-node .dot {
        width: 14px; height: 14px; border-radius: 50%;
        background: var(--accent);
        box-shadow: 0 0 12px rgba(59, 130, 246, 0.75);
        flex: 0 0 14px;
      }
      .wt-node.main { border-color: rgba(96, 165, 250, 0.85); }
      .wt-node.main .dot { background: var(--accent-2); }
      .wt-node.pr { border-color: rgba(14, 165, 233, 0.55); }
      .wt-node.pr .dot { background: var(--accent-3); }

      #wt-main  { top: 50%; left: 60px; transform: translateY(-50%); }
      #wt-w1    { top: 12%; left: 38%; }
      #wt-w2    { top: 50%; left: 38%; transform: translateY(-50%); }
      #wt-w3    { bottom: 12%; left: 38%; }
      #wt-pr1   { top: 12%; right: 60px; }
      #wt-pr2   { top: 50%; right: 60px; transform: translateY(-50%); }
      #wt-pr3   { bottom: 12%; right: 60px; }

      #wt-svg {
        position: absolute; inset: 0;
        pointer-events: none;
        width: 100%; height: 100%;
      }
      .wt-edge {
        fill: none;
        stroke: rgba(96, 165, 250, 0.55);
        stroke-width: 2.5;
        stroke-dasharray: 0;
      }
    </style>

    <div id="wt-content">
      <div class="eyebrow" id="wt-eyebrow" style="opacity:0;visibility:hidden;">STRATEGY 05 &middot; PARALLEL WORKTREES</div>
      <h2 class="headline" id="wt-headline" style="opacity:0;visibility:hidden;">Same wallet. Faster delivery.</h2>
      <div class="tagline" id="wt-tagline" style="opacity:0;visibility:hidden;">N agents. N branches. Zero collisions.</div>

      <div id="wt-graph">
        <svg id="wt-svg" xmlns="http://www.w3.org/2000/svg">
          <!-- main â†’ worktrees (d attributes are set by layoutEdges() below from real DOM positions) -->
          <path class="wt-edge" id="wt-e1" d="M 0,0" />
          <path class="wt-edge" id="wt-e2" d="M 0,0" />
          <path class="wt-edge" id="wt-e3" d="M 0,0" />
          <!-- worktrees â†’ PRs -->
          <path class="wt-edge" id="wt-e4" d="M 0,0" />
          <path class="wt-edge" id="wt-e5" d="M 0,0" />
          <path class="wt-edge" id="wt-e6" d="M 0,0" />
        </svg>

        <div class="wt-node main" id="wt-main" style="opacity:0;visibility:hidden;"><div class="dot"></div><span>main</span></div>

        <div class="wt-node" id="wt-w1" style="opacity:0;visibility:hidden;"><div class="dot"></div><span>worktree issue-1</span></div>
        <div class="wt-node" id="wt-w2" style="opacity:0;visibility:hidden;"><div class="dot"></div><span>worktree issue-2</span></div>
        <div class="wt-node" id="wt-w3" style="opacity:0;visibility:hidden;"><div class="dot"></div><span>worktree issue-3</span></div>

        <div class="wt-node pr" id="wt-pr1" style="opacity:0;visibility:hidden;"><div class="dot"></div><span>PR &rarr;</span></div>
        <div class="wt-node pr" id="wt-pr2" style="opacity:0;visibility:hidden;"><div class="dot"></div><span>PR &rarr;</span></div>
        <div class="wt-node pr" id="wt-pr3" style="opacity:0;visibility:hidden;"><div class="dot"></div><span>PR &rarr;</span></div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({ paused: true });

      // Anchor SVG edges to actual DOM node positions so lines land on node edges,
      // not on fixed viewBox coordinates that drift when layout changes.
      (function layoutEdges() {
        const graph = document.getElementById('wt-graph');
        const svg   = document.getElementById('wt-svg');
        if (!graph || !svg) return;
        const gr = graph.getBoundingClientRect();
        svg.setAttribute('viewBox', '0 0 ' + gr.width + ' ' + gr.height);

        function edgeOf(sel, side) {
          const el = document.querySelector(sel);
          if (!el) return { x: 0, y: 0 };
          const r = el.getBoundingClientRect();
          const x = side === 'right' ? (r.right - gr.left) : (r.left - gr.left);
          const y = (r.top + r.bottom) / 2 - gr.top;
          return { x, y };
        }

        const mainR = edgeOf('#wt-main', 'right');
        const w1L = edgeOf('#wt-w1', 'left'), w1R = edgeOf('#wt-w1', 'right');
        const w2L = edgeOf('#wt-w2', 'left'), w2R = edgeOf('#wt-w2', 'right');
        const w3L = edgeOf('#wt-w3', 'left'), w3R = edgeOf('#wt-w3', 'right');
        const pr1L = edgeOf('#wt-pr1', 'left');
        const pr2L = edgeOf('#wt-pr2', 'left');
        const pr3L = edgeOf('#wt-pr3', 'left');

        function setPath(id, d) {
          const el = document.getElementById(id);
          if (el) el.setAttribute('d', d);
        }

        // main â†’ worktrees: curve through the horizontal midpoint
        const m1 = (mainR.x + w1L.x) / 2;
        setPath('wt-e1', 'M ' + mainR.x + ',' + mainR.y + ' Q ' + m1 + ',' + mainR.y + ' ' + w1L.x + ',' + w1L.y);
        setPath('wt-e2', 'M ' + mainR.x + ',' + mainR.y + ' L ' + w2L.x + ',' + w2L.y);
        setPath('wt-e3', 'M ' + mainR.x + ',' + mainR.y + ' Q ' + m1 + ',' + mainR.y + ' ' + w3L.x + ',' + w3L.y);

        // worktrees â†’ PRs
        const m2 = (w1R.x + pr1L.x) / 2;
        setPath('wt-e4', 'M ' + w1R.x + ',' + w1R.y + ' Q ' + m2 + ',' + w1R.y + ' ' + pr1L.x + ',' + pr1L.y);
        setPath('wt-e5', 'M ' + w2R.x + ',' + w2R.y + ' L ' + pr2L.x + ',' + pr2L.y);
        setPath('wt-e6', 'M ' + w3R.x + ',' + w3R.y + ' Q ' + m2 + ',' + w3R.y + ' ' + pr3L.x + ',' + pr3L.y);
      })();

      // Edges start with stroke-dashoffset trick â€” set dasharray and offset to length
      const edges = ["#wt-e1","#wt-e2","#wt-e3","#wt-e4","#wt-e5","#wt-e6"];
      edges.forEach(sel => {
        const el = document.querySelector(sel);
        if (el) {
          const len = el.getTotalLength();
          gsap.set(sel, { strokeDasharray: len, strokeDashoffset: len });
        }
      });

      tl.set("#wt-eyebrow",  { y: 20 }, 0);
      tl.set("#wt-headline", { y: 30 }, 0);
      tl.set("#wt-tagline",  { y: 20 }, 0);
      ["#wt-main","#wt-w1","#wt-w2","#wt-w3","#wt-pr1","#wt-pr2","#wt-pr3"].forEach(sel => {
        tl.set(sel, { scale: 0.7 }, 0);
      });

      tl.to("#wt-eyebrow",  { y: 0, autoAlpha: 1, duration: 0.5, ease: "power2.out" }, 0.2);
      tl.to("#wt-headline", { y: 0, autoAlpha: 1, duration: 0.65, ease: "power3.out" }, 0.5);
      tl.to("#wt-tagline",  { y: 0, autoAlpha: 1, duration: 0.55, ease: "power2.out" }, 1.0);

      // Main node first
      tl.to("#wt-main", { scale: 1, autoAlpha: 1, duration: 0.55, ease: "back.out(1.4)" }, 1.8);

      // Three worktree spurs (edges draw, then nodes pop)
      tl.to("#wt-e1", { strokeDashoffset: 0, duration: 0.55, ease: "power2.out" }, 3.0);
      tl.to("#wt-w1", { scale: 1, autoAlpha: 1, duration: 0.5, ease: "back.out(1.4)" }, 3.3);

      tl.to("#wt-e2", { strokeDashoffset: 0, duration: 0.55, ease: "power2.out" }, 5.5);
      tl.to("#wt-w2", { scale: 1, autoAlpha: 1, duration: 0.5, ease: "back.out(1.4)" }, 5.8);

      tl.to("#wt-e3", { strokeDashoffset: 0, duration: 0.55, ease: "power2.out" }, 8.0);
      tl.to("#wt-w3", { scale: 1, autoAlpha: 1, duration: 0.5, ease: "back.out(1.4)" }, 8.3);

      // Three PRs (edges then nodes)
      tl.to("#wt-e4", { strokeDashoffset: 0, duration: 0.5, ease: "power2.out" }, 12.0);
      tl.to("#wt-pr1", { scale: 1, autoAlpha: 1, duration: 0.5, ease: "back.out(1.4)" }, 12.3);

      tl.to("#wt-e5", { strokeDashoffset: 0, duration: 0.5, ease: "power2.out" }, 13.6);
      tl.to("#wt-pr2", { scale: 1, autoAlpha: 1, duration: 0.5, ease: "back.out(1.4)" }, 13.9);

      tl.to("#wt-e6", { strokeDashoffset: 0, duration: 0.5, ease: "power2.out" }, 15.2);
      tl.to("#wt-pr3", { scale: 1, autoAlpha: 1, duration: 0.5, ease: "back.out(1.4)" }, 15.5);

      // Highlight tagline mid-hold
      tl.to("#wt-tagline", { scale: 1.04, duration: 1.2, ease: "sine.inOut", yoyo: true, repeat: 1 }, 18.0);
      // Pulse all worktree dots together
      tl.to(["#wt-w1 .dot", "#wt-w2 .dot", "#wt-w3 .dot"], {
        scale: 1.4, duration: 0.8, ease: "sine.inOut", yoyo: true, repeat: 2,
        transformOrigin: "50% 50%", stagger: 0.08
      }, 22.0);
      tl.to(["#wt-pr1 .dot", "#wt-pr2 .dot", "#wt-pr3 .dot"], {
        scale: 1.4, duration: 0.8, ease: "sine.inOut", yoyo: true, repeat: 2,
        transformOrigin: "50% 50%", stagger: 0.08
      }, 27.0);

      // Extend timeline to full slot duration
      tl.set({}, {}, 50);
      window.__timelines["scene-worktrees"] = tl;
    </script>
  </div>
</template>
