<!--
  scene-bullets.html — Token-cost receipts: 25K vs 1K vs 25× more.
  (32.0–44.3s, scene-rel 0–12.3s).
  Beats (transcript scene-rel = abs - 32.0):
    0.10  — "Then came the receipts" → overline lands
    2.14  — "Twenty-five thousand tokens to generate one HTML file." → HTML card lands + 25K counter
    6.30  — "One thousand tokens for the same content in markdown." → MD card lands + 1K counter
    9.79  — "Twenty-five times more tokens. Per artifact." → 25× stamp slams
-->
<template id="scene-bullets-template">
  <div data-composition-id="scene-bullets"
       data-start="0"
       data-width="1080"
       data-height="1920"
       style="position:absolute; inset:0; overflow:hidden;
              font-family:'Source Serif 4', 'Playfair Display', Georgia, serif; color:var(--text);">

    <style>
      #sb-content {
        width: 100%; height: 100%;
        padding: var(--pad-top) var(--pad-x) var(--pad-bottom);
        position: relative;
        box-sizing: border-box;
        display: flex;
        flex-direction: column;
        gap: 28px;
      }
      .sb-overline {
        font-family: 'JetBrains Mono', ui-monospace, monospace;
        font-weight: 700;
        font-size: 28px;
        letter-spacing: 6px;
        text-transform: uppercase;
        color: var(--accent-2);
      }
      .sb-card {
        background: var(--bg-card);
        border: 1px solid var(--border);
        border-radius: 24px;
        padding: 32px 36px;
        display: flex;
        flex-direction: column;
        gap: 8px;
        position: relative;
      }
      .sb-card.is-html {
        border: 3px solid var(--accent-1);
        box-shadow: 0 14px 40px rgba(199, 90, 63, 0.18);
      }
      .sb-card.is-md {
        border: 2px solid var(--border);
        opacity: 0.92;
      }
      .sb-card-head {
        display: flex;
        align-items: center;
        gap: 14px;
      }
      .sb-tag {
        font-family: 'JetBrains Mono', ui-monospace, monospace;
        font-weight: 800;
        font-size: 28px;
        letter-spacing: 3px;
        padding: 6px 16px;
        border-radius: 8px;
      }
      .sb-tag.is-html { color: var(--accent-1); background: rgba(199, 90, 63, 0.10); border: 2px solid var(--accent-1); }
      .sb-tag.is-md   { color: var(--text-secondary); background: var(--bg-surface); border: 1px solid var(--border); }
      .sb-card-sub {
        font-family: 'Source Serif 4', 'Playfair Display', Georgia, serif;
        font-style: italic;
        font-weight: 700;
        font-size: 30px;
        color: var(--text-secondary);
        line-height: 1.1;
      }
      .sb-card-num {
        font-family: 'Source Serif 4', 'Playfair Display', Georgia, serif;
        font-weight: 900;
        font-size: 220px;
        line-height: 0.9;
        letter-spacing: -4px;
      }
      .sb-card.is-html .sb-card-num { color: var(--accent-1); }
      .sb-card.is-md   .sb-card-num { color: var(--text); }
      .sb-card-unit {
        font-family: 'JetBrains Mono', ui-monospace, monospace;
        font-weight: 700;
        font-size: 32px;
        letter-spacing: 4px;
        text-transform: uppercase;
        color: var(--text-secondary);
        margin-top: -4px;
      }
      .sb-stamp {
        font-family: 'JetBrains Mono', ui-monospace, monospace;
        font-weight: 900;
        font-size: 56px;
        letter-spacing: 4px;
        text-transform: uppercase;
        color: var(--accent-1);
        background: rgba(199, 90, 63, 0.12);
        border: 3px solid var(--accent-1);
        border-radius: 18px;
        padding: 26px 32px;
        align-self: stretch;
        text-align: center;
        margin-top: 4px;
      }
      .sb-stamp .sb-stamp-big {
        font-family: 'Source Serif 4', 'Playfair Display', Georgia, serif;
        font-style: italic;
        font-weight: 900;
        font-size: 96px;
        letter-spacing: -1px;
        color: var(--accent-1);
        text-transform: none;
        display: inline-block;
        margin-right: 14px;
        vertical-align: middle;
      }
    </style>

    <div id="sb-content">
      <div class="sb-overline" id="sb-overline">THEN CAME THE RECEIPTS</div>

      <div class="sb-card is-html" id="sb-card-html">
        <div class="sb-card-head">
          <span class="sb-tag is-html">.html</span>
          <span class="sb-card-sub">one HTML file</span>
        </div>
        <div class="sb-card-num" id="sb-num-html">0</div>
        <div class="sb-card-unit">tokens to generate</div>
      </div>

      <div class="sb-card is-md" id="sb-card-md">
        <div class="sb-card-head">
          <span class="sb-tag is-md">.md</span>
          <span class="sb-card-sub">same content in markdown</span>
        </div>
        <div class="sb-card-num" id="sb-num-md">0</div>
        <div class="sb-card-unit">tokens to generate</div>
      </div>

      <div class="sb-stamp" id="sb-stamp">
        <span class="sb-stamp-big">25&times;</span> more tokens &middot; per artifact
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({ paused: true, defaults: { ease: "power3.out" } });

      tl.set("#sb-overline",  { y: -8, opacity: 0 }, 0);
      tl.set("#sb-card-html", { y: 24, opacity: 0, scale: 0.94 }, 0);
      tl.set("#sb-card-md",   { y: 24, opacity: 0, scale: 0.94 }, 0);
      tl.set("#sb-stamp",     { scale: 0.6, opacity: 0, filter: "blur(20px)" }, 0);

      tl.to("#sb-overline", { y: 0, opacity: 1, duration: 0.4 }, 0.10);

      // HTML card + 25K counter at "Twenty-five thousand tokens"
      tl.to("#sb-card-html", { y: 0, opacity: 1, scale: 1, duration: 0.55 }, 1.95);
      const cHtml = { v: 0 };
      tl.to(cHtml, {
        v: 25000,
        duration: 1.30,
        ease: "power2.out",
        onUpdate: function() {
          const el = document.getElementById('sb-num-html');
          if (el) el.textContent = Math.round(cHtml.v).toLocaleString('en-US');
        }
      }, 2.30);
      tl.to("#sb-card-html", { scale: 1.03, duration: 0.3, yoyo: true, repeat: 1, ease: "power2.out" }, 3.80);

      // MD card + 1K counter at "One thousand tokens"
      tl.to("#sb-card-md", { y: 0, opacity: 1, scale: 1, duration: 0.55 }, 6.10);
      const cMd = { v: 0 };
      tl.to(cMd, {
        v: 1000,
        duration: 1.00,
        ease: "power2.out",
        onUpdate: function() {
          const el = document.getElementById('sb-num-md');
          if (el) el.textContent = Math.round(cMd.v).toLocaleString('en-US');
        }
      }, 6.40);

      // 25× stamp slams in at "Twenty-five times more tokens"
      tl.to("#sb-stamp", { scale: 1, opacity: 1, filter: "blur(0px)", duration: 0.6, ease: "back.out(1.6)" }, 9.79);
      tl.to("#sb-stamp", { x: -8, duration: 0.04, yoyo: true, repeat: 5 }, 10.20);
      tl.to("#sb-stamp", { scale: 1.04, duration: 0.3, yoyo: true, repeat: 1, ease: "power2.out" }, 10.70);

      window.__timelines["scene-bullets"] = tl;
    </script>
  </div>
</template>
