<!DOCTYPE html>
<!-- Variant 08 — Big-number social proof. "751K agreed. Markdown lost." Cream. -->
<html lang="en"><head><meta charset="utf-8">
<title>v08 — 751K agreed Markdown lost</title>
<link rel="stylesheet" href="_base.css">
<style>
  .headline .num {
    display: block;
    font-family: var(--mono);
    font-weight: 700;
    font-size: 280px;
    line-height: 0.9;
    letter-spacing: -8px;
    color: var(--accent-terracotta);
  }
  .headline .lead {
    display: block;
    font-family: var(--mono);

    color: var(--text-dim-cream);

  .headline .punch {
    display: block;
    font-size: 124px;
    line-height: 0.95;
    letter-spacing: -3px;
    color: var(--text-cream);

  .headline .punch em {
    display: inline;
    font-style: italic;
    color: var(--accent-terracotta);
  }

<body>
  <div class="thumb theme-cream">
    <div class="overline">Social proof</div>

      <span class="num">751K</span>
      <span class="lead">agreed with the team</span>

    <div class="receipt"><strong>Read why HTML wins.</strong></div>
    <div class="brand"><span class="dot"></span><span>diy-yt-creator</span></div>
    <div class="cover-stack" style="width: 240px;">
      <span class="cover-label">The Source</span>
