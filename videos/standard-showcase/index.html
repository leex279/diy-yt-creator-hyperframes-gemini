<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Standard Template Showcase — 3-min Tour</title>
<link rel="stylesheet" href="tokens/standard-short.css" />
<script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
<style>
  /* ──────────────────────────────────────────────────
     CANVAS — 1080x1920 warm cream paper stage.
     Full design system in DESIGN.md. Edit values per
     video; keep families.

     This template uses sub-compositions (NOT phase mutex).
     Each scene is a self-contained .html under compositions/
     with its own paused timeline registered on
     window.__timelines[<scene-id>]. The root composition only
     orchestrates ambient + chrome + scene crossfades.
     ────────────────────────────────────────────────── */
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 1080px;
    height: 1920px;
    overflow: hidden;
    background: var(--bg);
    font-family: var(--sans);
    color: var(--text);
    -webkit-font-smoothing: antialiased;
  }

  /* Ambient warm wash — three radial pools (terracotta + gold + rose)
     drifting under all scenes. Low alpha so it reads as paper grain
     not a gradient overlay. */
  /* COMPONENT: shared/lib/components/ambient-radial/ (warm-paper variant) */
  #ambient {
    position: absolute;
    inset: -200px;
    background:
      radial-gradient(circle at 25% 18%, rgba(224, 122, 95, 0.10), transparent 55%),
      radial-gradient(circle at 80% 75%, rgba(242, 204, 143, 0.13), transparent 60%),
      radial-gradient(circle at 50% 105%, rgba(244, 151, 142, 0.08), transparent 50%);
    pointer-events: none;
    z-index: 0;
  }

  /* Shape backdrop — 14 deterministic geometric shapes scattered at
     ~5% opacity. On warm cream they read as faint ink watermarks
     rather than tech glow. */
  #shape-backdrop {
    position: absolute;
    inset: 0;
    pointer-events: none;
    overflow: hidden;
    z-index: 0;
  }
  #shape-backdrop img {
    position: absolute;
    opacity: 0.05;
    object-fit: contain;
    pointer-events: none;
  }

  /* Subtle paper-grain overlay — fractal noise, very low opacity, no
     blend-mode invert. Adds a tactile feel without darkening the canvas. */
  #grain-overlay {
    position: absolute;
    inset: 0;
    width: 1080px;
    height: 1920px;
    pointer-events: none;
    z-index: 11;
    opacity: 0.045;
    mix-blend-mode: multiply;
  }

  /* ──────────────────────────────────────────────────
     TOP CHROME — persistent banner across all scenes.
     Default ships with a styled wordmark pill that
     operators replace per video. Indigo dot indicator
     instead of warm-orange (visual contrast against
     the cream + terracotta palette).
     ────────────────────────────────────────────────── */
  /* COMPONENT: shared/lib/components/top-banner-wordmark/ */
  #top-banner {
    position: absolute;
    top: 60px;
    left: 0;
    width: 1080px;
    z-index: 10;
    pointer-events: none;
    text-align: center;
  }
  #top-banner-text {
    display: inline-flex;
    align-items: center;
    gap: 16px;
    padding: 16px 36px;
    border-radius: 999px;
    background: var(--bg-card);
    border: 1.5px solid var(--border);
    box-shadow: var(--shadow-warm);
    font-family: var(--mono);
    font-weight: 700;
    font-size: 30px;
    letter-spacing: 4px;
    color: var(--accent-ink);
    text-transform: uppercase;
  }
  #top-banner-dot {
    width: 14px;
    height: 14px;
    border-radius: 50%;
    background: var(--accent-warm);
    box-shadow: 0 0 14px rgba(224, 122, 95, 0.5);
  }

  /* Slim progress bar — terracotta accent on a faint ink track */
  /* COMPONENT: shared/lib/components/progress-bar/ */
  #progress-track {
    position: absolute;
    bottom: 0;
    left: 0;
    width: 1080px;
    height: 6px;
    background: rgba(43, 42, 40, 0.08);
    z-index: 10;
  }
  #progress-fill {
    width: 0;
    height: 100%;
    background: var(--accent-warm);
    box-shadow: 0 0 12px rgba(224, 122, 95, 0.55);
  }

  /* ──────────────────────────────────────────────────
     SCENE WRAPPERS — each wraps a sub-composition.
     First scene is visible; the rest start hidden.
     The root timeline crossfades them via crossfadeScenes().
     ────────────────────────────────────────────────── */
  .scene-wrapper {
    position: absolute;
    top: 0;
    left: 0;
    width: 1080px;
    height: 1920px;
    z-index: 1;
  }
  #scene-title-wrap         { z-index: 1; opacity: 1; }
  #scene-stat-wrap          { z-index: 1; opacity: 0; visibility: hidden; }
  #scene-chart-wrap         { z-index: 1; opacity: 0; visibility: hidden; }
  #scene-counter-grid-wrap  { z-index: 1; opacity: 0; visibility: hidden; }
  #scene-typewriter-wrap    { z-index: 1; opacity: 0; visibility: hidden; }
  #scene-code-block-wrap    { z-index: 1; opacity: 0; visibility: hidden; }
  #scene-quote-wrap         { z-index: 1; opacity: 0; visibility: hidden; }
  #scene-bullets-wrap       { z-index: 1; opacity: 0; visibility: hidden; }
  #scene-process-flow-wrap  { z-index: 1; opacity: 0; visibility: hidden; }
  #scene-compare-wrap       { z-index: 1; opacity: 0; visibility: hidden; }
  #scene-timeline-wrap      { z-index: 1; opacity: 0; visibility: hidden; }
  #scene-marker-wrap        { z-index: 1; opacity: 0; visibility: hidden; }
  #scene-image-card-wrap    { z-index: 1; opacity: 0; visibility: hidden; }
  #scene-badges-wrap        { z-index: 1; opacity: 0; visibility: hidden; }
  #scene-cta-wrap           { z-index: 1; opacity: 0; visibility: hidden; }
</style>
</head>
<body>
<div id="root"
     data-composition-id="main"
     data-start="0"
     data-duration="210"
     data-width="1080"
     data-height="1920">

  <!-- Warm radial wash + ink shape backdrop sit behind scenes -->
  <div id="ambient"></div>
  <div id="shape-backdrop"></div>

  <!-- Persistent top banner. Operator swaps to a real logo per video. -->
  <div id="top-banner">
    <div id="top-banner-text">
      <span id="top-banner-dot"></span>
      <span>Standard Tour</span>
    </div>
  </div>

  <!-- Slim progress bar -->
  <div id="progress-track"><div id="progress-fill"></div></div>

  <!-- ═══════════════════════════════════════════════════════
       SCENE WRAPPERS — eight archetypes, each a sub-composition.
       data-track-index="1" (scene layer); NO data-duration on
       the wrapper — the sub-comp's internal timeline owns its length.

       Showcase scene timing (data-start, seconds) — back-to-back pacing,
       NO static gaps. Each slot is sized to its scene's measured active
       internal-timeline length (entrance + mid-beats); the next scene
       begins exactly 0.4s before the previous scene's last beat ends so
       the crossfade overlaps the tail. 15 archetypes total.
          0.0   → title          (13.9s)  serif word reveal
         13.9   → stat           (12.9s)  one huge counter
         26.8   → chart          (13.9s)  animated bar chart
         40.7   → counter-grid   (13.2s)  three parallel counters
         53.9   → typewriter     (13.7s)  terminal type-on
         67.6   → code-block     (13.4s)  macOS code window
         81.0   → quote          (13.4s)  italic pull-quote
         94.4   → bullets        (13.2s)  icon+text rows
        107.6   → process-flow   (12.7s)  4-node connected diagram
        120.3   → compare        (13.4s)  before/after
        133.7   → timeline       (13.4s)  horizontal milestones
        147.1   → marker         (14.4s)  highlight sweep (re-draws)
        161.5   → image-card     (13.2s)  framed visual asset
        174.7   → badges         (14.4s)  full-palette pill grid
        189.1   → cta            (20.9s, closing hold) → ends at 210
       ═══════════════════════════════════════════════════════ -->

  <div id="scene-title-wrap" class="scene-wrapper"
       data-composition-id="scene-title"
       data-composition-src="compositions/scene-title.html"
       data-start="0"
       data-track-index="1"></div>

  <div id="scene-stat-wrap" class="scene-wrapper"
       data-composition-id="scene-stat"
       data-composition-src="compositions/scene-stat.html"
       data-start="13.9"
       data-track-index="1"></div>

  <div id="scene-chart-wrap" class="scene-wrapper"
       data-composition-id="scene-chart"
       data-composition-src="compositions/scene-chart.html"
       data-start="26.8"
       data-track-index="1"></div>

  <div id="scene-counter-grid-wrap" class="scene-wrapper"
       data-composition-id="scene-counter-grid"
       data-composition-src="compositions/scene-counter-grid.html"
       data-start="40.7"
       data-track-index="1"></div>

  <div id="scene-typewriter-wrap" class="scene-wrapper"
       data-composition-id="scene-typewriter"
       data-composition-src="compositions/scene-typewriter.html"
       data-start="53.9"
       data-track-index="1"></div>

  <div id="scene-code-block-wrap" class="scene-wrapper"
       data-composition-id="scene-code-block"
       data-composition-src="compositions/scene-code-block.html"
       data-start="67.6"
       data-track-index="1"></div>

  <div id="scene-quote-wrap" class="scene-wrapper"
       data-composition-id="scene-quote"
       data-composition-src="compositions/scene-quote.html"
       data-start="81.0"
       data-track-index="1"></div>

  <div id="scene-bullets-wrap" class="scene-wrapper"
       data-composition-id="scene-bullets"
       data-composition-src="compositions/scene-bullets.html"
       data-start="94.4"
       data-track-index="1"></div>

  <div id="scene-process-flow-wrap" class="scene-wrapper"
       data-composition-id="scene-process-flow"
       data-composition-src="compositions/scene-process-flow.html"
       data-start="107.6"
       data-track-index="1"></div>

  <div id="scene-compare-wrap" class="scene-wrapper"
       data-composition-id="scene-compare"
       data-composition-src="compositions/scene-compare.html"
       data-start="120.3"
       data-track-index="1"></div>

  <div id="scene-timeline-wrap" class="scene-wrapper"
       data-composition-id="scene-timeline"
       data-composition-src="compositions/scene-timeline.html"
       data-start="133.7"
       data-track-index="1"></div>

  <div id="scene-marker-wrap" class="scene-wrapper"
       data-composition-id="scene-marker"
       data-composition-src="compositions/scene-marker.html"
       data-start="147.1"
       data-track-index="1"></div>

  <div id="scene-image-card-wrap" class="scene-wrapper"
       data-composition-id="scene-image-card"
       data-composition-src="compositions/scene-image-card.html"
       data-start="161.5"
       data-track-index="1"></div>

  <div id="scene-badges-wrap" class="scene-wrapper"
       data-composition-id="scene-badges"
       data-composition-src="compositions/scene-badges.html"
       data-start="174.7"
       data-track-index="1"></div>

  <div id="scene-cta-wrap" class="scene-wrapper"
       data-composition-id="scene-cta"
       data-composition-src="compositions/scene-cta.html"
       data-start="189.1"
       data-track-index="1"></div>

  <!-- Paper-grain overlay — last child so it tints everything below -->
  <svg id="grain-overlay" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <filter id="grain-filter" x="0%" y="0%" width="100%" height="100%">
        <feTurbulence type="fractalNoise" baseFrequency="0.85" numOctaves="3" seed="11" stitchTiles="stitch" result="noise" />
        <feColorMatrix type="saturate" values="0" in="noise" result="monoNoise" />
      </filter>
    </defs>
    <rect width="100%" height="100%" filter="url(#grain-filter)" fill="#2B2A28" />
  </svg>
</div>

<script>
  // ─────────────────────────────────────────────────────
  // Shape backdrop — deterministic seeded scatter of 14 generic
  // geometric shapes (circle, rounded square, triangle).
  // ─────────────────────────────────────────────────────
  function seedHash(seed) {
    let h = 1779033703 ^ seed.length;
    for (let i = 0; i < seed.length; i++) {
      h = Math.imul(h ^ seed.charCodeAt(i), 3432918353);
      h = (h << 13) | (h >>> 19);
    }
    h = Math.imul(h ^ (h >>> 16), 2246822507);
    h = Math.imul(h ^ (h >>> 13), 3266489909);
    h ^= h >>> 16;
    return (h >>> 0) / 4294967296;
  }

  function spawnShapes(seedPrefix, container) {
    const shapes = ['assets/shapes/shape1.svg', 'assets/shapes/shape2.svg', 'assets/shapes/shape3.svg'];
    const count = 14, w = 1080, h = 1920, minSize = 200, sizeRange = 220;
    const minDist = 360, MAX_TRIES = 80;
    const placed = [];
    let attempt = 0;
    for (let i = 0; i < count; i++) {
      let best = null, bestScore = -1;
      for (let t = 0; t < MAX_TRIES; t++) {
        const seed = seedPrefix + '-' + i + '-' + attempt++;
        const size = minSize + seedHash(seed + '-size') * sizeRange;
        const cx = seedHash(seed + '-x') * (w - size * 0.4) + size * 0.2;
        const cy = seedHash(seed + '-y') * (h - size * 0.4) + size * 0.2;
        const rot = (seedHash(seed + '-rot') - 0.5) * 90;
        let nearest = Infinity;
        for (const p of placed) {
          const dx = cx - p.cx, dy = cy - p.cy;
          const d2 = dx * dx + dy * dy;
          if (d2 < nearest) nearest = d2;
        }
        if (nearest >= minDist * minDist) { best = { cx, cy, size, rot }; break; }
        if (nearest > bestScore) { bestScore = nearest; best = { cx, cy, size, rot }; }
      }
      placed.push(best);
      const img = document.createElement('img');
      img.src = shapes[i % shapes.length];
      img.style.cssText =
        'left:' + (best.cx - best.size / 2) + 'px;' +
        'top:' + (best.cy - best.size / 2) + 'px;' +
        'width:' + best.size + 'px;' +
        'height:' + best.size + 'px;';
      container.appendChild(img);
      gsap.set(img, { rotation: best.rot });
    }
  }

  function animateShapeDrift(tl, container, seedPrefix, totalDuration) {
    const imgs = container.querySelectorAll('img');
    imgs.forEach((img, i) => {
      const seed = seedPrefix + '-drift-' + i;
      const dx = (seedHash(seed + '-dx') - 0.5) * 50;
      const dy = (seedHash(seed + '-dy') - 0.5) * 50;
      const dr = (seedHash(seed + '-dr') - 0.5) * 7;
      const dur = totalDuration / 10 + seedHash(seed + '-dur') * (totalDuration / 10);
      const repeatCount = Math.max(0, Math.floor(totalDuration / dur) - 1);
      tl.to(img, {
        x: dx, y: dy, rotation: '+=' + dr,
        duration: dur, ease: 'sine.inOut',
        yoyo: true, repeat: repeatCount
      }, 0);
    });
  }

  // Crossfade two scene wrappers at the root timeline level.
  // Both wrappers must have explicit z-index so the incoming paints on top
  // during the overlap window. The total span is 1.1s.
  // EFFECT: shared/lib/effects/phase-crossfade.js (adapted to scene wrappers)
  function crossfadeScenes(tl, fromSel, toSel, atTime) {
    tl.to(fromSel, { filter: "blur(20px)", scale: 1.04, duration: 0.5, ease: "power1.in" }, atTime);
    tl.to(fromSel, { opacity: 0,                          duration: 0.4, ease: "power1.in" }, atTime + 0.3);
    tl.set(fromSel, { visibility: "hidden" }, atTime + 0.7);
    tl.set(toSel,   { filter: "blur(20px)", scale: 0.97, opacity: 0, visibility: "visible" }, atTime + 0.4);
    tl.to(toSel,    { opacity: 1, duration: 0.3, ease: "power1.inOut", overwrite: "auto" }, atTime + 0.4);
    tl.to(toSel,    { filter: "blur(0px)", scale: 1, duration: 0.5, ease: "power1.out", overwrite: "auto" }, atTime + 0.6);
  }

  // ─────────────────────────────────────────────────────
  // Root timeline construction
  // ─────────────────────────────────────────────────────
  spawnShapes('standard-short', document.getElementById('shape-backdrop'));

  window.__timelines = window.__timelines || {};
  const TOTAL_DURATION = 210;
  const tl = gsap.timeline({ paused: true });

  animateShapeDrift(tl, document.getElementById('shape-backdrop'), 'standard-short', TOTAL_DURATION);

  // Slow ambient breath (sine yoyo). Half-period = total/4 so two full
  // breaths land per composition.
  tl.fromTo("#ambient",
    { opacity: 0.85, scale: 1.0 },
    { opacity: 1.0, scale: 1.04, duration: TOTAL_DURATION / 4, ease: "sine.inOut", yoyo: true, repeat: 3 },
    0);

  // Linear progress bar across the full composition
  tl.fromTo("#progress-fill",
    { width: 0 },
    { width: 1080, duration: TOTAL_DURATION, ease: "none" },
    0);

  // Top banner fade-in (one-shot)
  tl.from("#top-banner", { y: -16, opacity: 0, duration: 0.6, ease: "power2.out" }, 0.2);

  // ─── Scene labels — anchors so duration tweaks don't cascade ───
  // Showcase pacing: scenes back-to-back, each slot matched to its
  // internal timeline's natural active length (entrance + mid-beats).
  // 15 scene archetypes for comprehensive component coverage.
  tl.addLabel("title",           0)
    .addLabel("stat",          13.9)
    .addLabel("chart",         26.8)
    .addLabel("counter-grid",  40.7)
    .addLabel("typewriter",    53.9)
    .addLabel("code-block",    67.6)
    .addLabel("quote",         81.0)
    .addLabel("bullets",       94.4)
    .addLabel("process-flow", 107.6)
    .addLabel("compare",      120.3)
    .addLabel("timeline",     133.7)
    .addLabel("marker",       147.1)
    .addLabel("image-card",   161.5)
    .addLabel("badges",       174.7)
    .addLabel("cta",          189.1);

  // ─── Crossfades between adjacent scenes ───
  // Each crossfade fires ~0.4s before the next scene's data-start so the
  // incoming wrapper is already coming up when the sub-comp begins playing.
  crossfadeScenes(tl, "#scene-title-wrap",         "#scene-stat-wrap",         "stat-=0.4");
  crossfadeScenes(tl, "#scene-stat-wrap",          "#scene-chart-wrap",        "chart-=0.4");
  crossfadeScenes(tl, "#scene-chart-wrap",         "#scene-counter-grid-wrap", "counter-grid-=0.4");
  crossfadeScenes(tl, "#scene-counter-grid-wrap",  "#scene-typewriter-wrap",   "typewriter-=0.4");
  crossfadeScenes(tl, "#scene-typewriter-wrap",    "#scene-code-block-wrap",   "code-block-=0.4");
  crossfadeScenes(tl, "#scene-code-block-wrap",    "#scene-quote-wrap",        "quote-=0.4");
  crossfadeScenes(tl, "#scene-quote-wrap",         "#scene-bullets-wrap",      "bullets-=0.4");
  crossfadeScenes(tl, "#scene-bullets-wrap",       "#scene-process-flow-wrap", "process-flow-=0.4");
  crossfadeScenes(tl, "#scene-process-flow-wrap",  "#scene-compare-wrap",      "compare-=0.4");
  crossfadeScenes(tl, "#scene-compare-wrap",       "#scene-timeline-wrap",     "timeline-=0.4");
  crossfadeScenes(tl, "#scene-timeline-wrap",      "#scene-marker-wrap",       "marker-=0.4");
  crossfadeScenes(tl, "#scene-marker-wrap",        "#scene-image-card-wrap",   "image-card-=0.4");
  crossfadeScenes(tl, "#scene-image-card-wrap",    "#scene-badges-wrap",       "badges-=0.4");
  crossfadeScenes(tl, "#scene-badges-wrap",        "#scene-cta-wrap",          "cta-=0.4");

  // Pad the timeline to TOTAL_DURATION so the renderer captures the
  // closing scene's tail.
  tl.to({}, { duration: 0.01 }, TOTAL_DURATION - 0.01);

  window.__timelines["main"] = tl;
</script>
</body>
</html>
