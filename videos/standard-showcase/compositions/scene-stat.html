<!--
  scene-stat.html — One huge animated number (~7s).

  Pattern: small label above → big counter (animates 0→target via
           textContent updates, deterministic) → caption below.

  Self-contained sub-composition with its own paused timeline at
  window.__timelines["scene-stat"].
-->
<template id="scene-stat-template">
  <div data-composition-id="scene-stat"
       data-start="0"
       data-width="1080"
       data-height="1920"
       style="position:absolute; inset:0; overflow:hidden;">

    <style>
      #scene-stat-content {
        width:100%; height:100%;
        padding: var(--pad-top) var(--pad-x) var(--pad-bottom);
        display:flex; flex-direction:column;
        align-items:center; justify-content:center;
        text-align:center; gap:24px;
        box-sizing:border-box;
      }
      #scene-stat-content .label {
        font-family: var(--mono);
        font-weight: 700;
        font-size: 32px;
        letter-spacing: 5px;
        text-transform: uppercase;
        color: var(--accent-deep);
      }
      #scene-stat-content .stat-frame {
        position: relative;
        display: inline-flex;
        align-items: baseline;
        justify-content: center;
        padding: 36px 60px;
        background: var(--bg-card);
        border: 2px solid var(--accent-warm);
        border-radius: 28px;
        box-shadow: var(--shadow-warm);
      }
      #scene-stat-content .stat-num {
        font-family: var(--sans);
        font-weight: 900;
        font-size: 240px;
        line-height: 1.0;
        letter-spacing: -8px;
        color: var(--accent-warm);
        font-variant-numeric: tabular-nums lining-nums;
      }
      #scene-stat-content .stat-suffix {
        font-family: var(--serif);
        font-style: italic;
        font-weight: 700;
        font-size: 84px;
        color: var(--accent-deep);
        margin-left: 16px;
      }
      #scene-stat-content .caption {
        font-family: var(--serif);
        font-weight: 400;
        font-style: italic;
        font-size: 38px;
        color: var(--text);
        max-width: 800px;
        line-height: 1.3;
      }
    </style>

    <div id="scene-stat-content">
      <div class="label" id="stat-label">By the numbers</div>
      <div class="stat-frame">
        <span class="stat-num" id="stat-num">0</span><span class="stat-suffix" id="stat-suffix">scenes</span>
      </div>
      <div class="caption" id="stat-caption">Each one a swappable archetype.</div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({ paused: true });

      // Counter animation — GSAP tweens an object value, we sync DOM
      // textContent on each update. Deterministic; the framework will
      // capture each frame at its exact value.
      const counter = { v: 0 };
      const target = 8;
      const numEl = document.getElementById('stat-num');

      tl.from("#stat-label",  { y: 16, opacity: 0, duration: 0.5, ease: "power2.out" }, 0);
      tl.from(".stat-frame",  { scale: 0.85, opacity: 0, duration: 0.7, ease: "back.out(1.4)" }, 0.3);
      tl.to(counter, {
        v: target,
        duration: 1.6,
        ease: "power2.out",
        onUpdate: () => { numEl.textContent = Math.round(counter.v); }
      }, 0.6);
      tl.from("#stat-suffix", { x: -10, opacity: 0, duration: 0.4, ease: "power2.out" }, 1.6);
      tl.from("#stat-caption", { y: 16, opacity: 0, duration: 0.5, ease: "power2.out" }, 2.0);

      window.__timelines["scene-stat"] = tl;
    </script>
  </div>
</template>
