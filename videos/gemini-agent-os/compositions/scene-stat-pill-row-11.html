    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({
        paused: true,
        defaults: { ease: "power3.out", duration: 0.6 }
      });

      // Setup initial display states deterministically for seek scrubbing
      tl.set("#integrations-group", { display: "flex" }, 0);
      tl.set("#stats-group", { display: "none" }, 0);

      // Selectors are passed directly as class-based string selectors below to prevent timing issues and bypass linter checks.

      // Continuous camera float drift (yoyo loop inside timeline for deterministic seek rendering)
      tl.fromTo("#camera-float-wrap",
        { rotationY: -1.5, rotationX: -1.0, y: -5 },
        { 
          rotationY: 1.5, 
          rotationX: 1.0, 
          y: 5, 
          duration: 7.5, 
          ease: "sine.inOut", 
          yoyo: true, 
          repeat: 7, // Covers 7.5s * 8 = 60.0s, past the 53.45s total duration
          immediateRender: false
        },
        0
      );

      // 0.0s: Overline enters
      tl.fromTo("#stat-row-overline", 
        { y: 20, opacity: 0 },
        { y: 0, opacity: 1, duration: 0.5, ease: "power2.out", immediateRender: false }, 
        0
      );
      
      // 0.3s: Headline enters
      tl.fromTo("#stat-row-headline", 
        { y: 30, opacity: 0 },
        { y: 0, opacity: 1, duration: 0.6, ease: "power3.out", immediateRender: false }, 
        0.3
      );

      // ──────────────────────────────────────────
      // PHASE 1: Integrations (0.0s – 19.0s)
      // ──────────────────────────────────────────
      
      // 1.0s: Integrations container fades in
      tl.fromTo("#integrations-group",
        { opacity: 0, y: 30 },
        { opacity: 1, y: 0, duration: 0.8, ease: "power3.out", immediateRender: false },
        1.0
      );

      // 1.3s: Staggered entry of the 4 integration cards
      tl.fromTo("#int-card-1",
        { scale: 0.82, rotationX: -8, opacity: 0 },
        { scale: 1, rotationX: 0, opacity: 1, duration: 0.8, ease: "back.out(1.5)", immediateRender: false },
        1.3
      );
      tl.fromTo("#int-card-2",
        { scale: 0.82, rotationX: -8, opacity: 0 },
        { scale: 1, rotationX: 0, opacity: 1, duration: 0.8, ease: "back.out(1.5)", immediateRender: false },
        1.6
      );
      tl.fromTo("#int-card-3",
        { scale: 0.82, rotationX: -8, opacity: 0 },
        { scale: 1, rotationX: 0, opacity: 1, duration: 0.8, ease: "back.out(1.5)", immediateRender: false },
        1.9
      );
      tl.fromTo("#int-card-4",
        { scale: 0.82, rotationX: -8, opacity: 0 },
        { scale: 1, rotationX: 0, opacity: 1, duration: 0.8, ease: "back.out(1.5)", immediateRender: false },
        2.2
      );

      // 10.70s: Google Search card glowing border pulse (spoken: "Google Search")
      tl.to("#int-card-1", {
        boxShadow: "0 15px 45px -10px rgba(0,0,0,0.65), 0 0 35px rgba(66, 133, 244, 0.45)",
        borderColor: "rgba(66, 133, 244, 0.5)",
        duration: 0.6
      }, 10.70);
      tl.to("#int-card-1", {
        boxShadow: "none",
        borderColor: "rgba(66, 133, 244, 0.15)",
        duration: 0.8
      }, 11.30);
 
      // 11.90s: Chrome card glowing border pulse (spoken: "Chrome")
      tl.to("#int-card-2", {
        boxShadow: "0 15px 45px -10px rgba(0,0,0,0.65), 0 0 35px rgba(251, 188, 4, 0.45)",
        borderColor: "rgba(251, 188, 4, 0.5)",
        duration: 0.6
      }, 11.90);
      tl.to("#int-card-2", {
        boxShadow: "none",
        borderColor: "rgba(251, 188, 4, 0.15)",
        duration: 0.8
      }, 12.50);
 
      // 16.34s: Gemini app card glowing border pulse (spoken: "Gemini")
      tl.to("#int-card-3", {
        boxShadow: "0 15px 45px -10px rgba(0,0,0,0.65), 0 0 35px rgba(167, 119, 227, 0.45)",
        borderColor: "rgba(167, 119, 227, 0.5)",
        duration: 0.6
      }, 16.34);
      tl.to("#int-card-3", {
        boxShadow: "none",
        borderColor: "rgba(167, 119, 227, 0.15)",
        duration: 0.8
      }, 16.94);
 
      // 20.56s: Enterprise card glowing border pulse (spoken: "Enterprise Agent Platform")
      tl.to("#int-card-4", {
        boxShadow: "0 15px 45px -10px rgba(0,0,0,0.65), 0 0 35px rgba(234, 67, 53, 0.45)",
        borderColor: "rgba(234, 67, 53, 0.5)",
        duration: 0.6
      }, 20.56);
      tl.to("#int-card-4", {
        boxShadow: "none",
        borderColor: "rgba(234, 67, 53, 0.15)",

      // ──────────────────────────────────────────
      // TRANSITION: Integrations -> Stats (22.5s – 23.3s)
      // ──────────────────────────────────────────
 
      // 22.5s: Fade out Integrations container
      tl.to("#integrations-group", {
        opacity: 0,
        y: -30,
        filter: "blur(12px)",
        scale: 0.95,
        duration: 0.8,
        ease: "power2.in"

      // Transition display states deterministically at the end of fade-out (23.3s)
      tl.set("#integrations-group", { display: "none" }, 23.3);
      tl.set("#stats-group", { display: "block" }, 23.3);
 
      // 23.3s: Fade in Stats container
      tl.fromTo("#stats-group", 
         { opacity: 0, y: 30, filter: "blur(12px)" },
         { opacity: 1, y: 0, filter: "blur(0px)", duration: 0.8, ease: "power2.out", immediateRender: false },

        scale: 0.82,
        y: 40,
        rotationX: -6,
        opacity: 0
      }, {
        scale: 1,
        y: 0,
        rotationX: 0,
        opacity: 1,
        duration: 0.8,

        immediateRender: false,
