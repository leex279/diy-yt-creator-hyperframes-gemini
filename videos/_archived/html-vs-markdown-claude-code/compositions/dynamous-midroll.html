    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      window.__timelines = window.__timelines || {};
      (function () {

        // ──────────────────────────────────────────────────────────
        // POPULATE LIST ROWS — done synchronously before timeline build
        // ──────────────────────────────────────────────────────────
        // 12 main modules + 3 Extras + 3 Live Workshops = 18 entries.
        // Matches narration ("eighteen modules") and the live course content
        // at community.dynamous.ai/c/agentic-coding-course (verified 2026-05-09).
        var AGENTIC_MODULES = [
          { num: 1,  title: 'Introduction to Agentic Coding',  color: '#22c55e' },
          { num: 2,  title: 'The PIV Loop',                    color: '#3b82f6' },
          { num: 3,  title: 'Global Rules',                    color: '#8b5cf6' },
          { num: 4,  title: 'Commands (Reusable Prompts)',     color: '#f59e0b' },

          { num: 6,  title: 'Systems for Implementation',      color: '#06b6d4' },
          { num: 7,  title: 'Systems for Validating',          color: '#a855f7' },
          { num: 8,  title: 'Remote Agentic Coding in GitHub', color: '#10b981' },
          { num: 9,  title: 'Dynamous Remote Coding System',   color: '#f97316' },
          { num: 10, title: 'MCP Servers + Skills',            color: '#ec4899' },
          { num: 11, title: 'Subagents',                       color: '#14b8a6' },
          { num: 12, title: 'Parallel Agentic Coding',         color: '#64748b' },
          { num: 13, title: 'Extra: PRP Framework',            color: '#6366f1' },
          { num: 14, title: 'Extra: GitHub Spec Kit',          color: '#0ea5e9' },
          { num: 15, title: 'Extra: BMAD Method',              color: '#eab308' },
          { num: 16, title: 'Workshop: Command Chaining',      color: '#d946ef' },
          { num: 17, title: 'Workshop: AI-Optimized Codebase', color: '#f43f5e' },
          { num: 18, title: 'Workshop: Slack + Remote Coding', color: '#22d3ee' }
        ];
        // Verified against community.dynamous.ai/c/ai-second-brain-course (2026-05-09).
        var SECOND_BRAIN_MODULES = [
          { num: 1, title: 'Intro to the Second Brain Course',  time: '29:18', color: '#22c55e' },
          { num: 2, title: 'Second Brain Architecture Overview',time: '18:32', color: '#3b82f6' },
          { num: 3, title: 'Generating Your PRD',               time: '17:30', color: '#8b5cf6' },

        function hexFade(hex) { return hex + '40'; /* 25% alpha — close enough to the original tint */ }
        function buildRow(mod, i, withTime) {
          var alt = (i % 2 === 1) ? ' dm-row-alt' : '';
          var timeHTML = withTime ? '<div class="dm-row-time">' + mod.time + '</div>' : '';
          var titleText = withTime ? (mod.num + '. ' + mod.title) : mod.title;
          return '<div class="dm-list-row' + alt + '" '
               + 'style="--row-color: ' + mod.color + '; --row-color-faded: ' + hexFade(mod.color) + ';">'
               + '<div class="dm-row-num">' + mod.num + '</div>'
               + '<div class="dm-row-title">' + titleText + '</div>'
               + timeHTML
               + '<svg class="dm-row-check" viewBox="0 0 14 14" fill="none">'
               +   '<circle cx="7" cy="7" r="7" fill="' + mod.color + '" fill-opacity="0.20" />'
               +   '<circle cx="7" cy="7" r="6" stroke="' + mod.color + '" stroke-width="1.5" fill="none" />'
               +   '<path d="M4 7l2 2 4-4" stroke="' + mod.color + '" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" />'
               + '</svg>'
               + '</div>';
        }
        var trackA = document.getElementById('dm-track-agentic');
        var trackB = document.getElementById('dm-track-sb');
        if (trackA) trackA.innerHTML = AGENTIC_MODULES.map(function (m, i) { return buildRow(m, i, false); }).join('');
        if (trackB) trackB.innerHTML = SECOND_BRAIN_MODULES.map(function (m, i) { return buildRow(m, i, true); }).join('');

        // Mark the active row in each list (the row whose color the course
        // card uses) — just for visual emphasis. We use a single fixed active
        // row per phase since the list scrolls past it.
        // (Optional refinement: cycle the active row during the scroll.)

        // ──────────────────────────────────────────────────────────
        // PHASE TIMING (seconds, native 1.0x audio)
        // Anchored to dynamous-midroll-v2-sync.json word ends with 0.3s
        // audio-offset (transition-in occupies 0.3s before "Over a thousand…").
        // ──────────────────────────────────────────────────────────
        var P1_END = 9.4;   // "courses." ends 9.137 + 0.3 = 9.437 → round to 9.4
        var P2_END = 16.0;  // "repeatable." ends 15.708 + 0.3 = 16.008 → 16.0
        var P3_END = 21.4;  // "Python." ends 21.142 + 0.3 = 21.442 → 21.4
        var P4_END = 27.3;  // "scratch." ends 27.016 + 0.3 = 27.316 → 27.3
        var P5_END = 30.2;  // "off." ends 29.861 + 0.3 = 30.161 → 30.2
        var DUR    = 31.5;  // composition end — leaves ~1.3s for outro fade

        var tl = gsap.timeline({ paused: true });

        // ──────────────────────────────────────────────────────────
        // GLOBAL FADE-IN (windowed container appears with a soft zoom)
        // ──────────────────────────────────────────────────────────
        tl.set('.dm-root', { opacity: 0, scale: 1.05 }, 0);
        tl.to('.dm-root',
          { opacity: 1, scale: 1, duration: 0.55, ease: 'power2.out', overwrite: 'auto' }, 0);

        // Persistent chrome — fade in shortly after the container
        tl.to('.dm-werbung', { opacity: 1, duration: 0.5, ease: 'power2.out' }, 0.3);
        tl.to('.dm-brand',   { opacity: 1, duration: 0.5, ease: 'power2.out' }, 0.3);

        // ══════════════════════════════════════════════════════════
        // PHASE 1 — Community  (0.0 → 9.4s)
        // ══════════════════════════════════════════════════════════
        tl.to('#dm-phase-1', { opacity: 1, duration: 0.5, ease: 'power2.out' }, 0.4);

        // Floating screenshots fade in low-opacity (ambient) — staggered
        tl.to('.dm-float-1', { opacity: 0.25, duration: 0.7, ease: 'power2.out' }, 0.6);
        tl.to('.dm-float-2', { opacity: 0.22, duration: 0.7, ease: 'power2.out' }, 0.7);
        tl.to('.dm-float-3', { opacity: 0.18, duration: 0.7, ease: 'power2.out' }, 0.8);
        tl.to('.dm-float-4', { opacity: 0.20, duration: 0.7, ease: 'power2.out' }, 0.9);

        // "1000+" counting number — anchored to "thousand" word at audio time 0.4s
        // (with 0.3s offset → visual time 0.7s). Count for 1.2s up to 1000.
        tl.to({}, {
          duration: 1.2,
          ease: 'power2.out',
          onUpdate: function () {
            var t = this.progress();
            var n = Math.round(t * 1000);
            var el = document.getElementById('dm-stat-num');
            if (el) el.textContent = n.toLocaleString() + '+';
          },
          onComplete: function () {
            var el = document.getElementById('dm-stat-num');
            if (el) el.textContent = '1,000+';
          }
        }, 0.7);
        tl.to('.dm-stat-label', { opacity: 1, y: 0, duration: 0.5, ease: 'power2.out' }, 1.2);

        // "Three Full Courses" tagline — anchored to "Three" word at audio 7.221s + 0.3 = 7.5s
        tl.to('#dm-stat-tagline', { opacity: 1, duration: 0.5, ease: 'power2.out' }, 7.5);

        // Event cards — anchored to "hangouts" / "workshops" words
        // hangouts: audio 2.543s + 0.3 = 2.84s
        // workshops: audio 3.657s + 0.3 = 3.96s
        tl.fromTo('#dm-event-1', { opacity: 0, x: 80 },
          { opacity: 1, x: 0, duration: 0.6, ease: 'back.out(1.4)' }, 2.84);
        tl.fromTo('#dm-event-2', { opacity: 0, x: 80 },
          { opacity: 1, x: 0, duration: 0.6, ease: 'back.out(1.4)' }, 3.20);
        tl.fromTo('#dm-event-3', { opacity: 0, x: 80 },
          { opacity: 1, x: 0, duration: 0.6, ease: 'back.out(1.4)' }, 3.96);

        // Phase 1 → Phase 2 transition (white glitch flash + crossfade)
        tl.to('#dm-flash', { opacity: 0.7, duration: 0.08, ease: 'power1.out', overwrite: 'auto' }, P1_END - 0.08);
        tl.to('#dm-flash', { opacity: 0,   duration: 0.20, ease: 'power1.in',  overwrite: 'auto' }, P1_END);
        tl.to('#dm-phase-1', { opacity: 0, duration: 0.30, ease: 'power2.in',  overwrite: 'auto' }, P1_END - 0.10);

        // ══════════════════════════════════════════════════════════
        // PHASE 2 — Agentic Coding  (9.4 → 16.0s)
        // ══════════════════════════════════════════════════════════
        tl.to('#dm-phase-2', { opacity: 1, duration: 0.4, ease: 'power2.out', overwrite: 'auto' }, P1_END);

        tl.fromTo('#dm-course-card-2', { opacity: 0, x: -80 },
          { opacity: 1, x: 0, duration: 0.6, ease: 'back.out(1.3)' }, P1_END + 0.10);

        tl.fromTo('#dm-list-agentic', { opacity: 0, x: 80 },
          { opacity: 1, x: 0, duration: 0.6, ease: 'back.out(1.3)' }, P1_END + 0.25);

        // Scroll the 18-row track upward over the phase body. With row height
        // 60px and visible window 460px, total scroll distance = 18*60 - 460 = 620px.
        var P2_SCROLL_START = P1_END + 0.6;
        var P2_SCROLL_END   = P2_END - 0.4;
        tl.fromTo('#dm-track-agentic', { y: 0 },
          { y: -620, duration: P2_SCROLL_END - P2_SCROLL_START, ease: 'none' }, P2_SCROLL_START);

        // Phase 2 → Phase 3 transition (cross-dissolve, dark)
        tl.to('#dm-phase-2', { opacity: 0, duration: 0.30, ease: 'power2.in', overwrite: 'auto' }, P2_END - 0.10);

        // ══════════════════════════════════════════════════════════
        // PHASE 3 — Agent Mastery  (16.0 → 21.4s)
        // ══════════════════════════════════════════════════════════
        tl.to('#dm-phase-3', { opacity: 1, duration: 0.4, ease: 'power2.out', overwrite: 'auto' }, P2_END);

        tl.fromTo('#dm-course-card-3', { opacity: 0, x: -80 },
          { opacity: 1, x: 0, duration: 0.6, ease: 'back.out(1.3)' }, P2_END + 0.10);

        // Highlights — staggered entrance, 5 cards over ~2.5s. Anchored just
        // after the Mastery word (audio 16.544 + 0.3 = 16.84s)
        tl.set('.dm-phase-3 .dm-highlights', { opacity: 1 }, P2_END + 0.20);
        var P3_HL_START = 16.84;
        ['.dm-highlight:nth-child(1)',
         '.dm-highlight:nth-child(2)',
         '.dm-highlight:nth-child(3)',
         '.dm-highlight:nth-child(4)',
         '.dm-highlight:nth-child(5)'].forEach(function (sel, i) {
          tl.fromTo('.dm-phase-3 ' + sel, { opacity: 0, y: 24 },
            { opacity: 1, y: 0, duration: 0.55, ease: 'back.out(1.5)' }, P3_HL_START + i * 0.34);
        });

        // Phase 3 → Phase 4 transition
        tl.to('#dm-phase-3', { opacity: 0, duration: 0.30, ease: 'power2.in', overwrite: 'auto' }, P3_END - 0.10);

        // ══════════════════════════════════════════════════════════
        // PHASE 4 — Second Brain  (21.4 → 27.3s)
        // ══════════════════════════════════════════════════════════
        tl.to('#dm-phase-4', { opacity: 1, duration: 0.4, ease: 'power2.out', overwrite: 'auto' }, P3_END);

        tl.fromTo('#dm-course-card-4', { opacity: 0, x: -80 },
          { opacity: 1, x: 0, duration: 0.6, ease: 'back.out(1.3)' }, P3_END + 0.10);

        tl.fromTo('#dm-list-sb', { opacity: 0, x: 80 },
          { opacity: 1, x: 0, duration: 0.6, ease: 'back.out(1.3)' }, P3_END + 0.25);

        // Scroll 8 rows × 64px (row 60 + 4 spacing) — using 60px — minus visible 480px:
        // total = 8*60 - 480 = 0  → there's no scroll needed; only fade.
        // Bump row height implicitly to 70px in CSS would help; instead we
        // gently scroll a few rows to hint at "more". Use small 80px shift.
        var P4_SCROLL_START = P3_END + 0.6;
        var P4_SCROLL_END   = P4_END - 0.4;
        tl.fromTo('#dm-track-sb', { y: 0 },
          { y: -100, duration: P4_SCROLL_END - P4_SCROLL_START, ease: 'none' }, P4_SCROLL_START);

        // Phase 4 → Phase 5 transition (white flash for the CTA hit)
        tl.to('#dm-flash', { opacity: 0.6, duration: 0.06, ease: 'power1.out', overwrite: 'auto' }, P4_END - 0.06);
        tl.to('#dm-flash', { opacity: 0,   duration: 0.18, ease: 'power1.in',  overwrite: 'auto' }, P4_END);
        tl.to('#dm-phase-4', { opacity: 0, duration: 0.25, ease: 'power2.in',  overwrite: 'auto' }, P4_END - 0.08);

        // ══════════════════════════════════════════════════════════
        // PHASE 5 — CTA  (27.3 → 30.2s)
        // ══════════════════════════════════════════════════════════
        tl.to('#dm-phase-5', { opacity: 1, duration: 0.4, ease: 'power2.out', overwrite: 'auto' }, P4_END);

        tl.fromTo('.dm-cta-card', { opacity: 0, scale: 0.92 },
          { opacity: 1, scale: 1, duration: 0.55, ease: 'back.out(1.4)' }, P4_END + 0.05);

        // CTA shimmer — gentle background-position drift on the gradient pill
        tl.to('#dm-cta-button',
          { backgroundPosition: '200% 0%', duration: 2.2, ease: 'none' }, P4_END + 0.4);

        // Arrow bounce on the CTA pill
        tl.to('#dm-cta-arrow', { y: 6, duration: 0.4, ease: 'sine.inOut', yoyo: true, repeat: 5 }, P4_END + 0.4);

        // "Link" word anchor: audio 27.016 + 0.3 = 27.316s. The CTA pill should
        // already be visible by then (it appears at P4_END + 0.05 = 27.35s, a hair late
        // — match by entering 0.3s earlier so it's settled by the spoken word):
        // (handled above by the 0.05s offset which lands ~27.35s, within 50ms of the word.)

        // "ten percent off" anchor: audio 28.456 + 0.3 = 28.76s. Discount badge pop:
        tl.fromTo('#dm-cta-discount', { opacity: 0, scale: 0.5 },
          { opacity: 1, scale: 1, duration: 0.45, ease: 'back.out(1.8)' }, 28.76);

        // Phase 5 → Outro transition
        tl.to('#dm-phase-5', { opacity: 0, duration: 0.30, ease: 'power2.in', overwrite: 'auto' }, P5_END - 0.10);

        // ══════════════════════════════════════════════════════════
        // OUTRO — "Back to the video."  (30.2 → 31.5s)
        // ══════════════════════════════════════════════════════════
        tl.to('#dm-phase-outro', { opacity: 1, duration: 0.4, ease: 'power2.out', overwrite: 'auto' }, P5_END);

        // "Back" word anchor: audio 29.861 + 0.3 = 30.16s
        tl.fromTo('#dm-outro-text', { opacity: 0, y: 12 },
          { opacity: 1, y: 0, duration: 0.5, ease: 'power2.out' }, 30.2);

        // Final fade-out — composition handoff back to the host video
        tl.to('.dm-root', { opacity: 0, duration: 0.7, ease: 'power2.in' }, DUR - 0.7);

        window.__timelines['dynamous-midroll'] = tl;
      })();
    </script>
