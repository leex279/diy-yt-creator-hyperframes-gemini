<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Why Claude Code Just Switched From Markdown to HTML</title>
<link rel="stylesheet" href="tokens/long-form.css">
<script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
<style>
  /* ──────────────────────────────────────────────────
     CANVAS — 1920x1080 editorial-light stage. Token
     overrides flip palette to cream + serif italic;
     this stylesheet only handles structural layout.
     ────────────────────────────────────────────────── */
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 1920px;
    height: 1080px;
    overflow: hidden;
    background: var(--bg);
    font-family: var(--serif);
    color: var(--text);
    -webkit-font-smoothing: antialiased;
  }

  /* Ambient wash — cream surface needs a much lighter touch. */
  #ambient {
    position: absolute;
    inset: -200px;
    pointer-events: none;
    z-index: 0;
  }

  /* Shape backdrop — at 2.5% opacity (per token override) on cream
     these read as ghosted brown smudges rather than dark scatter. */
  #shape-backdrop {
    position: absolute;
    inset: 0;
    pointer-events: none;
    overflow: hidden;
    z-index: 0;
  }
  #shape-backdrop img {
    position: absolute;
    object-fit: contain;
    pointer-events: none;
  }

  /* Film-grain overlay — multiply on cream (per token override). */
  #noise-overlay {
    position: absolute;
    inset: 0;
    width: 1920px;
    height: 1080px;
    pointer-events: none;
    z-index: 8;
  }

  /* ──────────────────────────────────────────────────
     TOP CHROME — mono wordmark (no image).
     ────────────────────────────────────────────────── */
  #top-banner {
    position: absolute;
    top: 36px;
    left: 0;
    width: 1920px;
    z-index: 10;
    pointer-events: none;
    text-align: center;
  }
  #top-banner-wordmark {
    font-family: var(--mono);
    font-weight: 700;
    font-size: 18px;
    letter-spacing: 6px;
    text-transform: uppercase;
    color: var(--accent-2);
    display: inline-block;
  }
  #top-banner-rule {
    width: 80px;
    height: 1.5px;
    background: var(--accent-2);
    margin: 8px auto 0;
    opacity: 0.6;
  }

  /* Slim progress bar — bottom edge */
  #progress-track {
    position: absolute;
    bottom: 0;
    left: 0;
    width: 1920px;
    height: 4px;
    z-index: 10;
  }
  #progress-fill {
    width: 0;
    height: 100%;
  }

  /* Sub-composition wrappers — each scene's container div.
     First scene starts visible. */
  .scene-wrapper {
    position: absolute;
    top: 0;
    left: 0;
    width: 1920px;
    height: 1080px;
    z-index: 1;
  }
  #scene-hook-wrap         { z-index: 1; opacity: 1; }
  #scene-image-hero-wrap   { z-index: 1; opacity: 0; visibility: hidden; }
  #scene-side-by-side-wrap { z-index: 1; opacity: 0; visibility: hidden; }
  #scene-stat-pill-row-wrap{ z-index: 1; opacity: 0; visibility: hidden; }
  #scene-source-cards-wrap { z-index: 1; opacity: 0; visibility: hidden; }
  #scene-arch-stack-wrap   { z-index: 1; opacity: 0; visibility: hidden; }
  #scene-cta-wrap          { z-index: 1; opacity: 0; visibility: hidden; }

  /* Captions wrapper sits above scenes, below noise overlay */
  #captions-wrap {
    position: absolute;
    inset: 0;
    z-index: 9;
    pointer-events: none;
  }

  /* Midroll mount — sits ABOVE every scene wrapper (z 1) and the noise
     overlay (z 8) so the dynamous-midroll fully owns the frame during its
     31.5s window. Inherits the host stage; the block draws its own dark
     surface + brand chrome. */
  #dynamous-midroll-mount {
    position: absolute;
    inset: 0;
    width: 1920px;
    height: 1080px;
    z-index: 50;
    pointer-events: none;
  }

  /* Persistent source attribution — small URL chip, bottom-right corner.
     Visible across the whole video except the midroll window (where the
     midroll's full-frame block owns the surface). z-index 10 sits above
     scenes and below the noise overlay (z 8 is below the dotted yt-safe
     placeholders inside scene-cta which use the cta sub-comp's own z). */
  #source-url {
    position: absolute;
    bottom: 24px;
    right: 24px;
    z-index: 10;
    pointer-events: none;
    display: inline-flex;
    align-items: center;
    gap: 10px;
    padding: 8px 14px;
    background: rgba(28, 26, 24, 0.06);
    border: 1px solid rgba(28, 26, 24, 0.20);
    border-radius: 8px;
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
    opacity: 0;
    font-family: var(--mono);
  }
  #source-url .source-url-label {
    font-weight: 700;
    font-size: 12px;
    letter-spacing: 4px;
    color: var(--accent-2);
    text-transform: uppercase;
  }
  #source-url .source-url-text {
    font-weight: 600;
    font-size: 18px;
    color: var(--text-secondary);
    letter-spacing: 0.2px;
  }

  /* ──────────────────────────────────────────────────
     Shared CTA components — support-banner, subscribe-banner,
     dynamous-discount-bubble. All three sit above scenes (z >= 30),
     below the noise overlay (z=8). Pointer-events disabled because
     they are visual only at render.
     ────────────────────────────────────────────────── */
  #support-banner-mount {
    position: absolute;
    inset: 0;
    width: 1920px;
    height: 1080px;
    z-index: 30;
    pointer-events: none;
  }
  #subscribe-banner-mount {
    position: absolute;
    inset: 0;
    width: 1920px;
    height: 1080px;
    z-index: 31;
    pointer-events: none;
  }

  /* COMPONENT: shared/lib/components/dynamous-discount-bubble — overrides
     the component's default Shorts position (top: 1180px) for 1920×1080:
     bottom-left, anchored inside the LEFT 1100px so the RIGHT half stays
     clear for YouTube end-screen "next video" overlays. */
  /* Bubble sits 100px lower than initial draft (bottom: 110 → 10) so it
     does NOT overlap the Phase D #pd-outro text stack which anchors at
     bottom: 110px above it. The bubble now lives in the very bottom-left
     corner of the frame, clear of all other content. */
  #dynamous-discount-bubble {
    position: absolute;
    top: auto !important;
    bottom: 10px !important;
    left: 188px !important;
    z-index: 32;
    pointer-events: none;
  }
  #dynamous-discount-bubble #ddb-mark { width: 44px; height: 44px; }
  #dynamous-discount-bubble #ddb-url { font-size: 32px; }
  #dynamous-discount-bubble #ddb-discount { font-size: 26px; padding: 8px 16px; }
  #dynamous-discount-bubble #ddb-pointer { font-size: 26px; }

  /* End-screen safe-zone placeholders at the HOST level — these overlay
     the right half of the frame during the last ~20s so the YouTube
     uploader (and the operator at QA time) sees exactly which pixels are
     reserved for "next video" cards. They stay LATENT (opacity 0) until
     scene-cta fades them in via its own scoped #yt-safe-tr/br markers
     (those are inside the cta sub-comp). The host markers below are a
     belt-and-braces redundancy that survives even if the cta sub-comp's
     dotted boxes don't render in the studio. */
  /* (no host-level safe-zone box — handled inside scene-cta to stay
     scoped to the closing window) */

  /* ──────────────────────────────────────────────────
     COMPONENT: shared/lib/components/dynamous-discount-bubble
     Inline children styling (paste-in copy from component.html — host
     positioning was overridden above; the children styles below match
     the canonical component to keep the brand mark consistent).
     ────────────────────────────────────────────────── */
  #dynamous-discount-bubble {
    display: inline-flex;
    align-items: center;
    gap: 14px;
    padding: 14px 22px;
    background: rgba(15, 23, 42, 0.85);
    border: 1px solid rgba(255, 255, 255, 0.08);
    border-radius: 14px;
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    box-shadow: 0 8px 24px rgba(0, 0, 0, 0.45);
    font-family: 'Inter', system-ui, sans-serif;
  }
  #ddb-mark {
    display: block;
  }
  #ddb-url {
    font-weight: 700;
    color: #e2e8f0;
    letter-spacing: 0.3px;
  }
  #ddb-discount {
    border-radius: 10px;
    font-weight: 900;
    color: #ffffff;
    letter-spacing: 0.5px;
    background: linear-gradient(135deg, #dc2626, #b91c1c, #dc2626);
    box-shadow: 0 2px 8px rgba(220, 38, 38, 0.35);
  }
  #ddb-pointer {
    font-weight: 600;
    color: #94a3b8;
    letter-spacing: 0.2px;
  }
  #ddb-pointer .ddb-arrow {
    display: inline-block;
    margin-left: 4px;
    transform: translateY(2px);
  }
</style>
</head>
<body>
<div id="root"
     data-composition-id="main"
     data-start="0"
     data-duration="534.5"
     data-width="1920"
     data-height="1080">

  <!-- Ambient + shape backdrop — sit behind scenes -->
  <div id="ambient"></div>
  <div id="shape-backdrop"></div>

  <!-- Slim progress bar -->
  <div id="progress-track"><div id="progress-fill"></div></div>

  <!-- ═══════════════════════════════════════════════════════
       SCENE WRAPPERS — timing pinned to transcript word offsets.
       Total narration: 532.34s (was 501.51s; +31.5 for midroll insert).
       Root duration: 534.5s (~2.16s tail after narration ends).
       Boundaries computed via tmp/extract-scene-boundaries.py.

       MIDROLL inserted at 231.902s (just after "buying.", in the natural
       pause before "Here is the part…"). Every scene boundary AFTER the
       midroll point shifts +31.5s. Pre-midroll boundaries are unchanged.

       Scene timing (data-start, seconds):
         0        → hook                ("Markdown is dying", 48.53s)
         48.53    → image-hero          ("Here is what H T M L can carry")
         122.80   → side-by-side        ("So compare. Same data, two formats")
         187.38   → stat-pill-row       ("And yes. There is a price")
         231.902  → DYNAMOUS MIDROLL    (31.5s, shared block — own narration)
         264.40   → source-cards        ("Here is the part that turns this from a thesis")
         391.50   → architecture-stack  ("So why Claude Code specifically")
         445.84   → cta                 ("Here is the part the article actually ends on")
       ═══════════════════════════════════════════════════════ -->

  <div id="scene-hook-wrap" class="scene-wrapper"
       data-composition-id="scene-hook"
       data-composition-src="compositions/scene-hook.html"
       data-start="0"
       data-track-index="1"></div>

  <div id="scene-image-hero-wrap" class="scene-wrapper"
       data-composition-id="scene-image-hero"
       data-composition-src="compositions/scene-image-hero.html"
       data-start="48.53"
       data-track-index="1"></div>

  <div id="scene-side-by-side-wrap" class="scene-wrapper"
       data-composition-id="scene-side-by-side"
       data-composition-src="compositions/scene-side-by-side.html"
       data-start="122.80"
       data-track-index="1"></div>

  <div id="scene-stat-pill-row-wrap" class="scene-wrapper"
       data-composition-id="scene-stat-pill-row"
       data-composition-src="compositions/scene-stat-pill-row.html"
       data-start="187.38"
       data-track-index="1"></div>

  <!-- DYNAMOUS MIDROLL — shared block, 31.5s, wedged between
       scene-stat-pill-row (ends ~231.9) and scene-source-cards. Mounts
       above all scenes (z=50) so the midroll dominates its window. The
       block ships brand-locked: own narration, own animation, own outro
       fade. The host pauses its narration during the midroll window via
       a 31.5s silence baked into narration.wav. -->
  <div id="dynamous-midroll-mount"
       data-composition-id="dynamous-midroll"
       data-composition-src="compositions/dynamous-midroll.html"
       data-start="231.902"
       data-duration="31.5"
       data-track-index="50"
       data-width="1920"
       data-height="1080"></div>

  <div id="scene-source-cards-wrap" class="scene-wrapper"
       data-composition-id="scene-source-cards"
       data-composition-src="compositions/scene-source-cards.html"
       data-start="264.40"
       data-track-index="1"></div>

  <div id="scene-arch-stack-wrap" class="scene-wrapper"
       data-composition-id="scene-architecture-stack"
       data-composition-src="compositions/scene-architecture-stack.html"
       data-start="391.50"
       data-track-index="1"></div>

  <div id="scene-cta-wrap" class="scene-wrapper"
       data-composition-id="scene-cta"
       data-composition-src="compositions/scene-cta.html"
       data-start="445.84"
       data-track-index="1"></div>

  <!-- Captions sub-composition — populated by `npx hyperframes transcribe`. -->
  <div id="captions-wrap"
       data-composition-id="captions"
       data-composition-src="compositions/captions.html"
       data-start="0"
       data-track-index="9"></div>

  <!-- ═══════════════════════════════════════════════════════
       SHARED CTA COMPONENTS — placed at non-overlapping moments,
       all clear of the last 20s YouTube end-screen window.
       (Times shifted +31.5 for the midroll insert at 231.902.)

         support-banner   : abs 468.34-476.84 (cta scene-rel 22.5-31)
                            Late Phase A — bottom-center, narration is
                            wrapping the "back in the loop" pivot. Banner
                            exits well before format pills appear.
         subscribe-banner : abs 500.84-508.84 (cta scene-rel 55-63)
                            Mid Phase C — between the last reply chip
                            (56.88) and the first format pill (64.72).
                            Banner click lands at +5s = abs 505.84.
                            Exits before the last-20s window (abs 514.5).
         dynamous-bubble  : abs 529.46-534.5 (cta scene-rel 83.62-end)
                            Phase D close — appears EXACTLY when the
                            narrator says "if you want to learn more
                            about A I, check out the dynamous dot A I
                            community." Anchored bottom-LEFT (host CSS
                            override), keeping the RIGHT half free for
                            YouTube's end-screen.

       BLOCK / COMPONENT references (read these for wiring rules):
         shared/lib/components/support-banner/component.html
         shared/lib/components/subscribe-banner/component.html
         shared/lib/components/dynamous-discount-bubble/component.html
       ═══════════════════════════════════════════════════════ -->
  <div id="support-banner-mount"
       data-composition-id="support-banner"
       data-composition-src="compositions/support-banner.html"
       data-start="468.34"
       data-duration="8.5"
       data-track-index="21"
       data-width="1920"
       data-height="1080"
       data-layout-allow-overflow="true"></div>

  <div id="subscribe-banner-mount"
       data-composition-id="subscribe-banner"
       data-composition-src="compositions/subscribe-banner.html"
       data-start="500.84"
       data-duration="8.0"
       data-track-index="22"
       data-width="1920"
       data-height="1080"
       data-layout-allow-overflow="true"></div>

  <!-- Dynamous discount bubble — paste-in component (NOT a sub-comp). The
       wrapper has class="clip" so the framework gates visibility by
       data-start/data-duration. Logo + URL + 10% OFF badge + "in the link
       ↓" pointer. Host CSS above repositions to bottom-LEFT for 1920x1080.
       Lifetime starts when narration says "learn more about AI" and runs
       to the very end of the composition. -->
  <div id="dynamous-discount-bubble"
       class="clip"
       data-start="529.46"
       data-duration="5.04"
       data-track-index="23">
    <img id="ddb-mark" src="assets/dynamous-logo.png" alt="Dynamous" crossorigin="anonymous" />
    <span id="ddb-url">Dynamous.ai</span>
    <span id="ddb-discount">10% OFF</span>
    <span id="ddb-pointer">in the link <span class="ddb-arrow">&darr;</span></span>
  </div>

  <!-- ═══════════════════════════════════════════════════════
       AUDIO BED — host narration + dynamous-midroll cluster.
       narration.wav is the SPLICED file: 31.5s of silence inserted at
       231.902s so the host narration "pauses" while the midroll plays.
       The midroll's own narration plays on track 7 during that gap.
       Track 2: host narration. Track 6: midroll transition SFX.
       Track 7: midroll narration. NEVER class="clip" on <audio>.
       ═══════════════════════════════════════════════════════ -->
  <audio id="narration"
         src="audio/narration.wav"
         data-start="0"
         data-duration="534.5"
         data-track-index="2"
         data-volume="1"></audio>

  <!-- Midroll transition SFX — fires at midroll start + end. Track 6
       dedicated to midroll transitions (no overlap with the cinematic
       whooshes on track 3 or the per-scene SFX on tracks 4/5). -->
  <audio id="midroll-sfx-in"
         src="audio/midroll-transition-in.mp3"
         data-start="231.902"
         data-duration="1.5"
         data-track-index="6"
         data-volume="0.20"></audio>
  <audio id="midroll-sfx-out"
         src="audio/midroll-transition-out.mp3"
         data-start="262.402"
         data-duration="1.5"
         data-track-index="6"
         data-volume="0.15"></audio>

  <!-- Midroll narration — plays during the 31.5s silence in narration.wav.
       data-start = midroll start + 0.3s audio offset (per recipe). -->
  <audio id="midroll-narration"
         src="audio/dynamous-midroll-v2.mp3"
         data-start="232.202"
         data-duration="31.0"
         data-track-index="7"
         data-volume="1.0"></audio>

  <!-- ═══════════════════════════════════════════════════════
       SFX BED — three layers:
         • Track 3: scene-transition whooshes (cinematic-whoosh, 6 cues)
         • Track 4: intro hero punctuation (10 cues, scene-hook only)
         • Track 5: subtle mid+end punctuation, typewriter clicks, banner
                    spring-pops (8 cues across the rest of the video)
       Volumes obey .claude/rules/audio-design.md SFX caps (≤ 0.25; per-cue
       defaults: impact-slam 0.13, scale-slam 0.13, spring-pop 0.10, pop
       0.07, strike-cross 0.10, glitch-zap 0.09, cinematic-whoosh 0.11).
       Intro is HEAVY by request; rest of video is SPARSE.
       ═══════════════════════════════════════════════════════ -->

  <!-- ── Track 3 — Scene-transition whooshes (cinematic-whoosh × 6) ── -->
  <audio id="sfx-whoosh-1" class="clip" src="assets/sfx/cinematic-whoosh.mp3"
         data-start="48.13"  data-duration="1.5" data-track-index="3" data-volume="0.11"></audio>
  <audio id="sfx-whoosh-2" class="clip" src="assets/sfx/cinematic-whoosh.mp3"
         data-start="122.40" data-duration="1.5" data-track-index="3" data-volume="0.11"></audio>
  <audio id="sfx-whoosh-3" class="clip" src="assets/sfx/cinematic-whoosh.mp3"
         data-start="186.98" data-duration="1.5" data-track-index="3" data-volume="0.11"></audio>
  <!-- whoosh-4 served stat-pill-row → source-cards before the midroll
       insertion. Now serves stat-pill-row → midroll, and a NEW whoosh-4b
       fires at midroll-end → source-cards crossfade (264.00). -->
  <audio id="sfx-whoosh-4" class="clip" src="assets/sfx/cinematic-whoosh.mp3"
         data-start="231.50" data-duration="1.5" data-track-index="3" data-volume="0.11"></audio>
  <audio id="sfx-whoosh-4b" class="clip" src="assets/sfx/cinematic-whoosh.mp3"
         data-start="264.00" data-duration="1.5" data-track-index="3" data-volume="0.11"></audio>
  <!-- Both whoosh-5 and whoosh-6 shifted +31.5 for the midroll insert. -->
  <audio id="sfx-whoosh-5" class="clip" src="assets/sfx/cinematic-whoosh.mp3"
         data-start="391.10" data-duration="1.5" data-track-index="3" data-volume="0.11"></audio>
  <audio id="sfx-whoosh-6" class="clip" src="assets/sfx/cinematic-whoosh.mp3"
         data-start="445.44" data-duration="1.5" data-track-index="3" data-volume="0.11"></audio>

  <!-- ── Track 4 — INTRO hero punctuation (scene-hook 0-48.53s) ──
       Aligned to scene-hook GSAP beats: word slams, card reveals, stat
       counters, WAIT slam, indictment chips, title slam. Heavy on
       purpose — the hook needs to grab attention. -->
  <audio id="sfx-intro-1" class="clip" src="assets/sfx/impact-slam.mp3"
         data-start="0.04"  data-duration="0.7" data-track-index="4" data-volume="0.13"></audio>
  <audio id="sfx-intro-2" class="clip" src="assets/sfx/spring-pop.mp3"
         data-start="4.50"  data-duration="0.5" data-track-index="4" data-volume="0.10"></audio>
  <audio id="sfx-intro-3" class="clip" src="assets/sfx/impact-slam.mp3"
         data-start="9.00"  data-duration="0.7" data-track-index="4" data-volume="0.12"></audio>
  <audio id="sfx-intro-4" class="clip" src="assets/sfx/scale-slam.mp3"
         data-start="11.44" data-duration="0.6" data-track-index="4" data-volume="0.13"></audio>
  <audio id="sfx-intro-5" class="clip" src="assets/sfx/pop.mp3"
         data-start="13.82" data-duration="0.3" data-track-index="4" data-volume="0.07"></audio>
  <audio id="sfx-intro-6" class="clip" src="assets/sfx/pop.mp3"
         data-start="16.31" data-duration="0.3" data-track-index="4" data-volume="0.07"></audio>
  <audio id="sfx-intro-7" class="clip" src="assets/sfx/impact-slam.mp3"
         data-start="23.00" data-duration="0.7" data-track-index="4" data-volume="0.13"></audio>
  <audio id="sfx-intro-8" class="clip" src="assets/sfx/spring-pop.mp3"
         data-start="27.48" data-duration="0.5" data-track-index="4" data-volume="0.09"></audio>
  <audio id="sfx-intro-9" class="clip" src="assets/sfx/strike-cross.mp3"
         data-start="32.50" data-duration="0.5" data-track-index="4" data-volume="0.10"></audio>
  <audio id="sfx-intro-10" class="clip" src="assets/sfx/scale-slam.mp3"
         data-start="37.00" data-duration="0.7" data-track-index="4" data-volume="0.13"></audio>

  <!-- ── Track 5 — REST OF VIDEO subtle punctuation (sparse on purpose) ──
       Mid: one big "two to four x" stat reveal in scene-stat-pill-row.
       End: typewriter clicks during pull-quote (449.6-452.9), spring-pop
            on subscribe-banner entrance, pop on dynamous bubble entrance. -->
  <audio id="sfx-mid-stat" class="clip" src="assets/sfx/scale-slam.mp3"
         data-start="195.84" data-duration="0.6" data-track-index="5" data-volume="0.12"></audio>

  <!-- Typewriter clicks during pull-quote typing (4 subtle pop hits across
       the 4.35s typing window). Volume kept low (0.06) — they're ambient
       texture, not punctuation. Shifted +31.5 for the midroll insert. -->
  <audio id="sfx-tw-1" class="clip" src="assets/sfx/pop.mp3"
         data-start="481.10" data-duration="0.25" data-track-index="5" data-volume="0.06"></audio>
  <audio id="sfx-tw-2" class="clip" src="assets/sfx/pop.mp3"
         data-start="482.20" data-duration="0.25" data-track-index="5" data-volume="0.06"></audio>
  <audio id="sfx-tw-3" class="clip" src="assets/sfx/pop.mp3"
         data-start="483.30" data-duration="0.25" data-track-index="5" data-volume="0.06"></audio>
  <audio id="sfx-tw-4" class="clip" src="assets/sfx/pop.mp3"
         data-start="484.35" data-duration="0.25" data-track-index="5" data-volume="0.06"></audio>

  <!-- subscribe-banner spring-in (banner enters at 500.84 = 469.34 + 31.5) -->
  <audio id="sfx-cta-subscribe" class="clip" src="assets/sfx/spring-pop.mp3"
         data-start="500.84" data-duration="0.5" data-track-index="5" data-volume="0.10"></audio>

  <!-- dynamous-discount-bubble spring-in (bubble enters at 529.46 = 497.96 + 31.5) -->
  <audio id="sfx-cta-dynamous" class="clip" src="assets/sfx/pop.mp3"
         data-start="529.46" data-duration="0.3" data-track-index="5" data-volume="0.08"></audio>

  <!-- Persistent source URL — bottom-right watermark across the full video.
       Hidden during the dynamous midroll window (231.5-263.9) so the
       midroll's brand chrome owns the frame. -->
  <div id="source-url">
    <span class="source-url-label">Source</span>
    <span class="source-url-text">thariqs.github.io/html-effectiveness</span>
  </div>

  <!-- Film-grain overlay — last child so it tints everything below. -->
  <svg id="noise-overlay" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <filter id="noise-filter" x="0%" y="0%" width="100%" height="100%">
        <feTurbulence type="fractalNoise" baseFrequency="0.7" numOctaves="4" seed="42" stitchTiles="stitch" result="noise" />
        <feColorMatrix type="saturate" values="0" in="noise" result="monoNoise" />
      </filter>
    </defs>
    <rect width="100%" height="100%" filter="url(#noise-filter)" fill="white" />
  </svg>
</div>

<script>
  // ─────────────────────────────────────────────────────
  // Shape backdrop — deterministic seeded scatter.
  // ─────────────────────────────────────────────────────
  function seedHash(seed) {
    let h = 1779033703 ^ seed.length;
    for (let i = 0; i < seed.length; i++) {
      h = Math.imul(h ^ seed.charCodeAt(i), 3432918353);
      h = (h << 13) | (h >>> 19);
    }
    h = Math.imul(h ^ (h >>> 16), 2246822507);
    h = Math.imul(h ^ (h >>> 13), 3266489909);
    h ^= h >>> 16;
    return (h >>> 0) / 4294967296;
  }

  function spawnShapes(seedPrefix, container) {
    const shapes = ['assets/shapes/shape1.svg', 'assets/shapes/shape2.svg', 'assets/shapes/shape3.svg'];
    const count = 14, w = 1920, h = 1080, minSize = 200, sizeRange = 220;
    const minDist = 360, MAX_TRIES = 80;
    const placed = [];
    let attempt = 0;
    for (let i = 0; i < count; i++) {
      let best = null, bestScore = -1;
      for (let t = 0; t < MAX_TRIES; t++) {
        const seed = seedPrefix + '-' + i + '-' + attempt++;
        const size = minSize + seedHash(seed + '-size') * sizeRange;
        const cx = seedHash(seed + '-x') * (w - size * 0.4) + size * 0.2;
        const cy = seedHash(seed + '-y') * (h - size * 0.4) + size * 0.2;
        const rot = (seedHash(seed + '-rot') - 0.5) * 90;
        let nearest = Infinity;
        for (const p of placed) {
          const dx = cx - p.cx, dy = cy - p.cy;
          const d2 = dx * dx + dy * dy;
          if (d2 < nearest) nearest = d2;
        }
        if (nearest >= minDist * minDist) { best = { cx, cy, size, rot }; break; }
        if (nearest > bestScore) { bestScore = nearest; best = { cx, cy, size, rot }; }
      }
      placed.push(best);
      const img = document.createElement('img');
      img.src = shapes[i % shapes.length];
      img.style.cssText =
        'left:' + (best.cx - best.size / 2) + 'px;' +
        'top:' + (best.cy - best.size / 2) + 'px;' +
        'width:' + best.size + 'px;' +
        'height:' + best.size + 'px;';
      container.appendChild(img);
      gsap.set(img, { rotation: best.rot });
    }
  }

  // Re-randomise shape positions at every scene boundary. Each scene gets a
  // fresh deterministic placement (overlap-aware, mirrors spawnShapes); the
  // tween animates over the crossfade window so it reads as part of the
  // scene transition rather than independent drift.
  function repositionShapesPerScene(tl, container, seedPrefix, sceneStartTimes) {
    const imgs = Array.from(container.querySelectorAll('img'));
    if (!imgs.length || !sceneStartTimes.length) return;
    const w = 1920, h = 1080, minDist = 360, MAX_TRIES = 80;
    const anchors = imgs.map(img => ({
      left: parseFloat(img.style.left),
      top:  parseFloat(img.style.top),
      size: parseFloat(img.style.width),
    }));
    sceneStartTimes.forEach((sceneT, sceneIdx) => {
      const placed = [];
      let attempt = 0;
      const positions = imgs.map((img, i) => {
        const size = anchors[i].size;
        let best = null, bestScore = -1;
        for (let t = 0; t < MAX_TRIES; t++) {
          const seed = seedPrefix + '-scene' + sceneIdx + '-' + i + '-' + (attempt++);
          const cx = seedHash(seed + '-x') * (w - size * 0.4) + size * 0.2;
          const cy = seedHash(seed + '-y') * (h - size * 0.4) + size * 0.2;
          const rot = (seedHash(seed + '-rot') - 0.5) * 90;
          let nearest = Infinity;
          for (const p of placed) {
            const dx = cx - p.cx, dy = cy - p.cy;
            const d2 = dx * dx + dy * dy;
            if (d2 < nearest) nearest = d2;
          }
          if (nearest >= minDist * minDist) { best = { cx, cy, rot }; break; }
          if (nearest > bestScore) { bestScore = nearest; best = { cx, cy, rot }; }
        }
        placed.push({ cx: best.cx, cy: best.cy });
        return {
          x: (best.cx - size / 2) - anchors[i].left,
          y: (best.cy - size / 2) - anchors[i].top,
          rot: best.rot,
        };
      });
      tl.to(imgs, {
        x: (i) => positions[i].x,
        y: (i) => positions[i].y,
        rotation: (i) => positions[i].rot,
        duration: 1.4,
        ease: 'power2.inOut',
      }, sceneT - 0.4);
    });
  }

  // Crossfade two scene wrappers at the root timeline level.
  // atTime MUST be a numeric absolute time (seconds). Label-relative strings
  // like "label-=0.4" cannot be passed because string + number concatenation
  // (atTime + 0.3) collapses to a malformed position.
  function crossfadeScenes(tl, fromSel, toSel, atTime) {
    tl.to(fromSel, { filter: "blur(20px)", scale: 1.04, duration: 0.5, ease: "power1.in" }, atTime);
    tl.to(fromSel, { opacity: 0, duration: 0.4, ease: "power1.in" }, atTime + 0.3);
    tl.set(fromSel, { visibility: "hidden" }, atTime + 0.7);
    tl.set(toSel,   { filter: "blur(20px)", scale: 0.97, opacity: 0, visibility: "visible" }, atTime + 0.4);
    tl.to(toSel,    { opacity: 1, duration: 0.3, ease: "power1.inOut", overwrite: "auto" }, atTime + 0.4);
    tl.to(toSel,    { filter: "blur(0px)", scale: 1, duration: 0.5, ease: "power1.out", overwrite: "auto" }, atTime + 0.6);
  }

  // ─────────────────────────────────────────────────────
  // Root timeline construction
  // ─────────────────────────────────────────────────────
  spawnShapes('html-vs-markdown', document.getElementById('shape-backdrop'));

  window.__timelines = window.__timelines || {};
  const TOTAL_DURATION = 534.5;
  const tl = gsap.timeline({ paused: true });

  // Ambient breath across full duration. Cream needs a much lighter ambient
  // (we override it via #ambient css to be subtle warm radials). 60s cycle
  // × yoyo × repeat: 8 = 540s, just past the new 534.5s total.
  tl.fromTo("#ambient",
    { opacity: 0.6, scale: 1.0 },
    { opacity: 1.0, scale: 1.04, duration: 60, ease: "sine.inOut", yoyo: true, repeat: 8 },
    0);

  // Reposition shapes at each scene change — paired with cinematic-whoosh SFX
  // wired below. The midroll insertion adds a NEW scene boundary at 264.00
  // (midroll → source-cards). All later boundaries shift +31.5.
  repositionShapesPerScene(
    tl,
    document.getElementById('shape-backdrop'),
    'html-vs-markdown',
    [48.53, 122.80, 187.38, 231.50, 264.00, 391.50, 445.84]
  );

  // Linear progress fill across the composition
  tl.fromTo("#progress-fill",
    { width: 0 },
    { width: 1920, duration: TOTAL_DURATION, ease: "none" },
    0);

  // ─── Scene labels — anchored to transcript word offsets ───
  // Post-midroll labels shifted +31.5; "midroll" label added at 231.902.
  tl.addLabel("hook",          0)
    .addLabel("image-hero",    48.53)
    .addLabel("side-by-side",  122.80)
    .addLabel("stat-pills",    187.38)
    .addLabel("midroll",       231.902)
    .addLabel("source-cards",  264.40)
    .addLabel("arch-stack",    391.50)
    .addLabel("cta",           445.84);

  // ─── Crossfades between adjacent scenes ───
  // Crossfade timing = scene_start - 0.4s (so incoming wrap is rising as outgoing wrap fades).
  // Numeric absolute times (label-relative strings break atTime + 0.3 math inside crossfadeScenes).
  // Stat-pill-row → midroll AND midroll → source-cards are handled by separate
  // fade-in/out tweens below (the midroll mount has its own internal animation;
  // it doesn't need crossfadeScenes blur/scale on entry).
  crossfadeScenes(tl, "#scene-hook-wrap",          "#scene-image-hero-wrap",   48.13);   // 48.53 - 0.4
  crossfadeScenes(tl, "#scene-image-hero-wrap",    "#scene-side-by-side-wrap", 122.40);  // 122.80 - 0.4
  crossfadeScenes(tl, "#scene-side-by-side-wrap",  "#scene-stat-pill-row-wrap",186.98);  // 187.38 - 0.4
  // stat-pill-row → midroll: just fade the outgoing scene (midroll handles its own entry).
  tl.to("#scene-stat-pill-row-wrap", { filter: "blur(20px)", scale: 1.04, duration: 0.5, ease: "power1.in" }, 231.50);
  tl.to("#scene-stat-pill-row-wrap", { opacity: 0, duration: 0.4, ease: "power1.in" }, 231.80);
  tl.set("#scene-stat-pill-row-wrap", { visibility: "hidden" }, 232.20);
  // midroll → source-cards: fade midroll out (its outro fade lands at 263.4),
  // crossfade source-cards in at 264.00 (= 264.40 - 0.4).
  tl.set("#scene-source-cards-wrap", { filter: "blur(20px)", scale: 0.97, opacity: 0, visibility: "visible" }, 264.00);
  tl.to("#scene-source-cards-wrap",  { opacity: 1, duration: 0.3, ease: "power1.inOut", overwrite: "auto" }, 264.00);
  tl.to("#scene-source-cards-wrap",  { filter: "blur(0px)", scale: 1, duration: 0.5, ease: "power1.out", overwrite: "auto" }, 264.20);
  // Remaining crossfades — both shifted +31.5 for the midroll insert.
  crossfadeScenes(tl, "#scene-source-cards-wrap",  "#scene-arch-stack-wrap",   391.10);  // 391.50 - 0.4
  crossfadeScenes(tl, "#scene-arch-stack-wrap",    "#scene-cta-wrap",          445.44);  // 445.84 - 0.4

  // Persistent source-URL watermark — fade in at 0.6s (just after the
   // hook's first word lands so it doesn't compete with the cold open),
   // hide during the midroll window, and reveal again when the host
   // narration resumes ("Here is the part that turns this from a thesis…"
   // at abs 264.40, give it 0.3s breath after the midroll outro fade).
  tl.to("#source-url", { opacity: 1, duration: 0.6, ease: "power2.out" }, 0.6);
  tl.to("#source-url", { opacity: 0, duration: 0.4, ease: "power1.in" }, 231.50);
  tl.to("#source-url", { opacity: 1, duration: 0.5, ease: "power2.out" }, 263.80);

  // Dynamous discount bubble — slide-up + fade-in at narration anchor
  // ("learn more about AI" = abs 529.46 = 497.96 + 31.5 for midroll), pulse
  // on "dynamous" (abs 530.84), fade out at the very tail. All times
  // shifted +31.5 for the midroll insert.
  tl.from("#dynamous-discount-bubble",
    { y: 18, opacity: 0, duration: 0.55, ease: "back.out(1.4)", immediateRender: false },
    529.46);
  tl.to("#dynamous-discount-bubble",
    { scale: 1.04, duration: 0.35, yoyo: true, repeat: 1, ease: "power2.out", transformOrigin: "left center" },
    530.84);
  tl.to("#dynamous-discount-bubble",
    { opacity: 0, duration: 0.6, ease: "power1.in", overwrite: "auto" },
    533.5);

  // Pad timeline to the full composition duration
  tl.set({}, {}, TOTAL_DURATION);

  window.__timelines["main"] = tl;
</script>
</body>
</html>
