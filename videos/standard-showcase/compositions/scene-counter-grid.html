<!--
  scene-counter-grid.html — 3 parallel counters in a vertical stack (~7s).

  Pattern: header → 3 stat rows, each with its own counter + label.
           Demonstrates parallel deterministic counter animations.
           Different from scene-stat (single huge number) — shows
           how multiple metrics can stand together.
  Self-contained sub-composition with paused timeline at
  window.__timelines["scene-counter-grid"].
-->
<template id="scene-counter-grid-template">
  <div data-composition-id="scene-counter-grid"
       data-start="0"
       data-width="1080"
       data-height="1920"
       style="position:absolute; inset:0; overflow:hidden;">

    <style>
      #scene-counter-grid-content {
        width:100%; height:100%;
        padding: var(--pad-top) var(--pad-x) var(--pad-bottom);
        display:flex; flex-direction:column;
        align-items:center; justify-content:center;
        text-align:center; gap:36px;
        box-sizing:border-box;
      }
      #scene-counter-grid-content .header {
        font-family: var(--serif);
        font-weight: 700;
        font-size: 76px;
        line-height: 1.05;
        letter-spacing: -1px;
        color: var(--accent-ink);
        max-width: 880px;
      }
      #scene-counter-grid-content .header .em {
        color: var(--accent-warm);
        font-style: italic;
      }
      #scene-counter-grid-content .stack {
        display: flex; flex-direction: column; gap: 22px;
        width: 920px;
      }
      #scene-counter-grid-content .row {
        display: flex; align-items: baseline; justify-content: space-between;
        padding: 28px 36px;
        background: var(--bg-card);
        border: 1.5px solid var(--border);
        border-radius: 22px;
        box-shadow: var(--shadow-warm);
      }
      #scene-counter-grid-content .num {
        font-family: var(--sans);
        font-weight: 900;
        font-size: 140px;
        line-height: 1.0;
        letter-spacing: -5px;
        font-variant-numeric: tabular-nums lining-nums;
      }
      #scene-counter-grid-content .row.r1 .num { color: var(--accent-warm); }
      #scene-counter-grid-content .row.r2 .num { color: var(--accent-deep); }
      #scene-counter-grid-content .row.r3 .num { color: var(--accent-sage); }
      #scene-counter-grid-content .num .suffix {
        font-family: var(--serif);
        font-style: italic;
        font-weight: 700;
        font-size: 56px;
        margin-left: 4px;
      }
      #scene-counter-grid-content .row.r1 .suffix { color: var(--accent-warm); }
      #scene-counter-grid-content .row.r2 .suffix { color: var(--accent-deep); }
      #scene-counter-grid-content .row.r3 .suffix { color: var(--accent-sage); }
      #scene-counter-grid-content .label {
        font-family: var(--mono);
        font-weight: 700;
        font-size: 28px;
        letter-spacing: 3px;
        text-transform: uppercase;
        color: var(--text-secondary);
        text-align: right;
        max-width: 320px;
        line-height: 1.3;
      }
    </style>

    <div id="scene-counter-grid-content">
      <div class="header" id="cg-header">
        Three numbers <span class="em">at once.</span>
      </div>
      <div class="stack">
        <div class="row r1" id="cg-r1">
          <span class="num"><span class="value" id="cg-num-1">0</span><span class="suffix">%</span></span>
          <span class="label">deterministic</span>
        </div>
        <div class="row r2" id="cg-r2">
          <span class="num"><span class="value" id="cg-num-2">0</span><span class="suffix">scenes</span></span>
          <span class="label">archetypes</span>
        </div>
        <div class="row r3" id="cg-r3">
          <span class="num"><span class="value" id="cg-num-3">0</span><span class="suffix">fps</span></span>
          <span class="label">standard</span>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({ paused: true });

      // Three parallel counter tweens — each updates its own DOM node.
      const c1 = { v: 0 }, c2 = { v: 0 }, c3 = { v: 0 };
      const num1 = document.getElementById('cg-num-1');
      const num2 = document.getElementById('cg-num-2');
      const num3 = document.getElementById('cg-num-3');

      tl.from("#cg-header", { y: 24, opacity: 0, duration: 0.6, ease: "power3.out" }, 0);
      tl.from("#cg-r1", { y: 30, scale: 0.92, opacity: 0, duration: 0.55, ease: "back.out(1.5)" }, 0.5);
      tl.from("#cg-r2", { y: 30, scale: 0.92, opacity: 0, duration: 0.55, ease: "back.out(1.5)" }, 0.85);
      tl.from("#cg-r3", { y: 30, scale: 0.92, opacity: 0, duration: 0.55, ease: "back.out(1.5)" }, 1.2);

      // Counters animate from 0 to their targets after the rows settle.
      tl.to(c1, { v: 100, duration: 1.4, ease: "power2.out", onUpdate: () => { num1.textContent = Math.round(c1.v); } }, 1.0);
      tl.to(c2, { v: 9,   duration: 1.4, ease: "power2.out", onUpdate: () => { num2.textContent = Math.round(c2.v); } }, 1.3);
      tl.to(c3, { v: 30,  duration: 1.4, ease: "power2.out", onUpdate: () => { num3.textContent = Math.round(c3.v); } }, 1.6);

      window.__timelines["scene-counter-grid"] = tl;
    </script>
  </div>
</template>
