<!--
  scene-typewriter.html — Agent behavior payoff (36.4–41.8s, scene-rel 0–5.4s).
  Beats:
    0.04 — "When you give it H T M L,"
    1.90 — "the agent stops faking the chart"
    3.59 — "and just DRAWS IT." with chart visual
-->
<template id="scene-typewriter-template">
  <div data-composition-id="scene-typewriter"
       data-start="0"
       data-width="1080"
       data-height="1920"
       style="position:absolute; inset:0; overflow:hidden;
              font-family:var(--serif); color:var(--text);">

    <style>
      #sw-content {
        width: 100%; height: 100%;
        padding: var(--pad-top) var(--pad-x) var(--pad-bottom);
        position: relative;
        box-sizing: border-box;
        display: flex;
        flex-direction: column;
        justify-content: center;
        gap: 36px;
      }
      .sw-overline {
        font-family: var(--mono);
        font-weight: 700;
        font-size: 28px;
        letter-spacing: 6px;
        text-transform: uppercase;
        color: var(--accent-2);
      }
      .sw-line {
        font-family: var(--serif);
        font-weight: 800;
        font-size: 72px;
        line-height: 1.0;
        letter-spacing: -1px;
        color: var(--text);
      }
      .sw-line .sw-em {
        font-style: italic;
        color: var(--accent-1);
      }
      .sw-strike {
        position: relative;
        display: inline-block;
      }
      .sw-strike::after {
        content: "";
        position: absolute;
        left: 0;
        top: 56%;
        height: 8px;
        width: 0;
        background: var(--text-muted);
        border-radius: 3px;
      }
      .sw-strike.is-on::after {
        animation: sw-strike-grow 0.5s ease-out forwards;
      }
      @keyframes sw-strike-grow {
        from { width: 0; }
        to   { width: 100%; }
      }
      .sw-chart {
        background: var(--bg-card);
        border: 2px solid var(--accent-1);
        border-radius: 18px;
        padding: 28px;
        margin-top: 18px;
      }
      .sw-chart-head {
        font-family: var(--mono);
        font-weight: 700;
        font-size: 22px;
        letter-spacing: 3px;
        text-transform: uppercase;
        color: var(--accent-2);
        margin-bottom: 16px;
      }
      .sw-chart svg {
        width: 100%;
        height: 280px;
        display: block;
      }
    </style>

    <div id="sw-content">
      <div class="sw-overline" id="sw-overline">RESULT</div>

      <div class="sw-line" id="sw-l1">
        <span id="sw-w1">When you give it </span><span class="sw-em" id="sw-w2">H T M L,</span>
      </div>

      <div class="sw-line" id="sw-l2">
        <span class="sw-strike" id="sw-strike-host">the agent stops <span style="color:var(--text-muted)">faking</span> the chart</span>
      </div>

      <div class="sw-line" id="sw-l3">
        <span id="sw-l3-1">and just </span><span class="sw-em" id="sw-l3-em">draws it.</span>
      </div>

      <div class="sw-chart" id="sw-chart">
        <div class="sw-chart-head">REAL S V G</div>
        <svg viewBox="0 0 600 280" preserveAspectRatio="none" data-layout-allow-overflow="true">
          <rect class="sw-bar" id="sw-bar-1" x="40"  y="100" width="80" height="160" fill="#C75A3F" data-layout-allow-overflow="true" />
          <rect class="sw-bar" id="sw-bar-2" x="160" y="160" width="80" height="100" fill="#C75A3F" data-layout-allow-overflow="true" />
          <rect class="sw-bar" id="sw-bar-3" x="280" y="60"  width="80" height="200" fill="#586F4F" data-layout-allow-overflow="true" />
          <rect class="sw-bar" id="sw-bar-4" x="400" y="120" width="80" height="140" fill="#586F4F" data-layout-allow-overflow="true" />
          <rect class="sw-bar" id="sw-bar-5" x="520" y="80"  width="60" height="180" fill="#C75A3F" data-layout-allow-overflow="true" />
          <line x1="20" y1="265" x2="600" y2="265" stroke="#1A1815" stroke-width="2" />
        </svg>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({ paused: true, defaults: { ease: "power3.out" } });

      const bars = ["#sw-bar-1","#sw-bar-2","#sw-bar-3","#sw-bar-4","#sw-bar-5"];

      tl.set("#sw-overline", { y: -8, opacity: 0 }, 0);
      tl.set("#sw-w1",       { y: 16, opacity: 0 }, 0);
      tl.set("#sw-w2",       { y: 16, opacity: 0 }, 0);
      tl.set("#sw-l2",       { y: 16, opacity: 0 }, 0);
      tl.set("#sw-l3-1",     { y: 16, opacity: 0 }, 0);
      tl.set("#sw-l3-em",    { y: 16, opacity: 0, scale: 0.85, filter: "blur(15px)" }, 0);
      tl.set("#sw-chart",    { y: 24, opacity: 0, scale: 0.94 }, 0);
      bars.forEach(s => tl.set(s, { scaleY: 0 }, 0));

      tl.to("#sw-overline", { y: 0, opacity: 1, duration: 0.4 }, 0.04);
      tl.to("#sw-w1",       { y: 0, opacity: 1, duration: 0.45 }, 0.04);
      tl.to("#sw-w2",       { y: 0, opacity: 1, duration: 0.45 }, 0.95);

      tl.to("#sw-l2",       { y: 0, opacity: 1, duration: 0.5 }, 1.90);
      tl.add(() => {
        const el = document.getElementById('sw-strike-host');
        if (el) el.classList.add('is-on');
      }, 2.60);

      tl.to("#sw-l3-1",  { y: 0, opacity: 1, duration: 0.45 }, 3.59);
      tl.to("#sw-l3-em", { y: 0, opacity: 1, scale: 1, filter: "blur(0px)", duration: 0.55, ease: "back.out(1.5)" }, 3.95);

      tl.to("#sw-chart", { y: 0, opacity: 1, scale: 1, duration: 0.5 }, 3.95);
      bars.forEach((s, i) => {
        tl.to(s, { scaleY: 1, duration: 0.45, ease: "power3.out" }, 4.10 + i * 0.10);
      });

      window.__timelines["scene-typewriter"] = tl;
    </script>

    <style>
      .sw-bar {
        transform-box: fill-box;
        transform-origin: 50% 100%;
      }
    </style>
  </div>
</template>
