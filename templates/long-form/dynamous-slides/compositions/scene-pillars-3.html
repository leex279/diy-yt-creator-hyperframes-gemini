<!--
  scene-pillars-3.html — Three-pillar grid (Plan / Implement / Validate archetype).

  STEP-BY-STEP REVEAL (per .claude/rules/step-by-step-reveal.md): each pillar
  enters on its own beat ~4-5s apart, paced for narration. Bottom rule
  fills (scaleX 0 → 1) AFTER each card is in place. Never reveal all at once.

  Default duration: 15s. With 3 pillars at ~4s spacing + 2s eyebrow tail-hold,
  this leaves room for narration to introduce each pillar by name.
-->
<template id="scene-pillars-3-template">
  <div data-composition-id="scene-pillars-3"
       data-start="0"
       data-width="1920"
       data-height="1080"
       style="position:absolute; inset:0; overflow:hidden;
              font-family:var(--font-display); color:var(--ink);">

    <style>
      #pillars-content {
        width:100%; height:100%;
        padding: var(--pad-top) var(--pad-x) var(--pad-bottom);
        display:flex; flex-direction:column;
        align-items:flex-start; justify-content:center;
        gap: 38px;
        box-sizing:border-box;
      }
      #pillars-content .eyebrow {
        font-family: var(--font-data);
        font-size: 22px;
        font-weight: 500;
        letter-spacing: 0.32em;
        text-transform: uppercase;
        color: var(--accent-2);
        display: inline-flex; align-items: center; gap: 18px;
      }
      #pillars-content .eyebrow::before {
        content: ""; display: inline-block;
        width: 56px; height: 2px;
        background: var(--accent-2);
      }
      #pillars-content .headline {
        font-family: var(--font-display);
        font-weight: 700;
        font-size: 76px;
        line-height: 1.0;
        letter-spacing: -0.025em;
        color: var(--ink);
        max-width: 1500px;
      }
      #pillars-content .pillars {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 32px;
        width: 100%;
        margin-top: 20px;
      }
      #pillars-content .pillar {
        background: rgba(255,255,255,0.03);
        border: 1px solid rgba(255,255,255,0.10);
        border-radius: 18px;
        padding: 56px 48px;
        display: flex; flex-direction: column; gap: 30px;
        min-height: 460px;
        position: relative;
        overflow: hidden;
      }
      #pillars-content .pillar-rule {
        position: absolute;
        left: 0; bottom: 0;
        width: 100%;
        height: 4px;
        background: var(--accent);
        transform-origin: left center;
        transform: scaleX(0);
        box-shadow: 0 0 16px rgba(59, 130, 246, 0.6);
      }
      #pillars-content .pillar-num {
        font-family: var(--font-data);
        font-size: 26px;
        font-weight: 500;
        letter-spacing: 0.06em;
        color: var(--accent-2);
      }
      #pillars-content .pillar-title {
        font-family: var(--font-display);
        font-weight: 700;
        font-size: 72px;
        line-height: 1.0;
        letter-spacing: -0.02em;
        color: var(--ink);
        margin-top: auto;
      }
      #pillars-content .pillar-sub {
        font-family: var(--font-display);
        font-weight: 400;
        font-size: 30px;
        line-height: 1.32;
        color: var(--muted);
        margin-top: -8px;
      }
    </style>

    <div id="pillars-content">
      <div class="eyebrow" id="pl-eyebrow">REPLACE: KICKER</div>
      <h2 class="headline" id="pl-headline">REPLACE: the loop in three moves.</h2>
      <div class="pillars">
        <div class="pillar" id="pl-p1">
          <div class="pillar-num">01 &middot; REPLACE</div>
          <div class="pillar-title">Plan.</div>
          <div class="pillar-sub">REPLACE: short description of step one.</div>
          <div class="pillar-rule"></div>
        </div>
        <div class="pillar" id="pl-p2">
          <div class="pillar-num">02 &middot; REPLACE</div>
          <div class="pillar-title">Implement.</div>
          <div class="pillar-sub">REPLACE: short description of step two.</div>
          <div class="pillar-rule"></div>
        </div>
        <div class="pillar" id="pl-p3">
          <div class="pillar-num">03 &middot; REPLACE</div>
          <div class="pillar-title">Validate.</div>
          <div class="pillar-sub">REPLACE: short description of step three.</div>
          <div class="pillar-rule"></div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({ paused: true });

      // Hidden at t=0 — explicit, no flash
      tl.set("#pl-eyebrow",  { y: 24, autoAlpha: 0 }, 0);
      tl.set("#pl-headline", { y: 30, autoAlpha: 0 }, 0);
      tl.set("#pl-p1", { y: 80, autoAlpha: 0 }, 0);
      tl.set("#pl-p2", { y: 80, autoAlpha: 0 }, 0);
      tl.set("#pl-p3", { y: 80, autoAlpha: 0 }, 0);
      tl.set("#pl-p1 .pillar-rule", { scaleX: 0 }, 0);
      tl.set("#pl-p2 .pillar-rule", { scaleX: 0 }, 0);
      tl.set("#pl-p3 .pillar-rule", { scaleX: 0 }, 0);

      // Header beat
      tl.to("#pl-eyebrow",  { y: 0, autoAlpha: 1, duration: 0.5, ease: "power2.out" }, 0.2);
      tl.to("#pl-headline", { y: 0, autoAlpha: 1, duration: 0.65, ease: "power3.out" }, 0.5);

      // Step-by-step pillar reveal — paced ~4s apart
      tl.to("#pl-p1", { y: 0, autoAlpha: 1, duration: 0.6, ease: "back.out(1.3)" }, 2.0);
      tl.to("#pl-p1 .pillar-rule", { scaleX: 1, duration: 0.55, ease: "power2.out" }, 2.5);

      tl.to("#pl-p2", { y: 0, autoAlpha: 1, duration: 0.6, ease: "back.out(1.3)" }, 6.0);
      tl.to("#pl-p2 .pillar-rule", { scaleX: 1, duration: 0.55, ease: "power2.out" }, 6.5);

      tl.to("#pl-p3", { y: 0, autoAlpha: 1, duration: 0.6, ease: "back.out(1.3)" }, 10.0);
      tl.to("#pl-p3 .pillar-rule", { scaleX: 1, duration: 0.55, ease: "power2.out" }, 10.5);

      // Tail-hold beat — subtle scale pulse on all three at the end
      tl.to(["#pl-p1", "#pl-p2", "#pl-p3"], {
        scale: 1.015, duration: 1.2, ease: "sine.inOut", yoyo: true, repeat: 1,
        stagger: 0.08
      }, 12.5);

      window.__timelines["scene-pillars-3"] = tl;
    </script>
  </div>
</template>
