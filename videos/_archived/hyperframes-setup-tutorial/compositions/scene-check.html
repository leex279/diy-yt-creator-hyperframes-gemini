<!--
  scene-check.html — terminal showing real `npx hyperframes check` output
  captured from `tmp/demo-capture/my-video` (lint + validate + inspect).
  Pattern: tl.set() at t=0 + tl.to() animations.
-->
<template id="scene-check-template">
  <div data-composition-id="scene-check"
       data-start="0"
       data-width="1920"
       data-height="1080"
       style="position:absolute; inset:0; overflow:hidden;
              font-family:var(--sans); color:var(--text);">

    <style>
      #ck-content {
        width:100%; height:100%;
        padding: 80px var(--pad-x) 80px;
        display:flex; flex-direction:column;
        align-items:center; justify-content:center;
        gap: 32px; box-sizing:border-box;
      }
      #ck-content .header-block {
        display:flex; flex-direction:column;
        align-items:center; gap:10px; text-align:center;
      }
      #ck-content .overline {
        font-family: var(--mono); font-weight: 700;
        font-size: 24px; letter-spacing: 6px;
        text-transform: uppercase; color: var(--accent-4);
      }
      #ck-content .headline {
        font-family: var(--sans); font-weight: 800;
        font-size: 48px; line-height: 1.05;
        letter-spacing: -1px; color: var(--text);
      }
      #ck-content .headline code {
        font-family: var(--mono); font-weight: 700;
        font-size: 36px;
        color: var(--accent-stat);
        background: rgba(251,188,4,.10);
        padding: 2px 10px; border-radius: 6px;
      }
      .check-term {
        width: 1500px;
        background: rgba(0, 0, 0, 0.82);
        border: 1.5px solid var(--border-bright);
        border-radius: 14px;
        box-shadow: 0 24px 60px rgba(0, 0, 0, 0.6);
        overflow: hidden;
        font-family: var(--mono);
      }
      .check-term .term-bar {
        background: rgba(255,255,255,0.06);
        padding: 9px 16px;
        font-weight: 700; font-size: 12px;
        letter-spacing: 2px; text-transform: uppercase;
        color: var(--text-secondary);
        border-bottom: 1px solid var(--border);
        display:flex; align-items:center; gap: 8px;
      }
      .check-term .dot {
        display:inline-block; width:11px; height:11px; border-radius:50%;
        background:#ff5f57; margin-right:5px;
      }
      .check-term .dot.y { background:#febc2e; }
      .check-term .dot.g { background:#28c840; }
      .check-term .term-body {
        padding: 22px 26px;
        font-size: 17px; line-height: 1.55;
        color: #e9ecf3;
      }
      .check-term .prompt { color: var(--text-secondary); margin-right: 8px; }
      .check-term .cmd-text { color: var(--accent-stat); font-weight: 700; }
      .check-term .out { display:block; color: #e9ecf3; }
      .check-term .out.head { color: var(--accent-2); font-weight: 700; }
      .check-term .out.ok-head { color: var(--accent-4); font-weight: 800; }
      .check-term .out.ok-head::before { content: "◇  "; }
      .check-term .out.head::before { content: "◆  "; }
      .check-term .blank { display:block; height: 6px; }
      .check-summary-row {
        display:flex; flex-direction:row; gap: 22px;
        flex-wrap: wrap; justify-content: center;
      }
      .check-pill {
        display:flex; align-items:center; gap: 12px;
        padding: 12px 22px; border-radius: 14px;
        background: rgba(34,197,94,.12);
        border: 1px solid rgba(34,197,94,.55);
      }
      .check-pill .check-icon {
        font-family: var(--mono); font-weight: 800;
        font-size: 18px; color: var(--accent-4);
      }
      .check-pill .check-label {
        font-family: var(--mono); font-weight: 700;
        font-size: 14px; letter-spacing: 2px;
        text-transform: uppercase;
        color: var(--text-secondary);
      }
      .check-pill .check-value {
        font-family: var(--sans); font-weight: 800;
        font-size: 20px;
        color: var(--text);
      }
    </style>

    <div id="ck-content">
      <div class="header-block">
        <div class="overline" id="ck-overline">CHECK &middot; STEP 11</div>
        <div class="headline" id="ck-headline">Run <code>npx hyperframes check</code> &mdash; lint + validate + inspect</div>
      </div>

      <div class="check-term" id="ck-term">
        <div class="term-bar">
          <span class="dot"></span><span class="dot y"></span><span class="dot g"></span>
          &nbsp; PowerShell &mdash; my-video &mdash; check
        </div>
        <div class="term-body">
          <span id="ck-l1"><span class="prompt">PS my-video&gt;</span><span class="cmd-text">npx hyperframes check</span></span>
          <span class="blank"></span>
          <span id="ck-l2" class="out head">Linting my-video/index.html</span>
          <span id="ck-l3" class="out ok-head">0 errors, 0 warnings</span>
          <span class="blank"></span>
          <span id="ck-l4" class="out head">Validating my-video in headless Chrome</span>
          <span id="ck-l5" class="out ok-head">No console errors · 9 text elements pass WCAG AA</span>
          <span class="blank"></span>
          <span id="ck-l6" class="out head">Inspecting layout for my-video (9 timeline samples)</span>
          <span id="ck-l7" class="out ok-head">0 layout issues across 9 sample(s)</span>
        </div>
      </div>

      <div class="check-summary-row" id="ck-pills">
        <div class="check-pill"><span class="check-icon">✓</span><span class="check-label">Lint</span><span class="check-value">0 / 0</span></div>
        <div class="check-pill"><span class="check-icon">✓</span><span class="check-label">WCAG AA</span><span class="check-value">9 / 9</span></div>
        <div class="check-pill"><span class="check-icon">✓</span><span class="check-label">Layout</span><span class="check-value">0 issues</span></div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({ paused: true, defaults: { ease: "power3.out" } });

      tl.set("#ck-overline", { y: 22, opacity: 0 }, 0);
      tl.set("#ck-headline", { y: 32, opacity: 0 }, 0);
      tl.set("#ck-term",     { y: 28, scale: 0.97, opacity: 0 }, 0);
      const checkLines = ["#ck-l1","#ck-l2","#ck-l3","#ck-l4","#ck-l5","#ck-l6","#ck-l7"];
      checkLines.forEach(sel => tl.set(sel, { x: -10, opacity: 0 }, 0));
      tl.set("#ck-pills .check-pill", { y: 18, scale: 0.9, opacity: 0 }, 0);

      // Narration anchors:
      //   "Before rendering, check it."                +0.30
      //   "npx hyperframes check."                      +2.04
      //   "It runs lint, validate, and inspect."         +4.23 (lint +4.68, validate +5.09, inspect +5.96)
      //   "Lint catches missing data attributes."        +6.78
      //   "Validate runs WCAG contrast in headless Chrome." +9.77
      //   "Inspect checks for layout overflow."          +13.71
      //   "Zero errors means you're good to render."     +16.14
      tl.to("#ck-overline", { y: 0, opacity: 1, duration: 0.4, ease: "power2.out" }, 0);
      tl.to("#ck-headline", { y: 0, opacity: 1, duration: 0.5 }, 0.25);
      tl.to("#ck-term",     { y: 0, scale: 1, opacity: 1, duration: 0.55, ease: "back.out(1.3)" }, 0.5);
      tl.to("#ck-l1",       { x: 0, opacity: 1, duration: 0.3 }, 2.00);   // command typed
      tl.to("#ck-l2",       { x: 0, opacity: 1, duration: 0.3 }, 4.62);   // "Linting..." on "lint" word
      tl.to("#ck-l3",       { x: 0, opacity: 1, duration: 0.3 }, 6.75);   // "0 errors, 0 warnings" on "Lint catches"
      tl.to("#ck-l4",       { x: 0, opacity: 1, duration: 0.3 }, 9.72);   // "Validating..." on "Validate"
      tl.to("#ck-l5",       { x: 0, opacity: 1, duration: 0.3 }, 10.62);  // "9 text elements pass WCAG AA" on "WCAG"
      tl.to("#ck-l6",       { x: 0, opacity: 1, duration: 0.3 }, 13.66);  // "Inspecting..." on "Inspect"
      tl.to("#ck-l7",       { x: 0, opacity: 1, duration: 0.3 }, 14.93);  // "0 layout issues" on "overflow"
      tl.to("#ck-pills .check-pill", { y: 0, scale: 1, opacity: 1, duration: 0.45, stagger: 0.20, ease: "back.out(1.5)" }, 16.10); // "Zero errors"

      window.__timelines["scene-check"] = tl;
    </script>
  </div>
</template>
