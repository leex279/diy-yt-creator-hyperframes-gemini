<!--
  scene-detail-performance.html — 4-card 2x2 detail scene for "Performance & Safety".

  Header + 2x2 grid of patch cards. Mirrors scene-detail-headless.html.
-->
<template id="scene-detail-performance-template">
  <div data-composition-id="scene-detail-performance"
       data-start="0"
       data-width="1920"
       data-height="1080"
       style="position:absolute; inset:0; overflow:hidden;
              font-family:var(--sans); color:var(--text);">

    <style>
      #scene-detail-performance-content {
        width:100%; height:100%;
        padding: 60px var(--pad-x) 90px;
        display:flex; flex-direction:column;
        align-items:center; justify-content:flex-start;
        gap: 36px;
        box-sizing:border-box;
      }
      #scene-detail-performance-content .header-block {
        display:flex; flex-direction:column;
        align-items:center; gap: 14px;
        text-align:center;
      }
      #scene-detail-performance-content .overline {
        font-family: var(--mono);
        font-weight: 700;
        font-size: 26px;
        letter-spacing: 6px;
        text-transform: uppercase;
        color: var(--accent-warn);
        opacity: 0;
      }
      #scene-detail-performance-content .headline {
        font-family: var(--sans);
        font-weight: 800;
        font-size: 56px;
        line-height: 1.05;
        letter-spacing: -1px;
        color: var(--text);
        max-width: 1500px;
        opacity: 0;
      }
      .dp-grid {
        width: 1700px;
        display: grid;
        grid-template-columns: 1fr 1fr;
        grid-template-rows: 1fr 1fr;
        gap: 24px;
      }
      .dp-card {
        position: relative;
        padding: 28px 32px;
        border-radius: 16px;
        border: 2px solid var(--border-bright);
        background: rgba(255, 255, 255, 0.04);
        box-shadow: 0 14px 40px rgba(0, 0, 0, 0.45);
        display:flex; flex-direction:column;
        gap: 12px;
        min-height: 230px;
        box-sizing: border-box;
        opacity: 0;
      }
      .dp-card::before {
        content: "";
        position: absolute;
        top: 0; left: 0; right: 0;
        height: 3px;
        background: linear-gradient(90deg, var(--card-accent, var(--accent-warn)), transparent);
        border-radius: 14px 14px 0 0;
      }
      .dp-card .row { display:flex; align-items:center; gap: 14px; margin-bottom: 4px; }
      .dp-card .num {
        width: 44px; height: 44px;
        border-radius: 10px;
        font-family: var(--mono);
        font-weight: 800;
        font-size: 22px;
        font-variant-numeric: tabular-nums;
        display:flex; align-items:center; justify-content:center;
        background: rgba(255, 255, 255, 0.06);
        flex-shrink: 0;
      }
      .dp-card .ttl {
        font-family: var(--sans);
        font-weight: 800;
        font-size: 28px;
        line-height: 1.18;
        letter-spacing: -0.3px;
        color: var(--text);
      }
      .dp-card .det {
        font-family: var(--sans);
        font-weight: 500;
        font-size: 20px;
        line-height: 1.4;
        color: var(--text-secondary);
      }
      .dp-card .det code {
        font-family: var(--mono);
        font-size: 18px;
        padding: 2px 8px;
        border-radius: 4px;
        background: rgba(255, 255, 255, 0.08);
      }
      .dp-card.a { --card-accent: var(--accent-warn); border-color: rgba(247, 129, 102, 0.55); }
      .dp-card.b { --card-accent: var(--accent-1);    border-color: rgba(88, 166, 255, 0.55);  }
      .dp-card.c { --card-accent: var(--accent-3);    border-color: rgba(163, 113, 247, 0.55); }
      .dp-card.d { --card-accent: var(--accent-4);    border-color: rgba(63, 185, 80, 0.55);   }
      .dp-card.a .num { color: var(--accent-warn); background: rgba(247, 129, 102, 0.18); }
      .dp-card.b .num { color: var(--accent-1);    background: rgba(88, 166, 255, 0.18);  }
      .dp-card.c .num { color: var(--accent-3);    background: rgba(163, 113, 247, 0.18); }
      .dp-card.d .num { color: var(--accent-4);    background: rgba(63, 185, 80, 0.18);   }
    </style>

    <div id="scene-detail-performance-content">
      <div class="header-block">
        <div class="overline" id="dp-overline">PERFORMANCE &amp; SAFETY</div>
        <div class="headline" id="dp-headline">Performance got a quiet pass.</div>
      </div>

      <div class="dp-grid">
        <div class="dp-card a" id="dp-card-1">
          <div class="row"><div class="num">01</div></div>
          <div class="ttl">Recent Activity panel removed</div>
          <div class="det">Cold start is meaningfully faster &mdash; one less render block on launch.</div>
        </div>
        <div class="dp-card b" id="dp-card-2">
          <div class="row"><div class="num">02</div></div>
          <div class="ttl">LSP summaries on click</div>
          <div class="det">Diagnostic summaries expand on click instead of dumping inline. The transcript stays scannable.</div>
        </div>
        <div class="dp-card c" id="dp-card-3">
          <div class="row"><div class="num">03</div></div>
          <div class="ttl">Memory leaks plugged</div>
          <div class="det">Image processing, slash usage on big transcripts, long-running tools without progress &mdash; all fixed.</div>
        </div>
        <div class="dp-card d" id="dp-card-4">
          <div class="row"><div class="num">04</div></div>
          <div class="ttl">Skip-permissions sandbox safety</div>
          <div class="det"><code>--dangerously-skip-permissions</code> stops prompting on writes inside <code>.claude/</code>.</div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      // Transcript-driven timing. scene_t = root_t - 78.16 (data-start 78.16). Slot 27.51s.
      // Narration:
      //   "Performance got a quiet pass."           scene_t 0.00
      //   "Recent Activity panel removed..."        scene_t 2.29 (#175)
      //   "LSP diagnostic summaries..."             scene_t 6.62 (#185)
      //   "Multiple memory leaks plugged..."        scene_t 12.37 (#196)
      //   "And dangerously skip permissions..."     scene_t 22.93 (#214)
      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({ paused: true });

      tl.fromTo("#dp-overline", { y: 18, opacity: 0 }, { y: 0, opacity: 1, duration: 0.4, ease: "power2.out" }, 0);
      tl.fromTo("#dp-headline", { y: 30, opacity: 0 }, { y: 0, opacity: 1, duration: 0.5, ease: "power3.out" }, 0.15);

      const cards = [
        { sel: "#dp-card-1", num: "#dp-card-1 .num", at:  2.16 },
        { sel: "#dp-card-2", num: "#dp-card-2 .num", at:  6.05 },
        { sel: "#dp-card-3", num: "#dp-card-3 .num", at: 11.62 },
        { sel: "#dp-card-4", num: "#dp-card-4 .num", at: 19.82 },
      ];
      cards.forEach(({ sel, num, at }, i) => {
        const next = cards[i + 1] ? cards[i + 1].at : 24.5;
        const dwell = next - at;
        tl.fromTo(sel,
          { y: 28, opacity: 0, scale: 0.96 },
          { y: 0,  opacity: 1, scale: 1, duration: 0.45, ease: "back.out(1.4)" },
          at);
        if (dwell > 3.0) {
          tl.to(num, { scale: 1.18, duration: 0.25, ease: "power2.out", yoyo: true, repeat: 1 }, at + 1.6);
        }
      });

      // Anchor to slot length (24.75s)
      tl.set({}, {}, 24.75);

      window.__timelines["scene-detail-performance"] = tl;
    </script>
  </div>
</template>
