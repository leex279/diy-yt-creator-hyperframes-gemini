<!--
  scene-counter-grid.html — 3 parallel counters in a vertical stack (~7s).

  Pattern: header → 3 stat rows, each with its own counter + label.
           Demonstrates parallel deterministic counter animations.
           Different from scene-stat (single huge number) — shows
           how multiple metrics can stand together.
  Self-contained sub-composition with paused timeline at
  window.__timelines["scene-counter-grid"].
-->
<template id="scene-counter-grid-template">
  <div data-composition-id="scene-counter-grid"
       data-start="0"
       data-width="1080"
       data-height="1920"
       style="position:absolute; inset:0; overflow:hidden;">

    <style>
      #scene-counter-grid-content {
        width:100%; height:100%;
        padding: var(--pad-top) var(--pad-x) var(--pad-bottom);
        display:flex; flex-direction:column;
        align-items:center; justify-content:center;
        text-align:center; gap:36px;
        box-sizing:border-box;
      }
      #scene-counter-grid-content .header {
        font-family: var(--serif);
        font-weight: 900;
        font-size: 92px;
        line-height: 1.0;
        letter-spacing: -2px;
        color: var(--accent-ink);
        max-width: 920px;
      }
      #scene-counter-grid-content .header .em {
        color: var(--accent-warm);
      }
      #scene-counter-grid-content .stack {
        display: flex; flex-direction: column; gap: 24px;
        width: 940px;
      }
      #scene-counter-grid-content .row {
        display: flex; align-items: center; justify-content: space-between;
        padding: 32px 40px;
        background: rgba(255, 255, 255, 0.06);
        border: 1.5px solid rgba(255, 255, 255, 0.14);
        border-radius: 22px;
        box-shadow: 0 12px 28px rgba(0, 0, 0, 0.35);
      }
      #scene-counter-grid-content .num {
        font-family: var(--sans);
        font-weight: 900;
        font-size: 168px;
        line-height: 1.0;
        letter-spacing: -6px;
        font-variant-numeric: tabular-nums lining-nums;
      }
      #scene-counter-grid-content .row.r1 .num { color: var(--accent-warm); }
      #scene-counter-grid-content .row.r2 .num { color: #FFFFFF; }
      #scene-counter-grid-content .row.r3 .num { color: var(--accent-gold); }
      #scene-counter-grid-content .label {
        font-family: 'JetBrains Mono', ui-monospace, monospace;
        font-weight: 700;
        font-size: 36px;
        letter-spacing: 3px;
        text-transform: uppercase;
        color: rgba(255, 255, 255, 0.85);
        text-align: right;
        max-width: 320px;
        line-height: 1.2;
      }
    </style>

    <div id="scene-counter-grid-content">
      <div class="header" id="cg-header">
        The <span class="em">surface area.</span>
      </div>
      <div class="stack">
        <div class="row r1" id="cg-r1">
          <span class="num"><span class="value" id="cg-num-1">0</span></span>
          <span class="label">specialist<br/>skills</span>
        </div>
        <div class="row r2" id="cg-r2">
          <span class="num"><span class="value" id="cg-num-2">0</span></span>
          <span class="label">power<br/>tools</span>
        </div>
        <div class="row r3" id="cg-r3">
          <span class="num"><span class="value" id="cg-num-3">0</span></span>
          <span class="label">slash<br/>commands</span>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({ paused: true });

      const c1 = { v: 0 }, c2 = { v: 0 }, c3 = { v: 0 };
      const num1 = document.getElementById('cg-num-1');
      const num2 = document.getElementById('cg-num-2');
      const num3 = document.getElementById('cg-num-3');

      // Header enters with the scene
      tl.from("#cg-header", { y: 24, opacity: 0, duration: 0.6, ease: "power3.out" }, 0);

      // Hidden-until-reveal pattern — rows hidden at t=0, revealed on word anchors.
      tl.set("#cg-r1", { y: 30, scale: 0.92, opacity: 0 }, 0);
      tl.set("#cg-r2", { y: 30, scale: 0.92, opacity: 0 }, 0);
      tl.set("#cg-r3", { y: 30, scale: 0.92, opacity: 0 }, 0);

      // Word anchors (relative to scene start at t=25.81 absolute):
      //  "specialist skills" -> 0.53s   row 1 (23)
      //  "Eight"             -> 2.41s   row 2 (8)
      //  "Twenty-eight"      -> 3.50s   row 3 (28)
      tl.to("#cg-r1", { y: 0, scale: 1, opacity: 1, duration: 0.55, ease: "back.out(1.5)" }, 0.53);
      tl.to(c1, { v: 23, duration: 0.9, ease: "power2.out", onUpdate: () => { num1.textContent = Math.round(c1.v); } }, 0.7);

      tl.to("#cg-r2", { y: 0, scale: 1, opacity: 1, duration: 0.55, ease: "back.out(1.5)" }, 2.41);
      tl.to(c2, { v: 8, duration: 0.9, ease: "power2.out", onUpdate: () => { num2.textContent = Math.round(c2.v); } }, 2.55);

      tl.to("#cg-r3", { y: 0, scale: 1, opacity: 1, duration: 0.55, ease: "back.out(1.5)" }, 3.50);
      tl.to(c3, { v: 28, duration: 0.9, ease: "power2.out", onUpdate: () => { num3.textContent = Math.round(c3.v); } }, 3.65);

      // Tail-hold emphasis — three rows pulse together near scene end
      tl.to("#cg-r1, #cg-r2, #cg-r3", { scale: 1.025, duration: 0.4, ease: "power2.out", yoyo: true, repeat: 1 }, 8.5);

      window.__timelines["scene-counter-grid"] = tl;
    </script>
  </div>
</template>
