<!--
  scene-bullets.html — 3 icon+text rows (~8s).

  Pattern: section header → 3 rows, each with a circular icon badge
           (rotating accent) + bold title + subtitle. Different visual
           treatment from the numbered step cards used by anthropic.
  Self-contained sub-composition with paused timeline at
  window.__timelines["scene-bullets"].
-->
<template id="scene-bullets-template">
  <div data-composition-id="scene-bullets"
       data-start="0"
       data-width="1080"
       data-height="1920"
       style="position:absolute; inset:0; overflow:hidden;">

    <style>
      #scene-bullets-content {
        width:100%; height:100%;
        padding: var(--pad-top) var(--pad-x) var(--pad-bottom);
        display:flex; flex-direction:column;
        align-items:center; justify-content:center;
        text-align:left; gap:36px;
        box-sizing:border-box;
      }
      #scene-bullets-content .header {
        font-family: var(--serif);
        font-weight: 900;
        font-size: 96px;
        line-height: 1.0;
        letter-spacing: -2px;
        color: var(--accent-ink);
        text-align: center;
        max-width: 920px;
      }
      #scene-bullets-content .header .em {
        color: var(--accent-warm);
      }
      #scene-bullets-content .row-list {
        display: flex; flex-direction: column;
        gap: 32px; width: 940px;
      }
      #scene-bullets-content .row {
        display: flex; align-items: center; gap: 32px;
        padding: 30px 36px;
        background: rgba(255, 255, 255, 0.06);
        border: 1.5px solid rgba(255, 255, 255, 0.14);
        border-radius: 22px;
        box-shadow: 0 12px 28px rgba(0, 0, 0, 0.35);
      }
      #scene-bullets-content .icon {
        flex: 0 0 auto;
        width: 108px; height: 108px;
        border-radius: 50%;
        display: flex; align-items: center; justify-content: center;
        font-family: var(--sans);
        font-weight: 900;
        font-size: 64px;
        color: #14100E;
        line-height: 1;
      }
      #scene-bullets-content .row.r1 .icon { background: var(--accent-warm); }
      #scene-bullets-content .row.r2 .icon { background: #FFFFFF; }
      #scene-bullets-content .row.r3 .icon { background: var(--accent-gold); }
      #scene-bullets-content .body { display:flex; flex-direction:column; gap: 6px; flex:1; }
      #scene-bullets-content .title {
        font-family: var(--sans);
        font-weight: 800;
        font-size: 56px;
        line-height: 1.05;
        color: #FFFFFF;
      }
      #scene-bullets-content .sub {
        font-family: 'JetBrains Mono', ui-monospace, monospace;
        font-weight: 500;
        font-size: 34px;
        line-height: 1.3;
        color: rgba(255, 255, 255, 0.78);
      }
    </style>

    <div id="scene-bullets-content">
      <div class="header" id="bullets-header">
        What it <span class="em">actually is.</span>
      </div>
      <div class="row-list">
        <div class="row r1" id="bullets-r1">
          <div class="icon">1</div>
          <div class="body">
            <div class="title">Slash commands for Claude Code</div>
            <div class="sub">office-hours &middot; review &middot; ship &middot; qa</div>
          </div>
        </div>
        <div class="row r2" id="bullets-r2">
          <div class="icon">2</div>
          <div class="body">
            <div class="title">A team of specialists</div>
            <div class="sub">CEO &middot; designer &middot; reviewer &middot; QA &middot; security</div>
          </div>
        </div>
        <div class="row r3" id="bullets-r3">
          <div class="icon">3</div>
          <div class="body">
            <div class="title">MIT-licensed &amp; free</div>
            <div class="sub">installs into ~/.claude/skills</div>
          </div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({ paused: true });

      // Header enters with the scene
      tl.from("#bullets-header", { y: 24, opacity: 0, duration: 0.6, ease: "power3.out" }, 0);

      // Hidden-until-reveal pattern — rows are explicitly hidden at t=0,
      // then revealed one at a time on word anchors from transcript.
      tl.set("#bullets-r1", { x: -40, opacity: 0 }, 0);
      tl.set("#bullets-r2", { x: -40, opacity: 0 }, 0);
      tl.set("#bullets-r3", { x: -40, opacity: 0 }, 0);

      // Word anchors (relative to scene start at t=17.04 absolute):
      //  "slash-commands" -> 1.78s   row 1
      //  "Specialist"     -> 4.27s   row 2
      //  "markdown"       -> 7.44s   row 3
      tl.to("#bullets-r1", { x: 0, opacity: 1, duration: 0.55, ease: "back.out(1.5)" }, 1.78);
      tl.to("#bullets-r2", { x: 0, opacity: 1, duration: 0.55, ease: "back.out(1.5)" }, 4.27);
      tl.to("#bullets-r3", { x: 0, opacity: 1, duration: 0.55, ease: "back.out(1.5)" }, 7.44);

      // Icon pulse on each row's narration beat (subtle, post-entrance)
      tl.to("#bullets-r1 .icon", { scale: 1.12, duration: 0.4, ease: "back.out(2)", yoyo: true, repeat: 1 }, 2.4);
      tl.to("#bullets-r2 .icon", { scale: 1.12, duration: 0.4, ease: "back.out(2)", yoyo: true, repeat: 1 }, 4.9);
      tl.to("#bullets-r3 .icon", { scale: 1.12, duration: 0.4, ease: "back.out(2)", yoyo: true, repeat: 1 }, 8.0);

      window.__timelines["scene-bullets"] = tl;
    </script>
  </div>
</template>
