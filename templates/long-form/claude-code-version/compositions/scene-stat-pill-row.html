<!--
  scene-stat-pill-row.html — Receipts. 2 huge color-rotated stats with labels.

  Above: overline + headline. Below: row of 2 pills (orange/accent-warn,
  purple/accent-3). Each pill contains a 130px stat number + 22px label.

  Adapted from shared/lib/blocks/stat-pill-row/ for 1920x1080 horizontal.
-->
<template id="scene-stat-pill-row-template">
  <div data-composition-id="scene-stat-pill-row"
       data-start="0"
       data-width="1920"
       data-height="1080"
       style="position:absolute; inset:0; overflow:hidden;
              font-family:var(--sans); color:var(--text);">

    <style>
      #scene-stat-pill-row-content {
        width:100%; height:100%;
        padding: var(--pad-top) var(--pad-x) var(--pad-bottom);
        display:flex; flex-direction:column;
        align-items:center; justify-content:center;
        gap:56px;
        box-sizing:border-box;
      }
      #scene-stat-pill-row-content .header-block {
        display:flex; flex-direction:column;
        align-items:center; gap:16px;
        text-align:center;
      }
      #scene-stat-pill-row-content .overline {
        font-family: var(--mono);
        font-weight: 700;
        font-size: 28px;
        letter-spacing: 6px;
        text-transform: uppercase;
        color: var(--accent-warn);
      }
      #scene-stat-pill-row-content .headline {
        font-family: var(--sans);
        font-weight: 800;
        font-size: 56px;
        line-height: 1.05;
        letter-spacing: -1px;
        color: var(--text);
      }
      #scene-stat-pill-row-content .pills {
        display:flex; flex-direction:row;
        align-items:stretch; justify-content:center;
        gap: 60px;
      }
      .stat-pill {
        width: 540px;
        padding: 56px 40px;
        border-radius: 28px;
        border: 1.5px solid var(--border-bright);
        background: rgba(255, 255, 255, 0.04);
        display:flex; flex-direction:column;
        align-items:center; gap: 18px;
        box-shadow: 0 24px 60px rgba(0, 0, 0, 0.55);
      }
      .stat-pill.warn {
        background: linear-gradient(135deg,
                      rgba(249, 115, 22, 0.16) 0%,
                      rgba(249, 115, 22, 0.04) 100%);
        border-color: rgba(249, 115, 22, 0.55);
      }
      .stat-pill.purple {
        background: linear-gradient(135deg,
                      rgba(139, 92, 246, 0.18) 0%,
                      rgba(139, 92, 246, 0.04) 100%);
        border-color: rgba(139, 92, 246, 0.55);
      }
      .stat-pill .stat-num {
        font-family: var(--sans);
        font-weight: 900;
        font-size: 130px;
        line-height: 0.9;
        letter-spacing: -4px;
        font-variant-numeric: tabular-nums lining-nums;
      }
      .stat-pill.warn .stat-num {
        color: var(--accent-warn);
        text-shadow: 0 0 60px rgba(249, 115, 22, 0.5);
      }
      .stat-pill.purple .stat-num {
        color: var(--accent-3);
        text-shadow: 0 0 60px rgba(139, 92, 246, 0.5);
      }
      .stat-pill .stat-label {
        font-family: var(--mono);
        font-weight: 700;
        font-size: 22px;
        letter-spacing: 3px;
        text-transform: uppercase;
        color: var(--text-secondary);
        text-align: center;
      }
    </style>

    <div id="scene-stat-pill-row-content">
      <div class="header-block">
        <div class="overline" id="stat-row-overline">THE RECEIPTS</div>
        <div class="headline" id="stat-row-headline">Numbers worth pausing for</div>
      </div>

      <div class="pills">
        <div class="stat-pill warn" id="stat-pill-1">
          <div class="stat-num">0</div>
          <div class="stat-label">label one</div>
        </div>
        <div class="stat-pill purple" id="stat-pill-2">
          <div class="stat-num">0</div>
          <div class="stat-label">label two</div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({
        paused: true,
        defaults: { ease: "power3.out", duration: 0.6 }
      });

      tl.from("#stat-row-overline", { y: 20, opacity: 0, duration: 0.5, ease: "power2.out", immediateRender: false }, 0);
      tl.from("#stat-row-headline", { y: 30, opacity: 0, duration: 0.6, ease: "power3.out", immediateRender: false }, 0.3);
      tl.from("#stat-pill-1",       { scale: 0.85, opacity: 0, duration: 0.6, ease: "back.out(1.6)", immediateRender: false }, 0.8);
      tl.from("#stat-pill-2",       { scale: 0.85, opacity: 0, duration: 0.6, ease: "back.out(1.6)", immediateRender: false }, 1.3);

      window.__timelines["scene-stat-pill-row"] = tl;
    </script>
  </div>
</template>
