# create-archon-short — spawn a previewable HyperFrames Short from a topic
#
# DAG flow:
#   parse-input (script, bun) -> precheck (bash) -> create-short (command, AI)
#
# Default video duration is 30s when the user does not specify one. Topic is the
# whole $ARGUMENTS message minus the duration phrase, if present.
#
# Run with:
#   archon workflow run create-archon-short --no-worktree "Archon just shipped 1.0"
#   archon workflow run create-archon-short --no-worktree "duration 45s, GPT-5 vs Claude 4.6 coding showdown"
#
# Why --no-worktree: video artifacts (videos/<slug>/audio/narration.wav,
# transcript.json, the rendered MP4) belong on the working branch. Running this
# inside a worktree would dump them into the worktree's checkout which then has
# to be merged back. Pin worktree.enabled: false at the workflow level so the
# CLI rejects --branch / --from and only allows in-place runs.

name: create-archon-short
description: |
  Use when: User wants to spawn a vertical YouTube Short in the Archon dark-blue
  / cyan-magenta aesthetic from a topic prompt.
  Triggers: "create archon short", "new archon short", "make an archon short
            about", "archon short for", "generate archon short video".
  Does: Parses the topic and an optional duration (default 30s) -> derives a
        kebab-case slug -> copies templates/shorts/archon/ to videos/<slug>/ ->
        researches the topic and drafts a script.txt paced to hit the duration
        target -> generates Kokoro TTS narration -> transcribes for word-level
        timestamps -> computes phase transition anchors from the transcript ->
        edits index.html with real content sync'd to spoken-word frames -> lints
        and inspects until both pass cleanly -> opens preview in the browser.
        Never auto-renders; user always triggers render manually.
  NOT for: Other template aesthetics (use templates/shorts/anthropic for
            Anthropic content, /google for Google brand content), long-form
            videos, auto-rendering, modifying the template itself.

provider: claude
model: sonnet

worktree:
  enabled: false   # Video artifacts must land on the working branch — see header

nodes:
  # ── Layer 0 ─────────────────────────────────────────────────────────────────
  # Parse the user's message into { topic, slug, duration, title } JSON.
  # Default duration: 30s. Duration can appear as "30s", "30 seconds",
  # "duration 30", "duration: 45s", "45-second", etc.
  - id: parse-input
    script: |
      const raw = process.argv.slice(2).join(' ').trim();
      if (!raw) {
        console.error('No topic provided. Usage: archon workflow run create-archon-short --no-worktree "<topic>"');
        process.exit(1);
      }

      // Extract a duration. Patterns we accept:
      //   "30s"  "30 sec"  "30 seconds"  "45-second"  "duration 30"  "duration: 45s"
      // First match wins; if nothing matches we use the 30s default.
      const patterns = [
        /\bduration\s*[:=]?\s*(\d{1,3})\s*(?:s|sec|seconds?)?\b/i,
        /\b(\d{1,3})\s*-?\s*seconds?\b/i,
        /\b(\d{1,3})\s*s\b/i,
      ];
      let duration = 30;
      let durationPhrase = null;
      for (const pat of patterns) {
        const m = raw.match(pat);
        if (m) {
          duration = parseInt(m[1], 10);
          durationPhrase = m[0];
          break;
        }
      }
      if (duration < 10 || duration > 300) {
        console.error(`Duration ${duration}s out of range (10-300s)`);
        process.exit(1);
      }

      // Topic is the message minus the duration phrase and a couple of leading
      // imperative verbs ("create", "make", "generate", "spawn a").
      let topic = raw;
      if (durationPhrase) topic = topic.replace(durationPhrase, ' ');
      topic = topic
        .replace(/^\s*(?:please\s+)?(?:create|make|spawn|generate|build|produce)\s+(?:an?\s+)?(?:archon\s+)?(?:short|video)\s*(?:about|on|for|covering)?\s*/i, '')
        .replace(/^\s*archon\s+short\s+(?:about|on|for)\s+/i, '')
        .replace(/,\s*(?:$|with\s+)/g, ' ')
        .replace(/\s+/g, ' ')
        .trim();

      if (!topic) {
        console.error('Could not extract a topic from the input');
        process.exit(1);
      }

      // Slug: kebab-case, drop stopwords, cap at 6 tokens.
      const STOPWORDS = new Set([
        'the','a','an','of','for','to','with','about','on','in','and','or',
        'is','are','was','were','be','it','this','that','from','as','by','at',
      ]);
      const tokens = topic
        .toLowerCase()
        .replace(/[^a-z0-9\s-]/g, ' ')
        .split(/\s+/)
        .filter((w) => w && !STOPWORDS.has(w));
      const slug = tokens.slice(0, 6).join('-').replace(/-+/g, '-').replace(/^-|-$/g, '');
      if (!slug) {
        console.error('Could not derive a slug from the topic');
        process.exit(1);
      }

      // Title-case the topic (rough — the AI step refines if needed).
      const title = topic
        .split(/\s+/)
        .map((w) => (w.length <= 2 ? w : w[0].toUpperCase() + w.slice(1)))
        .join(' ');

      console.log(JSON.stringify({ topic, slug, duration, title }));
    runtime: bun
    timeout: 10000

  # ── Layer 1 ─────────────────────────────────────────────────────────────────
  # Verify preconditions BEFORE we start the expensive AI work:
  #   - templates/shorts/archon/ exists
  #   - videos/<slug>/ does NOT already exist (refuse to overwrite)
  #   - npx hyperframes is reachable
  - id: precheck
    depends_on: [parse-input]
    bash: |
      set -euo pipefail

      slug=$(echo $parse-input.output | jq -r '.slug')
      duration=$(echo $parse-input.output | jq -r '.duration')
      topic=$(echo $parse-input.output | jq -r '.topic')

      if [ -z "$slug" ] || [ "$slug" = "null" ]; then
        echo "FATAL: parse-input did not produce a slug"
        exit 1
      fi

      if [ ! -d templates/shorts/archon ]; then
        echo "FATAL: templates/shorts/archon does not exist in this repo"
        exit 1
      fi

      if [ -d "videos/$slug" ]; then
        echo "FATAL: videos/$slug already exists. Pick a different topic or delete the existing folder first."
        exit 1
      fi

      if ! command -v npx >/dev/null 2>&1; then
        echo "FATAL: npx is not on PATH — install Node.js + pnpm first"
        exit 1
      fi

      echo "OK slug=$slug duration=${duration}s topic=\"$topic\""
    timeout: 15000

  # ── Layer 2 ─────────────────────────────────────────────────────────────────
  # The actual video-creation work — one big AI session that follows the
  # create-archon-short playbook end-to-end. Long idle timeout because TTS,
  # transcription, and lint can each take a minute or two.
  - id: create-short
    command: create-archon-short
    depends_on: [precheck]
    context: fresh
    idle_timeout: 1800000   # 30 minutes per idle stretch
