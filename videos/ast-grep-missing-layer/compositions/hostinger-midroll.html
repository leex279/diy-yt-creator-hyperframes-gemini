<!--
  shared/lib/blocks/hostinger-midroll/block.html
  Long-form (1920x1080) Hostinger affiliate midroll break — 5-phase, 20s
  promotional sub-composition modeled on shared/lib/blocks/dynamous-midroll/.
  Designed to drop into the middle of a long-form video at a natural narration
  pause. SILENT by default — the host video's narrator speaks over it during
  the 20s window. (See recipe.md for the optional TTS-narration path.)

  Phase layout (visual; affiliate-only — host narrator covers timing):
    1. Hostinger intro     0.0 → 3.0s   Purple gradient hero word + tagline
    2. Web Hosting         3.0 → 7.0s   Product screenshot + 4 features
    3. VPS Hosting         7.0 → 11.5s  Product screenshot + 4 features
    4. AI Website Builder 11.5 → 16.0s  Product screenshot + 3 features
    5. CTA                16.0 → 18.5s  10% OFF badge + DIYSMARTCODE + URL
    Outro                 18.5 → 20.0s  "Back to the video." → fade out

  RELATIONSHIP:
    Affiliate-only. NOT a paid sponsorship. The Werbung badge is mandatory
    (DE UWG — affiliate links count as commercial advertising regardless of
    headline framing). Default intro hero says "Try Hostinger" — NOT
    "Sponsored by Hostinger". See memory feedback_hostinger_affiliate_not_sponsored.

  SOURCE:
    shared/lib/blocks/dynamous-midroll/block.html (parent pattern — paused
    timeline, scoped CSS, self-registration, phase-mutex with crossfade
    transitions, persistent Werbung + brand chrome, global root fade-in /
    fade-out for host handoff)
    shared/lib/components/hostinger-banner/ (sibling — color palette,
    pill style, discount badge, URL panel)
    templates/long-form/hostinger-sponsored/ (DESIGN.md tokens — Manrope
    display + JetBrains Mono data, Hostinger purple #673de6, success
    green #00c896)

  REQUIRED HOST TOKENS:
    None. The block inlines all colors (Hostinger palette: deep navy #0e0f19
    + purple #673de6 / #8b5cf6 + green #00c896 + red #dc2626 for Werbung)
    and the Manrope + JetBrains Mono fonts.

  ASSET COPY (do BEFORE wiring — bundler rejects parent-of-project paths).
  See ./recipe.md for full host wiring; the short list:
    cp shared/logos/hostinger-brand/Hostinger_Horizontal_White.svg \
       videos/<slug>/assets/hostinger-horizontal-white.svg
    cp shared/screenshots/hostinger/web-hosting.png \
       videos/<slug>/assets/hostinger-screens/web-hosting.png
    cp shared/screenshots/hostinger/vps-hosting.png \
       videos/<slug>/assets/hostinger-screens/vps-hosting.png
    cp shared/screenshots/hostinger/ai-website-builder.png \
       videos/<slug>/assets/hostinger-screens/ai-website-builder.png
-->
