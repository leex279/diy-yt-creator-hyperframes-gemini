<svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 1000 1000" height="1000" width="1000">
  <!-- Two interlocking chain links — supply chain motif -->
  <g fill="none" stroke="#2B2A28" stroke-width="58" stroke-linecap="round">
    <!-- Upper-left link -->
    <ellipse cx="370" cy="370" rx="190" ry="120" transform="rotate(-32 370 370)"/>
    <!-- Lower-right link, interlocked -->
    <ellipse cx="630" cy="630" rx="190" ry="120" transform="rotate(-32 630 630)"/>
  </g>
  <!-- Break highlight: tiny gap chip on the lower link to read as "compromised" -->
  <rect x="490" y="500" width="60" height="22" fill="#0E1014" transform="rotate(-32 520 511)"/>
</svg>
