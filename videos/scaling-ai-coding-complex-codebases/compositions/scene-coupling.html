<!--
  scene-coupling.html — God component vs isolated component visualization.
  Left: clean isolated node (loose & clear). Right: tangled web (god component).
  Below: the 3 coupling quality questions.
-->
<template id="scene-coupling-template">
  <div data-composition-id="scene-coupling"
       data-start="0"
       data-width="1920"
       data-height="1080"
       style="position:absolute; inset:0; overflow:hidden;
              font-family: 'Montserrat', system-ui, sans-serif; color:var(--ink);">

    <style>
      #cp-content {
        width:100%; height:100%;
        padding: 80px var(--pad-x) 60px;
        display:flex; flex-direction:column;
        align-items:flex-start; justify-content:flex-start;
        gap: 18px;
        box-sizing:border-box;
      }
      #cp-content .eyebrow {
        font-family: 'JetBrains Mono', ui-monospace, monospace;
        font-size: 22px;
        font-weight: 500;
        letter-spacing: 0.32em;
        text-transform: uppercase;
        color: var(--accent-2);
        display: inline-flex; align-items: center; gap: 18px;
      }
      #cp-content .eyebrow::before {
        content: ""; display: inline-block;
        width: 56px; height: 2px;
        background: var(--accent-2);
      }
      #cp-content .headline {
        font-family: 'Montserrat', system-ui, sans-serif;
        font-weight: 700;
        font-size: 62px;
        line-height: 1.0;
        letter-spacing: -0.022em;
        color: var(--ink);
        max-width: 1600px;
      }

      #cp-row {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 32px;
        width: 100%;
        margin-top: 8px;
      }
      .cp-card {
        background: rgba(255,255,255,0.03);
        border: 1px solid rgba(255,255,255,0.10);
        border-radius: 18px;
        padding: 28px 30px;
        display: flex; flex-direction: column;
        gap: 14px;
        min-height: 360px;
        position: relative;
      }
      .cp-card .label {
        font-family: 'JetBrains Mono', ui-monospace, monospace;
        font-weight: 600;
        font-size: 22px;
        letter-spacing: 0.06em;
        color: var(--muted);
      }
      .cp-card .verdict {
        font-family: 'Montserrat', system-ui, sans-serif;
        font-weight: 800;
        font-size: 44px;
        letter-spacing: -0.02em;
      }
      .cp-card.good { border-color: rgba(59, 130, 246, 0.45); box-shadow: 0 0 36px rgba(59, 130, 246, 0.18); }
      .cp-card.good .verdict { color: var(--accent-2); }
      .cp-card.bad { border-color: rgba(249, 115, 22, 0.45); box-shadow: 0 0 36px rgba(249, 115, 22, 0.16); }
      .cp-card.bad .verdict { color: var(--accent-warn); }
      .cp-card .viz {
        flex: 1;
        position: relative;
        min-height: 180px;
      }
      /* Good — single isolated node */
      .cp-card.good .viz svg {
        width: 100%; height: 100%;
      }
      .iso-dot { fill: var(--accent); }
      .iso-link { stroke: rgba(96, 165, 250, 0.55); stroke-width: 2.5; fill: none; }
      .iso-edge { fill: rgba(96, 165, 250, 0.12); }

      /* Bad — tangled web */
      .god-dot { fill: var(--accent-warn); }
      .god-link { stroke: rgba(249, 115, 22, 0.55); stroke-width: 2; fill: none; }
      .god-sat { fill: rgba(249, 115, 22, 0.7); }

      #cp-questions {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 22px;
        width: 100%;
        margin-top: 6px;
      }
      .cp-q {
        background: rgba(255,255,255,0.03);
        border: 1px solid rgba(255,255,255,0.10);
        border-radius: 14px;
        padding: 22px 26px;
        display: flex; flex-direction: column; gap: 10px;
      }
      .cp-q .qn {
        font-family: 'JetBrains Mono', ui-monospace, monospace;
        font-weight: 600;
        font-size: 20px;
        letter-spacing: 0.08em;
        color: var(--accent-2);
      }
      .cp-q .qt {
        font-family: 'Montserrat', system-ui, sans-serif;
        font-weight: 600;
        font-size: 24px;
        line-height: 1.3;
        color: var(--ink);
      }
    
      .key-chip {
        position: absolute;
        bottom: 32px;
        left: 50%;
        transform: translateX(-50%);
        max-width: 1700px;
        background: rgba(15, 23, 42, 0.92);
        border: 1.5px solid rgba(96, 165, 250, 0.55);
        border-radius: 999px;
        padding: 16px 38px;
        font-family: 'Montserrat', system-ui, sans-serif;
        font-weight: 700;
        font-size: 30px;
        color: #f1f5f9;
        white-space: nowrap;
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.55), 0 0 40px rgba(59, 130, 246, 0.30);
      }
    </style>

    <div id="cp-content">
      <div class="eyebrow" id="cp-eyebrow" style="opacity:0;visibility:hidden;">STRATEGY 06 &middot; COUPLING &gt; LOC</div>
      <h2 class="headline" id="cp-headline" style="opacity:0;visibility:hidden;">Three questions. Not a line count.</h2>

      <div id="cp-row">
        <div class="cp-card good" id="cp-good" style="opacity:0;visibility:hidden;">
          <div class="label">LOOSE &amp; CLEAR</div>
          <div class="verdict">Loadable in isolation</div>
          <div class="viz">
            <svg viewBox="0 0 400 200" xmlns="http://www.w3.org/2000/svg">
              <circle class="iso-dot" cx="200" cy="100" r="36" />
              <circle class="iso-edge" cx="200" cy="100" r="64" />
              <circle class="iso-edge" cx="200" cy="100" r="92" opacity="0.5" />
            </svg>
          </div>
        </div>

        <div class="cp-card bad" id="cp-bad" style="opacity:0;visibility:hidden;">
          <div class="label">GOD COMPONENT</div>
          <div class="verdict">Wide context every time</div>
          <div class="viz">
            <svg viewBox="0 0 400 200" xmlns="http://www.w3.org/2000/svg">
              <!-- center -->
              <line class="god-link" x1="200" y1="100" x2="40" y2="40" />
              <line class="god-link" x1="200" y1="100" x2="100" y2="40" />
              <line class="god-link" x1="200" y1="100" x2="300" y2="40" />
              <line class="god-link" x1="200" y1="100" x2="360" y2="40" />
              <line class="god-link" x1="200" y1="100" x2="40" y2="160" />
              <line class="god-link" x1="200" y1="100" x2="100" y2="160" />
              <line class="god-link" x1="200" y1="100" x2="300" y2="160" />
              <line class="god-link" x1="200" y1="100" x2="360" y2="160" />
              <line class="god-link" x1="200" y1="100" x2="200" y2="20" />
              <line class="god-link" x1="200" y1="100" x2="200" y2="180" />
              <line class="god-link" x1="200" y1="100" x2="20" y2="100" />
              <line class="god-link" x1="200" y1="100" x2="380" y2="100" />
              <!-- satellites -->
              <circle class="god-sat" cx="40" cy="40" r="9" />
              <circle class="god-sat" cx="100" cy="40" r="9" />
              <circle class="god-sat" cx="300" cy="40" r="9" />
              <circle class="god-sat" cx="360" cy="40" r="9" />
              <circle class="god-sat" cx="40" cy="160" r="9" />
              <circle class="god-sat" cx="100" cy="160" r="9" />
              <circle class="god-sat" cx="300" cy="160" r="9" />
              <circle class="god-sat" cx="360" cy="160" r="9" />
              <circle class="god-sat" cx="200" cy="20" r="9" />
              <circle class="god-sat" cx="200" cy="180" r="9" />
              <circle class="god-sat" cx="20" cy="100" r="9" />
              <circle class="god-sat" cx="380" cy="100" r="9" />
              <!-- center god node -->
              <circle class="god-dot" cx="200" cy="100" r="22" />
            </svg>
          </div>
        </div>
      </div>

      <div id="cp-questions">
        <div class="cp-q" id="cp-q1" style="opacity:0;visibility:hidden;">
          <div class="qn">01</div>
          <div class="qt">Can you work on it in isolation?</div>
        </div>
        <div class="cp-q" id="cp-q2" style="opacity:0;visibility:hidden;">
          <div class="qn">02</div>
          <div class="qt">Does the agent have clear boundaries?</div>
        </div>
        <div class="cp-q" id="cp-q3" style="opacity:0;visibility:hidden;">
          <div class="qn">03</div>
          <div class="qt">Is the public API obvious?</div>
        </div>
      </div>
    </div>

      <!-- Floating key-phrase chips -->
      <div class="key-chip" id="cp-chip-1" style="opacity:0;visibility:hidden;">Component sizing by coupling &mdash; not lines</div>
      <div class="key-chip" id="cp-chip-2" style="opacity:0;visibility:hidden;">God-component is the AI killer</div>
      <div class="key-chip" id="cp-chip-3" style="opacity:0;visibility:hidden;">Question 1 &mdash; can you work on it in isolation?</div>
      <div class="key-chip" id="cp-chip-4" style="opacity:0;visibility:hidden;">Question 2 &mdash; clear boundaries?</div>
      <div class="key-chip" id="cp-chip-5" style="opacity:0;visibility:hidden;">Question 3 &mdash; is the public API obvious?</div>
      <div class="key-chip" id="cp-chip-6" style="opacity:0;visibility:hidden;">Any answer no &rarr; too coupled</div>
      <div class="key-chip" id="cp-chip-7" style="opacity:0;visibility:hidden;">AST-grep walks the syntax tree</div>
      <div class="key-chip" id="cp-chip-8" style="opacity:0;visibility:hidden;">No inbound references = dead code</div>
      <div class="key-chip" id="cp-chip-9" style="opacity:0;visibility:hidden;">Pair AST-grep with your validate step</div>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({ paused: true });

      tl.set("#cp-eyebrow",  { y: 20 }, 0);
      tl.set("#cp-headline", { y: 30 }, 0);
      tl.set("#cp-good", { y: 30 }, 0);
      tl.set("#cp-bad",  { y: 30 }, 0);
      ["#cp-q1","#cp-q2","#cp-q3"].forEach(sel => tl.set(sel, { y: 20 }, 0));

      tl.to("#cp-eyebrow",  { y: 0, autoAlpha: 1, duration: 0.5, ease: "power2.out" }, 0.2);
      tl.to("#cp-headline", { y: 0, autoAlpha: 1, duration: 0.6, ease: "power3.out" }, 0.5);

      // Good vs bad cards appear
      tl.to("#cp-good", { y: 0, autoAlpha: 1, duration: 0.6, ease: "back.out(1.3)" }, 1.5);
      tl.to("#cp-bad",  { y: 0, autoAlpha: 1, duration: 0.6, ease: "back.out(1.3)" }, 3.5);

      // The three questions ~5s apart, paced for narration
      tl.to("#cp-q1", { y: 0, autoAlpha: 1, duration: 0.5, ease: "back.out(1.4)" }, 7.0);
      tl.to("#cp-q2", { y: 0, autoAlpha: 1, duration: 0.5, ease: "back.out(1.4)" }, 12.0);
      tl.to("#cp-q3", { y: 0, autoAlpha: 1, duration: 0.5, ease: "back.out(1.4)" }, 17.0);

      // Mid-hold beats — each closes a 5s gap, paced to narration
      // 21.0: bad card danger pulse — narration "if any answer is no, too coupled"
      tl.to("#cp-bad", { boxShadow: "0 0 80px rgba(249, 115, 22, 0.45)", duration: 1.2,
        ease: "sine.inOut", yoyo: true, repeat: 1 }, 21.0);
      // 24.5: sequential question highlight — re-emphasize the three tests
      tl.to(["#cp-q1","#cp-q2","#cp-q3"], { scale: 1.025, duration: 0.7, ease: "sine.inOut",
        yoyo: true, repeat: 1, stagger: 0.5 }, 24.5);
      // 28.5: good-card glow — narration "Regardless of how many lines"
      tl.to("#cp-good", { boxShadow: "0 0 80px rgba(59, 130, 246, 0.45)", duration: 1.2,
        ease: "sine.inOut", yoyo: true, repeat: 1 }, 28.5);
      // 32.5: contrast pulse — both cards together — narration "the component is too coupled"
      tl.to(["#cp-bad","#cp-good"], { scale: 1.015, duration: 0.9, ease: "sine.inOut",
        yoyo: true, repeat: 1, stagger: 0.2 }, 32.5);

      // Extend timeline to full slot duration
      // tail-pacing bridge beats — ensure no gap > 3s through scene end
      tl.to("#cp-good", { scale: 1.025, duration: 0.55, ease: "sine.inOut", yoyo: true, repeat: 1 }, 36.50);
      tl.to("#cp-bad", { boxShadow: "0 0 60px rgba(96, 165, 250, 0.35)", duration: 0.8, ease: "sine.inOut", yoyo: true, repeat: 1 }, 39.00);
      tl.to("#cp-q1", { scale: 1.025, duration: 0.55, ease: "sine.inOut", yoyo: true, repeat: 1 }, 41.50);
      tl.to("#cp-q2", { boxShadow: "0 0 60px rgba(96, 165, 250, 0.35)", duration: 0.8, ease: "sine.inOut", yoyo: true, repeat: 1 }, 44.00);
      // Floating key-phrase chips — new content events through the scene
      const _chips_cp_chip = [
        { sel: "#cp-chip-1", in_: 1.50, out: 6.00 },
        { sel: "#cp-chip-2", in_: 7.00, out: 11.50 },
        { sel: "#cp-chip-3", in_: 12.50, out: 17.00 },
        { sel: "#cp-chip-4", in_: 18.00, out: 22.00 },
        { sel: "#cp-chip-5", in_: 22.50, out: 27.00 },
        { sel: "#cp-chip-6", in_: 27.50, out: 31.50 },
        { sel: "#cp-chip-7", in_: 32.50, out: 36.50 },
        { sel: "#cp-chip-8", in_: 37.50, out: 41.50 },
        { sel: "#cp-chip-9", in_: 42.00, out: 45.00 },
      ];
      _chips_cp_chip.forEach(c => {
        tl.fromTo(c.sel, { y: 12, autoAlpha: 0 },
          { y: 0, autoAlpha: 1, duration: 0.45, ease: "back.out(1.4)" }, c.in_);
        tl.to(c.sel, { y: -10, autoAlpha: 0, duration: 0.35, ease: "power2.in" }, c.out);
      });


      tl.set({}, {}, 45.3);
      window.__timelines["scene-coupling"] = tl;
    </script>
  </div>
</template>
