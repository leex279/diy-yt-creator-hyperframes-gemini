<!--
  scene-stat.html — Garry Tan introduction + 89,100 stars stat (~10s).

  Pattern: circular Garry photo + name + role at top -> stat frame mid
           with animated counter -> caption with PR count at bottom.
  Timed to transcript word anchors:
    rel 0.00s  "Garry Tan"      -> photo + name enter
    rel 5.84s  "eighty-nine"    -> stat frame + counter
    rel 8.85s  "pull requests"  -> PR-count caption

  Self-contained sub-composition with its own paused timeline at
  window.__timelines["scene-stat"].
-->
<template id="scene-stat-template">
  <div data-composition-id="scene-stat"
       data-start="0"
       data-width="1080"
       data-height="1920"
       style="position:absolute; inset:0; overflow:hidden;">

    <style>
      #scene-stat-content {
        width:100%; height:100%;
        padding: var(--pad-top) var(--pad-x) var(--pad-bottom);
        display:flex; flex-direction:column;
        align-items:center; justify-content:flex-start;
        text-align:center; gap:24px;
        box-sizing:border-box;
      }
      #scene-stat-content .photo-wrap {
        position: relative;
        width: 380px; height: 380px;
        border-radius: 50%;
        overflow: hidden;
        border: 6px solid var(--accent-warm);
        box-shadow: 0 18px 40px rgba(0, 0, 0, 0.55);
        background: #1A1A1A;
      }
      #scene-stat-content .photo-wrap img {
        width: 100%; height: 100%;
        object-fit: cover;
        display: block;
      }
      #scene-stat-content .name {
        font-family: 'Inter', system-ui, sans-serif;
        font-weight: 900;
        font-size: 92px;
        line-height: 1.0;
        letter-spacing: -3px;
        color: #FFFFFF;
        margin-top: 12px;
      }
      #scene-stat-content .role {
        font-family: 'JetBrains Mono', ui-monospace, monospace;
        font-weight: 700;
        font-size: 32px;
        letter-spacing: 4px;
        text-transform: uppercase;
        color: var(--accent-warm);
        padding: 12px 26px;
        background: rgba(255, 255, 255, 0.06);
        border: 1.5px solid rgba(255, 102, 0, 0.55);
        border-radius: 10px;
      }
      #scene-stat-content .stat-frame {
        margin-top: 28px;
        position: relative;
        display: inline-flex;
        align-items: baseline;
        justify-content: center;
        padding: 28px 56px;
        background: rgba(255, 102, 0, 0.10);
        border: 3px solid var(--accent-warm);
        border-radius: 22px;
        box-shadow: 0 16px 40px rgba(0, 0, 0, 0.45);
      }
      #scene-stat-content .stat-num {
        font-family: 'Inter', system-ui, sans-serif;
        font-weight: 900;
        font-size: 220px;
        line-height: 1.0;
        letter-spacing: -10px;
        color: var(--accent-warm);
        font-variant-numeric: tabular-nums lining-nums;
      }
      #scene-stat-content .stat-suffix {
        font-family: 'Inter', system-ui, sans-serif;
        font-weight: 900;
        font-size: 112px;
        color: var(--accent-gold);
        margin-left: 14px;
        line-height: 1.0;
      }
      #scene-stat-content .caption {
        font-family: 'JetBrains Mono', ui-monospace, monospace;
        font-weight: 600;
        font-size: 34px;
        letter-spacing: 1px;
        color: #FFFFFF;
        max-width: 940px;
        line-height: 1.4;
        background: rgba(255, 255, 255, 0.06);
        padding: 16px 28px;
        border-radius: 10px;
        border: 1px solid rgba(255, 255, 255, 0.14);
      }
      #scene-stat-content .caption .pill-num {
        font-weight: 900;
        color: var(--accent-warm);
      }
    </style>

    <div id="scene-stat-content">
      <div class="photo-wrap" id="stat-photo-wrap">
        <img id="stat-photo" src="assets/garry-tan.png" alt="Garry Tan" />
      </div>
      <div class="name" id="stat-name">Garry Tan</div>
      <div class="role" id="stat-role">President &amp; CEO &middot; Y Combinator</div>
      <div class="stat-frame" id="stat-frame">
        <span class="stat-num" id="stat-num">0</span><span class="stat-suffix" id="stat-suffix">&#9733;</span>
      </div>
      <div class="caption" id="stat-caption">
        <span class="pill-num">320+</span> pull requests &middot; MIT-licensed &middot; github.com/garrytan/gstack
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({ paused: true });

      const counter = { v: 0 };
      const target = 89100;
      const numEl = document.getElementById('stat-num');
      const formatStars = (n) => Math.round(n).toLocaleString('en-US');

      // Hidden-until-reveal pattern — every element starts hidden, then
      // reveals on its narration anchor.
      tl.set("#stat-photo-wrap", { scale: 0.7, opacity: 0 }, 0);
      tl.set("#stat-name",       { y: 30, opacity: 0 }, 0);
      tl.set("#stat-role",       { y: 18, opacity: 0 }, 0);
      tl.set("#stat-frame",      { scale: 0.7, opacity: 0 }, 0);
      tl.set("#stat-suffix",     { x: -20, opacity: 0 }, 0);
      tl.set("#stat-caption",    { y: 18, opacity: 0 }, 0);

      // Beat 1 (rel 0.00s): "Garry Tan" -> photo + name enter
      tl.to("#stat-photo-wrap", { scale: 1, opacity: 1, duration: 0.7, ease: "back.out(1.5)" }, 0.05);
      tl.to("#stat-name",       { y: 0, opacity: 1, duration: 0.55, ease: "power3.out" }, 0.30);
      // Beat 2 (rel 0.86s): "CEO" -> role pill enter
      tl.to("#stat-role",       { y: 0, opacity: 1, duration: 0.5, ease: "power2.out" }, 0.86);

      // Beat 3 (rel 5.84s): "eighty-nine thousand" -> stat frame slams in + counter ramps
      tl.to("#stat-frame",   { scale: 1, opacity: 1, duration: 0.6, ease: "back.out(1.6)" }, 5.84);
      tl.to(counter, {
        v: target,
        duration: 1.4,
        ease: "power2.out",
        onUpdate: () => { numEl.textContent = formatStars(counter.v); }
      }, 5.95);
      tl.to("#stat-suffix",  { x: 0, opacity: 1, duration: 0.4, ease: "power2.out" }, 7.10);

      // Beat 4 (rel 8.85s): "pull requests" -> caption enters
      tl.to("#stat-caption", { y: 0, opacity: 1, duration: 0.55, ease: "power2.out" }, 8.50);

      // Subtle frame breathe
      tl.to("#stat-frame", { scale: 1.025, duration: 0.5, ease: "power2.inOut", yoyo: true, repeat: 1 }, 9.7);

      window.__timelines["scene-stat"] = tl;
    </script>
  </div>
</template>
