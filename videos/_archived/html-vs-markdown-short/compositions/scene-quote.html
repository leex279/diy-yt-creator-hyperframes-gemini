<!--
  scene-quote.html — Thesis pull-quote (12.7–21.0s, scene-rel 0–8.3s).
  Beats:
    0.08 — "His claim:"
    0.70 — "MARKDOWN IS THE WRONG FORMAT." (huge italic punch)
    3.02 — "For every spec, every plan, every PR writeup."
    6.43 — "Almost all of it. OUT." (red stamp)
-->
<template id="scene-quote-template">
  <div data-composition-id="scene-quote"
       data-start="0"
       data-width="1080"
       data-height="1920"
       style="position:absolute; inset:0; overflow:hidden;
              font-family:var(--serif); color:var(--text);">

    <style>
      #sq-content {
        width: 100%; height: 100%;
        padding: var(--pad-top) var(--pad-x) var(--pad-bottom);
        position: relative;
        box-sizing: border-box;
        display: flex;
        flex-direction: column;
        justify-content: center;
        gap: 40px;
      }
      .sq-overline {
        font-family: var(--mono);
        font-weight: 700;
        font-size: 32px;
        letter-spacing: 6px;
        text-transform: uppercase;
        color: var(--accent-2);
      }
      .sq-quote {
        font-family: var(--serif);
        font-weight: 800;
        font-style: italic;
        font-size: 124px;
        line-height: 0.95;
        letter-spacing: -2px;
        color: var(--text);
      }
      .sq-quote .sq-em {
        color: var(--accent-1);
        font-style: italic;
      }
      .sq-targets {
        display: flex;
        flex-direction: column;
        gap: 18px;
        font-family: var(--mono);
        font-weight: 700;
        font-size: 38px;
        letter-spacing: 2px;
        text-transform: uppercase;
        color: var(--text-secondary);
      }
      .sq-target-row {
        display: flex;
        align-items: center;
        gap: 16px;
      }
      .sq-target-row::before {
        content: "/";
        color: var(--accent-1);
        font-weight: 900;
        font-size: 44px;
      }
      .sq-stamp {
        font-family: var(--serif);
        font-weight: 900;
        font-style: italic;
        font-size: 124px;
        letter-spacing: -2px;
        color: var(--accent-1);
        align-self: flex-start;
        margin-top: 8px;
        line-height: 1.05;
      }
      .sq-stamp .sq-stamp-bg {
        background: rgba(199, 90, 63, 0.10);
        border: 3px solid var(--accent-1);
        border-radius: 18px;
        padding: 26px 36px;
        display: inline-block;
      }
    </style>

    <div id="sq-content">
      <div class="sq-overline" id="sq-overline">HIS CLAIM</div>

      <div class="sq-quote" id="sq-quote">
        <span id="sq-q1">Markdown is the </span><span class="sq-em" id="sq-q-em">wrong format.</span>
      </div>

      <div class="sq-targets" id="sq-targets">
        <div class="sq-target-row" id="sq-t1">Specs</div>
        <div class="sq-target-row" id="sq-t2">Plans</div>
        <div class="sq-target-row" id="sq-t3">P R Writeups</div>
      </div>

      <div class="sq-stamp" id="sq-stamp"><span class="sq-stamp-bg">OUT.</span></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({ paused: true, defaults: { ease: "power3.out" } });

      tl.set("#sq-overline", { y: -8, opacity: 0 }, 0);
      tl.set("#sq-q1",       { y: 16, opacity: 0 }, 0);
      tl.set("#sq-q-em",     { y: 24, opacity: 0, scale: 0.85, filter: "blur(15px)" }, 0);
      tl.set("#sq-t1",       { x: -16, opacity: 0 }, 0);
      tl.set("#sq-t2",       { x: -16, opacity: 0 }, 0);
      tl.set("#sq-t3",       { x: -16, opacity: 0 }, 0);
      tl.set("#sq-stamp",    { scale: 0.5, opacity: 0, filter: "blur(20px)" }, 0);

      tl.to("#sq-overline", { y: 0, opacity: 1, duration: 0.4 }, 0.08);
      tl.to("#sq-q1",       { y: 0, opacity: 1, duration: 0.55 }, 0.50);
      tl.to("#sq-q-em",     { y: 0, opacity: 1, scale: 1, filter: "blur(0px)", duration: 0.6, ease: "back.out(1.5)" }, 1.00);

      tl.to("#sq-t1", { x: 0, opacity: 1, duration: 0.4 }, 3.02);
      tl.to("#sq-t2", { x: 0, opacity: 1, duration: 0.4 }, 3.45);
      tl.to("#sq-t3", { x: 0, opacity: 1, duration: 0.4 }, 3.95);

      tl.to("#sq-stamp", { scale: 1, opacity: 1, filter: "blur(0px)", duration: 0.55, ease: "back.out(1.6)" }, 6.43);
      tl.to("#sq-stamp", { x: -6, duration: 0.04, yoyo: true, repeat: 5 }, 6.73);
      tl.to("#sq-stamp", { scale: 1.04, duration: 0.3, yoyo: true, repeat: 1, ease: "power2.out" }, 7.20);

      window.__timelines["scene-quote"] = tl;
    </script>
  </div>
</template>
