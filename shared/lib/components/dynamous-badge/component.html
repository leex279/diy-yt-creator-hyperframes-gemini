<div id="dynamous-badge">
  <img id="dynamous-badge-mark" src="assets/dynamous-logo.png" alt="Dynamous" crossorigin="anonymous" />
  <span id="dynamous-badge-url">dynamous.ai</span>

<!-- 2) CSS — merge into your composition's <style> block. NOTE: position
        absolute, z-index 10, NO class="clip" (the badge is persistent,
        not part of the clip system). -->

<style>
  /* shared/lib/components/dynamous-badge — keep this comment block */
  #dynamous-badge {
    position: absolute;
    bottom: 460px;
    /* clear of YouTube Shorts subscribe / action column (bottom 380 reserve + breathing room) */
    left: 60px;
    /* clear of left-edge safe zone */
    z-index: 10;
    pointer-events: none;
    display: flex;
    align-items: center;
    gap: 18px;
    padding: 12px 21px 12px 15px;
    background: rgba(15, 23, 42, 0.55);
    /* midroll bgDark @ 55% — glass surface */
    border: 1px solid rgba(255, 255, 255, 0.08);
    /* midroll glassBorder */
    border-radius: 999px;
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    opacity: 0.55;
    /* idle — subtle but readable on dark canvases */
    filter: drop-shadow(0 3px 12px rgba(0, 0, 0, 0.4));
  }

  #dynamous-badge-mark {
    width: 50px;
    height: 50px;
    display: block;
  }

  #dynamous-badge-url {
    font-family: 'Inter', system-ui, sans-serif;
    font-weight: 600;
    font-size: 40px;
    letter-spacing: 0.6px;
    color: #e2e8f0;
    /* midroll textPrimary — meets AA on the dark canvas */
  }
</style>

<!-- 3) JS — call from the host root timeline. Single 0.6s entrance at
        t=3.0s, then static. The 3.0s delay is INTENTIONAL: strategy
        doc rule "You have less than 3 seconds to stop the scroll.
        Never start the video with the brand name." -->

<script>
  function addDynamousBadgeEntrance(tl) {
    // DO NOT lower the start time below 3.0s — the badge must not
    // compete with the opening hook frame.
    tl.from("#dynamous-badge", { opacity: 0, x: -12, duration: 0.6, ease: "power2.out" }, 3.0);
  }
  // Usage: addDynamousBadgeEntrance(tl);
</script>
