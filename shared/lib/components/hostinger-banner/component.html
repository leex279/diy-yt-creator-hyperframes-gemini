<!--
  shared/lib/components/hostinger-banner/component.html
  Animated Hostinger sponsorship banner for long-form (1920x1080) videos.
  Flat horizontal strip showing the Hostinger wordmark, headline, three
  product pills (Web Hosting / VPS / AI Website Builder), a green
  "10% OFF" badge, and a trailing URL panel pointing at the affiliate
  link. Each element staggers in with a spring; pills settle into a
  subtle idle glow; the whole banner flies in/out.

  Total on-screen lifetime: ~8 seconds. Host typically wires this when
  the narrator mentions the sponsor ("sponsored by Hostinger…" or
  "by the way, today's video is brought to you by Hostinger").

  AFFILIATE DETAILS — locked across all videos:
    URL:   hostinger.com/DIYSMARTCODE
    CODE:  DIYSMARTCODE  (10% off, auto-applied via link)

  SOURCE:
    shared/lib/components/support-banner/component.html (sibling
      component — identical fly-in / fly-out lifecycle, paste-in
      section ordering, profile-on-left card layout)
    templates/long-form/hostinger-sponsored/ (brand colors, type
      system, motion eases — matches the existing video template)

  ──────────────────────────────────────────────────────────────────────
  IMPORTANT — HOSTINGER LOGO MUST BE A LOCAL COPY
  ──────────────────────────────────────────────────────────────────────
  HyperFrames' bundler rejects parent-of-project paths, so copy the SVG
  into the video's assets folder before wiring:

    cp shared/logos/hostinger-brand/Hostinger_Horizontal_Purple.svg \
       videos/<slug>/assets/hostinger-horizontal-purple.svg

  PowerShell:
    Copy-Item shared/logos/hostinger-brand/Hostinger_Horizontal_Purple.svg `
              videos/<slug>/assets/hostinger-horizontal-purple.svg

  On the dark-card variant (see "Dark variant" below) copy
  Hostinger_Horizontal_White.svg instead.

  ──────────────────────────────────────────────────────────────────────
  GERMAN AD DISCLOSURE (Werbung)
  ──────────────────────────────────────────────────────────────────────
  Hostinger is a paid affiliate, so the banner carries a "Werbung" badge
  in the top-right corner of the card (mirrors dec-werbung in
  shared/lib/blocks/dynamous-endcard/). Do not hide it — German ad-law
  compliance.
-->

<!-- 3) JS — call from the host root timeline. Hides everything at t=0 then
        reveals on the schedule below. Pass the absolute start time in
        seconds; banner exits ~7s later. -->

<script>
  /**
   * addHostingerBanner(tl, t, opts?)
   *   tl   — host paused timeline (gsap.timeline({paused: true}))
   *   t    — absolute time (seconds) at which the banner enters
   *   opts — { headline?: string, tagline?: string, url?: string,
   *            discountLabel?: string }
   *          Defaults:
   *            headline      "Try Hostinger"
   *            tagline       "10% OFF with code DIYSMARTCODE"
   *            url           "hostinger.com/DIYSMARTCODE"
   *            discountLabel "10% OFF"
   *
   * Lifetime: t .. t + 8.0s (banner exits at t + 7.0s, exit takes ~0.6s).
   */
  function addHostingerBanner(tl, t, opts) {
    opts = opts || {};
    if (typeof opts.headline === 'string') {
      var h = document.getElementById('host-headline');
      if (h) h.textContent = opts.headline;
    }
    if (typeof opts.tagline === 'string') {
      var tg = document.getElementById('host-tagline');
      if (tg) tg.innerHTML = opts.tagline;
    }
    if (typeof opts.url === 'string') {
      var u = document.getElementById('host-url');
      if (u) u.textContent = opts.url;
    }
    if (typeof opts.discountLabel === 'string') {
      var d = document.querySelector('#host-banner .host-discount');
      if (d) d.textContent = opts.discountLabel;
    }

    // ── Hide everything at t=0 — bullet-proof seek-to-frame-0 ──
    // xPercent: -50 replaces the translateX(-50%) centering that used to
    // live in CSS — GSAP now owns the full transform on #host-banner.
    tl.set('#host-banner', { opacity: 0, y: 80, xPercent: -50 }, 0);
    tl.set('.host-logo', { opacity: 0, scale: 0.6 }, 0);
    tl.set('.host-headline', { opacity: 0, x: -28 }, 0);
    tl.set('.host-tagline', { opacity: 0, x: -28 }, 0);
    tl.set('.host-pill-web', { opacity: 0, y: 28, scale: 0.7 }, 0);
    tl.set('.host-pill-vps', { opacity: 0, y: 28, scale: 0.7 }, 0);
    tl.set('.host-pill-ai', { opacity: 0, y: 28, scale: 0.7 }, 0);
    tl.set('.host-pill-web .host-pill-icon', { scale: 1 }, 0);
    tl.set('.host-pill-vps .host-pill-icon', { scale: 1 }, 0);
    tl.set('.host-pill-ai .host-pill-icon', { scale: 1 }, 0);
    tl.set('.host-discount', { opacity: 0, scale: 0.5 }, 0);
    tl.set('.host-url-panel', { opacity: 0 }, 0);

    // ── Banner spring-in (frame 0) ──
    tl.to('#host-banner', { opacity: 1, y: 0, duration: 0.55, ease: 'back.out(1.4)', overwrite: 'auto' }, t);

    // ── Logo pop (frame 8 ≈ 0.27s) ──
    tl.to('.host-logo', { opacity: 1, scale: 1, duration: 0.5, ease: 'back.out(1.6)', overwrite: 'auto' }, t + 0.27);

    // ── Headline slide (frame 14 ≈ 0.47s) ──
    tl.to('.host-headline', { opacity: 1, x: 0, duration: 0.5, ease: 'power2.out', overwrite: 'auto' }, t + 0.47);

    // ── Tagline slide (frame 18 ≈ 0.6s) ──
    tl.to('.host-tagline', { opacity: 1, x: 0, duration: 0.5, ease: 'power2.out', overwrite: 'auto' }, t + 0.6);

    // ── Pills stagger in (frames 26 / 36 / 46) ──
    tl.to('.host-pill-web', { opacity: 1, y: 0, scale: 1, duration: 0.5, ease: 'back.out(1.4)', overwrite: 'auto' }, t + 0.87);
    tl.to('.host-pill-vps', { opacity: 1, y: 0, scale: 1, duration: 0.5, ease: 'back.out(1.4)', overwrite: 'auto' }, t + 1.13);
    tl.to('.host-pill-ai',  { opacity: 1, y: 0, scale: 1, duration: 0.5, ease: 'back.out(1.4)', overwrite: 'auto' }, t + 1.39);

    // ── Discount badge pop (frame 50 ≈ 1.67s) — back.out with extra spring ──
    tl.to('.host-discount', { opacity: 1, scale: 1, duration: 0.55, ease: 'back.out(1.8)', overwrite: 'auto' }, t + 1.67);

    // ── URL panel fade-in (frame 60 ≈ 2.0s) ──
    tl.to('.host-url-panel', { opacity: 1, duration: 0.5, ease: 'power2.out', overwrite: 'auto' }, t + 2.0);

    // ── Idle icon pulse (frame 80+ ≈ 2.67s onward, staggered per pill) ──
    var pulseDur = 1.3;
    var pulseRepeats = 3;
    var pulseEase = 'sine.inOut';

    var icon1 = gsap.timeline();
    icon1.fromTo('.host-pill-web .host-pill-icon', { scale: 1 },
      { scale: 1.08, duration: pulseDur, ease: pulseEase, yoyo: true, repeat: pulseRepeats });
    tl.add(icon1, t + 2.67);

    var icon2 = gsap.timeline();
    icon2.fromTo('.host-pill-vps .host-pill-icon', { scale: 1 },
      { scale: 1.08, duration: pulseDur, ease: pulseEase, yoyo: true, repeat: pulseRepeats });
    tl.add(icon2, t + 2.87);

    var icon3 = gsap.timeline();
    icon3.fromTo('.host-pill-ai .host-pill-icon', { scale: 1 },
      { scale: 1.08, duration: pulseDur, ease: pulseEase, yoyo: true, repeat: pulseRepeats });
    tl.add(icon3, t + 3.07);

    // ── Discount badge breath pulse (sympathetic emphasis) ──
    var discountPulse = gsap.timeline();
    discountPulse.fromTo('.host-discount', { scale: 1 },
      { scale: 1.05, duration: 1.1, ease: pulseEase, yoyo: true, repeat: 3 });
    tl.add(discountPulse, t + 2.5);

    // ── Banner fly out (frame 210 ≈ 7.0s) ──
    tl.to('#host-banner', { opacity: 0, y: 120, duration: 0.6, ease: 'back.in(1.0)', overwrite: 'auto' }, t + 7.0);
  }
  // Usage:
  //   addHostingerBanner(tl, 28.0);
  //   addHostingerBanner(tl, 28.0, { headline: "Today's sponsor: Hostinger" });
</script>
