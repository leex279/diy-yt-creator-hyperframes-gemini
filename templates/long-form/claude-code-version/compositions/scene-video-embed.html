<!--
  scene-video-embed.html — Animated wrapper around an embedded video element.

  HARD RULE: never animate the video element directly — wrapper only.
  The video element itself does NOT take class="clip"; the wrapper div
  takes it. The audio track is a separate audio element with a
  DIFFERENT src filename than the video (e.g. demo-audio.mp3 extracted
  via ffmpeg from the .mp4) — pointing both at the same source produces
  a duplicate-media warning.

  Operator drops their MP4 at assets/clips/demo.mp4. Until then, the
  scene shows a placeholder slate.
-->
<template id="scene-video-embed-template">
  <div data-composition-id="scene-video-embed"
       data-start="0"
       data-width="1920"
       data-height="1080"
       style="position:absolute; inset:0; overflow:hidden;
              font-family:var(--sans); color:var(--text);">

    <style>
      #scene-video-embed-content {
        width:100%; height:100%;
        padding: var(--pad-top) var(--pad-x) var(--pad-bottom);
        display:flex; flex-direction:column;
        align-items:center; justify-content:center;
        gap: 28px;
        box-sizing:border-box;
      }
      #scene-video-embed-content .header-block {
        display:flex; flex-direction:column;
        align-items:center; gap:12px;
        text-align:center;
      }
      #scene-video-embed-content .overline {
        font-family: var(--mono);
        font-weight: 700;
        font-size: 26px;
        letter-spacing: 6px;
        text-transform: uppercase;
        color: var(--accent-2);
      }
      #scene-video-embed-content .caption {
        font-family: var(--sans);
        font-weight: 800;
        font-size: 48px;
        line-height: 1.05;
        letter-spacing: -0.5px;
        color: var(--text);
      }
      #video-frame-wrapper {
        width: 1500px;
        height: 720px;
        border-radius: 24px;
        border: 2px solid var(--border-bright);
        box-shadow: 0 32px 80px rgba(0, 0, 0, 0.7);
        overflow: hidden;
        position: relative;
        background: rgba(255, 255, 255, 0.04);
      }
      #video-frame-wrapper video {
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: block;
      }
    </style>

    <div id="scene-video-embed-content">
      <div class="header-block">
        <div class="overline" id="vembed-overline">DEMO · IN ACTION</div>
        <div class="caption"  id="vembed-caption">See it run</div>
      </div>

      <div id="video-frame-wrapper">
        <!-- Placeholder slate visible until operator wires a real clip.
             Render hard-fails when a video element points at a missing
             .mp4 (HyperFrames waits for video metadata before capture).
             When you have a clip, replace the placeholder div below with
             the video element snippet from README.md. -->
        <div id="vembed-placeholder"
             style="width:100%; height:100%;
                    display:flex; align-items:center; justify-content:center;
                    background: linear-gradient(135deg, rgba(6,182,212,0.10), rgba(139,92,246,0.06));
                    font-family: var(--mono); font-weight: 700;
                    font-size: 24px; letter-spacing: 4px; text-transform: uppercase;
                    color: var(--text-secondary);">
          DROP YOUR CLIP &middot; assets/clips/demo.mp4
        </div>
      </div>
    </div>

    <!-- Operator wires the video element when assets/clips/demo.mp4 is
         in place. Snippet and full instructions live in README.md under
         "Embedded video — bringing the audio in". -->

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({
        paused: true,
        defaults: { ease: "power3.out", duration: 0.6 }
      });

      tl.from("#vembed-overline",       { y: 20, opacity: 0, duration: 0.5, ease: "power2.out", immediateRender: false }, 0);
      tl.from("#vembed-caption",        { y: 30, opacity: 0, duration: 0.6, ease: "power3.out", immediateRender: false }, 0.3);
      tl.from("#video-frame-wrapper",   { scale: 0.92, opacity: 0, duration: 0.6, ease: "power3.out", immediateRender: false }, 0.7);

      window.__timelines["scene-video-embed"] = tl;
    </script>
  </div>
</template>
