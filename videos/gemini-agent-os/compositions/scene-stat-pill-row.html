      /* SPEED GAUGE WIDGET */

      /* LAYER 2: BENCHMARK GRID (2x2) */
      #benchmark-grid {
        position: absolute;
        top: 10px;
        left: 100px;
        width: 1520px;
        height: 480px;
        display: grid;
        grid-template-columns: 1fr 1fr;
        grid-template-rows: 1fr 1fr;
        gap: 30px;
        transform-style: preserve-3d;
        will-change: transform, opacity;
        opacity: 0;
        visibility: hidden;
      }
      
      .bench-card {
        padding: 24px 36px;
        display: flex;
        align-items: center;
        gap: 32px;
        border: 1.5px solid rgba(255, 255, 255, 0.08);

        z-index: 1;

      /* Clockwise glowing animated border SVG & rect */

        transform: translateZ(0);
        will-change: transform, opacity;
        opacity: 0;

      .glow-rect-blur {
        fill: none;
        stroke: var(--bench-color, var(--g-blue));
        stroke-width: 6;
        stroke-dasharray: 350 1550;
        stroke-dashoffset: 1900;
        filter: blur(5px);
        will-change: stroke-dashoffset;
      }
      .glow-rect-sharp {
        fill: none;
        stroke: var(--bench-color, var(--g-blue));
        stroke-width: 2.5;
        stroke-dasharray: 350 1550;
        stroke-dashoffset: 1900;
        will-change: stroke-dashoffset;
      }
      .bench-num-wrap {
        display: flex;
        align-items: baseline;
        position: relative;

      .bench-num {

        font-size: 88px;
        letter-spacing: -3px;
        line-height: 1;
        font-variant-numeric: tabular-nums lining-nums;

        content: "";
        position: absolute;
        bottom: -6px;
        left: 0;
        width: 100%;
        height: 4px;
        background: var(--bench-color, var(--g-blue));
        box-shadow: 0 0 12px var(--bench-color, var(--g-blue));

      .bench-info {
        display: flex;
        flex-direction: column;
        gap: 4px;
      }
      .bench-label {
        font-family: 'JetBrains Mono', monospace;
        font-weight: 700;
        font-size: 19px;
        letter-spacing: 1.5px;
        text-transform: uppercase;
        color: var(--text);
      }
      .bench-desc {
        font-size: 14px;
        color: var(--text-secondary);
        line-height: 1.3;
      }
      
      /* Technical Capability Chips in Benchmarks */
      .bench-chips-container {
        display: flex;
        flex-direction: row;
        gap: 8px;
        margin-top: 8px;

      .bench-chip {
        font-family: 'JetBrains Mono', monospace;
        font-size: 11px;

        border-radius: 6px;
        display: flex;
        align-items: center;
        gap: 4px;

      /* Custom colors per card */
      .bench-card.orange { --bench-color: var(--g-red); }
      .bench-card.cyan { --bench-color: #00BCD4; }

      /* LAYER 3: APP SHELF */
      #app-shelf {

        width: 40px;

      }
      .app-label {
        font-family: 'JetBrains Mono', monospace;
        font-size: 14px;
        font-weight: 700;
        letter-spacing: 1.2px;
        text-transform: uppercase;
        color: var(--text-muted);
        text-align: center;
        max-width: 95%;
        line-height: 1.2;
        transition: color 0.5s ease;
      }

      /* Active illuminated states */
      .app-item.active {
        opacity: 1 !important;
        transform: scale(1.15) !important;
        filter: grayscale(0%) !important;
      }
      .app-item.active .app-icon-wrap {
        background: rgba(10, 15, 30, 0.95);
        border-color: var(--app-color);
        box-shadow: 
          0 0 30px var(--app-color-glow),
          0 10px 25px rgba(0, 0, 0, 0.5);
      }
      .app-item.active .app-label {
        color: var(--text);
