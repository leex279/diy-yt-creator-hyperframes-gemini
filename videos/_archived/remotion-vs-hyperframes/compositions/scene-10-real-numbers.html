<template id="scene-10-real-numbers-template">
  <div data-composition-id="scene-10-real-numbers"
       data-start="0"
       data-width="1920"
       data-height="1080"
       style="position:absolute; inset:0; overflow:hidden;
              font-family:var(--sans); color:var(--ink);">

    <style>
      #s10-eyebrow {
        position:absolute; left: 96px; top: 130px;
        font-family: var(--mono); font-size: 22px; letter-spacing: .22em;
        text-transform: uppercase; color: var(--ink-3);
      }
      #s10-eyebrow .dot { display:inline-block; width:8px; height:8px; border-radius:50%; background: var(--accent); margin-right: 14px; }
      #s10-h2 {
        position:absolute; left: 96px; right: 96px; top: 168px;
        font-family: var(--serif);
        font-weight: 500;
        font-size: 84px;
        letter-spacing: -.025em;
      }
      #s10-h2 em { color: var(--ink-3); font-style: italic; }

      #s10-table {
        position:absolute; left: 96px; right: 96px; top: 360px;
        border-top: 1px solid var(--rule);
      }
      .s10-row {
        display: grid;
        grid-template-columns: 1fr 1fr 1fr;
        border-bottom: 1px solid var(--rule);
        align-items: center;
        min-height: 88px;
        padding: 0 28px;
      }
      .s10-row.head {
        border-bottom: 1px solid var(--rule-2);
        background: rgba(255,255,255,.02);
        min-height: 96px;
      }
      .s10-cell-label {
        font-family: var(--mono); font-size: 18px; letter-spacing: .14em;
        text-transform: uppercase; color: var(--ink-2);
      }
      .s10-cell-val {
        font-family: var(--sans); font-size: 38px; font-weight: 600;
        color: var(--ink); line-height: 1.2;
      }
      .s10-cell-val .sub {
        display: block;
        font-family: var(--mono); font-size: 14px; letter-spacing: .12em;
        text-transform: uppercase; color: var(--ink-3); margin-top: 4px;
      }
      .s10-col-r { color: var(--remotion); font-family: var(--display); font-size: 36px; font-weight: 400; letter-spacing: .005em; }
      .s10-col-h { color: var(--hyper);    font-family: var(--display); font-size: 36px; font-weight: 400; letter-spacing: .005em; }

      #s10-disclaimer {
        position:absolute; left: 96px; right: 96px; bottom: 50px;
        text-align: center;
        font-family: var(--mono); font-size: 16px;
        letter-spacing: .12em; text-transform: uppercase;
        color: var(--ink-3);
      }
    </style>

    <div id="s10-eyebrow"><span class="dot"></span>SETUP TAX · MEASURED</div>
    <h2 id="s10-h2">Same machine. <em>Same task. Real numbers.</em></h2>

    <div id="s10-table">
      <div class="s10-row head">
        <div class="s10-cell-label">METRIC</div>
        <div class="s10-col-r">Remotion</div>
        <div class="s10-col-h">HyperFrames</div>
      </div>
      <div class="s10-row" id="s10-r1">
        <div class="s10-cell-label">npm install</div>
        <div class="s10-cell-val">32.78s<span class="sub">278 MB · 205 packages</span></div>
        <div class="s10-cell-val">0 s<span class="sub">npx-pinned · no install</span></div>
      </div>
      <div class="s10-row" id="s10-r2">
        <div class="s10-cell-label">render (5s clip)</div>
        <div class="s10-cell-val">16.4 s<span class="sub">default HelloWorld</span></div>
        <div class="s10-cell-val">7.1 s<span class="sub">warm cache</span></div>
      </div>
      <div class="s10-row" id="s10-r3">
        <div class="s10-cell-label">time to first video</div>
        <div class="s10-cell-val">~50 s<span class="sub">install + render</span></div>
        <div class="s10-cell-val">~7 s<span class="sub">no install step</span></div>
      </div>
    </div>

    <div id="s10-disclaimer">
      Same Node 22 · same machine · default templates differ in complexity (HelloWorld is more elaborate)
    </div>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({ paused: true, defaults: { ease: "power3.out" } });

      tl.set("#s10-eyebrow", { opacity: 0 }, 0);
      tl.set("#s10-h2",      { y: 30, opacity: 0 }, 0);
      tl.set("#s10-table",   { opacity: 0 }, 0);
      ["#s10-r1","#s10-r2","#s10-r3"].forEach(s => tl.set(s, { y: 16, opacity: 0 }, 0));
      tl.set("#s10-disclaimer", { opacity: 0 }, 0);

      tl.to("#s10-eyebrow", { opacity: 1, duration: 0.5 }, 0.2);
      tl.to("#s10-h2",      { y: 0, opacity: 1, duration: 0.7 }, 0.4);
      tl.to("#s10-table",   { opacity: 1, duration: 0.5 }, 1.2);

      // ── Scene ~40s. Reveals re-anchored to narration word positions: ──
      //   "thirty-three seconds" @ scene_t=7.94 → r1 reveal at 6.5
      //   "sixteen seconds"      @ scene_t=16.76 → r2 reveal at 15.0
      //   "fifty seconds"        @ scene_t=32.24 → r3 reveal at 30.5
      //   "setup tax"            @ scene_t=37.22 → disclaimer reveal at 36.5
      tl.to("#s10-r1", { y: 0, opacity: 1, duration: 0.5 }, 6.5);
      tl.to("#s10-r2", { y: 0, opacity: 1, duration: 0.5 }, 15.0);
      tl.to("#s10-r3", { y: 0, opacity: 1, duration: 0.5 }, 30.5);
      tl.to("#s10-disclaimer", { opacity: 1, duration: 0.5 }, 36.5);

      // Mid-beats — value-cell pulse aligned to specific narration word hits
      tl.to("#s10-r1 .s10-cell-val:nth-child(2)", { color: "#ff4d1a", duration: 0.7, ease: "sine.inOut", yoyo: true, repeat: 1 }, 7.9);   // "thirty-three"
      tl.to("#s10-r1 .s10-cell-val:nth-child(3)", { color: "#00ff9d", duration: 0.7, ease: "sine.inOut", yoyo: true, repeat: 1 }, 22.3);  // "instantly"
      tl.to("#s10-r2 .s10-cell-val:nth-child(2)", { color: "#ffd24a", duration: 0.7, ease: "sine.inOut", yoyo: true, repeat: 1 }, 16.8);  // "sixteen seconds"
      tl.to("#s10-r2 .s10-cell-val:nth-child(3)", { color: "#00ff9d", duration: 0.7, ease: "sine.inOut", yoyo: true, repeat: 1 }, 26.5);  // "seven seconds"
      tl.to("#s10-r3 .s10-cell-val:nth-child(2)", { scale: 1.06, color: "#ff4d1a", duration: 0.8, ease: "sine.inOut", yoyo: true, repeat: 1 }, 32.2);  // "fifty seconds"
      tl.to("#s10-r3 .s10-cell-val:nth-child(3)", { scale: 1.06, color: "#00ff9d", duration: 0.8, ease: "sine.inOut", yoyo: true, repeat: 1 }, 33.3);  // "hyperframes seven"
      tl.to("#s10-h2 em", { color: "#c4ff3e", duration: 1.4, ease: "sine.inOut", yoyo: true, repeat: 7 }, 4.0);
      tl.to("#s10-eyebrow .dot", { scale: 1.5, duration: 1.0, ease: "sine.inOut", yoyo: true, repeat: 19 }, 1.0);

      window.__timelines["scene-10-real-numbers"] = tl;
    </script>
  </div>
</template>
