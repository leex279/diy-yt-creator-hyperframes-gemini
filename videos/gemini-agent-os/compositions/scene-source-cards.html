<template id="scene-source-cards-template">
  <div data-composition-id="scene-source-cards"
       data-start="0"
       data-width="1920"
       data-height="1080"
       style="position:absolute; inset:0; overflow:hidden;
              font-family:'Inter', sans-serif; color:var(--text);">

    <style>
      #scene-source-cards-content {
        position: relative;
        width: 100%;
        height: 100%;
        box-sizing: border-box;
      }
      #scene-source-cards-content .header-block {
        position: absolute;
        top: 80px;
        left: 50%;
        transform: translateX(-50%);
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 16px;
        text-align: center;
        width: 100%;
      }
      #scene-source-cards-content .overline {
        font-family: 'JetBrains Mono', monospace;
        font-weight: 700;
        font-size: 28px;
        letter-spacing: 6px;
        text-transform: uppercase;
        color: var(--accent-1);
      }
      #scene-source-cards-content .headline {
        font-family: 'Inter', sans-serif;
        font-weight: 800;
        font-size: 52px;
        line-height: 1.05;
        letter-spacing: -1px;
        color: var(--text);
      }
      
      /* Premium Browser Video Showcase */
      #spark-video-container {
        position: absolute;
        top: 290px;
        left: 50%;
        width: 1140px;
        height: 585px;
        border-radius: 20px;
        overflow: hidden;
        background: rgba(10, 10, 12, 0.75);
        border: 2px solid rgba(255, 255, 255, 0.12);
        box-shadow: 0 30px 100px -20px rgba(0, 0, 0, 0.8), 
                    inset 0 1px 0 0 rgba(255, 255, 255, 0.15), 
                    0 0 50px rgba(66, 133, 244, 0.15);
        display: flex;
        flex-direction: column;
        opacity: 0;
        transform-style: preserve-3d;
      }
      #spark-video-container .browser-bar {
        height: 44px;
        background: rgba(255, 255, 255, 0.04);
        border-bottom: 1px solid rgba(255, 255, 255, 0.08);
        display: flex;
        align-items: center;
        padding: 0 18px;
        gap: 12px;
        box-sizing: border-box;
      }
      #spark-video-container .browser-dots {
        display: flex;
        gap: 8px;
      }
      #spark-video-container .dot {
        width: 12px;
        height: 12px;
        border-radius: 50%;
      }
      #spark-video-container .dot.r { background: #ff5f56; }
      #spark-video-container .dot.y { background: #ffbd2e; }
      #spark-video-container .dot.g { background: #27c93f; }
      #spark-video-container .browser-address {
        flex: 1;
        height: 26px;
        background: rgba(0, 0, 0, 0.25);
        border-radius: 8px;
        border: 1px solid rgba(255, 255, 255, 0.05);
        display: flex;
        align-items: center;
        justify-content: center;
        color: rgba(255, 255, 255, 0.4);
        font-family: 'JetBrains Mono', monospace;
        font-size: 13px;
        letter-spacing: 0.5px;
      }
      #spark-video-container .video-wrap {
        flex: 1;
        width: 100%;
        height: calc(100% - 44px);
        background: #000;
        overflow: hidden;
      }
      #spark-video-container video {
        width: 100%;
        height: 100%;
        object-fit: cover;
      }

      /* Staggered Cards Layout */
      #scene-source-cards-content .row {
        position: absolute;
        top: 312px;
        left: 50%;
        width: 1624px;
        height: 540px;
        display: flex;
        flex-direction: row;
        align-items: stretch;
        justify-content: center;
        gap: 32px;
        perspective: 1200px;
        transform-style: preserve-3d;
      }
      .source-card {
        position: relative;
        width: 520px;
        height: 540px;
        border-radius: 24px;
        overflow: hidden;
        display: flex;
        flex-direction: column;
        transform-style: preserve-3d;
        opacity: 0;
        transition: box-shadow 0.3s ease;
      }
      .source-card .photo-wrap {
        position: relative;
        width: 100%;
        height: 62%;
        overflow: hidden;
        background: rgba(255, 255, 255, 0.04);
      }
      .source-card .photo-wrap img {
        display: block;
        width: 100%;
        height: 100%;
        object-fit: cover;
        transform-origin: center center;
      }
      .source-card .meta {
        padding: 24px 28px;
        display: flex;
        flex-direction: column;
        gap: 8px;
        flex: 1;
      }
      .source-card .meta .ovl {
        font-family: 'JetBrains Mono', monospace;
        font-weight: 700;
        font-size: 18px;
        letter-spacing: 0.14em;
        text-transform: uppercase;
      }
      .source-card.a .meta .ovl { color: #8AB4F8; }
      .source-card.b .meta .ovl { color: #F6AEA8; }
      .source-card.c .meta .ovl { color: #FBBC04; }
      .source-card .meta .ttl {
        font-family: 'Inter', sans-serif;
        font-weight: 800;
        font-size: 28px;
        line-height: 1.15;
        color: var(--text);
        will-change: color, transform;
        transform-origin: left center;
      }

      /* High-Retention Stats & Pills Overlays */
      .card-stats-overlay, .card-pills-overlay {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 62%;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        gap: 12px;
        background: rgba(10, 10, 12, 0.88);
        opacity: 0;
        pointer-events: none;
      }
      .stat-badge {
        display: flex;
        flex-direction: row;
        align-items: center;
        justify-content: space-between;
        width: 320px;
        padding: 10px 18px;
        border-radius: 14px;
        background: rgba(18, 18, 24, 0.92);
        border: 1px solid rgba(255, 255, 255, 0.16);
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5),
                    inset 0 1px 0 0 rgba(255, 255, 255, 0.2);
        transform: translateY(20px);
        opacity: 0;
      }
      .stat-badge .stat-num {
        font-family: 'JetBrains Mono', monospace;
        font-weight: 800;
        font-size: 24px;
        color: #8AB4F8;
      }
      .stat-badge .stat-lbl {
        font-family: 'Inter', sans-serif;
        font-weight: 600;
        font-size: 13px;
        letter-spacing: 0.5px;
        text-transform: uppercase;
        color: rgba(255, 255, 255, 0.85);
      }
      .update-pill {
        display: flex;
        align-items: center;
        justify-content: center;
        width: 340px;
        padding: 11px 16px;
        border-radius: 18px;
        background: linear-gradient(135deg, rgba(26, 26, 34, 0.96) 0%, rgba(18, 18, 24, 0.90) 100%);
        border: 1px solid rgba(255, 255, 255, 0.16);
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.6),
                    inset 0 1px 0 0 rgba(255, 255, 255, 0.15);
        font-family: 'Inter', sans-serif;
        font-weight: 700;
        font-size: 15px;
        letter-spacing: 0.5px;
        color: #fff;
        transform: scale(0.9) translateY(15px);
        opacity: 0;
      }
      /* Color styles for specific elements */
      #badge-users .stat-num { color: #8AB4F8; text-shadow: 0 0 12px rgba(138, 180, 248, 0.45); }
      #badge-countries .stat-num { color: #F6AEA8; text-shadow: 0 0 12px rgba(246, 174, 168, 0.45); }
      #badge-languages .stat-num { color: #FBBC04; text-shadow: 0 0 12px rgba(251, 188, 5, 0.45); }

      #pill-flash { border-left: 4px solid #8AB4F8; }
      #pill-ui { border-left: 4px solid #F6AEA8; }
      #pill-omni { border-left: 4px solid #FBBC04; }
      #pill-macos { border-left: 4px solid #34A853; }

      #pill-cloud { border-left: 4px solid #8AB4F8; }
      #pill-harness { border-left: 4px solid #F6AEA8; }
      #pill-background { border-left: 4px solid #FBBC04; }

      #pill-ask { border-left: 4px solid #EA4335; }
      #pill-highstakes { border-left: 4px solid #FBBC04; }
      #pill-money { border-left: 4px solid #34A853; }
      #pill-emails { border-left: 4px solid #4285F4; }

      #pill-rollout { border-left: 4px solid #8AB4F8; }
      #pill-beta { border-left: 4px solid #FBBC04; }
    </style>

    <div id="scene-source-cards-content">
      <div class="header-block">
        <div class="overline" id="src-overline">GEMINI SPARK</div>
        <div class="headline" id="src-headline">YOUR 24/7 PERSONAL AGENT</div>
      </div>

      <!-- Centered Premium Browser Window for Product Demo -->
      <div id="spark-video-container">
        <div class="browser-bar">
          <div class="browser-dots">
            <div class="dot r"></div>
            <div class="dot y"></div>
            <div class="dot g"></div>
          </div>
          <div class="browser-address">gemini.google/spark</div>
        </div>
        <div class="video-wrap">
          <video id="spark-video" class="clip" src="assets/spark_demo.mp4" data-start="0" data-duration="15.5" data-track-index="1" muted autoplay loop playsinline></video>
        </div>

      <!-- Feature Cards Stagger Grid -->
      <div class="row">
        <!-- Card 1: Daily Brief (Schedules Screenshot) -->
        <div class="source-card glass-premium glow-blue a" id="src-card-1">
          <div class="photo-wrap" data-layout-allow-overflow="true">

        <!-- Card 2: Persistent Runtime (Tasks Screenshot) -->
        <div class="source-card glass-premium glow-red b" id="src-card-2">
          <div class="photo-wrap" data-layout-allow-overflow="true">

                 src="assets/screenshots/source-1.png"

          <div class="card-pills-overlay" id="src-stats-2">

        <div class="source-card glass-premium glow-yellow c" id="src-card-3">
          <div class="photo-wrap" data-layout-allow-overflow="true">
            <img id="src-img-3"
                 src="assets/screenshots/source-3.png"
                 alt="Safe Autonomy"
                 data-layout-allow-overflow="true" />
          </div>
          <div class="card-pills-overlay" id="src-stats-3">
            <div class="update-pill" id="pill-ask">Ask First</div>

            <div class="update-pill" id="pill-money">Spending Money</div>

          <div class="card-pills-overlay" id="src-pills-3">

          </div>
          <div class="meta">

          </div>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({
        paused: true,
        defaults: { ease: "power3.out", duration: 0.6 }
      });

      // Set initial centering GSAP transforms to avoid conflicts with CSS transform transitions
      tl.set("#spark-video-container", { xPercent: -50, y: 0 }, 0);
      tl.set(".row", { xPercent: -50 }, 0);

      // 0.0s - 2.0s: Overline and Headline entrance
      tl.from("#src-overline", { y: 20, opacity: 0, duration: 0.5, ease: "power2.out", immediateRender: false }, 0.1);
      tl.from("#src-headline", { y: 30, opacity: 0, duration: 0.6, ease: "power3.out", immediateRender: false }, 0.4);

      // 1.0s: Floating browser showcase video fade & scale in
      tl.fromTo("#spark-video-container", {
        scale: 0.9,
        opacity: 0,
        xPercent: -50,
        y: 40,
        rotationX: -10
      }, {
        scale: 1,
        opacity: 1,
        xPercent: -50,
        y: 0,
        rotationX: 0,
        duration: 1.0,
        ease: "back.out(1.2)",
        immediateRender: false
      }, 1.0);

      // Subtle float drift for browser window during introductory talking phase
      tl.to("#spark-video-container", {
        y: -12,
        rotationY: 1.5,
        duration: 3.0,
        ease: "sine.inOut",
        repeat: 3,
        yoyo: true,
        overwrite: "auto"
      }, 2.0);

      // 14.5s: Browser video window elegant scale-down and fade-out transition
      tl.to("#spark-video-container", {
        scale: 0.82,
        opacity: 0,
        xPercent: -50,
        y: 60,
        rotationX: 10,
        duration: 0.8,
        ease: "power3.in",
        overwrite: "auto"
      }, 14.5);

      // 15.0s: Three feature cards stagger-fly in from background
      tl.fromTo(".source-card", {
        y: 60,
        scale: 0.86,
        rotationX: -10,
        opacity: 0
      }, {
        y: 0,
        scale: 1.0,
        rotationX: 0,
        opacity: 1,
        duration: 0.9,
        stagger: 0.15,
        ease: "back.out(1.4)",
        immediateRender: false
      }, 15.0);

      // Trigger initial slow Ken Burns zoom on images immediately
      tl.to("#src-img-1", { scale: 1.06, duration: 6.0, ease: "sine.out" }, 15.0);
      tl.to("#src-img-2", { scale: 1.06, duration: 6.0, ease: "sine.out" }, 15.0);
      tl.to("#src-img-3", { scale: 1.06, duration: 6.0, ease: "sine.out" }, 15.0);

      // ============================================
      // PHASE 1: DAILY BRIEF CARD FOCUS (15.5s - 41.88s)
      // ============================================
      // Highlight Card 1 (Daily Brief) and dim others elegantly
      tl.to("#src-card-1", {
        scale: 1.04,
        zIndex: 10,
        opacity: 1,
        filter: "none",
        ease: "power2.out",
        duration: 0.5
      }, 15.5);
      tl.to("#src-card-1", {
        boxShadow: "0 25px 60px -10px rgba(0, 0, 0, 0.8), inset 0 1px 0 0 rgba(255, 255, 255, 0.2), 0 0 50px rgba(66, 133, 244, 0.4)",
        duration: 0.5
      }, 15.5);
      tl.to("#src-ttl-1", { color: "#8AB4F8", scale: 1.02, duration: 0.4 }, 15.5);

      // Dim Card 2 and 3
      tl.to(["#src-card-2", "#src-card-3"], {
        opacity: 0.35,
        scale: 0.94,
        filter: "blur(1.5px) grayscale(0.2)",
        duration: 0.5
      }, 15.5);

      // Overlay reveals for Card 1
      // Growth Stats (21.0s - 30.5s)
      tl.to("#src-stats-1", { opacity: 1, pointerEvents: "auto", duration: 0.4 }, 21.0);
      tl.fromTo("#badge-users", { scale: 0.7, y: 30, opacity: 0 }, { scale: 1, y: 0, opacity: 1, duration: 0.5, ease: "back.out(1.5)" }, 21.2);
      tl.fromTo("#badge-countries", { scale: 0.7, y: 30, opacity: 0 }, { scale: 1, y: 0, opacity: 1, duration: 0.5, ease: "back.out(1.5)" }, 23.8);
      tl.fromTo("#badge-languages", { scale: 0.7, y: 30, opacity: 0 }, { scale: 1, y: 0, opacity: 1, duration: 0.5, ease: "back.out(1.5)" }, 26.2);
      tl.to("#src-stats-1", { opacity: 0, scale: 0.95, pointerEvents: "none", duration: 0.4 }, 30.5);

      // App Update pills (31.5s - 41.0s)
      tl.to("#src-pills-1", { opacity: 1, pointerEvents: "auto", duration: 0.4 }, 31.5);
      tl.fromTo("#pill-flash", { scale: 0.7, y: 20, opacity: 0 }, { scale: 1, y: 0, opacity: 1, duration: 0.5, ease: "back.out(1.2)" }, 31.8);
      tl.fromTo("#pill-ui", { scale: 0.7, y: 20, opacity: 0 }, { scale: 1, y: 0, opacity: 1, duration: 0.5, ease: "back.out(1.2)" }, 33.5);
      tl.fromTo("#pill-omni", { scale: 0.7, y: 20, opacity: 0 }, { scale: 1, y: 0, opacity: 1, duration: 0.5, ease: "back.out(1.2)" }, 35.2);
      tl.fromTo("#pill-macos", { scale: 0.7, y: 20, opacity: 0 }, { scale: 1, y: 0, opacity: 1, duration: 0.5, ease: "back.out(1.2)" }, 37.8);
      tl.to("#src-pills-1", { opacity: 0, scale: 0.95, pointerEvents: "none", duration: 0.4 }, 41.0);

      // ============================================
      // PHASE 2: PERSISTENT RUNTIME CARD FOCUS (41.88s - 54.98s)
      // ============================================
      // Dim Card 1, activate Card 2
      tl.to("#src-card-1", {
        scale: 0.94,
        zIndex: 1,
        opacity: 0.35,
        filter: "blur(1.5px) grayscale(0.2)",
        boxShadow: "0 15px 45px -10px rgba(0, 0, 0, 0.6), inset 0 1px 0 0 rgba(255, 255, 255, 0.12)",
        duration: 0.6
      }, 41.88);
      tl.to("#src-ttl-1", { color: "var(--text)", scale: 1.0, duration: 0.4 }, 41.88);

      // Highlight Card 2 (Persistent Runtime) and sweep glow
      tl.to("#src-card-2", {
        scale: 1.04,
        zIndex: 10,
        opacity: 1,
        filter: "none",
        ease: "power2.out",
        duration: 0.6
      }, 41.88);
      tl.to("#src-card-2", {
        boxShadow: "0 25px 60px -10px rgba(0, 0, 0, 0.8), inset 0 1px 0 0 rgba(255, 255, 255, 0.2), 0 0 50px rgba(234, 67, 53, 0.4)",
        duration: 0.6
      }, 41.88);
      tl.to("#src-ttl-2", { color: "#F6AEA8", scale: 1.02, duration: 0.4 }, 41.88);
      
      // Secondary Ken Burns zoom for Card 2 image
      tl.to("#src-img-2", { scale: 1.14, duration: 8.0, ease: "sine.out" }, 41.88);

      // Overlay reveals for Card 2
      // Persistent Runtime details (42.5s - 54.0s)
      tl.to("#src-stats-2", { opacity: 1, pointerEvents: "auto", duration: 0.4 }, 42.5);
      tl.fromTo("#pill-cloud", { scale: 0.7, y: 20, opacity: 0 }, { scale: 1, y: 0, opacity: 1, duration: 0.5, ease: "back.out(1.2)" }, 43.0);
      tl.fromTo("#pill-harness", { scale: 0.7, y: 20, opacity: 0 }, { scale: 1, y: 0, opacity: 1, duration: 0.5, ease: "back.out(1.2)" }, 45.5);
      tl.fromTo("#pill-background", { scale: 0.7, y: 20, opacity: 0 }, { scale: 1, y: 0, opacity: 1, duration: 0.5, ease: "back.out(1.2)" }, 48.5);
      tl.to("#src-stats-2", { opacity: 0, scale: 0.95, pointerEvents: "none", duration: 0.4 }, 54.0);

      // ============================================
      // PHASE 3: SAFE AUTONOMY CARD FOCUS (54.98s - 75.0s)
      // ============================================
      // Dim Card 2, activate Card 3
      tl.to("#src-card-2", {
        scale: 0.94,
        zIndex: 1,
        opacity: 0.35,
        filter: "blur(1.5px) grayscale(0.2)",
        boxShadow: "0 15px 45px -10px rgba(0, 0, 0, 0.6), inset 0 1px 0 0 rgba(255, 255, 255, 0.12)",
        duration: 0.6
      }, 54.98);
      tl.to("#src-ttl-2", { color: "var(--text)", scale: 1.0, duration: 0.4 }, 54.98);

      // Highlight Card 3 (Safe Autonomy) and sweep glow
      tl.to("#src-card-3", {
        scale: 1.04,
        zIndex: 10,
        opacity: 1,
        filter: "none",
        ease: "power2.out",
        duration: 0.6
      }, 54.98);
      tl.to("#src-card-3", {
        boxShadow: "0 25px 60px -10px rgba(0, 0, 0, 0.8), inset 0 1px 0 0 rgba(255, 255, 255, 0.2), 0 0 50px rgba(251, 188, 5, 0.4)",
        duration: 0.6
      }, 54.98);
      tl.to("#src-ttl-3", { color: "#FBBC04", scale: 1.02, duration: 0.4 }, 54.98);

      // Secondary Ken Burns zoom for Card 3 image
      tl.to("#src-img-3", { scale: 1.14, duration: 8.0, ease: "sine.out" }, 54.98);

      // Overlay reveals for Card 3
      // Safe Autonomy details (55.5s - 67.5s)
      tl.to("#src-stats-3", { opacity: 1, pointerEvents: "auto", duration: 0.4 }, 55.5);
      tl.fromTo("#pill-ask", { scale: 0.7, y: 20, opacity: 0 }, { scale: 1, y: 0, opacity: 1, duration: 0.5, ease: "back.out(1.2)" }, 56.0);
      tl.fromTo("#pill-highstakes", { scale: 0.7, y: 20, opacity: 0 }, { scale: 1, y: 0, opacity: 1, duration: 0.5, ease: "back.out(1.2)" }, 58.5);
      tl.fromTo("#pill-money", { scale: 0.7, y: 20, opacity: 0 }, { scale: 1, y: 0, opacity: 1, duration: 0.5, ease: "back.out(1.2)" }, 61.5);
      tl.fromTo("#pill-emails", { scale: 0.7, y: 20, opacity: 0 }, { scale: 1, y: 0, opacity: 1, duration: 0.5, ease: "back.out(1.2)" }, 64.0);
      tl.to("#src-stats-3", { opacity: 0, scale: 0.95, pointerEvents: "none", duration: 0.4 }, 67.5);
