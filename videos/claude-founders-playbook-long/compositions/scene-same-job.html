<!--
  scene-same-job.html — Chapter 7: "Same job, new rules" (~51s). Accent: purple.
  Pull-quote style recap card with chapter-7 graphic as receipt + resources footer.
-->
<template id="scene-same-job-template">
  <div data-composition-id="scene-same-job"
       data-start="0"
       data-width="1920"
       data-height="1080"
       style="position:absolute; inset:0; overflow:hidden;
              font-family:'Inter', system-ui, sans-serif; color:#F5F1EB;">

    <style>
      #scene-sj-content {
        width: 100%; height: 100%;
        padding: 180px 80px 180px;
        display: grid;
        grid-template-columns: 0.95fr 1.3fr;
        gap: 48px;
        align-items: center;
        box-sizing: border-box;
      }
      #sj-graphic-wrap {
        display: flex; flex-direction: column;
        align-items: center; gap: 16px;
      }
      #sj-graphic {
        width: 100%;
        max-width: 520px;
        border-radius: 20px;
        border: 2px solid rgba(167, 139, 250, 0.45);
        box-shadow: 0 24px 60px rgba(0, 0, 0, 0.55),
                    0 0 60px rgba(167, 139, 250, 0.18);
        display: block;
        object-fit: cover;
        aspect-ratio: 4 / 3;
      }
      #sj-text-col {
        display: flex; flex-direction: column;
        align-items: flex-start; justify-content: center;
        gap: 22px;
      }
      #sj-overline {
        font-family: 'JetBrains Mono', ui-monospace, monospace;
        font-weight: 700;
        font-size: 26px;
        letter-spacing: 7px;
        text-transform: uppercase;
        color: #A78BFA;
      }
      #sj-quote-mark {
        font-weight: 900;
        font-size: 140px;
        line-height: 0.5;
        color: #A78BFA;
        text-shadow: 0 0 60px rgba(167, 139, 250, 0.40);
        margin-bottom: -28px;
      }
      #sj-quote-body {
        font-weight: 700;
        font-style: italic;
        font-size: 50px;
        line-height: 1.2;
        letter-spacing: -1px;
        color: #F5F1EB;
        max-width: 1000px;
      }
      #sj-quote-body .em-same { color: #F5F1EB; }
      #sj-quote-body .em-new  { color: #A78BFA; }
      #sj-quote-mark-same, #sj-quote-mark-new {
        display: inline-block;
        position: relative;
      }
      #sj-quote-mark-same::after, #sj-quote-mark-new::after {
        content: "";
        position: absolute;
        left: 0; right: 0;
        bottom: -6px;
        height: 4px;
        width: 0;
        background: #A78BFA;
        border-radius: 3px;
        box-shadow: 0 0 16px rgba(167, 139, 250, 0.55);
      }
      #sj-attribution {
        font-family: 'JetBrains Mono', ui-monospace, monospace;
        font-weight: 700;
        font-size: 22px;
        letter-spacing: 5px;
        text-transform: uppercase;
        color: #9A958D;
      }
      #sj-resources {
        display: flex; flex-direction: row;
        gap: 18px;
        margin-top: 4px;
        opacity: 0;
      }
      .sj-res-pill {
        padding: 12px 20px;
        border-radius: 999px;
        background: rgba(167, 139, 250, 0.10);
        border: 1.5px solid rgba(167, 139, 250, 0.35);
        font-family: 'JetBrains Mono', ui-monospace, monospace;
        font-weight: 700;
        font-size: 18px;
        letter-spacing: 1px;
        color: #F5F1EB;
      }
    </style>

    <div id="scene-sj-content">
      <div id="sj-graphic-wrap">
        <img id="sj-graphic" src="assets/chapter-icons/chapter-7-same-job.png" alt="Chapter 7 — Same job, new rules" />
      </div>
      <div id="sj-text-col">
        <div id="sj-overline">CHAPTER 7 &middot; PDF p.31</div>
        <div id="sj-quote-mark">&ldquo;</div>
        <div id="sj-quote-body">
          The founder's job is still to find a real problem people will pay you to solve. <span id="sj-quote-mark-same">Same job</span>, <span id="sj-quote-mark-new" class="em-new">new rules.</span>
        </div>
        <div id="sj-attribution">THE FOUNDER'S PLAYBOOK &middot; ANTHROPIC</div>
        <div id="sj-resources">
          <div class="sj-res-pill">Building Companies with Claude Code</div>
          <div class="sj-res-pill">Context engineering papers</div>
          <div class="sj-res-pill">4 deeper reads &rarr; description</div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      window.__timelines = window.__timelines || {};
      const SCENE_DURATION = 51;

      const tl = gsap.timeline({ paused: true, defaults: { ease: "power3.out", duration: 0.6 } });

      tl.from("#sj-overline",   { y: 20, opacity: 0, duration: 0.5, ease: "power2.out", immediateRender: false }, 0);
      tl.from("#sj-graphic",    { scale: 0.92, opacity: 0, duration: 0.8, ease: "back.out(1.3)", immediateRender: false }, 0.2);
      tl.from("#sj-quote-mark", { x: -20, opacity: 0, duration: 0.6, ease: "power2.out", immediateRender: false }, 0.6);
      tl.from("#sj-quote-body", { y: 30, opacity: 0, duration: 0.8, ease: "power3.out", immediateRender: false }, 1.0);
      tl.from("#sj-attribution",{ y: 16, opacity: 0, duration: 0.5, ease: "power2.out", immediateRender: false }, 1.8);

      // Beat: marker-sweep underline on "Same job" at ~+10s
      tl.to("#sj-quote-mark-same::after", { width: "100%", duration: 0.6, ease: "power2.out" }, 10.0);
      // Marker-sweep on "new rules" at ~+18s
      tl.to("#sj-quote-mark-new::after",  { width: "100%", duration: 0.6, ease: "power2.out" }, 18.0);
      // Resources pills fade in at ~+30s
      tl.to("#sj-resources", { opacity: 1, duration: 0.6, ease: "power2.out" }, 30.0);
      // Tail beat: subtle scale pulse on graphic before exit
      tl.to("#sj-graphic", { scale: 1.04, duration: 0.5, yoyo: true, repeat: 1, ease: "sine.inOut" }, 42.0);

      tl.set({}, {}, SCENE_DURATION);
      window.__timelines["scene-same-job"] = tl;
    </script>
  </div>
</template>
