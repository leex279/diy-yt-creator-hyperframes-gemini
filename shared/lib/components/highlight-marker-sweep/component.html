<!--
  shared/lib/components/highlight-marker-sweep/component.html
  Yellow/orange marker sweep under a text phrase. The highlight is a thick
  (~10px) stroke drawn under the text via an SVG <path> using stroke-dashoffset
  animation from totalLength → 0. Path is deterministically wavy (sine
  modulation so it reads as hand-drawn). Color: var(--marker, #FFD93D) with
  multiply blend mode so it shades the text behind it like a real highlighter.

  SOURCE: original — no template source.

  COMPONENT IS PASTE-IN — split into three sections below. Merge each
  section into the matching part of your host composition's HTML.

  ──────────────────────────────────────────────────────────────────────
  HOW TO USE
  ──────────────────────────────────────────────────────────────────────

  1) HTML — wrap the text you want highlighted in .highlight-marker.
     .hm-text holds the text; .hm-sweep is the SVG container.
     The SVG path is generated by addHighlightMarkerSweep() at runtime.
-->

<span class="highlight-marker" id="hm-1">
  <span class="hm-text">your highlighted text</span>
  <svg class="hm-sweep" aria-hidden="true"></svg>
</span>

<!--
  2) CSS — merge into your composition's <style> block.
-->

<style>
  /* shared/lib/components/highlight-marker-sweep — keep this comment block */
  .highlight-marker {
    position: relative;
    display: inline-block;
    line-height: inherit;
  }

  .hm-text {
    position: relative;
    z-index: 1;
    /* text is layered above the marker */
  }

  .hm-sweep {
    position: absolute;
    /* Positioned just below the text baseline */
    bottom: -4px;
    left: -4px;
    /* Width/height set by JS after measuring .hm-text */
    width: 100%;
    height: 16px;
    overflow: visible;
    pointer-events: none;
    z-index: 0;
  }

  .hm-path {
    fill: none;
    stroke: var(--marker, #FFD93D);
    stroke-width: 10;
    stroke-linecap: round;
    stroke-linejoin: round;
    /* mix-blend-mode: multiply so it shades behind the text like a real highlighter */
    mix-blend-mode: multiply;
    opacity: 0.88;
    /* dashoffset will be animated from totalLength → 0 */
  }
</style>

<!--
  3) JS — call addHighlightMarkerSweep() from the host root timeline.

  SIGNATURE:
    addHighlightMarkerSweep(tl, sel, at, opts)

  PARAMETERS:
    tl          — a paused gsap.timeline
    sel         — CSS selector resolving to ONE .highlight-marker element
    at          — insertion time on tl (seconds)
    opts        — optional config object:
      duration  = 0.5   sweep draw duration (seconds)
      color     = 'var(--marker, #FFD93D)'  stroke color override

  USAGE EXAMPLES:
    addHighlightMarkerSweep(tl, "#hm-1", P3 + 2.0);
    addHighlightMarkerSweep(tl, "#hm-1", P3 + 2.0, { duration: 0.7, color: '#FF6B6B' });

  SFX COUPLING:
    Wire one `strike-cross` <audio> at `at + 0.0`:
    <audio id="sfx-hm-1" class="clip" src="assets/sfx/strike-cross.mp3"
           data-start="<at>" data-duration="0.63" data-track-index="3" data-volume="0.11"></audio>

  CONSTRAINTS:
    - The SVG path is built at call time via getBoundingClientRect on .hm-text.
      This requires the element to be in the DOM and have layout computed.
      Call this function after the composition DOMContentLoaded fires.
    - The wavy path uses a deterministic sine with amplitude 2px — reproducible
      across renders. No Math.random().
    - Stroke-dashoffset animation draws left-to-right (forward sweep).
    - Works on inline text at any font-size; the SVG auto-sizes to text width.
    - If the element is not yet visible (opacity: 0 parent), measure may return 0.
      Call after the parent entrance tween fires, or set the parent to opacity: 0.01
      for measurement purposes.
-->

<script>
  function addHighlightMarkerSweep(tl, sel, at, opts) {
    opts = opts || {};
    var duration = opts.duration !== undefined ? opts.duration : 0.5;
    var color    = opts.color    !== undefined ? opts.color    : 'var(--marker, #FFD93D)';

    var root   = document.querySelector(sel);
    if (!root) return;
    var textEl = root.querySelector('.hm-text');
    var svgEl  = root.querySelector('.hm-sweep');
    if (!textEl || !svgEl) return;

    // Measure text width for the path
    var rect = textEl.getBoundingClientRect();
    var W    = rect.width || 200;  // fallback if layout not ready

    // Build a deterministic wavy path under the text
    // Y baseline is midpoint of the 16px SVG (y=8). Amplitude 2px, 3 sine periods.
    var steps   = 32;   // number of line segments
    var amp     = 2;    // wave amplitude in px
    var periods = 2;    // number of sine periods across the width
    var points  = [];
    for (var i = 0; i <= steps; i++) {
      var t  = i / steps;
      var x  = t * (W + 8);  // +8 for the -4px left offset compensation
      var y  = 8 + amp * Math.sin(t * periods * 2 * Math.PI);
      points.push(x.toFixed(2) + ',' + y.toFixed(2));
    }
    var d = 'M ' + points.join(' L ');

    // Create and insert the path element
    var NS   = 'http://www.w3.org/2000/svg';
    svgEl.setAttribute('width',  (W + 12).toFixed(0));
    svgEl.setAttribute('height', '16');
    svgEl.setAttribute('viewBox', '0 0 ' + (W + 12).toFixed(0) + ' 16');

    var path = document.createElementNS(NS, 'path');
    path.setAttribute('d', d);
    path.setAttribute('class', 'hm-path');
    path.style.stroke = color;
    svgEl.innerHTML = '';
    svgEl.appendChild(path);

    // Measure path length (requires path to be in DOM)
    var pathLen = path.getTotalLength ? path.getTotalLength() : (W + 8);

    // Set up dash animation: start fully hidden, sweep to fully drawn
    gsap.set(path, { strokeDasharray: pathLen, strokeDashoffset: pathLen });

    // Sweep from hidden → drawn
    tl.to(path, {
      strokeDashoffset: 0,
      duration: duration,
      ease: 'power2.out'
    }, at);
  }
</script>
