<!--
  scene-bullets.html — Markdown vs HTML capability comparison (21.0–36.4s, scene-rel 0–15.4s).
  Beats (transcript scene-rel):
    0.04  — "Why?"
    0.76  — "Markdown can carry…"
    1.65  — "headings, bold, a bullet list."
    4.13  — "That is it."
    4.45  — HTML side title — "H T M L can carry"
    6.06  — Tables
    7.07  — CSS design
    8.97  — SVG charts
    9.99  — Code
    10.86 — Live interactions
    11.91 — Workflows
    13.45 — Spatial data
    14.81 — Real images

  Each HTML chip carries a MINI EXAMPLE VISUAL (per long-form scene-image-hero
  pattern) so the viewer reads the capability instantly: the visual carries
  the meaning, the label confirms it.
-->
<template id="scene-bullets-template">
  <div data-composition-id="scene-bullets"
       data-start="0"
       data-width="1080"
       data-height="1920"
       style="position:absolute; inset:0; overflow:hidden;
              font-family:var(--serif); color:var(--text);">

    <style>
      #sb-content {
        width: 100%; height: 100%;
        padding: var(--pad-top) var(--pad-x) var(--pad-bottom);
        position: relative;
        box-sizing: border-box;
        display: flex;
        flex-direction: column;
        gap: 22px;
      }
      .sb-overline {
        font-family: var(--mono);
        font-weight: 700;
        font-size: 28px;
        letter-spacing: 6px;
        text-transform: uppercase;
        color: var(--accent-2);
      }
      .sb-side {
        background: var(--bg-card);
        border: 1px solid var(--border);
        border-radius: 18px;
        padding: 24px 26px;
        display: flex;
        flex-direction: column;
        gap: 14px;
      }
      .sb-side.is-md {
        flex: 0 0 auto;
        opacity: 0.78;
      }
      .sb-side.is-html {
        flex: 1 1 auto;
        border-color: var(--accent-1);
        border-width: 2px;
      }
      .sb-side-head {
        display: flex;
        align-items: center;
        gap: 14px;
      }
      .sb-tag {
        font-family: var(--mono);
        font-weight: 800;
        font-size: 26px;
        letter-spacing: 2px;
        padding: 6px 14px;
        border-radius: 8px;
      }
      .sb-tag.is-md  { color: var(--text-secondary); background: var(--bg-surface); border: 1px solid var(--border); }
      .sb-tag.is-html { color: var(--accent-1); background: rgba(199, 90, 63, 0.08); border: 2px solid var(--accent-1); }
      .sb-side-title {
        font-family: var(--serif);
        font-style: italic;
        font-weight: 800;
        font-size: 40px;
        letter-spacing: -0.5px;
        color: var(--text);
      }

      /* Markdown chips — text-only, sparse */
      .sb-md-chips {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
      }
      .sb-md-chip {
        font-family: var(--mono);
        font-weight: 700;
        font-size: 26px;
        letter-spacing: 1px;
        padding: 10px 16px;
        border-radius: 10px;
        background: var(--bg-surface);
        border: 1px solid var(--border);
        color: var(--text-secondary);
      }
      .sb-md-tail {
        font-family: var(--serif);
        font-style: italic;
        font-size: 32px;
        color: var(--accent-2);
      }

      /* HTML chips — 2-column grid, EACH chip has a mini example visual.
         Card width 460px (= (1080 - 80*2 - 26*2 padding - 14 gap)/2). */
      .sb-html-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 12px 14px;
      }
      .sb-html-chip {
        background: rgba(199, 90, 63, 0.06);
        border: 1px solid var(--border-bright);
        border-radius: 12px;
        padding: 12px 16px;
        display: flex;
        align-items: center;
        gap: 14px;
        min-height: 92px;
      }
      .sb-html-mini {
        flex: 0 0 64px;
        width: 64px;
        height: 64px;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .sb-html-mini svg { width: 100%; height: 100%; display: block; }
      .sb-html-label {
        font-family: var(--mono);
        font-weight: 700;
        font-size: 26px;
        letter-spacing: 1px;
        color: var(--accent-1);
        line-height: 1.15;
      }
    </style>

    <div id="sb-content">
      <div class="sb-overline" id="sb-overline">WHY?</div>

      <div class="sb-side is-md" id="sb-md">
        <div class="sb-side-head">
          <span class="sb-tag is-md">.md</span>
          <span class="sb-side-title">Markdown carries</span>
        </div>
        <div class="sb-md-chips">
          <div class="sb-md-chip" id="sb-md-1">Headings</div>
          <div class="sb-md-chip" id="sb-md-2">Bold</div>
          <div class="sb-md-chip" id="sb-md-3">Bullets</div>
        </div>
        <div class="sb-md-tail" id="sb-md-tail">&mdash; that is it.</div>
      </div>

      <div class="sb-side is-html" id="sb-html">
        <div class="sb-side-head">
          <span class="sb-tag is-html">.html</span>
          <span class="sb-side-title">H T M L carries</span>
        </div>

        <div class="sb-html-grid">

          <!-- 1. Tables -->
          <div class="sb-html-chip" id="sb-h-1">
            <div class="sb-html-mini" data-layout-allow-overflow="true">
              <svg viewBox="0 0 64 64" data-layout-allow-overflow="true">
                <rect x="4"  y="10" width="18" height="14" fill="none" stroke="#C75A3F" stroke-width="2.5"/>
                <rect x="23" y="10" width="18" height="14" fill="#C75A3F" opacity="0.25"/>
                <rect x="42" y="10" width="18" height="14" fill="none" stroke="#C75A3F" stroke-width="2.5"/>
                <rect x="4"  y="25" width="18" height="14" fill="#C75A3F" opacity="0.25"/>
                <rect x="23" y="25" width="18" height="14" fill="none" stroke="#C75A3F" stroke-width="2.5"/>
                <rect x="42" y="25" width="18" height="14" fill="#C75A3F" opacity="0.25"/>
                <rect x="4"  y="40" width="18" height="14" fill="none" stroke="#C75A3F" stroke-width="2.5"/>
                <rect x="23" y="40" width="18" height="14" fill="none" stroke="#C75A3F" stroke-width="2.5"/>
                <rect x="42" y="40" width="18" height="14" fill="#C75A3F" opacity="0.25"/>
              </svg>
            </div>
            <div class="sb-html-label">Tables</div>
          </div>

          <!-- 2. CSS design -->
          <div class="sb-html-chip" id="sb-h-2">
            <div class="sb-html-mini" data-layout-allow-overflow="true">
              <svg viewBox="0 0 64 64" data-layout-allow-overflow="true">
                <circle cx="14" cy="20" r="10" fill="#C75A3F"/>
                <circle cx="36" cy="20" r="10" fill="#586F4F"/>
                <circle cx="14" cy="42" r="10" fill="#B14938"/>
                <circle cx="36" cy="42" r="10" fill="#1A1815"/>
                <rect x="50" y="14" width="10" height="36" rx="2" fill="#C75A3F" opacity="0.5"/>
              </svg>
            </div>
            <div class="sb-html-label">CSS design</div>
          </div>

          <!-- 3. SVG charts -->
          <div class="sb-html-chip" id="sb-h-3">
            <div class="sb-html-mini" data-layout-allow-overflow="true">
              <svg viewBox="0 0 64 64" data-layout-allow-overflow="true">
                <rect x="6"  y="32" width="10" height="22" fill="#C75A3F"/>
                <rect x="20" y="22" width="10" height="32" fill="#C75A3F"/>
                <rect x="34" y="14" width="10" height="40" fill="#586F4F"/>
                <rect x="48" y="26" width="10" height="28" fill="#586F4F"/>
                <line x1="3" y1="56" x2="62" y2="56" stroke="#1A1815" stroke-width="2"/>
              </svg>
            </div>
            <div class="sb-html-label">SVG charts</div>
          </div>

          <!-- 4. Code -->
          <div class="sb-html-chip" id="sb-h-4">
            <div class="sb-html-mini" data-layout-allow-overflow="true">
              <svg viewBox="0 0 64 64" data-layout-allow-overflow="true">
                <rect x="3"  y="8"  width="58" height="48" rx="4" fill="none" stroke="#C75A3F" stroke-width="2"/>
                <rect x="9"  y="16" width="22" height="4"  rx="1" fill="#C75A3F"/>
                <rect x="34" y="16" width="14" height="4"  rx="1" fill="#586F4F"/>
                <rect x="13" y="26" width="38" height="4"  rx="1" fill="#1A1815" opacity="0.55"/>
                <rect x="9"  y="36" width="18" height="4"  rx="1" fill="#586F4F"/>
                <rect x="30" y="36" width="22" height="4"  rx="1" fill="#C75A3F"/>
                <rect x="9"  y="46" width="14" height="4"  rx="1" fill="#1A1815" opacity="0.55"/>
              </svg>
            </div>
            <div class="sb-html-label">Code</div>
          </div>

          <!-- 5. Live interactions -->
          <div class="sb-html-chip" id="sb-h-5">
            <div class="sb-html-mini" data-layout-allow-overflow="true">
              <svg viewBox="0 0 64 64" data-layout-allow-overflow="true">
                <rect x="10" y="22" width="44" height="20" rx="10" fill="#C75A3F"/>
                <rect x="10" y="22" width="44" height="20" rx="10" fill="none" stroke="#1A1815" stroke-width="1.5"/>
                <circle cx="32" cy="32" r="14" fill="none" stroke="#C75A3F" stroke-width="2" opacity="0.7"/>
                <circle cx="32" cy="32" r="20" fill="none" stroke="#C75A3F" stroke-width="2" opacity="0.35"/>
              </svg>
            </div>
            <div class="sb-html-label">Live interactions</div>
          </div>

          <!-- 6. Workflows -->
          <div class="sb-html-chip" id="sb-h-6">
            <div class="sb-html-mini" data-layout-allow-overflow="true">
              <svg viewBox="0 0 64 64" data-layout-allow-overflow="true">
                <rect x="3"  y="22" width="20" height="20" rx="3" fill="none" stroke="#C75A3F" stroke-width="2.5"/>
                <rect x="41" y="22" width="20" height="20" rx="3" fill="#C75A3F" opacity="0.35"/>
                <line x1="23" y1="32" x2="38" y2="32" stroke="#1A1815" stroke-width="2"/>
                <polygon points="38,28 42,32 38,36" fill="#1A1815"/>
              </svg>
            </div>
            <div class="sb-html-label">Workflows</div>
          </div>

          <!-- 7. Spatial data -->
          <div class="sb-html-chip" id="sb-h-7">
            <div class="sb-html-mini" data-layout-allow-overflow="true">
              <svg viewBox="0 0 64 64" data-layout-allow-overflow="true">
                <circle cx="12" cy="12" r="3" fill="#C75A3F"/>
                <circle cx="32" cy="12" r="3" fill="#C75A3F" opacity="0.5"/>
                <circle cx="52" cy="12" r="3" fill="#C75A3F"/>
                <circle cx="12" cy="32" r="3" fill="#C75A3F" opacity="0.5"/>
                <circle cx="32" cy="32" r="6" fill="#586F4F"/>
                <circle cx="52" cy="32" r="3" fill="#C75A3F" opacity="0.5"/>
                <circle cx="12" cy="52" r="3" fill="#C75A3F"/>
                <circle cx="32" cy="52" r="3" fill="#C75A3F" opacity="0.5"/>
                <circle cx="52" cy="52" r="3" fill="#C75A3F"/>
              </svg>
            </div>
            <div class="sb-html-label">Spatial data</div>
          </div>

          <!-- 8. Real images -->
          <div class="sb-html-chip" id="sb-h-8">
            <div class="sb-html-mini" data-layout-allow-overflow="true">
              <svg viewBox="0 0 64 64" data-layout-allow-overflow="true">
                <rect x="3" y="8"  width="58" height="48" rx="4" fill="#FBF8F1" stroke="#C75A3F" stroke-width="2"/>
                <circle cx="46" cy="20" r="5" fill="#F2CC8F"/>
                <polygon points="6,52 22,30 32,42 44,24 60,52" fill="#586F4F"/>
                <polygon points="20,52 30,38 40,52" fill="#1A1815" opacity="0.6"/>
              </svg>
            </div>
            <div class="sb-html-label">Real images</div>
          </div>

        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({ paused: true, defaults: { ease: "power3.out" } });

      const mdChips = ["#sb-md-1","#sb-md-2","#sb-md-3"];
      const htmlChips = ["#sb-h-1","#sb-h-2","#sb-h-3","#sb-h-4","#sb-h-5","#sb-h-6","#sb-h-7","#sb-h-8"];

      tl.set("#sb-overline", { y: -8, opacity: 0 }, 0);
      tl.set("#sb-md",       { y: 16, opacity: 0 }, 0);
      tl.set("#sb-html",     { y: 16, opacity: 0 }, 0);
      tl.set("#sb-md-tail",  { opacity: 0 }, 0);
      [...mdChips, ...htmlChips].forEach(s => tl.set(s, { y: 12, opacity: 0, scale: 0.85 }, 0));

      tl.to("#sb-overline", { y: 0, opacity: 1, duration: 0.4 }, 0.04);
      tl.to("#sb-md",       { y: 0, opacity: 1, duration: 0.5 }, 0.45);

      // Markdown chips paced to "headings, bold, a bullet list"
      tl.to("#sb-md-1", { y: 0, opacity: 1, scale: 1, duration: 0.4, ease: "back.out(1.5)" }, 1.65);
      tl.to("#sb-md-2", { y: 0, opacity: 1, scale: 1, duration: 0.4, ease: "back.out(1.5)" }, 2.18);
      tl.to("#sb-md-3", { y: 0, opacity: 1, scale: 1, duration: 0.4, ease: "back.out(1.5)" }, 3.59);
      tl.to("#sb-md-tail", { opacity: 1, duration: 0.4 }, 4.13);

      // HTML side enters
      tl.to("#sb-html", { y: 0, opacity: 1, duration: 0.55 }, 4.45);

      // HTML chips paced to spoken list — each chip's mini visual scales in
      // with a tiny back-out spring so the icon reads as the "thing" landing.
      tl.to("#sb-h-1", { y: 0, opacity: 1, scale: 1, duration: 0.4, ease: "back.out(1.5)" }, 6.06);
      tl.to("#sb-h-2", { y: 0, opacity: 1, scale: 1, duration: 0.4, ease: "back.out(1.5)" }, 7.07);
      tl.to("#sb-h-3", { y: 0, opacity: 1, scale: 1, duration: 0.4, ease: "back.out(1.5)" }, 8.97);
      tl.to("#sb-h-4", { y: 0, opacity: 1, scale: 1, duration: 0.4, ease: "back.out(1.5)" }, 9.99);
      tl.to("#sb-h-5", { y: 0, opacity: 1, scale: 1, duration: 0.4, ease: "back.out(1.5)" }, 10.86);
      tl.to("#sb-h-6", { y: 0, opacity: 1, scale: 1, duration: 0.4, ease: "back.out(1.5)" }, 11.91);
      tl.to("#sb-h-7", { y: 0, opacity: 1, scale: 1, duration: 0.4, ease: "back.out(1.5)" }, 13.45);
      tl.to("#sb-h-8", { y: 0, opacity: 1, scale: 1, duration: 0.4, ease: "back.out(1.5)" }, 14.81);

      // Held emphasis pulse on the whole HTML side at the end
      tl.to("#sb-html", { scale: 1.02, duration: 0.35, yoyo: true, repeat: 1, ease: "power2.out" }, 15.0);

      window.__timelines["scene-bullets"] = tl;
    </script>
  </div>
</template>
