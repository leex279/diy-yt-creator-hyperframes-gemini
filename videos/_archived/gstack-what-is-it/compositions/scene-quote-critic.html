<!--
  scene-quote-critic.html — community theme #3, critical pushback (~10s).
-->
<template id="scene-quote-critic-template">
  <div data-composition-id="scene-quote-critic"
       data-start="0"
       data-width="1080"
       data-height="1920"
       style="position:absolute; inset:0; overflow:hidden;">

    <style>
      #scene-quote-critic-content {
        width:100%; height:100%;
        padding: var(--pad-top) var(--pad-x) var(--pad-bottom);
        display:flex; flex-direction:column;
        align-items:center; justify-content:center;
        text-align:center; gap:36px;
        box-sizing:border-box;
      }
      #scene-quote-critic-content .glyph {
        font-family: var(--serif);
        font-weight: 900;
        font-size: 320px;
        line-height: 0.6;
        color: var(--accent-rose);
        opacity: 0.9;
        margin-bottom: -80px;
      }
      #scene-quote-critic-content .body {
        font-family: var(--serif);
        font-weight: 700;
        font-size: 76px;
        line-height: 1.15;
        color: var(--accent-ink);
        max-width: 920px;
        letter-spacing: -1px;
      }
      #scene-quote-critic-content .body .em {
        color: var(--accent-rose);
        font-weight: 900;
      }
      #scene-quote-critic-content .rule {
        width: 140px; height: 3px;
        background: var(--accent-rose);
        opacity: 0.9;
      }
      #scene-quote-critic-content .attrib {
        font-family: 'JetBrains Mono', ui-monospace, monospace;
        font-weight: 700;
        font-size: 34px;
        letter-spacing: 3px;
        text-transform: uppercase;
        color: rgba(255, 255, 255, 0.8);
      }
    </style>

    <div id="scene-quote-critic-content">
      <div class="glyph"  id="qc-glyph">&ldquo;</div>
      <div class="body"   id="qc-body">
        At the end of the day &mdash; these are <span class="em">markdown files.</span>
      </div>
      <div class="rule"   id="qc-rule"></div>
      <div class="attrib" id="qc-attrib">&mdash; the pushback</div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({ paused: true });

      tl.from("#qc-glyph",  { y: -30, opacity: 0, duration: 0.7, ease: "power3.out" }, 0);
      tl.from("#qc-body",   { y: 30,  opacity: 0, duration: 0.8, ease: "power3.out" }, 0.4);
      tl.from("#qc-rule",   { scaleX: 0, opacity: 0, duration: 0.5, ease: "power2.out" }, 1.4);
      tl.from("#qc-attrib", { y: 16,  opacity: 0, duration: 0.5, ease: "power2.out" }, 1.7);

      tl.to("#scene-quote-critic-content .body .em", { scale: 1.06, duration: 0.5, ease: "power2.out", yoyo: true, repeat: 1 }, 4.5);
      tl.to("#qc-rule", { scaleX: 1.8, opacity: 1.0, duration: 0.6, ease: "power2.inOut", yoyo: true, repeat: 1 }, 7);

      window.__timelines["scene-quote-critic"] = tl;
    </script>
  </div>
</template>
