<!--
  scene-title.html — Hook (0–4.4s)
  Beats (transcript word offsets):
    0.046 — "Markdown" word slam (dominant, serif italic 200px)
    0.453 — "is" thin
    0.592 — "dying." with terracotta strike
    1.660 — "And the people killing it"
    2.972 — "built CLAUDE CODE." (brand emphasis, scale punch)
-->
<template id="scene-title-template">
  <div data-composition-id="scene-title"
       data-start="0"
       data-width="1080"
       data-height="1920"
       style="position:absolute; inset:0; overflow:hidden;
              font-family:var(--serif); color:var(--text);">

    <style>
      #st-content {
        width: 100%; height: 100%;
        padding: var(--pad-top) var(--pad-x) var(--pad-bottom);
        position: relative;
        box-sizing: border-box;
        display: flex;
        flex-direction: column;
        justify-content: center;
        gap: 60px;
      }
      #st-row1 {
        font-family: var(--serif);
        font-weight: 800;
        font-style: italic;
        font-size: 200px;
        line-height: 0.92;
        letter-spacing: -3px;
        color: var(--text);
      }
      #st-row1 .st-dying {
        color: var(--accent-1);
        position: relative;
        display: inline-block;
      }
      #st-row1 .st-strike {
        position: absolute;
        left: 0;
        top: 56%;
        height: 10px;
        width: 0;
        background: var(--accent-1);
        border-radius: 4px;
        transform-origin: left center;
      }
      #st-row2 {
        font-family: var(--serif);
        font-weight: 700;
        font-size: 56px;
        line-height: 1.2;
        letter-spacing: -0.5px;
        color: var(--text-secondary);
        max-width: 880px;
      }
      #st-row2 .st-brand {
        font-family: var(--mono);
        font-weight: 800;
        font-size: 60px;
        letter-spacing: 2px;
        color: var(--accent-1);
        background: var(--bg-card);
        border: 2px solid var(--accent-1);
        border-radius: 12px;
        padding: 8px 18px;
        display: inline-block;
        text-transform: uppercase;
      }
      .st-overline {
        font-family: var(--mono);
        font-weight: 700;
        font-size: 28px;
        letter-spacing: 8px;
        text-transform: uppercase;
        color: var(--accent-2);
        margin-bottom: 24px;
      }
    </style>

    <div id="st-content">
      <div>
        <div class="st-overline" id="st-overline">USING CLAUDE CODE</div>
        <div id="st-row1">
          <span id="st-w-md">Markdown</span> <span id="st-w-is">is</span>
          <span class="st-dying" id="st-w-dying">dying<span class="st-strike" id="st-strike"></span>.</span>
        </div>
      </div>
      <div id="st-row2">
        <span id="st-r2-1">And the people killing it&hellip;</span><br/>
        <span id="st-r2-2">built </span><span class="st-brand" id="st-brand">Claude&nbsp;Code</span><span id="st-r2-3">.</span>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({ paused: true, defaults: { ease: "power3.out" } });

      tl.set("#st-overline", { y: -10, opacity: 0 }, 0);
      tl.set("#st-w-md",     { y: 24, opacity: 0, scale: 0.85 }, 0);
      tl.set("#st-w-is",     { opacity: 0 }, 0);
      tl.set("#st-w-dying",  { opacity: 0, scale: 0.6, filter: "blur(20px)" }, 0);
      tl.set("#st-strike",   { width: 0 }, 0);
      tl.set("#st-r2-1",     { y: 16, opacity: 0 }, 0);
      tl.set("#st-r2-2",     { y: 16, opacity: 0 }, 0);
      tl.set("#st-brand",    { scale: 0.6, opacity: 0, filter: "blur(15px)" }, 0);
      tl.set("#st-r2-3",     { opacity: 0 }, 0);

      tl.to("#st-overline", { y: 0, opacity: 1, duration: 0.4 }, 0);
      tl.to("#st-w-md",     { y: 0, opacity: 1, scale: 1, duration: 0.55, ease: "back.out(1.5)" }, 0.05);
      tl.to("#st-w-is",     { opacity: 1, duration: 0.3 }, 0.45);
      tl.to("#st-w-dying",  { opacity: 1, scale: 1, filter: "blur(0px)", duration: 0.55 }, 0.59);
      tl.to("#st-strike",   { width: "100%", duration: 0.5, ease: "power2.out" }, 1.15);

      tl.to("#st-r2-1", { y: 0, opacity: 1, duration: 0.5 }, 1.66);
      tl.to("#st-r2-2", { y: 0, opacity: 1, duration: 0.4 }, 2.97);
      tl.to("#st-brand", { scale: 1, opacity: 1, filter: "blur(0px)", duration: 0.5, ease: "back.out(1.6)" }, 2.97);
      tl.to("#st-r2-3", { opacity: 1, duration: 0.2 }, 3.24);
      tl.to("#st-brand", { scale: 1.06, duration: 0.25, yoyo: true, repeat: 1, ease: "power2.out" }, 3.55);

      window.__timelines["scene-title"] = tl;
    </script>
  </div>
</template>
