<!--
  scene-fix.html — THE FIX (51.33–80.18s, scene-rel 0–28.85)
  Word anchors (scene-rel = abs - 51.33):
    0.00  "This is speculative decoding."
    1.70  "Published by Google in November 2022."
    4.95  "Two models."
    5.78  "A small fast draft model"   → DRAFT card
    7.09  "A big slow target model"     → TARGET card
    9.19  "draft model speculates four tokens ahead" → 4 draft tokens stream out
   12.39  "Cheap and fast"
   13.37  "target model verifies all four"
   14.61  "single parallel pass"        → 4 tokens enter target box together
   17.40  "Match the draft. Accept"     → ACCEPT branch (3 ✓)
   20.21  "Disagree somewhere. Reject"  → ✗ marker on token 4
   23.49  "The target corrects it"      → token 4 swap to corrected
   24.67  "Either way. Multiple tokens"
   27.12  "For the price of one forward pass"
-->
<template id="scene-fix-template">
  <div data-composition-id="scene-fix"
       data-start="0"
       data-width="1080"
       data-height="1920"
       style="position:absolute; inset:0; overflow:hidden;
              font-family:var(--serif); color:var(--text);">

    <style>
      #sf-content {
        width: 100%; height: 100%;
        padding: var(--pad-top) var(--pad-x) var(--pad-bottom);
        position: relative;
        box-sizing: border-box;
        display: flex;
        flex-direction: column;
        gap: 22px;
      }
      .sf-overline {
        font-family: var(--mono);
        font-weight: 700;
        font-size: 28px;
        letter-spacing: 6px;
        text-transform: uppercase;
        color: var(--accent-2);
      }
      .sf-title {
        font-family: var(--serif);
        font-weight: 800;
        font-style: italic;
        font-size: 124px;
        line-height: 0.95;
        letter-spacing: -3px;
        color: var(--text);
      }
      .sf-title .em { color: var(--accent-1); }
      .sf-paper {
        font-family: var(--mono);
        font-weight: 700;
        font-size: 26px;
        letter-spacing: 2px;
        color: var(--text-secondary);
        background: var(--bg-card);
        border: 1px solid var(--border);
        border-radius: 10px;
        padding: 10px 16px;
        align-self: flex-start;
      }
      .sf-paper .em { color: var(--accent-1); font-weight: 800; }
      .sf-stage {
        position: relative;
        flex: 1 1 auto;
        background: var(--bg-card);
        border: 1px solid var(--border);
        border-radius: 22px;
        padding: 24px 22px;
        display: flex;
        flex-direction: column;
        gap: 18px;
        min-height: 600px;
      }
      .sf-row {
        display: flex;
        align-items: center;
        gap: 18px;
      }
      .sf-box {
        flex: 0 0 auto;
        border-radius: 18px;
        padding: 14px 18px;
        text-align: center;
      }
      .sf-box-draft {
        background: rgba(86, 111, 79, 0.12);
        border: 2px solid var(--accent-3);
        width: 240px;
      }
      .sf-box-target {
        background: rgba(199, 90, 63, 0.10);
        border: 2px solid var(--accent-1);
        width: 240px;
      }
      .sf-box .lab {
        font-family: var(--mono);
        font-weight: 800;
        font-size: 22px;
        letter-spacing: 4px;
        text-transform: uppercase;
        color: var(--accent-2);
      }
      .sf-box-draft .lab { color: var(--accent-3); }
      .sf-box-target .lab { color: var(--accent-1); }
      .sf-box .nm {
        font-family: var(--serif);
        font-weight: 800;
        font-size: 56px;
        line-height: 1;
        color: var(--text);
        letter-spacing: -1px;
      }
      .sf-box .sub {
        font-family: var(--mono);
        font-weight: 700;
        font-size: 18px;
        letter-spacing: 2px;
        color: var(--text-secondary);
        margin-top: 4px;
      }
      .sf-stream {
        flex: 1 1 auto;
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        align-items: center;
        align-content: center;
      }
      .sf-tok {
        font-family: var(--mono);
        font-weight: 800;
        font-size: 30px;
        background: var(--bg-card);
        border: 2px solid var(--accent-3);
        border-radius: 10px;
        padding: 8px 14px;
        color: var(--text);
        position: relative;
      }
      .sf-tok.target { border-color: var(--accent-1); }
      .sf-tok .marker {
        display: inline-block;
        margin-right: 6px;
        font-family: var(--mono);
        font-weight: 900;
        font-size: 22px;
        line-height: 1;
        opacity: 0;
        vertical-align: middle;
      }
      .sf-tok .marker.ok { color: var(--accent-3); }
      .sf-tok .marker.no { color: var(--accent-1); }
      .sf-arrow {
        font-family: var(--mono);
        font-weight: 800;
        font-size: 36px;
        color: var(--accent-1);
      }
      .sf-stage-label {
        font-family: var(--mono);
        font-weight: 800;
        font-size: 22px;
        letter-spacing: 3px;
        text-transform: uppercase;
        color: var(--accent-2);
        margin-bottom: 4px;
      }
      .sf-receipt {
        font-family: var(--serif);
        font-weight: 800;
        font-style: italic;
        font-size: 60px;
        line-height: 1;
        letter-spacing: -1px;
        color: var(--accent-1);
        margin-top: 4px;
      }
      .sf-receipt em {
        font-style: italic;
        color: var(--text);
      }
    </style>

    <div id="sf-content">
      <div class="sf-overline" id="sf-overline">THE FIX</div>
      <div class="sf-title" id="sf-title"><span class="em">Speculative</span> decoding.</div>
      <div class="sf-paper" id="sf-paper">arXiv 2211.17192 &middot; <span class="em">Google</span> &middot; Nov 2022</div>

      <div class="sf-stage" id="sf-stage">
        <div class="sf-row">
          <div class="sf-box sf-box-draft" id="sf-draft">
            <div class="lab">DRAFT</div>
            <div class="nm">small + fast</div>
            <div class="sub">~1B params</div>
          </div>
          <div class="sf-arrow" id="sf-arrow-1">&rarr;</div>
          <div class="sf-stream" id="sf-draft-stream">
            <span class="sf-tok" id="sf-d1">why</span>
            <span class="sf-tok" id="sf-d2">did</span>
            <span class="sf-tok" id="sf-d3">the</span>
            <span class="sf-tok" id="sf-d4">chicken</span>
          </div>
        </div>

        <div class="sf-row">
          <div class="sf-box sf-box-target" id="sf-target">
            <div class="lab">TARGET</div>
            <div class="nm">big + slow</div>
            <div class="sub">70B params</div>
          </div>
          <div class="sf-arrow" id="sf-arrow-2">&rarr;</div>
          <div class="sf-stream" id="sf-verify-stream">
            <span class="sf-stage-label" id="sf-parallel-lab">PARALLEL VERIFY (1 PASS)</span>
            <span class="sf-tok target" id="sf-v1"><span class="marker ok" id="sf-m1">&check;</span>why</span>
            <span class="sf-tok target" id="sf-v2"><span class="marker ok" id="sf-m2">&check;</span>did</span>
            <span class="sf-tok target" id="sf-v3"><span class="marker ok" id="sf-m3">&check;</span>the</span>
            <span class="sf-tok target" id="sf-v4"><span class="marker no" id="sf-m4">&times;</span>chicken</span>
            <span class="sf-tok target" id="sf-v4-fix">cross</span>
          </div>
        </div>

        <div class="sf-receipt" id="sf-receipt">
          <em>4 tokens.</em> &nbsp;Price of one forward pass.
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({ paused: true, defaults: { ease: "power3.out" } });

      tl.set("#sf-overline", { y: -8, opacity: 0 }, 0);
      tl.set("#sf-title",    { y: 24, opacity: 0 }, 0);
      tl.set("#sf-paper",    { y: 16, opacity: 0 }, 0);
      tl.set("#sf-stage",    { y: 24, opacity: 0 }, 0);
      tl.set("#sf-draft",    { x: -32, opacity: 0, scale: 0.92 }, 0);
      tl.set("#sf-arrow-1",  { opacity: 0 }, 0);
      tl.set("#sf-d1",       { opacity: 0, x: 16, scale: 0.8 }, 0);
      tl.set("#sf-d2",       { opacity: 0, x: 16, scale: 0.8 }, 0);
      tl.set("#sf-d3",       { opacity: 0, x: 16, scale: 0.8 }, 0);
      tl.set("#sf-d4",       { opacity: 0, x: 16, scale: 0.8 }, 0);
      tl.set("#sf-target",   { x: -32, opacity: 0, scale: 0.92 }, 0);
      tl.set("#sf-arrow-2",  { opacity: 0 }, 0);
      tl.set("#sf-parallel-lab", { opacity: 0 }, 0);
      tl.set("#sf-v1",       { opacity: 0, scale: 0.8 }, 0);
      tl.set("#sf-v2",       { opacity: 0, scale: 0.8 }, 0);
      tl.set("#sf-v3",       { opacity: 0, scale: 0.8 }, 0);
      tl.set("#sf-v4",       { opacity: 0, scale: 0.8 }, 0);
      tl.set("#sf-v4-fix",   { opacity: 0, scale: 0.6, x: -10 }, 0);
      tl.set("#sf-m1",       { opacity: 0, scale: 0.5 }, 0);
      tl.set("#sf-m2",       { opacity: 0, scale: 0.5 }, 0);
      tl.set("#sf-m3",       { opacity: 0, scale: 0.5 }, 0);
      tl.set("#sf-m4",       { opacity: 0, scale: 0.5 }, 0);
      tl.set("#sf-receipt",  { y: 24, opacity: 0 }, 0);

      tl.to("#sf-overline", { y: 0, opacity: 1, duration: 0.4 }, 0.05);
      tl.to("#sf-title",    { y: 0, opacity: 1, duration: 0.6 }, 0.20);
      tl.to("#sf-title",    { scale: 1.02, duration: 0.3, yoyo: true, repeat: 1 }, 0.95);
      tl.to("#sf-paper",    { y: 0, opacity: 1, duration: 0.5 }, 1.70);
      tl.to("#sf-stage",    { y: 0, opacity: 1, duration: 0.6 }, 4.50);

      // DRAFT card lands at "A small fast draft model"
      tl.to("#sf-draft",   { x: 0, opacity: 1, scale: 1, duration: 0.5, ease: "back.out(1.5)" }, 5.78);
      tl.to("#sf-arrow-1", { opacity: 1, duration: 0.3 }, 6.20);

      // TARGET card lands at "A big slow target model"
      tl.to("#sf-target",  { x: 0, opacity: 1, scale: 1, duration: 0.5, ease: "back.out(1.5)" }, 7.09);
      tl.to("#sf-arrow-2", { opacity: 1, duration: 0.3 }, 7.55);

      // 4 draft tokens stream out at "speculates four tokens ahead"
      tl.to("#sf-d1", { opacity: 1, x: 0, scale: 1, duration: 0.4, ease: "back.out(1.6)" }, 9.40);
      tl.to("#sf-d2", { opacity: 1, x: 0, scale: 1, duration: 0.4, ease: "back.out(1.6)" }, 9.85);
      tl.to("#sf-d3", { opacity: 1, x: 0, scale: 1, duration: 0.4, ease: "back.out(1.6)" }, 10.30);
      tl.to("#sf-d4", { opacity: 1, x: 0, scale: 1, duration: 0.4, ease: "back.out(1.6)" }, 10.75);

      // PARALLEL VERIFY label + 4 target tokens enter together at "single parallel pass"
      tl.to("#sf-parallel-lab", { opacity: 1, duration: 0.4 }, 13.37);
      tl.to("#sf-v1", { opacity: 1, scale: 1, duration: 0.45, ease: "back.out(1.5)" }, 14.61);
      tl.to("#sf-v2", { opacity: 1, scale: 1, duration: 0.45, ease: "back.out(1.5)" }, 14.71);
      tl.to("#sf-v3", { opacity: 1, scale: 1, duration: 0.45, ease: "back.out(1.5)" }, 14.81);
      tl.to("#sf-v4", { opacity: 1, scale: 1, duration: 0.45, ease: "back.out(1.5)" }, 14.91);

      // Accept markers: ✓ on tokens 1-3 at "Match the draft. Accept the tokens"
      tl.to("#sf-m1", { opacity: 1, scale: 1, duration: 0.35, ease: "back.out(1.7)" }, 17.40);
      tl.to("#sf-m2", { opacity: 1, scale: 1, duration: 0.35, ease: "back.out(1.7)" }, 17.70);
      tl.to("#sf-m3", { opacity: 1, scale: 1, duration: 0.35, ease: "back.out(1.7)" }, 18.00);

      // Reject marker: ✗ on token 4 at "Disagree somewhere. Reject"
      tl.to("#sf-m4", { opacity: 1, scale: 1, duration: 0.4, ease: "back.out(1.7)" }, 20.21);
      tl.to("#sf-v4", { opacity: 0.4, duration: 0.4 }, 20.65);

      // Target corrects: swap to "cross" at "The target corrects it"
      tl.to("#sf-v4-fix", { opacity: 1, scale: 1, x: 0, duration: 0.45, ease: "back.out(1.6)" }, 23.49);

      // Final receipt
      tl.to("#sf-receipt", { y: 0, opacity: 1, duration: 0.55 }, 24.67);
      tl.to("#sf-receipt", { scale: 1.03, duration: 0.3, yoyo: true, repeat: 1 }, 27.12);

      window.__timelines["scene-fix"] = tl;
    </script>
  </div>
</template>
