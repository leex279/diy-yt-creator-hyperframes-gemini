<!--
  scene-stat.html — Receipts (4.0–17.5s, scene-rel 0–13.5s).
  Beats (transcript scene-rel = abs - 4.0):
    0.08  — "One post"           → overline
    0.86  — "Seven days"         → big number
    1.79  — "dev internet went to war" → stamp
    4.28  — "Thariq" attribution → article cover + name card slide in
    7.75  — "Markdown is the wrong format." → thesis line emphasis
    9.40  — "Seven hundred fifty thousand views" → 750K counter
    12.54 — "The replies split." → split bars
-->
<template id="scene-stat-template">
  <div data-composition-id="scene-stat"
       data-start="0"
       data-width="1080"
       data-height="1920"
       style="position:absolute; inset:0; overflow:hidden;
              font-family:'Source Serif 4', 'Playfair Display', Georgia, serif; color:var(--text);">

    <style>
      #ss-content {
        width: 100%; height: 100%;
        padding: var(--pad-top) var(--pad-x) var(--pad-bottom);
        position: relative;
        box-sizing: border-box;
        display: flex;
        flex-direction: column;
        gap: 22px;
      }
      .ss-overline {
        font-family: 'JetBrains Mono', ui-monospace, monospace;
        font-weight: 700;
        font-size: 28px;
        letter-spacing: 6px;
        text-transform: uppercase;
        color: var(--accent-2);
      }
      .ss-attr-row {
        display: flex;
        gap: 18px;
        align-items: stretch;
      }
      .ss-x-post {
        flex: 0 0 320px;
        background: var(--bg-card);
        border: 1px solid var(--border);
        border-radius: 16px;
        overflow: hidden;
        box-shadow: 0 14px 32px rgba(28, 26, 24, 0.16);
        position: relative;
      }
      .ss-x-post img {
        display: block;
        width: 100%;
        height: 100%;
        object-fit: cover;
        object-position: top center;
      }
      .ss-x-post .ss-x-tag {
        position: absolute;
        top: 12px;
        left: 12px;
        font-family: 'JetBrains Mono', ui-monospace, monospace;
        font-weight: 800;
        font-size: 18px;
        letter-spacing: 3px;
        text-transform: uppercase;
        color: var(--accent-1);
        background: rgba(251, 248, 241, 0.92);
        border: 1px solid var(--accent-1);
        border-radius: 6px;
        padding: 4px 10px;
      }
      .ss-attr-card {
        flex: 1 1 auto;
        background: var(--bg-card);
        border: 1px solid var(--border);
        border-radius: 18px;
        padding: 24px 28px;
        display: flex;
        flex-direction: column;
        gap: 8px;
        justify-content: center;
      }
      .ss-attr-name {
        font-family: 'Source Serif 4', 'Playfair Display', Georgia, serif;
        font-weight: 800;
        font-size: 64px;
        letter-spacing: -1px;
        color: var(--text);
        line-height: 1;
      }
      .ss-attr-role {
        font-family: 'JetBrains Mono', ui-monospace, monospace;
        font-weight: 700;
        font-size: 22px;
        letter-spacing: 2px;
        text-transform: uppercase;
        color: var(--accent-2);
      }
      .ss-attr-thesis {
        font-family: 'Source Serif 4', 'Playfair Display', Georgia, serif;
        font-style: italic;
        font-weight: 700;
        font-size: 32px;
        line-height: 1.15;
        color: var(--text-secondary);
        margin-top: 6px;
      }
      .ss-attr-thesis .ss-em { color: var(--accent-1); font-weight: 800; }
      .ss-stamp {
        font-family: 'JetBrains Mono', ui-monospace, monospace;
        font-weight: 800;
        font-size: 32px;
        letter-spacing: 4px;
        text-transform: uppercase;
        color: var(--accent-1);
        background: rgba(199, 90, 63, 0.10);
        border: 2px solid var(--accent-1);
        border-radius: 14px;
        padding: 14px 22px;
        align-self: flex-start;
        transform-origin: left center;
      }
      .ss-stat-pill {
        background: var(--bg-card);
        border: 2px solid var(--accent-1);
        border-radius: 24px;
        padding: 40px 36px;
        margin-top: 4px;
      }
      .ss-stat-num {
        font-family: 'Source Serif 4', 'Playfair Display', Georgia, serif;
        font-weight: 800;
        font-size: 176px;
        line-height: 1.0;
        letter-spacing: -3px;
        color: var(--accent-1);
      }
      .ss-stat-label {
        font-family: 'JetBrains Mono', ui-monospace, monospace;
        font-weight: 700;
        font-size: 28px;
        letter-spacing: 4px;
        text-transform: uppercase;
        color: var(--text-secondary);
        margin-top: 8px;
      }
      .ss-split {
        display: flex;
        gap: 16px;
        align-items: stretch;
      }
      .ss-split-bar {
        flex: 1;
        height: 60px;
        border-radius: 10px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: 'JetBrains Mono', ui-monospace, monospace;
        font-weight: 800;
        font-size: 28px;
        letter-spacing: 3px;
        text-transform: uppercase;
        transform: scaleX(0);
        transform-origin: left center;
      }
      .ss-split-pro { background: rgba(86, 111, 79, 0.18); border: 2px solid var(--accent-3); color: var(--accent-3); transform-origin: left center; }
      .ss-split-con { background: rgba(199, 90, 63, 0.16); border: 2px solid var(--accent-1); color: var(--accent-1); transform-origin: right center; }
      .ss-split-label {
        font-family: 'JetBrains Mono', ui-monospace, monospace;
        font-weight: 700;
        font-size: 28px;
        letter-spacing: 6px;
        text-transform: uppercase;
        color: var(--text);
        text-align: center;
        margin-top: 8px;
      }
    </style>

    <div id="ss-content">
      <div class="ss-overline" id="ss-overline">ONE POST &middot; 7 DAYS</div>

      <div class="ss-stamp" id="ss-stamp">Dev Internet Went to War</div>

      <div class="ss-attr-row">
        <div class="ss-x-post" id="ss-xpost">
          <img src="../assets/article-cover.png" alt="Thariq's article — The Unreasonable Effectiveness of HTML" />
          <div class="ss-x-tag">@trq212</div>
        </div>
        <div class="ss-attr-card" id="ss-attr">
          <div class="ss-attr-name" id="ss-attr-name">Thariq</div>
          <div class="ss-attr-role" id="ss-attr-role">Anthropic &middot; Claude Code</div>
          <div class="ss-attr-thesis" id="ss-attr-thesis">
            &ldquo;Markdown is the <span class="ss-em">wrong format</span>.&rdquo;
          </div>
        </div>
      </div>

      <div class="ss-stat-pill" id="ss-pill">
        <div class="ss-stat-num" id="ss-num">0K</div>
        <div class="ss-stat-label">views in one week</div>
      </div>

      <div>
        <div class="ss-split">
          <div class="ss-split-bar ss-split-pro" id="ss-pro">For</div>
          <div class="ss-split-bar ss-split-con" id="ss-con">Against</div>
        </div>
        <div class="ss-split-label" id="ss-split-label">The replies <span style="color:var(--accent-1);font-weight:900">split</span></div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({ paused: true, defaults: { ease: "power3.out" } });

      tl.set("#ss-overline",   { y: -8, opacity: 0 }, 0);
      tl.set("#ss-stamp",      { scale: 0.7, opacity: 0, filter: "blur(15px)" }, 0);
      tl.set("#ss-xpost",      { x: -32, opacity: 0, scale: 0.92 }, 0);
      tl.set("#ss-attr",       { y: 24, opacity: 0 }, 0);
      tl.set("#ss-attr-thesis",{ y: 12, opacity: 0 }, 0);
      tl.set("#ss-pill",       { y: 24, opacity: 0 }, 0);
      tl.set("#ss-pro",        { scaleX: 0, opacity: 0 }, 0);
      tl.set("#ss-con",        { scaleX: 0, opacity: 0 }, 0);
      tl.set("#ss-split-label",{ opacity: 0, y: 8 }, 0);

      // Overline + stamp lead the scene
      tl.to("#ss-overline", { y: 0, opacity: 1, duration: 0.4 }, 0.08);
      tl.to("#ss-stamp",    { scale: 1, opacity: 1, filter: "blur(0px)", duration: 0.55, ease: "back.out(1.5)" }, 1.79);
      tl.to("#ss-stamp",    { x: -6, duration: 0.04, yoyo: true, repeat: 5 }, 2.09);

      // Article cover + Thariq attribution land at "Thariq, the engineer..."
      tl.to("#ss-xpost",       { x: 0, opacity: 1, scale: 1, duration: 0.6, ease: "back.out(1.4)" }, 4.10);
      tl.to("#ss-attr",        { y: 0, opacity: 1, duration: 0.55 }, 4.40);
      tl.to("#ss-attr-thesis", { y: 0, opacity: 1, duration: 0.5 }, 7.75);
      tl.to("#ss-attr-thesis", { scale: 1.03, duration: 0.3, yoyo: true, repeat: 1, ease: "power2.out" }, 8.50);

      // Counter roll: 0 → 750
      tl.to("#ss-pill", { y: 0, opacity: 1, duration: 0.5 }, 9.30);
      const counter = { v: 0 };
      tl.to(counter, {
        v: 750,
        duration: 1.10,
        ease: "power2.out",
        onUpdate: function() {
          const el = document.getElementById('ss-num');
          if (el) el.textContent = Math.round(counter.v) + 'K';
        }
      }, 9.50);
      tl.to("#ss-pill", { scale: 1.04, duration: 0.3, yoyo: true, repeat: 1, ease: "power2.out" }, 10.70);

      // Split bars enter when "replies split"
      tl.to("#ss-pro",         { scaleX: 1, opacity: 1, duration: 0.55, ease: "power2.out" }, 12.54);
      tl.to("#ss-con",         { scaleX: 1, opacity: 1, duration: 0.55, ease: "power2.out" }, 12.69);
      tl.to("#ss-split-label", { y: 0, opacity: 1, duration: 0.4 }, 13.10);

      window.__timelines["scene-stat"] = tl;
    </script>
  </div>
</template>
