<!--
  scene-12-support.html — Support-the-channel pillar (12.5s, comp-time 529.79-542.24).

  Friendly creator pillar — subscribe / bell / like icon triad + message.
  NOT a paid sponsorship (no Werbung badge), just a half-step before s13's CTA.

  Scene-internal anchors (audio - 489.786):
    0.0   "If this was useful, drop a like..."
    1.5   "subscribe"
    2.5   "hit the bell"
    4.5   "cheapest way to support the channel"
-->
<template id="scene-12-support-template">
  <div data-composition-id="scene-12-support"
       data-start="0"
       data-width="1920"
       data-height="1080"
       style="position:absolute; inset:0; overflow:hidden;
              font-family: 'Inter', system-ui, sans-serif; color:var(--text);">

    <style>
      #s12-content {
        width:100%; height:100%;
        padding: var(--pad-top) var(--pad-x) var(--pad-bottom);
        display:flex; flex-direction:column;
        align-items:center; justify-content:center;
        gap: 40px;
        box-sizing:border-box;
      }
      #s12-overline {
        font-family: 'JetBrains Mono', ui-monospace, monospace;
        font-weight: 700;
        font-size: 22px;
        letter-spacing: 6px;
        text-transform: uppercase;
        color: var(--accent-1);
      }
      #s12-icons-row {
        display:flex; align-items:center; gap: 60px;
      }
      .s12-icon {
        width: 180px; height: 180px;
        border-radius: 28px;
        background: linear-gradient(135deg, rgba(201, 42, 42, 0.18) 0%, rgba(201, 42, 42, 0.03) 100%);
        border: 2px solid rgba(201, 42, 42, 0.55);
        display:flex; flex-direction:column; align-items:center; justify-content:center;
        gap: 8px;
        font-size: 80px;
        color: var(--accent-1);
        box-shadow: 0 16px 50px rgba(201, 42, 42, 0.25);
      }
      .s12-icon .icon-label {
        font-family: 'JetBrains Mono', ui-monospace, monospace;
        font-weight: 800;
        font-size: 18px;
        letter-spacing: 2px;
        color: var(--text);
        text-transform: uppercase;
      }
      #s12-message {
        font-family: 'Inter', system-ui, sans-serif;
        font-weight: 800;
        font-size: 56px;
        line-height: 1.1;
        letter-spacing: -1px;
        color: var(--text);
        text-align: center;
        max-width: 1500px;
      }
      .s12-mark-wrap {
        position: relative;
        display: inline-block;
      }
      #s12-mark-bar {
        position: absolute;
        left: 0; right: 0;
        bottom: -8px;
        height: 8px;
        background: var(--accent-1);
        border-radius: 4px;
        transform-origin: left center;
        transform: scaleX(0);
      }
      #s12-tell-chip {
        display:inline-flex; align-items:center; gap: 10px;
        padding: 10px 22px;
        margin-top: 10px;
        border-radius: 999px;
        background: rgba(34, 211, 238, 0.08);
        border: 1.5px solid rgba(34, 211, 238, 0.45);
        font-family: 'JetBrains Mono', ui-monospace, monospace;
        font-weight: 700;
        font-size: 22px;
        color: var(--accent-2);
      }
    </style>

    <div id="s12-content">
      <div id="s12-overline">QUICK FAVOR</div>

      <div id="s12-icons-row">
        <div class="s12-icon" id="s12-icon-1">
          <div>&#128077;</div>
          <div class="icon-label">LIKE</div>
        </div>
        <div class="s12-icon" id="s12-icon-2">
          <div>&#9989;</div>
          <div class="icon-label">SUBSCRIBE</div>
        </div>
        <div class="s12-icon" id="s12-icon-3">
          <div>&#128276;</div>
          <div class="icon-label">BELL</div>
        </div>
      </div>

      <div id="s12-message">
        The <span class="s12-mark-wrap">cheapest way to support the channel<span id="s12-mark-bar"></span></span>.
      </div>

      <div id="s12-tell-chip">&rarr; tells YouTube to send this to more devs</div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      window.__timelines = window.__timelines || {};
      (function(){
        const tl = gsap.timeline({ paused: true, defaults: { ease: "power3.out" } });

        tl.set("#s12-overline", { opacity: 0, y: 12 }, 0);
        tl.set("#s12-icon-1", { opacity: 0, scale: 0.7, y: 20 }, 0);
        tl.set("#s12-icon-2", { opacity: 0, scale: 0.7, y: 20 }, 0);
        tl.set("#s12-icon-3", { opacity: 0, scale: 0.7, y: 20 }, 0);
        tl.set("#s12-message", { opacity: 0, y: 16 }, 0);
        tl.set("#s12-mark-bar", { scaleX: 0 }, 0);
        tl.set("#s12-tell-chip", { opacity: 0, y: 12 }, 0);

        tl.to("#s12-overline", { opacity: 1, y: 0, duration: 0.4 }, 0);

        // Icons enter staggered to the narration "drop a like, subscribe, hit the bell"
        tl.to("#s12-icon-1", { opacity: 1, scale: 1, y: 0, duration: 0.5, ease: "back.out(2)" }, 0.5);
        tl.to("#s12-icon-2", { opacity: 1, scale: 1, y: 0, duration: 0.5, ease: "back.out(2)" }, 1.6);
        tl.to("#s12-icon-3", { opacity: 1, scale: 1, y: 0, duration: 0.5, ease: "back.out(2)" }, 2.6);

        // Message at "It's the cheapest way..." (t=4.5)
        tl.to("#s12-message", { opacity: 1, y: 0, duration: 0.6 }, 4.3);
        tl.to("#s12-mark-bar", { scaleX: 1, duration: 0.5, ease: "power2.out" }, 5.3);

        // REAL-CONTENT BEAT — tell-chip at narration "and tell YouTube to send this to more devs" @ 7.63s
        tl.to("#s12-tell-chip", { opacity: 1, y: 0, duration: 0.5 }, 7.6);

        // Sequential icon scale-pulse to keep eye moving in tail window (paced to narration end)
        tl.to("#s12-icon-1", { scale: 1.06, duration: 0.6, ease: "sine.inOut", yoyo: true, repeat: 1 }, 10.0);

        tl.set({}, {}, 12.5);
        window.__timelines["scene-12-support"] = tl;
      })();
    </script>
  </div>
</template>
