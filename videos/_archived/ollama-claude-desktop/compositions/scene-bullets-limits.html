<!--
  scene-bullets-limits.html — 3 limit rows for what's not yet supported.
  Each row reveals at the moment the narrator names it (transcript word
  starts: Web @ 67.28s, Extensions @ 69.69s, Subagents @ 71.62s —
  relative to scene data-start 65.5s those are in-scene 1.78 / 4.19 / 6.12).
-->
<template id="scene-bullets-limits-template">
  <div data-composition-id="scene-bullets-limits"
       data-start="0"
       data-width="1080"
       data-height="1920"
       style="position:absolute; inset:0; overflow:hidden;">

    <style>
      #scene-bullets-limits-content {
        width:100%; height:100%;
        padding: var(--pad-top) var(--pad-x) var(--pad-bottom);
        display:flex; flex-direction:column;
        align-items:center; justify-content:center;
        text-align:left; gap:36px;
        box-sizing:border-box;
      }
      #scene-bullets-limits-content .header {
        font-family: var(--serif);
        font-weight: 700;
        font-size: 80px;
        line-height: 1.05;
        letter-spacing: -1px;
        color: var(--accent-ink);
        text-align: center;
        max-width: 880px;
      }
      #scene-bullets-limits-content .header .em {
        color: var(--accent-warm);
        font-style: italic;
      }
      #scene-bullets-limits-content .row-list {
        display: flex; flex-direction: column;
        gap: 28px; width: 920px;
      }
      #scene-bullets-limits-content .row {
        display: flex; align-items: center; gap: 28px;
        padding: 24px 28px;
        background: var(--bg-card);
        border: 1.5px solid var(--border);
        border-radius: 22px;
        box-shadow: var(--shadow-warm);
      }
      #scene-bullets-limits-content .icon {
        flex: 0 0 auto;
        width: 92px; height: 92px;
        border-radius: 50%;
        display: flex; align-items: center; justify-content: center;
        font-family: var(--serif);
        font-weight: 700;
        font-size: 56px;
        color: var(--text-on-warm);
        line-height: 1;
      }
      #scene-bullets-limits-content .row.r1 .icon { background: var(--accent-rose); }
      #scene-bullets-limits-content .row.r2 .icon { background: var(--accent-rose); }
      #scene-bullets-limits-content .row.r3 .icon { background: var(--accent-sage); color: var(--accent-ink); }
      #scene-bullets-limits-content .body { display:flex; flex-direction:column; gap: 4px; flex:1; }
      #scene-bullets-limits-content .title {
        font-family: var(--sans);
        font-weight: 800;
        font-size: 42px;
        line-height: 1.05;
        color: var(--accent-ink);
      }
      #scene-bullets-limits-content .sub {
        font-family: var(--serif);
        font-style: italic;
        font-weight: 400;
        font-size: 30px;
        line-height: 1.3;
        color: var(--text-secondary);
      }
    </style>

    <div id="scene-bullets-limits-content">
      <div class="header" id="bullets-header">
        Two limits <span class="em">to know.</span>
      </div>
      <div class="row-list">
        <div class="row r1" id="bullets-r1">
          <div class="icon">!</div>
          <div class="body">
            <div class="title">No web search yet</div>
            <div class="sub">Roadmap item, not in the v1 bridge.</div>
          </div>
        </div>
        <div class="row r2" id="bullets-r2">
          <div class="icon">!</div>
          <div class="body">
            <div class="title">No extensions yet</div>
            <div class="sub">Same story. Coming, just not today.</div>
          </div>
        </div>
        <div class="row r3" id="bullets-r3">
          <div class="icon">&#10003;</div>
          <div class="body">
            <div class="title">Subagents inherit</div>
            <div class="sub">They use whichever model you picked.</div>
          </div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({ paused: true });

      // Hide rows from t=0
      tl.set("#bullets-r1", { x: -40, opacity: 0 }, 0);
      tl.set("#bullets-r2", { x: -40, opacity: 0 }, 0);
      tl.set("#bullets-r3", { x: -40, opacity: 0 }, 0);

      tl.set("#bullets-header", { y: 24, opacity: 0 }, 0);
      tl.to("#bullets-header",  { y: 0, opacity: 1, duration: 0.6, ease: "power3.out" }, 0);

      // Anchors from transcript: Web @ 61.868 → in-scene 1.47,
      // Extensions @ 64.259 → 3.86, Subagents @ 66.221 → 5.82 (data-start 60.4).
      tl.to("#bullets-r1", { x: 0, opacity: 1, duration: 0.55, ease: "back.out(1.5)" }, 1.47);
      tl.to("#bullets-r2", { x: 0, opacity: 1, duration: 0.55, ease: "back.out(1.5)" }, 3.86);
      tl.to("#bullets-r3", { x: 0, opacity: 1, duration: 0.55, ease: "back.out(1.5)" }, 5.82);

      // Icon emphasis — small post-reveal pulse on each row's icon
      tl.to("#bullets-r1 .icon", { scale: 1.12, duration: 0.4, ease: "back.out(2)", yoyo: true, repeat: 1 }, 2.4);
      tl.to("#bullets-r2 .icon", { scale: 1.12, duration: 0.4, ease: "back.out(2)", yoyo: true, repeat: 1 }, 4.8);
      tl.to("#bullets-r3 .icon", { scale: 1.12, duration: 0.4, ease: "back.out(2)", yoyo: true, repeat: 1 }, 6.8);

      window.__timelines["scene-bullets-limits"] = tl;
    </script>
  </div>
</template>
