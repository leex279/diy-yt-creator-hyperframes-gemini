<!DOCTYPE html>
<!-- Variant 03 — Imperative command. "Stop writing markdown." Dark theme, yellow Inter Black. No cover — type IS the visual. -->
<html lang="en"><head><meta charset="utf-8">
<title>v03 — Stop writing markdown</title>
<link rel="stylesheet" href="_base.css">
<style>
  .thumb.theme-dark .headline {
    font-family: var(--sans-display);
    font-weight: 900;
    letter-spacing: -3px;
    width: 1160px;
  }
  .thumb.theme-dark .headline .l1 { font-size: 116px; line-height: 0.95; color: #fff; }
  .thumb.theme-dark .headline .l2 { font-size: 184px; line-height: 0.92; margin-top: -2px; letter-spacing: -5px; color: var(--accent-yellow); text-shadow: 0 0 60px rgba(255, 214, 10, 0.18); }
  .source-stamp {
    position: absolute;
    right: 60px;
    top: 56px;
    display: flex;
    align-items: center;
    gap: 14px;
    font-family: var(--mono);
    font-weight: 700;
    font-size: 18px;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: var(--text-dim-dark);
  }
  .source-stamp .badge {
    background: var(--accent-yellow);
    color: #0d0d10;
    padding: 6px 12px;
    border-radius: 4px;
    letter-spacing: 2px;
  }
</style></head>
<body>
  <div class="thumb theme-dark">
    <div class="overline">47 seconds</div>
    <div class="overline-divider"></div>
    <div class="source-stamp"><span>Source · @trq212</span><span class="badge">751K views</span></div>
    <h1 class="headline" style="top: 220px;">
      <span class="l1">Stop writing</span>
      <em class="l2">markdown.</em>
    </h1>
    <div class="receipt" style="right: 60px;"><strong>The team that built Claude Code switched.</strong><br>Here's why HTML wins.</div>
    <div class="brand"><span class="dot"></span><span>diy-yt-creator</span></div>
  </div>
</body></html>
