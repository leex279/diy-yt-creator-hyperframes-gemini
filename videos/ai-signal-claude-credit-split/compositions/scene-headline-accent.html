<!--
  scene-headline-accent.html — Two-line headline with Dynamous-Blue sweep.

  Signature weight-contrast move (300/800): a light-weight setup line
  paired with an 800-weight slam line. Dynamous-Blue underline sweeps
  across the slam phrase as the second beat.
-->
<template id="scene-headline-accent-template">
  <div data-composition-id="scene-headline-accent"
       data-start="0"
       data-width="1080"
       data-height="1920"
       style="position:absolute; inset:0; overflow:hidden;
              font-family:'Montserrat', system-ui, sans-serif; color:var(--ink);">

    <style>
      #ha-content {
        width:100%; height:100%;
        padding: var(--pad-top) var(--pad-x) var(--pad-bottom);
        display:flex; flex-direction:column;
        align-items:flex-start; justify-content:center;
        gap: 36px;
        box-sizing:border-box;
        position: relative;
      }
      #ha-content .eyebrow {
        font-family: 'JetBrains Mono', ui-monospace, monospace;
        font-size: 34px;
        font-weight: 500;
        letter-spacing: 0.32em;
        text-transform: uppercase;
        color: var(--accent-2);
        display: inline-flex; align-items: center; gap: 18px;
      }
      #ha-content .eyebrow::before {
        content: ""; display: inline-block;
        width: 64px; height: 2px;
        background: var(--accent-2);
      }
      #ha-content .light {
        font-family: 'Montserrat', system-ui, sans-serif;
        font-weight: 300;
        font-size: 90px;
        line-height: 1.04;
        letter-spacing: -0.02em;
        color: var(--ink-2);
        max-width: 940px;
      }
      #ha-content .slam {
        font-family: 'Montserrat', system-ui, sans-serif;
        font-weight: 800;
        font-size: 138px;
        line-height: 0.96;
        letter-spacing: -0.03em;
        color: var(--ink);
        max-width: 940px;
        position: relative;
        display: inline-block;
      }
      #ha-content .slam .accent {
        color: var(--accent);
        text-shadow: 0 0 60px rgba(59, 130, 246, 0.45);
      }
      #ha-sweep {
        position: absolute;
        left: 0; bottom: -16px;
        height: 8px;
        width: 0%;
        background: linear-gradient(90deg, var(--accent) 0%, var(--accent-3) 100%);
        box-shadow: 0 0 24px rgba(59, 130, 246, 0.7);
        border-radius: 4px;
      }
    </style>

    <div id="ha-content">
      <div class="eyebrow" id="ha-eyebrow" style="opacity:0;visibility:hidden;">STORY 01 · PROGRAMMATIC</div>
      <div class="light" id="ha-light" style="opacity:0;visibility:hidden;">Agent SDK, <strong>claude -p</strong>, and GitHub Actions stop sharing</div>
      <div style="position:relative; display:inline-block;">
        <div class="slam" id="ha-slam" style="opacity:0;visibility:hidden;">
          your <span class="accent">subscription</span> quota.
        </div>
        <div id="ha-sweep"></div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({ paused: true });

      tl.set("#ha-eyebrow", { y: 24, autoAlpha: 0 }, 0);
      tl.set("#ha-light",   { y: 30, autoAlpha: 0 }, 0);
      tl.set("#ha-slam",    { y: 40, autoAlpha: 0, scale: 0.96 }, 0);
      tl.set("#ha-sweep",   { width: "0%" }, 0);

      tl.to("#ha-eyebrow", { y: 0, autoAlpha: 1, duration: 0.5, ease: "power2.out" }, 0.2);
      tl.to("#ha-light",   { y: 0, autoAlpha: 1, duration: 0.55, ease: "power2.out" }, 0.6);
      tl.to("#ha-slam",    { y: 0, scale: 1, autoAlpha: 1, duration: 0.7, ease: "back.out(1.4)" }, 1.4);

      // Accent sweep — second beat
      tl.to("#ha-sweep", { width: "100%", duration: 0.7, ease: "power2.out" }, 2.5);

      // Third beat — scale pulse on the slam
      tl.to("#ha-slam", { scale: 1.02, duration: 1.2, ease: "sine.inOut", yoyo: true, repeat: 1 }, 5.2);

      // Fourth beat — sweep glow flicker
      tl.to("#ha-sweep", { boxShadow: "0 0 40px rgba(96, 165, 250, 0.95)", duration: 0.9, ease: "sine.inOut", yoyo: true, repeat: 1 }, 7.6);

      tl.set({}, {}, 10);
      window.__timelines["scene-headline-accent"] = tl;
    </script>
  </div>
</template>
