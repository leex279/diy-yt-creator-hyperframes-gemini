<svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 1000 1000" height="1000" width="1000">
  <!-- Coiled sandworm silhouette — Shai-Hulud motif -->
  <g fill="#2B2A28">
    <!-- Outer coil body (thick crescent) -->
    <path d="M500 130
             C 760 130, 870 340, 870 540
             C 870 760, 700 870, 500 870
             C 320 870, 180 740, 180 560
             C 180 380, 320 280, 460 280
             C 580 280, 660 360, 660 460
             C 660 540, 600 600, 530 600
             L 530 720
             C 660 720, 740 640, 740 540
             C 740 400, 620 320, 480 320
             C 320 320, 240 440, 240 580
             C 240 720, 360 800, 500 800
             C 660 800, 770 700, 770 540
             C 770 370, 680 200, 500 200 Z"/>
    <!-- Segmentation ridges (3 stripes across the worm body) -->
    <rect x="240" y="450" width="500" height="14" opacity="0.35"/>
    <rect x="270" y="520" width="440" height="14" opacity="0.35"/>
    <rect x="300" y="590" width="380" height="14" opacity="0.35"/>
    <!-- Mouth — open maw at the head end -->
    <circle cx="500" cy="180" r="42" fill="#0E1014"/>
  </g>
</svg>
