    <script>
      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({
        paused: true,
        defaults: { ease: "power3.out", duration: 0.6 }
      });
 
      // ==========================================
      // PHASE 1: 0s - 16s
      // ==========================================

      // 1. Debate question — expo.out rise at t=0
      tl.from("#cta-debate", { y: 40, opacity: 0, duration: 0.7, ease: "expo.out", immediateRender: false }, 0);
 
      // 2. Comment pill entrance at t=2.0
      tl.fromTo("#cta-comment", {
        y: 35,
        rotateX: 12,
        opacity: 0
      }, {
        y: 0,
        rotateX: 0,
        opacity: 1,
        duration: 0.7,
        ease: "back.out(1.4)",
        immediateRender: false
      }, 2.0);
      
      // Reveal comment border and spotlight background
      tl.to(".pill-glow-border.blue", { opacity: 1, duration: 0.8 }, 2.0);
      tl.to("#cta-spot-blue", { opacity: 1, duration: 1.0 }, 2.0);
 
      // 3. Subscribe pill entrance at t=2.25
      tl.fromTo("#cta-subscribe", {
        y: 35,
        rotateX: 12,
        opacity: 0
      }, {
        y: 0,
        rotateX: 0,
        opacity: 1,
        duration: 0.7,
        ease: "back.out(1.4)",
        immediateRender: false
      }, 2.25);
      
      // Reveal subscribe border and spotlight background
      tl.to(".pill-glow-border.red", { opacity: 1, duration: 0.8 }, 2.25);
      tl.to("#cta-spot-red", { opacity: 1, duration: 1.0 }, 2.25);
      
      // Snappy arrow slide-in on entry
      tl.set("#cta-sub-arrow", { x: -30, opacity: 0 }, 2.25);
      tl.to("#cta-sub-arrow", { x: 0, opacity: 1, duration: 0.35, ease: "back.out(1.5)" }, 2.25);
 
      // Pulsing red glow halo starting after it completes entrance at 3.05s
