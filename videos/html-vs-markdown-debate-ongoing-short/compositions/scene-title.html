<!--
  scene-title.html — Hook (0–4.0s).
  Beats (transcript scene-rel = abs - 0):
    0.06  — "The"
    0.19  — "Markdown"
    0.61  — "versus"
    0.95  — "HTML"
    1.64  — "debate." (italic, terracotta accent)
    2.29  — "It is"
    2.55  — "still going."  (with marker sweep)
-->
<template id="scene-title-template">
  <div data-composition-id="scene-title"
       data-start="0"
       data-width="1080"
       data-height="1920"
       style="position:absolute; inset:0; overflow:hidden;
              font-family:'Source Serif 4', 'Playfair Display', Georgia, serif; color:var(--text);">

    <style>
      #st-content {
        width: 100%; height: 100%;
        padding: var(--pad-top) var(--pad-x) var(--pad-bottom);
        position: relative;
        box-sizing: border-box;
        display: flex;
        flex-direction: column;
        justify-content: center;
        gap: 60px;
      }
      .st-overline {
        font-family: 'JetBrains Mono', ui-monospace, monospace;
        font-weight: 700;
        font-size: 28px;
        letter-spacing: 8px;
        text-transform: uppercase;
        color: var(--accent-2);
        margin-bottom: 24px;
      }
      #st-row1 {
        font-family: 'Source Serif 4', 'Playfair Display', Georgia, serif;
        font-weight: 800;
        font-style: italic;
        font-size: 168px;
        line-height: 0.92;
        letter-spacing: -3px;
        color: var(--text);
      }
      #st-row1 .st-vs {
        font-family: 'JetBrains Mono', ui-monospace, monospace;
        font-weight: 800;
        font-style: normal;
        font-size: 88px;
        letter-spacing: 4px;
        text-transform: uppercase;
        color: var(--accent-2);
        vertical-align: middle;
        padding: 0 8px;
      }
      #st-row1 .st-debate {
        color: var(--accent-1);
        font-style: italic;
      }
      #st-row2 {
        font-family: 'Source Serif 4', 'Playfair Display', Georgia, serif;
        font-weight: 700;
        font-size: 78px;
        line-height: 1.05;
        letter-spacing: -1px;
        color: var(--text-secondary);
        max-width: 920px;
        position: relative;
      }
      #st-row2 .st-going {
        position: relative;
        display: inline-block;
        color: var(--text);
        font-weight: 900;
      }
      #st-row2 .st-marker {
        position: absolute;
        left: 0;
        right: 0;
        bottom: 4px;
        height: 14px;
        background: var(--accent-1);
        border-radius: 6px;
        transform-origin: left center;
        opacity: 0.7;
      }
    </style>

    <div id="st-content">
      <div>
        <div class="st-overline" id="st-overline">FOLLOW-UP &middot; ONE WEEK LATER</div>
        <div id="st-row1">
          <span id="st-w-md">Markdown</span>
          <span class="st-vs" id="st-w-vs">vs</span>
          <span id="st-w-html">HTML</span><br/>
          <span class="st-debate" id="st-w-debate">debate.</span>
        </div>
      </div>
      <div id="st-row2">
        <span id="st-r2-1">It is </span><span class="st-going" id="st-w-going">still going<span class="st-marker" id="st-marker"></span></span><span id="st-r2-2">.</span>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({ paused: true, defaults: { ease: "power3.out" } });

      tl.set("#st-overline", { y: -10, opacity: 0 }, 0);
      tl.set("#st-w-md",     { y: 24, opacity: 0, scale: 0.85 }, 0);
      tl.set("#st-w-vs",     { opacity: 0, scale: 0.7 }, 0);
      tl.set("#st-w-html",   { y: 24, opacity: 0, scale: 0.85 }, 0);
      tl.set("#st-w-debate", { opacity: 0, scale: 0.6, filter: "blur(20px)" }, 0);
      tl.set("#st-r2-1",     { y: 16, opacity: 0 }, 0);
      tl.set("#st-w-going",  { y: 16, opacity: 0 }, 0);
      tl.set("#st-r2-2",     { opacity: 0 }, 0);
      tl.set("#st-marker",   { scaleX: 0 }, 0);

      tl.to("#st-overline", { y: 0, opacity: 1, duration: 0.4 }, 0);
      tl.to("#st-w-md",     { y: 0, opacity: 1, scale: 1, duration: 0.55, ease: "back.out(1.5)" }, 0.10);
      tl.to("#st-w-vs",     { opacity: 1, scale: 1, duration: 0.4, ease: "back.out(1.8)" }, 0.55);
      tl.to("#st-w-html",   { y: 0, opacity: 1, scale: 1, duration: 0.55, ease: "back.out(1.5)" }, 0.85);
      tl.to("#st-w-debate", { opacity: 1, scale: 1, filter: "blur(0px)", duration: 0.55, ease: "back.out(1.5)" }, 1.55);

      tl.to("#st-r2-1",    { y: 0, opacity: 1, duration: 0.45 }, 2.20);
      tl.to("#st-w-going", { y: 0, opacity: 1, duration: 0.5  }, 2.50);
      tl.to("#st-r2-2",    { opacity: 1, duration: 0.2  }, 2.95);
      tl.to("#st-marker",  { scaleX: 1, duration: 0.55, ease: "power2.out" }, 2.75);
      tl.to("#st-w-going", { scale: 1.04, duration: 0.3, yoyo: true, repeat: 1, ease: "power2.out" }, 3.20);

      window.__timelines["scene-title"] = tl;
    </script>
  </div>
</template>
