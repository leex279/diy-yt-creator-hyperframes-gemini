<!--
  scene-process-flow.html — 4-step process diagram with arrows (~13s).

  Pattern: header → 4 vertically-stacked nodes (raised cards), each
           connected to the next by a downward arrow that draws itself
           after the predecessor node lands. Sequential reveal.
  Self-contained sub-composition with paused timeline at
  window.__timelines["scene-process-flow"].
-->
<template id="scene-process-flow-template">
  <div data-composition-id="scene-process-flow"
       data-start="0"
       data-width="1080"
       data-height="1920"
       style="position:absolute; inset:0; overflow:hidden;">

    <style>
      #scene-process-flow-content {
        width:100%; height:100%;
        padding: var(--pad-top) var(--pad-x) var(--pad-bottom);
        display:flex; flex-direction:column;
        align-items:center; justify-content:center;
        text-align:center; gap:24px;
        box-sizing:border-box;
      }
      #scene-process-flow-content .header {
        font-family: var(--serif);
        font-weight: 800;
        font-size: 92px;
        line-height: 1.05;
        letter-spacing: -2px;
        color: var(--accent-ink);
        margin-bottom: 12px;
      }
      #scene-process-flow-content .header .em {
        color: var(--accent-warm);
        font-style: italic;
      }
      #scene-process-flow-content .flow {
        display: flex; flex-direction: column;
        align-items: center; gap: 0;
      }
      #scene-process-flow-content .node {
        width: 880px;
        padding: 18px 32px;
        border-radius: 22px;
        background: var(--bg-card);
        border: 2px solid var(--border-bright);
        display: flex; align-items: center; gap: 22px;
      }
      #scene-process-flow-content .node.n1 { border-color: var(--accent-warm); }
      #scene-process-flow-content .node.n2 { border-color: var(--accent-deep); }
      #scene-process-flow-content .node.n3 { border-color: var(--accent-sage); }
      #scene-process-flow-content .node.n4 { border-color: var(--accent-gold); }
      #scene-process-flow-content .node .badge {
        flex: 0 0 auto;
        width: 72px; height: 72px;
        border-radius: 50%;
        display: flex; align-items: center; justify-content: center;
        font-family: var(--mono);
        font-weight: 900;
        font-size: 38px;
        color: var(--text-on-warm);
      }
      #scene-process-flow-content .node.n1 .badge { background: var(--accent-warm); }
      #scene-process-flow-content .node.n2 .badge { background: var(--accent-deep); }
      #scene-process-flow-content .node.n3 .badge { background: var(--accent-sage); color: var(--accent-ink); }
      #scene-process-flow-content .node.n4 .badge { background: var(--accent-gold); color: var(--accent-ink); }
      #scene-process-flow-content .node .text {
        text-align: left; flex: 1;
      }
      #scene-process-flow-content .node .title {
        font-family: var(--sans);
        font-weight: 900;
        font-size: 50px;
        line-height: 1.05;
        color: var(--accent-ink);
      }
      #scene-process-flow-content .node .sub {
        font-family: var(--serif);
        font-style: italic;
        font-weight: 500;
        font-size: 34px;
        color: var(--text-secondary);
        margin-top: 4px;
        line-height: 1.25;
      }
      #scene-process-flow-content .arrow {
        font-family: var(--sans);
        font-weight: 900;
        font-size: 44px;
        line-height: 1;
        color: var(--accent-warm);
        opacity: 0.7;
        margin: 4px 0;
      }
    </style>

    <div id="scene-process-flow-content">
      <div class="header" id="pf-header">
        Progressive <span class="em">disclosure.</span>
      </div>
      <div class="flow">
        <div class="node n1" id="pf-n1">
          <span class="badge">1</span>
          <div class="text">
            <div class="title">Discovery</div>
            <div class="sub">Name + description only — ~100 tokens each.</div>
          </div>
        </div>
        <div class="arrow" id="pf-a1">&darr;</div>
        <div class="node n2" id="pf-n2">
          <span class="badge">2</span>
          <div class="text">
            <div class="title">Activation</div>
            <div class="sub">Full SKILL.md loads when the task matches.</div>
          </div>
        </div>
        <div class="arrow" id="pf-a2">&darr;</div>
        <div class="node n3" id="pf-n3">
          <span class="badge">3</span>
          <div class="text">
            <div class="title">Execution</div>
            <div class="sub">Scripts + references load only as the work demands.</div>
          </div>
        </div>
        <div class="arrow" id="pf-a3">&darr;</div>
        <div class="node n4" id="pf-n4">
          <span class="badge">∞</span>
          <div class="text">
            <div class="title">Many skills. Tiny context.</div>
            <div class="sub">The payoff: agents keep dozens of skills on hand.</div>
          </div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({ paused: true });

      // Header enters first, then each node + arrow reveals at the moment
      // narration names it. Per step-by-step-reveal.md.
      tl.from("#pf-header", { y: 24, opacity: 0, duration: 0.6, ease: "power3.out" }, 0);

      // Hide all nodes + arrows from t=0
      tl.set("#pf-n1, #pf-n2, #pf-n3, #pf-n4", { y: 30, scale: 0.92, opacity: 0 }, 0);
      tl.set("#pf-a1, #pf-a2, #pf-a3", { scaleY: 0, opacity: 0, transformOrigin: "top center" }, 0);

      // Reveal n1 + a1 at "Stage one" anchor (scene-rel 4.4s)
      tl.to("#pf-n1", { y: 0, scale: 1, opacity: 1, duration: 0.55, ease: "back.out(1.5)" }, 4.4);
      tl.to("#pf-a1", { scaleY: 1, opacity: 0.6, duration: 0.3, ease: "power2.out" }, 5.5);

      // Bridge gap (5.5 → 12.8) — n1 sub-line pulse at ~9s when narrator says "~100 tokens"
      tl.to("#pf-n1 .badge", { scale: 1.12, duration: 0.4, ease: "power2.out", yoyo: true, repeat: 1 }, 9.0);

      // Reveal n2 + a2 at "Stage two" anchor (scene-rel 12.8s)
      tl.to("#pf-n2", { y: 0, scale: 1, opacity: 1, duration: 0.55, ease: "back.out(1.5)" }, 12.8);
      tl.to("#pf-a2", { scaleY: 1, opacity: 0.6, duration: 0.3, ease: "power2.out" }, 13.9);

      // Bridge gap (13.9 → 20.7) — n2 badge pulse at ~17s on "loads into context"
      tl.to("#pf-n2 .badge", { scale: 1.12, duration: 0.4, ease: "power2.out", yoyo: true, repeat: 1 }, 17.0);

      // Reveal n3 + a3 at "Stage three" anchor (scene-rel 20.7s)
      tl.to("#pf-n3", { y: 0, scale: 1, opacity: 1, duration: 0.55, ease: "back.out(1.5)" }, 20.7);
      tl.to("#pf-a3", { scaleY: 1, opacity: 0.6, duration: 0.3, ease: "power2.out" }, 21.8);

      // Bridge gap (21.8 → 27.3) — n3 badge pulse at ~25s on "when the work demands them"
      tl.to("#pf-n3 .badge", { scale: 1.12, duration: 0.4, ease: "power2.out", yoyo: true, repeat: 1 }, 25.0);

      // Reveal n4 (payoff) at "Skills stay small" anchor (scene-rel 27.3s)
      tl.to("#pf-n4", { y: 0, scale: 1, opacity: 1, duration: 0.55, ease: "back.out(1.5)" }, 27.3);
      // Subtle emphasis pulse on the payoff node
      tl.to("#pf-n4", { scale: 1.03, duration: 0.3, ease: "power2.out", yoyo: true, repeat: 1 }, 28.4);

      window.__timelines["scene-process-flow"] = tl;
    </script>
  </div>
</template>
