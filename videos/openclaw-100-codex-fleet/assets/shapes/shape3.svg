<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 1000" width="1000" height="1000">
  <!-- Circuit-trace silhouette — abstract chip / codex nod.
       Three concentric squared-traces with notches; reads as a printed circuit board. -->
  <g fill="none" stroke="#22d3ee" stroke-width="20" stroke-linejoin="round">
    <path d="M180 180 H820 V820 H180 Z" />
    <path d="M280 280 H720 V720 H280 Z" opacity="0.65" />
    <path d="M380 380 H620 V620 H380 Z" opacity="0.4" />
  </g>
  <!-- chip pins -->
  <g fill="#22d3ee">
    <rect x="120" y="240" width="60" height="24" />
    <rect x="120" y="380" width="60" height="24" />
    <rect x="120" y="520" width="60" height="24" />
    <rect x="120" y="660" width="60" height="24" />
    <rect x="820" y="240" width="60" height="24" />
    <rect x="820" y="380" width="60" height="24" />
    <rect x="820" y="520" width="60" height="24" />
    <rect x="820" y="660" width="60" height="24" />
    <rect x="240" y="120" width="24" height="60" />
    <rect x="380" y="120" width="24" height="60" />
    <rect x="520" y="120" width="24" height="60" />
    <rect x="660" y="120" width="24" height="60" />
    <rect x="240" y="820" width="24" height="60" />
    <rect x="380" y="820" width="24" height="60" />
    <rect x="520" y="820" width="24" height="60" />
    <rect x="660" y="820" width="24" height="60" />
  </g>
</svg>
