<!--
  shared/lib/blocks/stat-pill-row/block.html
  Two-pill stat row: huge tabular-nums numbers + mono labels in
  color-rotated accent pills. Entrance is a back.out(1.6) scale-pop.

  SOURCE: templates/shorts/anthropic/index.html:203-241 (CSS),
          templates/shorts/anthropic/index.html:533-536 (entrances).

  REQUIRED TOKENS (host must declare or inherit):
    --sans, --mono, --orange, --purple, --text
  Provide them by linking shared/lib/tokens/anthropic-dark.css (or the
  host's own equivalent) before this composition's <link>/<div>.

  See ./recipe.md for full wiring instructions.
-->
<template id="stat-pill-row-template">
  <div data-composition-id="stat-pill-row" data-start="0" data-duration="6" data-width="1080" data-height="1920">

    <div class="phase-content">
      <div class="overline" id="spr-overline">SECTION LABEL</div>
      <div class="headline" id="spr-headline">Headline goes here</div>
      <div class="pills" id="spr-pills">
        <div class="stat-pill orange" id="spr-pill-1">
          <div class="stat-num">3</div>
          <div class="stat-label">FIRST LABEL</div>
        </div>
        <div class="stat-pill purple" id="spr-pill-2">
          <div class="stat-num">6</div>
          <div class="stat-label">SECOND LABEL</div>
        </div>
      </div>
    </div>

    <style>
      [data-composition-id="stat-pill-row"] {
        position: relative;
        width: 1080px;
        height: 1920px;
        background: var(--bg, #0B0F18);
        color: var(--text, #F5F1EB);
      }
      [data-composition-id="stat-pill-row"] .phase-content {
        width: 100%;
        height: 100%;
        padding: var(--pad-top, 240px) var(--pad-x, 60px) var(--pad-bottom, 240px);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 24px;
        box-sizing: border-box;
        text-align: center;
      }
      [data-composition-id="stat-pill-row"] .overline {
        font-family: var(--mono, 'JetBrains Mono', ui-monospace, monospace);
        font-weight: 700;
        font-size: 36px;
        letter-spacing: 6px;
        text-transform: uppercase;
        color: var(--orange, #E97458);
      }
      [data-composition-id="stat-pill-row"] .headline {
        font-family: var(--sans, 'Inter', system-ui, sans-serif);
        font-weight: 800;
        font-size: 64px;
        line-height: 1.05;
        letter-spacing: -1px;
        max-width: 940px;
      }
      [data-composition-id="stat-pill-row"] .pills {
        display: flex;
        flex-direction: row;
        gap: 18px;
        justify-content: center;
      }
      [data-composition-id="stat-pill-row"] .stat-pill {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        width: 460px;
        min-height: 300px;
        padding: 44px 24px;
        border-radius: 24px;
      }
      [data-composition-id="stat-pill-row"] .stat-pill.orange {
        background: linear-gradient(135deg, rgba(233,116,88,0.20), rgba(233,116,88,0.06));
        border: 2px solid rgba(233,116,88,0.40);
        box-shadow: 0 14px 36px rgba(233,116,88,0.20);
      }
      [data-composition-id="stat-pill-row"] .stat-pill.purple {
        background: linear-gradient(135deg, rgba(167,139,250,0.20), rgba(167,139,250,0.06));
        border: 2px solid rgba(167,139,250,0.40);
        box-shadow: 0 14px 36px rgba(167,139,250,0.20);
      }
      [data-composition-id="stat-pill-row"] .stat-pill.blue {
        background: linear-gradient(135deg, rgba(107,154,239,0.20), rgba(107,154,239,0.06));
        border: 2px solid rgba(107,154,239,0.40);
        box-shadow: 0 14px 36px rgba(107,154,239,0.20);
      }
      [data-composition-id="stat-pill-row"] .stat-pill.green {
        background: linear-gradient(135deg, rgba(125,211,166,0.20), rgba(125,211,166,0.06));
        border: 2px solid rgba(125,211,166,0.40);
        box-shadow: 0 14px 36px rgba(125,211,166,0.20);
      }
      [data-composition-id="stat-pill-row"] .stat-num {
        font-family: var(--sans, 'Inter', system-ui, sans-serif);
        font-weight: 900;
        font-size: 180px;
        line-height: 0.9;
        letter-spacing: -4px;
        font-variant-numeric: tabular-nums lining-nums;
      }
      [data-composition-id="stat-pill-row"] .stat-pill.orange .stat-num { color: var(--orange, #E97458); text-shadow: 0 0 60px rgba(233,116,88,0.40); }
      [data-composition-id="stat-pill-row"] .stat-pill.purple .stat-num { color: var(--purple, #A78BFA); text-shadow: 0 0 60px rgba(167,139,250,0.40); }
      [data-composition-id="stat-pill-row"] .stat-pill.blue   .stat-num { color: var(--blue,   #6B9AEF); text-shadow: 0 0 60px rgba(107,154,239,0.40); }
      [data-composition-id="stat-pill-row"] .stat-pill.green  .stat-num { color: var(--green,  #7DD3A6); text-shadow: 0 0 60px rgba(125,211,166,0.40); }
      [data-composition-id="stat-pill-row"] .stat-label {
        margin-top: 10px;
        font-family: var(--mono, 'JetBrains Mono', ui-monospace, monospace);
        font-weight: 700;
        font-size: 30px;
        letter-spacing: 2px;
        color: var(--text, #F5F1EB);
        text-align: center;
      }
    </style>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      // Block timeline — entrances only. Host owns exit (transition handles it).
      window.__timelines = window.__timelines || {};
      (function () {
        var tl = gsap.timeline({ paused: true });
        tl.from("#spr-overline", { y: 20, opacity: 0, duration: 0.5, ease: "power2.out" },     0.0);
        tl.from("#spr-headline", { y: 30, opacity: 0, duration: 0.6, ease: "power3.out" },     0.3);
        tl.from("#spr-pill-1",   { scale: 0.85, opacity: 0, duration: 0.6, ease: "back.out(1.6)" }, 0.9);
        tl.from("#spr-pill-2",   { scale: 0.85, opacity: 0, duration: 0.6, ease: "back.out(1.6)" }, 1.4);
        window.__timelines["stat-pill-row"] = tl;
      })();
    </script>

  </div>
</template>
