<template id="scene-15-cta-template">
  <div data-composition-id="scene-15-cta"
       data-start="0"
       data-width="1920"
       data-height="1080"
       style="position:absolute; inset:0; overflow:hidden;
              font-family:var(--sans); color:var(--ink);">

    <style>
      #s15-content {
        width:100%; height:100%;
        padding: 96px;
        display:flex; flex-direction:column;
        align-items:center; justify-content:center;
        text-align:center; gap: 36px;
        box-sizing:border-box;
      }
      #s15-kicker {
        display:inline-block;
        padding: 12px 28px;
        border: 1px solid var(--rule-2);
        border-radius: 999px;
        font-family: var(--mono);
        font-size: 22px;
        letter-spacing: .22em;
        text-transform: uppercase;
        color: var(--ink-2);
        background: rgba(255,255,255,.025);
      }
      #s15-headline {
        font-family: var(--serif);
        font-weight: 500;
        font-size: 84px;
        line-height: 1.05;
        letter-spacing: -.02em;
        color: var(--ink);
        max-width: 1640px;
      }
      #s15-headline em { color: var(--accent); font-style: italic; }
      #s15-foot {
        font-family: var(--mono);
        font-size: 26px;
        letter-spacing: .18em;
        text-transform: uppercase;
        color: var(--ink-3);
      }
      #s15-foot .accent { color: var(--accent); }
    </style>

    <div id="s15-content">
      <div id="s15-kicker" >COMMENT · SUBSCRIBE · MORE LIKE THIS</div>
      <h1 id="s15-headline">Want more agentic-coding videos?<br/><em>Subscribe</em> and drop your side in the comments.</h1>
      <div id="s15-foot">REACT &nbsp;OR &nbsp;HTML &nbsp;·&nbsp; LINKS &nbsp;<span class="accent">↓</span></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({ paused: true, defaults: { ease: "power3.out" } });

      tl.set("#s15-kicker",   { y: 16, opacity: 0 }, 0);
      tl.set("#s15-headline", { y: 30, opacity: 0 }, 0);
      tl.set("#s15-foot",     { opacity: 0 }, 0);

      tl.to("#s15-kicker",   { y: 0, opacity: 1, duration: 0.5 }, 0.2);
      tl.to("#s15-headline", { y: 0, opacity: 1, duration: 0.7 }, 0.5);
      tl.to("#s15-foot",     { opacity: 1, duration: 0.5 }, 1.4);

      // Mid-beats — headline em pulse, foot arrow bounce, kicker shimmer (extended for 22s slot)
      tl.to("#s15-headline em", { color: "#00e5d4", duration: 1.0, ease: "sine.inOut", yoyo: true, repeat: 13 }, 2.0);
      tl.to("#s15-foot .accent", { y: 6, scale: 1.2, duration: 0.7, ease: "sine.inOut", yoyo: true, repeat: 22 }, 2.0);
      tl.to("#s15-kicker", { letterSpacing: ".26em", boxShadow: "0 0 36px rgba(196,255,62,.3)", duration: 1.4, ease: "sine.inOut", yoyo: true, repeat: 8 }, 1.5);
      tl.to("#s15-headline", { scale: 1.015, duration: 1.6, ease: "sine.inOut", yoyo: true, repeat: 6 }, 5.0);

      window.__timelines["scene-15-cta"] = tl;
    </script>
  </div>
</template>
