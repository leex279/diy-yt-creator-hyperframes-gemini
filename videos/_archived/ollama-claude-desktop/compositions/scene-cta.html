<!--
  scene-cta.html — Closing CTA. Holds 21s while the narrator delivers
  the docs URL and the Dynamous insider outro. The trailing 5s are
  covered by the Dynamous endcard composition mounted at root.
-->
<template id="scene-cta-template">
  <div data-composition-id="scene-cta"
       data-start="0"
       data-width="1080"
       data-height="1920"
       style="position:absolute; inset:0; overflow:hidden;">

    <style>
      #scene-cta-content {
        width:100%; height:100%;
        padding: var(--pad-top) var(--pad-x) var(--pad-bottom);
        display:flex; flex-direction:column;
        align-items:center; justify-content:center;
        text-align:center; gap:32px;
        box-sizing:border-box;
      }
      #scene-cta-content .kicker {
        font-family: var(--mono);
        font-weight: 700;
        font-size: 30px;
        letter-spacing: 5px;
        text-transform: uppercase;
        color: var(--accent-deep);
      }
      #scene-cta-content .lede {
        font-family: var(--serif);
        font-style: italic;
        font-weight: 400;
        font-size: 48px;
        line-height: 1.2;
        color: var(--text);
      }
      #scene-cta-content .url {
        font-family: var(--mono);
        font-weight: 700;
        font-size: 52px;
        letter-spacing: 0.5px;
        color: var(--text-on-warm);
        line-height: 1.0;
        padding: 26px 40px;
        border-radius: 22px;
        background: var(--accent-warm);
        box-shadow: 0 14px 36px rgba(224, 122, 95, 0.35);
        max-width: 940px;
      }
      #scene-cta-content .subscribe {
        display: inline-flex;
        align-items: center;
        gap: 16px;
        padding: 20px 38px;
        border-radius: 999px;
        background: var(--bg-card);
        border: 2px solid var(--accent-deep);
        font-family: var(--sans);
        font-weight: 700;
        font-size: 38px;
        color: var(--accent-deep);
        letter-spacing: 0.5px;
        box-shadow: var(--shadow-warm);
      }
      #scene-cta-content .subscribe .arrow {
        color: var(--accent-warm);
        font-family: var(--sans);
        font-weight: 400;
        font-size: 48px;
        line-height: 0.7;
      }
    </style>

    <div id="scene-cta-content">
      <div class="kicker"    id="cta-kicker">Full Setup</div>
      <div class="lede"      id="cta-lede">Walkthrough at &mdash;</div>
      <div class="url"       id="cta-url">docs.ollama.com</div>
      <div class="subscribe" id="cta-subscribe">Subscribe<span class="arrow">&rarr;</span></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({ paused: true });

      // Hidden-until-reveal pattern (set + to).
      tl.set("#cta-kicker",    { y: 16, opacity: 0 }, 0);
      tl.set("#cta-lede",      { y: 20, opacity: 0 }, 0);
      tl.set("#cta-url",       { scale: 0.85, opacity: 0 }, 0);
      tl.set("#cta-subscribe", { y: 24, opacity: 0 }, 0);

      tl.to("#cta-kicker",    { y: 0, opacity: 1, duration: 0.5, ease: "power2.out" }, 0);
      tl.to("#cta-lede",      { y: 0, opacity: 1, duration: 0.6, ease: "power3.out" }, 0.3);
      tl.to("#cta-url",       { scale: 1, opacity: 1, duration: 0.7, ease: "expo.out" }, 0.7);
      tl.to("#cta-subscribe", { y: 0, opacity: 1, duration: 0.5, ease: "power2.out" }, 1.5);

      tl.to("#cta-url", { scale: 1.03, duration: 0.5, ease: "power2.inOut", yoyo: true, repeat: 1 }, 4);
      tl.to("#cta-subscribe .arrow", { x: 8, duration: 0.4, ease: "power2.out", yoyo: true, repeat: 1 }, 6.5);
      tl.to("#cta-url", { scale: 1.04, duration: 0.5, ease: "power2.out", yoyo: true, repeat: 1 }, 9);
      tl.to("#cta-subscribe", { scale: 1.04, duration: 0.5, ease: "power2.out", yoyo: true, repeat: 1 }, 11);
      tl.to("#cta-kicker", { letterSpacing: "8px", duration: 0.5, ease: "power2.inOut", yoyo: true, repeat: 1 }, 13.5);
      tl.to("#cta-url, #cta-subscribe", { scale: 1.025, duration: 0.5, ease: "power2.out", yoyo: true, repeat: 1 }, 16);
      tl.to("#cta-subscribe .arrow", { x: 10, duration: 0.4, ease: "power2.out", yoyo: true, repeat: 1 }, 18.5);

      window.__timelines["scene-cta"] = tl;
    </script>
  </div>
</template>
