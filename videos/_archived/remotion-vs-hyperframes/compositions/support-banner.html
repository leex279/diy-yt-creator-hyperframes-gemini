    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({ paused: true });

      // ── Hide everything at t=0 ──
      tl.set('#sup-banner', { opacity: 0, y: 80, xPercent: -50 }, 0);
      tl.set('.sup-profile', { opacity: 0, scale: 0.4 }, 0);
      tl.set('.sup-headline', { opacity: 0, x: -28 }, 0);
      tl.set('.sup-tagline', { opacity: 0, x: -28 }, 0);
      tl.set('.sup-pill-join', { opacity: 0, y: 28, scale: 0.7 }, 0);
      tl.set('.sup-pill-thanks', { opacity: 0, y: 28, scale: 0.7 }, 0);
      tl.set('.sup-pill-coffee', { opacity: 0, y: 28, scale: 0.7 }, 0);
      tl.set('.sup-pill-join .sup-pill-icon', { scale: 1 }, 0);
      tl.set('.sup-pill-thanks .sup-pill-icon', { scale: 1 }, 0);
      tl.set('.sup-pill-coffee .sup-pill-icon', { scale: 1 }, 0);
      tl.set('.sup-bmc', { opacity: 0 }, 0);

      // ── Banner spring-in ──
      tl.to('#sup-banner', { opacity: 1, y: 0, duration: 0.55, ease: 'back.out(1.4)', overwrite: 'auto' }, 0);
      tl.to('.sup-profile', { opacity: 1, scale: 1, duration: 0.5, ease: 'back.out(1.6)', overwrite: 'auto' }, 0.27);
      tl.to('.sup-headline', { opacity: 1, x: 0, duration: 0.5, ease: 'power2.out', overwrite: 'auto' }, 0.47);
      tl.to('.sup-tagline', { opacity: 1, x: 0, duration: 0.5, ease: 'power2.out', overwrite: 'auto' }, 0.6);
      tl.to('.sup-pill-join',   { opacity: 1, y: 0, scale: 1, duration: 0.5, ease: 'back.out(1.4)', overwrite: 'auto' }, 0.87);
      tl.to('.sup-pill-thanks', { opacity: 1, y: 0, scale: 1, duration: 0.5, ease: 'back.out(1.4)', overwrite: 'auto' }, 1.20);
      tl.to('.sup-pill-coffee', { opacity: 1, y: 0, scale: 1, duration: 0.5, ease: 'back.out(1.4)', overwrite: 'auto' }, 1.53);

      // ── Idle icon pulse ──
      tl.fromTo('.sup-pill-join .sup-pill-icon', { scale: 1 },
        { scale: 1.06, duration: 1.3, ease: 'sine.inOut', yoyo: true, repeat: 3 }, 2.33);
      tl.fromTo('.sup-pill-thanks .sup-pill-icon', { scale: 1 },
        { scale: 1.06, duration: 1.3, ease: 'sine.inOut', yoyo: true, repeat: 3 }, 2.53);
      tl.fromTo('.sup-pill-coffee .sup-pill-icon', { scale: 1 },
        { scale: 1.06, duration: 1.3, ease: 'sine.inOut', yoyo: true, repeat: 3 }, 2.73);

      tl.to('.sup-bmc', { opacity: 1, duration: 0.5, ease: 'power2.out', overwrite: 'auto' }, 2.67);

      // ── Banner fly out ──
      tl.to('#sup-banner', { opacity: 0, y: 120, duration: 0.6, ease: 'back.in(1.0)', overwrite: 'auto' }, 7.0);

      window.__timelines["support-banner"] = tl;
    </script>
