<!--
  scene-quote-card.html — Line-by-line italic quote reveal + author chip.

  Two-line quote in italic serif-feel (using Montserrat italic 300 weight at
  large size — the deck doesn't actually load a serif). Each line enters on
  its own beat. Marker sweep under the key phrase as the second beat.
-->
<template id="scene-quote-card-template">
  <div data-composition-id="scene-quote-card"
       data-start="0"
       data-width="1080"
       data-height="1920"
       style="position:absolute; inset:0; overflow:hidden;
              font-family:'Montserrat', system-ui, sans-serif; color:var(--ink);">

    <style>
      #qc-content {
        width:100%; height:100%;
        padding: var(--pad-top) var(--pad-x) var(--pad-bottom);
        display:flex; flex-direction:column;
        align-items:flex-start; justify-content:center;
        gap: 32px;
        box-sizing:border-box;
        position: relative;
      }
      /* File-tree silhouette backdrop — ties the principle to the technical theme */
      #qc-tree-bg {
        position: absolute;
        inset: 220px 70px 200px 70px;
        z-index: 0;
        opacity: 0;
        pointer-events: none;
        font-family: 'JetBrains Mono', ui-monospace, monospace;
        font-size: 32px;
        font-weight: 500;
        line-height: 1.4;
        color: var(--accent-2);
        white-space: pre;
        letter-spacing: 0.02em;
      }
      #qc-tree-bg .dim { color: rgba(96, 165, 250, 0.45); }
      #qc-tree-bg .accent { color: var(--accent); }
      #qc-content .eyebrow {
        font-family: 'JetBrains Mono', ui-monospace, monospace;
        font-size: 32px;
        font-weight: 500;
        letter-spacing: 0.32em;
        text-transform: uppercase;
        color: var(--accent-2);
        display: inline-flex; align-items: center; gap: 18px;
      }
      #qc-content .eyebrow::before {
        content: ""; display: inline-block;
        width: 56px; height: 2px;
        background: var(--accent-2);
      }
      #qc-card {
        position: relative;
        padding: 56px 60px;
        background: rgba(15, 23, 42, 0.6);
        border: 1px solid rgba(96, 165, 250, 0.18);
        border-radius: 24px;
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        box-shadow: 0 16px 48px rgba(0, 0, 0, 0.5), 0 0 60px rgba(59, 130, 246, 0.12);
        max-width: 940px;
      }
      #qc-card .quote-mark {
        position: absolute;
        top: 12px; left: 24px;
        font-family: 'Montserrat', system-ui, sans-serif;
        font-weight: 800;
        font-size: 200px;
        color: var(--accent);
        opacity: 0.18;
        line-height: 0.7;
      }
      .qc-line {
        position: relative;
        font-family: 'Montserrat', system-ui, sans-serif;
        font-weight: 300;
        font-style: italic;
        font-size: 64px;
        line-height: 1.18;
        letter-spacing: -0.015em;
        color: var(--ink);
        margin-bottom: 12px;
      }
      .qc-line .accent {
        font-weight: 700;
        font-style: normal;
        color: var(--accent-2);
      }
      #qc-mark {
        position: absolute;
        left: 0; bottom: -6px;
        width: 0%;
        height: 5px;
        background: var(--accent-2);
        box-shadow: 0 0 16px rgba(96, 165, 250, 0.7);
        border-radius: 3px;
      }
      #qc-author {
        margin-top: 18px;
        display: inline-flex; align-items: center; gap: 14px;
        font-family: 'JetBrains Mono', ui-monospace, monospace;
        font-weight: 600;
        font-size: 28px;
        letter-spacing: 0.06em;
        color: var(--accent-2);
      }
      #qc-author .dot {
        width: 12px; height: 12px;
        border-radius: 50%;
        background: var(--accent);
        box-shadow: 0 0 14px rgba(59, 130, 246, 0.7);
      }
    </style>

    <div id="qc-content">
      <pre id="qc-tree-bg" aria-hidden="true"><span class="dim">repo/</span>
<span class="dim">├─</span> auth/
<span class="dim">│  ├─</span> <span class="accent">routes.ts</span>
<span class="dim">│  ├─</span> service.ts
<span class="dim">│  └─</span> tests/
<span class="dim">├─</span> billing/
<span class="dim">│  ├─</span> <span class="accent">routes.ts</span>
<span class="dim">│  ├─</span> service.ts
<span class="dim">│  └─</span> tests/
<span class="dim">├─</span> context/
<span class="dim">│  ├─</span> <span class="accent">global.md</span>
<span class="dim">│  ├─</span> on-demand/
<span class="dim">│  └─</span> tickets/
<span class="dim">└─</span> CLAUDE.md</pre>
      <div class="eyebrow" id="qc-eyebrow">THE PRINCIPLE</div>
      <div id="qc-card">
        <div class="quote-mark">&ldquo;</div>
        <div class="qc-line" id="qc-l1" style="position:relative;">
          The most precious resource isn&rsquo;t your <span class="accent">wallet</span>.
          <span id="qc-mark" style="position:absolute;"></span>
        </div>
        <div class="qc-line" id="qc-l2">
          It&rsquo;s the <span class="accent">context</span>. Protect it like a finite tank.
        </div>
        <div id="qc-author"><span class="dot"></span>FROM THE WORKSHOP</div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({ paused: true });

      tl.set("#qc-eyebrow", { y: 20, autoAlpha: 0 }, 0);
      tl.set("#qc-card",    { y: 30, autoAlpha: 0, scale: 0.97 }, 0);
      tl.set("#qc-tree-bg", { x: -20 }, 0);
      // File-tree backdrop fades in subtly under the card
      tl.to("#qc-tree-bg",  { opacity: 0.10, x: 0, duration: 1.4, ease: "power2.out" }, 0.1);
      tl.to("#qc-tree-bg",  { opacity: 0.16, duration: 1.6, ease: "sine.inOut", yoyo: true, repeat: 1 }, 2.4);
      tl.set("#qc-l1",      { y: 16, autoAlpha: 0 }, 0);
      tl.set("#qc-l2",      { y: 16, autoAlpha: 0 }, 0);
      tl.set("#qc-mark",    { width: "0%" }, 0);
      tl.set("#qc-author",  { y: 12, autoAlpha: 0 }, 0);

      tl.to("#qc-eyebrow", { y: 0, autoAlpha: 1, duration: 0.5, ease: "power2.out" }, 0.2);
      tl.to("#qc-card",    { y: 0, scale: 1, autoAlpha: 1, duration: 0.7, ease: "back.out(1.3)" }, 0.5);

      tl.to("#qc-l1",     { y: 0, autoAlpha: 1, duration: 0.55, ease: "power2.out" }, 1.2);
      tl.to("#qc-mark",   { width: "100%", duration: 0.55, ease: "power2.out" }, 2.4);
      tl.to("#qc-l2",     { y: 0, autoAlpha: 1, duration: 0.55, ease: "power2.out" }, 3.4);
      tl.to("#qc-author", { y: 0, autoAlpha: 1, duration: 0.45, ease: "power2.out" }, 4.6);

      tl.to("#qc-card", { scale: 1.015, duration: 1.0, ease: "sine.inOut", yoyo: true, repeat: 1 }, 5.8);

      tl.set({}, {}, 7);
      window.__timelines["scene-quote-card"] = tl;
    </script>
  </div>
</template>
