<!--
  scene-bullets.html — 3 icon+text rows (~8s).

  Pattern: section header → 3 rows, each with a circular icon badge
           (rotating accent) + bold title + subtitle. Different visual
           treatment from the numbered step cards used by anthropic.
  Self-contained sub-composition with paused timeline at
  window.__timelines["scene-bullets"].
-->
<template id="scene-bullets-template">
  <div data-composition-id="scene-bullets"
       data-start="0"
       data-width="1080"
       data-height="1920"
       style="position:absolute; inset:0; overflow:hidden;">

    <style>
      #scene-bullets-content {
        width:100%; height:100%;
        padding: var(--pad-top) var(--pad-x) var(--pad-bottom);
        display:flex; flex-direction:column;
        align-items:center; justify-content:center;
        text-align:left; gap:36px;
        box-sizing:border-box;
      }
      #scene-bullets-content .header {
        font-family: var(--serif);
        font-weight: 800;
        font-size: 100px;
        line-height: 1.05;
        letter-spacing: -2px;
        color: var(--accent-ink);
        text-align: center;
        max-width: 940px;
      }
      #scene-bullets-content .header .em {
        color: var(--accent-warm);
        font-style: italic;
      }
      #scene-bullets-content .row-list {
        display: flex; flex-direction: column;
        gap: 32px; width: 940px;
      }
      #scene-bullets-content .row {
        display: flex; align-items: center; gap: 32px;
        padding: 30px 34px;
        background: var(--bg-card);
        border: 2px solid var(--border-bright);
        border-radius: 26px;
      }
      #scene-bullets-content .icon {
        flex: 0 0 auto;
        width: 110px; height: 110px;
        border-radius: 50%;
        display: flex; align-items: center; justify-content: center;
        font-family: var(--mono);
        font-weight: 800;
        font-size: 56px;
        color: var(--text-on-warm);
        line-height: 1;
      }
      #scene-bullets-content .row.r1 .icon { background: var(--accent-warm); }
      #scene-bullets-content .row.r2 .icon { background: var(--accent-deep); color: var(--text-on-deep); }
      #scene-bullets-content .row.r3 .icon { background: var(--accent-sage); color: var(--accent-ink); }
      #scene-bullets-content .body { display:flex; flex-direction:column; gap: 6px; flex:1; }
      #scene-bullets-content .title {
        font-family: var(--mono);
        font-weight: 700;
        font-size: 52px;
        line-height: 1.05;
        color: var(--accent-ink);
      }
      #scene-bullets-content .sub {
        font-family: var(--serif);
        font-style: italic;
        font-weight: 500;
        font-size: 38px;
        line-height: 1.3;
        color: var(--text-secondary);
      }
    </style>

    <div id="scene-bullets-content">
      <div class="header" id="bullets-header">
        Three <span class="em">optional</span> folders.
      </div>
      <div class="row-list">
        <div class="row r1" id="bullets-r1">
          <div class="icon">S</div>
          <div class="body">
            <div class="title">scripts/</div>
            <div class="sub">Executable code — the agent runs it.</div>
          </div>
        </div>
        <div class="row r2" id="bullets-r2">
          <div class="icon">R</div>
          <div class="body">
            <div class="title">references/</div>
            <div class="sub">Docs — the agent reads them on demand.</div>
          </div>
        </div>
        <div class="row r3" id="bullets-r3">
          <div class="icon">A</div>
          <div class="body">
            <div class="title">assets/</div>
            <div class="sub">Templates, data, images the agent uses.</div>
          </div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({ paused: true });

      // Entrance: header at 0, each row reveals on narration anchor.
      // Per step-by-step-reveal.md: hidden until reveal, NOT tl.from().
      tl.from("#bullets-header", { y: 24, opacity: 0, duration: 0.6, ease: "power3.out" }, 0);

      // Hide rows from frame 0
      tl.set("#bullets-r1", { x: -40, opacity: 0 }, 0);
      tl.set("#bullets-r2", { x: -40, opacity: 0 }, 0);
      tl.set("#bullets-r3", { x: -40, opacity: 0 }, 0);

      // Reveal each row at its narration anchor (scene-relative)
      tl.to("#bullets-r1", { x: 0, opacity: 1, duration: 0.55, ease: "back.out(1.5)" }, 3.5);   // "scripts"
      tl.to("#bullets-r2", { x: 0, opacity: 1, duration: 0.55, ease: "back.out(1.5)" }, 7.3);   // "reference"
      tl.to("#bullets-r3", { x: 0, opacity: 1, duration: 0.55, ease: "back.out(1.5)" }, 12.4);  // "templates / assets"

      // Bridge the 5.1s narration gap between r2 (7.3) and r3 (12.4)
      // with an r1 icon emphasis pulse at ~10s — keeps screen alive during
      // narrator's "and the agent reads them on demand" beat.
      tl.to("#bullets-r2 .icon", { scale: 1.1, duration: 0.4, ease: "power2.out", yoyo: true, repeat: 1 }, 10);

      // Mid-beats keep rows alive after all 3 are in
      tl.to("#bullets-r3 .icon", { scale: 1.1, duration: 0.4, ease: "power2.out", yoyo: true, repeat: 1 }, 14);
      tl.to("#bullets-r1, #bullets-r2, #bullets-r3", { scale: 1.015, duration: 0.4, ease: "power2.out", yoyo: true, repeat: 1 }, 15.4);

      window.__timelines["scene-bullets"] = tl;
    </script>
  </div>
</template>
