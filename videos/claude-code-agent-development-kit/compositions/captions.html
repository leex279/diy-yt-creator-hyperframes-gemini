<!--
  captions.html — Captions sub-composition.

  Framework-required attributes (case-sensitive):
    data-timeline-role="captions"
    data-caption-root="true"

  Caption groups are populated by `npx hyperframes transcribe` from
  audio/narration.wav + transcript.json. Until then, the wrapper
  exists empty so the lint and the framework can resolve the captions
  composition reference.

  Operator workflow:
    1. Drop audio at videos/<slug>/audio/narration.wav
    2. Run: npx hyperframes transcribe videos/<slug>
    3. Caption groups are written into #caption-area below
-->
<template id="captions-template">
  <div data-composition-id="captions"
       data-start="0"
       data-timeline-role="captions"
       data-caption-root="true"
       data-width="1920"
       data-height="1080"
       style="position:absolute; inset:0; pointer-events:none;
              font-family:var(--sans); color:var(--text);">

    <style>
      #caption-area {
        position: absolute;
        left: 50%;
        bottom: 120px;
        transform: translateX(-50%);
        max-width: 1400px;
        text-align: center;
        font-family: var(--sans);
        font-weight: 700;
        font-size: 38px;
        line-height: 1.3;
        letter-spacing: -0.5px;
        color: var(--text);
        text-shadow: 0 2px 8px rgba(0, 0, 0, 0.85),
                     0 0 24px rgba(0, 0, 0, 0.6);
      }
    </style>

    <div id="caption-area">
      <!-- Caption groups appear here, populated by `npx hyperframes transcribe`.
           Each group is a <div class="clip" data-start="..." data-duration="..."
           data-track-index="9"> with the transcribed words inside. -->
    </div>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      window.__timelines = window.__timelines || {};
      window.__timelines["captions"] = gsap.timeline({ paused: true });
    </script>
  </div>
</template>
