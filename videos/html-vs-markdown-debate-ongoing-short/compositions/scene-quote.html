<!--
  scene-quote.html — Markdown camp pull-quote (17.5–32.0s, scene-rel 0–14.5s).
  Beats (transcript scene-rel = abs - 17.5):
    0.00  — "The Markdown camp came swinging"
    2.35  — "369 likes" badge
    4.36  — "Simplicity is the feature, not a bug." (pull quote)
    7.16  — "the structural one"
    9.19  — "Markdown was designed to compile to HTML"
   12.88  — "Not opposing formats." stamp
-->
<template id="scene-quote-template">
  <div data-composition-id="scene-quote"
       data-start="0"
       data-width="1080"
       data-height="1920"
       style="position:absolute; inset:0; overflow:hidden;
              font-family:'Source Serif 4', 'Playfair Display', Georgia, serif; color:var(--text);">

    <style>
      #sq-content {
        width: 100%; height: 100%;
        padding: var(--pad-top) var(--pad-x) var(--pad-bottom);
        position: relative;
        box-sizing: border-box;
        display: flex;
        flex-direction: column;
        justify-content: flex-start;
        gap: 28px;
      }
      .sq-overline {
        font-family: 'JetBrains Mono', ui-monospace, monospace;
        font-weight: 700;
        font-size: 28px;
        letter-spacing: 6px;
        text-transform: uppercase;
        color: var(--accent-2);
      }
      .sq-likes-badge {
        align-self: flex-start;
        font-family: 'JetBrains Mono', ui-monospace, monospace;
        font-weight: 800;
        font-size: 30px;
        letter-spacing: 3px;
        text-transform: uppercase;
        color: var(--accent-1);
        background: rgba(199, 90, 63, 0.10);
        border: 2px solid var(--accent-1);
        border-radius: 999px;
        padding: 12px 24px;
      }
      .sq-quote-card {
        background: var(--bg-card);
        border: 1px solid var(--border);
        border-radius: 24px;
        padding: 36px 40px;
        margin-top: 8px;
        box-shadow: 0 14px 32px rgba(28, 26, 24, 0.10);
      }
      .sq-quote-mark {
        font-family: 'Source Serif 4', 'Playfair Display', Georgia, serif;
        font-weight: 900;
        font-style: italic;
        font-size: 120px;
        line-height: 0.8;
        color: var(--accent-1);
        display: block;
        margin-bottom: -10px;
      }
      .sq-quote {
        font-family: 'Source Serif 4', 'Playfair Display', Georgia, serif;
        font-weight: 800;
        font-style: italic;
        font-size: 88px;
        line-height: 1.02;
        letter-spacing: -1px;
        color: var(--text);
      }
      .sq-quote .sq-em {
        color: var(--accent-1);
        font-style: italic;
      }
      .sq-sub-card {
        background: var(--bg-card);
        border: 1px solid var(--border-bright);
        border-radius: 18px;
        padding: 24px 28px;
        margin-top: 4px;
      }
      .sq-sub-label {
        font-family: 'JetBrains Mono', ui-monospace, monospace;
        font-weight: 700;
        font-size: 22px;
        letter-spacing: 4px;
        text-transform: uppercase;
        color: var(--accent-2);
        margin-bottom: 10px;
      }
      .sq-sub {
        font-family: 'Source Serif 4', 'Playfair Display', Georgia, serif;
        font-weight: 700;
        font-style: italic;
        font-size: 54px;
        line-height: 1.05;
        color: var(--text);
      }
      .sq-sub .sq-em {
        color: var(--accent-1);
        font-style: italic;
      }
      .sq-stamp {
        font-family: 'JetBrains Mono', ui-monospace, monospace;
        font-weight: 800;
        font-size: 40px;
        letter-spacing: 4px;
        text-transform: uppercase;
        color: var(--accent-1);
        background: rgba(199, 90, 63, 0.12);
        border: 2px solid var(--accent-1);
        border-radius: 14px;
        padding: 18px 28px;
        align-self: flex-start;
        margin-top: 4px;
      }
    </style>

    <div id="sq-content">
      <div class="sq-overline" id="sq-overline">MARKDOWN CAMP &middot; STRONGEST REPLIES</div>

      <div class="sq-likes-badge" id="sq-likes">&hearts; 369 likes</div>

      <div class="sq-quote-card" id="sq-quote-card">
        <span class="sq-quote-mark" id="sq-mark">&ldquo;</span>
        <div class="sq-quote" id="sq-quote">
          <span id="sq-q1">Simplicity is </span><span class="sq-em" id="sq-q-em">the feature,</span><br/><span id="sq-q2">not a bug.</span>
        </div>
      </div>

      <div class="sq-sub-card" id="sq-sub-card">
        <div class="sq-sub-label" id="sq-sub-label">STRUCTURAL REBUTTAL</div>
        <div class="sq-sub" id="sq-sub">
          Markdown was <span class="sq-em">designed</span> to compile to&nbsp;HTML.
        </div>
      </div>

      <div class="sq-stamp" id="sq-stamp">Not opposing formats</div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({ paused: true, defaults: { ease: "power3.out" } });

      tl.set("#sq-overline",   { y: -8, opacity: 0 }, 0);
      tl.set("#sq-likes",      { scale: 0.6, opacity: 0 }, 0);
      tl.set("#sq-quote-card", { y: 24, opacity: 0, scale: 0.94 }, 0);
      tl.set("#sq-mark",       { opacity: 0, scale: 0.5 }, 0);
      tl.set("#sq-q1",         { y: 16, opacity: 0 }, 0);
      tl.set("#sq-q-em",       { y: 24, opacity: 0, scale: 0.85, filter: "blur(15px)" }, 0);
      tl.set("#sq-q2",         { y: 16, opacity: 0 }, 0);
      tl.set("#sq-sub-card",   { y: 24, opacity: 0 }, 0);
      tl.set("#sq-sub-label",  { y: 8, opacity: 0 }, 0);
      tl.set("#sq-sub",        { y: 16, opacity: 0 }, 0);
      tl.set("#sq-stamp",      { scale: 0.5, opacity: 0, filter: "blur(20px)" }, 0);

      tl.to("#sq-overline", { y: 0, opacity: 1, duration: 0.4 }, 0.10);

      // 369 likes badge enters first as the receipt
      tl.to("#sq-likes",      { scale: 1, opacity: 1, duration: 0.5, ease: "back.out(1.6)" }, 2.35);

      // Quote card enters slightly ahead of the spoken quote
      tl.to("#sq-quote-card", { y: 0, opacity: 1, scale: 1, duration: 0.55 }, 3.80);
      tl.to("#sq-mark",       { opacity: 1, scale: 1, duration: 0.35, ease: "back.out(1.8)" }, 4.10);
      tl.to("#sq-q1",         { y: 0, opacity: 1, duration: 0.5 }, 4.36);
      tl.to("#sq-q-em",       { y: 0, opacity: 1, scale: 1, filter: "blur(0px)", duration: 0.6, ease: "back.out(1.5)" }, 4.85);
      tl.to("#sq-q2",         { y: 0, opacity: 1, duration: 0.5 }, 5.50);

      // Structural rebuttal card enters at "the structural one"
      tl.to("#sq-sub-card",  { y: 0, opacity: 1, duration: 0.55 }, 7.16);
      tl.to("#sq-sub-label", { y: 0, opacity: 1, duration: 0.4 }, 7.50);
      tl.to("#sq-sub",       { y: 0, opacity: 1, duration: 0.55 }, 9.19);

      // Stamp lands on "not opposing formats"
      tl.to("#sq-stamp", { scale: 1, opacity: 1, filter: "blur(0px)", duration: 0.55, ease: "back.out(1.6)" }, 12.88);
      tl.to("#sq-stamp", { x: -6, duration: 0.04, yoyo: true, repeat: 5 }, 13.18);
      tl.to("#sq-stamp", { scale: 1.04, duration: 0.3, yoyo: true, repeat: 1, ease: "power2.out" }, 13.60);

      window.__timelines["scene-quote"] = tl;
    </script>
  </div>
</template>
