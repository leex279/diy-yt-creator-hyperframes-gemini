<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Long-Form Anthropic Template — Demo</title>
<link rel="stylesheet" href="tokens/anthropic-dark.css">
<script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
<style>
  /* ──────────────────────────────────────────────────
     CANVAS — 1920x1080 Anthropic dark stage. Full design
     system in DESIGN.md. Edit values per video; keep families.
     ────────────────────────────────────────────────── */
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 1920px;
    height: 1080px;
    overflow: hidden;
    background: var(--bg);
    font-family: var(--sans);
    color: var(--text);
    -webkit-font-smoothing: antialiased;
  }

  /* Ambient — orange + purple radial wash, Anthropic palette */
  /* COMPONENT: shared/lib/components/ambient-radial/ (adapted) */
  #ambient {
    position: absolute;
    inset: -200px;
    background:
      radial-gradient(circle at 28% 22%, rgba(233, 116, 88, 0.10), transparent 55%),
      radial-gradient(circle at 76% 78%, rgba(167, 139, 250, 0.07), transparent 60%),
      radial-gradient(circle at 50% 100%, rgba(107, 154, 239, 0.05), transparent 50%);
    pointer-events: none;
    z-index: 0;
  }

  /* Shape backdrop — 14 deterministic Anthropic shapes at ~5% opacity */
  #shape-backdrop {
    position: absolute;
    inset: 0;
    pointer-events: none;
    overflow: hidden;
    z-index: 0;
  }
  #shape-backdrop img {
    position: absolute;
    opacity: 0.0425;
    object-fit: contain;
    pointer-events: none;
  }

  /* Film-grain overlay — fractal noise, breaks gradient banding */
  #noise-overlay {
    position: absolute;
    inset: 0;
    width: 1920px;
    height: 1080px;
    pointer-events: none;
    z-index: 8;
    opacity: 0.035;
    mix-blend-mode: overlay;
  }

  /* ──────────────────────────────────────────────────
     TOP CHROME — persistent Anthropic wordmark banner
     ────────────────────────────────────────────────── */
  /* COMPONENT: shared/lib/components/top-banner-wordmark/ */
  #top-banner {
    position: absolute;
    top: 30px;
    left: 0;
    width: 1920px;
    z-index: 10;
    pointer-events: none;
    filter: drop-shadow(0 4px 12px rgba(0, 0, 0, 0.5));
    text-align: center;
  }
  #top-banner-logo {
    height: 60px;
    width: auto;
    display: block;
    margin: 0 auto;
  }

  /* Slim progress bar — bottom edge, orange */
  /* COMPONENT: shared/lib/components/progress-bar/ */
  #progress-track {
    position: absolute;
    bottom: 0;
    left: 0;
    width: 1920px;
    height: 6px;
    background: rgba(245, 241, 235, 0.06);
    z-index: 10;
  }
  #progress-fill {
    width: 0;
    height: 100%;
    background: var(--accent-1);
    box-shadow: 0 0 12px rgba(233, 116, 88, 0.60);
  }

  /* Sub-composition scene wrappers.
     Initially invisible; root timeline crossfades them in/out.
     First scene (hook) starts visible. */
  .scene-wrapper {
    position: absolute;
    top: 0;
    left: 0;
    width: 1920px;
    height: 1080px;
    z-index: 1;
  }
  #scene-hook-wrap             { z-index: 1; opacity: 1; }
  #scene-list-cards-wrap       { z-index: 1; opacity: 0; visibility: hidden; }
  #scene-image-3d-reveal-wrap  { z-index: 1; opacity: 0; visibility: hidden; }
  #scene-stat-pill-row-wrap    { z-index: 1; opacity: 0; visibility: hidden; }
  #scene-side-by-side-wrap     { z-index: 1; opacity: 0; visibility: hidden; }
  #scene-quote-card-wrap       { z-index: 1; opacity: 0; visibility: hidden; }
  #scene-dynamous-midroll-wrap { z-index: 1; opacity: 0; visibility: hidden; }
  #scene-arch-stack-wrap       { z-index: 1; opacity: 0; visibility: hidden; }
  #scene-cta-wrap              { z-index: 1; opacity: 0; visibility: hidden; }

  /* Captions wrapper — above scenes, below noise overlay */
  #captions-wrap {
    position: absolute;
    inset: 0;
    z-index: 9;
    pointer-events: none;
  }
</style>
</head>
<body>
<div id="root"
     data-composition-id="main"
     data-start="0"
     data-duration="135"
     data-width="1920"
     data-height="1080">

  <!-- Ambient + shape backdrop — sit behind all scenes -->
  <div id="ambient"></div>
  <div id="shape-backdrop"></div>

  <!-- Persistent top banner. Anthropic wordmark (local copy — never reference shared/) -->
  <div id="top-banner">
    <img id="top-banner-logo" src="assets/anthropic-logo-light.svg" alt="Anthropic" />
  </div>

  <!-- Slim progress bar -->
  <div id="progress-track"><div id="progress-fill"></div></div>

  <!-- ═══════════════════════════════════════════════════════
       SCENE WRAPPERS
       Each wrapper points at an external sub-composition file.
       data-track-index="1" (scene layer); NO data-duration —
       the sub-comp's internal timeline owns its length.
       Scene timing (data-start, seconds) — demo defaults:
         0   → hook               (8s)
         8   → list-cards         (20s)
         28  → image-3d-reveal    (18s)
         46  → stat-pill-row      (14s)
         60  → side-by-side       (16s)
         76  → quote-card         (18s)
         94  → dynamous-midroll   (12s)  ← OPT-OUT per video
         106 → architecture-stack (12s)
         118 → cta                (17s)
       Total: 135s
       OPERATOR: update data-start values to match transcript word boundaries.
       ═══════════════════════════════════════════════════════ -->

  <div id="scene-hook-wrap" class="scene-wrapper"
       data-composition-id="scene-hook"
       data-composition-src="compositions/scene-hook.html"
       data-start="0"
       data-track-index="1"></div>

  <div id="scene-list-cards-wrap" class="scene-wrapper"
       data-composition-id="scene-list-cards"
       data-composition-src="compositions/scene-list-cards.html"
       data-start="8"
       data-track-index="1"></div>

  <div id="scene-image-3d-reveal-wrap" class="scene-wrapper"
       data-composition-id="scene-image-3d-reveal"
       data-composition-src="compositions/scene-image-3d-reveal.html"
       data-start="28"
       data-track-index="1"></div>

  <div id="scene-stat-pill-row-wrap" class="scene-wrapper"
       data-composition-id="scene-stat-pill-row"
       data-composition-src="compositions/scene-stat-pill-row.html"
       data-start="46"
       data-track-index="1"></div>

  <div id="scene-side-by-side-wrap" class="scene-wrapper"
       data-composition-id="scene-side-by-side"
       data-composition-src="compositions/scene-side-by-side.html"
       data-start="60"
       data-track-index="1"></div>

  <div id="scene-quote-card-wrap" class="scene-wrapper"
       data-composition-id="scene-quote-card"
       data-composition-src="compositions/scene-quote-card.html"
       data-start="76"
       data-track-index="1"></div>

  <!--
    Dynamous midroll — OPT-OUT per video.
    Remove this wrapper div (and its crossfadeScenes calls in the script)
    if not running a Dynamous promotion for this video.
  -->
  <div id="scene-dynamous-midroll-wrap" class="scene-wrapper"
       data-composition-id="scene-dynamous-midroll"
       data-composition-src="compositions/scene-dynamous-midroll.html"
       data-start="94"
       data-track-index="1"></div>

  <div id="scene-arch-stack-wrap" class="scene-wrapper"
       data-composition-id="scene-architecture-stack"
       data-composition-src="compositions/scene-architecture-stack.html"
       data-start="106"
       data-track-index="1"></div>

  <div id="scene-cta-wrap" class="scene-wrapper"
       data-composition-id="scene-cta"
       data-composition-src="compositions/scene-cta.html"
       data-start="118"
       data-track-index="1"></div>

  <!-- Captions sub-composition — populated by `npx hyperframes transcribe`.
       Sits on track 9, above scenes but below the noise overlay z-index. -->
  <div id="captions-wrap"
       data-composition-id="captions"
       data-composition-src="compositions/captions.html"
       data-start="0"
       data-track-index="9"></div>

  <!-- ═══════════════════════════════════════════════════════
       AUDIO BED — operator wires when narration + bg-music files are
       in audio/. Lint stays clean on the bare template.
       Uncomment and tune data-* values per video.

       Track 2: narration (single stem).
       Track 3: 3-segment bg-music (hook / body / cta). Volume caps per
                .claude/rules/audio-design.md. NEVER use class="clip" on audio.

  Narration:
    audio id="narration"
           src="audio/narration.wav"
           data-start="0"
           data-duration="135"
           data-track-index="2"
           data-volume="1"

  BG music — three files keyed by section mood:
    audio id="bg-music-hook"
           src="audio/bg-music-hook.mp3"
           data-start="0"
           data-duration="8"
           data-track-index="3"
           data-volume="0.12"

    audio id="bg-music-body"
           src="audio/bg-music-body.mp3"
           data-start="8"
           data-duration="110"
           data-track-index="3"
           data-volume="0.07"

    audio id="bg-music-cta"
           src="audio/bg-music-cta.mp3"
           data-start="118"
           data-duration="17"
           data-track-index="3"
           data-volume="0.12"

  Per-cue SFX (optional). One cinematic-whoosh per scene boundary.
  Track-index 4+ for SFX. Volume cap 0.25. Sync files first:
    bash scripts/sync-video-sfx.sh videos/<slug>

  Whoosh wiring template (one per scene boundary, data-start = scene data-start):
    audio id="sfx-whoosh-1"
           src="assets/sfx/cinematic-whoosh.mp3"
           data-start="8"
           data-duration="1.5"
           data-track-index="4"
           data-volume="0.11"
       ═══════════════════════════════════════════════════════ -->

  <!-- Film-grain overlay — last child so it tints everything below via blend mode -->
  <svg id="noise-overlay" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <filter id="noise-filter" x="0%" y="0%" width="100%" height="100%">
        <feTurbulence type="fractalNoise" baseFrequency="0.7" numOctaves="4" seed="42" stitchTiles="stitch" result="noise" />
        <feColorMatrix type="saturate" values="0" in="noise" result="monoNoise" />
      </filter>
    </defs>
    <rect width="100%" height="100%" filter="url(#noise-filter)" fill="white" />
  </svg>
</div>

<script>
  // ─────────────────────────────────────────────────────
  // Shape backdrop — deterministic seeded scatter of 14 Anthropic shapes.
  // No Math.random / Date.now — uses xmur3-style hash for determinism.
  // Tuned for 1920x1080 horizontal canvas.
  // ─────────────────────────────────────────────────────
  function seedHash(seed) {
    let h = 1779033703 ^ seed.length;
    for (let i = 0; i < seed.length; i++) {
      h = Math.imul(h ^ seed.charCodeAt(i), 3432918353);
      h = (h << 13) | (h >>> 19);
    }
    h = Math.imul(h ^ (h >>> 16), 2246822507);
    h = Math.imul(h ^ (h >>> 13), 3266489909);
    h ^= h >>> 16;
    return (h >>> 0) / 4294967296;
  }

  function spawnShapes(seedPrefix, container) {
    const shapes = ['assets/shapes/shape1.svg', 'assets/shapes/shape2.svg', 'assets/shapes/shape3.svg'];
    const count = 14, w = 1920, h = 1080, minSize = 200, sizeRange = 220;
    const minDist = 360, MAX_TRIES = 80;
    const placed = [];
    let attempt = 0;
    for (let i = 0; i < count; i++) {
      let best = null, bestScore = -1;
      for (let t = 0; t < MAX_TRIES; t++) {
        const seed = seedPrefix + '-' + i + '-' + attempt++;
        const size = minSize + seedHash(seed + '-size') * sizeRange;
        const cx = seedHash(seed + '-x') * (w - size * 0.4) + size * 0.2;
        const cy = seedHash(seed + '-y') * (h - size * 0.4) + size * 0.2;
        const rot = (seedHash(seed + '-rot') - 0.5) * 90;
        let nearest = Infinity;
        for (const p of placed) {
          const dx = cx - p.cx, dy = cy - p.cy;
          const d2 = dx * dx + dy * dy;
          if (d2 < nearest) nearest = d2;
        }
        if (nearest >= minDist * minDist) { best = { cx, cy, size, rot }; break; }
        if (nearest > bestScore) { bestScore = nearest; best = { cx, cy, size, rot }; }
      }
      placed.push(best);
      const img = document.createElement('img');
      img.src = shapes[i % shapes.length];
      img.style.cssText =
        'left:' + (best.cx - best.size / 2) + 'px;' +
        'top:' + (best.cy - best.size / 2) + 'px;' +
        'width:' + best.size + 'px;' +
        'height:' + best.size + 'px;';
      container.appendChild(img);
      gsap.set(img, { rotation: best.rot });
    }
  }

  // Subtle ambient drift — each shape gets a slow yoyo translate + rotation delta.
  // Finite repeat count for deterministic seek (renderer requirement).
  function animateShapeDrift(tl, container, seedPrefix, totalDuration) {
    const imgs = container.querySelectorAll('img');
    imgs.forEach((img, i) => {
      const seed = seedPrefix + '-drift-' + i;
      const dx = (seedHash(seed + '-dx') - 0.5) * 60;
      const dy = (seedHash(seed + '-dy') - 0.5) * 60;
      const dr = (seedHash(seed + '-dr') - 0.5) * 8;
      const dur = totalDuration / 10 + seedHash(seed + '-dur') * (totalDuration / 10);
      const repeatCount = Math.max(0, Math.floor(totalDuration / dur) - 1);
      tl.to(img, {
        x: dx, y: dy, rotation: '+=' + dr,
        duration: dur, ease: 'sine.inOut',
        yoyo: true, repeat: repeatCount
      }, 0);
    });
  }

  // Crossfade two scene wrappers at the root timeline level.
  // EFFECT: shared/lib/effects/phase-crossfade.js (adapted to long-form scene wrappers)
  // Total span: 1.1s. Both wrappers need explicit z-index so incoming paints on top.
  function crossfadeScenes(tl, fromSel, toSel, atTime) {
    tl.to(fromSel, { filter: "blur(20px)", scale: 1.04, duration: 0.5, ease: "power1.in" }, atTime);
    tl.to(fromSel, { opacity: 0, duration: 0.4, ease: "power1.in" }, atTime + 0.3);
    tl.set(fromSel, { visibility: "hidden" }, atTime + 0.7);
    tl.set(toSel,   { filter: "blur(20px)", scale: 0.97, opacity: 0, visibility: "visible" }, atTime + 0.4);
    tl.to(toSel,    { opacity: 1, duration: 0.3, ease: "power1.inOut", overwrite: "auto" }, atTime + 0.4);
    tl.to(toSel,    { filter: "blur(0px)", scale: 1, duration: 0.5, ease: "power1.out", overwrite: "auto" }, atTime + 0.6);
  }

  // ─────────────────────────────────────────────────────
  // Root timeline construction
  // ─────────────────────────────────────────────────────
  spawnShapes('anthropic-long-form', document.getElementById('shape-backdrop'));

  window.__timelines = window.__timelines || {};
  const TOTAL_DURATION = 135;
  const tl = gsap.timeline({ paused: true });

  // Ambient breath across full duration (slow sine yoyo — finite repeat)
  // Repeat count: Math.floor(TOTAL_DURATION / 30) — each yoyo half-cycle is 30s
  tl.fromTo("#ambient",
    { opacity: 0.85, scale: 1.0 },
    { opacity: 1.0, scale: 1.04, duration: 30, ease: "sine.inOut", yoyo: true, repeat: 4 },
    0);

  // Drift the shapes
  animateShapeDrift(tl, document.getElementById('shape-backdrop'), 'anthropic-long-form', TOTAL_DURATION);

  // Linear progress fill across the composition
  tl.fromTo("#progress-fill",
    { width: 0 },
    { width: 1920, duration: TOTAL_DURATION, ease: "none" },
    0);

  // Top banner fade-in — one-shot
  tl.from("#top-banner", { y: -16, opacity: 0, duration: 0.6, ease: "power2.out" }, 0.2);

  // ─── Scene labels ───────────────────────────────────────────────────────
  // OPERATOR: update time values when you retune data-start from transcript
  tl.addLabel("hook",              0)
    .addLabel("list-cards",        8)
    .addLabel("image-3d-reveal",   28)
    .addLabel("stat-pill-row",     46)
    .addLabel("side-by-side",      60)
    .addLabel("quote-card",        76)
    .addLabel("dynamous-midroll",  94)
    .addLabel("arch-stack",        106)
    .addLabel("cta",               118);

  // ─── Crossfades between adjacent scenes ─────────────────────────────────
  // Each crossfade fires ~0.4s before the next scene's data-start so the
  // incoming wrapper is already rising when the sub-comp starts playing.
  crossfadeScenes(tl, "#scene-hook-wrap",             "#scene-list-cards-wrap",       "list-cards-=0.4");
  crossfadeScenes(tl, "#scene-list-cards-wrap",       "#scene-image-3d-reveal-wrap",  "image-3d-reveal-=0.4");
  crossfadeScenes(tl, "#scene-image-3d-reveal-wrap",  "#scene-stat-pill-row-wrap",    "stat-pill-row-=0.4");
  crossfadeScenes(tl, "#scene-stat-pill-row-wrap",    "#scene-side-by-side-wrap",     "side-by-side-=0.4");
  crossfadeScenes(tl, "#scene-side-by-side-wrap",     "#scene-quote-card-wrap",       "quote-card-=0.4");
  crossfadeScenes(tl, "#scene-quote-card-wrap",       "#scene-dynamous-midroll-wrap", "dynamous-midroll-=0.4");
  crossfadeScenes(tl, "#scene-dynamous-midroll-wrap", "#scene-arch-stack-wrap",       "arch-stack-=0.4");
  crossfadeScenes(tl, "#scene-arch-stack-wrap",       "#scene-cta-wrap",              "cta-=0.4");

  // Pad timeline to the full composition duration so the renderer captures
  // the trailing static frames of the last scene (hyperframes-pitfalls.md §1).
  tl.set({}, {}, TOTAL_DURATION);

  window.__timelines["main"] = tl;
</script>
</body>
</html>
