<!--
  scene-cta.html — Closing CTA archetype (Anthropic long-form).

  Re-skin with Anthropic orange dominant, warm-off-white text, warm pill chrome.

  3-phase content (sequential reveals):
    1. Debate question at t=0 (expo.out rise) — MANDATORY per engagement-cta.md
    2. Comment + subscribe pills at t=2.0 (back.out)
    3. Optional next-video card at t=4.5 (finite pulse on subscribe)

  HARD RULE: subscribe pulse uses FINITE repeat (yoyo:true, repeat:N) — never repeat:-1.
  MANDATORY: #cta-question carries the debate-sparking question per engagement-cta.md.
    - Must be binary/short-list answerable, polarizing, reference a specific video claim.
    - Wording MUST match final spoken line of scripts/full-script.md AND youtube-description.md.
    - Banned: "What do you think?", "Let me know in the comments", etc.
    - Placeholder below must be replaced — it is impossible to miss (all caps).
-->
<template id="scene-cta-template">
  <div data-composition-id="scene-cta"
       data-start="0"
       data-width="1920"
       data-height="1080"
       style="position:absolute; inset:0; overflow:hidden;
              font-family:var(--sans); color:var(--text);">

    <style>
      #scene-cta-content {
        width: 100%; height: 100%;
        padding: var(--pad-top) var(--pad-x) var(--pad-bottom);
        display: flex; flex-direction: column;
        align-items: center; justify-content: center;
        gap: 44px;
        box-sizing: border-box;
      }
      /* MANDATORY — debate-sparking CTA question.
         Must be replaced per video. Wording must match script and description. */
      #cta-question {
        font-family: var(--sans);
        font-weight: 900;
        font-size: 72px;
        line-height: 1.05;
        letter-spacing: -2px;
        color: var(--text);
        text-align: center;
        max-width: 1500px;
      }
      #cta-question .accent { color: var(--accent-1); }
      .cta-pills {
        display: flex; flex-direction: row;
        align-items: center; justify-content: center;
        gap: 24px;
      }
      .cta-pill-item {
        padding: 20px 36px;
        border-radius: 999px;
        background: var(--bg-surface);
        border: 1.5px solid var(--border-bright);
        font-family: var(--mono);
        font-weight: 700;
        font-size: 26px;
        letter-spacing: 2px;
        color: var(--text);
        display: inline-flex; align-items: center;
        gap: 14px;
      }
      .cta-pill-item.comment .icon { color: var(--accent-2); }
      .cta-pill-item.subscribe {
        background: linear-gradient(135deg,
          rgba(233, 116, 88, 0.22) 0%,
          rgba(233, 116, 88, 0.07) 100%);
        border-color: rgba(233, 116, 88, 0.55);
      }
      .cta-pill-item.subscribe .arrow {
        color: var(--accent-1);
        font-weight: 900;
        font-size: 30px;
      }
      #cta-next-card {
        width: 540px;
        height: 304px;
        border-radius: 20px;
        border: 2px solid var(--border-bright);
        overflow: hidden;
        box-shadow: 0 24px 60px rgba(0, 0, 0, 0.55);
        position: relative;
        background: var(--bg-card);
      }
      #cta-next-card .nx-meta {
        position: absolute;
        bottom: 0; left: 0; right: 0;
        padding: 14px 20px;
        background: linear-gradient(180deg, rgba(0,0,0,0) 0%, rgba(0,0,0,0.70) 100%);
        font-family: var(--mono);
        font-weight: 700;
        font-size: 18px;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        color: var(--text);
      }
    </style>

    <div id="scene-cta-content">
      <!--
        MANDATORY: replace with the debate-sparking question for this video.
        Per .claude/rules/engagement-cta.md: must be polarizing, binary-answerable,
        reference a specific claim from the video, low-cost to answer.
        Wording MUST match final spoken line of full-script.md.
      -->
      <div id="cta-question">
        <REPLACE: debate-sparking question here>
      </div>

      <div class="cta-pills">
        <div class="cta-pill-item comment" id="cta-comment">
          <span class="icon">&#x270F;</span>
          <span>Drop your take below</span>
        </div>
        <div class="cta-pill-item subscribe" id="cta-subscribe">
          <span>Subscribe</span>
          <span class="arrow">&rarr;</span>
        </div>
      </div>

      <div id="cta-next-card">
        <!--
          OPERATOR: wire next-video thumbnail once you have it.
          Add an img element here:
            img src="assets/screenshots/next-video-thumbnail.png" alt="Next video"
              style="display:block; width:100%; height:100%; object-fit:cover;"
        -->
        <div class="nx-meta">Watch next &middot; Replace per video</div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      window.__timelines = window.__timelines || {};
      const SCENE_DURATION = 17;

      const tl = gsap.timeline({
        paused: true,
        defaults: { ease: "power3.out", duration: 0.6 }
      });

      // Debate question — expo.out at t=0
      tl.from("#cta-question",   { y: 40, opacity: 0, duration: 0.7, ease: "expo.out", immediateRender: false }, 0);

      // Pills — back.out at t=2.0
      tl.from("#cta-comment",    { y: 24, opacity: 0, duration: 0.5, ease: "back.out(1.4)", immediateRender: false }, 2.0);
      tl.from("#cta-subscribe",  { y: 24, opacity: 0, duration: 0.5, ease: "back.out(1.4)", immediateRender: false }, 2.3);

      // Next-video card — fade + rise at t=4.5
      tl.from("#cta-next-card",  { y: 30, scale: 0.95, opacity: 0, duration: 0.6, ease: "power3.out", immediateRender: false }, 4.5);

      // Subscribe pulse — finite yoyo border glow (4 ticks ≈ 4s)
      tl.to("#cta-subscribe", {
        boxShadow: "0 0 0 6px rgba(233, 116, 88, 0.30)",
        duration: 0.5,
        ease: "sine.inOut",
        yoyo: true,
        repeat: 4,
        immediateRender: false
      }, 4.5);

      // Pin timeline
      tl.set({}, {}, SCENE_DURATION);

      window.__timelines["scene-cta"] = tl;
    </script>
  </div>
</template>
