<!--
  scene-video-embed.html — Animated wrapper around an embedded video element.

  HARD RULE: never animate the video element directly — wrapper only.
  The video element itself does NOT take class="clip"; the wrapper div
  takes it. The audio track is a separate audio element with a
  DIFFERENT src filename than the video (e.g. demo-audio.mp3 extracted
  via ffmpeg from the .mp4) — pointing both at the same source produces
  a duplicate-media warning.

  Operator drops their MP4 at assets/clips/demo.mp4. Until then, the
  scene shows a placeholder slate.
-->
<template id="scene-video-embed-template">
  <div data-composition-id="scene-video-embed"
       data-start="0"
       data-width="1920"
       data-height="1080"
       style="position:absolute; inset:0; overflow:hidden;
              font-family:var(--sans); color:var(--text);">

    <style>
      #scene-video-embed-content {
        width:100%; height:100%;
        padding: var(--pad-top) var(--pad-x) var(--pad-bottom);
        display:flex; flex-direction:column;
        align-items:center; justify-content:center;
        gap: 28px;
        box-sizing:border-box;
      }
      #scene-video-embed-content .header-block {
        display:flex; flex-direction:column;
        align-items:center; gap:12px;
        text-align:center;
      }
      #scene-video-embed-content .overline {
        font-family: var(--mono);
        font-weight: 700;
        font-size: 26px;
        letter-spacing: 6px;
        text-transform: uppercase;
        color: var(--accent-2);
      }
      #scene-video-embed-content .caption {
        font-family: var(--sans);
        font-weight: 800;
        font-size: 48px;
        line-height: 1.05;
        letter-spacing: -0.5px;
        color: var(--text);
      }
      #video-frame-wrapper {
        width: 1500px;
        padding: 36px 48px;
        border-radius: 24px;
        border: 2px solid var(--border-bright);
        box-shadow: 0 32px 80px rgba(0, 0, 0, 0.7);
        overflow: hidden;
        position: relative;
        background: linear-gradient(135deg, rgba(6,182,212,0.06), rgba(139,92,246,0.04));
        display: flex; flex-direction: column;
        gap: 14px;
      }
      .dt-row {
        display: grid;
        grid-template-columns: 60px 1fr 220px;
        align-items: center;
        gap: 18px;
        padding: 14px 18px;
        border-radius: 12px;
        background: rgba(255,255,255,0.03);
        border-left: 4px solid var(--accent-1);
      }
      .dt-row.r1 { border-left-color: var(--accent-1); }
      .dt-row.r2 { border-left-color: var(--accent-2); }
      .dt-row.r3 { border-left-color: var(--accent-warn); }
      .dt-row.r4 { border-left-color: var(--accent-4); }
      .dt-row.r5 { border-left-color: var(--accent-3); }
      .dt-num {
        font-family: var(--mono); font-weight: 800;
        font-size: 24px; letter-spacing: 2px;
        color: var(--text-secondary);
      }
      .dt-q {
        font-family: var(--sans); font-weight: 600;
        font-size: 26px; line-height: 1.25;
        color: var(--text);
      }
      .dt-a {
        font-family: var(--mono); font-weight: 800;
        font-size: 22px; letter-spacing: 3px;
        text-transform: uppercase; text-align: right;
      }
      .dt-row.r1 .dt-a { color: var(--accent-1); }
      .dt-row.r2 .dt-a { color: var(--accent-2); }
      .dt-row.r3 .dt-a { color: var(--accent-warn); }
      .dt-row.r4 .dt-a { color: var(--accent-4); }
      .dt-row.r5 .dt-a { color: var(--accent-3); }
    </style>

    <div id="scene-video-embed-content">
      <div class="header-block">
        <div class="overline" id="vembed-overline">DECISION TREE &middot; PICK THE FIRST YES</div>
        <div class="caption"  id="vembed-caption">5 questions. Right layer every time.</div>
      </div>

      <div id="video-frame-wrapper">
        <div class="dt-row r1" id="dt-row-1">
          <div class="dt-num">Q1</div>
          <div class="dt-q">Should this load on every request?</div>
          <div class="dt-a">CLAUDE.md</div>
        </div>
        <div class="dt-row r2" id="dt-row-2">
          <div class="dt-num">Q2</div>
          <div class="dt-q">Does it connect to an external system?</div>
          <div class="dt-a">MCP &middot; sidebar</div>
        </div>
        <div class="dt-row r3" id="dt-row-3">
          <div class="dt-num">Q3</div>
          <div class="dt-q">Must it run deterministically at a lifecycle event?</div>
          <div class="dt-a">HOOK</div>
        </div>
        <div class="dt-row r4" id="dt-row-4">
          <div class="dt-num">Q4</div>
          <div class="dt-q">Needs its own context, model, or permission scope?</div>
          <div class="dt-a">SUBAGENT</div>
        </div>
        <div class="dt-row r5" id="dt-row-5">
          <div class="dt-num">Q5</div>
          <div class="dt-q">None of the above?</div>
          <div class="dt-a">SKILL</div>
        </div>
      </div>
    </div>

    <!-- Operator wires the video element when assets/clips/demo.mp4 is
         in place. Snippet and full instructions live in README.md under
         "Embedded video — bringing the audio in". -->

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({
        paused: true,
        defaults: { ease: "power3.out", duration: 0.6 }
      });

      tl.from("#vembed-overline",       { y: 20, opacity: 0, duration: 0.5, ease: "power2.out", immediateRender: false }, 0);
      tl.from("#vembed-caption",        { y: 30, opacity: 0, duration: 0.6, ease: "power3.out", immediateRender: false }, 0.3);
      tl.from("#video-frame-wrapper",   { scale: 0.96, opacity: 0, duration: 0.6, ease: "power3.out", immediateRender: false }, 0.7);
      tl.from(["#dt-row-1","#dt-row-2","#dt-row-3","#dt-row-4","#dt-row-5"],
              { x: -30, opacity: 0, duration: 0.4, ease: "power2.out", stagger: 0.7, immediateRender: false },
              1.2);

      window.__timelines["scene-video-embed"] = tl;
    </script>
  </div>
</template>
