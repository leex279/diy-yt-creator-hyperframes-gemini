<!--
  scene-code-block.html — macOS-chromed code window with syntax color (~13s).

  Pattern: kicker → window with traffic lights + filename → 5 lines of
           syntax-highlighted code (lines stagger in line-by-line) →
           output line → caption.
  Self-contained sub-composition with paused timeline at
  window.__timelines["scene-code-block"].
-->
<template id="scene-code-block-template">
  <div data-composition-id="scene-code-block"
       data-start="0"
       data-width="1080"
       data-height="1920"
       style="position:absolute; inset:0; overflow:hidden;">

    <style>
      #scene-code-block-content {
        width:100%; height:100%;
        padding: var(--pad-top) var(--pad-x) var(--pad-bottom);
        display:flex; flex-direction:column;
        align-items:center; justify-content:center;
        text-align:center; gap:32px;
        box-sizing:border-box;
      }
      #scene-code-block-content .kicker {
        font-family: 'JetBrains Mono', ui-monospace, monospace;
        font-weight: 700;
        font-size: 30px;
        letter-spacing: 5px;
        text-transform: uppercase;
        color: var(--accent-deep);
      }
      #scene-code-block-content .window {
        width: 940px;
        background: #1e1e1e;
        border-radius: 16px;
        overflow: hidden;
        box-shadow: var(--shadow-warm);
        border: 1px solid #2a2d31;
        text-align: left;
      }
      #scene-code-block-content .titlebar {
        display: flex; align-items: center;
        gap: 10px;
        padding: 16px 20px;
        background: rgba(255, 255, 255, 0.06);
        border-bottom: 1px solid rgba(255, 255, 255, 0.10);
      }
      #scene-code-block-content .dot {
        width: 14px; height: 14px; border-radius: 50%;
      }
      #scene-code-block-content .dot.r { background: #FF5F57; }
      #scene-code-block-content .dot.y { background: #FEBC2E; }
      #scene-code-block-content .dot.g { background: #28C840; }
      #scene-code-block-content .filename {
        margin-left: 18px;
        font-family: 'JetBrains Mono', ui-monospace, monospace;
        font-weight: 600;
        font-size: 22px;
        color: rgba(255, 255, 255, 0.55);
      }
      #scene-code-block-content .body {
        padding: 28px 36px;
      }
      #scene-code-block-content .line {
        font-family: 'JetBrains Mono', ui-monospace, monospace;
        font-weight: 500;
        font-size: 32px;
        line-height: 1.5;
        color: rgba(255, 255, 255, 0.90);
        white-space: pre;
      }
      /* Syntax tokens */
      #scene-code-block-content .kw  { color: var(--accent-rose); }
      #scene-code-block-content .fn  { color: var(--accent-gold); }
      #scene-code-block-content .str { color: var(--accent-sage); }
      #scene-code-block-content .num { color: var(--accent-warm); }
      #scene-code-block-content .com { color: rgba(255, 255, 255, 0.40); font-style: italic; }
      #scene-code-block-content .out {
        margin-top: 14px;
        padding-top: 14px;
        border-top: 1px dashed rgba(255, 255, 255, 0.15);
        color: var(--accent-sage);
        font-style: italic;
      }
      #scene-code-block-content .footnote {
        font-family: 'Source Serif 4', Georgia, serif;
        font-style: italic;
        font-weight: 400;
        font-size: 32px;
        color: var(--text-secondary);
      }
    </style>

    <div id="scene-code-block-content">
      <div class="kicker" id="cb-kicker">Give it to your agent</div>
      <div class="window" id="cb-window">
        <div class="titlebar">
          <span class="dot r"></span>
          <span class="dot y"></span>
          <span class="dot g"></span>
          <span class="filename">~/your-project &mdash; bash</span>
        </div>
        <div class="body">
          <div class="line" id="cb-l1"><span class="com"># 1 &mdash; install the CLI</span></div>
          <div class="line" id="cb-l2"><span class="kw">$</span> npm install -g <span class="str">@ast-grep/cli</span></div>
          <div class="line" id="cb-l3"><span class="com"># 2 &mdash; install the agent skill</span></div>
          <div class="line" id="cb-l4"><span class="kw">$</span> npx skills add <span class="str">ast-grep/agent-skill</span></div>
          <div class="line out" id="cb-l5">&rarr; restart Claude Code &middot; ready</div>
        </div>
      </div>
      <div class="footnote" id="cb-footnote">Then tell it: <em>use ast-grep to find.</em></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({ paused: true });

      tl.from("#cb-kicker",  { y: 16, opacity: 0, duration: 0.5, ease: "power2.out" }, 0);
      tl.from("#cb-window",  { y: 30, scale: 0.96, opacity: 0, duration: 0.6, ease: "back.out(1.4)" }, 0.3);
      // Lines stagger in — narration-paced (~3s per command pair over ~17s phase)
      tl.from("#cb-l1", { x: -20, opacity: 0, duration: 0.4, ease: "power2.out" }, 1.2);
      tl.from("#cb-l2", { x: -20, opacity: 0, duration: 0.4, ease: "power2.out" }, 1.6);
      tl.from("#cb-l3", { x: -20, opacity: 0, duration: 0.4, ease: "power2.out" }, 5.8);
      tl.from("#cb-l4", { x: -20, opacity: 0, duration: 0.4, ease: "power2.out" }, 6.2);
      tl.from("#cb-l5", { y: 14, opacity: 0, duration: 0.5, ease: "power2.out" }, 11.5);
      tl.from("#cb-footnote",{ y: 16, opacity: 0, duration: 0.5, ease: "power2.out" }, 12.0);

      // Mid-beats — emphasize each command's package name as it lands
      tl.to("#cb-l2 .str",  { scale: 1.1, duration: 0.4, ease: "back.out(2)", yoyo: true, repeat: 1, transformOrigin: "left center" }, 3.0);
      tl.to("#cb-l4 .str",  { scale: 1.1, duration: 0.4, ease: "back.out(2)", yoyo: true, repeat: 1, transformOrigin: "left center" }, 9.0);
      tl.to("#cb-l5",       { color: "var(--accent-gold)", scale: 1.04, duration: 0.5, ease: "power2.out", yoyo: true, repeat: 1 }, 13.5);
      tl.to("#cb-footnote", { scale: 1.04, color: "var(--accent-warm)", duration: 0.5, ease: "power2.out", yoyo: true, repeat: 1 }, 15.0);
      // Tail-extend so the sub-comp timeline duration matches the visible window in the root
      tl.set({}, {}, 17.1);


      window.__timelines["scene-code-block"] = tl;
    </script>
  </div>
</template>
