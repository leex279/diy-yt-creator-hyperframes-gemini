<!--
  scene-list-reveal.html — Enumerated list, step-by-step reveal (Shorts).

  Step-by-step reveal per .claude/rules/step-by-step-reveal.md — each row
  enters ~4.5s apart, paced for Cole-voice narration on the 6 strategies.
  Numbered chip + label + descriptor. Marker sweep under the active row.

  Default 6 rows / 28s — operator can shrink to 4-5 rows for shorter scenes.
  Sizing for vertical: row label 52px, descriptor 32px (above shorts mins).
-->
<template id="scene-list-reveal-template">
  <div data-composition-id="scene-list-reveal"
       data-start="0"
       data-width="1080"
       data-height="1920"
       style="position:absolute; inset:0; overflow:hidden;
              font-family:'Montserrat', system-ui, sans-serif; color:var(--ink);">

    <style>
      #lr-content {
        width:100%; height:100%;
        padding: var(--pad-top) var(--pad-x) var(--pad-bottom);
        display:flex; flex-direction:column;
        align-items:flex-start; justify-content:flex-start;
        gap: 28px;
        box-sizing:border-box;
      }
      #lr-content .eyebrow {
        font-family: 'JetBrains Mono', ui-monospace, monospace;
        font-size: 32px;
        font-weight: 500;
        letter-spacing: 0.32em;
        text-transform: uppercase;
        color: var(--accent-2);
        display: inline-flex; align-items: center; gap: 18px;
      }
      #lr-content .eyebrow::before {
        content: ""; display: inline-block;
        width: 56px; height: 2px;
        background: var(--accent-2);
      }
      #lr-content .headline {
        font-family: 'Montserrat', system-ui, sans-serif;
        font-weight: 800;
        font-size: 68px;
        line-height: 1.04;
        letter-spacing: -0.025em;
        color: var(--ink);
        max-width: 940px;
      }
      #lr-content .rows {
        display: flex; flex-direction: column;
        gap: 14px;
        margin-top: 16px;
        width: 940px;
      }
      .list-row {
        display: grid;
        grid-template-columns: 90px 1fr;
        gap: 24px;
        align-items: center;
        padding: 18px 26px;
        background: rgba(255,255,255,0.03);
        border: 1px solid rgba(255,255,255,0.08);
        border-radius: 18px;
        position: relative;
      }
      .list-row .num {
        font-family: 'JetBrains Mono', ui-monospace, monospace;
        font-weight: 600;
        font-size: 42px;
        color: var(--accent);
        text-align: center;
      }
      .list-row .body { display: flex; flex-direction: column; gap: 4px; }
      .list-row .label {
        font-family: 'Montserrat', system-ui, sans-serif;
        font-weight: 800;
        font-size: 52px;
        line-height: 1.05;
        letter-spacing: -0.012em;
        color: var(--ink);
      }
      .list-row .desc {
        font-family: 'Montserrat', system-ui, sans-serif;
        font-weight: 400;
        font-size: 32px;
        line-height: 1.28;
        color: var(--muted);
      }
      .list-row .marker {
        position: absolute;
        left: 0; bottom: -1px;
        width: 0%;
        height: 3px;
        background: var(--accent-2);
        box-shadow: 0 0 12px rgba(96, 165, 250, 0.6);
      }
    </style>

    <div id="lr-content">
      <div class="eyebrow" id="lr-eyebrow" style="opacity:0;visibility:hidden;">THIS WEEK'S SIGNAL</div>
      <h2 class="headline" id="lr-headline" style="opacity:0;visibility:hidden;">Six moves shipping right now.</h2>
      <div class="rows" id="lr-rows">
        <div class="list-row" id="lr-r1" style="opacity:0;visibility:hidden;"><div class="num">01</div><div class="body"><div class="label">Programmatic credit split.</div><div class="desc">Agent SDK + claude -p + GitHub Actions get their own pool — June 15.</div></div><div class="marker"></div></div>
        <div class="list-row" id="lr-r2" style="opacity:0;visibility:hidden;"><div class="num">02</div><div class="body"><div class="label">Claude Code /goal.</div><div class="desc">v2.1.139 — agent runs until it considers the goal satisfied.</div></div><div class="marker"></div></div>
        <div class="list-row" id="lr-r3" style="opacity:0;visibility:hidden;"><div class="num">03</div><div class="body"><div class="label">Cline SDK open-sourced.</div><div class="desc">MIT-licensed agent runtime — decoupled from the VS Code extension.</div></div><div class="marker"></div></div>
        <div class="list-row" id="lr-r4" style="opacity:0;visibility:hidden;"><div class="num">04</div><div class="body"><div class="label">Mythos finds curl bugs.</div><div class="desc">Anthropic's security scan: 1 confirmed CVE + ~20 bugs in curl.</div></div><div class="marker"></div></div>
        <div class="list-row" id="lr-r5" style="opacity:0;visibility:hidden;"><div class="num">05</div><div class="body"><div class="label">WildClawBench.</div><div class="desc">Long-horizon CLI agent benchmark — real workflows, not synthetic.</div></div><div class="marker"></div></div>
        <div class="list-row" id="lr-r6" style="opacity:0;visibility:hidden;"><div class="num">06</div><div class="body"><div class="label">Almanac.</div><div class="desc">Self-updating codebase wiki that syncs repo + Claude Code state.</div></div><div class="marker"></div></div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({ paused: true });

      tl.set("#lr-eyebrow",  { y: 20, autoAlpha: 0 }, 0);
      tl.set("#lr-headline", { y: 24, autoAlpha: 0 }, 0);
      ["#lr-r1","#lr-r2","#lr-r3","#lr-r4","#lr-r5","#lr-r6"].forEach(sel => {
        tl.set(sel, { x: -36, autoAlpha: 0 }, 0);
        tl.set(sel + " .marker", { width: "0%" }, 0);
      });

      tl.to("#lr-eyebrow",  { y: 0, autoAlpha: 1, duration: 0.5, ease: "power2.out" }, 0.2);
      tl.to("#lr-headline", { y: 0, autoAlpha: 1, duration: 0.6, ease: "power3.out" }, 0.5);

      // Step-by-step reveal — 6 rows retimed to transcript word-anchors.
      // Scene starts at 32.5s; anchors: One=34.07, Two=37.92, Three=45.20,
      // Four=52.00, Five=56.69, six=62.13. Scene-rel = anchor - 32.5.
      const rowTimes = [1.57, 5.42, 12.70, 19.50, 24.19, 29.63];
      ["#lr-r1","#lr-r2","#lr-r3","#lr-r4","#lr-r5","#lr-r6"].forEach((sel, i) => {
        tl.to(sel, { x: 0, autoAlpha: 1, duration: 0.55, ease: "back.out(1.4)" }, rowTimes[i]);
        tl.to(sel + " .marker", { width: "100%", duration: 0.55, ease: "power2.out" }, rowTimes[i] + 0.3);
      });

      // Tail-hold settle pulses — covers the gap from row 6 entrance to scene exit
      tl.to("#lr-rows", { scale: 1.01, duration: 1.2, ease: "sine.inOut", yoyo: true, repeat: 1 }, 31.5);
      tl.to("#lr-headline", { scale: 1.015, duration: 1.0, ease: "sine.inOut", yoyo: true, repeat: 1 }, 33.2);

      tl.set({}, {}, 34.5);
      window.__timelines["scene-list-reveal"] = tl;
    </script>
  </div>
</template>
