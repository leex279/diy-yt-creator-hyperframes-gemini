<template id="scene-13-popularity-template">
  <div data-composition-id="scene-13-popularity"
       data-start="0"
       data-width="1920"
       data-height="1080"
       style="position:absolute; inset:0; overflow:hidden;
              font-family:var(--sans); color:var(--ink);">

    <style>
      #s13-eyebrow {
        position:absolute; left: 96px; top: 130px;
        font-family: var(--mono); font-size: 22px; letter-spacing: .22em;
        text-transform: uppercase; color: var(--ink-3);
      }
      #s13-eyebrow .dot { display:inline-block; width:8px; height:8px; border-radius:50%; background: var(--accent); margin-right: 14px; }
      #s13-h2 {
        position:absolute; left: 96px; right: 96px; top: 168px;
        font-family: var(--serif);
        font-weight: 500;
        font-size: 84px;
        letter-spacing: -.025em;
      }

      #s13-grid {
        position:absolute; left: 96px; right: 96px; top: 380px; bottom: 96px;
        display: grid; grid-template-columns: 1fr 1fr; gap: 56px;
      }
      .s13-col {
        text-align: center;
      }
      .s13-label {
        font-family: var(--mono);
        font-size: 22px;
        letter-spacing: .22em;
        text-transform: uppercase;
      }
      .s13-col.r .s13-label { color: var(--remotion); }
      .s13-col.h .s13-label { color: var(--hyper); }
      .s13-mega {
        font-family: var(--display);
        font-size: 220px;
        line-height: .9;
        letter-spacing: .005em;
        margin-top: 10px;
      }
      .s13-col.r .s13-mega { color: var(--remotion); text-shadow: 0 0 60px var(--remotion-glow); }
      .s13-col.h .s13-mega { color: var(--hyper);    text-shadow: 0 0 60px var(--hyper-glow); }
      .s13-context {
        font-family: var(--sans); font-size: 26px;
        color: var(--ink); margin-top: 12px;
      }
      .s13-extra {
        font-family: var(--mono); font-size: 16px;
        color: var(--ink-3); letter-spacing: .12em;
        text-transform: uppercase;
        margin-top: 16px;
        line-height: 1.7;
      }
    </style>

    <div id="s13-eyebrow"><span class="dot"></span>STARS · ADOPTION · MOMENTUM</div>
    <h2 id="s13-h2">Established vs. ascending.</h2>

    <div id="s13-grid">
      <div class="s13-col r">
        <div class="s13-label" id="s13-r-label">REMOTION</div>
        <div class="s13-mega" id="s13-r-num">~45,000</div>
        <div class="s13-context" id="s13-r-ctx">GitHub stars · 5 years</div>
        <div class="s13-extra" id="s13-r-extra">3,000 forks · thriving Discord<br/>enterprise customers · big tech</div>
      </div>
      <div class="s13-col h">
        <div class="s13-label" id="s13-h-label">HYPERFRAMES</div>
        <div class="s13-mega" id="s13-h-num">~14,000</div>
        <div class="s13-context" id="s13-h-ctx">GitHub stars · in weeks</div>
        <div class="s13-extra" id="s13-h-extra">Backed by HeyGen<br/>reported 85k customers · $500M valuation</div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({ paused: true, defaults: { ease: "power3.out" } });

      tl.set("#s13-eyebrow", { opacity: 0 }, 0);
      tl.set("#s13-h2",      { y: 30, opacity: 0 }, 0);
      ["#s13-r-label","#s13-r-num","#s13-r-ctx","#s13-r-extra"].forEach(s => tl.set(s, { y: 16, opacity: 0 }, 0));
      ["#s13-h-label","#s13-h-num","#s13-h-ctx","#s13-h-extra"].forEach(s => tl.set(s, { y: 16, opacity: 0 }, 0));

      tl.to("#s13-eyebrow", { opacity: 1, duration: 0.5 }, 0.2);
      tl.to("#s13-h2",      { y: 0, opacity: 1, duration: 0.7 }, 0.4);

      // ── Scene ~28.7s. Re-anchored to actual narration word positions: ──
      //   "forty-five thousand"  @ scene_t=3.30s → Remotion num
      //   "three thousand forks" @ scene_t=6.49s → Remotion extras
      //   "fourteen thousand"    @ scene_t=17.54s → HF num
      //   "eighty-five thousand" @ scene_t=23.63s → HF extras
      tl.to("#s13-r-label", { y: 0, opacity: 1, duration: 0.5 }, 2.0);
      tl.to("#s13-r-num",   { y: 0, opacity: 1, duration: 0.6, ease: "back.out(1.4)" }, 2.8);
      tl.to("#s13-r-ctx",   { y: 0, opacity: 1, duration: 0.5 }, 3.6);
      tl.to("#s13-r-extra", { y: 0, opacity: 1, duration: 0.5 }, 6.2);

      tl.to("#s13-h-label", { y: 0, opacity: 1, duration: 0.5 }, 16.5);
      tl.to("#s13-h-num",   { y: 0, opacity: 1, duration: 0.6, ease: "back.out(1.4)" }, 17.2);
      tl.to("#s13-h-ctx",   { y: 0, opacity: 1, duration: 0.5 }, 18.0);
      tl.to("#s13-h-extra", { y: 0, opacity: 1, duration: 0.5 }, 22.8);

      // Mid-beats — mega-num shimmer breaths, label pulse, sustained glow
      tl.to("#s13-r-num", { scale: 1.05, textShadow: "0 0 80px rgba(0,229,212,1)", duration: 1.6, ease: "sine.inOut", yoyo: true, repeat: 7 }, 4.5);
      tl.to("#s13-h-num", { scale: 1.05, textShadow: "0 0 80px rgba(255,77,26,1)", duration: 1.6, ease: "sine.inOut", yoyo: true, repeat: 3 }, 19.0);
      tl.to("#s13-r-label", { letterSpacing: ".26em", duration: 1.4, ease: "sine.inOut", yoyo: true, repeat: 4 }, 5.5);
      tl.to("#s13-h-label", { letterSpacing: ".26em", duration: 1.4, ease: "sine.inOut", yoyo: true, repeat: 2 }, 19.5);
      tl.to("#s13-eyebrow .dot", { scale: 1.5, duration: 1.0, ease: "sine.inOut", yoyo: true, repeat: 13 }, 1.0);

      window.__timelines["scene-13-popularity"] = tl;
    </script>
  </div>
</template>
