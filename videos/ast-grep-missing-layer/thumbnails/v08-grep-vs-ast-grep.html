<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>v08 — grep vs ast-grep</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@600;700;800;900&family=JetBrains+Mono:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="_common.css">
<style>
  .canvas {
    display: flex;
    background: var(--bg-deep);
  }
  .grid-dots { z-index: 1; }
  .side {
    width: 50%; height: 720px;
    position: relative;
    display: flex; flex-direction: column;
    padding: 56px 44px 60px;
    z-index: 2;
  }
  .side.left {
    background:
      linear-gradient(180deg, rgba(255,80,60,0.18), rgba(255,80,60,0.06)),
      var(--bg-deep);
  }
  .side.right {
    background:
      linear-gradient(180deg, rgba(78,201,176,0.20), rgba(78,201,176,0.06)),
      #15191e;
    border-left: 2px dashed rgba(255,255,255,0.15);
  }
  .label {
    font-family: var(--font-mono); font-size: 22px;
    letter-spacing: 0.22em; text-transform: uppercase; font-weight: 700;
    display: flex; align-items: center; gap: 12px;
  }
  .left .label { color: #ff7676; }
  .right .label { color: var(--ok); }
  .label::before { content: ""; width: 28px; height: 2px; }
  .left .label::before { background: #ff7676; }
  .right .label::before { background: var(--ok); }
  .name {
    margin-top: 10px;
    font-family: var(--font-mono); font-weight: 800; font-size: 96px;
    line-height: 0.9; letter-spacing: -0.03em;
  }
  .left .name { color: #ff7676; text-decoration: line-through; text-decoration-color: rgba(255,118,118,0.6); text-decoration-thickness: 6px; }
  .right .name { color: var(--ast-yellow); }
  .desc {
    margin-top: 18px;
    font-family: var(--font-sans); font-weight: 800; font-size: 56px;
    line-height: 1; letter-spacing: -0.03em;
    color: #fff;
  }
  .desc-sub {
    margin-top: 14px;
    font-family: var(--font-mono); font-size: 22px; line-height: 1.4;
    color: var(--fg-muted); font-weight: 500;
  }
  .stat-block {
    margin-top: auto;
    display: flex; flex-direction: column; gap: 4px;
  }
  .stat-val {
    font-family: var(--font-mono); font-weight: 800; font-size: 110px;
    line-height: 0.9; letter-spacing: -0.03em;
  }
  .left .stat-val { color: #ff7676; text-shadow: 0 4px 18px rgba(255,80,80,0.35); }
  .right .stat-val { color: var(--ok); text-shadow: 0 4px 18px rgba(78,201,176,0.35); }
  .stat-cap {
    font-family: var(--font-mono); font-size: 18px;
    color: var(--fg-muted); font-weight: 600;
  }
  .center-vs {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 96px; height: 96px;
    border-radius: 50%;
    background: var(--bg-deep);
    border: 2px solid var(--fg-default);
    display: flex; align-items: center; justify-content: center;
    font-family: var(--font-sans); font-weight: 900; font-size: 38px;
    color: var(--fg-bright);
    z-index: 10;
    box-shadow: 0 0 24px rgba(0,0,0,0.6);
  }
</style>
</head>
<body>
<div class="canvas">
  <div class="grid-dots"></div>
  <div class="side left">
    <div class="label">old · 1973</div>
    <div class="name">grep</div>
    <div class="desc">text<br/>matching</div>
    <div class="desc-sub">finds words in strings, comments,<br/>and code · can't tell apart</div>
    <div class="stat-block">
      <div class="stat-val">22 files</div>
      <div class="stat-cap">found · most are noise</div>
    </div>
  </div>
  <div class="side right">
    <div class="label">new · structural</div>
    <div class="name">ast-grep</div>
    <div class="desc">code as<br/>code</div>
    <div class="desc-sub">parses with tree-sitter ·<br/>matches real call nodes only</div>
    <div class="stat-block">
      <div class="stat-val">12 files</div>
      <div class="stat-cap">found · only the real ones</div>
    </div>
  </div>
  <div class="center-vs">VS</div>
  <div class="brand"><div class="brand-mark">{</div>smartcode.diy</div>
</div>
</body>
</html>
