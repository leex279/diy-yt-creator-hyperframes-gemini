<!--
  scene-hook.html — Scene 01: Your AI Agent Is Bleeding Tokens (0-17.39s)
  Anchors locked to NEW transcript (240.60s narration). All times scene-local.

  Root-time anchors (local = root - 0):
    0.07   "Your"                  → bleeding-tokens slam appears
    1.09   "bleeding"              → red token-counter shake (chrome handles)
    2.55   "Right now"             → "RIGHT NOW" subtitle slams
    3.27   "Here's the proof"      → receipt panel slides in
    4.40   "flagged"               → red underline sweep on line 2813
    5.30   "string of text"        → "STRING" tooltip
    7.30   "in quotes"             → tooltip pulse on "NOT A CALL"
    8.50   "line two-eight-one-three" → LINE :2813 badge slams
    10.20  "Then it billed you"    → "BILLED $0.03" stamp
    13.20  "smarter search"        → whoosh to pivot
    14.50  "Your agent doesn't"    → pivot card "← it doesn't have this yet"
-->

      #s01-slam {

        font-family: 'Inter', system-ui, -apple-system, sans-serif;

      #rp-line-badge .colon { color: var(--fg-muted); }
      #rp-code {
        position: relative;
        padding: 28px 0;
        font-family: 'JetBrains Mono', 'Fira Code', ui-monospace, monospace;

      }
      .rp-row {

      .rp-row .gutter {

        color: var(--fg-muted);
        font-size: 22px;

        left: 70px;

      .rp-row.target #rp-target-bg {

        left: 0; top: 0; right: 0; bottom: 0;

      /* String tooltip */
      #rp-tooltip {
        position: absolute;
        left: 50%; top: 220px;

        letter-spacing: 2px;

        border-radius: 6px;
        z-index: 25;
        transform: rotate(-4deg);
      }

      /* Pivot card */
      #pivot-card {
        position: absolute;
        left: 50%; top: 50%;
        transform: translate(-50%, -50%);
        padding: 36px 56px;
        background: var(--bg-deep);

        border-radius: 14px;
        font-family: 'Inter', system-ui, -apple-system, sans-serif;
        font-weight: 900;
        font-size: 64px;
        letter-spacing: -1.5px;
        color: var(--fg-bright);
        text-align: center;
        box-shadow: 0 24px 80px rgba(78, 201, 176, 0.35);
        z-index: 60;
      }
      #pivot-card .arrow { color: var(--ok); font-size: 56px; }
      #pivot-card .sub {
        display: block;
        font-family: 'JetBrains Mono', 'Fira Code', ui-monospace, monospace;
        font-size: 26px;
        font-weight: 700;
        color: var(--fg-muted);
        margin-top: 14px;
        letter-spacing: 2px;
      }
      #pivot-card .brand {
        display: block;
        margin: 0 auto 16px;
        height: 96px;
        width: auto;
      }

    <div id="s01">

      <!-- Hero slam (frame 0) -->
      <div id="s01-slam">
        Your agent is
        <span class="red">bleeding tokens.</span>
      </div>
      <div id="s01-sub">RIGHT NOW.</div>

      <!-- Receipt panel — proof of the false positive -->
      <div id="receipt-panel">
        <div id="rp-path">
          packages/workflows/src/<span class="filename">dag-executor.test.ts</span>
          <span class="lineno">:2813</span>
        </div>
        <div id="rp-code">
          <div class="rp-row">
            <span class="gutter">2811</span>
            <span class="syn-key">const</span>&nbsp;<span class="syn-var">fixture</span>&nbsp;<span class="syn-punct">=</span>&nbsp;<span class="syn-punct">{</span>
          </div>
          <div class="rp-row">
            <span class="gutter">2812</span>
            &nbsp;&nbsp;<span class="syn-var">id</span><span class="syn-punct">:</span>&nbsp;<span class="syn-str">"echo-test"</span><span class="syn-punct">,</span>
          </div>
          <div class="rp-row target">
            <span id="rp-target-bg"></span>
            <span class="gutter">2813</span>
            &nbsp;&nbsp;<span class="syn-var">script</span><span class="syn-punct">:</span>&nbsp;<span class="syn-str">'console.log("hi")'</span><span class="syn-punct">,</span>&nbsp;&nbsp;<span class="syn-com">// fixture data</span>
            <span id="rp-mark-line"></span>
          </div>
          <div class="rp-row">
            <span class="gutter">2814</span>
            &nbsp;&nbsp;<span class="syn-var">expect</span><span class="syn-punct">:</span>&nbsp;<span class="syn-str">"hi"</span><span class="syn-punct">,</span>
          </div>
          <div class="rp-row">
            <span class="gutter">2815</span>
            <span class="syn-punct">};</span>
          </div>
        </div>
        <div id="rp-line-badge"><span class="colon">:</span>2813</div>
        <div id="rp-tooltip">THIS IS A STRING. NOT A CALL.</div>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({ paused: true });

      // HIDE
      tl.set("#s01-slam",      { opacity: 0, y: -16, scale: 0.95 }, 0);
      tl.set("#s01-sub",       { opacity: 0, x: -24 }, 0);
      tl.set("#receipt-panel", { opacity: 0, y: 36, scale: 0.96 }, 0);
      tl.set("#rp-target-bg",  { background: "rgba(247, 129, 102, 0)" }, 0);
      tl.set("#rp-mark-line",  { width: 0 }, 0);
      tl.set("#rp-tooltip",    { opacity: 0, y: -10, scale: 0.85, xPercent: -50 }, 0);
      tl.set("#rp-line-badge", { opacity: 0, scale: 0.8 }, 0);
      tl.set("#rp-billed",     { opacity: 0, scale: 1.4, rotate: -10 }, 0);
      tl.set("#pivot-card",    { opacity: 0, scale: 0.85, visibility: "hidden" }, 0);

      // Hero slam — "Your agent is bleeding tokens" (anchor 0.07)
      tl.to("#s01-slam", { opacity: 1, y: 0, scale: 1, duration: 0.5, ease: "expo.out" }, 0.07);
      // CAMERA-ABUSE: bleeding pulse on slam at 1.09
      tl.to("#s01-slam", { scale: 1.04, duration: 0.22, ease: "power3.out", yoyo: true, repeat: 1 }, 1.09);

      // "RIGHT NOW" sub (anchor ~2.55)
      tl.to("#s01-sub", { opacity: 1, x: 0, duration: 0.4, ease: "back.out(1.6)" }, 2.55);

      // Receipt panel — "Here's the proof" (anchor 3.27)
      tl.to("#receipt-panel", { opacity: 1, y: 0, scale: 1, duration: 0.55, ease: "expo.out" }, 3.27);

      // Red bg + marker on line 2813 — "flagged" (anchor 4.40)
      tl.to("#rp-target-bg",  { background: "rgba(247, 129, 102, 0.22)", duration: 0.4, ease: "power2.out" }, 4.40);
      tl.to("#rp-mark-line",  { width: "calc(100% - 106px)", duration: 0.55, ease: "power2.out" }, 4.40);

      // Tooltip — "string of text" (anchor 5.30)
      tl.to("#rp-tooltip", { opacity: 1, y: 0, scale: 1, duration: 0.4, ease: "back.out(1.8)" }, 5.30);
      // Pulse on "in quotes" (anchor 7.30)
      tl.to("#rp-tooltip", { scale: 1.06, duration: 0.3, ease: "sine.inOut", yoyo: true, repeat: 1 }, 7.30);

      // LINE :2813 badge — "line two-eight-one-three" (anchor 8.50)
      tl.to("#rp-line-badge", { opacity: 1, scale: 1, duration: 0.4, ease: "back.out(1.7)" }, 8.50);
      // CAMERA-ABUSE: smash zoom on the receipt panel at 8.50
      tl.to("#receipt-panel", { scale: 1.06, filter: "blur(1.5px)", duration: 0.18, ease: "power3.out" }, 8.50);
      tl.to("#receipt-panel", { scale: 1.0, filter: "blur(0px)", duration: 0.25, ease: "power3.in" }, 8.70);

      // BILLED stamp — "Then it billed you" (anchor 10.20)
      tl.to("#rp-billed", { opacity: 1, scale: 1, rotate: -4, duration: 0.45, ease: "back.out(2.5)" }, 10.20);
      // Stamp pulse on "investigate" (~11.20)
      tl.to("#rp-billed", { scale: 1.1, duration: 0.3, ease: "sine.inOut", yoyo: true, repeat: 1 }, 11.20);

      // Pivot transition — "There's a smarter search" (anchor 13.20)
      tl.to("#receipt-panel", { opacity: 0.25, filter: "blur(8px)", duration: 0.6, ease: "power2.in" }, 13.00);
      tl.to("#s01-slam", { opacity: 0.3, duration: 0.4, ease: "power2.in" }, 13.00);
      tl.to("#s01-sub", { opacity: 0.3, duration: 0.4, ease: "power2.in" }, 13.00);
      tl.set("#pivot-card", { visibility: "visible" }, 13.10);
      tl.to("#pivot-card", { opacity: 1, scale: 1, duration: 0.55, ease: "back.out(1.5)" }, 13.20);
      // Pivot subtle pulse — "doesn't have it yet" (~15.20)
      tl.to("#pivot-card", { scale: 1.03, duration: 0.35, ease: "sine.inOut", yoyo: true, repeat: 1 }, 15.20);

      // Hold thru exit at 17.39
      tl.set({}, {}, 17.39);
      window.__timelines["scene-hook"] = tl;
    </script>
