    position: absolute;
    top: 0;
    left: 0;
    width: 1080px;
    height: 1920px;
    z-index: 1;
  }
  /* Z-index ESCALATION (anthropic pattern) — each scene stacks above all
     previous ones. Once a scene fades in, it stays visible at opacity 1
     forever, providing a fully-opaque "floor" for every subsequent
     transition. The next scene fades in ON TOP, never replacing the
     previous one — bg shapes can never leak through during a crossfade. */

  #scene-insight-wrap  { z-index: 3; opacity: 0; visibility: hidden; }

  #scene-use-it-wrap   { z-index: 8; opacity: 0; visibility: hidden; }
  #scene-cta-wrap      { z-index: 9; opacity: 0; visibility: hidden; }

  #dynamous-endcard-mount {
    position: absolute;
    inset: 0;
    width: 1080px;
    height: 1920px;
    z-index: 100;
    pointer-events: none;

<style>
  #source-url {

<script>
  function seedHash(seed) {
    let h = 1779033703 ^ seed.length;
    for (let i = 0; i < seed.length; i++) {
      h = Math.imul(h ^ seed.charCodeAt(i), 3432918353);
      h = (h << 13) | (h >>> 19);
    }
    h = Math.imul(h ^ (h >>> 16), 2246822507);
    h = Math.imul(h ^ (h >>> 13), 3266489909);
    h ^= h >>> 16;
    return (h >>> 0) / 4294967296;
  }

  function spawnShapes(seedPrefix, container) {
    const shapes = ['assets/shapes/shape1.svg', 'assets/shapes/shape2.svg', 'assets/shapes/shape3.svg'];
    const count = 14, w = 1080, h = 1920, minSize = 200, sizeRange = 220;
    const minDist = 360, MAX_TRIES = 80;
    const placed = [];
    let attempt = 0;
    for (let i = 0; i < count; i++) {
      let best = null, bestScore = -1;
      for (let t = 0; t < MAX_TRIES; t++) {
        const seed = seedPrefix + '-' + i + '-' + attempt++;
        const size = minSize + seedHash(seed + '-size') * sizeRange;
        const cx = seedHash(seed + '-x') * (w - size * 0.4) + size * 0.2;
        const cy = seedHash(seed + '-y') * (h - size * 0.4) + size * 0.2;
        const rot = (seedHash(seed + '-rot') - 0.5) * 90;
        let nearest = Infinity;
        for (const p of placed) {
          const dx = cx - p.cx, dy = cy - p.cy;
          const d2 = dx * dx + dy * dy;
          if (d2 < nearest) nearest = d2;
        }
        if (nearest >= minDist * minDist) { best = { cx, cy, size, rot }; break; }
        if (nearest > bestScore) { bestScore = nearest; best = { cx, cy, size, rot }; }
      }
      placed.push(best);
      const img = document.createElement('img');
      img.src = shapes[i % shapes.length];
      img.style.cssText =
        'left:' + (best.cx - best.size / 2) + 'px;' +
        'top:' + (best.cy - best.size / 2) + 'px;' +
        'width:' + best.size + 'px;' +
        'height:' + best.size + 'px;';
      container.appendChild(img);
      gsap.set(img, { rotation: best.rot });
    }
  }

  // repositionStartTimes are now ABSOLUTE timeline positions for the
  // shape-reposition tween (was sceneT - 0.4 in v1). Caller controls when
  // shapes move so they can align with the new crossfade timing.
  function repositionShapesPerScene(tl, container, seedPrefix, repositionStartTimes) {
    const imgs = Array.from(container.querySelectorAll('img'));
    if (!imgs.length || !repositionStartTimes.length) return;
    const w = 1080, h = 1920, minDist = 360, MAX_TRIES = 80;
    const anchors = imgs.map(img => ({
      left: parseFloat(img.style.left),
      top:  parseFloat(img.style.top),
      size: parseFloat(img.style.width),
    }));
    repositionStartTimes.forEach((startT, sceneIdx) => {
      const placed = [];
      let attempt = 0;
      const positions = imgs.map((img, i) => {
        const size = anchors[i].size;
        let best = null, bestScore = -1;
        for (let t = 0; t < MAX_TRIES; t++) {
          const seed = seedPrefix + '-scene' + sceneIdx + '-' + i + '-' + (attempt++);
          const cx = seedHash(seed + '-x') * (w - size * 0.4) + size * 0.2;
          const cy = seedHash(seed + '-y') * (h - size * 0.4) + size * 0.2;
          const rot = (seedHash(seed + '-rot') - 0.5) * 90;
          let nearest = Infinity;
          for (const p of placed) {
            const dx = cx - p.cx, dy = cy - p.cy;
            const d2 = dx * dx + dy * dy;
            if (d2 < nearest) nearest = d2;
          }
          if (nearest >= minDist * minDist) { best = { cx, cy, rot }; break; }
          if (nearest > bestScore) { bestScore = nearest; best = { cx, cy, rot }; }
        }
        placed.push({ cx: best.cx, cy: best.cy });
        return {
          x: (best.cx - size / 2) - anchors[i].left,
          y: (best.cy - size / 2) - anchors[i].top,
          rot: best.rot,
        };
      });
      tl.to(imgs, {
        x: (i) => positions[i].x,
        y: (i) => positions[i].y,
        rotation: (i) => positions[i].rot,
        duration: 1.0,
        ease: 'power2.inOut',
      }, startT);
    });
  }

  // CROSSFADE — z-stacked overlay then explicit hide.
  //
  //   1. toSel z-stacks ABOVE fromSel via CSS z-index escalation. It fades in
  //      from opacity 0 → 1 over 0.5s. fromSel stays at opacity 1 underneath
  //      throughout the fade — no transparent gap, never see-through to bg.
  //   2. AFTER toSel fully covers fromSel (atTime + 0.55), fromSel is hidden
  //      (opacity 0 + visibility hidden). No visual change at that moment
  //      because toSel is fully opaque on top covering fromSel.
  //   3. fromSel stays MOUNTED (data-duration keeps it alive) — only
  //      visually hidden, so the framework doesn't tear down the DOM and
  //      we don't get content reverting to initial GSAP-set state.
  //
  // Result: at every frame, exactly ONE scene is fully visible — no bg
  // shapes leak through transitions, no scene-content layering bugs.
  function crossfadeScenes(tl, fromSel, toSel, atTime) {
    tl.set(toSel,   { opacity: 0, filter: "blur(6px)", visibility: "visible" }, atTime);
    tl.to(toSel,    { opacity: 1, duration: 0.5, ease: "power2.out" }, atTime);
    tl.to(toSel,    { filter: "blur(0px)", duration: 0.6, ease: "power2.out" }, atTime);
    tl.set(fromSel, { opacity: 0, visibility: "hidden" }, atTime + 0.55);
  }

  spawnShapes('spec-decoding-short', document.getElementById('shape-backdrop'));

  window.__timelines = window.__timelines || {};
  const TOTAL_DURATION = 172.0;
  const tl = gsap.timeline({ paused: true });

  tl.fromTo("#ambient",
    { opacity: 0.85, scale: 1.0 },
    { opacity: 1.0, scale: 1.04, duration: TOTAL_DURATION / 4, ease: "sine.inOut", yoyo: true, repeat: 3 },
    0);

  // Shape reposition aligns with crossfade + whoosh — fires at each new
  // scene's data-start (= when its narration begins). Shapes are at z=0
  // behind everything, but with the new opaque scene-wrapper bg, shapes
  // are only visible during the brief 0.5s fade-in window — fine.
  repositionShapesPerScene(
    tl,
    document.getElementById('shape-backdrop'),
    'spec-decoding-short',
    [9.86, 31.18, 51.33, 80.18, 97.10, 118.27, 138.58, 156.90]
  );

  tl.fromTo("#progress-fill",
    { width: 0 },
    { width: 1080, duration: TOTAL_DURATION, ease: "none" },
    0);

  tl.from("#top-banner", { y: -16, opacity: 0, duration: 0.6, ease: "power2.out" }, 0.2);
  tl.to("#source-url", { opacity: 1, duration: 0.6, ease: "power2.out" }, 0.6);

  // Crossfade start = previous-scene narration END (last spoken word + tail).
  // Shapes still reposition at sceneT - 0.4 (separate function); they sit at
  // z-index 0 behind every scene wrapper, so they can move whenever — the
  // foreground content is never replaced by bare backdrop.
  // Outgoing-scene last-word end times (from transcript.json + audio dur):
  //   hook    "today."     → ~9.20    (next 9.86)
  //   problem "word."      → ~30.65   (next 31.18)
  //   insight "parts."     → ~50.70   (next 51.33)
  //   fix     "pass."      → ~80.05   (next 80.18)   tight, only 0.13s gap
  //   numbers "X X L."     → ~96.75   (next 97.10)   tight, only 0.35s gap
  //   when    "ask."       → ~117.75  (next 118.27)
  //   gemma   "itself."    → ~137.95  (next 138.58)
  // Crossfade times = each toSel scene's data-start. The wrapper isn't
  // rendered by the framework before data-start, so attempting to fade it
  // in earlier would briefly leave NO scene visible (previous scene already
  // hidden, next not yet active). Aligning to data-start keeps the previous
  // scene visible right up until the next scene begins narrating.
  crossfadeScenes(tl, "#scene-hook-wrap",     "#scene-problem-wrap",   9.86);
  crossfadeScenes(tl, "#scene-problem-wrap",  "#scene-insight-wrap",  31.18);
  crossfadeScenes(tl, "#scene-insight-wrap",  "#scene-fix-wrap",      51.33);
  crossfadeScenes(tl, "#scene-fix-wrap",      "#scene-numbers-wrap",  80.18);
  crossfadeScenes(tl, "#scene-numbers-wrap",  "#scene-when-wrap",     97.10);
  crossfadeScenes(tl, "#scene-when-wrap",     "#scene-gemma-wrap",   118.27);
  crossfadeScenes(tl, "#scene-gemma-wrap",    "#scene-use-it-wrap",  138.58);
  crossfadeScenes(tl, "#scene-use-it-wrap",   "#scene-cta-wrap",     156.90);

  tl.to({}, { duration: 0.01 }, TOTAL_DURATION - 0.01);

  window.__timelines["main"] = tl;
</script>
