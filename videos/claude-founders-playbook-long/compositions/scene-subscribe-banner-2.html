<!--
  scene-subscribe-banner-2.html — Second support ask (~13s) at ~85% mark.
-->
<template id="scene-subscribe-banner-2-template">
  <div data-composition-id="scene-subscribe-banner-2"
       data-start="0"
       data-width="1920"
       data-height="1080"
       style="position:absolute; inset:0; overflow:hidden;
              font-family:'Inter', system-ui, sans-serif; color:#F5F1EB;">

    <style>
      #scene-sub2-content {
        width: 100%; height: 100%;
        padding: 200px 80px 200px;
        display: flex; flex-direction: column;
        align-items: center; justify-content: center;
        gap: 36px;
        box-sizing: border-box;
      }
      #sub2-overline {
        font-family: 'JetBrains Mono', ui-monospace, monospace;
        font-weight: 700;
        font-size: 26px;
        letter-spacing: 7px;
        text-transform: uppercase;
        color: #E97458;
      }
      .sub2-banner-row {
        display: flex; flex-direction: row;
        align-items: center; gap: 32px;
        padding: 36px 56px;
        border-radius: 28px;
        background: rgba(14,18,26,0.85);
        border: 2px solid rgba(245,241,235,0.18);
        max-width: 1500px;
        width: 100%;
      }
      .sub2-icon {
        font-size: 72px;
        line-height: 1;
        flex-shrink: 0;
      }
      .sub2-text-block {
        flex: 1;
        display: flex; flex-direction: column;
        gap: 10px;
      }
      .sub2-primary {
        font-weight: 800;
        font-size: 52px;
        line-height: 1.05;
        letter-spacing: -1px;
        color: #F5F1EB;
      }
      .sub2-em { color: #E97458; }
      .sub2-secondary {
        font-family: 'JetBrains Mono', ui-monospace, monospace;
        font-weight: 600;
        font-size: 26px;
        letter-spacing: 1px;
        color: #9A958D;
      }
      .sub2-pill {
        padding: 22px 40px;
        border-radius: 999px;
        background: linear-gradient(135deg, rgba(233,116,88,0.28), rgba(233,116,88,0.08));
        border: 2px solid rgba(233,116,88,0.55);
        font-weight: 800;
        font-size: 32px;
        letter-spacing: 0.5px;
        color: #E97458;
        white-space: nowrap;
      }
    </style>

    <div id="scene-sub2-content">
      <div id="sub2-overline">LAST BEAT BEFORE THE RECAP</div>
      <div class="sub2-banner-row" id="sub2-row-1">
        <div class="sub2-icon">&#x1F4AC;</div>
        <div class="sub2-text-block">
          <div class="sub2-primary">If this helped &mdash; <span class="sub2-em">subscribe</span> + drop your stage below.</div>
          <div class="sub2-secondary">Idea, MVP, Launch, or Scale &mdash; which one are you stuck in?</div>
        </div>
        <div class="sub2-pill">Subscribe &rarr;</div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      window.__timelines = window.__timelines || {};
      const SCENE_DURATION = 13;

      const tl = gsap.timeline({
        paused: true,
        defaults: { ease: "power3.out", duration: 0.6 }
      });

      tl.from("#sub2-overline", { y: 20, opacity: 0, duration: 0.5, ease: "power2.out", immediateRender: false }, 0);
      tl.from("#sub2-row-1",    { y: 36, opacity: 0, scale: 0.95, duration: 0.7, ease: "back.out(1.4)", immediateRender: false }, 0.4);

      // Finite-pulse subscribe pill — 4 ticks
      tl.to(".sub2-pill", {
        boxShadow: "0 0 0 8px rgba(233, 116, 88, 0.28)",
        duration: 0.5,
        ease: "sine.inOut",
        yoyo: true,
        repeat: 4,
        immediateRender: false
      }, 2.5);

      tl.set({}, {}, SCENE_DURATION);
      window.__timelines["scene-subscribe-banner-2"] = tl;
    </script>
  </div>
</template>
