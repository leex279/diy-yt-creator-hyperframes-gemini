<template id="scene-quote-card-template">

      }
      #q-pattern-num {
        font-family: var(--sans);
        font-weight: 900;
        font-size: 100px;
        line-height: 0.85;

        color: var(--accent-1);
        text-shadow: 0 0 60px rgba(233, 116, 88, 0.45);
      }
      #q-pattern-title {

      #quote-mark-text {

        position: relative;
      }
      #quote-text .key {
        color: var(--text);

        display: inline-block;

        box-shadow: 0 0 18px rgba(233, 116, 88, 0.60);

      #q-anecdote {

        border: 1.5px solid var(--border-bright);

        align-items: center; gap: 18px;
        font-family: var(--mono);
        font-weight: 700;
        font-size: 28px;
        letter-spacing: 0.5px;
        color: var(--text);
        max-width: 1500px;

      #q-anecdote .a-tag {

    <div id="scene-quote-content">
      <div id="q-pattern-header">
        <div id="q-pattern-num">2</div>
        <div style="display:flex; flex-direction:column; gap:4px;">

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      window.__timelines = window.__timelines || {};
      const SCENE_DURATION = 34.260;

      const tl = gsap.timeline({
        paused: true,
        defaults: { ease: "power3.out", duration: 0.6 }
      });

      // scene_start = 350.681 — times below are scene-relative
      tl.set("#q-pattern-overline", { y: 18, opacity: 0 }, 0);
      tl.set("#q-pattern-num",      { scale: 0.7, opacity: 0 }, 0);
      tl.set("#q-pattern-title",    { x: -20, opacity: 0 }, 0);
      tl.set("#quote-mark-text",    { x: -30, opacity: 0 }, 0);
      tl.set("#quote-card",         { y: 36, scale: 0.97, opacity: 0 }, 0);
      tl.set("#quote-attribution",  { y: 16, opacity: 0 }, 0);
      tl.set("#q-anecdote",         { y: 16, opacity: 0 }, 0);

      tl.to("#q-pattern-overline", { y: 0, opacity: 1, duration: 0.4, ease: "power2.out" }, 0.0);
      tl.to("#q-pattern-num",      { scale: 1, opacity: 1, duration: 0.55, ease: "back.out(1.5)" }, 0.15);
      tl.to("#q-pattern-title",    { x: 0, opacity: 1, duration: 0.5, ease: "power3.out" }, 0.3);

      // Quote-mark spring — word "CLAUDE" at 352.921 → scene 2.240
      tl.to("#quote-mark-text", { x: 0, opacity: 1, duration: 0.6, ease: "back.out(1.8)" }, 1.8);
      tl.to("#quote-card", { y: 0, scale: 1, opacity: 1, duration: 0.7, ease: "power3.out" }, 2.8);

      // Marker on "three to six months" — word "three" at 365.379 → scene 14.698
      tl.to("#quote-mark-line", { width: "100%", duration: 1.045, ease: "power2.out" }, 14.698);

      // Quote breath beat
      tl.to("#quote-card", { scale: 1.02, duration: 0.3, ease: "sine.inOut", yoyo: true, repeat: 1 }, 19.319);

      // Sub-anecdote — narration scene ~23.319 (word "intercepted" idx 884 at 375.149 → scene 24.468)
      tl.to("#q-anecdote", { y: 0, opacity: 1, duration: 0.55, ease: "power3.out" }, 23.319);

      // Marker on "p4 edit" — word "P" at 377.144 → scene 26.463
      tl.to("#q-mark-p4", { width: "calc(100% - 8px)", duration: 0.45, ease: "power2.out" }, 26.463);

      // Attribution settle
      tl.to("#quote-attribution", { y: 0, opacity: 1, duration: 0.5, ease: "power2.out" }, 28.0);
      // Author-attribution scale-pulse at scene 29.819 (mid-anecdote)
      tl.to("#quote-attribution", { scale: 1.03, duration: 0.3, ease: "sine.inOut", yoyo: true, repeat: 1 }, 29.819);

      tl.set({}, {}, SCENE_DURATION);
      window.__timelines["scene-quote-card"] = tl;
    </script>
  </div>
</template>
