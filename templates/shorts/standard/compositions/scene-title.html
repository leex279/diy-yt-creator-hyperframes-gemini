<!--
  scene-title.html — Editorial title card (~7s).

  Pattern: kicker overline → big serif headline (word-by-word reveal)
           → italic byline. Sets the publication/editorial tone.

  Self-contained sub-composition with its own paused timeline at
  window.__timelines["scene-title"]. Root crossfades the wrapper.
-->
<template id="scene-title-template">
  <div data-composition-id="scene-title"
       data-start="0"
       data-width="1080"
       data-height="1920"
       style="position:absolute; inset:0; overflow:hidden;">

    <style>
      #scene-title-content {
        width:100%; height:100%;
        padding: var(--pad-top) var(--pad-x) var(--pad-bottom);
        display:flex; flex-direction:column;
        align-items:center; justify-content:center;
        text-align:center; gap:32px;
        box-sizing:border-box;
      }
      #scene-title-content .kicker {
        font-family: var(--mono);
        font-weight: 700;
        font-size: 30px;
        letter-spacing: 6px;
        text-transform: uppercase;
        color: var(--accent-warm);
      }
      #scene-title-content .headline {
        font-family: var(--serif);
        font-weight: 700;
        font-size: 132px;
        line-height: 0.95;
        letter-spacing: -3px;
        color: var(--accent-ink);
        max-width: 960px;
      }
      #scene-title-content .headline .word {
        display: inline-block;
        margin-right: 0.3em;
      }
      #scene-title-content .headline .accent {
        color: var(--accent-warm);
        font-style: italic;
      }
      #scene-title-content .byline {
        font-family: var(--serif);
        font-style: italic;
        font-weight: 400;
        font-size: 36px;
        color: var(--text-secondary);
        max-width: 760px;
        line-height: 1.3;
      }
      #scene-title-content .rule {
        width: 80px; height: 2px;
        background: var(--accent-deep);
        opacity: 0.6;
      }
    </style>

    <div id="scene-title-content">
      <div class="kicker"   id="title-kicker">Edition 01</div>
      <div class="headline" id="title-headline">
        <span class="word">A</span><span class="word accent">thoughtful</span><span class="word">tour.</span>
      </div>
      <div class="rule"     id="title-rule"></div>
      <div class="byline"   id="title-byline">Eight scenes. One warm template. Built for any topic.</div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({ paused: true });

      // Entrance (0 → 2.3s)
      tl.from("#title-kicker",   { y: 16, opacity: 0, duration: 0.5, ease: "power2.out" }, 0);
      tl.from("#scene-title-content .word", {
        y: 40, opacity: 0, duration: 0.7, ease: "power3.out", stagger: 0.18
      }, 0.3);
      tl.from("#title-rule",     { scaleX: 0, opacity: 0, duration: 0.5, ease: "power2.out", transformOrigin: "left center" }, 1.5);
      tl.from("#title-byline",   { y: 16, opacity: 0, duration: 0.5, ease: "power2.out" }, 1.8);

      // Mid-beats — keep the scene visually alive after entrance
      // Beat A (4.5s): accent word emphasis pulse
      tl.to("#scene-title-content .word.accent", { scale: 1.06, duration: 0.4, ease: "power2.out", yoyo: true, repeat: 1 }, 4.5);
      // Beat B (7.5s): rule extends + glows
      tl.to("#title-rule", { scaleX: 2.2, opacity: 0.9, duration: 0.6, ease: "power2.inOut", yoyo: true, repeat: 1 }, 7.5);
      // Beat C (10s): byline italic re-emphasis (scale + color shift via opacity)
      tl.to("#title-byline", { scale: 1.04, color: "var(--accent-deep)", duration: 0.5, ease: "power2.out", yoyo: true, repeat: 1 }, 10);
      // Beat D (12.5s): kicker dot pulse via letter-spacing nudge
      tl.to("#title-kicker", { letterSpacing: "8px", duration: 0.5, ease: "power2.inOut", yoyo: true, repeat: 1 }, 12.5);

      window.__timelines["scene-title"] = tl;
    </script>
  </div>
</template>
