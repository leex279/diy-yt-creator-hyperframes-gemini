<!--
  shared/lib/blocks/hostinger-banner-vertical/block.html
  Mid-video Hostinger sponsorship card for Shorts (1080x1920). Glass
  card centered in the upper half of the frame, animates IN at t=0
  (spring scale + content stagger), HOLDS for ~5.5s with idle icon
  breath, then animates OUT at t=6.5s (scale-down fade) — total
  7-second sub-composition lifetime.

  This is NOT an endcard. The Dynamous endcard is locked into the
  final 5s of every Short (shared/lib/blocks/dynamous-endcard/). Use
  this block earlier in the video — typically as a phase between the
  hook and the body, where the narrator mentions the sponsor.

  CONTENT — locked across all videos:
    Wordmark        : Hostinger (purple-on-glass)
    Headline        : "Try Hostinger"
    Tagline         : "10% OFF with code DIYSMARTCODE"
    Product pills   : Web Hosting / VPS / AI Website Builder
    Discount badge  : 10% OFF (green)
    URL line        : hostinger.com/DIYSMARTCODE

  AFFILIATE DETAILS — locked:
    URL:   hostinger.com/DIYSMARTCODE
    CODE:  DIYSMARTCODE  (10% off, auto-applied via link)

  SOURCE:
    shared/lib/blocks/dynamous-endcard/block.html (sister block —
      identical sub-composition pattern, scoped CSS, self-registered
      timeline, glass card surface, German Werbung disclosure badge,
      content stagger easing)
    templates/long-form/hostinger-sponsored/ (Hostinger brand colors,
      type system, motion eases)
    shared/lib/components/hostinger-banner/ (sibling long-form
      component — content is locked across both, only layout differs)

  REQUIRED TOKENS:
    None. The block inlines the Hostinger purple palette + Manrope
    + JetBrains Mono fonts. The host can override the surface color
    by setting --bg on the [data-composition-id="hostinger-banner-vertical"]
    selector if needed — but the default `transparent` lets the
    underlying composition show through during fly-in / fly-out.

  ASSET COPY (do BEFORE wiring — bundler rejects parent-of-project paths):
    cp shared/logos/hostinger-brand/Hostinger_Horizontal_White.svg \
       videos/<slug>/assets/hostinger-horizontal-white.svg

  See ./recipe.md for full wiring instructions.

  GERMAN AD DISCLOSURE (Werbung):
    Hostinger is a paid affiliate, so the card carries a "Werbung"
    badge in the top-right corner — mirrors dec-werbung in
    shared/lib/blocks/dynamous-endcard/. Do not hide it.
-->
<template id="hostinger-banner-vertical-template">
  <div class="hbv-root" data-composition-id="hostinger-banner-vertical" data-start="0" data-duration="7" data-width="1080" data-height="1920">

    <!-- Glass card -->
    <div class="hbv-card">
      <!-- Werbung disclosure badge -->
      <div class="hbv-werbung">Werbung</div>

      <!-- Hostinger wordmark (white SVG against glass card) -->
      <img class="hbv-wordmark"
           src="../assets/hostinger-horizontal-white.svg"
           alt="Hostinger"
           crossorigin="anonymous" />

      <!-- Sponsor headline -->
      <div class="hbv-headline">Try Hostinger</div>

      <!-- Three product pills (stacked vertically) -->
      <ul class="hbv-products">
        <li>
          <span class="hbv-pill-dot hbv-dot-1"></span>
          <span class="hbv-pill-label">Web Hosting</span>
        </li>
        <li>
          <span class="hbv-pill-dot hbv-dot-2"></span>
          <span class="hbv-pill-label">VPS Hosting</span>
        </li>
        <li>
          <span class="hbv-pill-dot hbv-dot-3"></span>
          <span class="hbv-pill-label">AI Website Builder</span>
        </li>
      </ul>

      <!-- 10% OFF discount badge (green) -->
      <div class="hbv-discount">10% OFF</div>

      <!-- URL pill -->
      <div class="hbv-url-pill">
        <span class="hbv-url-overline">use code</span>
        <span class="hbv-url-code">DIYSMARTCODE</span>
      </div>

      <!-- URL line -->
      <div class="hbv-url">hostinger.com/DIYSMARTCODE</div>
    </div>

    <style>
      .hbv-root {
        position: relative;
        width: 1080px;
        height: 1920px;
        background: var(--bg, transparent);
        font-family: 'Manrope', system-ui, sans-serif;
        overflow: hidden;
      }
      .hbv-card {
        /* Positioned in the upper half of the frame so the card stays clear
           of YouTube's "Watch next" overlay zone (~y=1400+) on Shorts. */
        position: absolute;
        left: 50%;
        top: 280px;
        transform: translateX(-50%);
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 30px;
        padding: 56px 60px;
        width: 920px;
        box-sizing: border-box;
        background: linear-gradient(180deg, rgba(31, 34, 64, 0.92) 0%, rgba(14, 15, 25, 0.95) 100%);
        border: 2px solid rgba(139, 92, 246, 0.45);
        border-radius: 32px;
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        box-shadow:
          0 16px 64px rgba(0, 0, 0, 0.55),
          0 0 100px rgba(103, 61, 230, 0.30),
          inset 0 1px 0 rgba(255, 255, 255, 0.08);
      }
      .hbv-werbung {
        position: absolute;
        top: 20px;
        right: 24px;
        background: #dc2626;
        color: #ffffff;
        font-family: 'Inter', system-ui, sans-serif;
        font-size: 26px;
        font-weight: 800;
        padding: 8px 18px;
        border-radius: 8px;
        letter-spacing: 1.5px;
        text-transform: uppercase;
        z-index: 10;
      }
      .hbv-wordmark {
        width: 540px;
        height: auto;
        display: block;
      }
      .hbv-headline {
        font-size: 60px;
        font-weight: 800;
        color: #ffffff;
        text-align: center;
        letter-spacing: -0.5px;
        line-height: 1.05;
      }
      .hbv-products {
        list-style: none;
        margin: 0;
        padding: 0;
        display: flex;
        flex-direction: column;
        gap: 18px;
        align-self: stretch;
      }
      .hbv-products li {
        display: flex;
        align-items: center;
        gap: 24px;
        padding: 18px 28px;
        font-size: 42px;
        font-weight: 700;
        color: #ffffff;
        line-height: 1.1;
        background: rgba(255, 255, 255, 0.06);
        border: 1px solid rgba(139, 92, 246, 0.25);
        border-radius: 18px;
      }
      .hbv-pill-dot {
        flex-shrink: 0;
        width: 22px;
        height: 22px;
        border-radius: 999px;
        box-shadow: 0 0 18px currentColor;
      }
      .hbv-dot-1 { background: #673de6; color: #673de6; }
      .hbv-dot-2 { background: #8b5cf6; color: #8b5cf6; }
      .hbv-dot-3 { background: #a78bfa; color: #a78bfa; }
      .hbv-pill-label {
        font-family: 'Manrope', system-ui, sans-serif;
        letter-spacing: -0.2px;
      }
      .hbv-discount {
        padding: 14px 36px;
        border-radius: 14px;
        font-family: 'Inter', system-ui, sans-serif;
        font-size: 46px;
        font-weight: 900;
        color: #ffffff;
        letter-spacing: 1.5px;
        background: linear-gradient(135deg, #00c896, #00a878, #00c896);
        background-size: 200% 100%;
        background-position: 0% 0%;
        box-shadow:
          0 4px 24px rgba(0, 200, 150, 0.4),
          0 0 60px rgba(0, 200, 150, 0.20);
      }
      .hbv-url-pill {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 2px;
        padding: 16px 36px;
        border-radius: 16px;
        background: linear-gradient(135deg, #673de6, #8b5cf6);
        box-shadow:
          0 4px 24px rgba(103, 61, 230, 0.45),
          0 0 60px rgba(139, 92, 246, 0.18);
      }
      .hbv-url-overline {
        font-family: 'JetBrains Mono', ui-monospace, monospace;
        font-size: 18px;
        font-weight: 500;
        color: rgba(255, 255, 255, 0.75);
        letter-spacing: 4px;
        text-transform: uppercase;
      }
      .hbv-url-code {
        font-family: 'JetBrains Mono', ui-monospace, monospace;
        font-size: 38px;
        font-weight: 700;
        color: #ffffff;
        letter-spacing: 2px;
      }
      .hbv-url {
        font-family: 'JetBrains Mono', ui-monospace, monospace;
        font-size: 28px;
        font-weight: 600;
        color: #cbd5e1;
        letter-spacing: 1px;
        max-width: 800px;
        word-break: break-all;
        text-align: center;
      }
    </style>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      window.__timelines = window.__timelines || {};
      (function () {
        var tl = gsap.timeline({ paused: true });

        // ── Phase 1: card scale-in 0 → 0.5s ──
        tl.from('.hbv-card',
          { scale: 0.88, opacity: 0, duration: 0.5, ease: "back.out(1.3)" }, 0);
        // Werbung badge eases in alongside the card
        tl.from('.hbv-werbung',
          { opacity: 0, duration: 0.4, ease: "power2.out" }, 0.15);

        // ── Phase 2: content stagger 0.4 → 1.9s ──
        tl.from('.hbv-wordmark',
          { y: 24, opacity: 0, duration: 0.5, ease: "power2.out" }, 0.40);
        tl.from('.hbv-headline',
          { y: 24, opacity: 0, duration: 0.5, ease: "power2.out" }, 0.55);
        // Product rows stagger 0.10s apart
        tl.from('.hbv-products li',
          { x: -28, opacity: 0, duration: 0.45, ease: "power2.out", stagger: 0.10 }, 0.75);
        tl.from('.hbv-discount',
          { scale: 0.5, opacity: 0, duration: 0.55, ease: "back.out(1.8)" }, 1.40);
        tl.from('.hbv-url-pill',
          { scale: 0.9, opacity: 0, duration: 0.5, ease: "back.out(1.4)" }, 1.60);
        tl.from('.hbv-url',
          { y: 10, opacity: 0, duration: 0.4, ease: "power2.out" }, 1.85);

        // ── Phase 3: hold + idle pulses 2.0 → 6.5s ──
        // Subtle gradient shimmer on the green discount badge
        tl.to('.hbv-discount',
          { backgroundPosition: "200% 0%", duration: 4.0, ease: "none" }, 2.0);
        // Idle dot glow pulses (3 yoyo cycles per dot, staggered)
        tl.to('.hbv-dot-1',
          { scale: 1.25, duration: 0.9, ease: "sine.inOut", yoyo: true, repeat: 3 }, 2.2);
        tl.to('.hbv-dot-2',
          { scale: 1.25, duration: 0.9, ease: "sine.inOut", yoyo: true, repeat: 3 }, 2.4);
        tl.to('.hbv-dot-3',
          { scale: 1.25, duration: 0.9, ease: "sine.inOut", yoyo: true, repeat: 3 }, 2.6);
        // Discount badge breath
        tl.to('.hbv-discount',
          { scale: 1.04, duration: 1.1, ease: "sine.inOut", yoyo: true, repeat: 2 }, 2.5);

        // ── Phase 4: card scale-out 6.5 → 7.0s ──
        tl.to('.hbv-card',
          { scale: 0.92, opacity: 0, duration: 0.5, ease: "back.in(1.2)" }, 6.5);

        window.__timelines["hostinger-banner-vertical"] = tl;
      })();
    </script>

  </div>
</template>
