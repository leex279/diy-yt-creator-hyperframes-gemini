<!--
  scene-quote.html — Editorial pull-quote callout (~8s).

  Pattern: oversized opening glyph "" → italic serif quote body
           → ink-rule divider → attribution.
  Self-contained sub-composition with paused timeline at
  window.__timelines["scene-quote"].
-->
<template id="scene-quote-template">
  <div data-composition-id="scene-quote"
       data-start="0"
       data-width="1080"
       data-height="1920"
       style="position:absolute; inset:0; overflow:hidden;">

    <style>
      #scene-quote-content {
        width:100%; height:100%;
        padding: var(--pad-top) var(--pad-x) var(--pad-bottom);
        display:flex; flex-direction:column;
        align-items:center; justify-content:center;
        text-align:center; gap:36px;
        box-sizing:border-box;
      }
      #scene-quote-content .glyph {
        font-family: var(--serif);
        font-weight: 800;
        font-size: 300px;
        line-height: 0.6;
        color: var(--accent-warm);
        opacity: 0.7;
        margin-bottom: -90px;
      }
      #scene-quote-content .body {
        font-family: var(--serif);
        font-style: italic;
        font-weight: 500;
        font-size: 76px;
        line-height: 1.2;
        color: var(--accent-ink);
        max-width: 940px;
        letter-spacing: -0.5px;
      }
      #scene-quote-content .body .em {
        font-style: italic;
        color: var(--accent-warm);
        font-weight: 800;
      }
      #scene-quote-content .body .ch { display: inline-block; opacity: 0; }
      #scene-quote-content .rule {
        width: 160px; height: 3px;
        background: var(--accent-deep);
        opacity: 0.6;
      }
      #scene-quote-content .attrib {
        font-family: var(--mono);
        font-weight: 700;
        font-size: 38px;
        letter-spacing: 4px;
        text-transform: uppercase;
        color: var(--text-secondary);
      }
    </style>

    <div id="scene-quote-content">
      <div class="glyph"  id="quote-glyph">&ldquo;</div>
      <div class="body"   id="quote-body"></div>
      <div class="rule"   id="quote-rule"></div>
      <div class="attrib" id="quote-attrib">&mdash; agentskills.io</div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      // Build per-character spans for typewriter reveal of the quote body.
      // Splits on spaces and keeps "Anthropic" wrapped in .em accent.
      // Deterministic — no Date.now / Math.random.
      const quoteParts = [
        { text: "Originally developed by ", em: false },
        { text: "Anthropic.",                em: true  },
        { text: " Released as an open standard.", em: false },
      ];
      const bodyEl = document.getElementById('quote-body');
      quoteParts.forEach(part => {
        const wrap = document.createElement('span');
        if (part.em) wrap.className = 'em';
        for (const ch of part.text) {
          const s = document.createElement('span');
          s.className = 'ch';
          s.textContent = ch === ' ' ? ' ' : ch;
          wrap.appendChild(s);
        }
        bodyEl.appendChild(wrap);
      });

      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({ paused: true });

      // Entrance — glyph + body container fade in first, then typewriter reveal
      tl.from("#quote-glyph",  { y: -30, opacity: 0, duration: 0.7, ease: "power3.out" }, 0);
      tl.from("#quote-body",   { y: 24,  opacity: 0, duration: 0.6, ease: "power3.out" }, 0.4);

      // Typewriter reveal — chars fade in over ~3.5s (narration "Originally developed by Anthropic" lands 0.5-2.4s)
      tl.to("#scene-quote-content .body .ch", {
        opacity: 1, duration: 0.01, stagger: 0.045
      }, 0.6);

      // "Anthropic" emphasis at scene-rel ~2.5s (when typewriter completes "Anthropic")
      tl.to("#scene-quote-content .body .em", { scale: 1.08, duration: 0.5, ease: "power2.out", yoyo: true, repeat: 1 }, 2.8);

      // Rule + attrib enter after typewriter completes (~4s)
      tl.from("#quote-rule",   { scaleX: 0, opacity: 0, duration: 0.5, ease: "power2.out" }, 4.4);
      tl.from("#quote-attrib", { y: 16, opacity: 0, duration: 0.5, ease: "power2.out" }, 4.7);

      // Rule extends + glows (narration shifts to "open standard")
      tl.to("#quote-rule", { scaleX: 1.8, opacity: 1.0, duration: 0.6, ease: "power2.inOut", yoyo: true, repeat: 1 }, 6.5);
      tl.to("#quote-attrib", { letterSpacing: "6px", color: "var(--accent-deep)", duration: 0.5, ease: "power2.out", yoyo: true, repeat: 1 }, 7.8);

      window.__timelines["scene-quote"] = tl;
    </script>
  </div>
</template>
