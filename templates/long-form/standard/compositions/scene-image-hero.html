<!--
  scene-image-hero.html — Full-bleed photo backdrop with overlay.

  Structure:
    Background: <img> covering 1920x1080 at low opacity, dark gradient overlay on top.
    Foreground: left-aligned overline + headline + body block (max-width 900px).

  Operator drops their own hero image at assets/screenshots/hero-shot.png.
  The lint will warn (not error) about a missing image until the operator
  ships one.
-->
<template id="scene-image-hero-template">
  <div data-composition-id="scene-image-hero"
       data-start="0"
       data-width="1920"
       data-height="1080"
       style="position:absolute; inset:0; overflow:hidden;
              font-family:var(--sans); color:var(--text);">

    <style>
      #scene-image-hero-bg {
        position:absolute; inset:0;
        z-index:0;
      }
      #scene-image-hero-bg img {
        position:absolute; inset:0;
        width:100%; height:100%;
        object-fit:cover;
        opacity:0.18;
        image-rendering:auto;
      }
      #scene-image-hero-bg .overlay-gradient {
        position:absolute; inset:0;
        background: linear-gradient(180deg,
                      rgba(11, 15, 26, 0.55) 0%,
                      rgba(11, 15, 26, 0.78) 100%);
      }
      #scene-image-hero-content {
        position:relative;
        z-index:1;
        width:100%; height:100%;
        padding: var(--pad-top) var(--pad-x) var(--pad-bottom);
        display:flex; flex-direction:column;
        align-items:flex-start; justify-content:center;
        gap:24px;
        box-sizing:border-box;
      }
      #scene-image-hero-content .overline {
        font-family: var(--mono);
        font-weight: 700;
        font-size: 28px;
        letter-spacing: 6px;
        text-transform: uppercase;
        color: var(--accent-1);
      }
      #scene-image-hero-content .headline {
        font-family: var(--sans);
        font-weight: 800;
        font-size: 64px;
        line-height: 1.05;
        letter-spacing: -1px;
        color: var(--text);
        max-width: 900px;
      }
      #scene-image-hero-content .body {
        font-family: var(--sans);
        font-weight: 500;
        font-size: 26px;
        line-height: 1.4;
        color: var(--text-secondary);
        max-width: 900px;
      }
    </style>

    <div id="scene-image-hero-bg">
      <img class="clip"
           id="image-hero-bg-photo"
           data-start="0"
           data-duration="20"
           data-track-index="0"
           src="assets/screenshots/hero-shot.png"
           alt="Hero backdrop" />
      <div class="overlay-gradient"></div>
    </div>

    <div id="scene-image-hero-content">
      <div class="overline" id="image-hero-overline">CONTEXT · LABEL</div>
      <div class="headline" id="image-hero-headline">Headline that earns the hook</div>
      <div class="body"     id="image-hero-body">A two-line body paragraph that grounds the headline. Replace with the spoken-script equivalent for this scene — keep it under 200 characters for legibility at 1080p.</div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({
        paused: true,
        defaults: { ease: "power3.out", duration: 0.6 }
      });

      // Image fades in first, then text rises in stagger.
      tl.from("#image-hero-bg-photo", { opacity: 0, duration: 0.8, ease: "power2.out", immediateRender: false }, 0);
      tl.from(["#image-hero-overline", "#image-hero-headline", "#image-hero-body"],
              { y: 30, opacity: 0, duration: 0.55, ease: "power3.out", stagger: 0.12, immediateRender: false },
              0.4);

      window.__timelines["scene-image-hero"] = tl;
    </script>
  </div>
</template>
