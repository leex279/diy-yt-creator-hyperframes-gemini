<!DOCTYPE html>
<!-- Variant 14 — Marker-emphasis. Same lockup but with bold marker-under on "harness" + "model"
     for stronger visual emphasis on the thesis terms. With 5/2/3 + landscape article. -->
<html lang="en"><head><meta charset="utf-8">
<title>v14 — Anthropic's Playbook (marker emphasis)</title>
<link rel="stylesheet" href="_base.css">
<link rel="stylesheet" href="_hook-styles.css">
</head>
<body>
  <div class="thumb theme-dark">
    <div class="shape-backdrop">
      <img class="s1" src="../assets/shapes/shape1.svg" alt="">
      <img class="s2" src="../assets/shapes/shape2.svg" alt="">
      <img class="s3" src="../assets/shapes/shape3.svg" alt="">
    </div>

    <div class="overline">Anthropic · Claude Code at scale</div>
    <div class="overline-divider"></div>

    <h1 class="hook-title">
      ANTHROPIC'S<br>
      <span class="accent">PLAYBOOK</span>
    </h1>

    <div class="hook-numbers">
      <div class="col"><span class="num n1">5</span><span class="lbl">extension<br>points</span></div>
      <div class="col"><span class="num n2">2</span><span class="lbl">capabilities</span></div>
      <div class="col"><span class="num n3">3</span><span class="lbl">patterns</span></div>
    </div>

    <div class="hook-sub">
      The <span class="accent marker">harness</span> matters<br>
      more than the <span class="accent marker">model</span>.
    </div>

    <div class="hook-from-pill">FROM THE ARTICLE &rarr;</div>

    <div class="hook-article-landscape">
      <img src="../assets/blog/article-header.png" alt="Anthropic: How Claude Code works in large codebases">
    </div>

    <div class="brand"><span class="dot"></span><span>diy-smartcode</span></div>
  </div>
