<!--
  scene-hook-wordmark.html — Hero hook (vertical Shorts adaptation).

  Character-stagger wordmark hero on the deep-navy Dynamous stage.
  Each glyph rises in from below with ~70ms stagger. Wordmark scale-pulses
  subtly during the hold. Optional flame badge top-right (decorative).

  Sized for 1080x1920 — wordmark caps at ~180px so a 4-letter or 9-char
  word wraps onto two lines without overflowing.
-->
<template id="scene-hook-wordmark-template">
  <div data-composition-id="scene-hook-wordmark"
       data-start="0"
       data-width="1080"
       data-height="1920"
       style="position:absolute; inset:0; overflow:hidden;
              font-family:'Montserrat', system-ui, sans-serif; color:var(--ink);">

    <style>
      #scene-hook-content {
        width:100%; height:100%;
        /* safe-zone: top 240 + bottom 640 (mobile UI). Content ends by y=1280 */
        padding: var(--pad-top) var(--pad-x) 640px;
        display:flex; flex-direction:column;
        align-items:flex-start; justify-content:flex-start;
        gap: 18px;
        box-sizing:border-box;
        position: relative;
      }
      #scene-hook-content .eyebrow {
        font-family: 'JetBrains Mono', ui-monospace, monospace;
        font-size: 32px;
        font-weight: 500;
        letter-spacing: 0.32em;
        text-transform: uppercase;
        color: var(--accent-2);
        display: inline-flex;
        align-items: center;
        gap: 20px;
      }
      #scene-hook-content .eyebrow::before {
        content: "";
        display: inline-block;
        width: 60px; height: 2px;
        background: var(--accent-2);
      }
      #scene-hook-content .wordmark {
        font-family: 'Montserrat', system-ui, sans-serif;
        font-weight: 900;
        font-size: 130px;
        line-height: 0.92;
        letter-spacing: -0.04em;
        color: var(--ink);
        display: flex;
        flex-wrap: wrap;
        max-width: 940px;
      }
      #scene-hook-content .wordmark .char {
        display: inline-block;
        will-change: transform, opacity;
        white-space: pre;
      }
      #scene-hook-content .wordmark .accent {
        color: var(--accent);
        text-shadow: 0 0 60px rgba(59, 130, 246, 0.5);
      }
      #scene-hook-flame {
        position: absolute;
        top: 200px; right: 80px;
        filter: drop-shadow(0 0 40px rgba(59, 130, 246, 0.7));
      }
      /* Workshop card — 3D flip-in like long-form scene-workshop-intro.
         1.25x scale (620x612 → 775x680 with center-top crop).
         Absolute-positioned to keep bottom edge at canvas y=1260 (in safe zone). */
      #hook-card-stage {
        position: absolute;
        left: 0; right: 0;
        bottom: 660px;
        display: flex;
        justify-content: center;
        perspective: 1600px;
        transform-style: preserve-3d;
      }
      #hook-card {
        position: relative;
        width: 775px;
        height: 680px;
        border-radius: 32px;
        overflow: hidden;
        background: #0B0E16;
        border: 1px solid rgba(96, 165, 250, 0.25);
        box-shadow:
          0 30px 80px rgba(0, 0, 0, 0.55),
          0 0 60px rgba(59, 130, 246, 0.18);
        transform-style: preserve-3d;
        backface-visibility: hidden;
      }
      #hook-card img {
        position: absolute;
        inset: 0;
        width: 100%; height: 100%;
        object-fit: cover;
        object-position: center top;
      }
      #hook-card::after {
        content: "";
        position: absolute; inset: 0;
        background: linear-gradient(180deg, transparent 0%, rgba(7, 9, 15, 0.18) 60%, rgba(7, 9, 15, 0.55) 100%);
        pointer-events: none;
      }
      #hook-card-badge {
        position: absolute;
        top: 22px; right: 22px;
        z-index: 5;
        padding: 10px 18px;
        border-radius: 9999px;
        background: linear-gradient(135deg, var(--accent), var(--accent-2));
        color: #051026;
        font-family: 'JetBrains Mono', ui-monospace, monospace;
        font-weight: 700;
        font-size: 18px;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        box-shadow: 0 6px 20px rgba(14, 165, 233, 0.45);
      }
      #hook-card-ring {
        position: absolute;
        inset: -16px;
        border-radius: 40px;
        border: 2px solid var(--accent-2);
        box-shadow: 0 0 50px rgba(14, 165, 233, 0.4);
        pointer-events: none;
      }
    </style>

    <div id="scene-hook-content">
      <div id="scene-hook-flame">
        <svg width="100" height="125" viewBox="0 0 80 100" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <defs>
            <linearGradient id="flame-grad-hook-short" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" stop-color="#60A5FA"/>
              <stop offset="100%" stop-color="#3B82F6"/>
            </linearGradient>
          </defs>
          <path d="M40 6 C 24 30, 16 52, 16 70 C 16 87, 28 96, 40 96 C 52 96, 64 87, 64 70 C 64 52, 56 30, 40 6 Z"
                fill="url(#flame-grad-hook-short)" stroke="#2563EB" stroke-width="1.5"/>
        </svg>
      </div>

      <div class="eyebrow" id="hook-eyebrow">WORKSHOP &middot; DYNAMOUS</div>

      <div class="wordmark" id="hook-wordmark">
        <span class="char">D</span><span class="char">O</span><span class="char">E</span><span class="char">S</span><span class="char">N</span><span class="char">&rsquo;</span><span class="char">T</span><span class="char"> </span><span class="char accent">S</span><span class="char accent">C</span><span class="char accent">A</span><span class="char accent">L</span><span class="char accent">E</span><span class="char">.</span>
      </div>

      <div id="hook-card-stage">
        <div id="hook-card" style="opacity:0;visibility:hidden;">
          <img src="assets/screenshots/workshop-event.png" alt="Workshop event" crossorigin="anonymous" />
          <div id="hook-card-badge">COMMUNITY &middot; LIVE</div>
          <div id="hook-card-ring" data-layout-allow-overflow style="opacity:0;visibility:hidden;"></div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({ paused: true });

      // Hidden-until-reveal pattern (step-by-step-reveal rule)
      tl.set("#hook-eyebrow",        { autoAlpha: 0 }, 0);
      tl.set("#hook-wordmark .char", { autoAlpha: 0, y: 120 }, 0);
      tl.set("#scene-hook-flame",    { autoAlpha: 0, scale: 0, rotation: -18 }, 0);

      // Workshop card — 3D flipped-away pose at t=0 (mirrors long-form pattern)
      tl.set("#hook-card",
        { x: 80, y: 20, scale: 0.85, rotation: -8, rotationY: -85, rotationX: 8, transformOrigin: "50% 50%" }, 0);
      tl.set("#hook-card-ring", { scale: 1.12, rotationY: -60 }, 0);

      // Entrance — eyebrow → character stagger → flame → subline
      tl.to("#hook-eyebrow",
        { y: 0, autoAlpha: 1, duration: 0.5, ease: "power2.out" }, 0.15);

      tl.to("#hook-wordmark .char",
        { y: 0, autoAlpha: 1, duration: 0.5, ease: "power3.out",
          stagger: { each: 0.045, from: "start" } }, 0.4);

      tl.to("#scene-hook-flame",
        { scale: 1, autoAlpha: 1, rotation: 0, duration: 0.7, ease: "back.out(1.6)" }, 1.0);

      // Workshop card 3D flip-in — long-form pattern adapted to vertical
      tl.to("#hook-card",
        { autoAlpha: 1, duration: 0.2, ease: "power1.out" }, 2.0);
      tl.to("#hook-card",
        { rotationY: 0, rotationX: 0, duration: 1.0, ease: "power3.out" }, 2.0);
      tl.to("#hook-card",
        { x: 0, y: 0, scale: 1, rotation: 2.2, duration: 0.95, ease: "back.out(1.4)" }, 2.15);

      // Highlight ring lands after card settles
      tl.to("#hook-card-ring",
        { autoAlpha: 0.9, scale: 1, rotationY: 0, duration: 0.55, ease: "power2.out" }, 3.0);
      tl.to("#hook-card-ring",
        { autoAlpha: 0.45, duration: 1.0, ease: "sine.inOut", yoyo: true, repeat: 1 }, 3.8);

      // Subtle 3D parallax tilt after card lands — adds depth
      tl.to("#hook-card",
        { rotationY: -3, rotationX: 1.5, duration: 1.2, ease: "sine.inOut", yoyo: true, repeat: 1 }, 4.2);

      // Wordmark scale-pulse on the final hold
      tl.to("#hook-wordmark",
        { scale: 1.02, duration: 0.9, ease: "sine.inOut", yoyo: true, repeat: 1 }, 5.4);

      tl.set({}, {}, 6.52);
      window.__timelines["scene-hook-wordmark"] = tl;
    </script>
  </div>
</template>
