<!--
  shared/lib/components/checkbox-tick/component.html
  Animated SVG checkbox getting checked. 60×60px rounded square with border
  and slight background. Animation sequence:
    at+0.00  — box scale pulse (0.95 → 1.05 → 1.0) over 0.15s
    at+0.15  — checkmark draws via stroke-dashoffset over 0.3s
    at+0.45  — green flash: box bg pulses to accent color for 0.2s then back
    at+0.60  — optional label fades + slides up next to checkbox

  SOURCE: original — no template source.

  COMPONENT IS PASTE-IN — split into three sections below. Merge each
  section into the matching part of your host composition's HTML.

  ──────────────────────────────────────────────────────────────────────
  HOW TO USE
  ──────────────────────────────────────────────────────────────────────

  1) HTML — paste this element wherever the checkbox should appear.
     Put the label text in .ct-label (data-slot attribute is a hint for
     operators to know this is the text injection point).
-->

<div class="checkbox-tick" id="cb-1">
  <svg class="ct-box" viewBox="0 0 60 60" width="60" height="60" aria-hidden="true">
    <!-- Rounded square background + border -->
    <rect class="ct-rect" x="3" y="3" width="54" height="54" rx="12" ry="12"/>
    <!-- Checkmark path: classic V-shape -->
    <path class="ct-check" d="M14 31 L25 42 L46 19"/>
  </svg>
  <span class="ct-label" data-slot>Task completed</span>
</div>

<!--
  2) CSS — merge into your composition's <style> block.
-->

<style>
  /* shared/lib/components/checkbox-tick — keep this comment block */
  .checkbox-tick {
    display: inline-flex;
    align-items: center;
    gap: 18px;
    line-height: 1;
  }

  .ct-box {
    flex-shrink: 0;
    will-change: transform;
    overflow: visible;
  }

  .ct-rect {
    fill: rgba(255,255,255,0.04);
    stroke: var(--check, #69F0AE);
    stroke-width: 2.5;
    /* background flash color is animated via fill in JS */
  }

  .ct-check {
    fill: none;
    stroke: var(--check, #69F0AE);
    stroke-width: 4.5;
    stroke-linecap: round;
    stroke-linejoin: round;
    /* dashoffset animates from totalLength → 0 on tick */
  }

  .ct-label {
    font-family: var(--font-sans, 'Inter', sans-serif);
    font-size: inherit;
    font-weight: inherit;
    color: inherit;
    opacity: 0;          /* hidden until reveal; JS drives this */
    transform: translateY(8px);
    will-change: opacity, transform;
    display: inline-block;
  }
</style>

<!--
  3) JS — call addCheckboxTick() from the host root timeline.

  SIGNATURE:
    addCheckboxTick(tl, sel, at, opts)

  PARAMETERS:
    tl          — a paused gsap.timeline
    sel         — CSS selector resolving to ONE .checkbox-tick element
    at          — insertion time on tl (seconds)
    opts        — optional config object:
      duration  = 0.7   total animation envelope (box settle + tick draw + flash)
      color     = 'var(--check, #69F0AE)'  checkmark + border color

  USAGE EXAMPLES:
    addCheckboxTick(tl, "#cb-1", P4 + 1.0);
    addCheckboxTick(tl, "#cb-1", P4 + 1.0, { color: '#4FC3F7' });

  SFX COUPLING:
    Wire two SFX — pop (box settle) + spring-pop (tick punch):
    <audio id="sfx-cb-pop" class="clip" src="assets/sfx/pop.mp3"
           data-start="<at+0.0>" data-duration="0.52" data-track-index="3" data-volume="0.10"></audio>
    <audio id="sfx-cb-spring" class="clip" src="assets/sfx/spring-pop.mp3"
           data-start="<at+0.15>" data-duration="0.52" data-track-index="4" data-volume="0.11"></audio>

  CONSTRAINTS:
    - ct-check path length is measured at call time via getTotalLength().
    - Color override applies to both .ct-rect stroke and .ct-check stroke at call time.
    - .ct-label opacity starts at 0 (set by CSS). JS reveals it at at+0.6.
    - Green flash animates the fill of .ct-rect (not a separate overlay element).
    - Works at any scale; box is sized at 60×60 in SVG units but scales with CSS.
-->

<script>
  function addCheckboxTick(tl, sel, at, opts) {
    opts = opts || {};
    var duration = opts.duration !== undefined ? opts.duration : 0.7;
    var color    = opts.color    !== undefined ? opts.color    : 'var(--check, #69F0AE)';

    var root  = document.querySelector(sel);
    if (!root) return;
    var box   = root.querySelector('.ct-box');
    var rect  = root.querySelector('.ct-rect');
    var check = root.querySelector('.ct-check');
    var label = root.querySelector('.ct-label');
    if (!box || !rect || !check) return;

    // Apply color override
    rect.style.stroke  = color;
    check.style.stroke = color;

    // Measure checkmark path length
    var checkLen = check.getTotalLength ? check.getTotalLength() : 60;

    // Set initial state: check hidden, label hidden (already 0 via CSS)
    gsap.set(check, { strokeDasharray: checkLen, strokeDashoffset: checkLen });
    gsap.set(box,   { scale: 1, transformOrigin: '50% 50%' });
    if (label) gsap.set(label, { opacity: 0, y: 8 });

    // Phase 1: box scale pulse — 0.95 → 1.05 → 1.0 over 0.15s
    tl.to(box, {
      scale: 0.95,
      duration: 0.07,
      ease: 'power2.in',
      transformOrigin: '50% 50%'
    }, at);
    tl.to(box, {
      scale: 1.05,
      duration: 0.08,
      ease: 'power2.out',
      transformOrigin: '50% 50%'
    }, at + 0.07);
    tl.to(box, {
      scale: 1.0,
      duration: 0.07,
      ease: 'power2.inOut',
      transformOrigin: '50% 50%'
    }, at + 0.15);

    // Phase 2: checkmark draw via stroke-dashoffset at at+0.15
    tl.to(check, {
      strokeDashoffset: 0,
      duration: 0.3,
      ease: 'power2.out'
    }, at + 0.15);

    // Phase 3: green flash — rect fill pulses to accent then back at at+0.45
    tl.to(rect, {
      fill: color,
      fillOpacity: 0.22,
      duration: 0.1,
      ease: 'power1.in'
    }, at + 0.45);
    tl.to(rect, {
      fill: 'rgba(255,255,255,0.04)',
      fillOpacity: 1,
      duration: 0.15,
      ease: 'power1.out'
    }, at + 0.55);

    // Phase 4: label fade-up at at+0.6
    if (label) {
      tl.to(label, {
        opacity: 1,
        y: 0,
        duration: 0.3,
        ease: 'power2.out'
      }, at + 0.6);
    }
  }
</script>
