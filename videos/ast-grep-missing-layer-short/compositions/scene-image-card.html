<!--
  scene-image-card.html — Image with caption (~13s).

  Pattern: kicker → image card (operator drops PNG into assets/, the
           bare template ships with an inline SVG placeholder) → caption
           with attribution. Demonstrates how to frame visual assets.
  Self-contained sub-composition with paused timeline at
  window.__timelines["scene-image-card"].
-->
<template id="scene-image-card-template">
  <div data-composition-id="scene-image-card"
       data-start="0"
       data-width="1080"
       data-height="1920"
       style="position:absolute; inset:0; overflow:hidden;">

    <style>
      #scene-image-card-content {
        width:100%; height:100%;
        padding: var(--pad-top) var(--pad-x) var(--pad-bottom);
        display:flex; flex-direction:column;
        align-items:center; justify-content:center;
        text-align:center; gap:32px;
        box-sizing:border-box;
      }
      #scene-image-card-content .kicker {
        font-family: 'JetBrains Mono', ui-monospace, monospace;
        font-weight: 700;
        font-size: 30px;
        letter-spacing: 5px;
        text-transform: uppercase;
        color: var(--accent-warm);
      }
      #scene-image-card-content .frame {
        position: relative;
        width: 920px;
        height: 920px;
        border-radius: 28px;
        overflow: hidden;
        background: var(--bg-card);
        border: 6px solid var(--accent-ink);
        box-shadow: var(--shadow-warm);
      }
      #scene-image-card-content .frame .placeholder {
        width: 100%; height: 100%;
        display: block;
      }
      #scene-image-card-content .badge {
        position: absolute;
        top: 24px; left: 24px;
        padding: 10px 22px;
        background: var(--accent-warm);
        color: var(--text-on-warm);
        font-family: 'JetBrains Mono', ui-monospace, monospace;
        font-weight: 700;
        font-size: 24px;
        letter-spacing: 3px;
        text-transform: uppercase;
        border-radius: 999px;
      }
      #scene-image-card-content .caption {
        font-family: 'Source Serif 4', Georgia, serif;
        font-style: italic;
        font-weight: 400;
        font-size: 36px;
        line-height: 1.3;
        color: var(--text);
        max-width: 880px;
      }
      #scene-image-card-content .attribution {
        font-family: 'JetBrains Mono', ui-monospace, monospace;
        font-weight: 600;
        font-size: 24px;
        letter-spacing: 3px;
        text-transform: uppercase;
        color: var(--text-secondary);
      }
    </style>

    <div id="scene-image-card-content">
      <div class="kicker" id="ic-kicker">Visual Asset</div>
      <div class="frame" id="ic-frame">
        <!-- Inline SVG placeholder — operator replaces with <img src="assets/screenshot.png"> -->
        <svg class="placeholder" viewBox="0 0 920 920" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid slice">
          <defs>
            <linearGradient id="ic-grad" x1="0" y1="0" x2="1" y2="1">
              <stop offset="0%"  stop-color="#F2CC8F"/>
              <stop offset="50%" stop-color="#E07A5F"/>
              <stop offset="100%" stop-color="#3D5A80"/>
            </linearGradient>
          </defs>
          <rect width="920" height="920" fill="url(#ic-grad)"/>
          <circle cx="280" cy="280" r="180" fill="#FBF7EF" opacity="0.18"/>
          <rect x="500" y="180" width="320" height="200" rx="24" fill="#FBF7EF" opacity="0.22"/>
          <rect x="180" y="540" width="560" height="60" rx="12" fill="#FBF7EF" opacity="0.30"/>
          <rect x="180" y="620" width="380" height="40" rx="8"  fill="#FBF7EF" opacity="0.22"/>
          <rect x="180" y="680" width="460" height="40" rx="8"  fill="#FBF7EF" opacity="0.22"/>
          <rect x="180" y="740" width="320" height="40" rx="8"  fill="#FBF7EF" opacity="0.22"/>
        </svg>
        <span class="badge" id="ic-badge">SCREENSHOT</span>
      </div>
      <div class="caption" id="ic-caption">Drop a PNG into <strong>assets/</strong> &mdash; the frame stays the same.</div>
      <div class="attribution" id="ic-attrib">your-source.com</div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({ paused: true });

      // Entrance
      tl.from("#ic-kicker",   { y: 16, opacity: 0, duration: 0.5, ease: "power2.out" }, 0);
      tl.from("#ic-frame",    { scale: 0.9, opacity: 0, duration: 0.7, ease: "back.out(1.4)" }, 0.3);
      tl.from("#ic-badge",    { x: -20, opacity: 0, duration: 0.5, ease: "power2.out" }, 0.9);
      tl.from("#ic-caption",  { y: 16, opacity: 0, duration: 0.5, ease: "power2.out" }, 1.2);
      tl.from("#ic-attrib",   { y: 12, opacity: 0, duration: 0.4, ease: "power2.out" }, 1.5);

      // Mid-beats
      tl.to("#ic-badge", { scale: 1.08, duration: 0.4, ease: "back.out(2)", yoyo: true, repeat: 1 }, 4.0);
      tl.to("#ic-frame", { scale: 1.015, duration: 0.6, ease: "power2.inOut", yoyo: true, repeat: 1 }, 6.0);
      tl.to("#ic-caption", { scale: 1.04, color: "var(--accent-warm)", duration: 0.5, ease: "power2.out", yoyo: true, repeat: 1 }, 8.0);
      tl.to("#ic-attrib", { letterSpacing: "5px", duration: 0.5, ease: "power2.inOut", yoyo: true, repeat: 1 }, 10.0);
      tl.to("#ic-badge", { scale: 1.06, duration: 0.4, ease: "power2.out", yoyo: true, repeat: 1 }, 12.0);

      window.__timelines["scene-image-card"] = tl;
    </script>
  </div>
</template>
