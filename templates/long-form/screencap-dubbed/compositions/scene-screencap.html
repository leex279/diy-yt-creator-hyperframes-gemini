<!--
  scene-screencap.html — Full-bleed screen-recording scene (the bulk of the
  runtime, typically 90-95% of the recording).

  WHAT THIS SCENE DOES
  --------------------
  This is the canvas-filling shell that holds the operator's screen recording
  (the user navigating a real website, an app, or any silent screen capture).
  The recording is muted; the AI-voice narration plays separately on the root
  composition's audio element. The result: a real screen capture with a
  clean dubbed voiceover and no human voice in the output.

  HARD RULE — MEDIA ELEMENT WIRING
  --------------------------------
  When operator drops their recording, they REPLACE the placeholder div below
  with a video media element. The full snippet lives in README.md under
  "Wiring your screen recording". Two non-negotiables:

    1. The media element MUST have the `muted` attribute. The original audio
       is discarded — TTS replaces it. Without `muted`, autoplay is blocked
       AND the two audio tracks overlap.
    2. The media element does NOT take class="clip" or any data-* attributes.
       The scene wrapper in index.html owns timing; the media element just
       plays once the scene becomes visible.

  Step-callout pills are optional. Operator wires them per video by adding
  step-pill divs and tl.from() reveals anchored to TTS word timestamps in
  transcript.json.
-->
<template id="scene-screencap-template">
  <div data-composition-id="scene-screencap"
       data-start="0"
       data-width="1920"
       data-height="1080"
       style="position:absolute; inset:0; overflow:hidden;
              background: #000;">

    <style>
      #screencap-frame {
        position: absolute;
        inset: 0;
        width: 1920px;
        height: 1080px;
        overflow: hidden;
        background: #000;
      }
      #screencap-frame video {
        width: 100%;
        height: 100%;
        object-fit: contain;
        display: block;
      }

      /* Placeholder slate — visible until operator wires a real media
         element. Render does NOT hard-fail on this because no media tag
         is present pointing at a missing source. */
      #screencap-placeholder {
        width: 100%; height: 100%;
        display: flex; align-items: center; justify-content: center;
        flex-direction: column; gap: 24px;
        background: linear-gradient(135deg,
                      rgba(6, 182, 212, 0.10),
                      rgba(139, 92, 246, 0.06));
        font-family: var(--mono);
        color: var(--text-secondary);
        text-align: center;
        padding: 0 80px;
      }
      #screencap-placeholder .pill {
        font-weight: 700;
        font-size: 22px;
        letter-spacing: 4px;
        text-transform: uppercase;
        padding: 14px 28px;
        border-radius: 999px;
        border: 1.5px solid var(--border-bright);
        color: var(--text);
        background: rgba(255, 255, 255, 0.04);
      }
      #screencap-placeholder .hint {
        font-weight: 500;
        font-size: 26px;
        letter-spacing: 1.5px;
        max-width: 1100px;
        line-height: 1.4;
        color: var(--text-secondary);
      }
      #screencap-placeholder code {
        font-family: var(--mono);
        font-size: 22px;
        background: rgba(255, 255, 255, 0.06);
        border: 1px solid var(--border);
        padding: 4px 10px;
        border-radius: 6px;
        color: var(--text);
      }

      /* Optional step-callout pill — operator clones per step.
         Pinned bottom-left to clear app UI and the subtitle area. */
      .step-pill {
        position: absolute;
        bottom: 60px;
        left: 60px;
        max-width: 720px;
        padding: 16px 28px;
        border-radius: 14px;
        background: rgba(15, 23, 42, 0.78);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border: 1.5px solid var(--border-bright);
        font-family: var(--mono);
        font-weight: 700;
        font-size: 28px;
        letter-spacing: 1px;
        color: var(--text);
        box-shadow: 0 12px 32px rgba(0, 0, 0, 0.45);
      }
      .step-pill .num {
        display: inline-block;
        margin-right: 14px;
        padding: 4px 10px;
        border-radius: 6px;
        background: var(--accent-1);
        color: #061224;
        font-weight: 800;
        letter-spacing: 0.5px;
      }
    </style>

    <div id="screencap-frame">
      <!-- Placeholder slate — operator REPLACES this div with the media
           snippet from README.md once assets/clips/recording.mp4 is in place. -->
      <div id="screencap-placeholder">
        <div class="pill">Drop your screen recording</div>
        <div class="hint">
          Save your silent (or original-voice) screen capture to
          <code>assets/clips/recording.mp4</code>, then replace this placeholder
          with the muted &lt;video&gt; element snippet in README.md.
        </div>
      </div>

      <!-- Optional step-callout pills go here. Operator clones the .step-pill
           markup pattern per step, anchored to TTS word timestamps:
             div class="step-pill" id="step-pill-1"
               span class="num" 01 close-span Open the signup page
             close-div
           Style is pre-wired (see <style> block above). Reveal each pill with a
           tl.from() in this scene's timeline, using transcript.json word starts
           as the position parameter. -->
    </div>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({ paused: true });

      // No entrance animation on the screencap itself — the scene fades in
      // via the root timeline's crossfadeScenes() call. The recording plays
      // from frame 0 of its own duration the moment the scene becomes visible.
      //
      // Per-video, add step-pill reveals here, anchored to transcript word
      // timestamps. Example:
      //   tl.from("#step-pill-1", { y: 24, opacity: 0, duration: 0.5,
      //                             ease: "back.out(1.4)",
      //                             immediateRender: false },
      //           transcript.words[<idx>].start);
      //
      // For long scenes (> 5s tween position), keep immediateRender:false
      // so elements stay hidden until their reveal fires — long-form gotcha.

      window.__timelines["scene-screencap"] = tl;
    </script>
  </div>
</template>
