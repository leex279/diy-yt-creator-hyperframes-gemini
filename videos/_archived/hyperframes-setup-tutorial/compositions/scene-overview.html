<!--
  scene-overview.html — image-hero variant. Hyperframes docs page as backdrop.
  Pattern: CSS opacity:0 on animated elements + tl.fromTo() animations.
-->
<template id="scene-overview-template">
  <div data-composition-id="scene-overview"
       data-start="0"
       data-width="1920"
       data-height="1080"
       style="position:absolute; inset:0; overflow:hidden;
              font-family:var(--sans); color:var(--text);">

    <style>
      #scene-overview-bg { position:absolute; inset:0; z-index:0; }
      #scene-overview-bg img {
        position:absolute; inset:0;
        width:100%; height:100%;
        object-fit:cover;
        opacity:0;
      }
      #scene-overview-bg .overlay {
        position:absolute; inset:0;
        background: linear-gradient(180deg,
                      rgba(11, 15, 26, 0.55) 0%,
                      rgba(11, 15, 26, 0.85) 100%);
      }
      #scene-overview-content {
        position:relative; z-index:1;
        width:100%; height:100%;
        padding: var(--pad-top) var(--pad-x) var(--pad-bottom);
        display:flex; flex-direction:column;
        align-items:flex-start; justify-content:center;
        gap: 24px; box-sizing:border-box;
      }
      #scene-overview-content .overline {
        font-family: var(--mono); font-weight: 700;
        font-size: 28px; letter-spacing: 6px;
        text-transform: uppercase; color: var(--accent-1);
        opacity: 0;
      }
      #scene-overview-content .headline {
        font-family: var(--sans); font-weight: 800;
        font-size: 64px; line-height: 1.05;
        letter-spacing: -1px; color: var(--text);
        max-width: 1100px;
        opacity: 0;
      }
      #scene-overview-content .body {
        font-family: var(--sans); font-weight: 500;
        font-size: 28px; line-height: 1.45;
        color: var(--text-secondary); max-width: 1100px;
        opacity: 0;
      }
      #scene-overview-content .url-pill {
        display: inline-flex; align-items: center; gap: 12px;
        margin-top: 8px;
        padding: 14px 26px; border-radius: 999px;
        background: rgba(59, 130, 246, 0.16);
        border: 1.5px solid rgba(59, 130, 246, 0.55);
        font-family: var(--mono); font-weight: 700;
        font-size: 24px; letter-spacing: 0.5px;
        color: var(--accent-1);
        opacity: 0;
      }
      #scene-overview-content .url-pill::before { content: "🔗"; font-size: 20px; }
    </style>

    <div id="scene-overview-bg">
      <img id="overview-bg-photo"
           src="assets/screenshots/hyperframes-docs.png"
           alt="HyperFrames quickstart docs" />
      <div class="overlay"></div>
    </div>

    <div id="scene-overview-content">
      <div class="overline" id="overview-overline">FOLLOW-UP &middot; FULL WALKTHROUGH</div>
      <div class="headline" id="overview-headline">Last video compared the frameworks. This one installs them &mdash; end to end.</div>
      <div class="body" id="overview-body">Every step verified on Windows and on Linux. The official quickstart lives at the URL below &mdash; we go slower, with real screenshots, and call out the OS-specific differences as we hit them.</div>
      <div class="url-pill" id="overview-url">hyperframes.heygen.com/quickstart</div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({ paused: true, defaults: { ease: "power3.out" } });

      tl.fromTo("#overview-bg-photo", { opacity: 0 },              { opacity: 0.22, duration: 0.9, ease: "power2.out" }, 0);
      tl.fromTo("#overview-overline", { y: 24, opacity: 0 },       { y: 0, opacity: 1, duration: 0.5, ease: "power2.out" }, 0.4);
      tl.fromTo("#overview-headline", { y: 36, opacity: 0 },       { y: 0, opacity: 1, duration: 0.7 }, 0.7);
      tl.fromTo("#overview-body",     { y: 24, opacity: 0 },       { y: 0, opacity: 1, duration: 0.6 }, 1.2);
      tl.fromTo("#overview-url",      { y: 20, scale: 0.92, opacity: 0 }, { y: 0, scale: 1, opacity: 1, duration: 0.55, ease: "back.out(1.5)" }, 1.7);

      window.__timelines["scene-overview"] = tl;
    </script>
  </div>
</template>
