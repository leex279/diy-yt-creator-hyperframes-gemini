<!--
  scene-quote-skeptic.html — community theme #2, skeptic question (~13s).
-->
<template id="scene-quote-skeptic-template">
  <div data-composition-id="scene-quote-skeptic"
       data-start="0"
       data-width="1080"
       data-height="1920"
       style="position:absolute; inset:0; overflow:hidden;">

    <style>
      #scene-quote-skeptic-content {
        width:100%; height:100%;
        padding: var(--pad-top) var(--pad-x) var(--pad-bottom);
        display:flex; flex-direction:column;
        align-items:center; justify-content:center;
        text-align:center; gap:36px;
        box-sizing:border-box;
      }
      #scene-quote-skeptic-content .glyph {
        font-family: var(--serif);
        font-weight: 900;
        font-size: 320px;
        line-height: 0.6;
        color: #FFFFFF;
        opacity: 0.85;
        margin-bottom: -80px;
      }
      #scene-quote-skeptic-content .body {
        font-family: var(--serif);
        font-weight: 700;
        font-size: 76px;
        line-height: 1.15;
        color: var(--accent-ink);
        max-width: 920px;
        letter-spacing: -1px;
      }
      #scene-quote-skeptic-content .body .em {
        color: var(--accent-warm);
        font-weight: 900;
      }
      #scene-quote-skeptic-content .rule {
        width: 140px; height: 3px;
        background: var(--accent-warm);
        opacity: 0.9;
      }
      #scene-quote-skeptic-content .attrib {
        font-family: 'JetBrains Mono', ui-monospace, monospace;
        font-weight: 700;
        font-size: 34px;
        letter-spacing: 3px;
        text-transform: uppercase;
        color: rgba(255, 255, 255, 0.8);
      }
    </style>

    <div id="scene-quote-skeptic-content">
      <div class="glyph"  id="qs-glyph">&ldquo;</div>
      <div class="body"   id="qs-body">
        Is this just /plan and /review with <span class="em">nicer ergonomics?</span>
      </div>
      <div class="rule"   id="qs-rule"></div>
      <div class="attrib" id="qs-attrib">&mdash; the comparison question</div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({ paused: true });

      tl.from("#qs-glyph",  { y: -30, opacity: 0, duration: 0.7, ease: "power3.out" }, 0);
      tl.from("#qs-body",   { y: 30,  opacity: 0, duration: 0.8, ease: "power3.out" }, 0.4);
      tl.from("#qs-rule",   { scaleX: 0, opacity: 0, duration: 0.5, ease: "power2.out" }, 1.4);
      tl.from("#qs-attrib", { y: 16,  opacity: 0, duration: 0.5, ease: "power2.out" }, 1.7);

      tl.to("#scene-quote-skeptic-content .body .em", { scale: 1.06, duration: 0.5, ease: "power2.out", yoyo: true, repeat: 1 }, 5);
      tl.to("#qs-rule", { scaleX: 1.8, opacity: 1.0, duration: 0.6, ease: "power2.inOut", yoyo: true, repeat: 1 }, 8);
      tl.to("#qs-glyph", { scale: 1.08, opacity: 0.85, duration: 0.6, ease: "power2.inOut", yoyo: true, repeat: 1 }, 10.5);

      window.__timelines["scene-quote-skeptic"] = tl;
    </script>
  </div>
</template>
