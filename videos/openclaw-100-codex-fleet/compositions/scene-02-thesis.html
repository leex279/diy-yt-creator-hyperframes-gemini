<!--
  scene-02-thesis.html — The thesis quote (29.9s, comp-time 30.85-60.74).

  Quote-card pattern. Centered hero quote with attribution chip + marker
  highlight under "tokens don't matter".

  Word anchors (scene-internal time, subtract 30.847 from comp-time):
    0      "Here's the question..."
    3.6    "Quote." (announcing the quote)
    4.2    "How would we build software"
    7.7    "tokens don't matter?" (key phrase) — narration says this around 7.7s
    9.9    "That's the line."
-->
<template id="scene-02-thesis-template">
  <div data-composition-id="scene-02-thesis"
       data-start="0"
       data-width="1920"
       data-height="1080"
       style="position:absolute; inset:0; overflow:hidden;
              font-family: 'Inter', system-ui, sans-serif; color:var(--text);">

    <style>
      #s02-content {
        width:100%; height:100%;
        padding: var(--pad-top) var(--pad-x) var(--pad-bottom);
        display:flex; flex-direction:column;
        align-items:center; justify-content:center;
        text-align:center; gap: 36px;
        box-sizing:border-box;
      }
      #s02-overline {
        font-family: 'JetBrains Mono', ui-monospace, monospace;
        font-weight: 700;
        font-size: 26px;
        letter-spacing: 6px;
        text-transform: uppercase;
        color: var(--accent-2);
      }
      #s02-quote-card {
        max-width: 1500px;
        padding: 64px 80px;
        border-radius: 28px;
        background: linear-gradient(135deg, rgba(201, 42, 42, 0.10) 0%, rgba(201, 42, 42, 0.02) 100%);
        border: 1.5px solid var(--border-bright);
        box-shadow: 0 30px 80px rgba(0, 0, 0, 0.6);
        display:flex; flex-direction:column; gap: 24px; align-items:flex-start;
        text-align:left;
      }
      #s02-quote-mark {
        font-family: 'Inter', system-ui, sans-serif;
        font-weight: 900;
        font-size: 140px;
        line-height: 0.7;
        color: var(--accent-1);
        opacity: 0.6;
      }
      #s02-quote-text {
        font-family: 'Inter', system-ui, sans-serif;
        font-weight: 800;
        font-size: 76px;
        line-height: 1.1;
        letter-spacing: -1.5px;
        color: var(--text);
      }
      .s02-mark-wrap {
        position: relative;
        display: inline-block;
      }
      #s02-mark-bar {
        position: absolute;
        left: 0; right: 0;
        bottom: -8px;
        height: 10px;
        background: var(--accent-1);
        border-radius: 5px;
        transform-origin: left center;
        transform: scaleX(0);
      }
      #s02-attribution {
        display:flex; align-items:center; gap: 16px;
        margin-top: 8px;
        padding: 12px 22px;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.05);
        border: 1px solid var(--border-bright);
      }
      #s02-attribution .av {
        width: 36px; height: 36px;
        border-radius: 50%;
        background: linear-gradient(135deg, var(--accent-1) 0%, var(--accent-1-lo) 100%);
        display:flex; align-items:center; justify-content:center;
        font-family: 'Inter', system-ui, sans-serif; font-weight: 900; font-size: 14px;
        color: var(--text);
      }
      #s02-attribution .handle {
        font-family: 'JetBrains Mono', ui-monospace, monospace;
        font-weight: 700;
        font-size: 22px;
        letter-spacing: 1px;
        color: var(--accent-2);
      }
      #s02-attribution .meta {
        font-family: 'JetBrains Mono', ui-monospace, monospace;
        font-weight: 500;
        font-size: 18px;
        letter-spacing: 1px;
        color: var(--text-secondary);
      }
      #s02-subline {
        font-family: 'Inter', system-ui, sans-serif;
        font-weight: 600;
        font-size: 32px;
        color: var(--text-secondary);
        max-width: 1300px;
        text-align: center;
        line-height: 1.4;
        display: flex;
        flex-direction: column;
        gap: 6px;
      }
      .s02-sub-frag {
        display: inline-block;
      }
      .s02-sub-frag em {
        font-style: italic;
        color: var(--text);
      }
      .s02-sub-mark-wrap {
        position: relative;
        display: inline-block;
      }
      #s02-sub-mark {
        position: absolute;
        left: 0; right: 0;
        bottom: -4px;
        height: 5px;
        background: var(--accent-stat);
        border-radius: 3px;
        transform-origin: left center;
        transform: scaleX(0);
      }
    </style>

    <div id="s02-content">
      <div id="s02-overline">THE THESIS</div>

      <div id="s02-quote-card">
        <div id="s02-quote-mark">&ldquo;</div>
        <div id="s02-quote-text">
          How would we build software in the future if
          <span class="s02-mark-wrap">tokens don&rsquo;t matter<span id="s02-mark-bar"></span></span>?
        </div>
        <div id="s02-attribution">
          <div class="av">PS</div>
          <div class="handle">&#64;steipete</div>
          <div class="meta">&middot; OpenClaw &middot; 2026-05</div>
        </div>
      </div>

      <div id="s02-subline">
        <span class="s02-sub-frag" id="s02-sub-frag-1">Not <em>look how much we spend.</em></span>
        <span class="s02-sub-frag" id="s02-sub-frag-2">Not <em>look how many agents we run.</em></span>
        <span class="s02-sub-frag" id="s02-sub-frag-3">One <span class="s02-sub-mark-wrap">assumption &mdash; baked in<span id="s02-sub-mark"></span></span>.</span>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      window.__timelines = window.__timelines || {};
      (function(){
        const tl = gsap.timeline({ paused: true, defaults: { ease: "power3.out" } });

        tl.set("#s02-overline", { opacity: 0, y: 16 }, 0);
        tl.set("#s02-quote-card", { opacity: 0, y: 40, scale: 0.96 }, 0);
        tl.set("#s02-mark-bar", { scaleX: 0 }, 0);
        tl.set("#s02-subline", { opacity: 1, y: 0 }, 0);
        tl.set("#s02-sub-frag-1", { opacity: 0, y: 12 }, 0);
        tl.set("#s02-sub-frag-2", { opacity: 0, y: 12 }, 0);
        tl.set("#s02-sub-frag-3", { opacity: 0, y: 12 }, 0);
        tl.set("#s02-sub-mark", { scaleX: 0 }, 0);

        // Overline drops in at scene start
        tl.to("#s02-overline", { opacity: 1, y: 0, duration: 0.5 }, 0);

        // Quote card rises with the narration "Here's the question..."
        tl.to("#s02-quote-card", { opacity: 1, y: 0, scale: 1, duration: 0.8, ease: "back.out(1.3)" }, 0.5);

        // Marker sweep under "tokens don't matter" aligned with the spoken phrase
        tl.to("#s02-mark-bar", { scaleX: 1, duration: 0.6, ease: "power2.out" }, 7.4);

        // Subtle scale pulse on the underline 1s after sweep for emphasis
        tl.to("#s02-mark-bar", { scaleY: 1.4, duration: 0.3, ease: "sine.inOut", yoyo: true, repeat: 1 }, 8.4);

        // Subline fragments reveal step-by-step at narration sentence anchors:
        //   Frag 1: "Not look how much we spend." @ narration 9.31s
        //   Frag 2: "Not look how many agents we run." @ narration 11.63s
        //   Frag 3a: enters early at "The whole project / tool stack / fleet" @ 14.07s
        //   Mark: marker-sweep activates at "one assumption" @ 18.91s
        tl.to("#s02-sub-frag-1", { opacity: 1, y: 0, duration: 0.5 }, 9.3);
        tl.to("#s02-sub-frag-2", { opacity: 1, y: 0, duration: 0.5 }, 11.6);
        tl.to("#s02-sub-frag-3", { opacity: 1, y: 0, duration: 0.5 }, 14.0);
        // Marker sweep under "assumption — baked in" anchored to "one assumption" @ 18.91s
        tl.to("#s02-sub-mark",   { scaleX: 1, duration: 0.6, ease: "power2.out" }, 18.9);

        // Late-scene visual beats paced to narration:
        //   "tokens still feel scarce" @ 23.30 — quote-card glow recalls the thesis
        //   "scarcity is already gone" @ 27.16 — final emphasis on the mark
        tl.to("#s02-quote-card", { boxShadow: "0 30px 80px rgba(201,42,42,0.45)", duration: 0.6, ease: "sine.inOut", yoyo: true, repeat: 1 }, 23.3);
        tl.to("#s02-sub-mark", { scaleY: 1.4, duration: 0.4, ease: "sine.inOut", yoyo: true, repeat: 1 }, 27.0);

        tl.set({}, {}, 29.9);
        window.__timelines["scene-02-thesis"] = tl;
      })();
    </script>
  </div>
</template>
