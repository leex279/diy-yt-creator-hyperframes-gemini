<!--
  scene-subscribe-banner.html — Mid-video subscribe / support banner (Anthropic long-form).

  NEW archetype. Compact horizontal banner (~7s) with:
    - "Subscribe + hit the bell" CTA
    - "Join Dynamous to support this channel" secondary line
  Used mid-video (not the final CTA). Operator can remove if not needed.

  OPERATOR:
    - Remove from index.html if not using mid-video subscribe prompt
    - Tune SCENE_DURATION to narration length
-->
<template id="scene-subscribe-banner-template">
  <div data-composition-id="scene-subscribe-banner"
       data-start="0"
       data-width="1920"
       data-height="1080"
       style="position:absolute; inset:0; overflow:hidden;
              font-family:var(--sans); color:var(--text);">

    <style>
      #scene-sub-content {
        width: 100%; height: 100%;
        padding: var(--pad-top) var(--pad-x) var(--pad-bottom);
        display: flex; flex-direction: column;
        align-items: center; justify-content: center;
        gap: 32px;
        box-sizing: border-box;
      }
      #sub-overline {
        font-family: var(--mono);
        font-weight: 700;
        font-size: 26px;
        letter-spacing: 7px;
        text-transform: uppercase;
        color: var(--accent-4);
      }
      .sub-banner-row {
        display: flex;
        flex-direction: row;
        align-items: center;
        gap: 28px;
        padding: 28px 48px;
        border-radius: 24px;
        background: var(--bg-surface);
        border: 1.5px solid var(--border-bright);
        max-width: 1500px;
        width: 100%;
      }
      .sub-icon {
        font-size: 56px;
        line-height: 1;
        flex-shrink: 0;
      }
      .sub-text-block {
        flex: 1;
        display: flex; flex-direction: column;
        gap: 8px;
      }
      .sub-primary {
        font-family: var(--sans);
        font-weight: 800;
        font-size: 48px;
        line-height: 1.05;
        letter-spacing: -1px;
        color: var(--text);
      }
      .sub-secondary {
        font-family: var(--mono);
        font-weight: 600;
        font-size: 28px;
        letter-spacing: 1px;
        color: var(--text-secondary);
      }
      .sub-pill {
        padding: 16px 32px;
        border-radius: 999px;
        background: linear-gradient(135deg, rgba(233,116,88,0.20), rgba(233,116,88,0.07));
        border: 1.5px solid rgba(233,116,88,0.50);
        font-family: var(--sans);
        font-weight: 800;
        font-size: 32px;
        letter-spacing: 0.5px;
        color: var(--accent-1);
        white-space: nowrap;
      }
    </style>

    <div id="scene-sub-content">
      <div id="sub-overline">QUICK NOTE</div>
      <div class="sub-banner-row" id="sub-row-1">
        <div class="sub-icon">&#x1F514;</div>
        <div class="sub-text-block">
          <div class="sub-primary">Subscribe + hit the bell</div>
          <div class="sub-secondary">New Anthropic deep-dives every week</div>
        </div>
        <div class="sub-pill">Subscribe &rarr;</div>
      </div>
      <div class="sub-banner-row" id="sub-row-2">
        <div class="sub-icon">&#x1F91D;</div>
        <div class="sub-text-block">
          <div class="sub-primary">Join Dynamous to support this channel</div>
          <div class="sub-secondary">dynamous.ai &mdash; AI mastermind community</div>
        </div>
        <div class="sub-pill">Join &rarr;</div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      window.__timelines = window.__timelines || {};
      const SCENE_DURATION = 7;

      const tl = gsap.timeline({
        paused: true,
        defaults: { ease: "power3.out", duration: 0.6 }
      });

      tl.from("#sub-overline", { y: 20, opacity: 0, duration: 0.5, ease: "power2.out", immediateRender: false }, 0);
      tl.from("#sub-row-1",    { y: 32, opacity: 0, scale: 0.96, duration: 0.65, ease: "back.out(1.4)", immediateRender: false }, 0.4);
      tl.from("#sub-row-2",    { y: 32, opacity: 0, scale: 0.96, duration: 0.65, ease: "back.out(1.4)", immediateRender: false }, 1.0);

      // Pin timeline
      tl.set({}, {}, SCENE_DURATION);

      window.__timelines["scene-subscribe-banner"] = tl;
    </script>
  </div>
</template>
