<!--
  scene-cta.html — Closing CTA (~7s).

  Pattern: kicker overline → "Read more at" → URL frame → subscribe pill.
  Self-contained sub-composition with paused timeline at
  window.__timelines["scene-cta"].
-->
<template id="scene-cta-template">
  <div data-composition-id="scene-cta"
       data-start="0"
       data-width="1080"
       data-height="1920"
       style="position:absolute; inset:0; overflow:hidden;">

    <style>
      #scene-cta-content {
        width:100%; height:100%;
        padding: var(--pad-top) var(--pad-x) var(--pad-bottom);
        display:flex; flex-direction:column;
        align-items:center; justify-content:center;
        text-align:center; gap:32px;
        box-sizing:border-box;
      }
      #scene-cta-content .kicker {
        font-family: 'JetBrains Mono', ui-monospace, monospace;
        font-weight: 700;
        font-size: 34px;
        letter-spacing: 6px;
        text-transform: uppercase;
        color: var(--accent-1);
      }
      /* Dominant topic — makes the last frame thumbnail-grade.
         Uses the real ast-grep logo (recolored to dark-theme palette). */
      #scene-cta-content .topic-logo {
        width: 720px;
        height: auto;
        display: block;
        filter: drop-shadow(0 8px 32px rgba(247, 129, 102, 0.30));
      }
      #scene-cta-content .receipt {
        display: inline-flex;
        align-items: center;
        gap: 14px;
        padding: 12px 28px;
        background: rgba(247, 129, 102, 0.12);
        border: 1px solid rgba(247, 129, 102, 0.45);
        border-radius: 999px;
        font-family: 'JetBrains Mono', ui-monospace, monospace;
        font-weight: 700;
        font-size: 30px;
        letter-spacing: 1px;
        color: var(--accent-1);
      }
      #scene-cta-content .receipt .num { color: var(--text-bright); font-size: 36px; }
      #scene-cta-content .lede {
        font-family: 'Source Serif 4', Georgia, serif;
        font-style: italic;
        font-weight: 400;
        font-size: 48px;
        line-height: 1.2;
        color: var(--text);
      }
      #scene-cta-content .url {
        font-family: 'JetBrains Mono', ui-monospace, monospace;
        font-weight: 700;
        font-size: 56px;
        letter-spacing: 1px;
        color: #0d1117;
        line-height: 1.0;
        padding: 26px 44px;
        border-radius: 22px;
        background: #f78166;
        box-shadow: 0 14px 36px rgba(247, 129, 102, 0.35);
        max-width: 920px;
      }
      #scene-cta-content .subscribe {
        display: inline-flex;
        align-items: center;
        gap: 16px;
        padding: 20px 38px;
        border-radius: 999px;
        background: var(--bg-card);
        border: 2px solid var(--accent-deep);
        font-family: 'Inter', system-ui, sans-serif;
        font-weight: 700;
        font-size: 38px;
        color: var(--accent-deep);
        letter-spacing: 0.5px;
        box-shadow: var(--shadow-warm);
      }
      #scene-cta-content .subscribe .arrow {
        color: var(--accent-warm);
        font-family: 'Inter', system-ui, sans-serif;
        font-weight: 400;
        font-size: 48px;
        line-height: 0.7;
      }
      /* MANDATORY debate-sparking CTA question per .claude/rules/engagement-cta.md */
      #scene-cta-content .cta-question {
        font-family: 'Inter', system-ui, sans-serif;
        font-weight: 800;
        font-size: 48px;
        line-height: 1.12;
        letter-spacing: -1px;
        color: var(--accent-deep);
        text-align: center;
        max-width: 920px;
        margin-top: 12px;
      }
    </style>

    <div id="scene-cta-content">
      <!-- THUMBNAIL-GRADE: real ast-grep logo + receipt at top (mandatory) -->
      <img class="topic-logo" id="cta-topic" src="../assets/ast-grep-logo.svg" alt="ast-grep" />
      <div class="receipt"   id="cta-receipt">
        <span class="num">122%</span>
        <span>less billed waste</span>
      </div>
      <div class="kicker"    id="cta-kicker">Full breakdown on this channel</div>
      <div class="url"       id="cta-url">Long-form: ast-grep deep-dive &rarr;</div>
      <div class="subscribe" id="cta-subscribe">Subscribe<span class="arrow">&rarr;</span></div>
      <!-- MANDATORY: debate-sparking CTA question per .claude/rules/engagement-cta.md -->
      <div class="cta-question" id="cta-question">One config line &mdash; or accept the waste?</div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({ paused: true });

      // Entrance — topic + receipt first (thumbnail-grade), then CTA elements
      tl.from("#cta-topic",     { scale: 0.92, opacity: 0, duration: 0.6, ease: "back.out(1.4)" }, 0);
      tl.from("#cta-receipt",   { y: 14, opacity: 0, duration: 0.45, ease: "power2.out" }, 0.4);
      tl.from("#cta-kicker",    { y: 14, opacity: 0, duration: 0.4, ease: "power2.out" }, 0.8);
      tl.from("#cta-url",       { scale: 0.85, opacity: 0, duration: 0.6, ease: "expo.out" }, 1.1);
      tl.from("#cta-subscribe", { y: 22, opacity: 0, duration: 0.5, ease: "power2.out" }, 1.7);
      tl.from("#cta-question",  { y: 26, opacity: 0, duration: 0.55, ease: "power2.out" }, 2.3);

      // Mid-beats — keep the closing CTA visually alive (it's the longest hold)
      // Beat A (4s): URL pill subtle pulse
      tl.to("#cta-url", { scale: 1.03, duration: 0.5, ease: "power2.inOut", yoyo: true, repeat: 1 }, 4);
      // Beat B (6.5s): subscribe arrow nudges right
      tl.to("#cta-subscribe .arrow", { x: 8, duration: 0.4, ease: "power2.out", yoyo: true, repeat: 1 }, 6.5);
      // Beat C (9s): URL emphasis again
      tl.to("#cta-url", { scale: 1.04, duration: 0.5, ease: "power2.out", yoyo: true, repeat: 1 }, 9);
      // Beat D (11s): subscribe pill scale-pop
      tl.to("#cta-subscribe", { scale: 1.04, duration: 0.5, ease: "power2.out", yoyo: true, repeat: 1 }, 11);
      // Beat E (13.5s): kicker letter-spacing emphasis
      tl.to("#cta-kicker", { letterSpacing: "8px", duration: 0.5, ease: "power2.inOut", yoyo: true, repeat: 1 }, 13.5);
      // Beat F (16s): final URL + subscribe pulse together
      tl.to("#cta-url, #cta-subscribe", { scale: 1.025, duration: 0.5, ease: "power2.out", yoyo: true, repeat: 1 }, 16);
      // Beat G (18.5s): arrow nudge right one more time
      tl.to("#cta-subscribe .arrow", { x: 10, duration: 0.4, ease: "power2.out", yoyo: true, repeat: 1 }, 18.5);
      // Tail-extend so the sub-comp timeline duration matches the visible window in the root
      tl.set({}, {}, 22.5);


      window.__timelines["scene-cta"] = tl;
    </script>
  </div>
</template>
