<!--
  scene-dynamous-midroll.html — Dynamous AI Mastermind midroll interstitial.

  NEW archetype. 12s promotional scene for the Dynamous community.
  OPT-OUT per video — operator removes this scene wrapper from index.html
  if not running a Dynamous promotion for that video.

  Structure:
    - "COMMUNITY SPOTLIGHT" mono overline in orange
    - "DYNAMOUS" wordmark (180px Inter 900) + tagline
    - dynamous.ai URL pill
    - "10% OFF" chip in green (opt-in — remove if not applicable)

  OPERATOR:
    - Keep or remove from index.html per-video opt-in decision
    - Remove the #midroll-discount div if not offering a discount
    - Tune SCENE_DURATION to match narration
-->
<template id="scene-dynamous-midroll-template">
  <div data-composition-id="scene-dynamous-midroll"
       data-start="0"
       data-width="1920"
       data-height="1080"
       style="position:absolute; inset:0; overflow:hidden;
              font-family:var(--sans); color:var(--text);">

    <style>
      #scene-midroll-content {
        width: 100%; height: 100%;
        padding: var(--pad-top) var(--pad-x) var(--pad-bottom);
        display: flex; flex-direction: column;
        align-items: center; justify-content: center;
        text-align: center; gap: 36px;
        box-sizing: border-box;
      }
      #midroll-overline {
        font-family: var(--mono);
        font-weight: 700;
        font-size: 26px;
        letter-spacing: 7px;
        text-transform: uppercase;
        color: var(--accent-1);
      }
      #midroll-wordmark {
        font-family: var(--sans);
        font-weight: 900;
        font-size: 180px;
        line-height: 0.88;
        letter-spacing: -5px;
        color: var(--text);
        text-shadow: 0 0 80px rgba(233, 116, 88, 0.35),
                     0 8px 24px rgba(0, 0, 0, 0.6);
      }
      #midroll-tagline {
        font-family: var(--sans);
        font-weight: 600;
        font-size: 36px;
        line-height: 1.4;
        color: var(--text-secondary);
        max-width: 1100px;
      }
      #midroll-url {
        display: inline-flex;
        align-items: center;
        gap: 12px;
        padding: 20px 44px;
        border-radius: 999px;
        background: var(--bg-surface);
        border: 2px solid rgba(233, 116, 88, 0.45);
        font-family: var(--mono);
        font-weight: 700;
        font-size: 36px;
        letter-spacing: 2px;
        color: var(--text);
      }
      #midroll-url .url-dot { color: var(--accent-1); }
      #midroll-discount {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        padding: 12px 24px;
        border-radius: 999px;
        background: rgba(125, 211, 166, 0.15);
        border: 1.5px solid rgba(125, 211, 166, 0.45);
        font-family: var(--mono);
        font-weight: 800;
        font-size: 28px;
        letter-spacing: 2px;
        color: var(--accent-4);
      }
    </style>

    <div id="scene-midroll-content">
      <div id="midroll-overline">COMMUNITY SPOTLIGHT</div>
      <div id="midroll-wordmark">DYNAMOUS</div>
      <div id="midroll-tagline">AI mastermind community where this kind of best-practice work gets shared</div>
      <div id="midroll-url">dynamous<span class="url-dot">.</span>ai</div>
      <div id="midroll-discount">&rarr; Link in description</div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      window.__timelines = window.__timelines || {};
      const SCENE_DURATION = 12;
      // Finite pulse cycle on URL pill
      const PULSE_CYCLE = 2.5;
      const pulseRepeats = Math.max(0, Math.floor(SCENE_DURATION / PULSE_CYCLE) - 2);

      const tl = gsap.timeline({
        paused: true,
        defaults: { ease: "power3.out", duration: 0.6 }
      });

      tl.from("#midroll-overline",  { y: 20, opacity: 0, duration: 0.5, ease: "power2.out", immediateRender: false }, 0);
      tl.from("#midroll-wordmark",  { scale: 0.85, opacity: 0, duration: 0.9, ease: "back.out(1.7)", immediateRender: false }, 0.4);
      // Inline shake on wordmark slam
      tl.to("#midroll-wordmark",    { x: 6,  duration: 0.04, ease: "none", overwrite: "auto" }, 0.8);
      tl.to("#midroll-wordmark",    { x: -6, duration: 0.04, ease: "none", overwrite: "auto" }, 0.85);
      tl.to("#midroll-wordmark",    { x: 4,  duration: 0.04, ease: "none", overwrite: "auto" }, 0.90);
      tl.to("#midroll-wordmark",    { x: 0,  duration: 0.04, ease: "none", overwrite: "auto" }, 0.95);
      tl.from("#midroll-tagline",   { y: 24, opacity: 0, duration: 0.6, ease: "power2.out", immediateRender: false }, 1.4);
      tl.from("#midroll-url",       { scale: 0.9, opacity: 0, duration: 0.6, ease: "back.out(1.4)", immediateRender: false }, 2.0);
      tl.from("#midroll-discount",  { y: 16, opacity: 0, duration: 0.5, ease: "power2.out", immediateRender: false }, 2.6);

      // Finite pulse on URL pill border glow
      tl.to("#midroll-url", {
        boxShadow: "0 0 0 6px rgba(233, 116, 88, 0.25)",
        duration: PULSE_CYCLE / 2,
        ease: "sine.inOut",
        yoyo: true,
        repeat: pulseRepeats,
        immediateRender: false
      }, 3.5);

      // Pin timeline
      tl.set({}, {}, SCENE_DURATION);

      window.__timelines["scene-dynamous-midroll"] = tl;
    </script>
  </div>
</template>
