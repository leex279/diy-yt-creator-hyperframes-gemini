<!DOCTYPE html>
<!-- Variant 09 — Replacement matter-of-fact. "Markdown got replaced." Cover at bottom-right. Cream. -->
<html lang="en"><head><meta charset="utf-8">
<title>v09 — Markdown got replaced</title>
<link rel="stylesheet" href="_base.css">
<style>
  .headline { width: 820px; }
  .headline .l1 { font-size: 108px; line-height: 0.96; }
  .headline .l2 { font-size: 132px; line-height: 0.96; margin-top: 4px; letter-spacing: -3px; }
  .cover-stack-big {
    position: absolute;
    right: 60px;
    top: 220px;
    width: 280px;
    transform: rotate(3deg);
    transform-origin: top right;
    z-index: 1;
  }
  .cover-stack-big .cover-frame {
    filter: drop-shadow(0 18px 36px rgba(28, 26, 24, 0.20));
    position: relative;
  }
  .cover-stack-big .cover-frame img {
    width: 100%;
    height: auto;
    display: block;
    border: 4px solid var(--bg-card-cream);
    border-radius: 10px;
  }
  .cover-stack-big .cover-stamp {
    position: absolute;
    font-size: 22px;
    padding: 8px 14px;
    top: -22px;
    right: -28px;
    font-family: var(--mono);
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: #fff;
    background: var(--accent-terracotta);
    border-radius: 999px;
    transform: rotate(8deg);
    box-shadow: 0 8px 20px rgba(199, 90, 63, 0.35);
  }
  .cover-stack-big .cover-label {
    display: block;
    font-family: var(--mono);
    font-weight: 700;
    font-size: 13px;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: var(--accent-deep-red);
    background: var(--bg-card-cream);
    border: 1px solid rgba(28, 26, 24, 0.10);
    padding: 6px 14px;
    border-radius: 4px;
    box-shadow: 0 4px 10px rgba(28, 26, 24, 0.10);
    margin-bottom: 12px;
    width: fit-content;
  }
</style></head>
<body>
  <div class="thumb theme-cream">
    <div class="overline">As of today</div>
    <div class="overline-divider"></div>
    <h1 class="headline" style="top: 200px;">
      <span class="l1">Markdown</span>
      <em class="l2 marker-under">got replaced.</em>
    </h1>
    <div class="receipt"><strong>HTML is the new default.</strong><br>Why the team switched.</div>
    <div class="brand"><span class="dot"></span><span>diy-yt-creator</span></div>
    <div class="cover-stack-big">
      <span class="cover-label">Source · @trq212</span>
      <div class="cover-frame">
        <img src="../assets/article-cover.png" alt="Source: Thariq's X-post on HTML">
        <div class="cover-stamp">751K views</div>
      </div>
    </div>
  </div>
</body></html>
