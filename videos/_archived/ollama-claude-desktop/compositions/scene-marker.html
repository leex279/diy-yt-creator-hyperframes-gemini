<!--
  scene-marker.html — Value-prop headline with marker sweep on "Claude.".
-->
<template id="scene-marker-template">
  <div data-composition-id="scene-marker"
       data-start="0"
       data-width="1080"
       data-height="1920"
       style="position:absolute; inset:0; overflow:hidden;">

    <style>
      #scene-marker-content {
        width:100%; height:100%;
        padding: var(--pad-top) var(--pad-x) var(--pad-bottom);
        display:flex; flex-direction:column;
        align-items:center; justify-content:center;
        text-align:center; gap:32px;
        box-sizing:border-box;
      }
      #scene-marker-content .pretitle {
        font-family: var(--mono);
        font-weight: 700;
        font-size: 30px;
        letter-spacing: 5px;
        text-transform: uppercase;
        color: var(--accent-deep);
      }
      #scene-marker-content .headline {
        font-family: var(--serif);
        font-weight: 700;
        font-size: 124px;
        line-height: 1.0;
        letter-spacing: -3px;
        color: var(--accent-ink);
        max-width: 940px;
      }
      #scene-marker-content .marker-wrap {
        position: relative;
        display: inline-block;
        font-style: italic;
        color: var(--accent-ink);
        padding: 0 12px;
      }
      #scene-marker-content .marker-band {
        position: absolute;
        left: 0; right: 0; bottom: 14px;
        height: 56%;
        background: var(--accent-gold);
        border-radius: 6px;
        z-index: -1;
        opacity: 0.85;
      }
      #scene-marker-content .subline {
        font-family: var(--serif);
        font-style: italic;
        font-weight: 400;
        font-size: 38px;
        line-height: 1.3;
        color: var(--text-secondary);
        max-width: 800px;
      }
    </style>

    <div id="scene-marker-content">
      <div class="pretitle" id="marker-pretitle">What just unlocked</div>
      <div class="headline" id="marker-headline">
        Any Ollama model, inside
        <span class="marker-wrap">
          <span class="marker-band" id="marker-band"></span>Claude.
        </span>
      </div>
      <div class="subline"  id="marker-subline">Open source weights, frontier scale, all in Anthropic's app.</div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({ paused: true });

      // Hidden-until-reveal pattern (set + to) for the entrance trio.
      tl.set("#marker-pretitle", { y: 16, opacity: 0 }, 0);
      tl.set("#marker-headline", { y: 30, opacity: 0 }, 0);
      tl.set("#marker-band",     { clipPath: "inset(0 100% 0 0)" }, 0);
      tl.set("#marker-subline",  { y: 16, opacity: 0 }, 0);

      tl.to("#marker-pretitle", { y: 0, opacity: 1, duration: 0.5, ease: "power2.out" }, 0);
      tl.to("#marker-headline", { y: 0, opacity: 1, duration: 0.7, ease: "power3.out" }, 0.3);
      tl.to("#marker-band",     { clipPath: "inset(0 0% 0 0)", duration: 0.6, ease: "power2.inOut" }, 1.1);
      tl.to("#marker-subline",  { y: 0, opacity: 1, duration: 0.5, ease: "power2.out" }, 1.7);

      tl.to("#marker-band", { opacity: 1.0, duration: 0.5, ease: "power2.inOut", yoyo: true, repeat: 1 }, 4.5);
      tl.to("#marker-headline", { scale: 1.025, duration: 0.5, ease: "power2.out", yoyo: true, repeat: 1 }, 6.5);
      tl.to("#marker-band", { clipPath: "inset(0 100% 0 0)", duration: 0.5, ease: "power2.inOut" }, 8.5);
      tl.to("#marker-band", { clipPath: "inset(0 0% 0 0)",   duration: 0.5, ease: "power2.inOut" }, 9.0);
      tl.to("#marker-subline", { scale: 1.04, color: "var(--accent-warm)", duration: 0.5, ease: "power2.out", yoyo: true, repeat: 1 }, 11);

      window.__timelines["scene-marker"] = tl;
    </script>
  </div>
</template>
