<!--
  scene-architecture-stack.html — Why Claude Code specifically: the data-ingestion stack
  Scene-relative duration: 53.45s. data-start in root = 341.85.

  Beats (scene-relative):
    0     — section "05" + overline + h2 enter
    5.58  — "Claude Code can ingest" — h2 emphasis
    6.94  — Layer 1 (Filesystem) reveal
    14.71 — Layer 2 (MCP servers) reveal
    19.38 — Layer 3 (Browser / Claude in Chrome) reveal
    22.38 — Layer 4 (Git history) reveal
    26.52 — "stack of context" — stack outlines pulse together
    29.53 — "actually informed" — small "INFORMED" badge appears
    36.64 — "Move the same prompt" — right-side callout reveals
    39.02 — "lose half of it" — visual "50% lost" emphasis on callout
    41.38 — "comes back generic" — generic-pill appears
    44.20 — "But generic" — generic-pill emphasis
    46.16 — "does not transfer" — final right-side caption
    50.66 — "input that makes the output worth having" — left stack pulse final
-->
<template id="scene-architecture-stack-template">
  <div data-composition-id="scene-architecture-stack"
       data-start="0"
       data-width="1920"
       data-height="1080"
       style="position:absolute; inset:0; overflow:hidden;
              font-family:var(--serif); color:var(--text);">

    <style>
      #scene-architecture-stack-content {
        width: 100%; height: 100%;
        padding: var(--pad-top) var(--pad-x) var(--pad-bottom);
        position: relative;
        box-sizing: border-box;
      }
      .as-header {
        position: relative;
        margin-bottom: 40px;
        padding-left: 88px;
      }
      .as-section-number {
        position: absolute;
        left: 0;
        top: 6px;
        font-family: var(--mono);
        font-weight: 700;
        font-size: 56px;
        color: var(--accent-1);
      }
      .as-overline {
        font-family: var(--mono);
        font-weight: 700;
        font-size: 22px;
        letter-spacing: 6px;
        text-transform: uppercase;
        color: var(--accent-2);
        margin-bottom: 12px;
      }
      .as-h2 {
        font-family: var(--serif);
        font-weight: 800;
        font-size: 56px;
        color: var(--text);
        letter-spacing: -1px;
        line-height: 1.04;
      }
      .as-h2 em {
        font-style: italic;
        color: var(--accent-1);
      }
      .as-divider {
        height: 1px;
        background: var(--border);
        margin-top: 18px;
        transform-origin: left center;
      }

      .as-body {
        display: grid;
        grid-template-columns: 1fr 600px;
        gap: 60px;
        padding-left: 88px;
        padding-right: 0;
      }

      .as-stack {
        display: flex;
        flex-direction: column;
        gap: 16px;
      }
      .as-layer {
        display: grid;
        grid-template-columns: 12px 1fr 220px;
        gap: 24px;
        align-items: center;
        background: var(--bg-card);
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 22px 26px;
        position: relative;
      }
      .as-layer-strip {
        height: 60px;
        background: var(--accent-1);
        border-radius: 4px;
        align-self: stretch;
      }
      .as-layer-name {
        font-family: var(--serif);
        font-weight: 800;
        font-size: 34px;
        color: var(--text);
        line-height: 1.05;
      }
      .as-layer-meta {
        font-family: var(--mono);
        font-size: 18px;
        color: var(--text-muted);
        letter-spacing: 1px;
        margin-top: 6px;
      }
      .as-layer-tag {
        font-family: var(--mono);
        font-weight: 700;
        font-size: 16px;
        letter-spacing: 3px;
        text-transform: uppercase;
        color: var(--accent-2);
        text-align: right;
      }

      .as-side {
        position: relative;
        padding-top: 24px;
      }
      .as-side-arrow {
        font-family: var(--mono);
        font-weight: 700;
        font-size: 22px;
        letter-spacing: 4px;
        color: var(--accent-2);
        margin-bottom: 14px;
        opacity: 0;
      }
      .as-side-h3 {
        font-family: var(--serif);
        font-weight: 800;
        font-style: italic;
        font-size: 36px;
        color: var(--text);
        line-height: 1.1;
        margin-bottom: 16px;
        opacity: 0;
      }
      .as-side-h3 em {
        color: var(--accent-1);
      }
      .as-side-body {
        font-family: var(--serif);
        font-size: 26px;
        color: var(--text-secondary);
        line-height: 1.5;
        margin-bottom: 18px;
        opacity: 0;
      }
      .as-generic-pill {
        display: inline-block;
        font-family: var(--mono);
        font-weight: 700;
        font-size: 18px;
        letter-spacing: 4px;
        text-transform: uppercase;
        color: var(--accent-2);
        background: var(--bg-card);
        border: 1.5px solid var(--accent-2);
        border-radius: 4px;
        padding: 10px 18px;
        opacity: 0;
      }
      .as-final-caption {
        font-family: var(--serif);
        font-style: italic;
        font-size: 26px;
        color: var(--text-secondary);
        line-height: 1.5;
        margin-top: 24px;
        opacity: 0;
      }
      .as-informed-badge {
        position: absolute;
        right: 0;
        top: 0;
        background: var(--bg-card);
        border: 1px solid var(--accent-3);
        color: var(--accent-3);
        font-family: var(--mono);
        font-weight: 700;
        font-size: 16px;
        letter-spacing: 4px;
        padding: 10px 16px;
        border-radius: 4px;
        opacity: 0;
      }
    </style>

    <div id="scene-architecture-stack-content">
      <div class="as-header">
        <div class="as-section-number" id="as-num">05</div>
        <div class="as-overline" id="as-overline">WHY CLAUDE CODE — NOT CLAUDE DESIGN</div>
        <div class="as-h2" id="as-h2">What Claude Code can <em class="accent-italic">ingest</em>.</div>
        <div class="as-divider" id="as-divider"></div>
      </div>

      <div class="as-body">
        <div class="as-stack">
          <div class="as-layer" id="as-layer-1">
            <div class="as-layer-strip"></div>
            <div>
              <div class="as-layer-name">Your filesystem</div>
              <div class="as-layer-meta">every .html you have already generated</div>
            </div>
            <div class="as-layer-tag">SOURCE 01</div>
          </div>
          <div class="as-layer" id="as-layer-2">
            <div class="as-layer-strip"></div>
            <div>
              <div class="as-layer-name">MCP servers</div>
              <div class="as-layer-meta">Slack &middot; Linear &middot; whatever you connect</div>
            </div>
            <div class="as-layer-tag">SOURCE 02</div>
          </div>
          <div class="as-layer" id="as-layer-3">
            <div class="as-layer-strip"></div>
            <div>
              <div class="as-layer-name">Your browser</div>
              <div class="as-layer-meta">when you have Claude in Chrome</div>
            </div>
            <div class="as-layer-tag">SOURCE 03</div>
          </div>
          <div class="as-layer" id="as-layer-4">
            <div class="as-layer-strip"></div>
            <div>
              <div class="as-layer-name">Your git history</div>
              <div class="as-layer-meta">the why behind every line of code</div>
            </div>
            <div class="as-layer-tag">SOURCE 04</div>
          </div>
        </div>

        <div class="as-side">
          <div class="as-informed-badge" id="as-informed">INFORMED</div>
          <div class="as-side-arrow" id="as-side-arrow">MOVE TO A CHAT SURFACE &rarr;</div>
          <div class="as-side-h3" id="as-side-h3">You lose <em>half</em> of it.</div>
          <div class="as-side-body" id="as-side-body">
            Same prompt. No filesystem, no MCPs, no git history. The artifact comes back generic.
          </div>
          <div class="as-generic-pill" id="as-generic">GENERIC</div>
          <div class="as-final-caption" id="as-final">
            Claude Code's reach into your environment is the input that makes the output worth having.
          </div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({
        paused: true,
        defaults: { ease: "power3.out", duration: 0.6 }
      });

      const layers = ["#as-layer-1","#as-layer-2","#as-layer-3","#as-layer-4"];
      layers.forEach(sel => tl.set(sel, { x: -40, opacity: 0 }, 0));
      tl.set("#as-divider", { scaleX: 0 }, 0);

      // Header
      tl.from("#as-num",      { y: 14, opacity: 0, duration: 0.5, ease: "power2.out", immediateRender: false }, 0.2);
      tl.from("#as-overline", { y: 12, opacity: 0, duration: 0.5, ease: "power2.out", immediateRender: false }, 0.4);
      tl.from("#as-h2",       { y: 20, opacity: 0, duration: 0.7, ease: "power3.out", immediateRender: false }, 0.6);
      tl.to("#as-divider",    { scaleX: 1, duration: 0.7, ease: "power2.out" }, 1.2);

      // h2 emphasis pulse on "ingest" at 5.58
      tl.to("#as-h2 em", { scale: 1.06, duration: 0.3, yoyo: true, repeat: 1, ease: "power2.out", transformOrigin: "left center" }, 5.58);

      // 4 stack layers reveal at narration anchors
      tl.to("#as-layer-1", { x: 0, opacity: 1, duration: 0.55, ease: "power3.out" }, 6.94);
      tl.to("#as-layer-2", { x: 0, opacity: 1, duration: 0.55, ease: "power3.out" }, 14.71);
      tl.to("#as-layer-3", { x: 0, opacity: 1, duration: 0.55, ease: "power3.out" }, 19.38);
      tl.to("#as-layer-4", { x: 0, opacity: 1, duration: 0.55, ease: "power3.out" }, 22.38);

      // "stack of context" — pulse all 4 together at 26.52
      tl.to(layers.join(", "), { scale: 1.012, duration: 0.35, yoyo: true, repeat: 1, ease: "power2.out" }, 26.52);

      // "actually informed" badge appears at 29.53
      tl.to("#as-informed", { opacity: 1, duration: 0.4, ease: "power2.out" }, 29.53);

      // Side callout begins at 36.64 ("Move the same prompt")
      tl.to("#as-side-arrow", { opacity: 1, duration: 0.5, ease: "power2.out" }, 36.64);

      // "lose half of it" — h3 reveal at 39.02
      tl.to("#as-side-h3", { opacity: 1, y: 0, duration: 0.6, ease: "power3.out" }, 39.02);

      // "comes back generic" — body reveal at 41.38
      tl.to("#as-side-body", { opacity: 1, duration: 0.6, ease: "power2.out" }, 41.38);

      // "But generic" pill emphasis at 44.20
      tl.to("#as-generic", { opacity: 1, scale: 1.06, duration: 0.45, ease: "back.out(1.4)" }, 44.20);

      // Final caption at 46.16 ("does not transfer")
      tl.to("#as-final", { opacity: 1, duration: 0.6, ease: "power2.out" }, 46.16);

      // Final stack-pulse at 50.66 ("input that makes the output worth having")
      tl.to(layers.join(", "), { scale: 1.015, duration: 0.4, yoyo: true, repeat: 1, ease: "power2.out" }, 50.66);
      tl.to("#as-final em", { color: "var(--accent-1)", duration: 0.4 }, 50.66);

      window.__timelines["scene-architecture-stack"] = tl;
    </script>
  </div>
</template>
