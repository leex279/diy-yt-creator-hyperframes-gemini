<!--
  scene-stat-pill-row.html — Receipts. 2 huge color-rotated stats with labels.

  Above: overline + headline. Below: row of 2 pills (orange/accent-warn,
  purple/accent-3). Each pill contains a 130px stat number + 22px label.

  Adapted from shared/lib/blocks/stat-pill-row/ for 1920x1080 horizontal.
-->
<template id="scene-stat-pill-row-template">
  <div data-composition-id="scene-stat-pill-row"
       data-start="0"
       data-width="1920"
       data-height="1080"
       style="position:absolute; inset:0; overflow:hidden;
              font-family:var(--sans); color:var(--text);">

    <style>
      #scene-stat-pill-row-content {
        width:100%; height:100%;
        padding: var(--pad-top) var(--pad-x) var(--pad-bottom);
        display:flex; flex-direction:column;
        align-items:center; justify-content:center;
        gap:56px;
        box-sizing:border-box;
      }
      #scene-stat-pill-row-content .header-block {
        display:flex; flex-direction:column;
        align-items:center; gap:16px;
        text-align:center;
      }
      #scene-stat-pill-row-content .overline {
        font-family: var(--mono);
        font-weight: 700;
        font-size: 28px;
        letter-spacing: 6px;
        text-transform: uppercase;
        color: var(--accent-warn);
      }
      #scene-stat-pill-row-content .headline {
        font-family: var(--sans);
        font-weight: 800;
        font-size: 56px;
        line-height: 1.05;
        letter-spacing: -1px;
        color: var(--text);
      }
      #scene-stat-pill-row-content .pills {
        display:flex; flex-direction:row;
        align-items:stretch; justify-content:center;
        gap: 60px;
      }
      .stat-pill {
        width: 540px;
        padding: 56px 40px;
        border-radius: 28px;
        border: 1.5px solid var(--border-bright);
        background: rgba(255, 255, 255, 0.04);
        display:flex; flex-direction:column;
        align-items:center; gap: 18px;
        box-shadow: 0 24px 60px rgba(0, 0, 0, 0.55);
        opacity: 0;
      }
      #scene-stat-pill-row-content .overline,
      #scene-stat-pill-row-content .headline { opacity: 0; }
      .stat-pill.warn {
        background: linear-gradient(135deg,
                      rgba(249, 115, 22, 0.16) 0%,
                      rgba(249, 115, 22, 0.04) 100%);
        border-color: rgba(249, 115, 22, 0.55);
      }
      .stat-pill.purple {
        background: linear-gradient(135deg,
                      rgba(139, 92, 246, 0.18) 0%,
                      rgba(139, 92, 246, 0.04) 100%);
        border-color: rgba(139, 92, 246, 0.55);
      }
      .stat-pill .stat-num {
        font-family: var(--sans);
        font-weight: 900;
        font-size: 130px;
        line-height: 0.9;
        letter-spacing: -4px;
        font-variant-numeric: tabular-nums lining-nums;
      }
      .stat-pill.warn .stat-num {
        color: var(--accent-warn);
        text-shadow: 0 0 60px rgba(249, 115, 22, 0.5);
      }
      .stat-pill.purple .stat-num {
        color: var(--accent-3);
        text-shadow: 0 0 60px rgba(139, 92, 246, 0.5);
      }
      .stat-pill .stat-label {
        font-family: var(--mono);
        font-weight: 700;
        font-size: 22px;
        letter-spacing: 3px;
        text-transform: uppercase;
        color: var(--text-secondary);
        text-align: center;
      }
    </style>

    <div id="scene-stat-pill-row-content">
      <div class="header-block">
        <div class="overline" id="stat-row-overline">TWO WEEKS</div>
        <div class="headline" id="stat-row-headline">The cadence speaks for itself</div>
      </div>

      <div class="pills">
        <div class="stat-pill warn" id="stat-pill-1">
          <div class="stat-num">3</div>
          <div class="stat-label">releases</div>
        </div>
        <div class="stat-pill purple" id="stat-pill-2">
          <div class="stat-num">27</div>
          <div class="stat-label">new features</div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      // Transcript-driven timing. scene_t = root_t - 32 (data-start 32). Slot 8s.
      // Narration: "Three releases. Two weeks. Twenty seven new features —
      // without breaking what already worked. The team is moving fast."
      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({ paused: true });

      // Header before "Three" @ scene_t 0.48
      tl.fromTo("#stat-row-overline", { y: 20, opacity: 0 }, { y: 0, opacity: 1, duration: 0.35, ease: "power2.out" }, 0);
      tl.fromTo("#stat-row-headline", { y: 30, opacity: 0 }, { y: 0, opacity: 1, duration: 0.45, ease: "power3.out" }, 0.1);

      // Pill 1 (3 RELEASES) on "Three" @ 0.48
      tl.fromTo("#stat-pill-1", { scale: 0.85, opacity: 0 },
                                { scale: 1,    opacity: 1, duration: 0.5, ease: "back.out(1.6)" }, 0.48);
      // Pill 2 (27 NEW FEATURES) on "Twenty seven new features" @ 2.62
      tl.fromTo("#stat-pill-2", { scale: 0.85, opacity: 0 },
                                { scale: 1,    opacity: 1, duration: 0.5, ease: "back.out(1.6)" }, 2.62);

      // "without breaking what already worked" mid-pulse @ ~5s
      tl.to("#stat-pill-1 .stat-num", { scale: 1.08, duration: 0.4, yoyo: true, repeat: 1, ease: "sine.inOut" }, 4.5);
      tl.to("#stat-pill-2 .stat-num", { scale: 1.08, duration: 0.4, yoyo: true, repeat: 1, ease: "sine.inOut" }, 5.4);

      // "moving fast" lands at ~scene_t 8.0 (just into crossfade at 7.6) — pre-pulse
      tl.to(["#stat-pill-1 .stat-num", "#stat-pill-2 .stat-num"],
        { scale: 1.10, duration: 0.4, yoyo: true, repeat: 1, ease: "back.out(1.6)", stagger: 0.10 },
        7.0);

      // Anchor timeline duration to 8s = slot length
      tl.set({}, {}, 8);

      window.__timelines["scene-stat-pill-row"] = tl;
    </script>
  </div>
</template>
