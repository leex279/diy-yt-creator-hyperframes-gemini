<!--
  scene-hook.html — Hero hook archetype (Anthropic long-form, ~8-10s).

  Structure: mono overline → 120px headline → 200px stat slam → sub-line.
  Anthropic palette: orange accent leads. Inline shake on the slam.

  All .from() at position > 0 use immediateRender:false (long-form gotcha).
-->
<template id="scene-hook-template">
  <div data-composition-id="scene-hook"
       data-start="0"
       data-width="1920"
       data-height="1080"
       style="position:absolute; inset:0; overflow:hidden;
              font-family:var(--sans); color:var(--text);">

    <style>
      #scene-hook-content {
        width: 100%; height: 100%;
        padding: var(--pad-top) var(--pad-x) var(--pad-bottom);
        display: flex; flex-direction: column;
        align-items: center; justify-content: center;
        text-align: center; gap: 24px;
        box-sizing: border-box;
      }
      #hook-overline {
        font-family: var(--mono);
        font-weight: 700;
        font-size: 28px;
        letter-spacing: 7px;
        text-transform: uppercase;
        color: var(--accent-1);
      }
      #hook-headline {
        font-family: var(--sans);
        font-weight: 800;
        font-size: 120px;
        line-height: 1.0;
        letter-spacing: -3px;
        color: var(--text);
        max-width: 1500px;
      }
      #hook-stat {
        font-family: var(--sans);
        font-weight: 900;
        font-size: 200px;
        line-height: 0.88;
        letter-spacing: -5px;
        color: var(--accent-1);
        font-variant-numeric: tabular-nums lining-nums;
        text-shadow: 0 0 80px rgba(233, 116, 88, 0.55),
                     0 8px 24px rgba(0, 0, 0, 0.6);
      }
      #hook-subline {
        font-family: var(--mono);
        font-weight: 600;
        font-size: 32px;
        letter-spacing: 2px;
        color: var(--text-secondary);
      }
    </style>

    <div id="scene-hook-content">
      <div id="hook-overline">REPLACE OVERLINE</div>
      <div id="hook-headline">YOUR HOOK HEADLINE</div>
      <div id="hook-stat">0&times;</div>
      <div id="hook-subline">Optional sub-line &middot; context &middot; date</div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      window.__timelines = window.__timelines || {};
      const SCENE_DURATION = 8;
      const tl = gsap.timeline({
        paused: true,
        defaults: { ease: "power3.out", duration: 0.6 }
      });

      tl.from("#hook-overline",  { y: 24, opacity: 0, duration: 0.5, ease: "power2.out", immediateRender: false }, 0);
      tl.from("#hook-headline",  { y: 30, opacity: 0, duration: 0.7, ease: "power3.out", immediateRender: false }, 0.3);
      tl.from("#hook-stat",      { scale: 0.85, opacity: 0, duration: 0.8, ease: "back.out(1.7)", immediateRender: false }, 0.8);
      // Inline shake on slam impact — 4 ticks at ±6px
      tl.to("#hook-stat",        { x: 6,  duration: 0.04, ease: "none", overwrite: "auto" }, 1.2);
      tl.to("#hook-stat",        { x: -6, duration: 0.04, ease: "none", overwrite: "auto" }, 1.25);
      tl.to("#hook-stat",        { x: 4,  duration: 0.04, ease: "none", overwrite: "auto" }, 1.30);
      tl.to("#hook-stat",        { x: 0,  duration: 0.04, ease: "none", overwrite: "auto" }, 1.35);
      tl.from("#hook-subline",   { y: 16, opacity: 0, duration: 0.5, ease: "power2.out", immediateRender: false }, 1.8);

      // Pin timeline to scene duration so renderer captures trailing frames
      tl.set({}, {}, SCENE_DURATION);

      window.__timelines["scene-hook"] = tl;
    </script>
  </div>
</template>
