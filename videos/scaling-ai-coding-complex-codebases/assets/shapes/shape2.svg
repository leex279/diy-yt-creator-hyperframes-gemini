<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 1000" width="1000" height="1000" fill="none">
  <!-- Code angle brackets </> stylized as backdrop motif -->
  <!-- Left angle bracket "<" -->
  <path d="M 380 200 L 200 500 L 380 800"
        stroke="#3B82F6" stroke-width="48" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <!-- Right angle bracket ">" -->
  <path d="M 620 200 L 800 500 L 620 800"
        stroke="#3B82F6" stroke-width="48" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <!-- Forward slash "/" between -->
  <path d="M 560 220 L 440 780"
        stroke="#60A5FA" stroke-width="40" stroke-linecap="round" fill="none"/>
  <!-- Subtle outer ring -->
  <circle cx="500" cy="500" r="430" stroke="#1E40AF" stroke-width="3" fill="none" opacity="0.5"/>
</svg>
