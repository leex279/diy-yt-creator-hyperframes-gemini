<!--
  scene-stat-pill-row.html — Scene 05: Numbers Wall (96.29 - 122.56, 26.27s)
  Reduced to 3-row impact display: 30% / 122% / "could not even do this".
  Token counter spikes on each entry as the agent re-reads files.

  Scene-local anchors (local = root - 96.29):
    0.00   "One example isn't pattern"   → title
    2.50   "we tested five common"       → "5 QUERIES" pill
    6.65   "over-counted by 26%"         → "26% debug" row
    8.85   "19% on setTimeout"           → continuation strip (shown briefly)
    10.25  "30% on promise chains"       → "30% MORE WORK" row
    13.50  "122% on useState"            → "122% MORE WORK" row + SLAM
    20.14  "false hit is a file"         → caption beneath
    24.40  "cuts it in half"             → green "HALF" stamp
-->
<template id="scene-stat-pill-row-template">
  <div data-composition-id="scene-stat-pill-row"
       data-start="0"
       data-width="1556"
       data-height="998"
       style="position:absolute; inset:0; overflow:hidden;
              font-family:'Inter', system-ui, -apple-system, sans-serif; color:var(--fg-default);
              background: var(--bg-editor);">

    <style>
      #s05 { position: absolute; inset: 0; padding: 50px 60px; box-sizing: border-box; }

      #s05-head {
        font-family: 'Inter', system-ui, -apple-system, sans-serif;
        font-weight: 900;
        font-size: 60px;
        line-height: 1.05;
        letter-spacing: -1.5px;
        color: var(--fg-bright);
      }
      #s05-head .em { color: var(--brand-orange); }
      #s05-sub {
        margin-top: 10px;
        font-family: 'JetBrains Mono', 'Fira Code', ui-monospace, monospace;
        font-size: 22px;
        color: var(--fg-muted);
        letter-spacing: 0.5px;
      }

      #s05-querypill {
        margin-top: 16px;
        display: inline-flex;
        align-items: center;
        gap: 10px;
        background: rgba(247, 129, 102, 0.15);
        border: 1.5px solid var(--brand-orange);
        padding: 10px 18px;
        border-radius: 999px;
        font-family: 'JetBrains Mono', 'Fira Code', ui-monospace, monospace;
        font-weight: 800;
        font-size: 24px;
        color: var(--brand-orange);
        letter-spacing: 1.5px;
      }
      #s05-querypill .ico { font-size: 20px; }

      /* 3-row impact stack */
      #stat-stack {
        margin-top: 30px;
        display: flex;
        flex-direction: column;
        gap: 18px;
      }
      .stat-row {
        position: relative;
        display: grid;
        grid-template-columns: 200px 1fr 280px;
        align-items: center;
        gap: 28px;
        background: var(--bg-panel);
        border: 1px solid var(--border-strong);
        border-left: 6px solid var(--err);
        border-radius: 10px;
        padding: 20px 28px;
        min-height: 110px;
      }
      .stat-row .pct {
        font-family: 'Inter', system-ui, -apple-system, sans-serif;
        font-weight: 900;
        font-size: 88px;
        line-height: 1;
        letter-spacing: -3px;
        color: var(--err);
        text-shadow: 0 0 28px rgba(247, 129, 102, 0.45);
      }
      .stat-row .label {
        font-family: 'Inter', system-ui, -apple-system, sans-serif;
        font-weight: 800;
        font-size: 38px;
        color: var(--fg-bright);
        line-height: 1.15;
      }
      .stat-row .label .sm {
        display: block;
        font-family: 'JetBrains Mono', 'Fira Code', ui-monospace, monospace;
        font-size: 18px;
        font-weight: 600;
        color: var(--fg-muted);
        margin-top: 6px;
        letter-spacing: 1px;
      }
      .stat-row .verdict {
        font-family: 'JetBrains Mono', 'Fira Code', ui-monospace, monospace;
        font-weight: 800;
        font-size: 22px;
        color: var(--err);
        text-align: right;
        letter-spacing: 1px;
        padding: 10px 16px;
        background: rgba(247, 129, 102, 0.12);
        border: 1px solid var(--err);
        border-radius: 6px;
      }

      #stat-row-3 {
        border-left-color: var(--err);
      }
      #stat-row-3 .pct { font-size: 64px; color: var(--err); }
      #stat-row-3 .verdict { background: rgba(247, 129, 102, 0.2); }

      #s05-caption {
        margin-top: 22px;
        font-family: 'JetBrains Mono', 'Fira Code', ui-monospace, monospace;
        font-size: 22px;
        color: var(--fg-muted);
        line-height: 1.5;
      }
      #s05-caption .em { color: var(--fg-bright); font-weight: 700; }

      #s05-half-stamp {
        position: absolute;
        right: 60px;
        bottom: 50px;
        font-family: 'Inter', system-ui, -apple-system, sans-serif;
        font-weight: 900;
        font-size: 92px;
        letter-spacing: -3px;
        color: var(--ok);
        text-shadow: 0 0 40px rgba(78, 201, 176, 0.55);
        line-height: 0.9;
      }
      #s05-half-stamp .sm {
        display: block;
        font-family: 'JetBrains Mono', 'Fira Code', ui-monospace, monospace;
        font-size: 22px;
        font-weight: 800;
        color: var(--ok);
        letter-spacing: 3px;
        margin-top: 8px;
      }
    </style>

    <div id="s05">
      <div id="s05-head">
        One example isn't <span class="em">a pattern.</span>
      </div>
      <div id="s05-sub">// so we tested 5 common refactor searches on the same codebase</div>

      <div id="s05-querypill">
        <span class="ico">▣</span>
        <span>5 QUERIES · same codebase</span>
      </div>

      <div id="stat-stack">
        <div class="stat-row" id="stat-row-1">
          <div class="pct" id="stat-1-pct">0%</div>
          <div class="label">
            over-counted on debug logs
            <span class="sm">grep "console.log" vs. ast-grep 'console.log($A)'</span>
          </div>
          <div class="verdict" id="stat-1-verdict">26% MORE WORK</div>
        </div>

        <div class="stat-row" id="stat-row-2">
          <div class="pct" id="stat-2-pct">0%</div>
          <div class="label">
            over-counted on useState hooks
            <span class="sm">grep "useState" vs. ast-grep useState($_)</span>
          </div>
          <div class="verdict" id="stat-2-verdict">122% MORE WORK</div>
        </div>

        <div class="stat-row" id="stat-row-3">
          <div class="pct" id="stat-3-pct">∅</div>
          <div class="label">
            structural refactors grep can't even attempt
            <span class="sm">try-catch around async, conditional return, etc.</span>
          </div>
          <div class="verdict" id="stat-3-verdict">could not do this</div>
        </div>
      </div>

      <div id="s05-caption">
        // every false hit is a file your agent has to open, scan, and <span class="em">pay for</span>
      </div>

      <div id="s05-half-stamp">
        ½
        <span class="sm">AST-GREP CUTS IT IN HALF</span>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({ paused: true });

      // HIDE
      tl.set("#s05-head",       { opacity: 0, y: -16 }, 0);
      tl.set("#s05-sub",        { opacity: 0, y: -8 }, 0);
      tl.set("#s05-querypill",  { opacity: 0, scale: 0.85 }, 0);
      tl.set("#stat-row-1",     { opacity: 0, x: -30, scale: 0.97 }, 0);
      tl.set("#stat-row-2",     { opacity: 0, x: -30, scale: 0.97 }, 0);
      tl.set("#stat-row-3",     { opacity: 0, x: -30, scale: 0.97 }, 0);
      tl.set("#s05-caption",    { opacity: 0, y: 12 }, 0);
      tl.set("#s05-half-stamp", { opacity: 0, scale: 0.5, rotate: -10 }, 0);

      // Head — local 0
      tl.to("#s05-head", { opacity: 1, y: 0, duration: 0.55, ease: "expo.out" }, 0.0);
      tl.to("#s05-sub", { opacity: 1, y: 0, duration: 0.4, ease: "power2.out" }, 0.5);

      // Querypill — "we tested five common" (local 2.50)
      tl.to("#s05-querypill", { opacity: 1, scale: 1, duration: 0.45, ease: "back.out(1.6)" }, 2.50);

      // Row 1 — 26% — "over-counted by 26%" (local 6.65)
      tl.to("#stat-row-1", { opacity: 1, x: 0, scale: 1, duration: 0.5, ease: "back.out(1.4)" }, 6.65);
      const r1 = { v: 0 };
      tl.to(r1, {
        v: 26, duration: 0.6, ease: "power2.out",
        onUpdate() { const el = document.getElementById('stat-1-pct'); if (el) el.textContent = Math.round(r1.v) + '%'; }
      }, 7.10);
      tl.to("#stat-1-pct", { scale: 1.08, duration: 0.3, ease: "sine.inOut", yoyo: true, repeat: 1 }, 7.70);

      // Row 2 — 122% — "122% on useState" (local 13.50)
      // First show row 2 placeholder at local 10.25 (the 30% / promise mention) with quick numerical step
      tl.to("#stat-row-2", { opacity: 1, x: 0, scale: 1, duration: 0.5, ease: "back.out(1.4)" }, 10.25);
      // Brief 30% display then jumps to 122% on slam
      const r2 = { v: 0 };
      tl.to(r2, {
        v: 30, duration: 0.45, ease: "power2.out",
        onUpdate() { const el = document.getElementById('stat-2-pct'); if (el) el.textContent = Math.round(r2.v) + '%'; }
      }, 10.55);
      const r2v = document.createElement('span');
      // Slam to 122 at 13.50
      tl.to(r2, {
        v: 122, duration: 0.55, ease: "power3.out",
        onUpdate() { const el = document.getElementById('stat-2-pct'); if (el) el.textContent = Math.round(r2.v) + '%'; }
      }, 13.50);
      // CAMERA-ABUSE: row 2 slam pulse
      tl.to("#stat-row-2", { scale: 1.05, duration: 0.25, ease: "power3.out", yoyo: true, repeat: 1 }, 13.50);
      // Verdict swap
      tl.set("#stat-2-verdict", { textContent: "122% MORE WORK" }, 13.50);

      // Row 3 — "could not even do this" (local 17.0)
      tl.to("#stat-row-3", { opacity: 1, x: 0, scale: 1, duration: 0.5, ease: "back.out(1.4)" }, 17.0);

      // Caption — "every false hit is a file" (local 20.14)
      tl.to("#s05-caption", { opacity: 1, y: 0, duration: 0.45, ease: "power2.out" }, 20.14);

      // ½ HALF stamp — "cuts it in half" (local 24.40)
      tl.to("#s05-half-stamp", { opacity: 1, scale: 1, rotate: -4, duration: 0.55, ease: "back.out(2.5)" }, 24.40);
      tl.to("#s05-half-stamp", { scale: 1.06, duration: 0.3, ease: "sine.inOut", yoyo: true, repeat: 1 }, 25.10);

      tl.set({}, {}, 26.27);
      window.__timelines["scene-stat-pill-row"] = tl;
    </script>
  </div>
</template>
