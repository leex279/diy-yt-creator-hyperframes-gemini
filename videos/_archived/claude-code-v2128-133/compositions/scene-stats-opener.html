<!--
  scene-stats-opener.html — Stats opener (Phase 1) + lead-detail dive (Phase 2).

  Phase 1 (0..6.7s):  3 huge color-rotated stats with version badge
                       (27 features / 56 fixes / 11 improved)
  Phase 2 (6.7..30s): pills crossfade out; the "biggest patch" headline
                       in the header swaps to "Slash commands & settings —
                       what changed" and a 2x2 grid of 4 detail sub-cards
                       enters one-by-one on its narration cue.

  Mirrors the pattern of the reference Remotion Scene01McpOauth (stats opener
  + a category dive in the same scene).
-->
<template id="scene-stats-opener-template">
  <div data-composition-id="scene-stats-opener"
       data-start="0"
       data-width="1920"
       data-height="1080"
       style="position:absolute; inset:0; overflow:hidden;
              font-family:var(--sans); color:var(--text);">

    <style>
      #scene-stats-opener-content {
        width:100%; height:100%;
        padding: var(--pad-top) var(--pad-x) var(--pad-bottom);
        display:flex; flex-direction:column;
        align-items:center; justify-content:center;
        gap:36px;
        box-sizing:border-box;
      }
      #scene-stats-opener-content .header-block {
        display:flex; flex-direction:column;
        align-items:center; gap:12px;
        text-align:center;
      }
      #scene-stats-opener-content .vbadge {
        font-family: var(--mono);
        font-weight: 700;
        font-size: 26px;
        letter-spacing: 4px;
        text-transform: uppercase;
        color: var(--accent-1);
        opacity: 0;
      }
      #scene-stats-opener-content .overline {
        font-family: var(--mono);
        font-weight: 700;
        font-size: 26px;
        letter-spacing: 6px;
        text-transform: uppercase;
        color: var(--accent-warn);
        opacity: 0;
      }
      #scene-stats-opener-content .headline {
        font-family: var(--sans);
        font-weight: 800;
        font-size: 48px;
        line-height: 1.05;
        letter-spacing: -1px;
        color: var(--text);
        max-width: 1500px;
        opacity: 0;
      }

      /* Phase stack — phase 1 and phase 2 share the same flex slot below
         the header so the layout stays vertically centered on the canvas
         when phase 1 fades out (otherwise phase 2 anchored to bottom looks
         pressed against the canvas edge). */
      #so-phase-stack {
        position: relative;
        width: 1700px;
        height: 500px;
      }

      /* Phase 1 — pills row, centered inside the stack */
      #so-phase1 {
        position: absolute; inset: 0;
        display:flex; flex-direction:row;
        align-items:center; justify-content:center;
        gap: 36px;
      }
      .so-pill {
        width: 420px;
        padding: 48px 32px;
        border-radius: 28px;
        border: 1.5px solid var(--border-bright);
        background: rgba(255, 255, 255, 0.04);
        display:flex; flex-direction:column;
        align-items:center; gap: 18px;
        box-shadow: 0 24px 60px rgba(0, 0, 0, 0.55);
        opacity: 0;
      }
      .so-pill.cyan {
        background: linear-gradient(135deg,
                      rgba(88, 166, 255, 0.16) 0%,
                      rgba(88, 166, 255, 0.04) 100%);
        border-color: rgba(88, 166, 255, 0.55);
      }
      .so-pill.purple {
        background: linear-gradient(135deg,
                      rgba(163, 113, 247, 0.18) 0%,
                      rgba(163, 113, 247, 0.04) 100%);
        border-color: rgba(163, 113, 247, 0.55);
      }
      .so-pill.green {
        background: linear-gradient(135deg,
                      rgba(63, 185, 80, 0.16) 0%,
                      rgba(63, 185, 80, 0.04) 100%);
        border-color: rgba(63, 185, 80, 0.55);
      }
      .so-pill .stat-num {
        font-family: var(--sans);
        font-weight: 900;
        font-size: 110px;
        line-height: 0.9;
        letter-spacing: -4px;
        font-variant-numeric: tabular-nums lining-nums;
      }
      .so-pill.cyan   .stat-num { color: var(--accent-1); text-shadow: 0 0 60px rgba(88, 166, 255, 0.5); }
      .so-pill.purple .stat-num { color: var(--accent-3); text-shadow: 0 0 60px rgba(163, 113, 247, 0.5); }
      .so-pill.green  .stat-num { color: var(--accent-4); text-shadow: 0 0 60px rgba(63, 185, 80, 0.5); }
      .so-pill .stat-label {
        font-family: var(--mono);
        font-weight: 700;
        font-size: 22px;
        letter-spacing: 3px;
        text-transform: uppercase;
        color: var(--text-secondary);
        text-align: center;
      }

      /* Phase 2 — 2x2 detail grid, fills the same stack slot as phase 1 */
      #so-phase2 {
        position: absolute; inset: 0;
        opacity: 0;
        display: grid;
        grid-template-columns: 1fr 1fr;
        grid-template-rows: 1fr 1fr;
        gap: 24px;
      }
      .so-card {
        position: relative;
        padding: 24px 28px;
        border-radius: 14px;
        border: 2px solid var(--border-bright);
        background: rgba(255, 255, 255, 0.04);
        box-shadow: 0 14px 40px rgba(0, 0, 0, 0.45);
        display:flex; flex-direction:column;
        gap: 8px;
        min-height: 170px;
        box-sizing: border-box;
        opacity: 0;
      }
      .so-card::before {
        content: "";
        position: absolute;
        top: 0; left: 0; right: 0;
        height: 3px;
        background: linear-gradient(90deg, var(--card-accent, var(--accent-warn)), transparent);
        border-radius: 12px 12px 0 0;
      }
      .so-card .row { display:flex; align-items:center; gap: 12px; }
      .so-card .num {
        width: 38px; height: 38px;
        border-radius: 8px;
        font-family: var(--mono);
        font-weight: 800;
        font-size: 20px;
        font-variant-numeric: tabular-nums;
        display:flex; align-items:center; justify-content:center;
        background: rgba(255, 255, 255, 0.06);
        flex-shrink: 0;
      }
      .so-card .ttl {
        font-family: var(--sans);
        font-weight: 800;
        font-size: 24px;
        line-height: 1.18;
        letter-spacing: -0.3px;
        color: var(--text);
      }
      .so-card .det {
        font-family: var(--sans);
        font-weight: 500;
        font-size: 18px;
        line-height: 1.4;
        color: var(--text-secondary);
      }
      .so-card .det code {
        font-family: var(--mono);
        font-size: 16px;
        padding: 2px 6px;
        border-radius: 4px;
        background: rgba(255, 255, 255, 0.08);
      }
      .so-card.a { --card-accent: var(--accent-warn); border-color: rgba(247, 129, 102, 0.55); }
      .so-card.b { --card-accent: var(--accent-1);    border-color: rgba(88, 166, 255, 0.55);  }
      .so-card.c { --card-accent: var(--accent-3);    border-color: rgba(163, 113, 247, 0.55); }
      .so-card.d { --card-accent: var(--accent-4);    border-color: rgba(63, 185, 80, 0.55);   }
      .so-card.a .num { color: var(--accent-warn); background: rgba(247, 129, 102, 0.18); }
      .so-card.b .num { color: var(--accent-1);    background: rgba(88, 166, 255, 0.18);  }
      .so-card.c .num { color: var(--accent-3);    background: rgba(163, 113, 247, 0.18); }
      .so-card.d .num { color: var(--accent-4);    background: rgba(63, 185, 80, 0.18);   }
    </style>

    <div id="scene-stats-opener-content">
      <div class="header-block">
        <div class="vbadge"   id="so-vbadge">v2.1.128 — v2.1.133</div>
        <div class="overline" id="so-overline">WHAT SHIPPED</div>
        <div class="headline" id="so-headline">Six releases. Here are the receipts.</div>
      </div>

      <!-- Phase stack: phase 1 + phase 2 share the same flex slot below
           the header so the layout stays vertically centered through the
           pivot crossfade. -->
      <div id="so-phase-stack">
        <!-- Phase 1: stat pills -->
        <div id="so-phase1">
          <div class="so-pill cyan" id="so-pill-1">
            <div class="stat-num">28</div>
            <div class="stat-label">features</div>
          </div>
          <div class="so-pill purple" id="so-pill-2">
            <div class="stat-num">78</div>
            <div class="stat-label">fixes</div>
          </div>
          <div class="so-pill green" id="so-pill-3">
            <div class="stat-num">4</div>
            <div class="stat-label">improved</div>
          </div>
        </div>

        <!-- Phase 2: 2x2 MCP stability dive -->
        <div id="so-phase2">
          <div class="so-card a" id="so-card-1">
            <div class="row"><div class="num">01</div></div>
            <div class="ttl">No more tool-list floods</div>
            <div class="det">MCP reconnects summarize re-announced tools by server prefix.</div>
          </div>
          <div class="so-card b" id="so-card-2">
            <div class="row"><div class="num">02</div></div>
            <div class="ttl">Servers that fail tools-list retry</div>
            <div class="det"><code>/mcp</code> shows "connected · tools fetch failed" instead of 0 tools.</div>
          </div>
          <div class="so-card c" id="so-card-3">
            <div class="row"><div class="num">03</div></div>
            <div class="ttl">10 GB+ stdio memory leak — patched</div>
            <div class="det">Servers writing non-protocol stdout no longer balloon RSS.</div>
          </div>
          <div class="so-card d" id="so-card-4">
            <div class="row"><div class="num">04</div></div>
            <div class="ttl">MCP OAuth respects your proxy</div>
            <div class="det"><code>HTTP(S)_PROXY</code>, <code>NO_PROXY</code>, mTLS now honored end-to-end.</div>
          </div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      // Transcript-driven timing for v2.1.128–v2.1.133. scene_t = root_t (data-start 0).
      // Narration scene_t (relative):
      //   "Six Claude Code releases..."             scene_t 0.00  (#0)
      //   "Twenty eight new features..."            scene_t 3.94  (#11)  → pill 1
      //   "Seventy eight bug fixes..."              scene_t 6.12  (#15)  → pill 2
      //   "Four improvements."                      scene_t 7.41  (#19)  → pill 3
      //   "The biggest pass..."                     scene_t 9.42  (#22, phase 2 pivot)
      //   "Tool list reconnect floods..."           scene_t 13.94 (#33) → card 1
      //   "Servers that connect but fail..."        scene_t 20.53 (#47) → card 2
      //   "Stdio servers writing..."                scene_t 28.79 (#66) → card 3
      //   "And M C P OAuth now respects..."         scene_t 36.19 (#83) → card 4
      // Slot length: 44.18s
      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({ paused: true });

      // Header in place before "Six Claude Code" @ 0.0
      tl.fromTo("#so-vbadge",   { y: 14, opacity: 0 }, { y: 0, opacity: 1, duration: 0.4, ease: "power2.out" }, 0);
      tl.fromTo("#so-overline", { y: 20, opacity: 0 }, { y: 0, opacity: 1, duration: 0.4, ease: "power2.out" }, 0.15);
      tl.fromTo("#so-headline", { y: 30, opacity: 0 }, { y: 0, opacity: 1, duration: 0.5, ease: "power3.out" }, 0.30);

      // Pills enter on each spoken stat number
      tl.fromTo("#so-pill-1", { scale: 0.85, opacity: 0 },
                              { scale: 1,    opacity: 1, duration: 0.45, ease: "back.out(1.6)" }, 3.94);
      tl.fromTo("#so-pill-2", { scale: 0.85, opacity: 0 },
                              { scale: 1,    opacity: 1, duration: 0.45, ease: "back.out(1.6)" }, 6.12);
      tl.fromTo("#so-pill-3", { scale: 0.85, opacity: 0 },
                              { scale: 1,    opacity: 1, duration: 0.45, ease: "back.out(1.6)" }, 7.41);

      // PHASE PIVOT @ "The biggest pass — MCP" 9.42
      tl.to("#so-phase1", { opacity: 0, scale: 0.92, duration: 0.6, ease: "power2.in" }, 9.42);
      tl.to("#so-headline", { color: "#F78166", duration: 0.4, ease: "sine.inOut" }, 9.42);
      tl.set("#so-headline", { textContent: "MCP — four stability wins land together" }, 9.85);
      tl.fromTo("#so-headline", { y: -10, opacity: 0.4 },
                                { y: 0,   opacity: 1, duration: 0.4, ease: "power2.out" }, 9.85);
      tl.to("#so-phase2", { opacity: 1, duration: 0.5, ease: "power2.out" }, 9.85);

      // Card entrances on their spoken intro words
      const cards = [
        { sel: "#so-card-1", num: "#so-card-1 .num", at: 13.94 },
        { sel: "#so-card-2", num: "#so-card-2 .num", at: 20.53 },
        { sel: "#so-card-3", num: "#so-card-3 .num", at: 28.79 },
        { sel: "#so-card-4", num: "#so-card-4 .num", at: 36.19 },
      ];
      cards.forEach(({ sel, num, at }, i) => {
        const next = cards[i + 1] ? cards[i + 1].at : 43.0;
        const dwell = next - at;
        tl.fromTo(sel,
          { y: 24, opacity: 0, scale: 0.95 },
          { y: 0,  opacity: 1, scale: 1, duration: 0.45, ease: "back.out(1.4)" },
          at);
        if (dwell > 3.0) {
          tl.to(num, { scale: 1.18, duration: 0.25, ease: "power2.out", yoyo: true, repeat: 1 }, at + 1.6);
        }
      });

      // Tail-hold breath flash on all 4 cards just before phase exits
      tl.to("#so-phase2 .so-card",
        { boxShadow: "0 14px 40px rgba(0, 0, 0, 0.45), 0 0 0 3px var(--accent-4)",
          duration: 0.4, yoyo: true, repeat: 1, ease: "sine.inOut", stagger: 0.06 },
        42.4);

      // Anchor to slot length (44.18s)
      tl.set({}, {}, 44.18);

      window.__timelines["scene-stats-opener"] = tl;
    </script>
  </div>
</template>
