<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Google — Gemini Agent OS</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="tokens/long-form.css">
<script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>

<style>
  /* ──────────────────────────────────────────────────
     CANVAS — 1920x1080 Google brand cinematic stage.
     Comprehensive 25-phase showcase ported from the
     canonical google_v2 Shorts source — every visual
     archetype Google content might need, presented
     phase-mutex (only one phase visible per frame;
     blur+crossfade between).

     For a real long-form video (4-15 min), operators
     subset the 25 phases to ~6-10 and stretch each
     phase's duration. The bare template demos all 25
     at 5s each (125s total).
     ────────────────────────────────────────────────── */
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 1920px;
    height: 1080px;
    overflow: hidden;
    background: var(--bg-deep);
    font-family: 'Plus Jakarta Sans', 'Inter', system-ui, sans-serif;
    color: var(--text);
    -webkit-font-smoothing: antialiased;
  }

  /* ──────────────────────────────────────────────────
     THEME BACKGROUNDS (cinematic / spotlight / editorial)
     Set the theme by changing the class on #root
     (theme-cinematic | theme-spotlight | theme-editorial).
     ────────────────────────────────────────────────── */
  #root.theme-cinematic {
    background:
      radial-gradient(circle at 20% 18%, rgba(66,133,244,0.22) 0%, transparent 38%),
      radial-gradient(circle at 82% 32%, rgba(234,67,53,0.16) 0%, transparent 36%),
      radial-gradient(circle at 50% 75%, rgba(52,168,83,0.18) 0%, transparent 42%),
      radial-gradient(circle at 90% 90%, rgba(251,188,5,0.12) 0%, transparent 36%),
      linear-gradient(180deg, #06080F 0%, #0A0F1F 50%, #06080F 100%);
  }
  #root.theme-spotlight {
    background:
      radial-gradient(ellipse 80% 60% at 50% -10%, var(--accent-glow) 0%, transparent 60%),
      radial-gradient(ellipse 120% 50% at 50% 110%, rgba(255,255,255,0.04) 0%, transparent 60%),
      linear-gradient(180deg, #07090F 0%, #050810 100%);
  }
  #root.theme-editorial {
    background: linear-gradient(180deg, #0A0E1A 0%, #060912 100%);
  }
  #root.theme-editorial::before {
    content: "";
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(to right, rgba(255,255,255,0.025) 1px, transparent 1px),
      linear-gradient(to bottom, rgba(255,255,255,0.025) 1px, transparent 1px);
    background-size: 60px 60px;
    pointer-events: none;
    z-index: 0;
  }

  /* Cinematic vignette + floor */
  #root.theme-cinematic::after {
    content: "";
    position: absolute;
    inset: 0;
    background:
      radial-gradient(ellipse 90% 30% at 50% 100%, rgba(52,168,83,0.10) 0%, transparent 60%),
      radial-gradient(ellipse 70% 50% at 50% 100%, rgba(0,0,0,0.6) 0%, transparent 70%);
    pointer-events: none;
    z-index: 1;
  }

  /* Inner safe-area card stroke */
  #slide-frame {
    position: absolute;
    inset: 32px;
    border: 1px solid var(--border);
    border-radius: 28px;
    pointer-events: none;
    z-index: 1;
  }

  /* Top accent line — Google green→yellow ramp at top-left */
  #top-line {
    position: absolute;
    top: 0;
    left: 0;
    height: 4px;
    width: 18%;
    background: linear-gradient(90deg, var(--g-green), var(--g-yellow));
    z-index: 4;
  }

  /* Particle field — 60 dots, deterministic seeded scatter.
     Each particle drifts on its own GSAP yoyo (see script tag),
     plus a global breathing scale. Bigger radii (3-9px) read at
     1080x1920 better than the original 1-4px. */
  #particles {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
    z-index: 0;
    opacity: 0.7;
  }
  #particles circle { will-change: transform, opacity; }

  /* Google logo (top-right watermark — V2 Remotion reference convention).
     180×180 PNG with built-in transparent margin; top:-20 docks it to
     the top edge. Operators can swap to assets/google-g-logo.png for
     just the G mark, or to a sub-brand wordmark per video. */
  #glogo {
    position: absolute;
    top: -20px;
    right: 30px;
    z-index: 5;
    pointer-events: none;
    filter: drop-shadow(0 4px 12px rgba(0, 0, 0, 0.5));
  }
  #glogo img {
    width: 180px;
    height: 180px;
    object-fit: contain;
    display: block;
  }

  /* Slim progress bar — bottom edge (long-form has no SETUP/CREATE/EVAL
     /DEPLOY/PUBLISH 5-dot rail like the Shorts variant — long-form uses
     chapters in YouTube and a single linear progress bar). */
  #progress-track {
    position: absolute;
    bottom: 0;
    left: 0;
    width: 1920px;
    height: 6px;
    background: rgba(255, 255, 255, 0.06);
    z-index: 10;
  }
  #progress-fill {
    width: 0;
    height: 100%;
    background: linear-gradient(90deg, var(--g-blue) 0%, #00BCD4 100%);
    box-shadow: 0 0 12px rgba(66, 133, 244, 0.55);
  }

  /* ──────────────────────────────────────────────────
     PHASES — full-bleed, layered. Phase 1 visible by
     default; phases 2-4 start at opacity 0.
     ────────────────────────────────────────────────── */
  .phase {
    position: absolute;
    top: 0;
    left: 0;
    width: 1920px;
    height: 1080px;
    overflow: hidden;
    opacity: 0;
    visibility: hidden;
    z-index: 1;
  }
  #phase1 { opacity: 1; visibility: visible; }

  .phase-content {
    position: relative;
    width: 100%;
    height: 1080px;
    padding: var(--pad-top) var(--pad-x) var(--pad-bottom);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 28px;
    text-align: center;
    box-sizing: border-box;
  }

  .phase-header {
    width: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
  }

  .phase-body {
    width: 100%;
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;
    position: relative;
  }

  .phase-footer {
    width: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 14px;
    position: relative;
  }

  /* Eyebrow / headline / subhead common blocks */
  .eyebrow {
    font-family: 'JetBrains Mono', ui-monospace, monospace;
    font-size: 36px;
    font-weight: 600;
    letter-spacing: 6.5px;
    text-transform: uppercase;
    text-align: center;
    color: var(--accent);
    margin-bottom: 32px;
  }
  .headline {
    font-family: 'Plus Jakarta Sans', 'Inter', system-ui, sans-serif;
    font-weight: 800;
    line-height: 0.98;
    letter-spacing: -2px;
    text-align: center;
    text-wrap: balance;
    color: var(--ink-100);
    margin: 0 0 32px;
  }
  /* Long-form has shorter canvas (1080 vs 1920) — scale headlines down ~30% */
  .headline.xl { font-size: 116px; }
  .headline.l  { font-size: 96px; }
  .headline.m  { font-size: 76px; }
  .headline.s  { font-size: 60px; }
  .subhead {
    font-family: 'Plus Jakarta Sans', 'Inter', system-ui, sans-serif;
    font-size: 36px;
    font-weight: 600;
    line-height: 1.25;
    text-align: center;
    text-wrap: balance;
    color: var(--ink-60);
    margin: 0 0 40px;
  }

  /* ──────────────────────────────────────────────────
     PHASE 1 — HERO (eyebrow + xl headline + subhead)
     Pattern: scroll-stop hook, no rail, accent on eyebrow.
     ────────────────────────────────────────────────── */

  /* ──────────────────────────────────────────────────
     PHASE 2 — TERMINAL / CLI moment (eyebrow + m headline + 2 terminal blocks)
     ────────────────────────────────────────────────── */
  #phase2 .phase-content {
    gap: 36px;
  }
  .terminal {
    position: relative;
    width: 920px;
    background: #0A0E18;
    border: 1px solid var(--border-bright);
    border-radius: 18px;
    padding: 36px 40px;
    font-family: 'JetBrains Mono', ui-monospace, monospace;
    font-size: 38px;
    line-height: 1.5;
    color: var(--ink-80);
    overflow: hidden;
    text-align: left;
  }
  .terminal.with-rim::before {
    content: "";
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, var(--g-blue), var(--g-red), var(--g-yellow), var(--g-green));
  }
  .terminal .prompt { color: var(--ink-40); margin-right: 12px; }
  .terminal .cmd    { color: var(--g-green); }
  .terminal .arg    { color: var(--ink-100); }
  .terminal .flag   { color: var(--g-yellow); }
  .terminal .kw     { color: var(--g-blue); }
  .terminal .str    { color: #FFB66E; }

  /* ──────────────────────────────────────────────────
     PHASE 3 — INFO GRID (eyebrow + m headline + 2x2 chip grid)
     ────────────────────────────────────────────────── */
  #phase3 .phase-content {
    gap: 36px;
  }
  .chip-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 28px;
    width: 920px;
  }
  .chip {
    position: relative;
    border: 1px solid var(--border-bright);
    border-radius: 14px;
    padding: 28px 32px;
    background: var(--card);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    text-align: left;
  }
  .chip::before {
    content: "";
    position: absolute;
    left: 0; top: 18px; bottom: 18px;
    width: 4px;
    background: var(--chip-color, var(--g-blue));
    border-radius: 0 4px 4px 0;
  }
  .chip[data-color="blue"]   { --chip-color: var(--g-blue); }
  .chip[data-color="red"]    { --chip-color: var(--g-red); }
  .chip[data-color="yellow"] { --chip-color: var(--g-yellow); }
  .chip[data-color="green"]  { --chip-color: var(--g-green); }
  .chip .chip-label {
    font-family: 'JetBrains Mono', ui-monospace, monospace;
    font-size: 26px;
    font-weight: 600;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--chip-color, var(--g-blue));
    margin-bottom: 8px;
  }
  .chip .chip-value {
    font-family: 'Plus Jakarta Sans', 'Inter', system-ui, sans-serif;
    font-size: 50px;
    font-weight: 700;
    color: var(--ink-100);
    line-height: 1.05;
  }

  /* Big stat (alternate Phase 3 archetype) */
  .bigstat {
    text-align: center;
  }
  .bigstat .num {
    font-family: 'Plus Jakarta Sans', 'Inter', system-ui, sans-serif;
    font-size: 360px;
    font-weight: 800;
    line-height: 0.85;
    letter-spacing: -10px;
    background: linear-gradient(135deg, var(--g-blue) 0%, var(--g-green) 50%, var(--g-yellow) 100%);
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
    filter: drop-shadow(0 0 40px rgba(66,133,244,0.25));
  }
  .bigstat .num-suffix {
    font-size: 140px;
    font-weight: 700;
  }
  .bigstat .label {
    margin-top: 20px;
    font-family: 'JetBrains Mono', ui-monospace, monospace;
    font-size: 34px;
    letter-spacing: 6px;
    text-transform: uppercase;
    color: var(--ink-60);
  }

  /* ──────────────────────────────────────────────────
     PHASE 4 — SHIFT / CTA (light theme variant + quote + CTA pill)
     Toggle: add class theme-light on #phase4 to use the bright
     "the shift" surface, or leave default for cinematic dark.
     ────────────────────────────────────────────────── */
  #phase4.phase {
    background: transparent;
  }
  #phase4.theme-light {
    background:
      radial-gradient(circle at 25% 20%, rgba(66,133,244,0.10) 0%, transparent 35%),
      radial-gradient(circle at 80% 30%, rgba(234,67,53,0.07) 0%, transparent 35%),
      radial-gradient(circle at 50% 80%, rgba(52,168,83,0.10) 0%, transparent 40%),
      radial-gradient(circle at 90% 90%, rgba(251,188,5,0.08) 0%, transparent 35%),
      linear-gradient(180deg, #F4F6FB 0%, #EAEEF7 100%);
  }
  #phase4.theme-light .headline { color: var(--ink-on-light); }
  #phase4.theme-light .subhead  { color: #4A536C; }

  #phase4 .phase-content {
    gap: 36px;
  }
  .quote {
    position: relative;
    padding: 6px 0 6px 24px;
    border-left: 4px solid var(--accent);
    text-align: left;
    width: 920px;
  }
  .quote .q-mark {
    font-family: 'Plus Jakarta Sans', 'Inter', system-ui, sans-serif;
    font-size: 200px;
    font-weight: 800;
    line-height: 0.5;
    color: var(--accent);
    opacity: 0.3;
  }
  .quote .q-text {
    font-family: 'Plus Jakarta Sans', 'Inter', system-ui, sans-serif;
    font-size: 64px;
    font-weight: 700;
    line-height: 1.15;
    color: var(--ink-100);
    text-wrap: balance;
  }
  #phase4.theme-light .quote .q-text { color: var(--ink-on-light); }
  #phase4.theme-light .quote .q-mark { color: var(--accent); opacity: 0.4; }

  .cta-pill {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 14px;
    padding: 32px 64px;
    border-radius: 999px;
    background: var(--pill-bg);
    border: 1.5px solid var(--accent);
    font-family: 'JetBrains Mono', ui-monospace, monospace;
    font-size: 36px;
    font-weight: 600;
    letter-spacing: 5px;
    text-transform: uppercase;
    color: var(--ink-100);
    box-shadow: 0 0 60px -10px var(--accent);
  }
  .cta-pill .cta-label {
    font-family: 'JetBrains Mono', ui-monospace, monospace;
    font-size: 24px;
    letter-spacing: 5px;
    color: var(--ink-40);
    text-transform: uppercase;
    display: block;
  }
  .cta-pill .cta-value { color: var(--ink-100); font-size: 40px; }



  /* ──────────────────────────────────────────────────
     OPT-IN PATTERN: Hero figure card (Phase 1 image moments).
     Use to feature a screenshot / tweet / reference image in
     the hero phase. Replace the .subhead with .hero-figure:
       <figure class="hero-figure" id="p1-figure">
         <img src="assets/source-shot.png" alt="…" />
         <figcaption><span class="src-handle">@source</span> · DATE</figcaption>
       </figure>
     Animate with: tl.from('#p1-figure', {y:40, scale:0.94, opacity:0,
     duration:0.8, ease:"power3.out"}, 1.7);
     ────────────────────────────────────────────────── */
  .hero-figure {
    position: relative;
    width: 920px;
    margin: 16px auto 0;
    border-radius: 26px;
    overflow: hidden;
    border: 1px solid var(--border-bright);
    box-shadow:
      0 28px 100px -20px rgba(66,133,244,0.45),
      0 0 80px rgba(66,133,244,0.18);
    background: var(--card-bright);
  }
  .hero-figure::before {
    content: "";
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    background: linear-gradient(90deg, var(--g-blue), var(--g-red), var(--g-yellow), var(--g-green));
    z-index: 2;
  }
  .hero-figure img { width: 100%; height: auto; display: block; }
  .hero-figure figcaption {
    font-family: 'JetBrains Mono', ui-monospace, monospace;
    font-size: 22px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--ink-60);
    padding: 16px 28px 18px;
    text-align: left;
    border-top: 1px solid var(--border);
    background: rgba(10,14,26,0.85);
  }
  .hero-figure figcaption .src-handle { color: var(--accent); }

  /* ──────────────────────────────────────────────────
     OPT-IN PATTERN: Multi-sub-slide stage (any phase).
     Use when a phase has 2+ distinct content beats that should
     crossfade. Wrap the phase-content with .pX-stage and put
     each beat in its own .pX-slide block. Add .is-default-visible
     to the first sub-slide so it shows on first paint.
     Sub-slides are mutually exclusive (z-stacked, opacity-toggled).
     Naming: p2-stage / p3-stage / p4-stage etc. — phase-scoped.
     The shared base is .pX-slide { opacity:0; visibility:hidden; }
     plus colored variants via [data-color="blue|red|yellow|green"].
     ────────────────────────────────────────────────── */
  .p2-stage, .p3-stage, .p4-stage { position: relative; padding: 0; }
  .p2-slide, .p3-slide, .p4-slide {
    position: absolute;
    left: var(--pad-x);
    right: var(--pad-x);
    top: var(--pad-top);
    bottom: var(--pad-bottom);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    gap: 28px;
    opacity: 0;
    visibility: hidden;
    will-change: opacity, transform, filter;
  }
  .p2-slide.is-default-visible,
  .p3-slide.is-default-visible,
  .p4-slide.is-default-visible { opacity: 1; visibility: visible; }
  .p2-slide[data-color="blue"]   .p2-b-eyebrow,
  .p3-slide[data-color="blue"]   { --slot-color: var(--g-blue);   --slot-glow: rgba(66,133,244,0.45); }
  .p3-slide[data-color="yellow"] { --slot-color: var(--g-yellow); --slot-glow: rgba(251,188,5,0.45); }
  .p3-slide[data-color="green"]  { --slot-color: var(--g-green);  --slot-glow: rgba(52,168,83,0.45); }
  .p3-slide[data-color="red"]    { --slot-color: var(--g-red);    --slot-glow: rgba(234,67,53,0.45); }

  /* OPT-IN: numbered slot (Phase 3 sub-slides "01 / FEATURE NAME") */
  .p3-slot-num {
    font-family: 'JetBrains Mono', ui-monospace, monospace;
    font-size: 96px;
    font-weight: 800;
    color: var(--slot-color, var(--accent));
    line-height: 1;
    letter-spacing: -2px;
    text-shadow: 0 0 50px var(--slot-glow, var(--accent-glow));
    margin-bottom: -8px;
  }
  .p3-slide .p3-eyebrow {
    color: var(--slot-color, var(--accent));
    margin-bottom: 12px;
    font-family: 'JetBrains Mono', ui-monospace, monospace;
    font-size: 36px;
    font-weight: 600;
    letter-spacing: 6.5px;
    text-transform: uppercase;
    text-align: center;
  }
  .p3-slide .p3-headline,
  .p2-slide .p2-c-headline,
  .p4-slide .p4-perf-headline {
    font-family: 'Plus Jakarta Sans', 'Inter', system-ui, sans-serif;
    font-size: 88px;
    font-weight: 800;
    line-height: 0.98;
    letter-spacing: -1.5px;
    text-align: center;
    text-wrap: balance;
    color: var(--ink-100);
    margin: 0 0 12px;
  }
  .p3-slide .p3-headline { font-size: 92px; }

  /* OPT-IN: bullet/pill list (used by Phase 2C, 3, and 4A) */
  .p3-bullets, .p2-c-bullets, .p4-pills {
    list-style: none;
    margin: 0;
    padding: 0;
    display: flex;
    flex-direction: column;
    gap: 16px;
    width: 100%;
    max-width: 900px;
  }
  .p3-bullets li, .p2-c-bullets li, .p4-pills li {
    display: flex;
    align-items: center;
    gap: 22px;
    padding: 18px 28px;
    background: var(--card-bright);
    border: 1px solid var(--border-bright);
    border-left: 4px solid var(--slot-color, var(--accent));
    border-radius: 14px;
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    text-align: left;
    will-change: opacity, transform;
  }
  .p4-pills li[data-color="blue"]   { --slot-color: var(--g-blue); }
  .p4-pills li[data-color="yellow"] { --slot-color: var(--g-yellow); }
  .p4-pills li[data-color="green"]  { --slot-color: var(--g-green); }
  .p4-pills li[data-color="red"]    { --slot-color: var(--g-red); }
  .bullet-tag, .pill-tag {
    flex-shrink: 0;
    font-family: 'JetBrains Mono', ui-monospace, monospace;
    font-size: 26px;
    font-weight: 700;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--slot-color, var(--accent));
    min-width: 140px;
  }
  .bullet-detail, .pill-detail {
    flex: 1;
    font-family: 'Plus Jakarta Sans', 'Inter', system-ui, sans-serif;
    font-size: 30px;
    font-weight: 600;
    color: var(--ink-100);
    line-height: 1.25;
  }
  .p3-bullets code, .p2-c-bullets code {
    font-family: 'JetBrains Mono', ui-monospace, monospace;
    font-size: 26px;
    font-weight: 600;
    color: var(--ink-80);
    background: rgba(255, 255, 255, 0.06);
    padding: 2px 10px;
    border-radius: 6px;
  }

  /* OPT-IN: Phase 4A pill-list eyebrow (mono-blue, distinct from Phase 3) */
  .p4-perf-eyebrow {
    font-family: 'JetBrains Mono', ui-monospace, monospace;
    font-size: 36px;
    font-weight: 600;
    letter-spacing: 6.5px;
    text-transform: uppercase;
    text-align: center;
    color: var(--g-blue);
  }

  /* OPT-IN: Phase 2B settings-screenshot card (reuse pattern for any
     UI screenshot card — same shape as hero-figure, slightly different
     framing for code-style settings demonstrations).
     Sized to fill ~95% of canvas width — screenshots are the proof, give
     them real estate. max-height auto-fits portrait-aspect screenshots so
     they scale down rather than overflowing the sub-slide. */
  .settings-figure {
    position: relative;
    width: 960px;
    max-height: 1280px;
    margin: 0 auto;
    border-radius: 22px;
    overflow: hidden;
    border: 1px solid var(--border-bright);
    box-shadow:
      0 24px 80px -20px rgba(66,133,244,0.45),
      0 0 60px rgba(66,133,244,0.18);
    background: var(--card-bright);
    display: flex;
    flex-direction: column;
  }
  .settings-figure::before {
    content: "";
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    background: linear-gradient(90deg, var(--g-blue), var(--g-red), var(--g-yellow), var(--g-green));
    z-index: 2;
  }
  .settings-figure img {
    width: 100%;
    height: auto;
    display: block;

  /* ════════════════════════════════════════════════════════════════════
     LANDSCAPE OVERRIDES — content was authored for 1080×1920 vertical
     and the inherited widths (~920px) leave a horizontal canvas looking
     small + centered with empty sides. Everything here widens / re-flows
     for the 1920×1080 landscape canvas. Active area: 1760×880 after pads.
     ════════════════════════════════════════════════════════════════════ */

  /* Headlines — the vertical Shorts canvas is 1920px tall so headlines
     can be 148px. Landscape is only 1080px tall, so cap headlines at sizes
     that don't crowd the figure / body content below them. */
  .headline.xl { font-size: 92px; line-height: 0.98; margin: 0 0 18px; }
  .headline.l  { font-size: 78px; line-height: 1.0; margin: 0 0 18px; }
  .headline.m  { font-size: 62px; line-height: 1.02; margin: 0 0 18px; }
  .headline.s  { font-size: 52px; line-height: 1.04; margin: 0 0 16px; }
  .eyebrow { font-size: 26px; letter-spacing: 5px; margin-bottom: 14px; }
  .subhead { font-size: 30px; margin: 0 0 28px; }

  /* Phase content — go to flex-row patterns where it makes sense */
  .phase-content {
    height: 1080px;
    padding: var(--pad-top) var(--pad-x) var(--pad-bottom);
    gap: 24px;
  }
  .phase-header { gap: 8px; }
  .phase-body   { width: 100%; }

  /* Two-column landscape pattern — for hero phases with figure + copy */
  .landscape-split {
    display: grid;
    grid-template-columns: 1.05fr 1fr;
    gap: 64px;
    align-items: center;
    width: 100%;
    max-width: 1720px;
  }
  .landscape-split .ls-copy {
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    text-align: left;
    gap: 18px;
  }
  .landscape-split .ls-copy .eyebrow,
  .landscape-split .ls-copy .headline { text-align: left; }
  .landscape-split .ls-figure {
    width: 100%;
  }

  /* WIDER cards / containers — most were sized for 1080-wide canvas. */
  .terminal              { width: 1500px; font-size: 30px; }
  .chip-grid             { grid-template-columns: repeat(4, 1fr); width: 1700px; gap: 22px; }
  .chip                  { padding: 22px 26px; }
  .chip .chip-value      { font-size: 36px; }
  .chip .chip-label      { font-size: 20px; }
  .editor-panel          { width: 1500px; }
  .editor-body           { font-size: 26px; padding: 20px 28px; }
  .chart-container       { width: 1500px; gap: 18px; padding: 26px; }
  .chart-label           { font-size: 28px; width: 260px; }
  .chart-bar-bg          { height: 56px; }
  .chart-val             { font-size: 30px; width: 120px; }
  .compare-container     { width: 1500px; gap: 36px; }
  .compare-card          { padding: 44px 52px; }
  .compare-header        { font-size: 28px; margin-bottom: 18px; }
  .radial-container      { width: 460px; height: 460px; }
  .radial-val            { font-size: 132px; }
  .chat-container        { width: 1500px; gap: 24px; }
  .chat-bubble           { max-width: 1100px; font-size: 28px; padding: 22px 30px; }
  .chat-bubble-sender    { font-size: 22px; }
  .timeline-vertical     { width: 1700px; flex-direction: row; gap: 0; padding: 0; align-items: flex-start; justify-content: space-between; }
  .timeline-connector    { left: 80px; right: 80px; top: 50px; bottom: auto; width: auto; height: 4px; }
  .timeline-connector-fill { left: 80px; right: auto; top: 50px; width: 0%; height: 4px; background: linear-gradient(90deg, var(--g-blue), var(--g-green)); }
  .timeline-row          { flex-direction: column; align-items: center; gap: 14px; flex: 1; text-align: center; }
  .timeline-indicator    { width: auto; }
  .timeline-meta         { text-align: center; max-width: 320px; }
  .timeline-title        { font-size: 30px; }
  .timeline-desc         { font-size: 22px; }
  .dir-tree              { width: 1100px; font-size: 26px; padding: 32px 48px; }
  .pricing-grid          { width: 1600px; gap: 28px; }
  .price-card            { padding: 32px 28px; }
  .price-num             { font-size: 64px; }
  .git-grid-container    { width: 1600px; }
  .tweet-container       { width: 1300px; max-width: 1300px; gap: 22px; }
  .tweet-card            { padding: 28px 36px; }
  .tweet-body            { font-size: 30px; }
  .marquee-wrap          { width: 1920px; }
  .premium-quote-block   { width: 1500px; gap: 24px; }
  .quote-text-premium    { font-size: 38px; }
  .quote-card-premium    { padding: 40px 48px 32px; }
  .tier-ladder-grid      { width: 1600px; }
  .verdict-grid          { width: 1500px; gap: 22px; }
  .verdict-tile          { padding: 28px 22px; }
  .lock-chips-container  { width: 1500px; }
  .quote                 { width: 1500px; padding: 6px 0 6px 32px; }
  .quote .q-text         { font-size: 52px; }
  .quote .q-mark         { font-size: 160px; }
  .hero-figure           { max-width: 100%; }
  .settings-figure       { width: 1200px; max-height: 720px; }
  .node-stage            { width: 1500px; height: 480px; }

  /* Big stat — landscape can fit even bigger digits */
  .bigstat .num          { font-size: 320px; line-height: 0.85; }
  .bigstat .num-suffix   { font-size: 120px; }
  .bigstat .label        { font-size: 32px; margin-top: 16px; }

  /* Phase 1 hero — landscape split layout. Overrides applied on the phase-content directly. */
  #phase1 .phase-content {
    display: grid;
    grid-template-rows: auto 1fr;
    gap: 28px;
    padding: var(--pad-top) 100px 80px;
  }
  #phase1 .p1-headline-row {
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    text-align: left;
    gap: 4px;
    padding-right: 60px;
  }
  #phase1 .p1-headline-row .eyebrow,
  #phase1 .p1-headline-row .headline { text-align: left; }
  #phase1 .p1-headline-row .headline.xl { font-size: 84px; line-height: 0.98; margin: 0; }
  #phase1 .p1-landscape {
    display: grid;
    grid-template-columns: 1.15fr 1fr;
    gap: 60px;
    align-items: center;
    width: 100%;
  }
  #phase1 .p1-figure-side {
    width: 100%;
  }
  #phase1 .p1-figure-side .hero-figure {
    width: 100%;

  }
  #phase1 .p1-figure-side .hero-figure img {

    font-size: 22px;

  }

    text-align: left;
    gap: 18px;
  }
  #phase1 .p1-copy-side .badges-row {
    justify-content: flex-start !important;
    gap: 16px;
  }
  #phase1 .p1-copy-side .receipt-badge,
  #phase1 .p1-copy-side .confirm-badge {
    font-size: 22px !important;
    padding: 8px 18px;
  }
  #phase1 .p1-copy-side .price-collapse-pill {
    width: 100% !important;
    align-items: flex-start;
    text-align: left;
    padding: 20px 28px !important;
  }
  #phase1 .p1-copy-side .price-collapse-label {
    font-size: 22px !important;
    text-align: left;
    width: 100%;
  }
  #phase1 .p1-copy-side .price-collapse-row {
    width: 100%;
    justify-content: flex-start;
    gap: 24px !important;
  }
  #phase1 .p1-copy-side .price-collapse-old { font-size: 56px !important; }
  #phase1 .p1-copy-side .price-collapse-new { font-size: 88px !important; }

  /* Phase 6 — perspective tilt card: pull stage to a wider stance */
  #phase6 .perspective-stage { perspective: 2000px; }
  .tilt-card { width: 1100px; height: 560px; }

  /* Phase 14 — when in horizontal mode, give each step its own column */
  .timeline-row .timeline-circle { width: 48px; height: 48px; }

  /* Phase 15 — image carousel grid (replaces text marquee). 8 cards in 2 rows of 4. */
  .image-carousel {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    grid-template-rows: repeat(2, 1fr);
    gap: 22px;
    width: 1700px;
  }
  .image-carousel .card {
    position: relative;
    border-radius: 18px;
    overflow: hidden;
    border: 1px solid var(--border-bright);
    background: var(--card-bright);
    box-shadow: 0 14px 36px rgba(0,0,0,0.5);
    aspect-ratio: 16/9;
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
  }
  .image-carousel .card::before {
    content: "";
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 4px;
    background: var(--card-accent, var(--g-blue));
  }
  .image-carousel .card[data-color="blue"]   { --card-accent: var(--g-blue);   }
  .image-carousel .card[data-color="red"]    { --card-accent: var(--g-red);    }
  .image-carousel .card[data-color="yellow"] { --card-accent: var(--g-yellow); }
  .image-carousel .card[data-color="green"]  { --card-accent: var(--g-green);  }
  .image-carousel .card-bg {
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, var(--card-accent) 0%, transparent 60%);
    opacity: 0.18;
  }
  .image-carousel .card-overline {
    position: absolute;
    top: 18px;
    left: 22px;
    font-family: 'JetBrains Mono', ui-monospace, monospace;
    font-size: 16px;
    font-weight: 700;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--card-accent);
  }
  .image-carousel .card-title {
    position: relative;
    z-index: 2;
    padding: 18px 22px 20px;
    background: linear-gradient(0deg, rgba(6,8,15,0.92) 0%, rgba(6,8,15,0) 100%);
    font-family: 'Plus Jakarta Sans', 'Inter', system-ui, sans-serif;
    font-size: 24px;
    font-weight: 800;
    line-height: 1.18;
    color: var(--text);
    text-align: left;
  }
  .image-carousel .card-num {
    position: absolute;
    bottom: 14px;
    right: 22px;
    font-family: 'JetBrains Mono', ui-monospace, monospace;
    font-size: 38px;
    font-weight: 800;
    color: var(--card-accent);
    z-index: 3;
    text-shadow: 0 0 18px var(--card-accent);
    opacity: 0.92;
  }

  /* Phase 18 testimonial — wider */
  #phase18 .premium-quote-block { width: 1500px; }
  /* Phase 20 git grid — give it 24 columns instead of 18 to use width */
  #phase20 .git-grid { grid-template-columns: repeat(24, 1fr); gap: 8px; }

  /* Phase 22 CTA — beefier landscape CTA pill */
  .cta-pill { padding: 28px 56px; font-size: 32px; }
  .cta-pill .cta-label { font-size: 20px; }
  .cta-pill .cta-value { font-size: 34px; }

  /* ════════════════════════════════════════════════════════════════════
     IMAGE-CONTENT PRESETS (Phases 26-35) — fillable templates with image
     slots + content + reveal animations. Each preset has:
       - .photo-placeholder divs that operators replace with <img src="…">
       - Clear content slots (eyebrow, headline, body, captions)
       - A reveal animation built into the GSAP timeline
     ════════════════════════════════════════════════════════════════════ */

  /* Universal image placeholder — Google brand gradient + label. Replace
     each <div class="photo-placeholder" data-color="…">…</div> with
     <img src="assets/preset-images/photo-01.jpg"> when shipping a video. */
  .photo-placeholder {
    position: relative;
    width: 100%;
    height: 100%;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
    color: rgba(255,255,255,0.45);
    font-family: 'JetBrains Mono', ui-monospace, monospace;
    font-size: 20px;
    font-weight: 700;
    letter-spacing: 4px;
    text-transform: uppercase;
  }
  .photo-placeholder::before {
    content: "";
    position: absolute;
    inset: 0;
    background:
      linear-gradient(135deg, var(--ph-color, var(--g-blue)) 0%, transparent 60%),
      radial-gradient(circle at 70% 30%, rgba(255,255,255,0.10) 0%, transparent 50%),
      linear-gradient(180deg, rgba(10,14,26,0.55) 0%, rgba(6,8,15,0.85) 100%);
    z-index: 0;
  }
  .photo-placeholder::after {
    content: "";
    position: absolute;
    inset: 0;
    background:
      repeating-linear-gradient(45deg,
        rgba(255,255,255,0.02) 0,
        rgba(255,255,255,0.02) 2px,
        transparent 2px,
        transparent 14px);
    z-index: 1;
  }
  .photo-placeholder span { position: relative; z-index: 2; }
  .photo-placeholder[data-color="blue"]   { --ph-color: var(--g-blue);   }
  .photo-placeholder[data-color="red"]    { --ph-color: var(--g-red);    }
  .photo-placeholder[data-color="yellow"] { --ph-color: var(--g-yellow); }
  .photo-placeholder[data-color="green"]  { --ph-color: var(--g-green);  }
  .photo-placeholder[data-color="cyan"]   { --ph-color: #00BCD4;         }

  /* PRESET 26 — photo-fullbleed-headline.
     Full-screen image background with Ken Burns zoom + centered headline
     overlay + corner brand accent + bottom caption. */
  .preset-fullbleed {
    position: relative;
    width: 1760px;
    height: 880px;
    border-radius: 22px;
    overflow: hidden;
    border: 1px solid var(--border-bright);
    box-shadow: 0 30px 80px rgba(0,0,0,0.7);
  }
  .preset-fullbleed .pf-photo {
    position: absolute;
    inset: 0;
    z-index: 0;
  }
  .preset-fullbleed .pf-scrim {
    position: absolute;
    inset: 0;
    background:
      linear-gradient(180deg, rgba(6,8,15,0.30) 0%, rgba(6,8,15,0.75) 100%),
      radial-gradient(ellipse 60% 70% at 50% 50%, transparent 30%, rgba(6,8,15,0.6) 100%);
    z-index: 1;
  }
  .preset-fullbleed .pf-content {
    position: relative;
    z-index: 2;
    height: 100%;
    padding: 60px 80px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    text-align: center;
  }
  .preset-fullbleed .pf-eyebrow {
    font-family: 'JetBrains Mono', ui-monospace, monospace;
    font-size: 26px;
    font-weight: 700;
    letter-spacing: 6px;
    text-transform: uppercase;
    color: var(--g-yellow);
    margin-bottom: 18px;
  }
  .preset-fullbleed .pf-headline {
    font-family: 'Plus Jakarta Sans', 'Inter', system-ui, sans-serif;
    font-size: 110px;
    font-weight: 800;
    line-height: 0.98;
    letter-spacing: -2px;
    color: #ffffff;
    text-shadow: 0 8px 32px rgba(0,0,0,0.8);
    max-width: 1400px;
    text-wrap: balance;
  }
  .preset-fullbleed .pf-caption {
    position: absolute;
    bottom: 28px;
    left: 36px;
    font-family: 'JetBrains Mono', ui-monospace, monospace;
    font-size: 22px;
    font-weight: 600;
    letter-spacing: 3px;
    color: rgba(255,255,255,0.7);
    text-transform: uppercase;
  }
  .preset-fullbleed .pf-corner {
    position: absolute;
    top: 0; right: 0;
    width: 220px;
    height: 4px;
    background: linear-gradient(90deg, var(--g-blue), var(--g-red), var(--g-yellow), var(--g-green));
    z-index: 3;
  }

  /* PRESET 27 — photo-split-narrative.
     50/50 image-text split. Image left (16:9, Ken Burns), copy right
     (eyebrow + 60px headline + 28px body + bullet pills). */
  .preset-split {
    display: grid;
    grid-template-columns: 1.05fr 1fr;
    gap: 56px;
    width: 1760px;
    height: 760px;
    align-items: center;
  }
  .preset-split .ps-photo-wrap {
    position: relative;
    width: 100%;
    height: 100%;
    border-radius: 22px;
    overflow: hidden;
    border: 1px solid var(--border-bright);
    box-shadow: 0 24px 60px rgba(0,0,0,0.55);
  }
  .preset-split .ps-photo {
    position: absolute;
    inset: 0;
  }
  .preset-split .ps-copy {
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    text-align: left;
    gap: 18px;
  }
  .preset-split .ps-eyebrow {
    font-family: 'JetBrains Mono', ui-monospace, monospace;
    font-size: 24px;
    font-weight: 700;
    letter-spacing: 6px;
    text-transform: uppercase;
    color: var(--g-blue);
  }
  .preset-split .ps-headline {
    font-family: 'Plus Jakarta Sans', 'Inter', system-ui, sans-serif;
    font-size: 64px;
    font-weight: 800;
    line-height: 1.04;
    letter-spacing: -1px;
    color: #ffffff;
  }
  .preset-split .ps-body {
    font-family: 'Plus Jakarta Sans', 'Inter', system-ui, sans-serif;

    font-weight: 500;

  .preset-split .ps-bullets li {

  /* PRESET 28 — photo-trio-grid. 3 large 16:9 images side by side. */
  .preset-trio {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 32px;
    width: 1760px;
  }
  .preset-trio .pt-card {

  .preset-trio .pt-card[data-color="red"]    { --pt-accent: var(--g-red);    }

  .preset-trio .pt-meta {

  .preset-trio .pt-overline {

  .preset-trio .pt-title {

  /* PRESET 29 — photo-sextet-grid. 6 cards in 3×2 (V2 Scene02Grid style). */
  .preset-sextet {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    grid-template-rows: repeat(2, 1fr);

  .preset-sextet .ps6-card {

  .preset-sextet .ps6-card[data-color="red"]    { --ps6-accent: var(--g-red);    }
  .preset-sextet .ps6-card[data-color="yellow"] { --ps6-accent: var(--g-yellow); }
  .preset-sextet .ps6-card[data-color="green"]  { --ps6-accent: var(--g-green);  }
  .preset-sextet .ps6-card .ps6-photo {
    position: absolute;
    inset: 0;
    z-index: 0;
  }
  .preset-sextet .ps6-card .ps6-meta {
    position: relative;
    z-index: 2;
    padding: 16px 20px 18px 26px;
    background: linear-gradient(0deg, rgba(6,8,15,0.95) 0%, rgba(6,8,15,0) 100%);
    text-align: left;
  }
  .preset-sextet .ps6-overline {
    font-family: 'JetBrains Mono', ui-monospace, monospace;
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--ps6-accent);

  }
  .preset-sextet .ps6-title {
    font-family: 'Plus Jakarta Sans', 'Inter', system-ui, sans-serif;
    font-size: 22px;
    font-weight: 800;
    line-height: 1.18;

  /* PRESET 30 — photo-comparison. Before/After w/ arrow + delta chip. */
  .preset-compare {
    display: grid;
    grid-template-columns: 1fr 110px 1fr;
    gap: 24px;
    width: 1760px;
    align-items: center;

    aspect-ratio: 4/3;

    overflow: hidden;
    border: 2px solid var(--border-bright);

    top: 20px; left: 24px;
    z-index: 2;
    padding: 8px 18px;
    border-radius: 999px;
    background: rgba(6,8,15,0.85);
    border: 1.5px solid currentColor;
    font-family: 'JetBrains Mono', ui-monospace, monospace;
    font-size: 22px;
    font-weight: 700;
    letter-spacing: 3px;
    text-transform: uppercase;
  }
  .preset-compare .pc-card.before .pc-label { color: var(--g-red); }
  .preset-compare .pc-card.after  .pc-label { color: var(--g-green); }
  .preset-compare .pc-arrow {
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--g-green);
    font-size: 80px;
    font-weight: 900;
    text-shadow: 0 0 24px rgba(52,168,83,0.5);
  }
  .preset-compare .pc-delta {
    position: absolute;
    bottom: 20px; right: 24px;
    z-index: 2;
    font-family: 'Plus Jakarta Sans', 'Inter', system-ui, sans-serif;
    font-size: 64px;
    font-weight: 900;
    line-height: 1;
    color: var(--g-green);
    text-shadow: 0 4px 18px rgba(52,168,83,0.5);
  }
  .preset-compare .pc-card.before .pc-delta { color: var(--g-red); text-shadow: 0 4px 18px rgba(234,67,53,0.5); }

  .preset-callouts {
    position: relative;
    width: 1500px;
    height: 800px;
    border-radius: 22px;
    overflow: hidden;

    position: absolute;
    inset: 0;
    z-index: 0;

    position: absolute;
    z-index: 3;

    align-items: center;
    gap: 14px;

    height: 56px;

    justify-content: center;

    font-weight: 900;

    height: 720px;

<script>
  // ─────────────────────────────────────────────────────
  // Particles — 60 deterministic dots in 4 Google colors.
  // xmur3-style hash, no Math.random / Date.now.
  // ─────────────────────────────────────────────────────
  function seedHash(seed) {
    let h = 1779033703 ^ seed.length;
    for (let i = 0; i < seed.length; i++) {
      h = Math.imul(h ^ seed.charCodeAt(i), 3432918353);
      h = (h << 13) | (h >>> 19);
    }
    h = Math.imul(h ^ (h >>> 16), 2246822507);
    h = Math.imul(h ^ (h >>> 13), 3266489909);
    h ^= h >>> 16;
    return (h >>> 0) / 4294967296;
  }
  function spawnParticles(seedPrefix, container, count) {
    const colors = ['#4285F4', '#EA4335', '#FBBC05', '#34A853'];
    const ns = 'http://www.w3.org/2000/svg';
    const nodes = [];
    for (let i = 0; i < count; i++) {
      const x = seedHash(seedPrefix + '-x-' + i) * 100;
      const y = seedHash(seedPrefix + '-y-' + i) * 100;
      const r = 3 + seedHash(seedPrefix + '-r-' + i) * 6;
      const op = 0.25 + seedHash(seedPrefix + '-o-' + i) * 0.55;
      const ci = Math.floor(seedHash(seedPrefix + '-c-' + i) * colors.length);
      const c = document.createElementNS(ns, 'circle');
      c.setAttribute('cx', x + '%');
      c.setAttribute('cy', y + '%');
      c.setAttribute('r', String(r));
      c.setAttribute('fill', colors[ci]);
      c.setAttribute('opacity', String(op));
      c.dataset.dx  = String((seedHash(seedPrefix + '-dx-' + i) - 0.5) * 80);
      c.dataset.dy  = String((seedHash(seedPrefix + '-dy-' + i) - 0.5) * 80);
      c.dataset.dur = String(8 + seedHash(seedPrefix + '-dt-' + i) * 8);
      c.dataset.del = String(seedHash(seedPrefix + '-de-' + i) * 4);
      container.appendChild(c);
      nodes.push(c);
    }
    return nodes;
  }
  const PARTICLE_NODES = spawnParticles('google-short', document.getElementById('particles'), 60);

  // ─────────────────────────────────────────────────────
  // Root timeline construction
  // ─────────────────────────────────────────────────────
  window.__timelines = window.__timelines || {};
  const TOTAL_DURATION = 865.95;
  const tl = gsap.timeline({ paused: true });

  // Particle drift — global breathing yoyo
  tl.fromTo("#particles",
    { opacity: 0.55, scale: 1.0, transformOrigin: "50% 50%" },
    { opacity: 0.75, scale: 1.04, duration: 12, ease: "sine.inOut", yoyo: true, repeat: Math.ceil(TOTAL_DURATION / 12) },
    0);

  // Per-particle drift
  PARTICLE_NODES.forEach(function (c) {
    var dx  = parseFloat(c.dataset.dx);
    var dy  = parseFloat(c.dataset.dy);
    var dur = parseFloat(c.dataset.dur);
    var del = parseFloat(c.dataset.del);
    var cycles = Math.max(1, Math.floor((TOTAL_DURATION - del) / dur));
    if (cycles % 2 === 1) cycles += 1;
    tl.to(c, {
      x: dx, y: dy,
      duration: dur,
      ease: "sine.inOut",
      yoyo: true, repeat: cycles
    }, del);
  });

  // Reposition particles per phase
  function repositionParticlesPerPhase(tl, particleNodes, seedPrefix, phaseStartTimes) {
    if (!particleNodes.length || !phaseStartTimes.length) return;
    phaseStartTimes.forEach(function (sceneT, sceneIdx) {
      var positions = particleNodes.map(function (_, i) {
        var seed = seedPrefix + '-phase' + sceneIdx + '-' + i;
        return {
          cx: seedHash(seed + '-x') * 100,
          cy: seedHash(seed + '-y') * 100,
        };
      });
      particleNodes.forEach(function (c, i) {
        tl.to(c, {
          attr: {
            cx: positions[i].cx + '%',
            cy: positions[i].cy + '%',
          },
          duration: 1.0,
          ease: 'power2.inOut',
        }, sceneT - 0.3);
      });
    });
  }

  // Progress bar fills linearly across the 1920px canvas width
  tl.fromTo("#progress-fill",
    { width: 0 },
    { width: 1920, duration: TOTAL_DURATION, ease: "none" },
    0);

  // Top-line + Google logo entrance
  tl.from("#top-line", { scaleX: 0, transformOrigin: "0 50%", duration: 0.7, ease: "power3.out" }, 0.2);
  tl.from("#glogo",    { y: -20, opacity: 0, duration: 0.6, ease: "power2.out" }, 0.3);

  // ═══════════════════════════════════════════════════════
  // DYNAMIC PHASE CROSSFADES (Scenes 1-13)
  // ═══════════════════════════════════════════════════════
  const sceneStarts = [0.000, 44.865, 124.865, 189.815, 272.035, 341.162, 372.682, 430.065, 493.845, 568.665, 630.751, 693.133, 752.836, 812.836, 853.990];
  
  for (let i = 0; i < sceneStarts.length - 1; i++) {
    const currentId = `#scene-${i + 1}-wrap`;
    const nextId = `#scene-${i + 2}-wrap`;
    const transitionStart = sceneStarts[i + 1] - 0.4;

    // Fade out current phase
    if (document.querySelector(currentId)) {
      tl.to(currentId, { filter: "blur(20px)", scale: 1.04, duration: 0.5, ease: "power1.in" }, transitionStart);
      tl.to(currentId, { opacity: 0, duration: 0.4, ease: "power1.in" }, transitionStart + 0.3);
      tl.set(currentId, { visibility: "hidden" }, transitionStart + 0.7);
    }

    // Fade in next phase
    if (document.querySelector(nextId)) {
      tl.set(nextId, { filter: "blur(20px)", scale: 0.97, opacity: 0, visibility: "visible" }, transitionStart + 0.4);
      tl.to(nextId, { opacity: 1, duration: 0.3, ease: "power1.inOut", overwrite: "auto" }, transitionStart + 0.4);
      tl.to(nextId, { filter: "blur(0px)", scale: 1, duration: 0.5, ease: "power1.out", overwrite: "auto" }, transitionStart + 0.6);
    }
  }

  // Particle repositions at transitions
  const transitionStarts = sceneStarts.slice(1).map(t => t - 0.4);
  repositionParticlesPerPhase(tl, PARTICLE_NODES, 'google-short', transitionStarts);

  window.__timelines["main"] = tl;

  </script>
