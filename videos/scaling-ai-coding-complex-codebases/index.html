<script>
  // Deterministic seeded scatter for the shape backdrop (no Math.random).
  function seedHash(seed) {
    let h = 1779033703 ^ seed.length;
    for (let i = 0; i < seed.length; i++) {
      h = Math.imul(h ^ seed.charCodeAt(i), 3432918353);
      h = (h << 13) | (h >>> 19);
    }
    h = Math.imul(h ^ (h >>> 16), 2246822507);
    h = Math.imul(h ^ (h >>> 13), 3266489909);
    h ^= h >>> 16;
    return (h >>> 0) / 4294967296;
  }

  // Compute a scatter position set for `count` shapes given a seed prefix.
  // Returns array of { cx, cy, size, rot }.
  function computeScatter(seedPrefix, count) {
    const w = 1920, h = 1080, minSize = 180, sizeRange = 160;
    const minDist = 340, MAX_TRIES = 80;
    const placed = [];
    let attempt = 0;
    for (let i = 0; i < count; i++) {
      let best = null, bestScore = -1;
      for (let t = 0; t < MAX_TRIES; t++) {
        const seed = seedPrefix + '-' + i + '-' + attempt++;
        const size = minSize + seedHash(seed + '-size') * sizeRange;
        const cx = seedHash(seed + '-x') * (w - size * 0.4) + size * 0.2;
        const cy = seedHash(seed + '-y') * (h - size * 0.4) + size * 0.2;
        const rot = (seedHash(seed + '-rot') - 0.5) * 90;
        let nearest = Infinity;
        for (const p of placed) {
          const dx = cx - p.cx, dy = cy - p.cy;
          const d2 = dx * dx + dy * dy;
          if (d2 < nearest) nearest = d2;
        }
        if (nearest >= minDist * minDist) { best = { cx, cy, size, rot }; break; }
        if (nearest > bestScore) { bestScore = nearest; best = { cx, cy, size, rot }; }
      }
      placed.push(best);
    }
    return placed;
  }

  // Mount N <img> elements using the real Dynamous icon and a fixed scatter.
  function spawnShapes(seedPrefix, container, count) {
    const scatter = computeScatter(seedPrefix, count);
    const imgs = [];
    for (let i = 0; i < count; i++) {
      const s = scatter[i];
      const img = document.createElement('img');
      img.src = 'assets/dynamous-icon.png';
      img.crossOrigin = 'anonymous';
      img.style.cssText =
        'left:' + (s.cx - s.size / 2) + 'px;' +
        'top:' + (s.cy - s.size / 2) + 'px;' +
        'width:' + s.size + 'px;' +
        'height:' + s.size + 'px;';
      container.appendChild(img);
      gsap.set(img, { rotation: s.rot });
      imgs.push(img);
    }
    return imgs;
  }

  // Rearrange shapes to a new scatter at the given timeline time.
  // Each shape tweens to its target position over ~0.9s with a slight stagger.
  function rearrangeShapes(tl, imgs, seedPrefix, atTime) {
    const scatter = computeScatter(seedPrefix, imgs.length);
    imgs.forEach((img, i) => {
      const s = scatter[i];
      const targetLeft = s.cx - s.size / 2;
      const targetTop  = s.cy - s.size / 2;
      const targetW    = s.size;
      const targetH    = s.size;
      tl.to(img, {
        left:   targetLeft,
        top:    targetTop,
        width:  targetW,
        height: targetH,
        rotation: s.rot,
        x: 0, y: 0,
        duration: 0.9,
        ease: "power2.inOut"
      }, atTime + i * 0.04);
    });
  }

  function crossfadeScenes(tl, fromSel, toSel, atTime, flash) {
    tl.to(fromSel, { filter: "blur(18px)", scale: 1.03, duration: 0.5, ease: "power1.in" }, atTime);
    tl.to(fromSel, { opacity: 0, duration: 0.4, ease: "power1.in" }, atTime + 0.3);
    tl.set(fromSel, { visibility: "hidden" }, atTime + 0.7);
    tl.set(toSel,   { filter: "blur(18px)", scale: 0.97, opacity: 0, visibility: "visible" }, atTime + 0.4);
    tl.to(toSel,    { opacity: 1, duration: 0.3, ease: "power1.inOut", overwrite: "auto" }, atTime + 0.4);
    tl.to(toSel,    { filter: "blur(0px)", scale: 1, duration: 0.5, ease: "power1.out", overwrite: "auto" }, atTime + 0.6);

    if (flash) {
      tl.to("#flash-overlay", { opacity: 0.55, duration: 0.18, ease: "power2.out", overwrite: "auto" }, atTime + 0.35);
      tl.to("#flash-overlay", { opacity: 0,    duration: 0.45, ease: "power2.in",  overwrite: "auto" }, atTime + 0.55);
    }
  }

  // Root timeline construction
  const SHAPE_COUNT = 11;
  const shapeImgs = spawnShapes('scene-0', document.getElementById('shape-backdrop'), SHAPE_COUNT);

  window.__timelines = window.__timelines || {};
  const TOTAL_DURATION = 411;
  const tl = gsap.timeline({ paused: true });

  // Ambient breath
  tl.fromTo("#ambient",
    { opacity: 0.85, scale: 1.0 },
    { opacity: 1.0, scale: 1.04, duration: 30, ease: "sine.inOut", yoyo: true, repeat: Math.floor(TOTAL_DURATION / 60) },
    0);

  tl.to("#bg-halo",
    { opacity: 0.48, scale: 1.06, duration: 18, ease: "sine.inOut",
      yoyo: true, repeat: Math.floor(TOTAL_DURATION / 36), transformOrigin: "50% 50%" },
    0);
  tl.to("#bg-halo-2",
    { opacity: 0.34, scale: 1.05, duration: 22, ease: "sine.inOut",
      yoyo: true, repeat: Math.floor(TOTAL_DURATION / 44), transformOrigin: "50% 50%" },
    0);

  // Progress fill
  tl.fromTo("#progress-fill",
    { width: 0 },
    { width: 1920, duration: TOTAL_DURATION, ease: "none" },
    0);

  // Top banner fade-in
  tl.from("#top-banner", { y: -16, opacity: 0, duration: 0.6, ease: "power2.out" }, 0.2);

  // Scene labels â€” anchors so duration tweaks don't cascade
  tl.addLabel("workshop-intro",   0)
    .addLabel("headline-accent",  13.7)
    .addLabel("big-stat",         29.7)
    .addLabel("tension-pivot",    46.3)
    .addLabel("strategy-map",     57.3)
    .addLabel("vsa-tree",         89.1)
    .addLabel("brownfield-types", 140.3)
    .addLabel("context-tiers",    196.9)
    .addLabel("prime-family",     236.1)
    .addLabel("pillars-3",        274.1)
    .addLabel("worktrees",        298.8)
    .addLabel("coupling",         335.8)
    .addLabel("quote-card",       372.3)
    .addLabel("cta",              391.6);

  // Shape rearrange â€” one per scene transition, fired at the visual swap moment
  const SCENE_TIMES = [13.7, 29.7, 46.3, 57.3, 89.1, 140.3, 196.9, 236.1, 274.1, 298.8, 335.8, 372.3, 391.6];
  SCENE_TIMES.forEach((t, idx) => {
    rearrangeShapes(tl, shapeImgs, 'scene-' + (idx + 1), t - 0.05);
  });

  // Crossfades â€” `flash: true` on the hero pivot + CTA landing boundaries
  crossfadeScenes(tl, "#scene-workshop-intro-wrap",    "#scene-headline-accent-wrap",  "headline-accent-=0.4",  false);
  crossfadeScenes(tl, "#scene-headline-accent-wrap",   "#scene-big-stat-wrap",         "big-stat-=0.4",         false);
  crossfadeScenes(tl, "#scene-big-stat-wrap",          "#scene-tension-pivot-wrap",    "tension-pivot-=0.4",    true);
  crossfadeScenes(tl, "#scene-tension-pivot-wrap",     "#scene-strategy-map-wrap",     "strategy-map-=0.4",     false);
  crossfadeScenes(tl, "#scene-strategy-map-wrap",      "#scene-vsa-tree-wrap",         "vsa-tree-=0.4",         false);
  crossfadeScenes(tl, "#scene-vsa-tree-wrap",          "#scene-brownfield-types-wrap", "brownfield-types-=0.4", false);
  crossfadeScenes(tl, "#scene-brownfield-types-wrap",  "#scene-context-tiers-wrap",    "context-tiers-=0.4",    false);
  crossfadeScenes(tl, "#scene-context-tiers-wrap",     "#scene-prime-family-wrap",     "prime-family-=0.4",     false);
  crossfadeScenes(tl, "#scene-prime-family-wrap",      "#scene-pillars-3-wrap",        "pillars-3-=0.4",        false);
