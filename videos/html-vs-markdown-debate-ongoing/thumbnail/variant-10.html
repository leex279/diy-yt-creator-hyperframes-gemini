<!DOCTYPE html>
<!-- Variant 10 — Bold caps anti-thumbnail.
     MARKDOWN vs HTML dominant topic at top.
     "THE DEBATE IS NOT OVER." italic terracotta on "NOT".
     Big ROUND 2 stamp diagonal top-right corner.
     Sub: "8 days. 1000 replies. Part 2 ships."
     Theme: white minimal. -->
<html lang="en"><head><meta charset="utf-8">
<title>v10 — Topic + THE DEBATE IS NOT OVER + ROUND 2 stamp</title>
<link rel="stylesheet" href="_base.css">
<style>
  /* Diagonal ROUND 2 stamp — top-right */
  .round2-stamp {
    position: absolute;
    top: 44px; right: 48px;
    font-family: var(--mono);
    font-weight: 700;
    font-size: 20px;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: #fff;
    background: var(--accent-terracotta);
    padding: 10px 22px;
    border-radius: 8px;
    transform: rotate(5deg);
    box-shadow: 0 6px 20px rgba(199, 90, 63, 0.40);
    z-index: 10;
  }

  /* Topic header — dominant */
  .topic-header {
    position: absolute;
    top: 108px;
    left: 60px;
    right: 60px;
    text-align: center;
  }
  .topic-row {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 22px;
    font-family: var(--sans-display);
    font-weight: 900;
    line-height: 1;
  }
  .topic-term {
    font-size: 96px;
    color: var(--text-cream);
    letter-spacing: -3px;
  }
  .vs-sep {
    font-family: var(--serif);
    font-style: italic;
    font-weight: 800;
    font-size: 52px;
    color: var(--text-dim-cream);
    padding: 0 4px;
  }
  .topic-rule {
    width: 60px; height: 3px;
    background: var(--accent-terracotta);
    margin: 12px auto 0;
    border-radius: 2px;
    opacity: 0.5;
  }

  /* Main statement block */
  .stmt-block {
    position: absolute;
    top: 298px;
    left: 60px;
    right: 60px;
    line-height: 0.94;
  }
  .stmt-line {
    display: block;
    font-family: var(--serif);
    font-weight: 800;
    letter-spacing: -3px;
    color: var(--text-cream);
  }
  .stmt-sm { font-size: 82px; }
  .stmt-lg { font-size: 118px; letter-spacing: -4px; }
  .stmt-not {
    font-style: italic;
    color: var(--accent-terracotta);
  }
  .subline {
    display: block;
    margin-top: 18px;
    font-family: var(--mono);
    font-weight: 700;
    font-size: 20px;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: var(--text-dim-cream);
  }
  .subline strong { color: var(--accent-deep-red); }

  .theme-white .brand {
    left: auto; bottom: 50px; top: auto; right: 60px;
  }
</style></head>
<body>
  <div class="thumb theme-white">
    <div class="overline">The Debate</div>
    <div class="overline-divider"></div>

    <!-- ROUND 2 stamp diagonal top-right -->
    <div class="round2-stamp">ROUND 2</div>

    <!-- Dominant topic header -->
    <div class="topic-header">
      <div class="topic-row">
        <span class="topic-term">MARKDOWN</span>
        <span class="vs-sep">vs</span>
        <span class="topic-term">HTML</span>
      </div>
      <div class="topic-rule"></div>
    </div>

    <!-- Statement block -->
    <div class="stmt-block">
      <span class="stmt-line stmt-sm">THE DEBATE IS</span>
      <span class="stmt-line stmt-lg"><span class="stmt-not">NOT</span> OVER.</span>
      <span class="subline"><strong>8 days.</strong> 1000 replies. Part 2 ships.</span>
    </div>

    <div class="brand"><span class="dot"></span><span>diy-yt-creator</span></div>
  </div>
</body></html>
