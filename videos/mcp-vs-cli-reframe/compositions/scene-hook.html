<!--
  scene-hook.html — Cold open (~45s).
  Step-by-step build, 3D entrances, no flicker pulses.
  Narration anchors (t_rel):
    0.0   "For most of 2025..."        → tag-row
    5.2   "just give the agent a shell" → headline left-half
    8.5   "use M C P, the protocol"     → headline right-half + reveal
   14.0   "Both were arguing about     → "wrong thing" bracket highlights
          the wrong thing"
   19.4   "We probed seven"             → stat ASCII frame + meta
   22.8   "Sixteen thousand tokens"     → counter ticks 0 → 16,506
   26.1   "before the agent does"       → stat-sub
   29.5   "In the next eight minutes"   → coming-up label
   33.6   "from one hundred and fifty"  → chip #1 (98.7%)
   36.5   "down to two thousand"        → chip #2 (99.9%)
   38.6   "Where the debate"            → chip #3 (5-layer runtime)
   40.9   "what to do about"            → chip #4 (97M+)
   43.8   "Let's go"                    → final pulse + subline
-->
<template id="scene-hook-template">
  <div data-composition-id="scene-hook"
       data-start="0"
       data-width="1920"
       data-height="1080"
       style="position:absolute; inset:0; overflow:hidden; perspective:2000px;
              font-family:var(--sans); color:var(--text);">

    <style>
      #scene-hook-content {
        width:100%; height:100%;
        padding: var(--pad-top) var(--pad-x) var(--pad-bottom);
        display:flex; flex-direction:column;
        align-items:center; justify-content:center;
        text-align:center; gap:18px;
        box-sizing:border-box;
        position: relative;
        transform-style: preserve-3d;
      }

      /* Tag row */
      #scene-hook-content .tag-row {
        display: flex; align-items: center; gap: 16px;
        font-family: var(--mono);
        font-size: 22px;
        letter-spacing: 5px;
        text-transform: uppercase;
        font-weight: 700;
        transform-style: preserve-3d;
      }
      #scene-hook-content .tag-row .pill {
        padding: 8px 16px;
        border: 1.5px solid var(--accent-warn);
        border-radius: 4px;
        color: var(--accent-warn);
        background: rgba(251, 146, 60, 0.07);
      }
      #scene-hook-content .tag-row .vs {
        color: var(--text-secondary);
        font-weight: 500;
        letter-spacing: 3px;
      }
      #scene-hook-content .tag-row .live {
        color: var(--accent-2);
        display: inline-flex; align-items: center; gap: 10px;
      }
      #scene-hook-content .tag-row .live::before {
        content: "";
        width: 9px; height: 9px;
        border-radius: 50%;
        background: var(--accent-2);
        box-shadow: 0 0 12px var(--glow-cyan);
      }

      /* Headline — mono, bracket-framed highlight */
      #scene-hook-content .headline {
        font-family: var(--mono);
        font-weight: 700;
        font-size: 88px;
        line-height: 1.05;
        letter-spacing: -3px;
        color: var(--text);
        max-width: 1600px;
        margin-top: 6px;
        transform-style: preserve-3d;
      }
      #scene-hook-content .headline .w {
        display: inline-block;
        transform-style: preserve-3d;
      }
      #scene-hook-content .headline .highlight {
        color: var(--accent-warn);
        position: relative;
        white-space: nowrap;
        display: inline-block;
      }
      #scene-hook-content .headline .highlight .bk {
        position: absolute;
        top: 50%;
        transform: translateY(-50%);
        font-weight: 800;
        color: var(--accent-stat);
        opacity: 0;
      }
      #scene-hook-content .headline .highlight .bk.l { left: -38px; }
      #scene-hook-content .headline .highlight .bk.r { right: -38px; }

      /* Stat ASCII frame */
      #scene-hook-content .stat-frame {
        position: relative;
        margin-top: 22px;
        padding: 26px 80px;
        display:flex; flex-direction:column;
        align-items:center;
        transform-style: preserve-3d;
      }
      #scene-hook-content .stat-frame .corner {
        position: absolute;
        font-family: var(--mono);
        font-weight: 800;
        font-size: 32px;
        color: var(--accent-stat);
        opacity: 0;
      }
      #scene-hook-content .stat-frame .corner.tl { top: 0; left: 0; }
      #scene-hook-content .stat-frame .corner.tr { top: 0; right: 0; }
      #scene-hook-content .stat-frame .corner.bl { bottom: 0; left: 0; }
      #scene-hook-content .stat-frame .corner.br { bottom: 0; right: 0; }

      #scene-hook-content .stat-meta {
        font-family: var(--mono);
        font-weight: 600;
        font-size: 16px;
        letter-spacing: 4px;
        text-transform: uppercase;
        color: var(--text-secondary);
        margin-bottom: 8px;
      }
      #scene-hook-content .stat-meta .ok {
        color: var(--accent-4);
      }
      #scene-hook-content .stat {
        font-family: var(--mono);
        font-weight: 800;
        font-size: 190px;
        line-height: 0.9;
        letter-spacing: -8px;
        color: var(--accent-stat);
        font-variant-numeric: tabular-nums lining-nums;
        text-shadow: 0 0 80px rgba(250, 204, 21, 0.45),
                     0 12px 30px rgba(0, 0, 0, 0.7);
        display: inline-flex;
        align-items: baseline;
        gap: 18px;
        transform-style: preserve-3d;
      }
      #scene-hook-content .stat .unit {
        font-size: 60px;
        font-weight: 700;
        color: var(--text);
        letter-spacing: 8px;
        text-shadow: none;
      }
      #scene-hook-content .stat-sub {
        font-family: var(--mono);
        font-weight: 500;
        font-size: 22px;
        letter-spacing: 2px;
        color: var(--text-secondary);
        margin-top: 12px;
      }
      #scene-hook-content .stat-sub b { color: var(--text); font-weight: 700; }
      #scene-hook-content .stat-sub .arrow { color: var(--accent-warn); margin: 0 6px; }

      /* Token burst particles */
      #hook-burst {
        position: absolute;
        inset: 0;
        pointer-events: none;
        z-index: 0;
      }
      #hook-burst .p {
        position: absolute;
        font-family: var(--mono);
        font-weight: 600;
        font-size: 14px;
        color: var(--accent-stat);
        opacity: 0;
        white-space: nowrap;
      }
      #hook-burst .p.b { color: var(--accent-warn); }
      #hook-burst .p.c { color: var(--accent-2); }

      /* Backdrop ghost glyph (very dim) */
      #hook-ghost {
        position: absolute;
        right: -60px;
        bottom: -120px;
        font-family: var(--mono);
        font-weight: 800;
        font-size: 720px;
        line-height: 0.85;
        letter-spacing: -36px;
        color: rgba(251, 146, 60, 0.025);
        pointer-events: none;
        z-index: 0;
        user-select: none;
      }

      /* Subline */
      #scene-hook-content .subline {
        font-family: var(--sans);
        font-weight: 600;
        font-size: 28px;
        letter-spacing: -0.3px;
        line-height: 1.3;
        color: var(--text-secondary);
        max-width: 1400px;
        margin-top: 6px;
      }
      #scene-hook-content .subline b { color: var(--accent-2); font-weight: 700; }

      /* Coming-up strip */
      #scene-hook-content .coming-up {
        display: flex; flex-direction: column;
        align-items: center;
        gap: 12px;
        margin-top: 10px;
        transform-style: preserve-3d;
      }
      #scene-hook-content .coming-up .label {
        font-family: var(--mono);
        font-weight: 600;
        font-size: 13px;
        letter-spacing: 4px;
        text-transform: uppercase;
        color: var(--text-muted);
        display: inline-flex; align-items: center; gap: 12px;
      }
      #scene-hook-content .coming-up .label::before,
      #scene-hook-content .coming-up .label::after {
        content: "";
        width: 40px;
        height: 1px;
        background: var(--border-bright);
      }
      #scene-hook-content .coming-up .chips {
        display: flex; flex-direction: row;
        gap: 14px;
        transform-style: preserve-3d;
      }
      .cu-chip {
        padding: 9px 18px;
        border-radius: 6px;
        border: 1.5px solid var(--border-bright);
        background: rgba(255, 255, 255, 0.03);
        font-family: var(--mono);
        font-weight: 700;
        font-size: 17px;
        letter-spacing: 1.5px;
        display: inline-flex; align-items: center; gap: 10px;
        transform-style: preserve-3d;
        backface-visibility: hidden;
      }
      .cu-chip .ico {
        font-size: 13px;
        font-weight: 800;
        opacity: 0.6;
      }
      .cu-chip.a { color: var(--accent-warn); border-color: rgba(251, 146, 60, 0.45); }
      .cu-chip.b { color: var(--accent-3); border-color: rgba(167, 139, 250, 0.45); }
      .cu-chip.c { color: var(--accent-2); border-color: rgba(34, 211, 238, 0.45); }
      .cu-chip.d { color: var(--accent-4); border-color: rgba(52, 211, 153, 0.45); }
    </style>

    <div id="scene-hook-content">
      <div id="hook-ghost">{ }</div>
      <div id="hook-burst"></div>

      <div class="tag-row" id="hook-tag-row">
        <span class="pill">MCP <span style="color: var(--text-secondary); margin: 0 4px;">vs</span> CLI</span>
        <span class="vs">·</span>
        <span class="live">WE RAN THE NUMBERS</span>
      </div>

      <div class="headline" id="hook-headline">
        <span class="w" data-w="0">Both</span>
        <span class="w" data-w="1">sides</span>
        <span class="w" data-w="2">were</span>
        <span class="w" data-w="3">arguing</span><br/>
        <span class="w" data-w="4">about</span>
        <span class="w" data-w="5">the</span>
        <span class="highlight" id="hook-highlight">
          <span class="bk l" id="hook-bk-l">[</span><span class="w" data-w="6">wrong</span>
          <span class="w" data-w="7">thing</span><span class="bk r" id="hook-bk-r">]</span>
        </span>
        <span class="w" data-w="8">.</span>
      </div>

      <div class="stat-frame" id="hook-stat-frame">
        <span class="corner tl">┌</span>
        <span class="corner tr">┐</span>
        <span class="corner bl">└</span>
        <span class="corner br">┘</span>
        <div class="stat-meta" id="hook-stat-meta">
          <span class="ok">●</span> MEASURED · 7 MCP SERVERS · 101 TOOLS
        </div>
        <div class="stat" id="hook-stat">
          <span id="hook-stat-num">0</span>
          <span class="unit">TOKENS</span>
        </div>
        <div class="stat-sub" id="hook-stat-sub">
          sitting in context <span class="arrow">→</span> before the agent runs a single command
        </div>
      </div>

      <div class="subline" id="hook-subline">
        The debate looked like <b>MCP vs CLI</b>. It wasn't.
      </div>

      <div class="coming-up" id="hook-coming-up">
        <div class="label" id="cu-label">// next 8 min</div>
        <div class="chips">
          <div class="cu-chip a" id="cu-chip-1"><span class="ico">01</span>98.7% drop</div>
          <div class="cu-chip b" id="cu-chip-2"><span class="ico">02</span>99.9% drop</div>
          <div class="cu-chip c" id="cu-chip-3"><span class="ico">03</span>5-layer runtime</div>
          <div class="cu-chip d" id="cu-chip-4"><span class="ico">04</span>97M+ MCP downloads</div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({ paused: true });

      // Deterministic hash for burst seeds
      function seedHash(seed) {
        let h = 1779033703 ^ seed.length;
        for (let i = 0; i < seed.length; i++) {
          h = Math.imul(h ^ seed.charCodeAt(i), 3432918353);
          h = (h << 13) | (h >>> 19);
        }
        h = Math.imul(h ^ (h >>> 16), 2246822507);
        h = Math.imul(h ^ (h >>> 13), 3266489909);
        h ^= h >>> 16;
        return (h >>> 0) / 4294967296;
      }

      // Build token-burst particles
      const burstEl = document.getElementById('hook-burst');
      if (burstEl) {
        const words = ['16506', '101', '7 srv', 'tools.json', 'schema', 'mcp.list', '15k', '17k', '50k+', 'context', 'tk++', '0x3a'];
        const tiers = ['', 'b', 'c'];
        const N = 22;
        for (let i = 0; i < N; i++) {
          const seed = 'hook-burst-' + i;
          const angle = seedHash(seed + '-a') * Math.PI * 2;
          const distance = 280 + seedHash(seed + '-d') * 360;
          const x = 960 + Math.cos(angle) * distance;
          const y = 540 + Math.sin(angle) * (distance * 0.55);
          const el = document.createElement('span');
          el.className = 'p ' + tiers[Math.floor(seedHash(seed + '-t') * tiers.length)];
          el.textContent = words[Math.floor(seedHash(seed + '-w') * words.length)];
          el.style.left = x + 'px';
          el.style.top = y + 'px';
          burstEl.appendChild(el);
        }
      }

      // ══════════ HIDE EVERYTHING AT t=0 ══════════
      tl.set("#hook-tag-row",       { opacity: 0, y: -32, rotationX: 60, transformOrigin: "center top" }, 0);
      tl.set("#hook-headline .w",   { opacity: 0, y: 36, rotationX: 60, transformOrigin: "center bottom" }, 0);
      tl.set("#hook-bk-l",          { opacity: 0, x: -16 }, 0);
      tl.set("#hook-bk-r",          { opacity: 0, x: 16 }, 0);
      tl.set("#hook-stat-frame",    { opacity: 0 }, 0);
      tl.set("#scene-hook-content .stat-frame .corner", { opacity: 0, scale: 0.4 }, 0);
      tl.set("#hook-stat-meta",     { opacity: 0, y: 14 }, 0);
      tl.set("#hook-stat",          { opacity: 0, scale: 0.7, rotationX: 70, transformOrigin: "center center" }, 0);
      tl.set("#hook-stat-sub",      { opacity: 0, y: 16 }, 0);
      tl.set("#hook-subline",       { opacity: 0, y: 16 }, 0);
      tl.set("#cu-label",           { opacity: 0, y: 12 }, 0);
      tl.set(".cu-chip",            { opacity: 0, rotationY: -180, y: 24, transformOrigin: "center center" }, 0);
      tl.set("#hook-burst",         { opacity: 0 }, 0);

      // ══════════ NARRATION-SYNCED REVEALS ══════════

      // 0.2s — tag-row drops from above with 3D rotation
      tl.to("#hook-tag-row",
        { opacity: 1, y: 0, rotationX: 0, duration: 0.9, ease: "expo.out" }, 0.2);

      // 1.5–8.5s — headline reveals word-by-word with rotateX flip
      //   Words 0–3 (Both sides were arguing) — 1.5 to 4.0
      //   Words 4–8 (about the wrong thing.) — 4.5 to 10.0
      const wordTimes = [1.5, 2.0, 2.5, 3.0, 4.5, 5.0, 5.5, 6.0, 6.4];
      wordTimes.forEach((t, i) => {
        tl.to(`#hook-headline .w[data-w="${i}"]`,
          { opacity: 1, y: 0, rotationX: 0, duration: 0.55, ease: "power3.out" }, t);
      });

      // 14.0s — bracket highlight + color emphasis on "wrong thing"
      tl.to("#hook-bk-l", { opacity: 0.85, x: 0, duration: 0.45, ease: "back.out(2)" }, 14.0);
      tl.to("#hook-bk-r", { opacity: 0.85, x: 0, duration: 0.45, ease: "back.out(2)" }, 14.05);
      tl.fromTo("#hook-highlight",
        { color: "#FB923C" },
        { color: "#FB923C", textShadow: "0 0 24px rgba(251, 146, 60, 0.6)",
          duration: 0.5, ease: "sine.out" }, 14.0);

      // 19.4s — stat frame container appears, ASCII corners draw in spring
      tl.to("#hook-stat-frame", { opacity: 1, duration: 0.3, ease: "power2.out" }, 19.4);
      tl.to("#scene-hook-content .stat-frame .corner",
        { opacity: 0.75, scale: 1, duration: 0.5, ease: "back.out(2)", stagger: 0.08 }, 19.5);

      // 19.7s — stat-meta line
      tl.to("#hook-stat-meta", { opacity: 1, y: 0, duration: 0.5, ease: "power2.out" }, 19.7);

      // 22.8s — stat counter entrance (dimensional drop with rotateX)
      tl.to("#hook-stat",
        { opacity: 1, scale: 1, rotationX: 0, duration: 0.65, ease: "back.out(1.6)" }, 22.8);

      // 22.95s — counter ticks 0 → 16,506 over 1.8s
      const statTarget = { v: 0 };
      tl.to(statTarget, {
        v: 16506, duration: 1.8, ease: "power2.out",
        onUpdate: () => {
          const el = document.getElementById('hook-stat-num');
          if (el) el.textContent = Math.round(statTarget.v).toLocaleString();
        }
      }, 22.95);

      // 26.1s — stat-sub appears
      tl.to("#hook-stat-sub", { opacity: 1, y: 0, duration: 0.55, ease: "power2.out" }, 26.1);

      // 26.5s — token burst erupts (finite)
      tl.set("#hook-burst", { opacity: 1 }, 26.5);
      tl.fromTo("#hook-burst .p",
        { scale: 0.4, opacity: 0, x: 0, y: 0 },
        { opacity: 1, scale: 1, duration: 0.4, ease: "power2.out",
          stagger: { each: 0.018, from: "random" } }, 26.5);
      tl.to("#hook-burst .p",
        { opacity: 0, duration: 1.2, ease: "power2.in" }, 28.0);

      // 29.5s — coming-up label fades in
      tl.to("#cu-label", { opacity: 1, y: 0, duration: 0.55, ease: "power2.out" }, 29.5);

      // 33.6s, 36.5s, 38.6s, 40.9s — chips flip in (3D coin flip)
      const chipTimes = [33.6, 36.5, 38.6, 40.9];
      chipTimes.forEach((t, i) => {
        tl.to(`#cu-chip-${i+1}`,
          { opacity: 1, rotationY: 0, y: 0, duration: 0.7, ease: "back.out(1.5)" }, t);
      });

      // 43.0s — subline finally lands
      tl.to("#hook-subline", { opacity: 1, y: 0, duration: 0.55, ease: "power2.out" }, 43.0);

      // 44.0s — final pulse: all chips lift together once on "Let's go"
      tl.to(".cu-chip",
        { y: -6, duration: 0.45, ease: "sine.inOut", yoyo: true, repeat: 1 }, 44.0);

      window.__timelines["scene-hook"] = tl;
    </script>
  </div>
</template>
