<!--
  shared/lib/blocks/cinema-title-slam/block.html
  Standalone cinematic hero-title block. 1080×1920, 6s duration.

  Three-tier reveal:
    t=0.5  Hero word slams in via back.out(1.7) scale + 4-tick ±5px shake
    t=1.4  Hand-drawn wobbly SVG underline draws via stroke-dashoffset animation
    t=2.0  Tagline fades up from y+20, opacity 0→1
    t=2.5–5.0  Ambient breath on hero word (scale 1.0↔1.015, yoyo×1, 1.5s)
    t=5.0–6.0  Full block fades out (opacity → 0)

  Slots:
    [data-slot="hero"]    — single token, 180px, var(--accent)
    [data-slot="tagline"] — ~30 chars, 42px, var(--text)

  SOURCE: Original — no template extraction. Authored for shared/lib.

  See ./recipe.md for full wiring instructions.
-->
<template id="cinema-title-slam-template">
  <div id="cinema-title-slam"
       data-composition-id="cinema-title-slam"
       data-start="0"
       data-duration="6"
       data-width="1080"
       data-height="1920">

    <!-- Hero word -->
    <div class="clip cts-hero" id="cts-hero"
         data-start="0.5" data-duration="4.5" data-track-index="1"
         data-slot="hero">HERO</div>

    <!-- Hand-drawn SVG underline -->
    <svg class="clip cts-underline-svg" id="cts-underline-svg"
         data-start="1.4" data-duration="3.6" data-track-index="2"
         viewBox="0 0 680 44" xmlns="http://www.w3.org/2000/svg"
         aria-hidden="true" focusable="false">
      <!-- Slightly wobbly path — not a straight line; "drawn by hand" detail -->
      <path id="cts-underline-path"
            d="M 8 28
               C 60 18, 140 38, 220 26
               C 300 14, 380 36, 460 24
               C 540 12, 620 32, 672 22"
            stroke="var(--accent, #E97458)"
            stroke-width="7"
            stroke-linecap="round"
            fill="none"
            pathLength="1" />
    </svg>

    <!-- Tagline -->
    <div class="clip cts-tagline" id="cts-tagline"
         data-start="2.0" data-duration="3.0" data-track-index="3"
         data-slot="tagline">Your tagline here</div>

    <style>
      #cinema-title-slam {
        position: relative;
        width: 1080px;
        height: 1920px;
        background: var(--bg, #0A0E1A);
        overflow: hidden;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        gap: 0;
      }

      #cinema-title-slam .cts-hero {
        font-family: var(--sans, 'Inter', system-ui, sans-serif);
        font-weight: 900;
        font-size: 180px;
        line-height: 0.95;
        letter-spacing: -5px;
        color: var(--accent, #E97458);
        text-shadow:
          0 0 80px rgba(233,116,88,0.55),
          0 8px 32px rgba(0,0,0,0.7);
        opacity: 0;
        transform-origin: center center;
        user-select: none;
      }

      #cinema-title-slam .cts-underline-svg {
        width: 680px;
        height: 44px;
        display: block;
        margin-top: 12px;
        overflow: visible;
        opacity: 0;
      }

      /* stroke-dashoffset animation: path draws left-to-right */
      #cinema-title-slam #cts-underline-path {
        stroke-dasharray: 1;
        stroke-dashoffset: 1;
      }

      #cinema-title-slam .cts-tagline {
        font-family: var(--sans, 'Inter', system-ui, sans-serif);
        font-weight: 600;
        font-size: 42px;
        line-height: 1.2;
        letter-spacing: 0.5px;
        color: var(--text, #F5F1EB);
        max-width: 900px;
        margin-top: 32px;
        opacity: 0;
        user-select: none;
      }
    </style>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      window.__timelines = window.__timelines || {};
      (function () {
        var tl = gsap.timeline({ paused: true });

        /* ── t=0 — hide everything explicitly (hidden-until-reveal pattern) ── */
        tl.set('#cts-hero',          { opacity: 0, scale: 0.78 }, 0);
        tl.set('#cts-underline-svg', { opacity: 0 },              0);
        tl.set('#cts-tagline',       { opacity: 0, y: 20 },       0);
        tl.set('#cts-underline-path',{ strokeDashoffset: 1 },     0);

        /* ── t=0.5 — HERO SLAM ─────────────────────────────────────────── */
        tl.to('#cts-hero', {
          opacity: 1,
          scale: 1.0,
          duration: 0.65,
          ease: 'back.out(1.7)',
        }, 0.5);

        /* 4-tick ±5px inline shake on land */
        tl.to('#cts-hero', { x:  5, duration: 0.04, ease: 'none', overwrite: 'auto' }, 0.55);
        tl.to('#cts-hero', { x: -5, duration: 0.04, ease: 'none', overwrite: 'auto' }, 0.60);
        tl.to('#cts-hero', { x:  4, duration: 0.04, ease: 'none', overwrite: 'auto' }, 0.65);
        tl.to('#cts-hero', { x:  0, duration: 0.04, ease: 'none', overwrite: 'auto' }, 0.70);

        /* ── t=1.4 — HAND-DRAWN UNDERLINE scribbles in ─────────────────── */
        tl.set('#cts-underline-svg', { opacity: 1 }, 1.4);
        tl.to('#cts-underline-path', {
          strokeDashoffset: 0,
          duration: 0.55,
          ease: 'power2.out',
        }, 1.4);

        /* ── t=2.0 — TAGLINE fades up ───────────────────────────────────── */
        tl.to('#cts-tagline', {
          opacity: 1,
          y: 0,
          duration: 0.6,
          ease: 'power2.out',
        }, 2.0);

        /* ── t=2.5–5.0 — AMBIENT BREATH on hero word ──────────────────── */
        /* yoyo:true, repeat:1 → one full in-and-out cycle over 3s total (1.5s each) */
        tl.to('#cts-hero', {
          scale: 1.015,
          duration: 1.5,
          ease: 'sine.inOut',
          yoyo: true,
          repeat: 1,
        }, 2.5);

        /* ── t=5.0–6.0 — FULL BLOCK FADE OUT ──────────────────────────── */
        tl.to('#cts-hero',          { opacity: 0, duration: 0.7, ease: 'power2.in' }, 5.0);
        tl.to('#cts-underline-svg', { opacity: 0, duration: 0.5, ease: 'power1.in' }, 5.1);
        tl.to('#cts-tagline',       { opacity: 0, duration: 0.6, ease: 'power2.in' }, 5.05);

        window.__timelines['cinema-title-slam'] = tl;
      })();
    </script>

  </div>
</template>
