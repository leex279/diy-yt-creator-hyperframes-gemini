<!--
  shared/lib/components/support-banner/component.html
  Animated "support the channel" call-to-action banner for long-form
  (1920x1080) videos. Flat horizontal strip showing three support
  options — Join (YouTube channel membership), Super Thanks, Buy Me a
  Coffee — with a profile, headline + tagline, and a trailing BMC URL
  panel. Each pill staggers in with a spring; icons settle into a
  subtle idle pulse; the whole banner flies in/out.

  Total on-screen lifetime: ~8 seconds. Host typically wires this near a
  CTA moment ("if you want to support the channel…").

  SOURCE:
    diy-yt-creator/src/shared/components/SupportBanner.tsx:1-444
      (frame-based Remotion impl translated to seconds + GSAP timeline)
    shared/lib/components/subscribe-banner/component.html (sister
    component — identical fly-in / fly-out lifecycle, profile-leex.png
    asset, paste-in section ordering)

  ──────────────────────────────────────────────────────────────────────
  IMPORTANT — PROFILE IMAGE MUST BE A LOCAL COPY
  ──────────────────────────────────────────────────────────────────────
  Same constraint as subscribe-banner:

    1. Copy profile-leex.png into videos/<slug>/assets/profile-leex.png
       (already done if subscribe-banner is also wired in this video)
    2. Set src="assets/profile-leex.png"
-->

<!-- 3) JS — call from the host root timeline. Hides everything at t=0 then
        reveals on the schedule below. Pass the absolute start time in
        seconds; banner exits ~7s later. -->

<script>
  /**
   * addSupportBanner(tl, t, opts?)
   *   tl   — host paused timeline (gsap.timeline({paused: true}))
   *   t    — absolute time (seconds) at which the banner enters
   *   opts — { headline?: string, tagline?: string, bmcUrl?: string,
   *            showProfile?: boolean }
   *          Defaults: "Support the Channel" / "Every bit keeps the videos
   *          coming" / "buymeacoffee.com/diy_smartcode" / true.
   *
   * Lifetime: t .. t + 8.0s (banner exits at t + 7.0s, exit takes ~0.6s).
   */
  function addSupportBanner(tl, t, opts) {
    opts = opts || {};
    if (typeof opts.headline === 'string') {
      var h = document.getElementById('sup-headline');
      if (h) h.textContent = opts.headline;
    }
    if (typeof opts.tagline === 'string') {
      var tg = document.getElementById('sup-tagline');
      if (tg) tg.textContent = opts.tagline;
    }
    if (typeof opts.bmcUrl === 'string') {
      var u = document.getElementById('sup-bmc-url');
      if (u) u.textContent = opts.bmcUrl;
    }
    if (opts.showProfile === false) {
      var p = document.querySelector('#sup-banner .sup-profile');
      if (p) p.style.display = 'none';
    }

    // ── Hide everything at t=0 — bullet-proof seek-to-frame-0 ──
    // xPercent: -50 replaces the translateX(-50%) centering that used to
    // live in CSS — GSAP now owns the full transform on #sup-banner.
    tl.set('#sup-banner', { opacity: 0, y: 80, xPercent: -50 }, 0);
    tl.set('.sup-profile', { opacity: 0, scale: 0.4 }, 0);
    tl.set('.sup-headline', { opacity: 0, x: -28 }, 0);
    tl.set('.sup-tagline', { opacity: 0, x: -28 }, 0);
    tl.set('.sup-pill-join', { opacity: 0, y: 28, scale: 0.7 }, 0);
    tl.set('.sup-pill-thanks', { opacity: 0, y: 28, scale: 0.7 }, 0);
    tl.set('.sup-pill-coffee', { opacity: 0, y: 28, scale: 0.7 }, 0);
    tl.set('.sup-pill-join .sup-pill-icon', { scale: 1 }, 0);
    tl.set('.sup-pill-thanks .sup-pill-icon', { scale: 1 }, 0);
    tl.set('.sup-pill-coffee .sup-pill-icon', { scale: 1 }, 0);
    tl.set('.sup-bmc', { opacity: 0 }, 0);

    // ── Banner spring-in (frame 0) ──
    tl.to('#sup-banner', { opacity: 1, y: 0, duration: 0.55, ease: 'back.out(1.4)', overwrite: 'auto' }, t);

    // ── Profile pop (frame 8 ≈ 0.27s) ──
    tl.to('.sup-profile', { opacity: 1, scale: 1, duration: 0.5, ease: 'back.out(1.6)', overwrite: 'auto' }, t + 0.27);

    // ── Headline slide (frame 14 ≈ 0.47s) ──
    tl.to('.sup-headline', { opacity: 1, x: 0, duration: 0.5, ease: 'power2.out', overwrite: 'auto' }, t + 0.47);

    // ── Tagline slide (frame 18 ≈ 0.6s) ──
    tl.to('.sup-tagline', { opacity: 1, x: 0, duration: 0.5, ease: 'power2.out', overwrite: 'auto' }, t + 0.6);

    // ── Pills stagger in (frames 26 / 36 / 46) ──
    tl.to('.sup-pill-join',   { opacity: 1, y: 0, scale: 1, duration: 0.5, ease: 'back.out(1.4)', overwrite: 'auto' }, t + 0.87);
    tl.to('.sup-pill-thanks', { opacity: 1, y: 0, scale: 1, duration: 0.5, ease: 'back.out(1.4)', overwrite: 'auto' }, t + 1.20);
    tl.to('.sup-pill-coffee', { opacity: 1, y: 0, scale: 1, duration: 0.5, ease: 'back.out(1.4)', overwrite: 'auto' }, t + 1.53);

    // ── Idle icon pulse (frame 70+ ≈ 2.33s onward, staggered per pill) ──
    // Each pill's icon breathes between scale 1 and 1.06 over a 1.3s half-cycle.
    // Three yoyos = 6 half-cycles = ~7.8s, comfortably covering banner lifetime.
    var pulseDur = 1.3;
    var pulseRepeats = 3;
    var pulseEase = 'sine.inOut';

    var icon1 = gsap.timeline();
    icon1.fromTo('.sup-pill-join .sup-pill-icon', { scale: 1 },
      { scale: 1.06, duration: pulseDur, ease: pulseEase, yoyo: true, repeat: pulseRepeats });
    tl.add(icon1, t + 2.33);

    var icon2 = gsap.timeline();
    icon2.fromTo('.sup-pill-thanks .sup-pill-icon', { scale: 1 },
      { scale: 1.06, duration: pulseDur, ease: pulseEase, yoyo: true, repeat: pulseRepeats });
    tl.add(icon2, t + 2.53);

    var icon3 = gsap.timeline();
    icon3.fromTo('.sup-pill-coffee .sup-pill-icon', { scale: 1 },
      { scale: 1.06, duration: pulseDur, ease: pulseEase, yoyo: true, repeat: pulseRepeats });
    tl.add(icon3, t + 2.73);

    // ── BMC URL panel fade-in (frame 80 ≈ 2.67s) ──
    tl.to('.sup-bmc', { opacity: 1, duration: 0.5, ease: 'power2.out', overwrite: 'auto' }, t + 2.67);

    // ── Banner fly out (frame 210 ≈ 7.0s) ──
    tl.to('#sup-banner', { opacity: 0, y: 120, duration: 0.6, ease: 'back.in(1.0)', overwrite: 'auto' }, t + 7.0);
  }
  // Usage:
  //   addSupportBanner(tl, 28.0);
  //   addSupportBanner(tl, 28.0, { headline: "Support the work", showProfile: false });
</script>
