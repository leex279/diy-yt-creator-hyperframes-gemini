<!--
  scene-tension-pivot.html — Tension headline (300-weight + 800-weight contrast).

  The signature Dynamous-deck "weight-contrast" move: a thin 300-weight clause
  sets up tension, an 800-weight clause delivers the pivot. Subtle push-in
  scale toward the next transition.

  Receives the "flash" crossfade from the root timeline so the pivot lands
  with a brief blue burst. No own SFX wiring — operator pairs whoosh on entry.
-->
<template id="scene-tension-pivot-template">
  <div data-composition-id="scene-tension-pivot"
       data-start="0"
       data-width="1920"
       data-height="1080"
       style="position:absolute; inset:0; overflow:hidden;
              font-family:var(--font-display); color:var(--ink);">

    <style>
      #tension-content {
        width:100%; height:100%;
        padding: var(--pad-top) var(--pad-x) var(--pad-bottom);
        display:flex; flex-direction:column;
        align-items:flex-start; justify-content:center;
        gap: 36px;
        box-sizing:border-box;
      }
      #tension-content .eyebrow {
        font-family: var(--font-data);
        font-size: 22px;
        font-weight: 500;
        letter-spacing: 0.32em;
        text-transform: uppercase;
        color: var(--accent-2);
        display: inline-flex; align-items: center; gap: 18px;
      }
      #tension-content .eyebrow::before {
        content: ""; display: inline-block;
        width: 56px; height: 2px;
        background: var(--accent-2);
      }
      #tension-content .headline {
        font-family: var(--font-display);
        font-weight: 800;
        font-size: 152px;
        line-height: 1.0;
        letter-spacing: -0.025em;
        color: var(--ink);
        max-width: 1640px;
      }
      #tension-content .headline .light {
        font-weight: 300;
        color: var(--ink-2);
      }
      #tension-content .sub {
        font-family: var(--font-display);
        font-weight: 400;
        font-size: 40px;
        line-height: 1.3;
        color: var(--muted);
        max-width: 1500px;
      }
      #tension-content .strikethrough {
        position: relative;
        display: inline-block;
      }
      #tension-content .strikethrough::after {
        content: "";
        position: absolute;
        left: 0; right: 0;
        top: 56%;
        height: 4px;
        background: var(--accent-3);
        transform-origin: left center;
        transform: scaleX(0);
      }
    </style>

    <div id="tension-content">
      <div class="eyebrow" id="tn-eyebrow">REPLACE: PIVOT</div>
      <h1 class="headline" id="tn-headline">
        <span class="light">REPLACE the thin clause</span><br/>
        <span class="strong" id="tn-pivot">REPLACE the punchline.</span>
      </h1>
      <p class="sub" id="tn-sub">
        REPLACE: optional one-liner that lands the pivot in plain language.
      </p>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({ paused: true });

      tl.set("#tn-eyebrow",  { y: 24, autoAlpha: 0 }, 0);
      tl.set("#tn-headline", { y: 60, autoAlpha: 0 }, 0);
      tl.set("#tn-sub",      { y: 24, autoAlpha: 0 }, 0);

      tl.to("#tn-eyebrow",  { y: 0, autoAlpha: 1, duration: 0.5, ease: "power2.out" }, 0.2);
      tl.to("#tn-headline", { y: 0, autoAlpha: 1, duration: 0.85, ease: "power3.out" }, 0.4);
      tl.to("#tn-sub",      { y: 0, autoAlpha: 1, duration: 0.5, ease: "power2.out" }, 1.2);

      // Mid-hold push-in toward the next shader hit
      tl.to("#tn-headline", { scale: 1.04, duration: 4.0, ease: "sine.inOut" }, 2.5);

      // Glow flicker on the pivot word for emphasis at ~5s
      tl.to("#tn-pivot", { textShadow: "0 0 50px rgba(59, 130, 246, 0.7)", duration: 1.2, ease: "sine.inOut", yoyo: true, repeat: 1 }, 4.8);

      window.__timelines["scene-tension-pivot"] = tl;
    </script>
  </div>
</template>
