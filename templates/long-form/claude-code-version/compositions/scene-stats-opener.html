<!--
  scene-stats-opener.html — Stats opener (Phase 1) + lead-detail dive (Phase 2).

  Phase 1 (0..6.7s):  3 huge color-rotated stats with version badge
                       (27 features / 56 fixes / 11 improved)
  Phase 2 (6.7..30s): pills crossfade out; the "biggest patch" headline
                       in the header swaps to "Slash commands & settings —
                       what changed" and a 2x2 grid of 4 detail sub-cards
                       enters one-by-one on its narration cue.

  Mirrors the pattern of the reference Remotion Scene01McpOauth (stats opener
  + a category dive in the same scene).
-->
<template id="scene-stats-opener-template">
  <div data-composition-id="scene-stats-opener"
       data-start="0"
       data-width="1920"
       data-height="1080"
       style="position:absolute; inset:0; overflow:hidden;
              font-family:var(--sans); color:var(--text);">

    <style>
      #scene-stats-opener-content {
        width:100%; height:100%;
        padding: var(--pad-top) var(--pad-x) var(--pad-bottom);
        display:flex; flex-direction:column;
        align-items:center; justify-content:center;
        gap:36px;
        box-sizing:border-box;
      }
      #scene-stats-opener-content .header-block {
        display:flex; flex-direction:column;
        align-items:center; gap:12px;
        text-align:center;
      }
      #scene-stats-opener-content .vbadge {
        font-family: var(--mono);
        font-weight: 700;
        font-size: 26px;
        letter-spacing: 4px;
        text-transform: uppercase;
        color: var(--accent-1);
        opacity: 0;
      }
      #scene-stats-opener-content .overline {
        font-family: var(--mono);
        font-weight: 700;
        font-size: 26px;
        letter-spacing: 6px;
        text-transform: uppercase;
        color: var(--accent-warn);
        opacity: 0;
      }
      #scene-stats-opener-content .headline {
        font-family: var(--sans);
        font-weight: 800;
        font-size: 48px;
        line-height: 1.05;
        letter-spacing: -1px;
        color: var(--text);
        max-width: 1500px;
        opacity: 0;
      }

      /* Phase 1 — pills row */
      #so-phase1 {
        display:flex; flex-direction:row;
        align-items:stretch; justify-content:center;
        gap: 36px;
      }
      .so-pill {
        width: 420px;
        padding: 48px 32px;
        border-radius: 28px;
        border: 1.5px solid var(--border-bright);
        background: rgba(255, 255, 255, 0.04);
        display:flex; flex-direction:column;
        align-items:center; gap: 18px;
        box-shadow: 0 24px 60px rgba(0, 0, 0, 0.55);
        opacity: 0;
      }
      .so-pill.cyan {
        background: linear-gradient(135deg,
                      rgba(88, 166, 255, 0.16) 0%,
                      rgba(88, 166, 255, 0.04) 100%);
        border-color: rgba(88, 166, 255, 0.55);
      }
      .so-pill.purple {
        background: linear-gradient(135deg,
                      rgba(163, 113, 247, 0.18) 0%,
                      rgba(163, 113, 247, 0.04) 100%);
        border-color: rgba(163, 113, 247, 0.55);
      }
      .so-pill.green {
        background: linear-gradient(135deg,
                      rgba(63, 185, 80, 0.16) 0%,
                      rgba(63, 185, 80, 0.04) 100%);
        border-color: rgba(63, 185, 80, 0.55);
      }
      .so-pill .stat-num {
        font-family: var(--sans);
        font-weight: 900;
        font-size: 110px;
        line-height: 0.9;
        letter-spacing: -4px;
        font-variant-numeric: tabular-nums lining-nums;
      }
      .so-pill.cyan   .stat-num { color: var(--accent-1); text-shadow: 0 0 60px rgba(88, 166, 255, 0.5); }
      .so-pill.purple .stat-num { color: var(--accent-3); text-shadow: 0 0 60px rgba(163, 113, 247, 0.5); }
      .so-pill.green  .stat-num { color: var(--accent-4); text-shadow: 0 0 60px rgba(63, 185, 80, 0.5); }
      .so-pill .stat-label {
        font-family: var(--mono);
        font-weight: 700;
        font-size: 22px;
        letter-spacing: 3px;
        text-transform: uppercase;
        color: var(--text-secondary);
        text-align: center;
      }

      /* Phase 2 — 2x2 detail grid */
      #so-phase2 {
        position: absolute;
        left: 50%;
        bottom: 90px;
        transform: translateX(-50%);
        opacity: 0;
        width: 1700px;
        display: grid;
        grid-template-columns: 1fr 1fr;
        grid-template-rows: 1fr 1fr;
        gap: 24px;
      }
      .so-card {
        position: relative;
        padding: 24px 28px;
        border-radius: 14px;
        border: 2px solid var(--border-bright);
        background: rgba(255, 255, 255, 0.04);
        box-shadow: 0 14px 40px rgba(0, 0, 0, 0.45);
        display:flex; flex-direction:column;
        gap: 8px;
        min-height: 170px;
        box-sizing: border-box;
        opacity: 0;
      }
      .so-card::before {
        content: "";
        position: absolute;
        top: 0; left: 0; right: 0;
        height: 3px;
        background: linear-gradient(90deg, var(--card-accent, var(--accent-warn)), transparent);
        border-radius: 12px 12px 0 0;
      }
      .so-card .row { display:flex; align-items:center; gap: 12px; }
      .so-card .num {
        width: 38px; height: 38px;
        border-radius: 8px;
        font-family: var(--mono);
        font-weight: 800;
        font-size: 20px;
        font-variant-numeric: tabular-nums;
        display:flex; align-items:center; justify-content:center;
        background: rgba(255, 255, 255, 0.06);
        flex-shrink: 0;
      }
      .so-card .ttl {
        font-family: var(--sans);
        font-weight: 800;
        font-size: 24px;
        line-height: 1.18;
        letter-spacing: -0.3px;
        color: var(--text);
      }
      .so-card .det {
        font-family: var(--sans);
        font-weight: 500;
        font-size: 18px;
        line-height: 1.4;
        color: var(--text-secondary);
      }
      .so-card .det code {
        font-family: var(--mono);
        font-size: 16px;
        padding: 2px 6px;
        border-radius: 4px;
        background: rgba(255, 255, 255, 0.08);
      }
      .so-card.a { --card-accent: var(--accent-warn); border-color: rgba(247, 129, 102, 0.55); }
      .so-card.b { --card-accent: var(--accent-1);    border-color: rgba(88, 166, 255, 0.55);  }
      .so-card.c { --card-accent: var(--accent-3);    border-color: rgba(163, 113, 247, 0.55); }
      .so-card.d { --card-accent: var(--accent-4);    border-color: rgba(63, 185, 80, 0.55);   }
      .so-card.a .num { color: var(--accent-warn); background: rgba(247, 129, 102, 0.18); }
      .so-card.b .num { color: var(--accent-1);    background: rgba(88, 166, 255, 0.18);  }
      .so-card.c .num { color: var(--accent-3);    background: rgba(163, 113, 247, 0.18); }
      .so-card.d .num { color: var(--accent-4);    background: rgba(63, 185, 80, 0.18);   }
    </style>

    <div id="scene-stats-opener-content">
      <div class="header-block">
        <div class="vbadge"   id="so-vbadge">vX.Y.Z</div>
        <div class="overline" id="so-overline">WHAT SHIPPED</div>
        <div class="headline" id="so-headline">Three releases. The receipts.</div>
      </div>

      <!-- Phase 1: stat pills -->
      <div id="so-phase1">
        <div class="so-pill cyan" id="so-pill-1">
          <div class="stat-num">27</div>
          <div class="stat-label">features</div>
        </div>
        <div class="so-pill purple" id="so-pill-2">
          <div class="stat-num">56</div>
          <div class="stat-label">fixes</div>
        </div>
        <div class="so-pill green" id="so-pill-3">
          <div class="stat-num">11</div>
          <div class="stat-label">improved</div>
        </div>
      </div>
    </div>

    <!-- Phase 2: 2x2 slash-commands & settings detail -->
    <div id="so-phase2">
      <div class="so-card a" id="so-card-1">
        <div class="row"><div class="num">01</div></div>
        <div class="ttl">/config persists for real</div>
        <div class="det">Project, local, and policy precedence honored on restart.</div>
      </div>
      <div class="so-card b" id="so-card-2">
        <div class="row"><div class="num">02</div></div>
        <div class="ttl">Slash picker stops jumping</div>
        <div class="det">The slash command picker no longer scrolls mid-search.</div>
      </div>
      <div class="so-card c" id="so-card-3">
        <div class="row"><div class="num">03</div></div>
        <div class="ttl">Vim mode &mdash; no Esc rewind</div>
        <div class="det">Esc no longer pulls queued messages back into the prompt.</div>
      </div>
      <div class="so-card d" id="so-card-4">
        <div class="row"><div class="num">04</div></div>
        <div class="ttl">Settings &mdash; legacy enums OK</div>
        <div class="det">Old enum values stop invalidating an otherwise valid settings file.</div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      // Transcript-driven timing. scene_t = root_t (data-start 0). Slot 30.52s.
      // Narration:
      //   "Twenty seven new features..."             scene_t 0.07 (#0)
      //   "Fifty six bug fixes..."                   scene_t 2.24
      //   "Eleven improvements..."                   scene_t 4.40
      //   "The biggest patch lands..."               scene_t 6.87 (#14, phase 2 pivot)
      //   "Slash config finally persists..."         scene_t 9.94 (#22)  → card 1
      //   "The slash command picker..."              scene_t 15.59 (#32) → card 2
      //   "Vim mode no longer pulls..."              scene_t 18.68 (#39) → card 3
      //   "And settings stop getting invalidated..." scene_t 23.18 (#49) → card 4
      //   "All of that — now patched."               scene_t 28.03 (#58)
      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({ paused: true });

      // Header in place before "Twenty seven" @ 0.07
      tl.fromTo("#so-vbadge",   { y: 14, opacity: 0 }, { y: 0, opacity: 1, duration: 0.4, ease: "power2.out" }, 0);
      tl.fromTo("#so-overline", { y: 20, opacity: 0 }, { y: 0, opacity: 1, duration: 0.4, ease: "power2.out" }, 0.15);
      tl.fromTo("#so-headline", { y: 30, opacity: 0 }, { y: 0, opacity: 1, duration: 0.5, ease: "power3.out" }, 0.30);

      // Pills enter on each spoken stat number
      tl.fromTo("#so-pill-1", { scale: 0.85, opacity: 0 },
                              { scale: 1,    opacity: 1, duration: 0.45, ease: "back.out(1.6)" }, 0.07);
      tl.fromTo("#so-pill-2", { scale: 0.85, opacity: 0 },
                              { scale: 1,    opacity: 1, duration: 0.45, ease: "back.out(1.6)" }, 2.24);
      tl.fromTo("#so-pill-3", { scale: 0.85, opacity: 0 },
                              { scale: 1,    opacity: 1, duration: 0.45, ease: "back.out(1.6)" }, 4.40);

      // PHASE PIVOT @ "biggest patch lands on slash commands" 6.87
      // - pills crossfade out
      // - headline copy + color swap to "Slash commands & settings — what changed"
      // - phase 2 grid container fades in (cards still hidden)
      tl.to("#so-phase1", { opacity: 0, scale: 0.92, duration: 0.6, ease: "power2.in" }, 6.87);
      tl.to("#so-headline", { color: "#F78166", duration: 0.4, ease: "sine.inOut" }, 6.87);
      tl.set("#so-headline", { textContent: "Slash commands & settings — what changed" }, 7.30);
      tl.fromTo("#so-headline", { y: -10, opacity: 0.4 },
                                { y: 0,   opacity: 1, duration: 0.4, ease: "power2.out" }, 7.30);
      tl.to("#so-phase2", { opacity: 1, duration: 0.5, ease: "power2.out" }, 7.30);

      // Card entrances on their spoken intro words
      const cards = [
        { sel: "#so-card-1", num: "#so-card-1 .num", at:  9.94 },
        { sel: "#so-card-2", num: "#so-card-2 .num", at: 15.59 },
        { sel: "#so-card-3", num: "#so-card-3 .num", at: 18.68 },
        { sel: "#so-card-4", num: "#so-card-4 .num", at: 23.18 },
      ];
      cards.forEach(({ sel, num, at }, i) => {
        const next = cards[i + 1] ? cards[i + 1].at : 28.03;
        const dwell = next - at;
        tl.fromTo(sel,
          { y: 24, opacity: 0, scale: 0.95 },
          { y: 0,  opacity: 1, scale: 1, duration: 0.45, ease: "back.out(1.4)" },
          at);
        if (dwell > 3.0) {
          tl.to(num, { scale: 1.18, duration: 0.25, ease: "power2.out", yoyo: true, repeat: 1 }, at + 1.6);
        }
      });

      // "All of that — now patched" @ 28.03 → green-flash all 4 cards
      tl.to("#so-phase2 .so-card",
        { boxShadow: "0 14px 40px rgba(0, 0, 0, 0.45), 0 0 0 3px var(--accent-4)",
          duration: 0.4, yoyo: true, repeat: 1, ease: "sine.inOut", stagger: 0.06 },
        28.03);

      // Anchor to slot length (30.52s)
      tl.set({}, {}, 30.52);

      window.__timelines["scene-stats-opener"] = tl;
    </script>
  </div>
</template>
