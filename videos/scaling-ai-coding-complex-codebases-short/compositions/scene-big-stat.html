<!--
  scene-big-stat.html — Hero stat with counter ramp + gradient text (Shorts).

  Counter animates from 0 to STAT_TARGET via GSAP. Gradient text fills the
  number with Dynamous-Light → Dynamous-Blue. Suffix slides in after the
  count completes. Sized for vertical — number caps at 280px.
-->
<template id="scene-big-stat-template">
  <div data-composition-id="scene-big-stat"
       data-start="0"
       data-width="1080"
       data-height="1920"
       style="position:absolute; inset:0; overflow:hidden;
              font-family:'Montserrat', system-ui, sans-serif; color:var(--ink);">

    <style>
      #bs-content {
        width:100%; height:100%;
        padding: var(--pad-top) var(--pad-x) var(--pad-bottom);
        display:flex; flex-direction:column;
        align-items:flex-start; justify-content:center;
        gap: 36px;
        box-sizing:border-box;
      }
      #bs-content .eyebrow {
        font-family: 'JetBrains Mono', ui-monospace, monospace;
        font-size: 34px;
        font-weight: 500;
        letter-spacing: 0.32em;
        text-transform: uppercase;
        color: var(--accent-2);
        display: inline-flex; align-items: center; gap: 18px;
      }
      #bs-content .eyebrow::before {
        content: ""; display: inline-block;
        width: 56px; height: 2px;
        background: var(--accent-2);
      }
      #bs-content .stat-row {
        display: flex; align-items: baseline; gap: 8px;
      }
      #bs-content .stat-number {
        font-family: 'Montserrat', system-ui, sans-serif;
        font-weight: 800;
        font-size: 280px;
        line-height: 0.88;
        letter-spacing: -0.045em;
        background: linear-gradient(180deg, var(--accent-2) 0%, var(--accent) 100%);
        -webkit-background-clip: text;
                background-clip: text;
        -webkit-text-fill-color: transparent;
        font-variant-numeric: tabular-nums lining-nums;
        text-shadow: 0 0 80px rgba(59, 130, 246, 0.35);
      }
      #bs-content .stat-suffix {
        font-family: 'Montserrat', system-ui, sans-serif;
        font-weight: 800;
        font-size: 160px;
        color: var(--accent-2);
        line-height: 0.88;
        letter-spacing: -0.04em;
      }
      #bs-content .label {
        font-family: 'Montserrat', system-ui, sans-serif;
        font-weight: 300;
        font-size: 48px;
        line-height: 1.28;
        color: var(--ink-2);
        max-width: 940px;
      }
      #bs-content .label strong {
        font-weight: 700;
        color: var(--ink);
      }
    </style>

    <div id="bs-content">
      <div class="eyebrow" id="bs-eyebrow">WORKSHOP &middot; ROOM</div>
      <div class="stat-row">
        <span class="stat-number" id="bs-number">0</span>
      </div>
      <div id="bs-suffix" style="font-family:'Montserrat',system-ui,sans-serif; font-weight:800; font-size:84px; color:var(--accent-2); line-height:0.96; letter-spacing:-0.02em; margin-top:-8px;">
        engineers in the room.
      </div>
      <p class="label" id="bs-label">
        <strong>Real codebases. Real problems.</strong> Ninety minutes, live.
      </p>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({ paused: true });

      const STAT_TARGET = 97;
      const counterObj = { v: 0 };

      tl.set("#bs-eyebrow", { y: 24, autoAlpha: 0 }, 0);
      tl.set("#bs-number",  { scale: 0.78, autoAlpha: 0 }, 0);
      tl.set("#bs-suffix",  { autoAlpha: 0, x: -20 }, 0);
      tl.set("#bs-label",   { y: 24, autoAlpha: 0 }, 0);

      tl.to("#bs-eyebrow", { y: 0, autoAlpha: 1, duration: 0.55, ease: "power2.out" }, 0.2);
      tl.to("#bs-number",  { scale: 1, autoAlpha: 1, duration: 0.55, ease: "expo.out" }, 0.55);

      // Counter ramp — parallel with scale-in
      tl.to(counterObj, {
        v: STAT_TARGET, duration: 1.4, ease: "expo.out",
        onUpdate: function () {
          const el = document.getElementById("bs-number");
          if (el) el.textContent = Math.floor(counterObj.v).toLocaleString();
        }
      }, 0.6);

      tl.to("#bs-suffix", { autoAlpha: 1, x: 0, duration: 0.45, ease: "power2.out" }, 1.85);
      tl.to("#bs-label",  { y: 0, autoAlpha: 1, duration: 0.5, ease: "power2.out" }, 2.0);

      // Mid-hold beats
      tl.to("#bs-number", { scale: 1.04, duration: 0.9, ease: "sine.inOut", yoyo: true, repeat: 1 }, 3.6);
      tl.to("#bs-number", { textShadow: "0 0 120px rgba(59, 130, 246, 0.7)", duration: 1.2, ease: "sine.inOut", yoyo: true, repeat: 1 }, 5.4);

      tl.set({}, {}, 7.23);
      window.__timelines["scene-big-stat"] = tl;
    </script>
  </div>
</template>
