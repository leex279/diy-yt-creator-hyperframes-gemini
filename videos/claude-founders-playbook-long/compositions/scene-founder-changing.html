<!--
  scene-founder-changing.html — Chapter 2: "What it means to be a founder is changing" (~39s).
  Side-by-side: OLD playbook (left, orange) vs NEW playbook (right, blue).
-->
<template id="scene-founder-changing-template">
  <div data-composition-id="scene-founder-changing"
       data-start="0"
       data-width="1920"
       data-height="1080"
       style="position:absolute; inset:0; overflow:hidden;
              font-family:'Inter', system-ui, sans-serif; color:#F5F1EB;">

    <style>
      #scene-fch-content {
        width: 100%; height: 100%;
        padding: 200px 80px 200px;
        display: flex; flex-direction: column;
        align-items: center; justify-content: center;
        gap: 32px;
        box-sizing: border-box;
      }
      #fch-overline {
        font-family: 'JetBrains Mono', ui-monospace, monospace;
        font-weight: 700;
        font-size: 26px;
        letter-spacing: 7px;
        text-transform: uppercase;
        color: #6B9AEF;
      }
      #fch-headline {
        font-weight: 800;
        font-size: 60px;
        line-height: 1.05;
        letter-spacing: -1px;
        color: #F5F1EB;
        text-align: center;
        max-width: 1500px;
      }
      .fch-em { color: #6B9AEF; }
      .fch-cards {
        display: flex; flex-direction: row;
        gap: 32px;
        width: 100%;
      }
      .fch-card {
        flex: 1;
        display: flex; flex-direction: column;
        border-radius: 24px;
        overflow: hidden;
        box-shadow: 0 24px 60px rgba(0, 0, 0, 0.45);
      }
      .fch-card.old {
        background: linear-gradient(135deg, rgba(154,149,141,0.10) 0%, rgba(154,149,141,0.03) 100%);
        border: 2px solid rgba(154, 149, 141, 0.35);
      }
      .fch-card.new {
        background: linear-gradient(135deg, rgba(107,154,239,0.14) 0%, rgba(107,154,239,0.04) 100%);
        border: 2px solid rgba(107, 154, 239, 0.45);
      }
      .fch-card-header {
        padding: 22px 32px;
        display: flex; align-items: center; gap: 16px;
      }
      .fch-card.old .fch-card-header { background: rgba(154, 149, 141, 0.12); }
      .fch-card.new .fch-card-header { background: rgba(107, 154, 239, 0.18); }
      .fch-card-label {
        font-family: 'JetBrains Mono', ui-monospace, monospace;
        font-weight: 800;
        font-size: 22px;
        letter-spacing: 4px;
        text-transform: uppercase;
      }
      .fch-card.old .fch-card-label { color: #9A958D; }
      .fch-card.new .fch-card-label { color: #6B9AEF; }
      .fch-card-body {
        padding: 28px 32px 32px;
        display: flex; flex-direction: column;
        gap: 14px; flex: 1;
      }
      .fch-card-title {
        font-weight: 800;
        font-size: 40px;
        line-height: 1.1;
        letter-spacing: -1px;
        color: #F5F1EB;
      }
      .fch-card.old .fch-card-title { color: #9A958D; }
      .fch-chain {
        font-family: 'JetBrains Mono', ui-monospace, monospace;
        font-weight: 600;
        font-size: 24px;
        line-height: 1.6;
        letter-spacing: 1px;
        color: #9A958D;
        position: relative;
      }
      .fch-chain.struck::after {
        content: "";
        position: absolute;
        left: 0; right: 0;
        top: 50%;
        height: 3px;
        background: #D14343;
        opacity: 0;
      }
      #fch-chain-strike {
        position: absolute; left: 0; top: 50%; height: 3px;
        background: #D14343; width: 0;
        box-shadow: 0 0 14px rgba(209, 67, 67, 0.55);
      }
      .fch-chain-wrap { position: relative; }
      .fch-new-line {
        font-family: 'JetBrains Mono', ui-monospace, monospace;
        font-weight: 700;
        font-size: 24px;
        line-height: 1.55;
        letter-spacing: 1px;
        color: #F5F1EB;
      }
      .fch-new-em { color: #6B9AEF; font-weight: 800; }
      .fch-card-stat-row {
        display: flex; align-items: baseline; gap: 18px;
        margin-top: 8px;
      }
      .fch-card-stat {
        font-weight: 900;
        font-size: 92px;
        line-height: 0.9;
        letter-spacing: -3px;
        color: #6B9AEF;
        font-variant-numeric: tabular-nums lining-nums;
        text-shadow: 0 0 60px rgba(107, 154, 239, 0.40);
      }
      .fch-card-stat-cap {
        font-family: 'JetBrains Mono', ui-monospace, monospace;
        font-weight: 700;
        font-size: 22px;
        letter-spacing: 3px;
        color: #9A958D;
        text-transform: uppercase;
      }
    </style>

    <div id="scene-fch-content">
      <div id="fch-overline">CHAPTER 2 &middot; WHAT CHANGED</div>
      <div id="fch-headline">Same stages. <span class="fch-em">Completely new rules.</span></div>
      <div class="fch-cards">
        <div class="fch-card old" id="fch-card-old">
          <div class="fch-card-header">
            <div class="fch-card-label">OLD PLAYBOOK</div>
          </div>
          <div class="fch-card-body">
            <div class="fch-card-title">Every phase needed a bigger team.</div>
            <div class="fch-chain-wrap">
              <div class="fch-chain">validate &rarr; raise &rarr; hire &rarr; build &rarr; raise &rarr; hire more &rarr; repeat</div>
              <div id="fch-chain-strike"></div>
            </div>
          </div>
        </div>
        <div class="fch-card new" id="fch-card-new">
          <div class="fch-card-header">
            <div class="fch-card-label">NEW PLAYBOOK</div>
          </div>
          <div class="fch-card-body">
            <div class="fch-card-title">Lean <span class="fch-new-em">10-person unicorn</span> is the plan.</div>
            <div class="fch-new-line">founder + Claude &rarr; <span class="fch-new-em">ship</span> &rarr; talk to users &rarr; <span class="fch-new-em">ship</span></div>
            <div class="fch-card-stat-row">
              <div class="fch-card-stat" id="fch-stat-num">10</div>
              <div class="fch-card-stat-cap">person<br/>unicorn</div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      window.__timelines = window.__timelines || {};
      const SCENE_DURATION = 39;

      const tl = gsap.timeline({
        paused: true,
        defaults: { ease: "power3.out", duration: 0.6 }
      });

      tl.from("#fch-overline",   { y: 20, opacity: 0, duration: 0.5, ease: "power2.out", immediateRender: false }, 0);
      tl.from("#fch-headline",   { y: 28, opacity: 0, duration: 0.6, ease: "power3.out", immediateRender: false }, 0.3);
      tl.from("#fch-card-old",   { x: -80, scale: 0.95, opacity: 0, duration: 0.7, ease: "back.out(1.4)", immediateRender: false }, 1.0);
      tl.from("#fch-card-new",   { x:  80, scale: 0.95, opacity: 0, duration: 0.7, ease: "back.out(1.4)", immediateRender: false }, 1.4);

      // Beat ~ +9s: strike-through the old chain (visual pacing beat)
      tl.to("#fch-chain-strike", { width: "100%", duration: 0.9, ease: "power2.out" }, 9.0);

      // Beat ~ +16s: counter-roll the 10-person stat
      tl.fromTo("#fch-stat-num", { textContent: 0 }, {
        textContent: 10,
        duration: 1.1,
        ease: "expo.out",
        snap: { textContent: 1 },
        onUpdate: function() {
          const el = this.targets()[0];
          el.textContent = Math.round(parseFloat(el.textContent));
        }
      }, 16.5);

      // Beat ~ +25s: micro-scale-pulse on the new card title
      tl.to("#fch-card-new .fch-card-title", { scale: 1.03, duration: 0.35, yoyo: true, repeat: 1, ease: "sine.inOut" }, 24.5);

      // Beat ~ +33s: glow pulse on new card border before exit
      tl.to("#fch-card-new", { boxShadow: "0 24px 60px rgba(0,0,0,0.45), 0 0 80px rgba(107,154,239,0.45)", duration: 0.8, yoyo: true, repeat: 1, ease: "sine.inOut" }, 32.5);

      tl.set({}, {}, SCENE_DURATION);
      window.__timelines["scene-founder-changing"] = tl;
    </script>
  </div>
</template>
