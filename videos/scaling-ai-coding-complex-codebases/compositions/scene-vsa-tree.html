<!--
  scene-vsa-tree.html — Vertical Slice Architecture file tree visualization.
  Displays the canonical `products/` shape line-by-line, each row revealing on its own beat.
-->
<template id="scene-vsa-tree-template">
  <div data-composition-id="scene-vsa-tree"
       data-start="0"
       data-width="1920"
       data-height="1080"
       style="position:absolute; inset:0; overflow:hidden;
              font-family: 'Montserrat', system-ui, sans-serif; color:var(--ink);">

    <style>
      #vsa-content {
        width:100%; height:100%;
        padding: 90px var(--pad-x) 70px;
        display:flex; flex-direction:row;
        align-items:center; justify-content:space-between;
        gap: 60px;
        box-sizing:border-box;
      }
      #vsa-left {
        flex: 1.3;
        display: flex; flex-direction: column;
        gap: 22px;
        max-width: 900px;
      }
      #vsa-left .eyebrow {
        font-family: 'JetBrains Mono', ui-monospace, monospace;
        font-size: 22px;
        font-weight: 500;
        letter-spacing: 0.32em;
        text-transform: uppercase;
        color: var(--accent-2);
        display: inline-flex; align-items: center; gap: 18px;
      }
      #vsa-left .eyebrow::before {
        content: ""; display: inline-block;
        width: 56px; height: 2px;
        background: var(--accent-2);
      }
      #vsa-left .headline {
        font-family: 'Montserrat', system-ui, sans-serif;
        font-weight: 700;
        font-size: 76px;
        line-height: 1.0;
        letter-spacing: -0.022em;
        color: var(--ink);
      }
      #vsa-left .blurb {
        font-family: 'Montserrat', system-ui, sans-serif;
        font-weight: 300;
        font-size: 32px;
        line-height: 1.35;
        color: var(--ink-2);
        max-width: 820px;
      }
      #vsa-tree {
        flex: 1;
        background: rgba(255,255,255,0.04);
        border: 1px solid rgba(255,255,255,0.10);
        border-radius: 18px;
        padding: 36px 40px;
        font-family: 'JetBrains Mono', ui-monospace, monospace;
        font-size: 28px;
        line-height: 1.55;
        color: var(--ink);
        max-width: 760px;
        position: relative;
        box-shadow: 0 0 60px rgba(59, 130, 246, 0.18);
      }
      #vsa-tree .row {
        display: flex;
        align-items: baseline;
        gap: 18px;
      }
      #vsa-tree .row .path {
        white-space: pre;
        color: var(--ink-2);
      }
      #vsa-tree .row .label {
        font-size: 22px;
        color: var(--muted);
        font-weight: 400;
      }
      #vsa-tree .row.feature .path { color: var(--accent); font-weight: 600; }
      #vsa-tree .row.indent .path { padding-left: 0; }

      /* Floating key-phrase chips — new content events every ~5s during the long tail */
      .key-chip {
        position: absolute;
        bottom: 40px;
        left: 50%;
        transform: translateX(-50%);
        max-width: 1600px;
        background: rgba(15, 23, 42, 0.92);
        border: 1.5px solid rgba(96, 165, 250, 0.55);
        border-radius: 999px;
        padding: 18px 42px;
        font-family: 'Montserrat', system-ui, sans-serif;
        font-weight: 700;
        font-size: 32px;
        color: #f1f5f9;
        letter-spacing: -0.005em;
        white-space: nowrap;
        box-shadow:
          0 8px 32px rgba(0, 0, 0, 0.55),
          0 0 40px rgba(59, 130, 246, 0.30);
      }
    </style>

    <div id="vsa-content">

      <div id="vsa-left">
        <div class="eyebrow" id="vsa-eyebrow" style="opacity:0;visibility:hidden;">STRATEGY 01 &middot; VSA</div>
        <h2 class="headline" id="vsa-headline" style="opacity:0;visibility:hidden;">One folder per feature.</h2>
        <p class="blurb" id="vsa-blurb" style="opacity:0;visibility:hidden;">
          The agent loads the slice and has the full feature in context. No chasing layers. No token tax per hop.
        </p>
      </div>

      <div id="vsa-tree">
        <div class="row feature" id="vsa-r1" style="opacity:0;visibility:hidden;"><span class="path">app/products/</span><span class="label">&larr; one folder per feature</span></div>
        <div class="row" id="vsa-r2" style="opacity:0;visibility:hidden;"><span class="path">&#9500;&#9472;&#9472; errors.py</span><span class="label">custom exceptions</span></div>
        <div class="row" id="vsa-r3" style="opacity:0;visibility:hidden;"><span class="path">&#9500;&#9472;&#9472; models.py</span><span class="label">ORM models</span></div>
        <div class="row" id="vsa-r4" style="opacity:0;visibility:hidden;"><span class="path">&#9500;&#9472;&#9472; schemas.py</span><span class="label">validation schemas</span></div>
        <div class="row" id="vsa-r5" style="opacity:0;visibility:hidden;"><span class="path">&#9500;&#9472;&#9472; routes.py</span><span class="label">thin HTTP handlers</span></div>
        <div class="row" id="vsa-r6" style="opacity:0;visibility:hidden;"><span class="path">&#9500;&#9472;&#9472; service.py</span><span class="label">business logic</span></div>
        <div class="row" id="vsa-r7" style="opacity:0;visibility:hidden;"><span class="path">&#9492;&#9472;&#9472; tests/</span><span class="label">all tests for this feature</span></div>
      </div>

      <!-- Floating key-phrase chips — new content events through the scene's 61s -->
      <div class="key-chip" id="vsa-chip-1" style="opacity:0;visibility:hidden;">Organized by layer &mdash; 4 folders, 1 feature</div>
      <div class="key-chip" id="vsa-chip-2" style="opacity:0;visibility:hidden;">Tokens burn at every hop</div>
      <div class="key-chip" id="vsa-chip-3" style="opacity:0;visibility:hidden;">One folder. One feature. Everything it needs.</div>
      <div class="key-chip" id="vsa-chip-4" style="opacity:0;visibility:hidden;">Load the slice &mdash; full feature in context</div>
      <div class="key-chip" id="vsa-chip-5" style="opacity:0;visibility:hidden;">Start with the next new feature</div>
      <div class="key-chip" id="vsa-chip-6" style="opacity:0;visibility:hidden;">Six months later &mdash; quietly migrated</div>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({ paused: true });

      tl.set("#vsa-eyebrow",  { y: 20 }, 0);
      tl.set("#vsa-headline", { y: 30 }, 0);
      tl.set("#vsa-blurb",    { y: 20 }, 0);
      ["#vsa-r1","#vsa-r2","#vsa-r3","#vsa-r4","#vsa-r5","#vsa-r6","#vsa-r7"].forEach(sel => {
        tl.set(sel, { x: -24 }, 0);
      });

      tl.to("#vsa-eyebrow",  { y: 0, autoAlpha: 1, duration: 0.5, ease: "power2.out" }, 0.2);
      tl.to("#vsa-headline", { y: 0, autoAlpha: 1, duration: 0.65, ease: "power3.out" }, 0.5);
      tl.to("#vsa-blurb",    { y: 0, autoAlpha: 1, duration: 0.55, ease: "power2.out" }, 1.1);

      // Tree rows reveal early — spread across the first ~16s so the tree is
      // populated while the narrator explains the problem; then narration-anchored
      // emphasis pulses fire when the narrator names each file in the staccato list.
      const treeTimes = [2.5, 4.5, 6.5, 9.0, 11.5, 13.5, 15.5];
      ["#vsa-r1","#vsa-r2","#vsa-r3","#vsa-r4","#vsa-r5","#vsa-r6","#vsa-r7"].forEach((sel, i) => {
        tl.to(sel, { x: 0, autoAlpha: 1, duration: 0.45, ease: "power2.out" }, treeTimes[i]);
      });

      // Continuous decoration pulses across 18-28s while narrator describes the layered problem
      tl.to("#vsa-r1", { scale: 1.03, duration: 0.7, ease: "sine.inOut", yoyo: true, repeat: 1,
        transformOrigin: "left center" }, 18.0);
      tl.to("#vsa-tree", { boxShadow: "0 0 100px rgba(59, 130, 246, 0.35)",
        duration: 1.4, ease: "sine.inOut", yoyo: true, repeat: 1 }, 21.0);
      tl.to("#vsa-blurb", { scale: 1.015, duration: 0.9, ease: "sine.inOut", yoyo: true, repeat: 1 }, 24.5);
      tl.to(["#vsa-r2","#vsa-r3","#vsa-r4"], { scale: 1.02, duration: 0.6, ease: "sine.inOut",
        yoyo: true, repeat: 1, stagger: 0.15, transformOrigin: "left center" }, 27.0);

      // Narrator names each file in staccato — color flash on each row in turn
      const fileBeats = [
        { sel: "#vsa-r1", t: 28.060 },  // "One folder per feature"
        { sel: "#vsa-r2", t: 31.950 },  // "Models."
        { sel: "#vsa-r3", t: 32.426 },  // "Schemas."
        { sel: "#vsa-r4", t: 32.949 },  // "Routes."
        { sel: "#vsa-r5", t: 33.355 },  // "Service."
        { sel: "#vsa-r6", t: 33.854 },  // "Errors."
        { sel: "#vsa-r7", t: 35.247 },  // "Tests."
      ];
      fileBeats.forEach(b => {
        tl.to(b.sel, { scale: 1.06, duration: 0.25, ease: "back.out(1.8)",
          yoyo: true, repeat: 1, transformOrigin: "left center" }, b.t);
      });

      // Post-narration continuing beats — every ~3s through scene end (61.2s)
      tl.to("#vsa-tree", { boxShadow: "0 0 120px rgba(96, 165, 250, 0.55)",
        duration: 1.2, ease: "sine.inOut", yoyo: true, repeat: 1 }, 38.0);
      tl.to(["#vsa-r1","#vsa-r2","#vsa-r3"], { scale: 1.02, duration: 0.5, ease: "sine.inOut",
        yoyo: true, repeat: 1, stagger: 0.12, transformOrigin: "left center" }, 41.0);
      tl.to(["#vsa-r4","#vsa-r5","#vsa-r6","#vsa-r7"], { scale: 1.02, duration: 0.5, ease: "sine.inOut",
        yoyo: true, repeat: 1, stagger: 0.12, transformOrigin: "left center" }, 44.0);
      tl.to("#vsa-blurb", { scale: 1.02, duration: 0.7, ease: "sine.inOut", yoyo: true, repeat: 1 }, 47.0);
      tl.to("#vsa-tree", { boxShadow: "0 0 100px rgba(59, 130, 246, 0.45)",
        duration: 1.0, ease: "sine.inOut", yoyo: true, repeat: 1 }, 50.0);
      tl.to("#vsa-r1", { scale: 1.04, duration: 0.7, ease: "sine.inOut", yoyo: true, repeat: 1,
        transformOrigin: "left center" }, 53.0);
      tl.to("#vsa-tree", { boxShadow: "0 0 140px rgba(96, 165, 250, 0.45)",
        duration: 1.2, ease: "sine.inOut", yoyo: true, repeat: 1 }, 56.0);
      tl.to(["#vsa-r1","#vsa-r2","#vsa-r3","#vsa-r4","#vsa-r5","#vsa-r6","#vsa-r7"],
        { scale: 1.015, duration: 0.5, ease: "sine.inOut", yoyo: true, repeat: 1, stagger: 0.06,
          transformOrigin: "left center" }, 59.0);

      // Floating key-phrase chips — new content events every ~8-10s
      // Each chip fades in, holds, fades out before the next arrives.
      const chips = [
        { sel: "#vsa-chip-1", in_:  3.5, out:  9.5 },   // "Organized by layer..."
        { sel: "#vsa-chip-2", in_: 10.5, out: 17.5 },   // "Tokens burn at every hop"
        { sel: "#vsa-chip-3", in_: 19.0, out: 27.0 },   // "One folder. One feature."
        { sel: "#vsa-chip-4", in_: 36.0, out: 43.5 },   // "Load the slice"
        { sel: "#vsa-chip-5", in_: 44.5, out: 52.0 },   // "Start with the next new feature"
        { sel: "#vsa-chip-6", in_: 53.0, out: 60.5 },   // "Quietly migrated"
      ];
      chips.forEach(c => {
        tl.fromTo(c.sel, { y: 12, autoAlpha: 0 },
          { y: 0, autoAlpha: 1, duration: 0.45, ease: "back.out(1.4)" }, c.in_);
        tl.to(c.sel, { y: -10, autoAlpha: 0, duration: 0.35, ease: "power2.in" }, c.out);
      });

      // Extend timeline to full slot duration
      tl.set({}, {}, 61.2);
      window.__timelines["scene-vsa-tree"] = tl;
    </script>
  </div>
</template>
