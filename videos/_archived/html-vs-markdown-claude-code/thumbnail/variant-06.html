<!DOCTYPE html>
<!-- Variant 06 — Cinematic dark slam. "Markdown's over." Two huge yellow words on charcoal. No cover — type IS the visual. -->
<html lang="en"><head><meta charset="utf-8">
<title>v06 — Markdown's over</title>
<link rel="stylesheet" href="_base.css">
<style>
  .thumb.theme-dark .headline {
    font-family: var(--sans-display);
    font-weight: 900;
    letter-spacing: -4px;
    width: 1160px;
  }
  .thumb.theme-dark .headline .l1 { font-size: 168px; line-height: 0.92; color: var(--text-dark); }
  .thumb.theme-dark .headline .l2 { font-size: 244px; line-height: 0.92; color: var(--accent-yellow); margin-top: -10px; letter-spacing: -8px; text-shadow: 0 0 80px rgba(255, 214, 10, 0.2); }
  .source-stamp {
    position: absolute;
    right: 60px;
    top: 56px;
    display: flex;
    align-items: center;
    gap: 14px;
    font-family: var(--mono);
    font-weight: 700;
    font-size: 18px;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: var(--text-dim-dark);
  }
  .source-stamp .badge {
    background: var(--accent-yellow);
    color: #0d0d10;
    padding: 6px 12px;
    border-radius: 4px;
    letter-spacing: 2px;
  }
</style></head>
<body>
  <div class="thumb theme-dark">
    <div class="overline">8 minute read</div>
    <div class="overline-divider"></div>
    <div class="source-stamp"><span>@trq212 · Anthropic</span><span class="badge">751K views</span></div>
    <h1 class="headline" style="top: 200px;">
      <span class="l1">Markdown's</span>
      <em class="l2">over.</em>
    </h1>
    <div class="receipt" style="right: 60px;"><strong>1MM context. New math.</strong><br>Why HTML wins.</div>
    <div class="brand"><span class="dot"></span><span>diy-yt-creator</span></div>
  </div>
</body></html>
