<!--
  scene-detail-network.html — 4-card 2x2 detail scene for "Network & Proxy".

  Header + 2x2 grid + closer banner ("Quiet wins for enterprise.").
-->
<template id="scene-detail-network-template">
  <div data-composition-id="scene-detail-network"
       data-start="0"
       data-width="1920"
       data-height="1080"
       style="position:absolute; inset:0; overflow:hidden;
              font-family:var(--sans); color:var(--text);">

    <style>
      #scene-detail-network-content {
        width:100%; height:100%;
        padding: 60px var(--pad-x) 90px;
        display:flex; flex-direction:column;
        align-items:center; justify-content:flex-start;
        gap: 36px;
        box-sizing:border-box;
      }
      #scene-detail-network-content .header-block {
        display:flex; flex-direction:column;
        align-items:center; gap: 14px;
        text-align:center;
      }
      #scene-detail-network-content .overline {
        font-family: var(--mono);
        font-weight: 700;
        font-size: 26px;
        letter-spacing: 6px;
        text-transform: uppercase;
        color: var(--accent-4);
        opacity: 0;
      }
      #scene-detail-network-content .headline {
        font-family: var(--sans);
        font-weight: 800;
        font-size: 56px;
        line-height: 1.05;
        letter-spacing: -1px;
        color: var(--text);
        max-width: 1500px;
        opacity: 0;
      }
      .dn-grid {
        width: 1700px;
        display: grid;
        grid-template-columns: 1fr 1fr;
        grid-template-rows: 1fr 1fr;
        gap: 24px;
      }
      .dn-card {
        position: relative;
        padding: 28px 32px;
        border-radius: 16px;
        border: 2px solid var(--border-bright);
        background: rgba(255, 255, 255, 0.04);
        box-shadow: 0 14px 40px rgba(0, 0, 0, 0.45);
        display:flex; flex-direction:column;
        gap: 12px;
        min-height: 220px;
        box-sizing: border-box;
        opacity: 0;
      }
      .dn-card::before {
        content: "";
        position: absolute;
        top: 0; left: 0; right: 0;
        height: 3px;
        background: linear-gradient(90deg, var(--card-accent, var(--accent-4)), transparent);
        border-radius: 14px 14px 0 0;
      }
      .dn-card .row { display:flex; align-items:center; gap: 14px; margin-bottom: 4px; }
      .dn-card .num {
        width: 44px; height: 44px;
        border-radius: 10px;
        font-family: var(--mono);
        font-weight: 800;
        font-size: 22px;
        font-variant-numeric: tabular-nums;
        display:flex; align-items:center; justify-content:center;
        background: rgba(255, 255, 255, 0.06);
        flex-shrink: 0;
      }
      .dn-card .ttl {
        font-family: var(--sans);
        font-weight: 800;
        font-size: 28px;
        line-height: 1.18;
        letter-spacing: -0.3px;
        color: var(--text);
      }
      .dn-card .det {
        font-family: var(--sans);
        font-weight: 500;
        font-size: 20px;
        line-height: 1.4;
        color: var(--text-secondary);
      }
      .dn-card .det code {
        font-family: var(--mono);
        font-size: 18px;
        padding: 2px 8px;
        border-radius: 4px;
        background: rgba(255, 255, 255, 0.08);
      }
      .dn-card.a { --card-accent: var(--accent-4);    border-color: rgba(63, 185, 80, 0.55);   }
      .dn-card.b { --card-accent: var(--accent-1);    border-color: rgba(88, 166, 255, 0.55);  }
      .dn-card.c { --card-accent: var(--accent-3);    border-color: rgba(163, 113, 247, 0.55); }
      .dn-card.d { --card-accent: var(--accent-warn); border-color: rgba(247, 129, 102, 0.55); }
      .dn-card.a .num { color: var(--accent-4);    background: rgba(63, 185, 80, 0.18);   }
      .dn-card.b .num { color: var(--accent-1);    background: rgba(88, 166, 255, 0.18);  }
      .dn-card.c .num { color: var(--accent-3);    background: rgba(163, 113, 247, 0.18); }
      .dn-card.d .num { color: var(--accent-warn); background: rgba(247, 129, 102, 0.18); }

      #dn-close {
        position: absolute;
        left: 50%; bottom: 42px;
        opacity: 0;
        background: rgba(63, 185, 80, 0.16);
        border: 2px solid var(--accent-4);
        border-radius: 14px;
        padding: 10px 28px;
        font-family: var(--sans);
        font-weight: 800;
        font-size: 26px;
        color: var(--accent-4);
        letter-spacing: 0.4px;
        box-shadow: 0 8px 28px rgba(63, 185, 80, 0.4);
      }
    </style>

    <div id="scene-detail-network-content">
      <div class="header-block">
        <div class="overline" id="dn-overline">NETWORK, PROXY &amp; API</div>
        <div class="headline" id="dn-headline">Network and API compatibility — fixed.</div>
      </div>

      <div class="dn-grid">
        <div class="dn-card a" id="dn-card-1">
          <div class="row"><div class="num">01</div></div>
          <div class="ttl">MCP OAuth respects your proxy</div>
          <div class="det"><code>HTTP(S)_PROXY</code>, <code>NO_PROXY</code>, mTLS now honored across discovery, registration, exchange, and refresh.</div>
        </div>
        <div class="dn-card b" id="dn-card-2">
          <div class="row"><div class="num">02</div></div>
          <div class="ttl">Bedrock + Vertex 1-hour cache</div>
          <div class="det">400 errors when <code>ENABLE_PROMPT_CACHING_1H</code> is set on Bedrock + Vertex &mdash; patched.</div>
        </div>
        <div class="dn-card c" id="dn-card-3">
          <div class="row"><div class="num">03</div></div>
          <div class="ttl">VS Code on Windows — fixed</div>
          <div class="det">Extension activation was failing on Windows due to a hardcoded build path. Fixed in 2.1.131.</div>
        </div>
        <div class="dn-card d" id="dn-card-4">
          <div class="row"><div class="num">04</div></div>
          <div class="ttl">Mantle endpoint auth</div>
          <div class="det">Mantle authentication failure with a missing <code>x-api-key</code> header — also resolved in 2.1.131.</div>
        </div>
      </div>
    </div>

    <div id="dn-close">&#10003; Proxies, caching, IDE — patched.</div>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      // Transcript-driven timing for v2.1.128–v2.1.133. scene_t = root_t - 246.79.
      // Narration scene_t (relative):
      //   "Network, proxy, and A P I compatibility."   scene_t  0.00 (#609)
      //   "Your proxy and mutual T L S settings..."    scene_t  3.48 (#616) → card 1
      //   "Bedrock and Vertex four hundred errors..."  scene_t 14.91 (#644) → card 2
      //   "The V S Code extension activation..."       scene_t 21.23 (#659) → card 3
      //   "And the Mantle endpoint..."                 scene_t 28.85 (#680) → card 4
      // Slot length: 35.48s
      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({ paused: true });

      tl.fromTo("#dn-overline", { y: 18, opacity: 0 }, { y: 0, opacity: 1, duration: 0.4, ease: "power2.out" }, 0);
      tl.fromTo("#dn-headline", { y: 30, opacity: 0 }, { y: 0, opacity: 1, duration: 0.5, ease: "power3.out" }, 0.15);

      const cards = [
        { sel: "#dn-card-1", num: "#dn-card-1 .num", at:  3.48 },
        { sel: "#dn-card-2", num: "#dn-card-2 .num", at: 14.91 },
        { sel: "#dn-card-3", num: "#dn-card-3 .num", at: 21.23 },
        { sel: "#dn-card-4", num: "#dn-card-4 .num", at: 28.85 },
      ];
      cards.forEach(({ sel, num, at }, i) => {
        const next = cards[i + 1] ? cards[i + 1].at : 34.5;
        const dwell = next - at;
        tl.fromTo(sel,
          { y: 28, opacity: 0, scale: 0.96 },
          { y: 0,  opacity: 1, scale: 1, duration: 0.45, ease: "back.out(1.4)" },
          at);
        if (dwell > 7.0) {
          tl.to(num, { scale: 1.20, duration: 0.25, ease: "power2.out", yoyo: true, repeat: 1 }, at + 3.0);
          tl.to(num, { scale: 1.15, duration: 0.25, ease: "power2.out", yoyo: true, repeat: 1 }, at + 6.5);
        } else if (dwell > 4.0) {
          tl.to(num, { scale: 1.18, duration: 0.25, ease: "power2.out", yoyo: true, repeat: 1 }, at + 2.0);
        }
      });

      // Closer banner just before scene exits
      tl.fromTo("#dn-close",
        { xPercent: -50, scale: 0.85, opacity: 0 },
        { xPercent: -50, scale: 1,    opacity: 1, duration: 0.4, ease: "back.out(1.6)" },
        33.0);

      // Anchor to slot length (35.48s)
      tl.set({}, {}, 35.48);

      window.__timelines["scene-detail-network"] = tl;
    </script>
  </div>
</template>
