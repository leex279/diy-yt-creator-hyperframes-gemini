<!--
  scene-architecture-stack.html — Architecture layer stack (Anthropic long-form).

  Re-skin of standard template. 5 horizontal stripes in orange/purple/blue/green
  rotation with mono captions. Each stripe enters top-down with a stagger.

  OPERATOR:
    - Replace label / name / meta for each layer
    - Tune SCENE_DURATION to narration length
-->
<template id="scene-architecture-stack-template">
  <div data-composition-id="scene-architecture-stack"
       data-start="0"
       data-width="1920"
       data-height="1080"
       style="position:absolute; inset:0; overflow:hidden;
              font-family:var(--sans); color:var(--text);">

    <style>
      #scene-arch-content {
        width: 100%; height: 100%;
        padding: var(--pad-top) var(--pad-x) var(--pad-bottom);
        display: flex; flex-direction: column;
        align-items: flex-start; justify-content: center;
        gap: 28px;
        box-sizing: border-box;
      }
      #arch-overline {
        font-family: var(--mono);
        font-weight: 700;
        font-size: 26px;
        letter-spacing: 7px;
        text-transform: uppercase;
        color: var(--accent-2);
      }
      #arch-headline {
        font-family: var(--sans);
        font-weight: 800;
        font-size: 56px;
        line-height: 1.05;
        letter-spacing: -1px;
        color: var(--text);
        max-width: 1400px;
      }
      .arch-layers {
        display: flex; flex-direction: column;
        gap: 12px;
        width: 100%;
      }
      .arch-layer {
        height: 90px;
        border-radius: 14px;
        display: flex; flex-direction: row;
        align-items: center;
        padding: 0 32px 0 56px;
        gap: 28px;
        position: relative;
        overflow: hidden;
      }
      /* Accent left-strip — uses ::before for each color */
      .arch-layer::before {
        content: '';
        position: absolute;
        left: 0; top: 0; bottom: 0;
        width: 8px;
        border-radius: 14px 0 0 14px;
      }
      .arch-layer.orange {
        background: rgba(233, 116, 88, 0.08);
        border: 1.5px solid rgba(233, 116, 88, 0.30);
      }
      .arch-layer.orange::before { background: var(--accent-1); }
      .arch-layer.purple {
        background: rgba(167, 139, 250, 0.08);
        border: 1.5px solid rgba(167, 139, 250, 0.30);
      }
      .arch-layer.purple::before { background: var(--accent-2); }
      .arch-layer.blue {
        background: rgba(107, 154, 239, 0.08);
        border: 1.5px solid rgba(107, 154, 239, 0.30);
      }
      .arch-layer.blue::before { background: var(--accent-3); }
      .arch-layer.green {
        background: rgba(125, 211, 166, 0.08);
        border: 1.5px solid rgba(125, 211, 166, 0.30);
      }
      .arch-layer.green::before { background: var(--accent-4); }
      .arch-label {
        font-family: var(--mono);
        font-weight: 700;
        font-size: 18px;
        letter-spacing: 4px;
        text-transform: uppercase;
        min-width: 160px;
        color: var(--text-secondary);
      }
      .arch-name {
        font-family: var(--sans);
        font-weight: 700;
        font-size: 32px;
        line-height: 1.1;
        color: var(--text);
        flex: 1;
      }
      .arch-meta {
        font-family: var(--sans);
        font-weight: 500;
        font-size: 22px;
        color: var(--text-secondary);
      }
    </style>

    <div id="scene-arch-content">
      <div id="arch-overline">HOW IT FITS TOGETHER</div>
      <div id="arch-headline">Replace with architecture headline</div>
      <div class="arch-layers">
        <div class="arch-layer orange" id="arch-layer-1">
          <div class="arch-label">LAYER 1</div>
          <div class="arch-name">Foundation Layer</div>
          <div class="arch-meta">Replace with meta note</div>
        </div>
        <div class="arch-layer purple" id="arch-layer-2">
          <div class="arch-label">LAYER 2</div>
          <div class="arch-name">Integration Layer</div>
          <div class="arch-meta">Replace with meta note</div>
        </div>
        <div class="arch-layer blue" id="arch-layer-3">
          <div class="arch-label">LAYER 3</div>
          <div class="arch-name">Service Layer</div>
          <div class="arch-meta">Replace with meta note</div>
        </div>
        <div class="arch-layer green" id="arch-layer-4">
          <div class="arch-label">LAYER 4</div>
          <div class="arch-name">Application Layer</div>
          <div class="arch-meta">Replace with meta note</div>
        </div>
        <div class="arch-layer orange" id="arch-layer-5">
          <div class="arch-label">LAYER 5</div>
          <div class="arch-name">Output Layer</div>
          <div class="arch-meta">Replace with meta note</div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      window.__timelines = window.__timelines || {};
      const SCENE_DURATION = 12;

      const tl = gsap.timeline({
        paused: true,
        defaults: { ease: "power3.out", duration: 0.6 }
      });

      tl.from("#arch-overline",  { y: 20, opacity: 0, duration: 0.5, ease: "power2.out", immediateRender: false }, 0);
      tl.from("#arch-headline",  { y: 28, opacity: 0, duration: 0.6, ease: "power3.out", immediateRender: false }, 0.3);

      // Staggered layer entrances (150ms apart — visual-pacing satisfied because they're batched)
      const layers = ["#arch-layer-1","#arch-layer-2","#arch-layer-3","#arch-layer-4","#arch-layer-5"];
      layers.forEach((sel, i) => {
        tl.from(sel, { x: -50, opacity: 0, duration: 0.55, ease: "back.out(1.4)", immediateRender: false }, 1.0 + i * 0.15);
      });

      // Pin timeline to scene duration
      tl.set({}, {}, SCENE_DURATION);

      window.__timelines["scene-architecture-stack"] = tl;
    </script>
  </div>
</template>
