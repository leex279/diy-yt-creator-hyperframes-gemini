<!--
  scene-compare.html — Side-by-side comparison cards (~8s).

  Pattern: header → 2 stacked cards (left = "before", right = "after"),
           label band → big claim → supporting line. Optional X / check
           glyph. Vertical-stacked because canvas is portrait.
  Self-contained sub-composition with paused timeline at
  window.__timelines["scene-compare"].
-->
<template id="scene-compare-template">
  <div data-composition-id="scene-compare"
       data-start="0"
       data-width="1080"
       data-height="1920"
       style="position:absolute; inset:0; overflow:hidden;">

    <style>
      #scene-compare-content {
        width:100%; height:100%;
        padding: var(--pad-top) var(--pad-x) var(--pad-bottom);
        display:flex; flex-direction:column;
        align-items:center; justify-content:center;
        text-align:center; gap:32px;
        box-sizing:border-box;
      }
      #scene-compare-content .header {
        font-family: 'Source Serif 4', Georgia, serif;
        font-weight: 700;
        font-size: 76px;
        line-height: 1.05;
        letter-spacing: -1px;
        color: var(--accent-ink);
        max-width: 880px;
      }
      #scene-compare-content .stack {
        display: flex; flex-direction: column; gap: 24px;
        width: 920px;
      }
      #scene-compare-content .card {
        position: relative;
        padding: 32px 36px 28px;
        border-radius: 24px;
        background: var(--bg-card);
        border: 2px solid var(--border);
        box-shadow: var(--shadow-warm);
        text-align: left;
      }
      #scene-compare-content .card.before { border-color: rgba(43, 42, 40, 0.18); opacity: 0.92; }
      #scene-compare-content .card.after  { border-color: var(--accent-warm); }
      #scene-compare-content .ribbon {
        display: inline-block;
        padding: 8px 18px;
        border-radius: 999px;
        font-family: 'JetBrains Mono', ui-monospace, monospace;
        font-weight: 700;
        font-size: 22px;
        letter-spacing: 3px;
        text-transform: uppercase;
        margin-bottom: 14px;
      }
      #scene-compare-content .card.before .ribbon { background: var(--bg-tint); color: var(--text-secondary); }
      #scene-compare-content .card.after .ribbon  { background: #f78166; color: #0d1117; }
      #scene-compare-content .claim {
        font-family: 'Inter', system-ui, sans-serif;
        font-weight: 800;
        font-size: 56px;
        line-height: 1.0;
        letter-spacing: -1px;
        color: var(--accent-ink);
        margin-bottom: 8px;
      }
      #scene-compare-content .card.before .claim { text-decoration: line-through; text-decoration-thickness: 4px; text-decoration-color: rgba(247, 129, 102, 0.6); color: var(--text-secondary); }
      #scene-compare-content .support {
        font-family: 'Source Serif 4', Georgia, serif;
        font-style: italic;
        font-weight: 400;
        font-size: 32px;
        line-height: 1.3;
        color: var(--text-secondary);
      }
      #scene-compare-content .vs {
        font-family: 'Source Serif 4', Georgia, serif;
        font-style: italic;
        font-weight: 700;
        font-size: 56px;
        color: var(--accent-deep);
      }
    </style>

    <div id="scene-compare-content">
      <div class="header" id="compare-header">Meet <em style="font-style:italic;color:var(--accent-warm)">ast-grep.</em></div>
      <div class="stack">
        <div class="card before" id="compare-before">
          <span class="ribbon">grep</span>
          <div class="claim">Sees characters.</div>
          <div class="support">A wall of text. Quoted strings count.</div>
        </div>
        <div class="vs" id="compare-vs">vs.</div>
        <div class="card after" id="compare-after">
          <span class="ribbon">ast-grep</span>
          <div class="claim">Sees structure.</div>
          <div class="support">Functions, calls, try-catch &mdash; the real shape.</div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({ paused: true });

      // Entrance (0 → 1.8s)
      tl.from("#compare-header", { y: 24, opacity: 0, duration: 0.6, ease: "power3.out" }, 0);
      tl.from("#compare-before", { y: 30, opacity: 0, duration: 0.6, ease: "power3.out" }, 0.4);
      tl.from("#compare-vs",     { scale: 0.7, opacity: 0, duration: 0.5, ease: "back.out(1.6)" }, 0.9);
      tl.from("#compare-after",  { y: 30, opacity: 0, duration: 0.6, ease: "power3.out" }, 1.2);

      // Mid-beats
      // Beat A (4s): "before" card fades to 0.7 opacity (de-emphasizes the old way)
      tl.to("#compare-before", { opacity: 0.55, duration: 0.6, ease: "power2.inOut" }, 4);
      // Beat B (5s): "after" card glow pulse
      tl.to("#compare-after", { scale: 1.02, duration: 0.5, ease: "power2.out", yoyo: true, repeat: 1 }, 5);
      // Beat C (7.5s): vs flips/rotates briefly
      tl.to("#compare-vs", { rotation: 8, duration: 0.4, ease: "power2.inOut", yoyo: true, repeat: 1 }, 7.5);
      // Beat D (9.5s): "after" claim emphasis (color brighten via scale up)
      tl.to("#compare-after .claim", { scale: 1.04, duration: 0.5, ease: "power2.out", yoyo: true, repeat: 1 }, 9.5);
      // Beat E (12s): "after" card final emphasis pulse
      tl.to("#compare-after", { scale: 1.025, duration: 0.5, ease: "power2.out", yoyo: true, repeat: 1 }, 12);
      // Tail-extend so the sub-comp timeline duration matches the visible window in the root
      tl.set({}, {}, 13.5);


      window.__timelines["scene-compare"] = tl;
    </script>
  </div>
</template>
