<!--
  scene-detail-network.html — 4-card 2x2 detail scene for "Network & Proxy".

  Header + 2x2 grid + closer banner ("Quiet wins for enterprise.").
-->
<template id="scene-detail-network-template">
  <div data-composition-id="scene-detail-network"
       data-start="0"
       data-width="1920"
       data-height="1080"
       style="position:absolute; inset:0; overflow:hidden;
              font-family:var(--sans); color:var(--text);">

    <style>
      #scene-detail-network-content {
        width:100%; height:100%;
        padding: 60px var(--pad-x) 90px;
        display:flex; flex-direction:column;
        align-items:center; justify-content:flex-start;
        gap: 36px;
        box-sizing:border-box;
      }
      #scene-detail-network-content .header-block {
        display:flex; flex-direction:column;
        align-items:center; gap: 14px;
        text-align:center;
      }
      #scene-detail-network-content .overline {
        font-family: var(--mono);
        font-weight: 700;
        font-size: 26px;
        letter-spacing: 6px;
        text-transform: uppercase;
        color: var(--accent-4);
        opacity: 0;
      }
      #scene-detail-network-content .headline {
        font-family: var(--sans);
        font-weight: 800;
        font-size: 56px;
        line-height: 1.05;
        letter-spacing: -1px;
        color: var(--text);
        max-width: 1500px;
        opacity: 0;
      }
      .dn-grid {
        width: 1700px;
        display: grid;
        grid-template-columns: 1fr 1fr;
        grid-template-rows: 1fr 1fr;
        gap: 24px;
      }
      .dn-card {
        position: relative;
        padding: 28px 32px;
        border-radius: 16px;
        border: 2px solid var(--border-bright);
        background: rgba(255, 255, 255, 0.04);
        box-shadow: 0 14px 40px rgba(0, 0, 0, 0.45);
        display:flex; flex-direction:column;
        gap: 12px;
        min-height: 220px;
        box-sizing: border-box;
        opacity: 0;
      }
      .dn-card::before {
        content: "";
        position: absolute;
        top: 0; left: 0; right: 0;
        height: 3px;
        background: linear-gradient(90deg, var(--card-accent, var(--accent-4)), transparent);
        border-radius: 14px 14px 0 0;
      }
      .dn-card .row { display:flex; align-items:center; gap: 14px; margin-bottom: 4px; }
      .dn-card .num {
        width: 44px; height: 44px;
        border-radius: 10px;
        font-family: var(--mono);
        font-weight: 800;
        font-size: 22px;
        font-variant-numeric: tabular-nums;
        display:flex; align-items:center; justify-content:center;
        background: rgba(255, 255, 255, 0.06);
        flex-shrink: 0;
      }
      .dn-card .ttl {
        font-family: var(--sans);
        font-weight: 800;
        font-size: 28px;
        line-height: 1.18;
        letter-spacing: -0.3px;
        color: var(--text);
      }
      .dn-card .det {
        font-family: var(--sans);
        font-weight: 500;
        font-size: 20px;
        line-height: 1.4;
        color: var(--text-secondary);
      }
      .dn-card .det code {
        font-family: var(--mono);
        font-size: 18px;
        padding: 2px 8px;
        border-radius: 4px;
        background: rgba(255, 255, 255, 0.08);
      }
      .dn-card.a { --card-accent: var(--accent-4);    border-color: rgba(63, 185, 80, 0.55);   }
      .dn-card.b { --card-accent: var(--accent-1);    border-color: rgba(88, 166, 255, 0.55);  }
      .dn-card.c { --card-accent: var(--accent-3);    border-color: rgba(163, 113, 247, 0.55); }
      .dn-card.d { --card-accent: var(--accent-warn); border-color: rgba(247, 129, 102, 0.55); }
      .dn-card.a .num { color: var(--accent-4);    background: rgba(63, 185, 80, 0.18);   }
      .dn-card.b .num { color: var(--accent-1);    background: rgba(88, 166, 255, 0.18);  }
      .dn-card.c .num { color: var(--accent-3);    background: rgba(163, 113, 247, 0.18); }
      .dn-card.d .num { color: var(--accent-warn); background: rgba(247, 129, 102, 0.18); }

      #dn-close {
        position: absolute;
        left: 50%; bottom: 42px;
        opacity: 0;
        background: rgba(63, 185, 80, 0.16);
        border: 2px solid var(--accent-4);
        border-radius: 14px;
        padding: 10px 28px;
        font-family: var(--sans);
        font-weight: 800;
        font-size: 26px;
        color: var(--accent-4);
        letter-spacing: 0.4px;
        box-shadow: 0 8px 28px rgba(63, 185, 80, 0.4);
      }
    </style>

    <div id="scene-detail-network-content">
      <div class="header-block">
        <div class="overline" id="dn-overline">NETWORK &amp; PROXY</div>
        <div class="headline" id="dn-headline">Networking got overdue attention.</div>
      </div>

      <div class="dn-grid">
        <div class="dn-card a" id="dn-card-1">
          <div class="row"><div class="num">01</div></div>
          <div class="ttl"><code>NO_PROXY</code> respected</div>
          <div class="det">Finally honored across all HTTP clients &mdash; not just the main fetch path.</div>
        </div>
        <div class="dn-card b" id="dn-card-2">
          <div class="row"><div class="num">02</div></div>
          <div class="ttl">MCP HTTP &amp; OAuth resilience</div>
          <div class="det">Invalid OAuth responses no longer break the connection. The 401 retry loop with <code>CLAUDE_CODE_DISABLE_EXPERIMENTAL_BETAS=1</code> &mdash; fixed.</div>
        </div>
        <div class="dn-card c" id="dn-card-3">
          <div class="row"><div class="num">03</div></div>
          <div class="ttl">Connector dedup</div>
          <div class="det">Claude.AI connectors with the same URL are deduplicated. <code>/mcp</code> now flags duplicates a manually-added server hides.</div>
        </div>
        <div class="dn-card d" id="dn-card-4">
          <div class="row"><div class="num">04</div></div>
          <div class="ttl">Cloud side &mdash; Vertex AI &amp; Bedrock</div>
          <div class="det">Vertex AI: X.509 WIF + count_tokens fix behind a proxy. Bedrock: new <code>ANTHROPIC_BEDROCK_SERVICE_TIER</code> env var (default / flex / priority).</div>
        </div>
      </div>
    </div>

    <div id="dn-close">&#10003; Quiet wins for enterprise.</div>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      // Transcript-driven timing. scene_t = root_t - 153.03 (data-start 153.03). Slot 41.42s.
      // Narration (v122/v123 expanded — much longer with cloud beat):
      //   "Networking got overdue attention."        scene_t 0.00 (#343)
      //   "NO PROXY is finally respected..."         scene_t 2.76 (#347)
      //   "MCP HTTP and OAuth got resilience..."     scene_t 6.57 (#356) [v121+v123 merged]
      //   "Claude.AI connectors with the same URL..." scene_t 16.00 (#381) [v121+v122 merged]
      //   "And on the cloud side — Vertex AI..."     scene_t 25.81 (#402) [v121+v122 merged]
      //   "Quiet wins for enterprise."               scene_t 39.07 (#433)
      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({ paused: true });

      tl.fromTo("#dn-overline", { y: 18, opacity: 0 }, { y: 0, opacity: 1, duration: 0.4, ease: "power2.out" }, 0);
      tl.fromTo("#dn-headline", { y: 30, opacity: 0 }, { y: 0, opacity: 1, duration: 0.5, ease: "power3.out" }, 0.15);

      const cards = [
        { sel: "#dn-card-1", num: "#dn-card-1 .num", at:  2.76 },
        { sel: "#dn-card-2", num: "#dn-card-2 .num", at:  6.57 },
        { sel: "#dn-card-3", num: "#dn-card-3 .num", at: 16.00 },
        { sel: "#dn-card-4", num: "#dn-card-4 .num", at: 25.81 },
      ];
      cards.forEach(({ sel, num, at }, i) => {
        const next = cards[i + 1] ? cards[i + 1].at : 39.07;
        const dwell = next - at;
        tl.fromTo(sel,
          { y: 28, opacity: 0, scale: 0.96 },
          { y: 0,  opacity: 1, scale: 1, duration: 0.45, ease: "back.out(1.4)" },
          at);
        if (dwell > 3.0) {
          tl.to(num, { scale: 1.18, duration: 0.25, ease: "power2.out", yoyo: true, repeat: 1 }, at + 1.6);
        }
        // Long card-2 dwell — add a 401-retry-loop badge pulse mid-card
        if (i === 1) {
          tl.to(sel, {
            boxShadow: "0 14px 40px rgba(0, 0, 0, 0.45), 0 0 0 3px var(--card-accent)",
            duration: 0.6, yoyo: true, repeat: 1, ease: "sine.inOut" }, at + 4.0);
        }
        // Long card-4 dwell (Vertex + Bedrock) — beat pulses for each cloud bullet
        if (i === 3) {
          // "count_tokens" beat ~at 187 root → scene_t 33.97 → relative to card 4 entry: +8.16
          tl.to(num, { scale: 1.18, duration: 0.25, ease: "power2.out", yoyo: true, repeat: 1 }, at + 4.6);
          // "Bedrock" beat ~at 188.52 → scene_t 35.49 → +9.68
          tl.to(num, { scale: 1.18, duration: 0.25, ease: "power2.out", yoyo: true, repeat: 1 }, at + 8.0);
        }
      });

      // Closer banner @ 39.07
      tl.fromTo("#dn-close",
        { xPercent: -50, scale: 0.85, opacity: 0 },
        { xPercent: -50, scale: 1,    opacity: 1, duration: 0.4, ease: "back.out(1.6)" },
        39.07);

      // Anchor to slot length (41.42s)
      tl.set({}, {}, 41.42);

      window.__timelines["scene-detail-network"] = tl;
    </script>
  </div>
</template>
