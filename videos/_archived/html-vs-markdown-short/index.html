<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Why Claude Code Just Killed Markdown - 60s Short</title>
<link rel="stylesheet" href="tokens/editorial-short.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Source+Serif+4:ital,opsz,wght@0,8..60,400;0,8..60,700;0,8..60,800;0,8..60,900;1,8..60,400;1,8..60,700;1,8..60,800;1,8..60,900&family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;700;800&display=swap">
<script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
<style>
  /* ──────────────────────────────────────────────────
     CANVAS — 1080x1920 editorial-light vertical Short.
     Mirrors the long-form's design language (cream +
     serif italic + terracotta accent). Sub-composition
     architecture: 7 scenes, each with its own paused
     timeline registered on window.__timelines[<scene>].
     ────────────────────────────────────────────────── */
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 1080px;
    height: 1920px;
    overflow: hidden;
    background: var(--bg);
    font-family: var(--serif);
    color: var(--text);
    -webkit-font-smoothing: antialiased;
  }

  /* Ambient warm wash — subtle terracotta radials. */
  #ambient {
    position: absolute;
    inset: -200px;
    pointer-events: none;
    z-index: 0;
  }

  /* Shape backdrop — ghosted brown smudges at 3% opacity on cream. */
  #shape-backdrop {
    position: absolute;
    inset: 0;
    pointer-events: none;
    overflow: hidden;
    z-index: 0;
  }
  #shape-backdrop img {
    position: absolute;
    object-fit: contain;
    pointer-events: none;
  }

  /* Film-grain overlay — multiply on cream at low opacity. */
  #grain-overlay {
    position: absolute;
    inset: 0;
    width: 1080px;
    height: 1920px;
    pointer-events: none;
    z-index: 11;
  }

  /* ──────────────────────────────────────────────────
     TOP CHROME — slim mono wordmark.
     ────────────────────────────────────────────────── */
  #top-banner {
    position: absolute;
    top: 56px;
    left: 0;
    width: 1080px;
    z-index: 10;
    pointer-events: none;
    text-align: center;
  }
  #top-banner-wordmark {
    font-family: var(--mono);
    font-weight: 800;
    font-size: 24px;
    letter-spacing: 8px;
    text-transform: uppercase;
    color: var(--accent-2);
    display: inline-block;
  }
  #top-banner-rule {
    width: 80px;
    height: 1.5px;
    background: var(--accent-2);
    margin: 8px auto 0;
    opacity: 0.6;
  }

  /* Slim progress bar — bottom edge */
  #progress-track {
    position: absolute;
    bottom: 0;
    left: 0;
    width: 1080px;
    height: 4px;
    z-index: 10;
  }
  #progress-fill {
    width: 0;
    height: 100%;
  }

  /* Scene wrappers — each scene's container div. First scene visible. */
  .scene-wrapper {
    position: absolute;
    top: 0;
    left: 0;
    width: 1080px;
    height: 1920px;
    z-index: 1;
  }
  #scene-title-wrap      { z-index: 1; opacity: 1; }
  #scene-stat-wrap       { z-index: 1; opacity: 0; visibility: hidden; }
  #scene-quote-wrap      { z-index: 1; opacity: 0; visibility: hidden; }
  #scene-bullets-wrap    { z-index: 1; opacity: 0; visibility: hidden; }
  #scene-typewriter-wrap { z-index: 1; opacity: 0; visibility: hidden; }
  #scene-compare-wrap    { z-index: 1; opacity: 0; visibility: hidden; }
  #scene-cta-wrap        { z-index: 1; opacity: 0; visibility: hidden; }
</style>
</head>
<body>
<div id="root"
     data-composition-id="main"
     data-start="0"
     data-duration="57.5"
     data-width="1080"
     data-height="1920">

  <!-- Ambient + shape backdrop -->
  <div id="ambient"></div>
  <div id="shape-backdrop"></div>

  <!-- Top chrome -->
  <div id="top-banner">
    <span id="top-banner-wordmark">Using Claude Code</span>
    <div id="top-banner-rule"></div>
  </div>

  <!-- Bottom progress bar -->
  <div id="progress-track"><div id="progress-fill"></div></div>

  <!-- ═══════════════════════════════════════════════════════
       SCENE WRAPPERS — 7 scenes mapped to the 56.31s narration:
         0       → title       (4.4s) HOOK: "Markdown is dying"
         4.40    → stat        (8.3s) Thariq + 750k + replies split
         12.70   → quote       (8.3s) THESIS: "wrong format" + OUT.
         21.00   → bullets    (15.4s) markdown 3 chips vs HTML 8 chips
         36.40   → typewriter  (5.4s) "agent stops faking" + chart
         41.80   → compare     (5.9s) SKIM vs OPEN punchline
         47.70   → cta         (9.8s) WATCH FULL VIDEO + thumbnail
       Total: 57.5s.
       ═══════════════════════════════════════════════════════ -->

  <div id="scene-title-wrap" class="scene-wrapper"
       data-composition-id="scene-title"
       data-composition-src="compositions/scene-title.html"
       data-start="0"
       data-track-index="1"></div>

  <div id="scene-stat-wrap" class="scene-wrapper"
       data-composition-id="scene-stat"
       data-composition-src="compositions/scene-stat.html"
       data-start="4.40"
       data-track-index="1"></div>

  <div id="scene-quote-wrap" class="scene-wrapper"
       data-composition-id="scene-quote"
       data-composition-src="compositions/scene-quote.html"
       data-start="12.70"
       data-track-index="1"></div>

  <div id="scene-bullets-wrap" class="scene-wrapper"
       data-composition-id="scene-bullets"
       data-composition-src="compositions/scene-bullets.html"
       data-start="21.00"
       data-track-index="1"></div>

  <div id="scene-typewriter-wrap" class="scene-wrapper"
       data-composition-id="scene-typewriter"
       data-composition-src="compositions/scene-typewriter.html"
       data-start="36.40"
       data-track-index="1"></div>

  <div id="scene-compare-wrap" class="scene-wrapper"
       data-composition-id="scene-compare"
       data-composition-src="compositions/scene-compare.html"
       data-start="41.80"
       data-track-index="1"></div>

  <div id="scene-cta-wrap" class="scene-wrapper"
       data-composition-id="scene-cta"
       data-composition-src="compositions/scene-cta.html"
       data-start="47.70"
       data-track-index="1"></div>

  <!-- Narration audio (cloned voice via ElevenLabs) -->
  <audio id="narration"
         src="audio/narration.wav"
         data-start="0"
         data-duration="57.5"
         data-track-index="2"
         data-volume="1"></audio>

  <!-- SFX: cinematic-whoosh on every scene transition (track 3, sequential).
       Times = scene_start - 0.4. -->
  <audio id="sfx-whoosh-1" class="clip" src="assets/sfx/cinematic-whoosh.mp3"
         data-start="4.00"  data-duration="1.5" data-track-index="3" data-volume="0.11"></audio>
  <audio id="sfx-whoosh-2" class="clip" src="assets/sfx/cinematic-whoosh.mp3"
         data-start="12.30" data-duration="1.5" data-track-index="3" data-volume="0.11"></audio>
  <audio id="sfx-whoosh-3" class="clip" src="assets/sfx/cinematic-whoosh.mp3"
         data-start="20.60" data-duration="1.5" data-track-index="3" data-volume="0.11"></audio>
  <audio id="sfx-whoosh-4" class="clip" src="assets/sfx/cinematic-whoosh.mp3"
         data-start="36.00" data-duration="1.5" data-track-index="3" data-volume="0.11"></audio>
  <audio id="sfx-whoosh-5" class="clip" src="assets/sfx/cinematic-whoosh.mp3"
         data-start="41.40" data-duration="1.5" data-track-index="3" data-volume="0.11"></audio>
  <audio id="sfx-whoosh-6" class="clip" src="assets/sfx/cinematic-whoosh.mp3"
         data-start="47.30" data-duration="1.5" data-track-index="3" data-volume="0.11"></audio>

  <!-- Hero punctuation SFX — track 4. Sparse: hook slam, thesis stamp,
       SKIM/OPEN punchline, watch-pill landing. -->
  <audio id="sfx-hero-1" class="clip" src="assets/sfx/impact-slam.mp3"
         data-start="0.05"  data-duration="0.7" data-track-index="4" data-volume="0.13"></audio>
  <audio id="sfx-hero-2" class="clip" src="assets/sfx/scale-slam.mp3"
         data-start="2.97"  data-duration="0.6" data-track-index="4" data-volume="0.12"></audio>
  <audio id="sfx-hero-3" class="clip" src="assets/sfx/strike-cross.mp3"
         data-start="1.15"  data-duration="0.5" data-track-index="4" data-volume="0.10"></audio>
  <audio id="sfx-hero-4" class="clip" src="assets/sfx/impact-slam.mp3"
         data-start="19.13" data-duration="0.7" data-track-index="4" data-volume="0.13"></audio>
  <audio id="sfx-hero-5" class="clip" src="assets/sfx/scale-slam.mp3"
         data-start="46.54" data-duration="0.6" data-track-index="4" data-volume="0.13"></audio>
  <audio id="sfx-hero-6" class="clip" src="assets/sfx/spring-pop.mp3"
         data-start="52.48" data-duration="0.5" data-track-index="4" data-volume="0.11"></audio>

  <!-- Persistent full-video pointer — bottom-right. Visible whole video. -->
  <div id="source-url">
    <span class="source-url-label">Full video</span>
    <span class="source-url-text">youtu.be/-iSLQe_imrE</span>
  </div>

  <!-- Paper-grain overlay — last child so it tints everything below. -->
  <svg id="grain-overlay" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <filter id="grain-filter" x="0%" y="0%" width="100%" height="100%">
        <feTurbulence type="fractalNoise" baseFrequency="0.85" numOctaves="3" seed="11" stitchTiles="stitch" result="noise" />
        <feColorMatrix type="saturate" values="0" in="noise" result="monoNoise" />
      </filter>
    </defs>
    <rect width="100%" height="100%" filter="url(#grain-filter)" fill="#2B2A28" />
  </svg>
</div>

<style>
  /* Source URL chip CSS lives in the host so it sits above scenes. */
  #source-url {
    position: absolute;
    bottom: 24px;
    right: 24px;
    z-index: 10;
    pointer-events: none;
    display: inline-flex;
    align-items: center;
    gap: 10px;
    padding: 8px 14px;
    background: rgba(28, 26, 24, 0.06);
    border: 1px solid rgba(28, 26, 24, 0.20);
    border-radius: 8px;
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
    opacity: 0;
    font-family: var(--mono);
  }
  #source-url .source-url-label {
    font-weight: 700;
    font-size: 14px;
    letter-spacing: 4px;
    color: var(--accent-2);
    text-transform: uppercase;
  }
  #source-url .source-url-text {
    font-weight: 600;
    font-size: 18px;
    color: var(--text-secondary);
  }
</style>

<script>
  // ─────────────────────────────────────────────────────
  // Shape backdrop — deterministic seeded scatter (14 shapes).
  // ─────────────────────────────────────────────────────
  function seedHash(seed) {
    let h = 1779033703 ^ seed.length;
    for (let i = 0; i < seed.length; i++) {
      h = Math.imul(h ^ seed.charCodeAt(i), 3432918353);
      h = (h << 13) | (h >>> 19);
    }
    h = Math.imul(h ^ (h >>> 16), 2246822507);
    h = Math.imul(h ^ (h >>> 13), 3266489909);
    h ^= h >>> 16;
    return (h >>> 0) / 4294967296;
  }

  function spawnShapes(seedPrefix, container) {
    const shapes = ['assets/shapes/shape1.svg', 'assets/shapes/shape2.svg', 'assets/shapes/shape3.svg'];
    const count = 14, w = 1080, h = 1920, minSize = 200, sizeRange = 220;
    const minDist = 360, MAX_TRIES = 80;
    const placed = [];
    let attempt = 0;
    for (let i = 0; i < count; i++) {
      let best = null, bestScore = -1;
      for (let t = 0; t < MAX_TRIES; t++) {
        const seed = seedPrefix + '-' + i + '-' + attempt++;
        const size = minSize + seedHash(seed + '-size') * sizeRange;
        const cx = seedHash(seed + '-x') * (w - size * 0.4) + size * 0.2;
        const cy = seedHash(seed + '-y') * (h - size * 0.4) + size * 0.2;
        const rot = (seedHash(seed + '-rot') - 0.5) * 90;
        let nearest = Infinity;
        for (const p of placed) {
          const dx = cx - p.cx, dy = cy - p.cy;
          const d2 = dx * dx + dy * dy;
          if (d2 < nearest) nearest = d2;
        }
        if (nearest >= minDist * minDist) { best = { cx, cy, size, rot }; break; }
        if (nearest > bestScore) { bestScore = nearest; best = { cx, cy, size, rot }; }
      }
      placed.push(best);
      const img = document.createElement('img');
      img.src = shapes[i % shapes.length];
      img.style.cssText =
        'left:' + (best.cx - best.size / 2) + 'px;' +
        'top:' + (best.cy - best.size / 2) + 'px;' +
        'width:' + best.size + 'px;' +
        'height:' + best.size + 'px;';
      container.appendChild(img);
      gsap.set(img, { rotation: best.rot });
    }
  }

  // Reposition shapes at each scene boundary — paired with the cinematic
  // whoosh SFX on track 3.
  function repositionShapesPerScene(tl, container, seedPrefix, sceneStartTimes) {
    const imgs = Array.from(container.querySelectorAll('img'));
    if (!imgs.length || !sceneStartTimes.length) return;
    const w = 1080, h = 1920, minDist = 360, MAX_TRIES = 80;
    const anchors = imgs.map(img => ({
      left: parseFloat(img.style.left),
      top:  parseFloat(img.style.top),
      size: parseFloat(img.style.width),
    }));
    sceneStartTimes.forEach((sceneT, sceneIdx) => {
      const placed = [];
      let attempt = 0;
      const positions = imgs.map((img, i) => {
        const size = anchors[i].size;
        let best = null, bestScore = -1;
        for (let t = 0; t < MAX_TRIES; t++) {
          const seed = seedPrefix + '-scene' + sceneIdx + '-' + i + '-' + (attempt++);
          const cx = seedHash(seed + '-x') * (w - size * 0.4) + size * 0.2;
          const cy = seedHash(seed + '-y') * (h - size * 0.4) + size * 0.2;
          const rot = (seedHash(seed + '-rot') - 0.5) * 90;
          let nearest = Infinity;
          for (const p of placed) {
            const dx = cx - p.cx, dy = cy - p.cy;
            const d2 = dx * dx + dy * dy;
            if (d2 < nearest) nearest = d2;
          }
          if (nearest >= minDist * minDist) { best = { cx, cy, rot }; break; }
          if (nearest > bestScore) { bestScore = nearest; best = { cx, cy, rot }; }
        }
        placed.push({ cx: best.cx, cy: best.cy });
        return {
          x: (best.cx - size / 2) - anchors[i].left,
          y: (best.cy - size / 2) - anchors[i].top,
          rot: best.rot,
        };
      });
      tl.to(imgs, {
        x: (i) => positions[i].x,
        y: (i) => positions[i].y,
        rotation: (i) => positions[i].rot,
        duration: 1.0,
        ease: 'power2.inOut',
      }, sceneT - 0.4);
    });
  }

  // Crossfade two scene wrappers at the root timeline level.
  function crossfadeScenes(tl, fromSel, toSel, atTime) {
    tl.to(fromSel, { filter: "blur(20px)", scale: 1.04, duration: 0.5, ease: "power1.in" }, atTime);
    tl.to(fromSel, { opacity: 0, duration: 0.4, ease: "power1.in" }, atTime + 0.3);
    tl.set(fromSel, { visibility: "hidden" }, atTime + 0.7);
    tl.set(toSel,   { filter: "blur(20px)", scale: 0.97, opacity: 0, visibility: "visible" }, atTime + 0.4);
    tl.to(toSel,    { opacity: 1, duration: 0.3, ease: "power1.inOut", overwrite: "auto" }, atTime + 0.4);
    tl.to(toSel,    { filter: "blur(0px)", scale: 1, duration: 0.5, ease: "power1.out", overwrite: "auto" }, atTime + 0.6);
  }

  // ─────────────────────────────────────────────────────
  // Root timeline construction
  // ─────────────────────────────────────────────────────
  spawnShapes('html-vs-md-short', document.getElementById('shape-backdrop'));

  window.__timelines = window.__timelines || {};
  const TOTAL_DURATION = 57.5;
  const tl = gsap.timeline({ paused: true });

  // Subtle ambient breath
  tl.fromTo("#ambient",
    { opacity: 0.85, scale: 1.0 },
    { opacity: 1.0, scale: 1.04, duration: TOTAL_DURATION / 4, ease: "sine.inOut", yoyo: true, repeat: 3 },
    0);

  // Reposition shapes at each scene change
  repositionShapesPerScene(
    tl,
    document.getElementById('shape-backdrop'),
    'html-vs-md-short',
    [4.40, 12.70, 21.00, 36.40, 41.80, 47.70]
  );

  // Linear progress fill
  tl.fromTo("#progress-fill",
    { width: 0 },
    { width: 1080, duration: TOTAL_DURATION, ease: "none" },
    0);

  // Top banner one-shot
  tl.from("#top-banner", { y: -16, opacity: 0, duration: 0.6, ease: "power2.out" }, 0.2);

  // Source URL fade-in
  tl.to("#source-url", { opacity: 1, duration: 0.6, ease: "power2.out" }, 0.6);

  // Crossfades — numeric absolute times (scene_start - 0.4)
  crossfadeScenes(tl, "#scene-title-wrap",      "#scene-stat-wrap",        4.00);
  crossfadeScenes(tl, "#scene-stat-wrap",       "#scene-quote-wrap",      12.30);
  crossfadeScenes(tl, "#scene-quote-wrap",      "#scene-bullets-wrap",    20.60);
  crossfadeScenes(tl, "#scene-bullets-wrap",    "#scene-typewriter-wrap", 36.00);
  crossfadeScenes(tl, "#scene-typewriter-wrap", "#scene-compare-wrap",    41.40);
  crossfadeScenes(tl, "#scene-compare-wrap",    "#scene-cta-wrap",        47.30);

  // Pad the timeline to the full composition duration
  tl.to({}, { duration: 0.01 }, TOTAL_DURATION - 0.01);

  window.__timelines["main"] = tl;
</script>
</body>
</html>
