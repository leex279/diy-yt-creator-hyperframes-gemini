<!--
  scene-side-by-side.html — A vs B comparison.

  Two LiquidGlassCard-style panels, max-width 720px each, centered with a
  40px gap. Card A uses accent-1 (blue); card B uses accent-3 (purple).
  Cards enter from opposite sides simultaneously (back.out(1.4)).

  Above the row: overline + headline. Each card holds a title, a body
  paragraph, and an optional huge stat at the bottom.
-->
<template id="scene-side-by-side-template">
  <div data-composition-id="scene-side-by-side"
       data-start="0"
       data-width="1920"
       data-height="1080"
       style="position:absolute; inset:0; overflow:hidden;
              font-family:var(--sans); color:var(--text);">

    <style>
      #scene-side-by-side-content {
        width:100%; height:100%;
        padding: var(--pad-top) var(--pad-x) var(--pad-bottom);
        display:flex; flex-direction:column;
        align-items:center; justify-content:center;
        gap:48px;
        box-sizing:border-box;
      }
      #scene-side-by-side-content .header-block {
        display:flex; flex-direction:column;
        align-items:center; gap:16px;
        text-align:center;
      }
      #scene-side-by-side-content .overline {
        font-family: var(--mono);
        font-weight: 700;
        font-size: 28px;
        letter-spacing: 6px;
        text-transform: uppercase;
        color: var(--accent-2);
      }
      #scene-side-by-side-content .headline {
        font-family: var(--sans);
        font-weight: 800;
        font-size: 56px;
        line-height: 1.05;
        letter-spacing: -1px;
        color: var(--text);
      }
      #scene-side-by-side-content .row {
        display:flex; flex-direction:row;
        align-items:stretch; justify-content:center;
        gap: 40px;
      }
      .sbs-card {
        width: 720px;
        padding: 36px 40px;
        border-radius: 24px;
        border: 1.5px solid var(--border-bright);
        box-shadow: 0 24px 60px rgba(0, 0, 0, 0.55);
        display:flex; flex-direction:column;
        gap: 18px;
      }
      .sbs-card.a {
        background: linear-gradient(135deg,
                      rgba(59, 130, 246, 0.18) 0%,
                      rgba(59, 130, 246, 0.04) 100%);
        border-color: rgba(59, 130, 246, 0.55);
      }
      .sbs-card.b {
        background: linear-gradient(135deg,
                      rgba(139, 92, 246, 0.18) 0%,
                      rgba(139, 92, 246, 0.04) 100%);
        border-color: rgba(139, 92, 246, 0.55);
      }
      .sbs-card .label {
        font-family: var(--mono);
        font-weight: 700;
        font-size: 22px;
        letter-spacing: 4px;
        text-transform: uppercase;
      }
      .sbs-card.a .label { color: var(--accent-1); }
      .sbs-card.b .label { color: var(--accent-3); }
      .sbs-card .title {
        font-family: var(--sans);
        font-weight: 800;
        font-size: 32px;
        line-height: 1.15;
        letter-spacing: -0.5px;
        color: var(--text);
      }
      .sbs-card .body {
        font-family: var(--sans);
        font-weight: 500;
        font-size: 22px;
        line-height: 1.4;
        color: var(--text-secondary);
      }
      .sbs-card .stat {
        font-family: var(--sans);
        font-weight: 900;
        font-size: 84px;
        line-height: 1;
        letter-spacing: -3px;
        font-variant-numeric: tabular-nums lining-nums;
        margin-top: 8px;
      }
      .sbs-card.a .stat { color: var(--accent-1); }
      .sbs-card.b .stat { color: var(--accent-3); }
    </style>

    <div id="scene-side-by-side-content">
      <div class="header-block">
        <div class="overline" id="sbs-overline">CONTEXT &middot; QUADRANT 01</div>
        <div class="headline" id="sbs-headline">How the agent reaches the world</div>
      </div>

      <div class="row">
        <div class="sbs-card a" id="sbs-card-a">
          <div class="label">MCP</div>
          <div class="title">Model Context Protocol</div>
          <div class="body">USB-C for AI. Open standard, JSON-RPC 2.0. Anthropic released it on Nov 25, 2024. 10,000+ servers by early 2026.</div>
          <div class="stat">10K+</div>
        </div>
        <div class="sbs-card b" id="sbs-card-b">
          <div class="label">Tool Use</div>
          <div class="title">Schema-validated function call</div>
          <div class="body">OpenAI shipped function calling Jun 13, 2023. Model returns a typed call. You execute, feed result back. Memory persists across sessions.</div>
          <div class="stat">2023</div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({
        paused: true,
        defaults: { ease: "power3.out", duration: 0.6 }
      });

      tl.from("#sbs-overline", { y: 20, opacity: 0, duration: 0.5, ease: "power2.out", immediateRender: false }, 0);
      tl.from("#sbs-headline", { y: 30, opacity: 0, duration: 0.6, ease: "power3.out", immediateRender: false }, 0.3);
      tl.from("#sbs-card-a",   { x: -80, opacity: 0, duration: 0.6, ease: "back.out(1.4)", immediateRender: false }, 0.7);
      tl.from("#sbs-card-b",   { x:  80, opacity: 0, duration: 0.6, ease: "back.out(1.4)", immediateRender: false }, 0.7);

      window.__timelines["scene-side-by-side"] = tl;
    </script>
  </div>
</template>
