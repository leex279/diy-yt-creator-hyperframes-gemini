<!--
  scene-headline-accent.html — Two-line headline with Dynamous-Blue underline sweep.

  Signature move: a <span class="accent-text"> on the keyword you want
  underlined. The underline animates background-size 0% → 100% during the
  scene, so the keyword pops on its own beat.
-->
<template id="scene-headline-accent-template">
  <div data-composition-id="scene-headline-accent"
       data-start="0"
       data-width="1920"
       data-height="1080"
       style="position:absolute; inset:0; overflow:hidden;
              font-family:var(--font-display); color:var(--ink);">

    <style>
      #headline-accent-content {
        width:100%; height:100%;
        padding: var(--pad-top) var(--pad-x) var(--pad-bottom);
        display:flex; flex-direction:column;
        align-items:flex-start; justify-content:center;
        gap: 36px;
        box-sizing:border-box;
      }
      #headline-accent-content .eyebrow {
        font-family: var(--font-data);
        font-size: 22px;
        font-weight: 500;
        letter-spacing: 0.32em;
        text-transform: uppercase;
        color: var(--accent-2);
        display: inline-flex; align-items: center; gap: 18px;
      }
      #headline-accent-content .eyebrow::before {
        content: ""; display: inline-block;
        width: 56px; height: 2px;
        background: var(--accent-2);
      }
      #headline-accent-content .headline {
        font-family: var(--font-display);
        font-weight: 800;
        font-size: 118px;
        line-height: 1.22;
        letter-spacing: -0.025em;
        color: var(--ink);
        max-width: 1640px;
      }
      #headline-accent-content .headline .light {
        font-weight: 300;
        color: var(--ink-2);
      }
      #headline-accent-content .accent-text {
        background-image: linear-gradient(var(--accent), var(--accent));
        background-repeat: no-repeat;
        background-position: 0 92%;
        background-size: 0% 28%;
        padding: 0 8px 0 0;
        display: inline-block;
      }
      #headline-accent-content .sub {
        font-family: var(--font-display);
        font-weight: 300;
        font-size: 38px;
        line-height: 1.35;
        color: var(--ink-2);
        max-width: 1300px;
      }
      #ha-side {
        position: absolute;
        top: 50%; right: 130px;
        transform: translateY(-50%);
        width: 280px; height: 280px;
        border: 1px solid rgba(255,255,255,0.10);
        border-radius: 14px;
        background:
          linear-gradient(45deg, transparent 48%, rgba(59,130,246,0.22) 50%, transparent 52%) center / 60px 60px,
          rgba(255,255,255,0.02);
        opacity: 0;
      }
    </style>

    <div id="headline-accent-content">
      <div class="eyebrow" id="ha-eyebrow">REPLACE: KICKER</div>

      <h1 class="headline" id="ha-headline">
        <span class="light">REPLACE first half</span><br/><span class="accent-text" id="ha-accent">replace keyword.</span>
      </h1>

      <p class="sub" id="ha-sub">
        REPLACE: a one-or-two-sentence subline that elaborates the headline.
      </p>

      <div id="ha-side"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({ paused: true });

      tl.set("#ha-eyebrow",  { y: 24, autoAlpha: 0 }, 0);
      tl.set("#ha-headline", { y: 60, autoAlpha: 0 }, 0);
      tl.set("#ha-sub",      { y: 24, autoAlpha: 0 }, 0);
      tl.set("#ha-side",     { rotate: -8, autoAlpha: 0 }, 0);
      tl.set("#ha-accent",   { backgroundSize: "0% 28%" }, 0);

      tl.to("#ha-eyebrow",  { y: 0, autoAlpha: 1, duration: 0.5, ease: "power2.out" }, 0.2);
      tl.to("#ha-headline", { y: 0, autoAlpha: 1, duration: 0.75, ease: "power3.out" }, 0.45);
      tl.to("#ha-side",     { rotate: 0, autoAlpha: 1, duration: 0.7, ease: "expo.out" }, 0.6);
      tl.to("#ha-sub",      { y: 0, autoAlpha: 1, duration: 0.55, ease: "power2.out" }, 1.0);

      // Underline sweep on the accent word — paced for the moment narrator says it
      tl.to("#ha-accent",   { backgroundSize: "100% 28%", duration: 0.7, ease: "power2.out" }, 1.6);

      // Mid-hold beats — keep visual surface alive
      tl.to("#ha-side", { rotate: 4, duration: 3.2, ease: "sine.inOut", yoyo: true, repeat: 1 }, 3.0);
      tl.to("#ha-headline", { scale: 1.02, duration: 2.5, ease: "sine.inOut", yoyo: true, repeat: 1 }, 4.5);

      window.__timelines["scene-headline-accent"] = tl;
    </script>
  </div>
</template>
