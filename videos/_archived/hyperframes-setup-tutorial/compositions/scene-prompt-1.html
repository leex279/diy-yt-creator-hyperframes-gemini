<!--
  scene-prompt-1.html — chat-bubble UI for the first user prompt to the agent.
  Pattern: tl.set() at t=0 + tl.to() animations.
-->
<template id="scene-prompt-1-template">
  <div data-composition-id="scene-prompt-1"
       data-start="0"
       data-width="1920"
       data-height="1080"
       style="position:absolute; inset:0; overflow:hidden;
              font-family:var(--sans); color:var(--text);">

    <style>
      #p1-content {
        width:100%; height:100%;
        padding: 80px var(--pad-x) 80px;
        display:flex; flex-direction:column;
        align-items:center; justify-content:center;
        gap: 26px; box-sizing:border-box;
      }
      #p1-content .header-block {
        display:flex; flex-direction:column;
        align-items:center; gap:10px; text-align:center;
      }
      #p1-content .overline {
        font-family: var(--mono); font-weight: 700;
        font-size: 24px; letter-spacing: 6px;
        text-transform: uppercase; color: var(--accent-warn);
      }
      #p1-content .headline {
        font-family: var(--sans); font-weight: 800;
        font-size: 48px; line-height: 1.05;
        letter-spacing: -1px; color: var(--text);
      }
      .chat-stack {
        width: 1300px;
        display:flex; flex-direction:column;
        gap: 22px;
      }
      .bubble {
        max-width: 1100px;
        padding: 22px 28px;
        border-radius: 22px;
        font-family: var(--sans); font-weight: 500;
        font-size: 26px; line-height: 1.45;
        box-shadow: 0 16px 36px rgba(0,0,0,.45);
      }
      .bubble.user {
        align-self: flex-end;
        background: linear-gradient(135deg, rgba(59,130,246,.20), rgba(59,130,246,.08));
        border: 1px solid rgba(59,130,246,.55);
        color: var(--text);
      }
      .bubble.user .who {
        font-family: var(--mono); font-weight: 700;
        font-size: 14px; letter-spacing: 2px;
        text-transform: uppercase;
        color: #88b5ff;
        display:block; margin-bottom: 6px;
      }
      .bubble.user .skill-tag {
        font-family: var(--mono); font-weight: 700;
        font-size: 22px;
        color: #5ee5cf;
        background: rgba(94,229,207,.12);
        padding: 2px 8px; border-radius: 5px;
      }
      .bubble.agent {
        align-self: flex-start;
        background: linear-gradient(135deg, rgba(249,115,22,.15), rgba(249,115,22,.04));
        border: 1px solid rgba(249,115,22,.45);
        color: var(--text);
      }
      .bubble.agent .who {
        font-family: var(--mono); font-weight: 700;
        font-size: 14px; letter-spacing: 2px;
        text-transform: uppercase;
        color: var(--accent-warn);
        display:block; margin-bottom: 6px;
      }
      .bubble.agent .file-line {
        display:flex; align-items:center; gap: 12px;
        margin-top: 10px;
        padding: 10px 14px;
        background: rgba(0,0,0,.45);
        border-radius: 8px;
        font-family: var(--mono); font-weight: 600;
        font-size: 18px;
      }
      .bubble.agent .file-line .icon {
        color: var(--accent-4);
        font-weight: 800;
      }
      .bubble.agent .file-line .file {
        color: var(--accent-stat);
      }
      .bubble.agent .file-line .stat {
        color: var(--text-secondary);
        font-size: 16px;
      }
    </style>

    <div id="p1-content">
      <div class="header-block">
        <div class="overline" id="p1-overline">PROMPT THE AGENT &middot; STEP 8</div>
        <div class="headline" id="p1-headline">Describe what you want — the agent writes the code</div>
      </div>

      <div class="chat-stack">
        <div class="bubble user" id="p1-user">
          <span class="who">You</span>
          Using <span class="skill-tag">/hyperframes</span>, create a 5-second intro that says
          <b>"Hello HyperFrames"</b> with a fade-in.
        </div>
        <div class="bubble agent" id="p1-agent">
          <span class="who">Claude</span>
          I'll edit <b>index.html</b> &mdash; centered title, GSAP fade-in, 5-second duration.
          <div class="file-line">
            <span class="icon">✎</span>
            <span class="file">index.html</span>
            <span class="stat">+18 lines</span>
          </div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({ paused: true, defaults: { ease: "power3.out" } });

      tl.set("#p1-overline", { y: 22, opacity: 0 }, 0);
      tl.set("#p1-headline", { y: 32, opacity: 0 }, 0);
      tl.set("#p1-user",     { x: 60, scale: 0.95, opacity: 0 }, 0);
      tl.set("#p1-agent",    { x: -60, scale: 0.95, opacity: 0 }, 0);

      // Narration anchors:
      //   "Tell it what you want."                                +0.30
      //   "Using slash hyperframes, create a five-second intro…"  +1.50
      //   "The agent reads the skill, then edits index dot html"  +7.79
      tl.to("#p1-overline", { y: 0, opacity: 1, duration: 0.4, ease: "power2.out" }, 0);
      tl.to("#p1-headline", { y: 0, opacity: 1, duration: 0.5 }, 0.25);
      tl.to("#p1-user",     { x: 0, scale: 1, opacity: 1, duration: 0.55, ease: "back.out(1.4)" }, 1.45);
      tl.to("#p1-agent",    { x: 0, scale: 1, opacity: 1, duration: 0.55, ease: "back.out(1.4)" }, 7.75);

      window.__timelines["scene-prompt-1"] = tl;
    </script>
  </div>
</template>
