<!--
  shared/lib/blocks/url-cta/block.html
  Closing CTA: green-glow URL slam pill + rounded "Subscribe" pill
  with an orange arrow accent.

  SOURCE: templates/shorts/anthropic/index.html:336-378 (CSS),
          templates/shorts/anthropic/index.html:469-474 (HTML),
          templates/shorts/anthropic/index.html:568-571 (entrances).

  REQUIRED TOKENS:
    --bg, --text, --orange, --green, --sans, --mono,
    --pill-bg, --pill-border,
    --pad-top, --pad-x, --pad-bottom

  See ./recipe.md for wiring instructions.
-->
<template id="url-cta-template">
  <div data-composition-id="url-cta" data-start="0" data-duration="6" data-width="1080" data-height="1920">

    <div class="phase-content">
      <div class="overline" id="uc-overline">Read the full story</div>
      <div class="url" id="uc-url">example.com/path</div>
      <div class="subscribe" id="uc-subscribe">Subscribe<span class="arrow">→</span></div>
    </div>

    <style>
      [data-composition-id="url-cta"] {
        position: relative;
        width: 1080px;
        height: 1920px;
        background: var(--bg, #0B0F18);
        color: var(--text, #F5F1EB);
      }
      [data-composition-id="url-cta"] .phase-content {
        width: 100%;
        height: 100%;
        padding: var(--pad-top, 240px) var(--pad-x, 60px) var(--pad-bottom, 240px);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 36px;
        box-sizing: border-box;
        text-align: center;
      }
      [data-composition-id="url-cta"] .overline {
        font-family: var(--mono, 'JetBrains Mono', ui-monospace, monospace);
        font-weight: 700;
        font-size: 36px;
        letter-spacing: 6px;
        text-transform: uppercase;
        color: var(--green, #7DD3A6);
      }
      [data-composition-id="url-cta"] .url {
        font-family: var(--mono, 'JetBrains Mono', ui-monospace, monospace);
        font-weight: 700;
        font-size: 64px;
        letter-spacing: 2px;
        color: var(--text, #F5F1EB);
        line-height: 1.0;
        padding: 22px 36px;
        border-radius: 24px;
        background: linear-gradient(135deg, rgba(125,211,166,0.18), rgba(125,211,166,0.05));
        border: 2px solid rgba(125,211,166,0.40);
        box-shadow: 0 14px 36px rgba(125,211,166,0.25);
        max-width: 920px;
      }
      [data-composition-id="url-cta"] .subscribe {
        display: inline-flex;
        align-items: center;
        gap: 16px;
        padding: 18px 36px;
        border-radius: 999px;
        background: var(--pill-bg, rgba(245, 241, 235, 0.08));
        border: 1.5px solid var(--pill-border, rgba(245, 241, 235, 0.18));
        font-family: var(--sans, 'Inter', system-ui, sans-serif);
        font-weight: 700;
        font-size: 38px;
        color: var(--text, #F5F1EB);
        letter-spacing: 0.5px;
      }
      [data-composition-id="url-cta"] .subscribe .arrow {
        color: var(--orange, #E97458);
        font-family: var(--sans, 'Inter', system-ui, sans-serif);
        font-weight: 400;
        font-size: 48px;
        line-height: 0.7;
      }
    </style>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      window.__timelines = window.__timelines || {};
      (function () {
        var tl = gsap.timeline({ paused: true });
        tl.from("#uc-overline",  { y: 20, opacity: 0, duration: 0.5, ease: "power2.out" }, 0.0);
        tl.from("#uc-url",       { scale: 0.85, opacity: 0, duration: 0.7, ease: "expo.out" }, 0.5);
        tl.from("#uc-subscribe", { y: 24, opacity: 0, duration: 0.5, ease: "power2.out" }, 1.6);
        window.__timelines["url-cta"] = tl;
      })();
    </script>

  </div>
</template>
