<div id="dynamous-module-interstitial" data-composition-id="dynamous-module-interstitial" data-start="0" data-duration="3" data-width="1080" data-height="1920">

  <div class="dmi-card">
    <div class="dmi-row">
      <div class="dmi-dot" id="dmi-dot"></div>
      <div class="dmi-meta">
        <div class="dmi-eyebrow">MODULE <span id="dmi-module-num">10</span></div>
        <div class="dmi-title" id="dmi-module-title">MCP Servers + Skills</div>
      </div>
    </div>
    <div class="dmi-tagline">Part of Dynamous AI Mastery</div>
  </div>

  <style>
    /* Class-only selectors so the rules survive any scope-renaming the
       framework applies to sub-composition root IDs. The wrapping
       composition root provides a 1080x1920 box; the .dmi-card lives
       absolutely inside it. */
    .dmi-card {
      position: absolute;
      top: 240px;
      right: 60px;
      width: 540px;
      box-sizing: border-box;
      padding: 22px 26px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      background: rgba(15, 23, 42, 0.85);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 18px;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      box-shadow: 0 12px 36px rgba(0, 0, 0, 0.5);
      will-change: transform, opacity;
      font-family: 'Inter', system-ui, sans-serif;
      pointer-events: none;
    }
    .dmi-row {
      display: flex;
      align-items: center;
      gap: 16px;
    }
    .dmi-dot {
      width: 16px;
      height: 16px;
      border-radius: 999px;
      background: #ec4899;
      box-shadow: 0 0 12px currentColor;
      flex-shrink: 0;
    }
    .dmi-meta {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .dmi-eyebrow {
      font-family: 'JetBrains Mono', ui-monospace, monospace;
      font-weight: 700;
      font-size: 18px;
      letter-spacing: 4px;
      color: #94a3b8;
    }
    .dmi-title {
      font-size: 30px;
      font-weight: 800;
      color: #ffffff;
      letter-spacing: 0.2px;
      line-height: 1.1;
    }
    .dmi-tagline {
      font-size: 18px;
      font-weight: 600;
      color: #94a3b8;
      letter-spacing: 0.2px;
    }
  </style>

  <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
  <script>
    window.__timelines = window.__timelines || {};
    (function () {
      var dyn = ((window.VIDEO_CONFIG || {}).dynamous) || {};
      var dot   = document.getElementById('dmi-dot');
      var num   = document.getElementById('dmi-module-num');
      var title = document.getElementById('dmi-module-title');
      if (dot   && dyn.moduleAccentColor) dot.style.background = dyn.moduleAccentColor;
      if (num   && dyn.moduleId)          num.textContent       = dyn.moduleId;
      if (title && dyn.moduleName)        title.textContent     = dyn.moduleName;

      var tl = gsap.timeline({ paused: true });
      tl.from('.dmi-card', { x: 620, opacity: 0, duration: 0.6, ease: 'power3.out' }, 0);
      tl.to(  '.dmi-card', { x: 620, opacity: 0, duration: 0.6, ease: 'power3.in'  }, 2.4);

      window.__timelines['dynamous-module-interstitial'] = tl;
    })();
  </script>

</div>
