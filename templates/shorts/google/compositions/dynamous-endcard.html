    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      window.__timelines = window.__timelines || {};
      (function () {
        var tl = gsap.timeline({ paused: true });

        // Werbung disclosure badge (German ad-disclosure compliance) —
        // fades in early so it's present before any CTA reveal.
        tl.to('.dec-werbung',
          { opacity: 1, duration: 0.4, ease: "power2.out" }, 0.1);

        // Phase 1 — card scale-in 0–0.4s (midroll cardSpring analogue)
        tl.from('.dec-card',
          { scale: 0.9, opacity: 0, duration: 0.4, ease: "back.out(1.2)" }, 0);

        // Phase 2 — content stagger entry 0.4–1.6s
        tl.from('.dec-wordmark',
          { y: 20, opacity: 0, duration: 0.5, ease: "power2.out" }, 0.4);
        tl.from('.dec-headline',
          { y: 20, opacity: 0, duration: 0.5, ease: "power2.out" }, 0.55);
        // Offerings list stagger — each item slides in 0.08s after the previous
        tl.from('.dec-offerings li',
          { x: -24, opacity: 0, duration: 0.45, ease: "power2.out", stagger: 0.08 }, 0.7);
        tl.from('.dec-button',
          { scale: 0.9, opacity: 0, duration: 0.5, ease: "back.out(1.6)" }, 1.15);
        tl.from('.dec-discount',
          { scale: 0.5, opacity: 0, duration: 0.5, ease: "back.out(1.8)" }, 1.30);
        tl.from('.dec-url',
          { y: 10, opacity: 0, duration: 0.4, ease: "power2.out" }, 1.45);

        // Hold 1.85–4.5s with a subtle gradient shimmer on the CTA button.
        tl.to('.dec-button',
          { backgroundPosition: "200% 0%", duration: 3.35, ease: "none" }, 1.15);

        // Phase 3 — fade to black 4.5–5.0s (clean cut at composition end)
        tl.to('.dec-blackout',
          { opacity: 1, duration: 0.5, ease: "power2.in" }, 4.5);

        window.__timelines["dynamous-endcard"] = tl;
      })();
    </script>
