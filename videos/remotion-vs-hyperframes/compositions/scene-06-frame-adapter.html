<template id="scene-06-frame-adapter-template">
  <div data-composition-id="scene-06-frame-adapter"
       data-start="0"
       data-width="1920"
       data-height="1080"
       style="position:absolute; inset:0; overflow:hidden;
              font-family:var(--sans); color:var(--ink);">

    <style>
      #s06-eyebrow {
        position:absolute; left: 96px; top: 130px;
        font-family: var(--mono); font-size: 22px; letter-spacing: .22em;
        text-transform: uppercase; color: var(--ink-3);
      }
      #s06-eyebrow .dot { display:inline-block; width:8px; height:8px; border-radius:50%; background: var(--accent); margin-right: 14px; }
      #s06-h2 {
        position:absolute; left: 96px; right: 96px; top: 168px;
        font-family: var(--serif);
        font-weight: 500;
        font-size: 72px;
        letter-spacing: -.025em;
      }
      #s06-h2 em { color: var(--ink-3); font-style: italic; }

      #s06-arch { position:absolute; left: 96px; right: 96px; top: 380px; bottom: 220px; }

      .s06-node {
        position:absolute;
        background: rgba(255,255,255,.04);
        border: 1px solid var(--rule-2);
        border-radius: 14px;
        padding: 22px 24px;
        width: 220px;
        text-align: center;
      }
      .s06-node .nm { font-family: var(--sans); font-size: 24px; font-weight: 600; letter-spacing: -.015em; line-height: 1.15; }
      .s06-node .sub { font-family: var(--mono); font-size: 13px; letter-spacing: .14em; text-transform: uppercase; color: var(--ink-3); margin-top: 6px; }
      .s06-node.glow-h { border-color: rgba(255,77,26,.6); box-shadow: 0 0 36px rgba(255,77,26,.20); }
      .s06-node.glow-y { border-color: rgba(196,255,62,.5); box-shadow: 0 0 36px rgba(196,255,62,.18); }

      #s06-citation {
        position:absolute; left: 96px; right: 96px; bottom: 90px;
        text-align: center;
        font-family: var(--mono); font-size: 18px;
        letter-spacing: .14em; text-transform: uppercase;
        color: var(--ink-3);
      }
      #s06-citation .src { color: var(--accent); }
    </style>

    <div id="s06-eyebrow"><span class="dot"></span>HOW HYPERFRAMES HIJACKS THE BROWSER</div>
    <h2 id="s06-h2">Pause time. Step the frame. <em>Capture pixels.</em></h2>

    <div id="s06-arch">
      <div class="s06-node glow-h" id="s06-n1" style="left: 0;     top: 60px;"><div class="nm">HTML</div><div class="sub">composition.html</div></div>
      <div class="s06-node"        id="s06-n2" style="left: 290px; top: 60px;"><div class="nm">Headless<br/>Chromium</div><div class="sub">puppeteer · isolated</div></div>
      <div class="s06-node glow-y" id="s06-n3" style="left: 580px; top: 60px;"><div class="nm">Frame Adapter</div><div class="sub">hijack compositor</div></div>
      <div class="s06-node"        id="s06-n4" style="left: 870px; top: 60px;"><div class="nm">Pixel Buffer</div><div class="sub">N frames</div></div>
      <div class="s06-node glow-h" id="s06-n5" style="left: 1160px; top: 60px;"><div class="nm">FFmpeg</div><div class="sub">stream encode</div></div>
      <div class="s06-node"        id="s06-n6" style="left: 1450px; top: 60px;"><div class="nm">out.mp4</div><div class="sub">pixel-perfect</div></div>

      <svg style="position:absolute; inset:0; pointer-events:none;" viewBox="0 0 1728 320" preserveAspectRatio="none">
        <defs>
          <marker id="s06-arrow-h" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
            <path d="M0,0 L10,5 L0,10 z" fill="#ff4d1a" />
          </marker>
        </defs>
        <path id="s06-conn-1" d="M220,114 L290,114" stroke="#ff4d1a" stroke-width="2" fill="none" marker-end="url(#s06-arrow-h)" stroke-dasharray="200" stroke-dashoffset="200" />
        <path id="s06-conn-2" d="M510,114 L580,114" stroke="#ff4d1a" stroke-width="2" fill="none" marker-end="url(#s06-arrow-h)" stroke-dasharray="200" stroke-dashoffset="200" />
        <path id="s06-conn-3" d="M800,114 L870,114" stroke="#c4ff3e" stroke-width="2" fill="none" marker-end="url(#s06-arrow-h)" stroke-dasharray="200" stroke-dashoffset="200" />
        <path id="s06-conn-4" d="M1090,114 L1160,114" stroke="#c4ff3e" stroke-width="2" fill="none" marker-end="url(#s06-arrow-h)" stroke-dasharray="200" stroke-dashoffset="200" />
        <path id="s06-conn-5" d="M1380,114 L1450,114" stroke="#ff4d1a" stroke-width="2" fill="none" marker-end="url(#s06-arrow-h)" stroke-dasharray="200" stroke-dashoffset="200" />

        <!-- Data packets flowing through the pipeline (continuous after assembly) -->
        <circle id="s06-pkt-1" cx="220" cy="114" r="0" fill="#ff4d1a" opacity="0" />
        <circle id="s06-pkt-2" cx="220" cy="114" r="0" fill="#c4ff3e" opacity="0" />
        <circle id="s06-pkt-3" cx="220" cy="114" r="0" fill="#00e5d4" opacity="0" />
      </svg>
    </div>

    <div id="s06-citation">
      <span class="src">⊕</span>&nbsp; per HeyGen's own docs · 4-second GSAP animation rendered with Remotion → ~1s of motion + 3s of black frames
    </div>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({ paused: true, defaults: { ease: "power3.out" } });

      tl.set("#s06-eyebrow",  { opacity: 0 }, 0);
      tl.set("#s06-h2",       { y: 30, opacity: 0 }, 0);
      ["#s06-n1","#s06-n2","#s06-n3","#s06-n4","#s06-n5","#s06-n6"].forEach(s => tl.set(s, { y: 24, opacity: 0 }, 0));
      ["#s06-conn-1","#s06-conn-2","#s06-conn-3","#s06-conn-4","#s06-conn-5"].forEach(s => tl.set(s, { strokeDashoffset: 200 }, 0));
      tl.set("#s06-citation", { y: 16, opacity: 0 }, 0);

      tl.to("#s06-eyebrow", { opacity: 1, duration: 0.5 }, 0.2);
      tl.to("#s06-h2",      { y: 0, opacity: 1, duration: 0.7 }, 0.4);

      // Pipeline reveals — narration "Both tools drive headless Chromium" → reveal nodes left-to-right
      // Scene ~44s; pace nodes/connectors over first ~12s, then hold + cite.
      tl.to("#s06-n1",     { y: 0, opacity: 1, duration: 0.5 }, 1.4);
      tl.to("#s06-conn-1", { strokeDashoffset: 0, duration: 0.5 }, 2.0);
      tl.to("#s06-n2",     { y: 0, opacity: 1, duration: 0.5 }, 2.4);
      tl.to("#s06-conn-2", { strokeDashoffset: 0, duration: 0.5 }, 3.0);
      tl.to("#s06-n3",     { y: 0, opacity: 1, duration: 0.5 }, 4.0);
      tl.to("#s06-conn-3", { strokeDashoffset: 0, duration: 0.5 }, 5.4);
      tl.to("#s06-n4",     { y: 0, opacity: 1, duration: 0.5 }, 6.0);
      tl.to("#s06-conn-4", { strokeDashoffset: 0, duration: 0.5 }, 6.6);
      tl.to("#s06-n5",     { y: 0, opacity: 1, duration: 0.5 }, 7.2);
      tl.to("#s06-conn-5", { strokeDashoffset: 0, duration: 0.5 }, 7.8);
      tl.to("#s06-n6",     { y: 0, opacity: 1, duration: 0.5 }, 8.4);

      tl.to("#s06-citation", { y: 0, opacity: 1, duration: 0.6 }, 16.5);

      // ────────────────────────────────────────────
      // Continuous data packets flow through the pipeline after assembly.
      // 3 packets, staggered, each travels left→right across all 5 segments
      // (220px → 1450px = 1230px). Loops every 6s per packet, three colors.
      // ────────────────────────────────────────────
      const PACKET_CYCLE = 6.0;
      const PACKET_START = 9.5; // after pipeline fully assembled at t=8.4
      const SCENE_LEN = 44;
      const packetReps = Math.max(0, Math.floor((SCENE_LEN - PACKET_START) / PACKET_CYCLE) - 1);
      const packets = [
        { sel: "#s06-pkt-1", offset: 0.0,  color: "#ff4d1a" },
        { sel: "#s06-pkt-2", offset: 2.0,  color: "#c4ff3e" },
        { sel: "#s06-pkt-3", offset: 4.0,  color: "#00e5d4" },
      ];
      packets.forEach(p => {
        // Show packet
        tl.set(p.sel, { attr: { r: 6, cx: 220, cy: 114 }, opacity: 0 }, PACKET_START + p.offset);
        tl.to(p.sel, { opacity: 1, duration: 0.2 }, PACKET_START + p.offset);
        // Travel cx 220 → 1450 with slight pause at each node
        tl.to(p.sel, {
          attr: { cx: 1450 },
          duration: PACKET_CYCLE - 0.6, ease: "none",
          repeat: packetReps,
          repeatDelay: 0.6,
        }, PACKET_START + p.offset + 0.2);
        // After each loop iteration, snap back to start (handled by repeat)
        tl.set(p.sel, { attr: { cx: 220 } }, PACKET_START + p.offset + 0.2 + (PACKET_CYCLE - 0.6));
      });

      // Node sequential breathe — every 5s, faster cadence than before
      const nodes = ["#s06-n1","#s06-n2","#s06-n3","#s06-n4","#s06-n5","#s06-n6"];
      const breatheCycles = [
        { t: 11.0, color: "rgba(255,77,26,.4)" },
        { t: 17.0, color: "rgba(196,255,62,.4)" },
        { t: 23.0, color: "rgba(0,229,212,.4)" },
        { t: 29.0, color: "rgba(255,77,26,.4)" },
        { t: 35.0, color: "rgba(196,255,62,.4)" },
        { t: 40.0, color: "rgba(0,229,212,.4)" },
      ];
      breatheCycles.forEach(cycle => {
        nodes.forEach((sel, i) => {
          tl.to(sel, { boxShadow: "0 0 56px " + cycle.color, duration: 0.4, ease: "sine.inOut", yoyo: true, repeat: 1 }, cycle.t + i * 0.5);
        });
      });
      // Connector pulses — flash bright then fade, tied to packet arrivals
      const conns = ["#s06-conn-1","#s06-conn-2","#s06-conn-3","#s06-conn-4","#s06-conn-5"];
      [12, 18, 25, 31, 37].forEach(t => {
        conns.forEach((sel, i) => {
          tl.to(sel, { strokeWidth: 4, duration: 0.3, ease: "sine.inOut", yoyo: true, repeat: 1 }, t + i * 0.3);
        });
      });
      // Citation pulse — calls attention to the source disclosure
      tl.to("#s06-citation .src", { scale: 1.3, duration: 0.7, ease: "sine.inOut", yoyo: true, repeat: 3 }, 19.0);
      tl.to("#s06-citation", { textShadow: "0 0 20px rgba(196,255,62,.3)", duration: 1.2, ease: "sine.inOut", yoyo: true, repeat: 5 }, 25.0);
      // Headline emphasis breath
      tl.to("#s06-h2 em", { color: "#c4ff3e", duration: 1.6, ease: "sine.inOut", yoyo: true, repeat: 12 }, 5.0);
      tl.to("#s06-eyebrow .dot", { scale: 1.5, duration: 1.0, ease: "sine.inOut", yoyo: true, repeat: 21 }, 1.0);

      window.__timelines["scene-06-frame-adapter"] = tl;
    </script>
  </div>
</template>
