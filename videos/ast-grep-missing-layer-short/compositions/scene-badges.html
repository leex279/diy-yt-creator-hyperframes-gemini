<!--
  scene-badges.html — 2x3 grid of pill badges (~7s).

  Pattern: header → 6 colored pill chips arranged in a 2-column grid,
           staggered entrance from below. Showcases the full 5-accent
           rotation in one scene.
  Self-contained sub-composition with paused timeline at
  window.__timelines["scene-badges"].
-->
<template id="scene-badges-template">
  <div data-composition-id="scene-badges"
       data-start="0"
       data-width="1080"
       data-height="1920"
       style="position:absolute; inset:0; overflow:hidden;">

    <style>
      #scene-badges-content {
        width:100%; height:100%;
        padding: var(--pad-top) var(--pad-x) var(--pad-bottom);
        display:flex; flex-direction:column;
        align-items:center; justify-content:center;
        text-align:center; gap:36px;
        box-sizing:border-box;
      }
      #scene-badges-content .header {
        font-family: 'Source Serif 4', Georgia, serif;
        font-weight: 700;
        font-size: 76px;
        line-height: 1.05;
        letter-spacing: -1px;
        color: var(--accent-ink);
        max-width: 880px;
      }
      #scene-badges-content .header .em {
        color: var(--accent-warm);
        font-style: italic;
      }
      #scene-badges-content .grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 22px;
        width: 920px;
      }
      #scene-badges-content .pill {
        display: flex; align-items: center; justify-content: flex-start; gap: 18px;
        padding: 24px 30px;
        border-radius: 999px;
        font-family: 'Inter', system-ui, sans-serif;
        font-weight: 700;
        font-size: 36px;
        letter-spacing: 0.5px;
        box-shadow: var(--shadow-warm);
      }
      #scene-badges-content .pill .dot {
        width: 16px; height: 16px; border-radius: 50%;
        flex: 0 0 auto;
      }
      #scene-badges-content .pill.warm   { background: var(--bg-card); border: 2px solid var(--accent-warm);  color: var(--accent-ink); }
      #scene-badges-content .pill.warm   .dot { background: var(--accent-warm); }
      #scene-badges-content .pill.deep   { background: var(--accent-deep); border: 2px solid var(--accent-deep); color: var(--text-on-deep); }
      #scene-badges-content .pill.deep   .dot { background: var(--accent-gold); }
      #scene-badges-content .pill.sage   { background: var(--bg-card); border: 2px solid var(--accent-sage);  color: var(--accent-ink); }
      #scene-badges-content .pill.sage   .dot { background: var(--accent-sage); }
      #scene-badges-content .pill.gold   { background: var(--accent-gold); border: 2px solid var(--accent-gold); color: var(--accent-ink); }
      #scene-badges-content .pill.gold   .dot { background: var(--accent-deep); }
      #scene-badges-content .pill.rose   { background: var(--bg-card); border: 2px solid var(--accent-rose);  color: var(--accent-ink); }
      #scene-badges-content .pill.rose   .dot { background: var(--accent-rose); }
      #scene-badges-content .pill.ink    { background: var(--accent-ink); border: 2px solid var(--accent-ink); color: var(--bg); }
      #scene-badges-content .pill.ink    .dot { background: var(--accent-warm); }
    </style>

    <div id="scene-badges-content">
      <div class="header" id="badges-header">
        Five accents. <span class="em">Endless</span> palettes.
      </div>
      <div class="grid">
        <div class="pill warm" id="badge-1"><span class="dot"></span><span>terracotta</span></div>
        <div class="pill deep" id="badge-2"><span class="dot"></span><span>indigo</span></div>
        <div class="pill sage" id="badge-3"><span class="dot"></span><span>sage</span></div>
        <div class="pill gold" id="badge-4"><span class="dot"></span><span>sunset gold</span></div>
        <div class="pill rose" id="badge-5"><span class="dot"></span><span>warm rose</span></div>
        <div class="pill ink"  id="badge-6"><span class="dot"></span><span>warm ink</span></div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({ paused: true });

      // Entrance (0 → 1.5s)
      tl.from("#badges-header", { y: 24, opacity: 0, duration: 0.6, ease: "power3.out" }, 0);
      tl.from("#scene-badges-content .pill", {
        y: 30, scale: 0.85, opacity: 0,
        duration: 0.5, ease: "back.out(1.4)",
        stagger: 0.08
      }, 0.5);

      // Mid-beats — sequential per-badge highlight pulses (showcase each accent)
      tl.to("#badge-1", { scale: 1.08, duration: 0.4, ease: "back.out(2)", yoyo: true, repeat: 1 }, 3.0);
      tl.to("#badge-2", { scale: 1.08, duration: 0.4, ease: "back.out(2)", yoyo: true, repeat: 1 }, 4.2);
      tl.to("#badge-3", { scale: 1.08, duration: 0.4, ease: "back.out(2)", yoyo: true, repeat: 1 }, 5.4);
      tl.to("#badge-4", { scale: 1.08, duration: 0.4, ease: "back.out(2)", yoyo: true, repeat: 1 }, 6.6);
      tl.to("#badge-5", { scale: 1.08, duration: 0.4, ease: "back.out(2)", yoyo: true, repeat: 1 }, 7.8);
      tl.to("#badge-6", { scale: 1.08, duration: 0.4, ease: "back.out(2)", yoyo: true, repeat: 1 }, 9.0);
      // Final beat: all six pulse together
      tl.to("#scene-badges-content .pill", { scale: 1.04, duration: 0.4, ease: "power2.out", yoyo: true, repeat: 1 }, 11);
      // Header re-emphasis at the end
      tl.to("#badges-header .em", { scale: 1.06, duration: 0.5, ease: "power2.out", yoyo: true, repeat: 1 }, 13);

      window.__timelines["scene-badges"] = tl;
    </script>
  </div>
</template>
