<!--
  scene-quote.html — Editorial pull-quote callout (~8s).

  Pattern: oversized opening glyph "" → italic serif quote body
           → ink-rule divider → attribution.
  Self-contained sub-composition with paused timeline at
  window.__timelines["scene-quote"].
-->
<template id="scene-quote-template">
  <div data-composition-id="scene-quote"
       data-start="0"
       data-width="1080"
       data-height="1920"
       style="position:absolute; inset:0; overflow:hidden;">

    <style>
      #scene-quote-content {
        width:100%; height:100%;
        padding: var(--pad-top) var(--pad-x) var(--pad-bottom);
        display:flex; flex-direction:column;
        align-items:center; justify-content:center;
        text-align:center; gap:36px;
        box-sizing:border-box;
      }
      #scene-quote-content .glyph {
        font-family: 'Source Serif 4', Georgia, serif;
        font-weight: 700;
        font-size: 260px;
        line-height: 0.6;
        color: var(--accent-warm);
        opacity: 0.65;
        margin-bottom: -80px;   /* tuck the body text up under the glyph */
      }
      #scene-quote-content .body {
        font-family: 'Source Serif 4', Georgia, serif;
        font-style: italic;
        font-weight: 400;
        font-size: 64px;
        line-height: 1.2;
        color: var(--accent-ink);
        max-width: 880px;
        letter-spacing: -0.5px;
      }
      #scene-quote-content .body .em {
        font-style: italic;
        color: var(--accent-warm);
        font-weight: 700;
      }
      #scene-quote-content .rule {
        width: 120px; height: 2px;
        background: var(--accent-deep);
        opacity: 0.6;
      }
      #scene-quote-content .attrib {
        font-family: 'JetBrains Mono', ui-monospace, monospace;
        font-weight: 600;
        font-size: 28px;
        letter-spacing: 3px;
        text-transform: uppercase;
        color: var(--text-secondary);
      }
    </style>

    <div id="scene-quote-content">
      <div class="glyph"  id="quote-glyph">&ldquo;</div>
      <div class="body"   id="quote-body">
        Sub-compositions made our scene <span class="em">timing</span> feel like prose.
      </div>
      <div class="rule"   id="quote-rule"></div>
      <div class="attrib" id="quote-attrib">&mdash; Operator Notes</div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({ paused: true });

      // Entrance (0 → 2.2s)
      tl.from("#quote-glyph",  { y: -30, opacity: 0, duration: 0.7, ease: "power3.out" }, 0);
      tl.from("#quote-body",   { y: 30,  opacity: 0, duration: 0.8, ease: "power3.out" }, 0.4);
      tl.from("#quote-rule",   { scaleX: 0, opacity: 0, duration: 0.5, ease: "power2.out" }, 1.4);
      tl.from("#quote-attrib", { y: 16,  opacity: 0, duration: 0.5, ease: "power2.out" }, 1.7);

      // Mid-beats
      // Beat A (4.5s): "em" word color pulse + scale (the highlighted "timing")
      tl.to("#scene-quote-content .body .em", { scale: 1.07, duration: 0.5, ease: "power2.out", yoyo: true, repeat: 1 }, 4.5);
      // Beat B (7s): rule extends + glows
      tl.to("#quote-rule", { scaleX: 1.8, opacity: 1.0, duration: 0.6, ease: "power2.inOut", yoyo: true, repeat: 1 }, 7);
      // Beat C (9.5s): glyph subtle scale (re-emphasize the opening quote)
      tl.to("#quote-glyph", { scale: 1.08, opacity: 0.85, duration: 0.6, ease: "power2.inOut", yoyo: true, repeat: 1 }, 9.5);
      // Beat D (12s): attribution emphasis (letter-spacing nudge)
      tl.to("#quote-attrib", { letterSpacing: "5px", color: "var(--accent-deep)", duration: 0.5, ease: "power2.out", yoyo: true, repeat: 1 }, 12);

      window.__timelines["scene-quote"] = tl;
    </script>
  </div>
</template>
