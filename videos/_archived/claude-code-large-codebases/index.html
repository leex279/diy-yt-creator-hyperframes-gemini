  /* CANVAS — 1920x1080 Anthropic dark stage. */
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 1920px;
    height: 1080px;
    overflow: hidden;
    background: var(--bg);
    font-family: var(--sans);
    color: var(--text);
    -webkit-font-smoothing: antialiased;
  }

  /* Ambient — orange + purple radial wash */
  #ambient {
    position: absolute;
    inset: -200px;
    background:
      radial-gradient(circle at 28% 22%, rgba(233, 116, 88, 0.10), transparent 55%),
      radial-gradient(circle at 76% 78%, rgba(167, 139, 250, 0.07), transparent 60%),
      radial-gradient(circle at 50% 100%, rgba(107, 154, 239, 0.05), transparent 50%);
    pointer-events: none;
    z-index: 0;
  }

  /* Shape backdrop */
  #shape-backdrop {
    position: absolute;
    inset: 0;
    pointer-events: none;
    overflow: hidden;
    z-index: 0;
  }
  #shape-backdrop img {
    position: absolute;
    opacity: 0.05;
    object-fit: contain;
    pointer-events: none;
  }

  /* Film-grain overlay */
  #noise-overlay {
    position: absolute;
    inset: 0;
    width: 1920px;
    height: 1080px;
    pointer-events: none;
    z-index: 8;
    opacity: 0.035;
    mix-blend-mode: overlay;
  }

  /* Top chrome — Anthropic wordmark (top-right) */
  #top-banner {
    position: absolute;
    top: 30px;
    right: 60px;
    z-index: 10;
    pointer-events: none;
    filter: drop-shadow(0 4px 12px rgba(0, 0, 0, 0.5));
  }
  #top-banner-logo {
    height: 60px;
    width: auto;
    display: block;
  }

  /* Slim progress bar — bottom edge, orange */
  #progress-track {
    position: absolute;
    bottom: 0;
    left: 0;
    width: 1920px;
    height: 6px;
    background: rgba(245, 241, 235, 0.06);
    z-index: 10;
  }
  #progress-fill {
    width: 0;
    height: 100%;
    background: var(--accent-1);
    box-shadow: 0 0 12px rgba(233, 116, 88, 0.60);
  }

  /* Sub-composition scene wrappers */
  .scene-wrapper {
    position: absolute;
    top: 0;
    left: 0;
    width: 1920px;
    height: 1080px;
    z-index: 1;

<script>
  // Deterministic shape scatter — Anthropic backdrop
  function seedHash(seed) {
    let h = 1779033703 ^ seed.length;
    for (let i = 0; i < seed.length; i++) {
      h = Math.imul(h ^ seed.charCodeAt(i), 3432918353);
      h = (h << 13) | (h >>> 19);
    }
    h = Math.imul(h ^ (h >>> 16), 2246822507);
    h = Math.imul(h ^ (h >>> 13), 3266489909);
    h ^= h >>> 16;
    return (h >>> 0) / 4294967296;
  }

  function spawnShapes(seedPrefix, container) {
    const shapes = ['assets/shapes/shape1.svg', 'assets/shapes/shape2.svg', 'assets/shapes/shape3.svg'];
    const count = 14, w = 1920, h = 1080, minSize = 200, sizeRange = 220;
    const minDist = 360, MAX_TRIES = 80;
    const placed = [];
    let attempt = 0;
    for (let i = 0; i < count; i++) {
      let best = null, bestScore = -1;
      for (let t = 0; t < MAX_TRIES; t++) {
        const seed = seedPrefix + '-' + i + '-' + attempt++;
        const size = minSize + seedHash(seed + '-size') * sizeRange;
        const cx = seedHash(seed + '-x') * (w - size * 0.4) + size * 0.2;
        const cy = seedHash(seed + '-y') * (h - size * 0.4) + size * 0.2;
        const rot = (seedHash(seed + '-rot') - 0.5) * 90;
        let nearest = Infinity;
        for (const p of placed) {
          const dx = cx - p.cx, dy = cy - p.cy;
          const d2 = dx * dx + dy * dy;
          if (d2 < nearest) nearest = d2;
        }
        if (nearest >= minDist * minDist) { best = { cx, cy, size, rot }; break; }
        if (nearest > bestScore) { bestScore = nearest; best = { cx, cy, size, rot }; }
      }
      placed.push(best);
      const img = document.createElement('img');
      img.src = shapes[i % shapes.length];
      img.style.cssText =
        'left:' + (best.cx - best.size / 2) + 'px;' +
        'top:' + (best.cy - best.size / 2) + 'px;' +
        'width:' + best.size + 'px;' +
        'height:' + best.size + 'px;';
      container.appendChild(img);
      gsap.set(img, { rotation: best.rot });
    }
  }

  function animateShapeDrift(tl, container, seedPrefix, totalDuration) {
    const imgs = container.querySelectorAll('img');
    imgs.forEach((img, i) => {
      const seed = seedPrefix + '-drift-' + i;
      const dx = (seedHash(seed + '-dx') - 0.5) * 60;
      const dy = (seedHash(seed + '-dy') - 0.5) * 60;
      const dr = (seedHash(seed + '-dr') - 0.5) * 8;
      const dur = totalDuration / 10 + seedHash(seed + '-dur') * (totalDuration / 10);
      const repeatCount = Math.max(0, Math.floor(totalDuration / dur) - 1);
      tl.to(img, {
        x: dx, y: dy, rotation: '+=' + dr,
        duration: dur, ease: 'sine.inOut',
        yoyo: true, repeat: repeatCount
      }, 0);
    });
  }

  // repositionShapesPerPhase — deterministic per-phase shape reposition.
  // Ported from templates/shorts/anthropic/index.html to long-form.
  // Adapted for 1920x1080 canvas (w=1920, h=1080, minDist=360).
  // Each sceneT triggers a re-scatter of shapes starting 0.4s before the transition
  // so the reposition reads as part of the crossfade. The whoosh data-start equals sceneT exactly.
  function repositionShapesPerPhase(tl, container, seedPrefix, phaseStartTimes) {
    const imgs = Array.from(container.querySelectorAll('img'));
    if (!imgs.length || !phaseStartTimes.length) return;
    const w = 1920, h = 1080, minDist = 360, MAX_TRIES = 80;
    const anchors = imgs.map(img => ({
      left: parseFloat(img.style.left),
      top:  parseFloat(img.style.top),
      size: parseFloat(img.style.width),
    }));
    phaseStartTimes.forEach((sceneT, sceneIdx) => {
      const placed = [];
      let attempt = 0;
      const positions = imgs.map((img, i) => {
        const size = anchors[i].size;
        let best = null, bestScore = -1;
        for (let t = 0; t < MAX_TRIES; t++) {
          const seed = seedPrefix + '-phase' + sceneIdx + '-' + i + '-' + (attempt++);
          const cx = seedHash(seed + '-x') * (w - size * 0.4) + size * 0.2;
          const cy = seedHash(seed + '-y') * (h - size * 0.4) + size * 0.2;
          const rot = (seedHash(seed + '-rot') - 0.5) * 90;
          let nearest = Infinity;
          for (const p of placed) {
            const dx = cx - p.cx, dy = cy - p.cy;
            const d2 = dx * dx + dy * dy;
            if (d2 < nearest) nearest = d2;
          }
          if (nearest >= minDist * minDist) { best = { cx, cy, rot }; break; }
          if (nearest > bestScore) { bestScore = nearest; best = { cx, cy, rot }; }
        }
        placed.push({ cx: best.cx, cy: best.cy });
        return {
          x: (best.cx - size / 2) - anchors[i].left,
          y: (best.cy - size / 2) - anchors[i].top,
          rot: best.rot,
        };
      });
      // Tween starts 0.4s before sceneT so reposition coincides with crossfade
      tl.to(imgs, {
        x: (i) => positions[i].x,
        y: (i) => positions[i].y,
        rotation: (i) => positions[i].rot,
        duration: 1.4,
        ease: 'power2.inOut',
      }, sceneT - 0.4);
    });
  }

  // Crossfade between scene wrappers
  function crossfadeScenes(tl, fromSel, toSel, atTime) {
    tl.to(fromSel, { filter: "blur(20px)", scale: 1.04, duration: 0.5, ease: "power1.in" }, atTime);
    tl.to(fromSel, { opacity: 0, duration: 0.4, ease: "power1.in" }, atTime + 0.3);
    tl.set(fromSel, { visibility: "hidden" }, atTime + 0.7);
    tl.set(toSel,   { filter: "blur(20px)", scale: 0.97, opacity: 0, visibility: "visible" }, atTime + 0.4);
    tl.to(toSel,    { opacity: 1, duration: 0.3, ease: "power1.inOut", overwrite: "auto" }, atTime + 0.4);
    tl.to(toSel,    { filter: "blur(0px)", scale: 1, duration: 0.5, ease: "power1.out", overwrite: "auto" }, atTime + 0.6);
  }

  spawnShapes('anthropic-large-codebases', document.getElementById('shape-backdrop'));

  window.__timelines = window.__timelines || {};
  // TOTAL_DURATION: 482.63 + 69.09 (narration-post w/ Archon line) + 6.28 (held YouTube end-card frame) = 557.99 → 558
  const TOTAL_DURATION = 558;
  const tl = gsap.timeline({ paused: true });

  // Ambient breath — finite repeat across 544s
  tl.fromTo("#ambient",
    { opacity: 0.85, scale: 1.0 },
    { opacity: 1.0, scale: 1.04, duration: 30, ease: "sine.inOut", yoyo: true, repeat: 17 },
    0);

  animateShapeDrift(tl, document.getElementById('shape-backdrop'), 'anthropic-large-codebases', TOTAL_DURATION);

  // Linear progress fill across the full composition
  tl.fromTo("#progress-fill",
    { width: 0 },
    { width: 1920, duration: TOTAL_DURATION, ease: "none" },
    0);

  // Top banner fade-in
  tl.from("#top-banner", { y: -16, opacity: 0, duration: 0.6, ease: "power2.out" }, 0.2);

  // ─── Scene labels — Iteration C (post-midroll times shifted) ──────────────
  tl.addLabel("hook",                 0)
    .addLabel("source-cards",         25.785)
    .addLabel("stat-pill-row",        59.337)
    .addLabel("side-by-side",         89.185)
    .addLabel("harness-fig1",         134.126)
    .addLabel("extension-points",     172.252)
    .addLabel("subscribe-banner",     265.872)
    .addLabel("pattern1-nav",         272.060)
    .addLabel("quote-card",           350.681)
    .addLabel("pattern3-fig2",        384.941)
    .addLabel("dynamous-midroll",     451.130)
    .addLabel("checklist-fig3",       483.080)
    .addLabel("cta",                  525.246);

  // ─── Crossfades between adjacent scenes (fire 0.4s before scene boundary) ─
  // Scenes 1-10: pre-midroll (unchanged)
  crossfadeScenes(tl, "#scene-hook-wrap",             "#scene-source-cards-wrap",      "source-cards-=0.4");
  crossfadeScenes(tl, "#scene-source-cards-wrap",     "#scene-stat-pill-row-wrap",     "stat-pill-row-=0.4");
  crossfadeScenes(tl, "#scene-stat-pill-row-wrap",    "#scene-side-by-side-wrap",      "side-by-side-=0.4");
  crossfadeScenes(tl, "#scene-side-by-side-wrap",     "#scene-harness-fig1-wrap",      "harness-fig1-=0.4");
  crossfadeScenes(tl, "#scene-harness-fig1-wrap",     "#scene-extension-points-wrap",  "extension-points-=0.4");
  crossfadeScenes(tl, "#scene-extension-points-wrap", "#scene-subscribe-banner-wrap",  "subscribe-banner-=0.4");
  crossfadeScenes(tl, "#scene-subscribe-banner-wrap", "#scene-pattern1-nav-wrap",      "pattern1-nav-=0.4");
  crossfadeScenes(tl, "#scene-pattern1-nav-wrap",     "#scene-quote-card-wrap",        "quote-card-=0.4");
  crossfadeScenes(tl, "#scene-quote-card-wrap",       "#scene-pattern3-fig2-wrap",     "pattern3-fig2-=0.4");
  // Scene 10 → Dynamous midroll block: crossfade out pattern3-fig2 at midroll start
  crossfadeScenes(tl, "#scene-pattern3-fig2-wrap",    "#scene-checklist-fig3-wrap",    "dynamous-midroll-=0.4");
  // Scene 12 (checklist-fig3) → Scene 13 (CTA)
  crossfadeScenes(tl, "#scene-checklist-fig3-wrap",   "#scene-cta-wrap",               "cta-=0.4");

  // ─── Shape reposition at every scene boundary (12 sceneT values) ─────────
  // Per audio-design.md: whoosh fires at sceneT; shape reposition tween starts sceneT-0.4
  repositionShapesPerPhase(
    tl,
    document.getElementById('shape-backdrop'),
    'anthropic-large-codebases',
    [25.785, 59.337, 89.185, 134.126, 172.252, 265.872, 272.060, 350.681, 384.941, 451.130, 483.080, 525.246]
  );

  // Pad timeline to full composition duration (hyperframes-pitfalls.md §1)
  tl.set({}, {}, TOTAL_DURATION);

  window.__timelines["main"] = tl;
</script>
