<!--
  scene-code-block.html — macOS-chromed code window with syntax color (~13s).

  Pattern: kicker → window with traffic lights + filename → 5 lines of
           syntax-highlighted code (lines stagger in line-by-line) →
           output line → caption.
  Self-contained sub-composition with paused timeline at
  window.__timelines["scene-code-block"].
-->
<template id="scene-code-block-template">
  <div data-composition-id="scene-code-block"
       data-start="0"
       data-width="1080"
       data-height="1920"
       style="position:absolute; inset:0; overflow:hidden;">

    <style>
      #scene-code-block-content {
        width:100%; height:100%;
        padding: var(--pad-top) var(--pad-x) var(--pad-bottom);
        display:flex; flex-direction:column;
        align-items:center; justify-content:center;
        text-align:center; gap:32px;
        box-sizing:border-box;
      }
      #scene-code-block-content .kicker {
        font-family: var(--mono);
        font-weight: 700;
        font-size: 44px;
        letter-spacing: 6px;
        text-transform: uppercase;
        color: var(--accent-deep);
      }
      #scene-code-block-content .window {
        width: 960px;
        background: var(--accent-ink);
        border-radius: 20px;
        overflow: hidden;
        text-align: left;
      }
      #scene-code-block-content .titlebar {
        display: flex; align-items: center;
        gap: 12px;
        padding: 18px 22px;
        background: rgba(255, 255, 255, 0.06);
        border-bottom: 1px solid rgba(255, 255, 255, 0.10);
      }
      #scene-code-block-content .dot {
        width: 18px; height: 18px; border-radius: 50%;
      }
      #scene-code-block-content .dot.r { background: #FF5F57; }
      #scene-code-block-content .dot.y { background: #FEBC2E; }
      #scene-code-block-content .dot.g { background: #28C840; }
      #scene-code-block-content .filename {
        margin-left: 20px;
        font-family: var(--mono);
        font-weight: 600;
        font-size: 28px;
        color: rgba(255, 255, 255, 0.60);
      }
      #scene-code-block-content .body {
        padding: 24px 36px;
      }
      #scene-code-block-content .line {
        font-family: var(--mono);
        font-weight: 500;
        font-size: 28px;
        line-height: 1.35;
        color: rgba(255, 255, 255, 0.92);
        white-space: pre;
        padding-left: 14px;
        border-left: 3px solid transparent;
      }
      /* Required fields: terracotta left-bar marker */
      #scene-code-block-content .line.req { border-left-color: var(--accent-warm); }
      /* Optional fields: subtle warm-brown left-bar marker */
      #scene-code-block-content .line.opt { border-left-color: rgba(225, 165, 130, 0.45); }
      /* Syntax tokens */
      #scene-code-block-content .kw  { color: var(--accent-rose); }
      #scene-code-block-content .fn  { color: var(--accent-gold); }
      #scene-code-block-content .str { color: var(--accent-sage); }
      #scene-code-block-content .num { color: var(--accent-warm); }
      #scene-code-block-content .com { color: rgba(255, 255, 255, 0.40); font-style: italic; }
      #scene-code-block-content .out {
        margin-top: 14px;
        padding-top: 14px;
        border-top: 1px dashed rgba(255, 255, 255, 0.15);
        color: var(--accent-sage);
        font-style: italic;
      }
      #scene-code-block-content .footnote {
        font-family: var(--serif);
        font-style: italic;
        font-weight: 500;
        font-size: 44px;
        color: var(--text-secondary);
        line-height: 1.25;
        max-width: 920px;
      }
      #scene-code-block-content .footnote .em {
        color: var(--accent-warm);
        font-weight: 700;
      }
    </style>

    <div id="scene-code-block-content">
      <div class="kicker" id="cb-kicker">A real SKILL.md</div>
      <div class="window" id="cb-window">
        <div class="titlebar">
          <span class="dot r"></span>
          <span class="dot y"></span>
          <span class="dot g"></span>
          <span class="filename">my-skill/SKILL.md</span>
        </div>
        <div class="body">
          <div class="line"          id="cb-l1"><span class="kw">---</span></div>
          <div class="line req"      id="cb-l2"><span class="fn">name</span>: <span class="str">pdf-processing</span></div>
          <div class="line req"      id="cb-l3"><span class="fn">description</span>: <span class="str">Extract PDF text, fill forms.</span></div>
          <div class="line opt"      id="cb-l4"><span class="fn">license</span>: <span class="str">Apache-2.0</span></div>
          <div class="line opt"      id="cb-l5"><span class="fn">compatibility</span>: <span class="str">Requires Python 3.14+</span></div>
          <div class="line opt"      id="cb-l6"><span class="fn">metadata</span>:</div>
          <div class="line opt"      id="cb-l7">&nbsp;&nbsp;<span class="fn">author</span>: <span class="str">example-org</span></div>
          <div class="line opt"      id="cb-l8">&nbsp;&nbsp;<span class="fn">version</span>: <span class="str">"1.0"</span></div>
          <div class="line opt"      id="cb-l9"><span class="fn">allowed-tools</span>: <span class="str">Bash Read</span></div>
          <div class="line"          id="cb-l10"><span class="kw">---</span></div>
          <div class="line out"      id="cb-l11"><span class="com"># then your Markdown instructions...</span></div>
        </div>
      </div>
      <div class="footnote" id="cb-footnote">Required: <em>name + description.</em> Optional: <em>license, compatibility, metadata, allowed-tools.</em></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({ paused: true });

      // Entrance — kicker + window
      tl.from("#cb-kicker",  { y: 16, opacity: 0, duration: 0.5, ease: "power2.out" }, 0);
      tl.from("#cb-window",  { y: 30, scale: 0.96, opacity: 0, duration: 0.6, ease: "back.out(1.4)" }, 0.3);

      // Hide all 11 lines from t=0, then stagger reveal them at narration anchors.
      tl.set("#cb-l1, #cb-l2, #cb-l3, #cb-l4, #cb-l5, #cb-l6, #cb-l7, #cb-l8, #cb-l9, #cb-l10, #cb-l11",
             { x: -20, opacity: 0 }, 0);

      // Transcript anchors (scene-rel):
      //   3.40 "Required"   4.66 "name"   5.43 "description"
      //   6.14 "Optional"   8.05 "license"   8.66 "Compatibility"
      //   9.93 "Metadata"   11.71 "pre-approved"   12.31 "tools"
      //   13.27 "Markdown"   15.28 "No DSL"

      // Opening --- reveals first (with narrator's "This is what a real SKILL.md looks like")
      tl.to("#cb-l1", { x: 0, opacity: 1, duration: 0.35, ease: "power2.out" }, 1.0);

      // Required fields: reveal each ~0.4s BEFORE narrator names it
      tl.to("#cb-l2", { x: 0, opacity: 1, duration: 0.35, ease: "power2.out" }, 4.2);   // before "name" 4.66
      tl.to("#cb-l3", { x: 0, opacity: 1, duration: 0.35, ease: "power2.out" }, 5.0);   // before "description" 5.43

      // Optional fields: reveal each ~0.4s before narrator names it
      tl.to("#cb-l4", { x: 0, opacity: 1, duration: 0.35, ease: "power2.out" }, 7.6);   // before "license" 8.05
      tl.to("#cb-l5", { x: 0, opacity: 1, duration: 0.35, ease: "power2.out" }, 8.3);   // before "Compatibility" 8.66
      tl.to("#cb-l6", { x: 0, opacity: 1, duration: 0.35, ease: "power2.out" }, 9.6);   // before "Metadata" 9.93
      tl.to("#cb-l7", { x: 0, opacity: 1, duration: 0.30, ease: "power2.out" }, 10.0);  // author
      tl.to("#cb-l8", { x: 0, opacity: 1, duration: 0.30, ease: "power2.out" }, 10.4);  // version
      tl.to("#cb-l9", { x: 0, opacity: 1, duration: 0.35, ease: "power2.out" }, 11.4);  // before "pre-approved" 11.71

      // Closing --- + Markdown body marker (paced to "Then Markdown" at 13.0-13.27)
      tl.to("#cb-l10", { x: 0, opacity: 1, duration: 0.35, ease: "power2.out" }, 12.7);
      tl.to("#cb-l11", { x: 0, opacity: 1, duration: 0.4,  ease: "power2.out" }, 13.0);

      // Footnote fades up paced to "No DSL. No SDK." at 15.28
      tl.from("#cb-footnote", { y: 16, opacity: 0, duration: 0.6, ease: "power2.out" }, 15.0);

      // Mid-beats — field-name pulses aligned to narration anchors
      tl.to("#cb-l2 .fn", { scale: 1.12, duration: 0.35, ease: "back.out(2)", yoyo: true, repeat: 1 }, 4.7);   // "name"
      tl.to("#cb-l3 .fn", { scale: 1.12, duration: 0.35, ease: "back.out(2)", yoyo: true, repeat: 1 }, 5.5);   // "description"
      tl.to("#cb-l4 .fn", { scale: 1.10, duration: 0.35, ease: "back.out(2)", yoyo: true, repeat: 1 }, 8.1);   // "license"
      tl.to("#cb-l5 .fn", { scale: 1.10, duration: 0.35, ease: "back.out(2)", yoyo: true, repeat: 1 }, 8.7);   // "Compatibility"
      tl.to("#cb-l6 .fn", { scale: 1.10, duration: 0.35, ease: "back.out(2)", yoyo: true, repeat: 1 }, 9.95);  // "Metadata"
      tl.to("#cb-l9 .fn", { scale: 1.10, duration: 0.35, ease: "back.out(2)", yoyo: true, repeat: 1 }, 11.75); // "pre-approved tools"
      tl.to("#cb-l11 .com", { color: "var(--accent-sage)", duration: 0.5, ease: "power2.out", yoyo: true, repeat: 1 }, 13.3); // "Markdown"

      // "Just a file in your Git repo" at 17.4+ → footnote emphasis
      tl.to("#cb-footnote", { scale: 1.04, duration: 0.5, ease: "power2.out", yoyo: true, repeat: 1 }, 17.5);

      window.__timelines["scene-code-block"] = tl;
    </script>
  </div>
</template>
