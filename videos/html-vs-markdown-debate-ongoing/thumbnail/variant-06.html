<!DOCTYPE html>
<!-- Variant 06 — Mock X-post follow-up.
     MARKDOWN vs HTML topic header small+mono at very top.
     Overline: "THE FOLLOW-UP — PART 2".
     X-post card (Thariq follow-up) takes center.
     Engagement counts use "—" placeholders per rules. Theme: cream. -->
<html lang="en"><head><meta charset="utf-8">
<title>v06 — Topic header + mock X-post (Thariq follow-up)</title>
<link rel="stylesheet" href="_base.css">
<style>
  /* Topic header — compact strip above the card */
  .topic-strip {
    position: absolute;
    top: 110px;
    left: 60px;
    right: 60px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 16px;
    font-family: var(--sans-display);
    font-weight: 900;
    letter-spacing: -2px;
    line-height: 1;
  }
  .topic-term {
    font-size: 68px;
    color: var(--text-cream);
    letter-spacing: -2px;
  }
  .vs-sep {
    font-family: var(--serif);
    font-style: italic;
    font-weight: 800;
    font-size: 38px;
    color: var(--accent-terracotta);
    padding: 0 4px;
  }
  .topic-divider {
    width: 70px;
    height: 3px;
    background: var(--accent-terracotta);
    margin: 10px auto 0;
    border-radius: 2px;
    opacity: 0.5;
  }

  /* X-post card */
  .xpost-card {
    position: absolute;
    top: 222px;
    left: 50%;
    transform: translateX(-50%);
    width: 820px;
    background: var(--bg-card-cream);
    border: 1.5px solid rgba(28, 26, 24, 0.12);
    border-radius: 16px;
    padding: 28px 32px 24px;
    box-shadow: 0 20px 48px rgba(28, 26, 24, 0.14);
  }
  .xpost-header {
    display: flex;
    align-items: center;
    gap: 16px;
    margin-bottom: 18px;
  }
  .xpost-avatar {
    width: 52px; height: 52px;
    border-radius: 50%;
    background: #c8b8a8;
    flex-shrink: 0;
    overflow: hidden;
    border: 2px solid rgba(28,26,24,0.08);
  }
  .xpost-avatar img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .xpost-meta { flex: 1; }
  .xpost-name {
    font-family: var(--sans-display);
    font-weight: 700;
    font-size: 19px;
    color: var(--text-cream);
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .xpost-check { color: var(--accent-terracotta); font-size: 17px; }
  .xpost-handle {
    font-family: var(--mono);
    font-weight: 700;
    font-size: 14px;
    letter-spacing: 1px;
    color: var(--text-muted-cream);
    margin-top: 2px;
  }
  .xpost-x-icon {
    font-family: var(--sans-display);
    font-weight: 900;
    font-size: 26px;
    color: var(--text-cream);
    opacity: 0.65;
  }
  .xpost-body {
    font-family: var(--serif);
    font-style: italic;
    font-weight: 800;
    font-size: 40px;
    line-height: 1.18;
    letter-spacing: -1px;
    color: var(--text-cream);
    margin-bottom: 20px;
  }
  .xpost-body em { color: var(--accent-terracotta); font-style: italic; }
  .xpost-divider {
    height: 1px;
    background: rgba(28,26,24,0.10);
    margin-bottom: 14px;
  }
  .xpost-stats {
    display: flex;
    gap: 28px;
  }
  .xpost-stat {
    font-family: var(--mono);
    font-weight: 700;
    font-size: 14px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--text-muted-cream);
    display: flex;
    align-items: center;
    gap: 7px;
  }
  .xpost-stat-icon { font-size: 16px; opacity: 0.5; }

  /* Receipt */
  .receipt-c {
    position: absolute;
    left: 0; right: 0;
    bottom: 50px;
    text-align: center;
    font-family: var(--mono);
    font-weight: 700;
    font-size: 16px;
    letter-spacing: 5px;
    text-transform: uppercase;
    color: var(--text-muted-cream);
  }
  .receipt-c strong { color: var(--accent-deep-red); }
</style></head>
<body>
  <div class="thumb theme-cream">
    <div class="overline">The Follow-Up &nbsp;·&nbsp; Part 2</div>
    <div class="overline-divider"></div>

    <!-- Topic strip — MARKDOWN vs HTML compact -->
    <div>
      <div class="topic-strip">
        <span class="topic-term">MARKDOWN</span>
        <span class="vs-sep">vs</span>
        <span class="topic-term">HTML</span>
      </div>
      <div class="topic-divider"></div>
    </div>

    <!-- X-post card -->
    <div class="xpost-card">
      <div class="xpost-header">
        <div class="xpost-avatar">
          <img src="../assets/thariq-profile.png" alt="Thariq">
        </div>
        <div class="xpost-meta">
          <div class="xpost-name">Thariq <span class="xpost-check">✓</span></div>
          <div class="xpost-handle">@trq212 &nbsp;·&nbsp; 4d</div>
        </div>
        <div class="xpost-x-icon">&#120143;</div>
      </div>
      <div class="xpost-body">
        "HTML continues to be <em>undefeated.</em>"
      </div>
      <div class="xpost-divider"></div>
      <div class="xpost-stats">
        <span class="xpost-stat"><span class="xpost-stat-icon">&#128172;</span> —</span>
        <span class="xpost-stat"><span class="xpost-stat-icon">&#8635;</span> —</span>
        <span class="xpost-stat"><span class="xpost-stat-icon">&#10084;</span> —</span>
        <span class="xpost-stat"><span class="xpost-stat-icon">&#128200;</span> —</span>
      </div>
    </div>

    <div class="receipt-c"><strong>8 days later.</strong> &nbsp;·&nbsp; He doubled down.</div>
    <div class="brand"><span class="dot"></span><span>diy-yt-creator</span></div>
  </div>
</body></html>
