<!--
  scene-chart.html — Animated horizontal bar chart (~13s).

  Pattern: header → 4 horizontal bars (label on left, animated fill
           extending to the right, value on the right). Each bar grows
           with a stagger; values count up in sync.
  Self-contained sub-composition with paused timeline at
  window.__timelines["scene-chart"].
-->
<template id="scene-chart-template">
  <div data-composition-id="scene-chart"
       data-start="0"
       data-width="1080"
       data-height="1920"
       style="position:absolute; inset:0; overflow:hidden;">

    <style>
      #scene-chart-content {
        width:100%; height:100%;
        padding: var(--pad-top) var(--pad-x) var(--pad-bottom);
        display:flex; flex-direction:column;
        align-items:center; justify-content:center;
        text-align:center; gap:32px;
        box-sizing:border-box;
      }
      #scene-chart-content .header {
        font-family: 'Source Serif 4', Georgia, serif;
        font-weight: 700;
        font-size: 76px;
        line-height: 1.05;
        letter-spacing: -1px;
        color: var(--accent-ink);
        max-width: 880px;
      }
      #scene-chart-content .header .em {
        color: var(--accent-warm);
        font-style: italic;
      }
      #scene-chart-content .chart {
        display: flex; flex-direction: column;
        gap: 22px; width: 920px;
      }
      #scene-chart-content .row {
        display: flex; align-items: center; gap: 18px;
      }
      #scene-chart-content .row .label {
        flex: 0 0 200px;
        text-align: right;
        font-family: 'JetBrains Mono', ui-monospace, monospace;
        font-weight: 700;
        font-size: 28px;
        letter-spacing: 2px;
        text-transform: uppercase;
        color: var(--accent-ink);
      }
      #scene-chart-content .row .track {
        flex: 1 1 auto;
        height: 56px;
        background: rgba(255, 255, 255, 0.06);
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 14px;
        overflow: hidden;
        position: relative;
      }
      #scene-chart-content .row .bar {
        height: 100%;
        width: 0;
        border-radius: 14px;
        box-shadow: 0 4px 12px rgba(176, 124, 90, 0.18);
        transform-origin: left center;
      }
      #scene-chart-content .row.r1 .bar { background: var(--accent-warm); }
      #scene-chart-content .row.r2 .bar { background: var(--accent-deep); }
      #scene-chart-content .row.r3 .bar { background: var(--accent-sage); }
      #scene-chart-content .row.r4 .bar { background: var(--accent-gold); }
      #scene-chart-content .row .value {
        flex: 0 0 auto;
        min-width: 110px;
        text-align: left;
        font-family: 'Inter', system-ui, sans-serif;
        font-weight: 900;
        font-size: 44px;
        letter-spacing: -1px;
        font-variant-numeric: tabular-nums lining-nums;
      }
      #scene-chart-content .row.r1 .value { color: var(--accent-warm); }
      #scene-chart-content .row.r2 .value { color: var(--accent-deep); }
      #scene-chart-content .row.r3 .value { color: var(--accent-sage); }
      #scene-chart-content .row.r4 .value { color: var(--accent-gold); }
    </style>

    <div id="scene-chart-content">
      <div class="header" id="ch-header">
        Over-counting on 4 <span class="em">common searches.</span>
      </div>
      <div class="chart">
        <div class="row r1" id="ch-row-1">
          <div class="label">debug</div>
          <div class="track"><div class="bar" id="ch-bar-1"></div></div>
          <div class="value" id="ch-val-1">0%</div>
        </div>
        <div class="row r2" id="ch-row-2">
          <div class="label">setTimeout</div>
          <div class="track"><div class="bar" id="ch-bar-2"></div></div>
          <div class="value" id="ch-val-2">0%</div>
        </div>
        <div class="row r3" id="ch-row-3">
          <div class="label">promise</div>
          <div class="track"><div class="bar" id="ch-bar-3"></div></div>
          <div class="value" id="ch-val-3">0%</div>
        </div>
        <div class="row r4" id="ch-row-4">
          <div class="label">useState</div>
          <div class="track"><div class="bar" id="ch-bar-4"></div></div>
          <div class="value" id="ch-val-4">0%</div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({ paused: true });

      // Real over-count percentages from the long-form: 26%, 19%, 30%, 122%.
      // Display value = actual %, bar width = % of track (capped scale so 122 doesn't overshoot 100).
      const displayPct = [26, 19, 30, 122];
      const barWidths  = [22, 16, 25, 95]; // proportional, with 122 capped at 95% so the bar reads as "off the chart"
      const valEls = [
        document.getElementById('ch-val-1'),
        document.getElementById('ch-val-2'),
        document.getElementById('ch-val-3'),
        document.getElementById('ch-val-4')
      ];
      const counters = displayPct.map(() => ({ v: 0 }));

      tl.from("#ch-header", { y: 24, opacity: 0, duration: 0.6, ease: "power3.out" }, 0);
      tl.from("#ch-row-1, #ch-row-2, #ch-row-3, #ch-row-4", {
        x: -30, opacity: 0, duration: 0.45, ease: "power2.out", stagger: 0.18
      }, 0.4);

      // Bars grow, values count up — staggered per row, narration-paced (~3s apart for 4 items).
      for (let i = 0; i < 4; i++) {
        const at = 1.5 + i * 3.0;
        tl.to('#ch-bar-' + (i + 1), {
          width: barWidths[i] + '%',
          duration: 1.0,
          ease: "power2.out"
        }, at);
        tl.to(counters[i], {
          v: displayPct[i],
          duration: 1.0,
          ease: "power2.out",
          onUpdate: ((idx) => () => { valEls[idx].textContent = Math.round(counters[idx].v) + '%'; })(i)
        }, at);
      }

      // The 122% row is the big-finish — slam it at finish
      tl.to("#ch-row-4 .value", { scale: 1.25, color: "var(--accent-warm)", duration: 0.5, ease: "back.out(2)", yoyo: true, repeat: 1 }, 11.5);
      tl.to("#ch-bar-4",        { scaleY: 1.12, duration: 0.5, ease: "power2.out", yoyo: true, repeat: 1 }, 11.7);
      // Header re-emphasis at the end
      tl.to("#ch-header .em",   { scale: 1.06, duration: 0.5, ease: "power2.out", yoyo: true, repeat: 1 }, 14.0);
      // Tail-extend so the sub-comp timeline duration matches the visible window in the root
      tl.set({}, {}, 16.8);


      window.__timelines["scene-chart"] = tl;
    </script>
  </div>
</template>
