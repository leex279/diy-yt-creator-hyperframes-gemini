<!--
  scene-render.html — terminal showing REAL `npx hyperframes render` output
  captured 2026-05-06 from `tmp/demo-capture/my-video` (standard quality).
  Each progress bar reveals at the word-anchored narration moment.
  Pattern: tl.set() at t=0 + tl.to() animations.
-->
<template id="scene-render-template">
  <div data-composition-id="scene-render"
       data-start="0"
       data-width="1920"
       data-height="1080"
       style="position:absolute; inset:0; overflow:hidden;
              font-family:var(--sans); color:var(--text);">

    <style>
      #render-content {
        width:100%; height:100%;
        padding: 70px var(--pad-x) 60px;
        display:grid;
        grid-template-columns: 1fr 1fr;
        grid-template-rows: auto 1fr auto;
        column-gap: 40px;
        row-gap: 18px;
        box-sizing:border-box;
        align-items: stretch;
      }
      #render-content .header-block {
        grid-column: 1 / span 2; grid-row: 1;
        display:flex; flex-direction:column;
        align-items:center; gap:8px; text-align:center;
      }
      #render-content .overline {
        font-family: var(--mono); font-weight: 700;
        font-size: 24px; letter-spacing: 6px;
        text-transform: uppercase; color: var(--accent-warn);
      }
      #render-content .headline {
        font-family: var(--sans); font-weight: 800;
        font-size: 44px; line-height: 1.05;
        letter-spacing: -1px; color: var(--text);
      }

      .render-term {
        grid-column: 1; grid-row: 2;
        background: rgba(0, 0, 0, 0.85);
        border: 1.5px solid var(--border-bright);
        border-radius: 14px;
        box-shadow: 0 24px 60px rgba(0, 0, 0, 0.6);
        overflow: hidden;
        font-family: var(--mono);
        align-self: stretch;
      }
      .render-term .term-bar {
        background: rgba(255,255,255,0.06);
        padding: 9px 16px;
        font-weight: 700; font-size: 12px;
        letter-spacing: 2px; text-transform: uppercase;
        color: var(--text-secondary);
        border-bottom: 1px solid var(--border);
        display:flex; align-items:center; gap: 8px;
      }
      .render-term .dot {
        display:inline-block; width:11px; height:11px; border-radius:50%;
        background:#ff5f57; margin-right:5px;
      }
      .render-term .dot.y { background:#febc2e; }
      .render-term .dot.g { background:#28c840; }
      .render-term .term-body {
        padding: 18px 22px;
        font-size: 15px; line-height: 1.45;
        color: #e9ecf3;
      }
      .render-term .prompt { color: var(--text-secondary); margin-right: 8px; }
      .render-term .cmd-text { color: var(--accent-stat); font-weight: 700; }
      .render-term .out { display:block; color: #e9ecf3; }
      .render-term .out.head-render { color: var(--accent-2); font-weight: 700; }
      .render-term .out.head-render::before { content: "◆  "; }
      .render-term .out.head-ok { color: var(--accent-4); font-weight: 800; }
      .render-term .out.head-ok::before { content: "◇  "; }
      .render-term .out.dim { color: #828c9e; padding-left: 22px; }
      .render-term .blank { display:block; height: 4px; }
      .render-term .progress {
        display:block;
        font-size: 14px;
        margin-top: 2px;
      }
      .render-term .progress .bar { color: var(--accent-warn); }
      .render-term .progress .label { color: #b5bdcc; margin-left: 6px; }
      .render-term .progress.done .bar { color: var(--accent-4); }

      .render-stage {
        grid-column: 2; grid-row: 2;
        position: relative;
        align-self: stretch;
      }
      #render-frame-wrapper {
        width: 100%; height: 100%;
        border-radius: 14px;
        border: 2px solid var(--border-bright);
        box-shadow: 0 24px 60px rgba(0, 0, 0, 0.6);
        overflow: hidden;
        background: #000;
        position: relative;
      }
      #render-frame-wrapper video {
        width: 100%; height: 100%;
        object-fit: cover; display: block;
      }
      #render-frame-wrapper .play-badge {
        position: absolute; top: 18px; right: 18px;
        padding: 6px 12px; border-radius: 999px;
        background: rgba(34,197,94,.20);
        border: 1px solid rgba(34,197,94,.55);
        font-family: var(--mono); font-weight: 700;
        font-size: 12px; letter-spacing: 2px;
        color: #58e5a0;
        display:inline-flex; align-items:center; gap:6px;
      }
      #render-frame-wrapper .play-badge .pulse-dot {
        width: 8px; height: 8px; border-radius: 50%;
        background: #58e5a0;
        box-shadow: 0 0 8px rgba(88,229,160,.7);
      }

      #render-stats {
        grid-column: 1 / span 2; grid-row: 3;
        display:flex; flex-direction:row;
        align-items:center; justify-content: center; gap: 32px;
        font-family: var(--mono); font-weight: 700;
        font-size: 20px; letter-spacing: 1.5px;
        color: var(--text-secondary);
      }
      #render-stats b { color: var(--accent-stat); font-weight: 900; font-size: 26px; }
      #render-stats .sep { color: var(--text-muted); }
    </style>

    <div id="render-content">
      <div class="header-block">
        <div class="overline" id="rend-overline">RENDER TO MP4 &middot; FINAL STEP</div>
        <div class="headline" id="rend-headline">Headless Chromium &rarr; Frame Adapter &rarr; FFmpeg</div>
      </div>

      <div class="render-term" id="rend-term">
        <div class="term-bar">
          <span class="dot"></span><span class="dot y"></span><span class="dot g"></span>
          &nbsp; PowerShell &mdash; my-video &mdash; render
        </div>
        <div class="term-body">
          <span id="rend-l-cmd"><span class="prompt">PS my-video&gt;</span><span class="cmd-text">npx hyperframes render</span></span>
          <span class="blank"></span>
          <span id="rend-l-rendering" class="out head-render">Rendering my-video &rarr; out\my-video.mp4</span>
          <span id="rend-l-config" class="out dim">30fps &middot; standard &middot; auto workers (32 cores)</span>
          <span class="blank"></span>
          <span id="rend-l-browser" class="out head-ok">Browser: cache</span>
          <span class="blank"></span>
          <span id="rend-p-1" class="progress"><span class="bar">█░░░░░░░░░░░░░░░░░░░░░░░░</span><span class="label">5%  Compiling composition</span></span>
          <span id="rend-p-2" class="progress"><span class="bar">██░░░░░░░░░░░░░░░░░░░░░░░</span><span class="label">10%  Extracting video frames</span></span>
          <span id="rend-p-3" class="progress"><span class="bar">██████░░░░░░░░░░░░░░░░░░░</span><span class="label">25%  Starting frame capture</span></span>
          <span id="rend-p-4" class="progress"><span class="bar">█████████░░░░░░░░░░░░░░░░</span><span class="label">37%  Capturing frame 30/150 (5 workers)</span></span>
          <span id="rend-p-5" class="progress"><span class="bar">████████████░░░░░░░░░░░░░</span><span class="label">50%  Capturing frame 75/150 (5 workers)</span></span>
          <span id="rend-p-6" class="progress"><span class="bar">██████████████████░░░░░░░</span><span class="label">75%  Encoding video</span></span>
          <span id="rend-p-7" class="progress done"><span class="bar">█████████████████████████</span><span class="label">100%  Render complete</span></span>
          <span class="blank"></span>
          <span id="rend-l-done" class="out head-ok">out\my-video.mp4</span>
          <span id="rend-l-done-stat" class="out dim">415 KB &middot; 6.0s &middot; completed</span>
        </div>
      </div>

      <div class="render-stage">
        <div id="render-frame-wrapper">
          <video id="rend-vid"
                 class="clip"
                 data-start="0"
                 data-duration="6"
                 data-track-index="1"
                 src="assets/clips/demo.mp4"
                 muted
                 autoplay
                 loop
                 playsinline></video>
          <div class="play-badge" id="rend-badge"><span class="pulse-dot"></span>OUTPUT</div>
        </div>
      </div>

      <div id="render-stats">
        <span><b>415 KB</b> &middot; the 5s intro MP4</span>
        <span class="sep">|</span>
        <span><b>6.0s</b> &middot; render time</span>
        <span class="sep">|</span>
        <span><b>1920&times;1080</b> &middot; 30fps SDR</span>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({ paused: true, defaults: { ease: "power3.out" } });

      // Initial states
      tl.set("#rend-overline",        { y: 22, opacity: 0 }, 0);
      tl.set("#rend-headline",        { y: 32, opacity: 0 }, 0);
      tl.set("#rend-term",            { x: -40, scale: 0.97, opacity: 0 }, 0);
      tl.set("#render-frame-wrapper", { x: 40, scale: 0.95, opacity: 0 }, 0);
      tl.set("#rend-badge",           { y: -8, scale: 0.85, opacity: 0 }, 0);
      tl.set("#render-stats",         { y: 16, opacity: 0 }, 0);

      const rendLines = ["#rend-l-cmd","#rend-l-rendering","#rend-l-config","#rend-l-browser","#rend-p-1","#rend-p-2","#rend-p-3","#rend-p-4","#rend-p-5","#rend-p-6","#rend-p-7","#rend-l-done","#rend-l-done-stat"];
      rendLines.forEach(sel => tl.set(sel, { x: -8, opacity: 0 }, 0));

      // Headline reveal — narration: "Then render." at +0.30s
      tl.to("#rend-overline", { y: 0, opacity: 1, duration: 0.4, ease: "power2.out" }, 0);
      tl.to("#rend-headline", { y: 0, opacity: 1, duration: 0.5 }, 0.25);
      tl.to("#rend-term",     { x: 0, scale: 1, opacity: 1, duration: 0.55, ease: "back.out(1.3)" }, 0.5);
      tl.to("#render-frame-wrapper", { x: 0, scale: 1, opacity: 1, duration: 0.6, ease: "back.out(1.3)" }, 0.6);

      // "npx hyperframes render." narration at +1.61s
      tl.to("#rend-l-cmd",       { x: 0, opacity: 1, duration: 0.3 }, 1.55);
      tl.to("#rend-l-rendering", { x: 0, opacity: 1, duration: 0.3 }, 2.7);
      tl.to("#rend-l-config",    { x: 0, opacity: 1, duration: 0.3 }, 3.0);

      // "Headless Chromium boots." narration at +3.46s
      tl.to("#rend-l-browser", { x: 0, opacity: 1, duration: 0.3 }, 3.5);

      // "The Frame Adapter pauses time." narration at +5.59s — Compiling
      tl.to("#rend-p-1", { x: 0, opacity: 1, duration: 0.25 }, 5.55);
      tl.to("#rend-p-2", { x: 0, opacity: 1, duration: 0.25 }, 6.05);
      tl.to("#rend-p-3", { x: 0, opacity: 1, duration: 0.25 }, 6.55);

      // "Frames step deterministically." narration at +7.50s — Capturing frames
      tl.to("#rend-p-4", { x: 0, opacity: 1, duration: 0.25 }, 7.50);
      tl.to("#rend-p-5", { x: 0, opacity: 1, duration: 0.25 }, 8.00);

      // "FFmpeg encodes the MP4." narration at +10.18s — Encoding
      tl.to("#rend-p-6", { x: 0, opacity: 1, duration: 0.30 }, 10.10);
      tl.to("#rend-p-7", { x: 0, opacity: 1, duration: 0.40 }, 11.30);

      // Final completion + stats — narration: "A five-second clip renders in about six seconds." at +12.71s
      tl.to("#rend-l-done",      { x: 0, opacity: 1, duration: 0.30 }, 12.20);
      tl.to("#rend-l-done-stat", { x: 0, opacity: 1, duration: 0.30 }, 12.50);
      tl.to("#render-stats",     { y: 0, opacity: 1, duration: 0.55, ease: "power2.out" }, 13.00);
      tl.to("#rend-badge",       { y: 0, scale: 1, opacity: 1, duration: 0.5, ease: "back.out(1.6)" }, 12.20);

      window.__timelines["scene-render"] = tl;
    </script>
  </div>
</template>
