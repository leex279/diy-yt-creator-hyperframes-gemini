<!--
  scene-image-hero-9.html — Premium Bento Split-Screen showcase for Chrome WebMCP.

  Structure:
    Background: <img> covering 1920x1080 at low opacity, dark gradient overlay.
    Foreground: 1560px-wide glass bento card with display: grid.
      - Left column: Glowing overline, bold headline, clear body, three colored capability badges.
      - Right column: macOS-style code editor panel with JS API registration.
-->
<template id="scene-image-hero-template">
  <div data-composition-id="scene-image-hero-9"
       data-start="0"
       data-width="1920"
       data-height="1080"
       style="position:absolute; inset:0; overflow:hidden;
              font-family:'Inter', sans-serif; color:var(--text);">

    <style>
      #scene-image-hero-bg {
        position:absolute; inset:0;
        z-index:0;
      }
      #scene-image-hero-bg img {
        position:absolute; inset:0;
        width:100%; height:100%;
        object-fit:cover;
        opacity:0.18;
        image-rendering:auto;
        transform-origin: center center;
      }
      #scene-image-hero-bg .overlay-gradient {
        position:absolute; inset:0;
        background: radial-gradient(circle at 50% 50%, 
                      rgba(10, 10, 12, 0.3) 0%,
                      rgba(10, 10, 12, 0.9) 100%);
      }
      #scene-image-hero-content {
        position:relative;
        z-index:1;
        width:100%; height:100%;
        display:flex;
        align-items:center; justify-content:center;
        box-sizing:border-box;
      }
      #image-hero-card {
        opacity: 0;
        display: grid;
        grid-template-columns: 1.15fr 1fr;
        gap: 56px;
        width: 1560px;
        padding: 64px 72px;
        border-radius: 32px;
        box-sizing: border-box;
        transform-style: preserve-3d;
        background: rgba(15, 15, 20, 0.65);
        backdrop-filter: blur(24px);
        border: 1px solid rgba(255, 255, 255, 0.08);
      }
      
      .left-column {
        display: flex;
        flex-direction: column;
        gap: 28px;
        justify-content: center;
      }

      #image-hero-card .overline {
        font-family: 'JetBrains Mono', monospace;
        font-weight: 700;
        font-size: 24px;
        letter-spacing: 5px;
        text-transform: uppercase;
        color: #8ab4f8;
        text-shadow: 0 0 12px rgba(138, 180, 248, 0.4);
      }
      #image-hero-card .headline {
        font-family: 'Plus Jakarta Sans', 'Inter', sans-serif;
        font-weight: 800;
        font-size: 56px;
        line-height: 1.1;
        letter-spacing: -1.5px;
        color: #ffffff;
      }
      #image-hero-card .body {
        font-family: 'Inter', sans-serif;
        font-weight: 500;
        font-size: 22px;
        line-height: 1.5;
        color: var(--text-secondary);
      }

      /* Badges */
      .badges-container {
        display: flex;
        gap: 16px;
        margin-top: 12px;
      }
      .mcp-badge {
        opacity: 0; /* Animated in by GSAP */
        font-family: 'JetBrains Mono', monospace;
        font-weight: 700;
        font-size: 14px;
        letter-spacing: 0.5px;
        padding: 10px 18px;
        border-radius: 20px;
        display: flex;
        align-items: center;
        gap: 8px;
        text-transform: uppercase;
      }
      .badge-blue {
        background: rgba(66, 133, 244, 0.15);
        color: #8ab4f8;
        border: 1px solid rgba(66, 133, 244, 0.3);
        box-shadow: 0 0 15px rgba(66, 133, 244, 0.1);
      }
      .badge-yellow {
        background: rgba(251, 188, 5, 0.12);
        color: #fdd663;
        border: 1px solid rgba(251, 188, 5, 0.25);
        box-shadow: 0 0 15px rgba(251, 188, 5, 0.08);
      }
      .badge-green {
        background: rgba(52, 168, 83, 0.15);
        color: #81c995;
        border: 1px solid rgba(52, 168, 83, 0.3);
        box-shadow: 0 0 15px rgba(52, 168, 83, 0.1);
      }

      /* Code Editor */
      .right-column {
        display: flex;
        align-items: center;
        justify-content: center;
      }
      #image-hero-code {
        width: 100%;
        background: #0d0e11;
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 16px;
        overflow: hidden;
        box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        opacity: 0; /* Animated in by GSAP */
        transform-style: preserve-3d;
      }
      .editor-header {
        background: #16181d;
        padding: 14px 20px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        border-bottom: 1px solid rgba(255, 255, 255, 0.06);
        position: relative;
      }
      .editor-dots {
        display: flex;
        gap: 8px;
      }
      .editor-dot {
        width: 12px;
        height: 12px;
        border-radius: 50%;
      }
      .dot-red { background: #ff5f56; }
      .dot-yellow { background: #ffbd2e; }
      .dot-green { background: #27c93f; }
      .editor-title {
        font-family: 'JetBrains Mono', monospace;
        font-size: 13px;
        color: rgba(255, 255, 255, 0.7);
        position: absolute;
        left: 50%;
        transform: translateX(-50%);
      }
      .editor-body {
        padding: 24px;
        margin: 0;
        overflow: auto;
      }
      .editor-code {
        font-family: 'JetBrains Mono', monospace;
        font-size: 16px;
        line-height: 1.6;
        color: #e3e4e6;
        white-space: pre;
      }
      
      /* Syntax Highlighting */
      .keyword { color: #ff7b72; font-weight: bold; }
      .string { color: #a5d6ff; }
      .comment { color: #8b949e; font-style: italic; }
      .function { color: #d2a8ff; }
      .params { color: #ffa657; }
    </style>
    <div id="scene-image-hero-bg">
      <img class="clip"
           id="image-hero-bg-photo"
           data-start="0"
           data-duration="80"
           data-track-index="0"
           src="assets/blog/gemini-omni.webp"
           alt="Hero backdrop" />
      <div class="overlay-gradient"></div>
    </div>
 
    <div id="scene-image-hero-content" class="perspective-stage">
      <div class="glass-premium glow-blue" id="image-hero-card">
        <div class="left-column">
          <div class="overline" id="image-hero-overline">CHROME WEBMCP</div>
          <div class="headline" id="image-hero-headline">HANDLES FOR BROWSER AGENTS</div>
          <div class="body"     id="image-hero-body">Google Chrome introduces WebMCP as a proposed open standard. Expose JavaScript functions and HTML forms directly to browser-based AI agents, with experimental origin trials starting in Chrome 149.</div>
          <div class="badges-container">
            <div class="mcp-badge badge-blue">🔌 OPEN STANDARD</div>
            <div class="mcp-badge badge-yellow">⚡ ORIGIN TRIAL</div>
            <div class="mcp-badge badge-green">💻 CHROME 149</div>
          </div>
        </div>
        <div class="right-column">
          <div id="image-hero-code">
            <div class="editor-header">
              <div class="editor-dots">
                <div class="editor-dot dot-red"></div>
                <div class="editor-dot dot-yellow"></div>
                <div class="editor-dot dot-green"></div>
              </div>
              <div class="editor-title">webmcp.js</div>
            </div>
            <div class="editor-body">
              <pre class="editor-code"><span class="comment">// Register agent capability</span>
<span class="keyword">navigator</span>.<span class="keyword">webmcp</span>.<span class="function">register</span>({
  <span class="keyword">name</span>: <span class="string">"dom_search"</span>,
  <span class="keyword">description</span>: <span class="string">"Search DOM"</span>,
  <span class="function">execute</span>: <span class="keyword">async</span> (<span class="params">query</span>) =&gt; {
    <span class="keyword">return</span> <span class="keyword">document</span>
      .<span class="function">querySelectorAll</span>(query);
  }
});</pre>
            </div>
          </div>
        </div>
      </div>
    </div>
 
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({
        paused: true,
        defaults: { ease: "power3.out", duration: 0.6 }
      });
 
      // 0.0s: Stretch backdrop photo zoom over the full duration (80.0s)
      tl.fromTo("#image-hero-bg-photo", {
        scale: 1.0,
        opacity: 0
      }, {
        scale: 1.15,
        opacity: 0.22,
        duration: 80.0,
        ease: "linear",
        immediateRender: false
      }, 0);
 
      // 0.50s: 3.5D spatial depth entry for the glass card (narration starts immediately)
      tl.fromTo("#image-hero-card", {
        x: -80,
        rotateY: 18,
        rotateX: 4,
        scale: 0.88,
        opacity: 0
      }, {
        x: 0,
        rotateY: -4,
        rotateX: 2,
        scale: 1,
        opacity: 1,
        duration: 0.9,
        ease: "back.out(1.3)",
        immediateRender: false
      }, 0.50);
  
      // Staggered reveals of elements inside the card
      // Overline slides in at 0.70s
      tl.from("#image-hero-overline", { y: 15, opacity: 0, duration: 0.5, ease: "power2.out", immediateRender: false }, 0.70);
  
      // Headline slides in at 2.73s
      tl.from("#image-hero-headline", { y: 20, opacity: 0, duration: 0.6, ease: "power3.out", immediateRender: false }, 2.73);
  
      // Body slides in at 4.73s
      tl.from("#image-hero-body",     { y: 20, opacity: 0, duration: 0.6, ease: "power3.out", immediateRender: false }, 4.73);
  
      // JS Code Editor panel slides in from the right with a 3D rotation at 6.23s
      tl.fromTo("#image-hero-code", {
        x: 100,
        opacity: 0,
        rotateY: -20,
        scale: 0.95
      }, {
        x: 0,
        opacity: 1,
        rotateY: 0,
        scale: 1,
        duration: 1.2,
        ease: "power3.out",
        immediateRender: false
      }, 6.23);
 
      // Technical badges stagger fade/scale in at 8.23s
      tl.fromTo(".mcp-badge", {
        scale: 0.7,
        opacity: 0,
        y: 15
      }, {
        scale: 1,
        opacity: 1,
        y: 0,
        duration: 0.8,
        stagger: 0.15,
        ease: "back.out(1.5)",
        immediateRender: false
      }, 8.23);
  
      // Card border volumetric glow pulse (blue/cyan) at 9.73s
      tl.to("#image-hero-card", {
        boxShadow: "0 24px 60px rgba(0,0,0,0.55), 0 0 50px rgba(66, 133, 244, 0.6)",
        duration: 0.6
      }, 9.73);
      tl.to("#image-hero-card", {
        boxShadow: "0 24px 60px rgba(0,0,0,0.55)",
        duration: 0.8
      }, 10.33);
  
      // Slow 3D tilt shift of the card to the right at 12.23s
      tl.to("#image-hero-card", {
        rotateY: 6,
        rotateX: -2,
        duration: 2.0,
        ease: "power1.inOut"
      }, 12.23);
  
      // 29.46s: Sweep text shadow to highlight DevTools (spoken: "Chrome DevTools for Agents")
      tl.to("#image-hero-headline", {
        color: "#8AB4F8",
        textShadow: "0 0 25px rgba(66, 133, 244, 0.6)",
        duration: 0.4
      }, 29.46);
      tl.to("#image-hero-headline", {
        color: "var(--text)",
        textShadow: "none",
        duration: 0.5
      }, 30.96);
  
      // Card volumetric glow pulse (green/yellow) at 33.0s
      tl.to("#image-hero-card", {
        boxShadow: "0 24px 60px rgba(0,0,0,0.55), 0 0 50px rgba(52, 168, 83, 0.6)",
        duration: 0.6
      }, 33.0);
      tl.to("#image-hero-card", {
        boxShadow: "0 24px 60px rgba(0,0,0,0.55)",
        duration: 0.8
      }, 33.6);
  
      // Soft hover tilt shift of the card to the left at 36.0s
      tl.to("#image-hero-card", {
        rotateY: -6,
        rotateX: 3,
        duration: 2.0,
        ease: "power1.inOut"
      }, 36.0);
  
      // 42.91s: Highlight key term in body "WebMCP" (spoken: "Prompt API is now stable")
      tl.to("#image-hero-body", {
        color: "#FBBC05",
        textShadow: "0 0 15px rgba(251, 188, 5, 0.4)",
        duration: 0.4
      }, 42.91);
      tl.to("#image-hero-body", {
        color: "var(--text-secondary)",
        textShadow: "none",
        duration: 0.5
      }, 44.41);
  
      // 45.0s: Parallax card zoom
      tl.to("#image-hero-card", {
        scale: 1.04,
        duration: 3.5,
        ease: "sine.inOut"
      }, 45.0);
  
      // 47.0s: Float wobble card in Y direction
      tl.to("#image-hero-card", {
        y: -15,
        duration: 1.8,
        ease: "sine.inOut"
      }, 47.0);
      tl.to("#image-hero-card", {
        y: 0,
        duration: 1.8,
        ease: "sine.inOut"
      }, 48.8);
  
      // 50.90s: Volumetric glow wave on card border
      tl.to("#image-hero-card", {
        boxShadow: "0 24px 60px rgba(0,0,0,0.55), 0 0 45px rgba(255, 255, 255, 0.2)",
        duration: 0.6
      }, 50.90);
      tl.to("#image-hero-card", {
        boxShadow: "0 24px 60px rgba(0,0,0,0.55)",
        duration: 0.8
      }, 51.50);
  
      // 54.16s: Settle card back to center
      tl.to("#image-hero-card", {
        rotateY: 0,
        rotateX: 0,
        scale: 1.0,
        y: 0,
        duration: 2.0,
        ease: "power2.out"
      }, 54.16);
  
      // Final soft border glow wave at 58.0s
      tl.to("#image-hero-card", {
        boxShadow: "0 24px 60px rgba(0,0,0,0.55), 0 0 35px rgba(66, 133, 244, 0.3)",
        duration: 0.6
      }, 58.0);
      tl.to("#image-hero-card", {
        boxShadow: "0 24px 60px rgba(0,0,0,0.55)",
        duration: 0.8
      }, 58.6);
 
      window.__timelines["scene-image-hero-9"] = tl;
    </script>
  </div>
</template>
